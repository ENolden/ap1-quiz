<script>
const Q=[
{id:1,b:"7.1",t:"Projektmerkmale",q:"Was sind typische Merkmale eines Projekts?",o:["Wiederholend, guenstig, einfach","Dauerhaft, unbegrenzt, einfach","Unbegrenzte Ressourcen, kein Ziel","Einmaligkeit, Zielgerichtetheit, zeitliche Begrenzung, begrenzte Ressourcen, Komplexitaet"],a:3,f:"Projektmerkmale: Einmaligkeit (kein Routinevorgang), Zielgerichtet (definiertes Ergebnis), zeitlich begrenzt (Start und Ende), begrenzte Ressourcen (Budget, Personal), Komplexitaet."},
{id:2,b:"7.1",t:"Projektmerkmale",q:"Was unterscheidet ein Projekt von einer Routineaufgabe?",o:["Projekte sind teurer","Projekte haben kein Ziel","Routineaufgaben sind zeitlich begrenzt","Projekte sind einmalig und komplex, Routineaufgaben wiederholen sich regelmaessig"],a:3,f:"Projekt: einmalig, komplex, mit definiertem Ziel und Ende. Routine: wiederholend, standardisiert, kein definiiertes Ende. Beispiel: Webseite erstellen = Projekt. Webseite pflegen = Routine."},
{id:3,b:"7.1",t:"Projektmerkmale",q:"Was bedeutet Einmaligkeit als Projektmerkmal?",o:["Das Projekt hat ein Team","Das Projekt kostet einmalig Geld","Das Projekt hat einen Auftraggeber","Jedes Projekt ist einzigartig - es gibt keine identische Wiederholung unter denselben Bedingungen"],a:3,f:"Einmaligkeit: kein Projekt laeuft unter exakt gleichen Bedingungen zweimal ab. Neue Kombination aus Anforderungen, Team, Zeitpunkt, Ressourcen. Macht Projekte komplex und risikoreich."},
{id:4,b:"7.1",t:"Projektmerkmale",q:"Was sind Ressourcen in einem Projekt?",o:["Nur Mitarbeiter","Nur IT-Systeme","Nur Geld","Personal, Budget, Zeit, Materialien, Technologie und Wissen - alle knappenMittel die fuer das Projekt eingesetzt werden"],a:3,f:"Projektressourcen: Personal (Arbeitsstunden), Budget (Geld), Zeit (Deadline), Materialien, Technologie (Hardware/Software), Wissen/Expertise. Knapphalt und Verteilung = Kernaufgabe im PM."},
{id:5,b:"7.1",t:"Projektmerkmale",q:"Was ist ein Projektauftrag?",o:["Rechnung fuer das Projekt","Abschlussbericht","Projektplan","Formales Dokument das Start, Ziele, Scope, Budget und Verantwortlichkeiten eines Projekts definiert und genehmigt"],a:3,f:"Projektauftrag (Project Charter): definiert Ziel, Scope, Budget, Zeitplan, Projektleiter, wichtige Stakeholder. Formale Genehmigung zum Projektstart. Basis fuer alle weiteren Planungsschritte."},
{id:6,b:"7.1",t:"Projektmerkmale",q:"Was ist der Projektscope (Projektumfang)?",o:["Das Projektteam","Alle Aufgaben, Liefergegenstande und Grenzen eines Projekts - was wird geliefert und was NICHT","Das Projektbudget","Der Zeitplan"],a:1,f:"Scope: definiert genau was zum Projekt gehoert (In-Scope) und was nicht (Out-of-Scope). Klarer Scope verhindert Scope Creep (unkontrolliertes Wachstum des Projektumfangs)."},
{id:7,b:"7.1",t:"Projektmerkmale",q:"Was ist Scope Creep?",o:["Korrekte Scope-Definition","Teamkonflikt","Unkontrolliertes Anwachsen des Projektumfangs ohne entsprechende Anpassung von Budget und Zeitplan","Budget-Ueberschreitung"],a:2,f:"Scope Creep: Projektumfang waechst schleichend (neue Anforderungen ohne formalen Aenderungsprozess). Fuehrt zu Budget- und Zeitplan-Ueberschreitungen. Gegenmaßnahme: Change-Management-Prozess."},
{id:8,b:"7.1",t:"Projektmerkmale",q:"Was ist das magische Dreieck im Projektmanagement?",o:["Kosten-Qualitaet-Risiko","Planung-Durchfuehrung-Abschluss","Auftraggeber-Team-Lieferant","Abhängigkeit von Kosten, Zeit und Qualitaet/Leistung - Verbesserung einer Groesse beeintraechtigt die anderen"],a:3,f:"Magisches Dreieck: Kosten, Zeit und Qualitaet stehen in Konkurrenz. Mehr Qualitaet kostet Zeit oder Geld. Weniger Zeit erfordert mehr Geld oder weniger Qualitaet. Projektleiter muss balancieren."},
{id:9,b:"7.1",t:"Projektmerkmale",q:"Was ist ein Projektleiter?",o:["Person mit Gesamtverantwortung fuer Planung, Steuerung und Abschluss eines Projekts","Externer Berater","Auftraggeber des Projekts","Teammitglied ohne Fuehrungsaufgabe"],a:0,f:"Projektleiter: verantwortlich fuer Zielerreichung, Einhaltung von Budget und Zeitplan, Teamfuehrung, Stakeholder-Kommunikation und Risikomanagement. Zentrale Rolle im Projektmanagement."},
{id:10,b:"7.1",t:"Projektmerkmale",q:"Was ist ein Teilprojekt?",o:["Ein Meilenstein","Eine Projektaufgabe","Eine Projektphase","Eigenstaendiger Projektabschnitt mit eigener Planung, Leitung und Zielen - Teil eines groesseren Gesamtprojekts"],a:3,f:"Teilprojekt: Grosse Projekte werden in Teilprojekte aufgeteilt. Jedes Teilprojekt hat eigene Ziele, Leitung, Ressourcen. Ermoeglicht parallele Bearbeitung und bessere Steuerung."},
{id:11,b:"7.2",t:"Netzplan",q:"Was ist ein Netzplan?",o:["Ein Gantt-Diagramm","Ein Organigramm","Grafische Methode zur Darstellung von Projektablaeufen und zeitlichen Abhaengigkeiten zwischen Vorgaengen","Ein Kommunikationsplan"],a:2,f:"Netzplan: zeigt Vorgaenge, ihre Abhaengigkeiten (Pfeile/Kanten) und Zeitplanung (FAZ, FEZ, SAZ, SEZ, Puffer). Ermoeglicht Bestimmung des kritischen Wegs und der Mindestprojektdauer."},
{id:12,b:"7.2",t:"Netzplan",q:"Was bedeutet FAZ im Netzplan?",o:["Fruehester Abgabezeitpunkt","Fester Arbeitszeitpunkt","Fruehester Anfangszeitpunkt: fruehester Zeitpunkt an dem ein Vorgang beginnen kann","Finaler Anfangszeitpunkt"],a:2,f:"FAZ (Fruehester Anfangszeitpunkt): der fruehestmoegliche Zeitpunkt an dem ein Vorgang starten kann, basierend auf dem Ende aller Vorgaenger. Wird durch Vorwaertsrechnung ermittelt."},
{id:13,b:"7.2",t:"Netzplan",q:"Was bedeutet FEZ im Netzplan?",o:["Fester Endzeitpunkt","Fruehester Endzeitpunkt: FAZ + Dauer des Vorgangs","Finaler Endzeitpunkt","Freier Endzeitpunkt"],a:1,f:"FEZ (Fruehester Endzeitpunkt) = FAZ + Dauer. Der fruehestmoegliche Zeitpunkt an dem ein Vorgang abgeschlossen sein kann."},
{id:14,b:"7.2",t:"Netzplan",q:"Was bedeutet SAZ im Netzplan?",o:["Spaetester Anfangszeitpunkt: spaetester Zeitpunkt an dem ein Vorgang beginnen darf ohne das Projektende zu verzoegern","Start am Ziel","Sicherer Anfang","Spaetester Abschluss"],a:0,f:"SAZ (Spaetester Anfangszeitpunkt): spaetestmoeglicher Start ohne Projektverzoegerung. Wird durch Rueckwaertsrechnung ermittelt. SAZ = SEZ - Dauer."},
{id:15,b:"7.2",t:"Netzplan",q:"Was ist der Gesamtpuffer (GP) im Netzplan?",o:["Zeitreserve im Budget","Anzahl der Vorgaenger","Dauer eines Vorgangs","GP = SAZ - FAZ (oder SEZ - FEZ): Zeitspanne um die ein Vorgang verzoegert werden kann ohne das Projektende zu gefaehrden"],a:3,f:"Gesamtpuffer (GP) = SAZ - FAZ. Zeigt wie viel Zeitreserve ein Vorgang hat. GP = 0: Vorgang liegt auf dem kritischen Weg. Puffer verbrauchen verringert Spielraum fuer andere Vorgaenge."},
{id:16,b:"7.2",t:"Netzplan",q:"Was ist der freie Puffer (FP) im Netzplan?",o:["GP minus Dauer","FP = FAZ des Nachfolgers - FEZ des Vorgangs: Zeit um die ein Vorgang verzoegert werden kann ohne den Nachfolger zu verzoegern","Sicherheitspuffer","Gesamte Pufferzeit"],a:1,f:"Freier Puffer (FP) = FAZ(Nachfolger) - FEZ(Vorgang). Kann verbraucht werden ohne Nachfolger zu beeinflussen. FP <= GP. Praktisch fuer lokale Optimierungen."},
{id:17,b:"7.2",t:"Netzplan",q:"Was ist der kritische Weg?",o:["Der kuerzeste Weg","Der teuerste Weg","Der erste Weg","Der laengste Pfad durch den Netzplan mit GP=0 - bestimmt die minimale Projektdauer"],a:3,f:"Kritischer Weg: alle Vorgaenge mit Gesamtpuffer = 0. Jede Verzoegerung hier verzoegert das Gesamtprojekt. Projektleiter muss kritische Vorgaenge besonders ueberwachen."},
{id:18,b:"7.2",t:"Netzplan",q:"Wie berechnet man FEZ?",o:["FEZ = FAZ - Dauer","FEZ = SEZ - Dauer","FEZ = FAZ + Dauer","FEZ = SAZ + Dauer"],a:2,f:"FEZ = FAZ + Dauer. Beispiel: Vorgang startet am Tag 3 (FAZ=3), dauert 5 Tage: FEZ = 3 + 5 = 8. Der Vorgang endet am Ende von Tag 8."},
{id:19,b:"7.2",t:"Netzplan",q:"Was ist Vorwaertsrechnung im Netzplan?",o:["Berechnung von Anfang zum Ende: FAZ und FEZ aller Vorgaenge berechnen um den fruehesten Projektabschluss zu ermitteln","Berechnung von hinten","Pufferberechnung","Ressourcenplanung"],a:0,f:"Vorwaertsrechnung: von links nach rechts. FAZ(erster Vorgang) = 0. FAZ(Nachfolger) = MAX(FEZ aller Vorgaenger). FEZ = FAZ + Dauer. Ergibt Mindestprojektdauer."},
{id:20,b:"7.2",t:"Netzplan",q:"Was ist Rueckwaertsrechnung im Netzplan?",o:["Berechnung von vorne","Berechnung vom Projektende zurueck: SEZ und SAZ aller Vorgaenge berechnen um den spaetestmoeglichen Start zu ermitteln","Pufferberechnung","Vorwaertsrechnung"],a:1,f:"Rueckwaertsrechnung: von rechts nach links. SEZ(letzter Vorgang) = FEZ(letzter Vorgang). SAZ = SEZ - Dauer. SEZ(Vorgaenger) = MIN(SAZ aller Nachfolger). Ergibt SAZ und SEZ aller Vorgaenge."},
{id:21,b:"7.2",t:"EPK",q:"Was ist eine EPK (Ereignisgesteuerte Prozesskette)?",o:["Ein Netzplan","Grafische Modellierungssprache fuer Geschaeftsprozesse: wechselnde Folge von Ereignissen und Funktionen","Ein Gantt-Diagramm","Ein Organigramm"],a:1,f:"EPK: Modellierungssprache fuer Geschaeftsprozesse. Grundregel: Ereignisse und Funktionen wechseln sich immer ab. Startet und endet mit Ereignis. Verknuepfungsoperatoren steuern den Fluss."},
{id:22,b:"7.2",t:"EPK",q:"Was ist ein Ereignis in der EPK?",o:["Eine Organisationseinheit","Ein eingetretener Zustand der den weiteren Ablauf beeinflusst (z.B. Auftrag eingegangen, Rechnung bezahlt)","Eine Taetigkeit","Ein Operator"],a:1,f:"Ereignis in EPK: passiver Zustand, keine Taetigkeit. Beispiele: Auftrag ist eingegangen, Bestellung wurde genehmigt, Produkt ist fertiggestellt. Startet und beendet Funktionen."},
{id:23,b:"7.2",t:"EPK",q:"Was ist eine Funktion in der EPK?",o:["Ein Operator","Eine Taetigkeit/Vorgang der einen Eingangszustand in einen Ausgangszustand umwandelt (z.B. Bestellung pruefen)","Ein Zustand","Ein Objekt"],a:1,f:"Funktion in EPK: aktive Taetigkeit, wird von Personen oder Systemen ausgefuehrt. Beispiele: Bestellung pruefen, Rechnung erstellen, Produkt verpacken. Immer zwischen zwei Ereignissen."},
{id:24,b:"7.2",t:"EPK",q:"Was macht der AND-Operator in der EPK?",o:["Mindestens einer von mehreren Pfaden","Einer von mehreren Pfaden","Alle parallelen Pfade werden gleichzeitig ausgefuehrt (split) oder alle muessen abgeschlossen sein bevor es weitergeht (join)","Nur ein Pfad wird verfolgt"],a:2,f:"AND-Operator: Split = alle Pfade werden parallel ausgefuehrt. Join = alle Pfade muessen abgeschlossen sein. Beispiel: Bestellung UND Zahlung muessen eingegangen sein bevor geliefert wird."},
{id:25,b:"7.2",t:"EPK",q:"Was macht der XOR-Operator in der EPK?",o:["Mindestens ein Pfad","Genau ein Pfad von mehreren wird ausgefuehrt (exklusives Oder) - schliessen sich gegenseitig aus","Alle Pfade","Kein Pfad"],a:1,f:"XOR (Exklusives Oder): genau einer von mehreren moeglichen Pfaden wird gewahlt. Beispiele: Zahlung per Karte ODER per Ueberweisung (nicht beides). Sich gegenseitig ausschliessende Alternativen."},
{id:26,b:"7.2",t:"EPK",q:"Was macht der OR-Operator in der EPK?",o:["Kein Pfad","Genau ein Pfad","Mindestens ein Pfad von mehreren wird ausgefuehrt (offenes Oder)","Alle Pfade"],a:2,f:"OR (Offenes Oder): mindestens einer der moeglichen Pfade wird ausgefuehrt. Koennen auch mehrere sein. Flexibelste Option. Seltener als AND und XOR in der Praxis."},
{id:27,b:"7.2",t:"EPK",q:"Mit was beginnt und endet eine EPK?",o:["Mit einem Ereignis - sowohl Start als auch Ende sind immer Ereignisse","Mit einem Operator","Mit einer Funktion","Mit einer Organisationseinheit"],a:0,f:"EPK-Grundregel: startet mit Ereignis, endet mit Ereignis. Zwischen Ereignissen stehen immer Funktionen. Kein Ereignis direkt nach Ereignis, keine Funktion direkt nach Funktion."},
{id:28,b:"7.2",t:"EPK",q:"Was ist ein Gantt-Diagramm?",o:["Eine EPK","Ein Netzplan","Ein Organigramm","Balkendiagramm das Projektaufgaben auf einer Zeitachse darstellt - zeigt Dauer, Reihenfolge und Parallelitaet von Aufgaben"],a:3,f:"Gantt-Diagramm: horizontale Balken auf Zeitachse. Jeder Balken = eine Aufgabe mit Start, Dauer, Ende. Abhängigkeiten durch Pfeile. Intuitiv lesbar, gut fuer Uebersicht und Kommunikation."},
{id:29,b:"7.2",t:"EPK",q:"Was ist der Unterschied zwischen Gantt-Diagramm und Netzplan?",o:["Gantt ist komplexer","Identisch","Gantt: visuell intuitiv, zeigt Zeitplanung. Netzplan: zeigt Abhaengigkeiten und Puffer, ermoeglicht kritischen Weg - komplexer aber aussagekraeftiger","Netzplan ist fuer kleine Projekte"],a:2,f:"Gantt: einfach lesbar, gut fuer Kommunikation, zeigt Zeitplan. Netzplan: komplexer, zeigt Abhaengigkeiten, Puffer und kritischen Weg. In der Praxis oft beide zusammen genutzt."},
{id:30,b:"7.2",t:"EPK",q:"Was ist ein Projektstrukturplan (PSP)?",o:["Hierarchische Gliederung aller Projektaufgaben in Teilaufgaben und Arbeitspakete - bildet Basis fuer Planung und Kontrolle","Organigramm des Teams","Netzplan","Risikoregister"],a:0,f:"PSP (Work Breakdown Structure): gliedert Gesamtprojekt hierarchisch in Teilprojekte, Arbeitspakete und Aufgaben. Basis fuer Aufwandsschaetzung, Ressourcenplanung und Fortschrittskontrolle."},
{id:31,b:"7.3",t:"SMART-Ziele",q:"Was bedeutet S in SMART?",o:["Strukturiert","Spezifisch: Ziel ist konkret und praezise formuliert, nicht vage","Schnell","Sicher"],a:1,f:"S = Spezifisch: Was genau soll erreicht werden? Wer ist beteiligt? Wie? Wo? Nicht: das System verbessern. Sondern: die Ladezeit der Webseite von 3 auf unter 1 Sekunde reduzieren."},
{id:32,b:"7.3",t:"SMART-Ziele",q:"Was bedeutet M in SMART?",o:["Messbar: Zielerreichung muss objektiv gemessen und bewertet werden koennen","Machbar","Motivierend","Modern"],a:0,f:"M = Messbar: Wie wird Erfolg gemessen? Konkrete Zahlen/Kriterien. Nicht: Kundenzufriedenheit erhoehen. Sondern: Kundenzufriedenheit von 3,2 auf 4,5 (Skala 1-5) steigern."},
{id:33,b:"7.3",t:"SMART-Ziele",q:"Was bedeutet A in SMART?",o:["Attraktiv/Achievable: Ziel ist erreichbar und fuer Beteiligte bedeutsam","Abstrakt","Automatisch","Allgemein"],a:0,f:"A = Attraktiv/Achievable: realistisch erreichbar mit vorhandenen Ressourcen UND motivierend fuer das Team. Zu einfache Ziele demotivieren, zu schwere frustrieren."},
{id:34,b:"7.3",t:"SMART-Ziele",q:"Was bedeutet R in SMART?",o:["Revolutionaer","Redundant","Realistisch: Ziel ist mit vorhandenen Ressourcen und Rahmenbedingungen umsetzbar","Reaktiv"],a:2,f:"R = Realistisch: ist das Ziel mit dem vorhandenen Budget, Personal und Zeit erreichbar? Nicht: in 2 Wochen ein neues ERP-System einfuehren. Realistisch waere: Anforderungsanalyse in 2 Wochen."},
{id:35,b:"7.3",t:"SMART-Ziele",q:"Was bedeutet T in SMART?",o:["Total","Terminiert: Ziel hat ein klares zeitliches Ende/Deadline","Teilweise","Technisch"],a:1,f:"T = Terminiert: bis wann genau? Kein Zeitlimit = kein Druck = keine Zielerreichung. Nicht: bald. Sondern: bis 31.12.2024. Zeitlimit schafft Verbindlichkeit."},
{id:36,b:"7.3",t:"SMART-Ziele",q:"Welches ist ein SMART-formuliertes Ziel?",o:["Das System verbessern","IT-Kosten um 15% bis Ende Q3 2024 senken durch Konsolidierung von 3 Servern auf eine Cloud-Loesung","Besserer Service","Schnellere Bearbeitung"],a:1,f:"SMART: Spezifisch (IT-Kosten, Server->Cloud), Messbar (15%), Attraktiv (bedeutsame Einsparung), Realistisch (mit vorhandener Cloud-Infrastruktur), Terminiert (Ende Q3 2024)."},
{id:37,b:"7.3",t:"SMART-Ziele",q:"Warum sind SMART-Ziele wichtig im Projektmanagement?",o:["Pflicht durch Gesetz","Nur fuer grosse Projekte","Klare Ziele ermoeglichen Fortschrittsmessung, vermeiden Missverstaendnisse und schaffen verbindliche Grundlage fuer Teamarbeit","Nur fuer externe Kommunikation"],a:2,f:"SMART-Ziele: klare Erwartungen fuer alle Beteiligten, objektive Erfolgsmessung moeglich, fruehzeitige Erkennung von Abweichungen, Basis fuer Motivation und Accountability im Team."},
{id:38,b:"7.4",t:"Projektphasen",q:"Welche 4 groben Projektphasen gibt es?",o:["Idee, Test, Launch, Review","Initiierung, Planung, Kontrolle, Ende","Analyse, Design, Implementierung, Betrieb","Projektdefinition, Projektplanung, Projektrealisierung, Projektabschluss"],a:3,f:"4 Projektphasen: 1. Projektdefinition (Ziele, Auftrag), 2. Projektplanung (Netzplan, Ressourcen, Budget), 3. Projektrealisierung (Umsetzung, Kontrolle), 4. Projektabschluss (Abnahme, Lessons Learned)."},
{id:39,b:"7.4",t:"Projektphasen",q:"Was passiert in der Projektdefinitionsphase?",o:["Tests werden durchgefuehrt","Ziele werden definiert, Machbarkeit geprueft, Auftrag erteilt, Projektleiter bestimmt, grober Rahmen festgelegt","Software wird entwickelt","Abnahme durch Kunden"],a:1,f:"Projektdefinition: Warum das Projekt? Was soll erreicht werden? Ist es machbar? Wer leitet es? Welche Ressourcen? Ergebnis: Projektauftrag (Project Charter) mit genehmigtem Budget und Ziel."},
{id:40,b:"7.4",t:"Projektphasen",q:"Was ist das Wasserfallmodell?",o:["Lineares Vorgehensmodell: Phasen werden sequenziell durchlaufen (Analyse -> Design -> Implementierung -> Test -> Betrieb), jede Phase nur einmal","Hybridmodell","Iteratives Modell","Agiles Modell"],a:0,f:"Wasserfallmodell: lineare Phasen, jede wird abgeschlossen bevor die naechste beginnt. Klare Struktur, gut dokumentiert. Nachteile: unflexibel bei Aenderungen, Fehler spaet erkannt."},
{id:41,b:"7.4",t:"Projektphasen",q:"Was sind die Phasen des Wasserfallmodells?",o:["Sprint, Review, Retro","Analyse, Design, Implementierung, Test, Betrieb","Definition, Planung, Realisierung, Abschluss","Forming, Storming, Norming, Performing"],a:1,f:"Wasserfallphasen: 1. Analyse (Anforderungen), 2. Design (Architektur, Entwurf), 3. Implementierung (Programmierung), 4. Test (Qualitaetssicherung), 5. Betrieb (Einfuehrung, Wartung)."},
{id:42,b:"7.4",t:"Projektphasen",q:"Was ist ein Vorteil des Wasserfallmodells?",o:["Flexibel bei Aenderungen","Klare Struktur, gute Dokumentation, leicht verstaendlich und planbar - gut bei stabilen Anforderungen","Kurze Feedbackzyklen","Hoehere Produktqualitaet"],a:1,f:"Wasserfall-Vorteil: klarer Projektplan von Anfang, gute Dokumentation, leicht nachvollziehbar, gut fuer Projekte mit stabilen Anforderungen und regulierten Umgebungen (z.B. Medizin)."},
{id:43,b:"7.4",t:"Projektphasen",q:"Was ist ein Nachteil des Wasserfallmodells?",o:["Zu schnell","Zu teuer","Zu wenig Dokumentation","Unflexibel bei Aenderungen: Fehler werden oft erst spaet entdeckt, Anpassungen erfordern Rueckspruenge zu frueheren Phasen"],a:3,f:"Wasserfall-Nachteil: Kunden sehen Ergebnis erst am Ende, Aenderungen teuer und aufwendig, Fehler in der Analyse erst beim Test entdeckt. Ungeeignet fuer dynamische Anforderungen."},
{id:44,b:"7.4",t:"Projektphasen",q:"Was ist Scrum?",o:["Wasserfallmodell","Lineares Projektmodell","Agiles Vorgehensmodell mit iterativen Sprints (2-4 Wochen), selbstorganisierten Teams und regelmaessigem Kundenfeedback","Ein Planungstool"],a:2,f:"Scrum: agiles Framework. Arbeit in Sprints (2-4 Wochen), am Ende jedes Sprints ein lieferbares Produkt-Inkrement. Drei Rollen: Product Owner, Scrum Master, Entwicklungsteam."},
{id:45,b:"7.4",t:"Projektphasen",q:"Was ist die Rolle des Product Owners in Scrum?",o:["Beseitigt Hindernisse","Fuehrt technische Implementierung durch","Technischer Architekt","Legt Produktvision fest, priorisiert Anforderungen im Product Backlog und repraesentiert Kundeninteressen"],a:3,f:"Product Owner: Stimme des Kunden. Verwaltet Product Backlog, priorisiert Features nach Geschaeftswert, nimmt Sprint-Ergebnisse ab. Verbindet Entwicklungsteam mit Geschaeftsanforderungen."},
{id:46,b:"7.4",t:"Projektphasen",q:"Was ist die Rolle des Scrum Masters?",o:["Unterstuetzt Team bei Selbstorganisation, beseitigt Hindernisse (Impediments), sorgt fuer Einhaltung der Scrum-Regeln - kein Vorgesetzter","Technischer Architekt","Projektleiter","Produktverantwortlicher"],a:0,f:"Scrum Master: kein klassischer PM! Servant Leader. Coacht Team, schuetzt vor Stoerungen, moderiert Scrum-Meetings, beseitigt Hindernisse. Sorgt dass Scrum korrekt angewendet wird."},
{id:47,b:"7.4",t:"Projektphasen",q:"Was ist ein Sprint?",o:["Kurzer, fest definierter Arbeitszyklus (2-4 Wochen) am Ende ein lieferbares Produktinkrement entsteht","Eine Testphase","Ein Projektabschluss","Ein Planungsmeeting"],a:0,f:"Sprint: Herzstuck von Scrum. Feste Laenge (meist 2 Wochen). Am Ende: funktionsfaehiges, getestetes Produktinkrement. Keine Aenderungen am Sprint-Ziel waehrend des Sprints."},
{id:48,b:"7.4",t:"Projektphasen",q:"Was ist das Daily Stand-up (Daily Scrum)?",o:["Wochenbericht","Tagesplanung fuer jeden Mitarbeiter","Kurzes taegliches Meeting (max. 15 Min.): Was habe ich gestern getan? Was mache ich heute? Gibt es Hindernisse?","Sprintplanung"],a:2,f:"Daily Stand-up: max. 15 Minuten, taglich, stehend. Drei Fragen: 1. Was gestern erledigt? 2. Was heute geplant? 3. Gibt es Hindernisse? Dient Synchronisation, nicht Status-Report."},
{id:49,b:"7.4",t:"Projektphasen",q:"Was ist ein Sprint Review?",o:["Taegliches Meeting","Planung des naechsten Sprints","Rueckblick auf Team-Prozesse","Vorstellung der Sprint-Ergebnisse am Ende des Sprints vor Product Owner und Stakeholdern - Feedback und Abnahme"],a:3,f:"Sprint Review: am Sprintende, Entwicklungsteam zeigt fertige Funktionen, Product Owner und Stakeholder geben Feedback, Product Backlog wird angepasst. Typisch 1-2 Stunden fuer 2-Wochen-Sprint."},
{id:50,b:"7.4",t:"Projektphasen",q:"Was ist eine Sprint Retrospektive?",o:["Status-Report fuer Management","Rueckblick auf den Prozess des Teams: Was lief gut? Was koennte besser sein? Welche Massnahmen nehmen wir mit?","Rueckblick auf Produktergebnisse","Planung des Backlogs"],a:1,f:"Sprint Retrospektive: nach Sprint Review, nur das Scrum-Team. Prozessverbesserung im Fokus (nicht Produkt). Ergebnis: konkrete Verbesserungsmassnahmen fuer naechsten Sprint (kontinuierliche Verbesserung)."},
{id:51,b:"7.4",t:"Projektphasen",q:"Was ist das Product Backlog?",o:["Projektplan","Fehlerliste","Sprintplanung","Priorisierte Liste aller gewuenschten Features, Verbesserungen und Anforderungen fuer das Produkt - wird vom Product Owner gepflegt"],a:3,f:"Product Backlog: geordnete Liste aller Anforderungen (User Stories, Features, Bugfixes). Product Owner priorisiert nach Geschaeftswert. Lebendes Dokument, wird staendig aktualisiert."},
{id:52,b:"7.4",t:"Projektphasen",q:"Was ist der Unterschied zwischen Wasserfall und Scrum?",o:["Wasserfall ist moderner","Wasserfall: linear, einmalige Phasen, Planung upfront. Scrum: iterativ, kurze Zyklen, kontinuierliches Feedback, flexible Anforderungen","Scrum ist fuer grosse Projekte","Kein Unterschied"],a:1,f:"Wasserfall: Anforderungen zu Beginn fest, linearer Ablauf, spaetes Feedback. Scrum: Anforderungen evolieren, iterative Lieferung, fruehes und regelmaessiges Feedback. Wasserfall bei stabilen, Scrum bei dynamischen Anforderungen."},
{id:53,b:"7.4",t:"Projektphasen",q:"Was ist Sprint Planning?",o:["Jahresplanung","Meeting am Sprintbeginn: Team und Product Owner planen was in diesem Sprint umgesetzt wird - Sprint Backlog wird erstellt","Rueckblick","Taegliches Meeting"],a:1,f:"Sprint Planning: am Sprintbeginn. Product Owner praesentiert priorisierte Backlog-Items, Team schaetzt Aufwand, entscheidet welche Items im Sprint umsetzbar sind. Ergebnis: Sprint Backlog und Sprint-Ziel."},
{id:54,b:"7.4",t:"Projektphasen",q:"Was ist ein Kanban-Board?",o:["Visuelles Werkzeug zur Steuerung von Arbeitsfluss: Aufgaben auf Karten in Spalten (To Do, In Progress, Done) - Engpaesse sichtbar machen","Gantt-Diagramm","Projektstrukturplan","Netzplan"],a:0,f:"Kanban-Board: Aufgaben als Karten, Spalten zeigen Status. WIP-Limits (Work in Progress) verhindern Ueberlastung. Aus Toyota Production System. Kontinuierlicher Fluss statt Sprints."},
{id:55,b:"7.5",t:"Teambildung",q:"Was sind die Phasen der Teambildung nach Tuckman?",o:["Planung, Durchfuehrung, Abschluss","Idee, Test, Launch, Review","Analyse, Design, Test, Betrieb","Forming, Storming, Norming, Performing (und Adjourning)"],a:3,f:"Tuckman-Modell: Forming (Kennenlernen), Storming (Konflikte, Rollenklaerung), Norming (gemeinsame Regeln), Performing (effektive Zusammenarbeit). Adjourning (Aufloesen) oft als 5. Phase."},
{id:56,b:"7.5",t:"Teambildung",q:"Was passiert in der Forming-Phase?",o:["Erstes Kennenlernen, vorsichtige Orientierung, Hoeflichkeit dominiert, Unsicherheit ueber Rollen und Erwartungen","Konflikte entstehen","Regeln werden entwickelt","Das Team arbeitet hochproduktiv"],a:0,f:"Forming: neue Teammitglieder lernen sich kennen. Vorsichtig, hoefllich, unsicher. Abhaengig von Fuehrung. Aufgabe des Leiters: klare Orientierung geben, Ziele erklaeren, Vertrauen aufbauen."},
{id:57,b:"7.5",t:"Teambildung",q:"Was passiert in der Storming-Phase?",o:["Abschluss des Projekts","Alles laeuft reibungslos","Hohe Produktivitaet","Konflikte und Auseinandersetzungen entstehen: Rollen werden geklaert, Machtkampfe, unterschiedliche Arbeitsstile prallen aufeinander"],a:3,f:"Storming: natuerliche Konfliktphase. Rollen, Zustaendigkeiten und Arbeitsweisen werden ausgehandelt. Aufgabe: Konflikte konstruktiv moderieren, Regeln etablieren, Team nicht zu frueh aufgeben."},
{id:58,b:"7.5",t:"Teambildung",q:"Was passiert in der Norming-Phase?",o:["Konflikte eskalieren","Kennenlernen","Projektabschluss","Team entwickelt gemeinsame Regeln, Werte und Arbeitsweisen - Zusammenhalt waechst, Vertrauen entsteht"],a:3,f:"Norming: Team findet gemeinsamen Rhythmus. Spielregeln werden akzeptiert, Vertrauen entsteht, gegenseitiger Respekt waechst. Produktivitaet steigt. Fuehrung kann mehr delegieren."},
{id:59,b:"7.5",t:"Teambildung",q:"Was passiert in der Performing-Phase?",o:["Regelentwicklung","Team arbeitet effektiv, zielgerichtet und selbstorganisiert - hohe Produktivitaet und gegenseitige Unterstuetzung","Kennenlernphase","Konflikte entstehen"],a:1,f:"Performing: Hochleistungsphase. Team ist eingespielt, loest Probleme selbst, hohe Motivation, gegenseitige Unterstuetzung. Fuehrung kann loslassen. Ziel: in dieser Phase so lange wie moeglich bleiben."},
{id:60,b:"7.5",t:"Teambildung",q:"Warum ist das Tuckman-Modell fuer Projektmanager wichtig?",o:["Pflichtlektuere","Nur theoretisch","Erklaert warum neue Teams Zeit brauchen um effektiv zu werden - hilft PM die richtige Fuehrung in jeder Phase anzuwenden","Nur fuer HR"],a:2,f:"Tuckman hilft: in Storming nicht aufgeben, in Norming Regeln unterstuetzen, in Performing delegieren. Erklaert warum Teams nach Personalwechsel oft zurueck zu frueheren Phasen springen."},
{id:61,b:"7.6",t:"Reflexionsmethoden",q:"Was sind Lessons Learned?",o:["Schulungsunterlagen","Projektdokumentation","Abschlussbericht","Nachtraegliche systematische Analyse eines Projekts: Was lief gut? Was schlecht? Was tun wir kuenftig anders? Fuer Wissenstransfer"],a:3,f:"Lessons Learned: strukturierte Rueckschau nach Projektende. Erfassung von Erfahrungen (positiv und negativ). Ziel: Wissen fuer kuenftige Projekte nutzbar machen, gleiche Fehler vermeiden."},
{id:62,b:"7.6",t:"Reflexionsmethoden",q:"Was ist eine gesunde Feedback-Kultur?",o:["Nur positives Feedback","Kritik vermeiden","Feedback nur im Jahresgespraech","Regelmaessige, offene, ehrliche und respektvolle Rueckmeldungen geben und empfangen - Fehler werden als Lernchancen gesehen"],a:3,f:"Feedback-Kultur: psychologische Sicherheit, konstruktive Kritik willkommen, Fehlerkultur (kein Blame), regelmassig (nicht nur jahrlich), konkret und verhaltensorientiert (nicht persoenlich)."},
{id:63,b:"7.6",t:"Reflexionsmethoden",q:"Was ist eine Retrospektive (in agilen Teams)?",o:["Jahresgespraech","Projektabschlussbericht","Produktrueckblick","Regelmaessiger Teamrueckblick auf Prozesse und Zusammenarbeit: Was lief gut? Was verbessern? Massnahmen ableiten"],a:3,f:"Retrospektive: agiles Pendant zu Lessons Learned, aber regelmaessig (jeden Sprint). Team reflektiert Prozesse und Zusammenarbeit. Ergebnis: konkrete Verbesserungsmassnahmen fuer naechsten Zyklus."},
{id:64,b:"7.6",t:"Reflexionsmethoden",q:"Was ist die Kaizen-Philosophie?",o:["Kostenreduktion","Japanische Philosophie der kontinuierlichen, kleinen Verbesserungen durch alle Mitarbeiter - jede Verbesserung zaehlt","Grosse einmalige Verbesserungen","Radikale Innovation"],a:1,f:"Kaizen (Jap.: Veraenderung zum Besseren): kontinuierliche Verbesserung in kleinen Schritten, jeder Mitarbeiter beteiligt sich. Gegensatz zu einmaliger Radikalreform. Basis von Lean und Agile."},
{id:65,b:"7.6",t:"Reflexionsmethoden",q:"Was ist eine Projektnachkalkulation?",o:["Vorkalkulation","Jaehrliche Revision","Mittlere Kalkulation","Vergleich der tatsaechlich angefallenen Kosten mit der Vorkalkulation nach Projektabschluss - Abweichungen analysieren"],a:3,f:"Projektnachkalkulation: nach Abschluss alle Istkosten erfassen und mit Plan-Kosten vergleichen. Abweichungsanalyse: warum mehr/weniger? Erkenntnisse fuer kuenftige Kalkulationen nutzen."},
{id:66,b:"7.7",t:"Termine",q:"Was ist fristgerechte Terminierung?",o:["Termine ignorieren","Termine sind nur Richtwerte","Alle Projektaufgaben werden so geplant und gesteuert dass sie rechtzeitig zum vereinbarten Termin abgeschlossen werden","Termine sind flexibel"],a:2,f:"Fristgerechte Terminierung: Termine werden realistisch geplant, regelmaessig ueberwacht und bei Bedarf gegensteuert. Terminverzug = Vertragsproblem (Vertragsstrafe) und Kundenunzufriedenheit."},
{id:67,b:"7.7",t:"Termine",q:"Was kann man bei Terminproblemen tun?",o:["Projekt abbrechen","Nichts tun","Termin einfach verschieben","Prioritaeten anpassen, Ressourcen erhoehen, Umfang reduzieren, Kommunikation intensivieren, Prozesse optimieren"],a:3,f:"Massnahmen bei Terminproblemen: Prioritaeten neu setzen, zusaetzliche Mitarbeiter oder externe Hilfe, Scope reduzieren (Features verschieben), Prozesse optimieren, fruehzeitig Stakeholder informieren."},
{id:68,b:"7.7",t:"Termine",q:"Was ist Crashen (Crashing) im Projektmanagement?",o:["Beschleunigung des Projekts durch Einsatz zusaetzlicher Ressourcen (Mitarbeiter, Budget) um Terminverzoegerungen aufzuholen - kostet mehr","Qualitaet senken","Scope reduzieren","Projekt beenden"],a:0,f:"Crashing: mehr Ressourcen einsetzen um Zeit zu sparen. Beispiel: zwei Teams parallel statt eines. Immer teurer, manchmal durch Brooks Law kontraproduktiv (zu viele Koeche...)."},
{id:69,b:"7.7",t:"Termine",q:"Was sagt Brooks Law?",o:["Mehr Mitarbeiter = schneller","Weniger Mitarbeiter = besser","Das Hinzufuegen von Personen zu einem bereits verzoegerten Projekt macht es noch spaeter (Einarbeitungszeit, Kommunikationsoverhead)","Qualitaet sinkt mit mehr Mitarbeitern"],a:2,f:"Brooks Law: Einarbeitungszeit neuer Mitarbeiter und steigender Kommunikationsaufwand (O(n^2)) machen spaete Aufstockung oft kontraproduktiv. Besonders fuer Wissensarbeit wie Softwareentwicklung."},
{id:70,b:"7.7",t:"Termine",q:"Was ist Fast Tracking im Projektmanagement?",o:["Mehr Mitarbeiter","Paralleles Ausfuehren von Aufgaben die normalerweise sequenziell laufen wuerden - riskanter aber schneller","Schneller laufen","Scope reduzieren"],a:1,f:"Fast Tracking: Aufgaben parallelisieren die eigentlich nacheinander laufen sollten. Beispiel: Implementierung beginnen waehrend Design noch laeuft. Spart Zeit, erhoehe Risiko von Nacharbeit."},
{id:71,b:"7.2",t:"Netzplan",q:"Ein Vorgang hat FAZ=5, Dauer=3. Wie gross ist FEZ?",o:["FEZ=2","FEZ=5","FEZ=15","FEZ=8"],a:3,f:"FEZ = FAZ + Dauer = 5 + 3 = 8."},
{id:72,b:"7.2",t:"Netzplan",q:"Ein Vorgang hat SAZ=10, FAZ=7. Wie gross ist der Gesamtpuffer?",o:["GP=3","GP=70","GP=17","GP=7"],a:0,f:"GP = SAZ - FAZ = 10 - 7 = 3. Der Vorgang kann um 3 Zeiteinheiten verzoegert werden ohne das Projektende zu gefaehrden."},
{id:73,b:"7.2",t:"Netzplan",q:"Welcher Vorgang liegt auf dem kritischen Weg?",o:["Vorgang mit laengster Dauer","Vorgang mit GP = 0 (kein Puffer)","Vorgang mit meisten Nachfolgern","Vorgang mit groesstem Puffer"],a:1,f:"Kritischer Weg = alle Vorgaenge mit GP = 0. Keine Zeitreserve. Jede Verzoegerung verzoegert das Gesamtprojekt. Werden vom PM besonders ueberwacht."},
{id:74,b:"7.2",t:"Netzplan",q:"Was berechnet man mit der Vorwaertsrechnung?",o:["Ressourcenbedarf","SAZ und SEZ","FAZ und FEZ aller Vorgaenge sowie die Mindestprojektdauer","Puffer"],a:2,f:"Vorwaertsrechnung: ergibt FAZ und FEZ aller Vorgaenge. Am Ende: Mindestprojektdauer (FEZ des letzten Vorgangs). Danach Rueckwaertsrechnung fuer SAZ, SEZ und Puffer."},
{id:75,b:"7.4",t:"Projektphasen",q:"Was ist ein Product Backlog Item (User Story)?",o:["Ein Fehlerprotokoll","Anforderungsbeschreibung aus Nutzerperspektive: Als [Rolle] moechte ich [Funktion] damit [Nutzen]","Ein Testfall","Ein Bugbericht"],a:1,f:"User Story: Als Kunde moechte ich mein Passwort zuruecksetzen koennen damit ich bei vergessenem Passwort wieder Zugriff habe. Einfaches Format, fokussiert auf Nutzerwert."},
{id:76,b:"7.5",t:"Teambildung",q:"Was ist psychologische Sicherheit im Team?",o:["Vertragsrechtliche Absicherung","Datensicherheit","Klima in dem Teammitglieder ohne Angst vor negativen Konsequenzen Ideen einbringen, Fehler zugeben und Fragen stellen koennen","Physische Sicherheit am Arbeitsplatz"],a:2,f:"Psychologische Sicherheit (Google-Studie): wichtigster Faktor fuer Teamerfolg. Team-Mitglieder koennen Fehler zugeben ohne Angst vor Bestrafung. Foerdert Innovation, Lernen und offene Kommunikation."},
{id:77,b:"7.4",t:"Projektphasen",q:"Was ist ein Sprint Backlog?",o:["Teilmenge des Product Backlogs die das Team im aktuellen Sprint umsetzen wird - waehrend Sprint unveraenderlich","Gesamte Produktanforderungen","Fehlerliste","Testplan"],a:0,f:"Sprint Backlog: die fuer diesen Sprint ausgewaehlten Aufgaben aus dem Product Backlog. Wird im Sprint Planning erstellt. Waehrend des Sprints nicht veraendert (Scope-Stabilitaet)."},
{id:78,b:"7.3",t:"SMART-Ziele",q:"Ist folgendes Ziel SMART: Die Kundenzufriedenheit soll verbessert werden?",o:["Nein - nicht spezifisch, nicht messbar, nicht terminiert. Besser: NPS von 30 auf 50 steigern bis Q4","Nein, nur unrealistisch","Ja, vollstaendig SMART","Ja, messbar"],a:0,f:"Nicht SMART: zu vage (was bedeutet verbessern?), nicht messbar (wie messen?), nicht terminiert (bis wann?). SMART-Version: NPS (Net Promoter Score) von 30 auf 50 bis 31.12.2024 erhoehen durch monatliche Kundenbefragungen."},
{id:79,b:"7.6",t:"Reflexionsmethoden",q:"Was ist eine Stakeholder-Kommunikation im Projekt?",o:["Nur interne Kommunikation","Werbung fuer das Projekt","Regelmaessige Information aller relevanten Interessengruppen ueber Fortschritt, Probleme und Entscheidungen - verhindert Ueberraschungen","Pressearbeit"],a:2,f:"Stakeholder-Kommunikation: wer bekommt welche Informationen in welcher Haeufigkeit und Form? Ampelbericht (RAG-Status), Jour-fixe, Steering-Committee. Fruehzeitige Information verhindert Eskalationen."},
{id:80,b:"7.7",t:"Termine",q:"Was ist ein Meilensteinplan?",o:["Ressourcenplan","Detaillierter Aufgabenplan","Netzplan","Uebersicht der wichtigsten Projektzwischenziele mit Terminen - gibt grobe Orientierung und Fortschrittskontrolle ohne Details"],a:3,f:"Meilensteinplan: zeigt nur die wichtigsten Zwischenziele (Meilensteine) mit Terminen. Weniger detail als Gantt, gut fuer Management-Kommunikation und Vertragsvereinbarungen."},
{id:81,b:"7.1",t:"Projektmerkmale",q:"Was ist ein Risikoregister?",o:["Kostenplan","Kommunikationsplan","Dokument in dem alle identifizierten Risiken mit Eintrittswahrscheinlichkeit, Auswirkung und Gegenmassnahmen erfasst werden","Organigramm"],a:2,f:"Risikoregister: zentrales Dokument fuer Risikomanagement. Felder: Risiko-ID, Beschreibung, Kategorie, Wahrscheinlichkeit (1-5), Auswirkung (1-5), Risikopunkt (W x A), Gegenmassnahme, Verantwortlicher."},
{id:82,b:"7.2",t:"Netzplan",q:"Was ist eine Abhaengigkeit (Anordnungsbeziehung) im Netzplan?",o:["Eine Ressourcenzuweisung","Ein Meilenstein","Eine Kosten-Beziehung","Logische Verbindung zwischen Vorgaengen: Nachfolger kann erst starten wenn Vorgaenger beendet ist (Ende-Anfang-Beziehung)"],a:3,f:"Anordnungsbeziehung: Vorgaenger-Nachfolger-Beziehung. EA (Ende-Anfang): haeufigste Form - B startet erst wenn A fertig. AA (Anfang-Anfang), EE (Ende-Ende), AE (Anfang-Ende) auch moeglich."},
{id:83,b:"7.4",t:"Projektphasen",q:"Was ist Definition of Done (DoD) in Scrum?",o:["Projektabschlusskriterien","Projektanfang","Gemeinsam vereinbarte Kriterien wann ein Backlog-Item als vollstaendig abgeschlossen gilt (z.B. programmiert, getestet, dokumentiert, reviewed)","Sprint-Ziel"],a:2,f:"Definition of Done: klare Qualitaetskriterien die jedes fertige Item erfuellen muss. Beispiel: Code reviewed, Unit-Tests bestanden, Dokumentation aktualisiert, in Staging deployed. Verhindert Schummeln."},
{id:84,b:"7.5",t:"Teambildung",q:"Was ist ein interdisziplinaeres Team?",o:["Team mit Mitgliedern aus verschiedenen Fachbereichen (z.B. IT, Fachbereich, Marketing, Recht) - unterschiedliche Perspektiven fuer bessere Loesungen","Team nur aus IT-Experten","Virtuelles Team","Team ohne Fuehrung"],a:0,f:"Interdisziplinaeres Team: Mitglieder aus verschiedenen Disziplinen. Vorteil: breitere Perspektiven, ganzheitlichere Loesungen. Nachteil: Kommunikationsaufwand, unterschiedliche Fachsprachen."},
{id:85,b:"7.6",t:"Reflexionsmethoden",q:"Was ist eine Project Postmortem?",o:["Strukturierte Nachbesprechung nach Projektende: was funktioniert, was nicht, was verbessern - aehnlich Lessons Learned","Rueckblick nur auf Fehler","Projekttod-Analyse","Schuldanalyse"],a:0,f:"Project Postmortem (auch Lessons Learned): strukturierter Rueckblick. Wichtig: blame-freie Atmosphaere, Fokus auf Systeme/Prozesse statt Personen. Ergebnisse dokumentieren und teilen."},
{id:86,b:"7.7",t:"Termine",q:"Was ist ein kritischer Pfad-Management?",o:["Budgetkontrolle","Ueberwachung und Steuerung der Vorgaenge auf dem kritischen Weg - wichtigstes PM-Instrument zur Terminsteuerung","Ressourcenplanung","Verwaltung von Serverinfrastruktur"],a:1,f:"Kritischer-Pfad-Management: regelmaessige Ueberpruefung ob kritische Vorgaenge im Zeitplan sind. Bei Verzoegerungen: sofortige Gegenmassnahmen (Crashing, Fast Tracking) da jeder Tag Projektverzug bedeutet."},
{id:87,b:"7.4",t:"Projektphasen",q:"Was ist ein Velocity in Scrum?",o:["Codezeilen pro Tag","Historisch gemessene Story-Points die ein Team pro Sprint abschliesst - Grundlage fuer Sprintplanung und Prognosen","Projektgeschwindigkeit allgemein","Mitarbeitergeschwindigkeit"],a:1,f:"Velocity: durchschnittliche Story-Points pro Sprint ueber mehrere Sprints. Wird fuer Planung genutzt: wenn Velocity = 30 Punkte/Sprint und Backlog = 300 Punkte: ca. 10 Sprints bis fertig."},
{id:88,b:"7.2",t:"Netzplan",q:"Was ist ein Hammock-Vorgang (Sammelvorgang)?",o:["Ein sehr langer Vorgang","Ein externer Vorgang","Ein Meilenstein","Vorgang der mehrere Teilaufgaben zusammenfasst und automatisch Start des ersten und Ende des letzten Teilaufgabe hat"],a:3,f:"Sammelvorgang (Summary Task): fasst Teilaufgaben zu einem uebersichtlichen Oberbegriff zusammen. Start = Start der fruehesten Teilaufgabe, Ende = Ende der letzten. Hilfreich fuer Uebersichtlichkeit."},
{id:89,b:"7.3",t:"SMART-Ziele",q:"Was ist der Unterschied zwischen Ziel und Massnahme?",o:["Massnahme ist wichtiger","Ziel wird aus Massnahmen abgeleitet","Identisch","Ziel: gewuenschtes Ergebnis (Was). Massnahme: konkrete Aktivitaet zur Zielerreichung (Wie). Ziele koennen mehrere Massnahmen erfordern"],a:3,f:"Ziel: IT-Kosten um 20% senken. Massnahmen: Server konsolidieren, Cloud-Angebote vergleichen, ungenutzte Lizenzen kuendigen. Mehrere Massnahmen dienen demselben Ziel."},
{id:90,b:"7.5",t:"Teambildung",q:"Was ist Teamentwicklung im PM-Kontext?",o:["Teamentlassung","Teamrekrutierung","Teamdokumentation","Gezielte Foerderung der Zusammenarbeit und Leistung eines Teams durch Teambuilding, Coaching, klare Rollen und Konfliktmanagement"],a:3,f:"Teamentwicklung: Projektleiter baut gezielt Teamkohesion auf. Massnahmen: Kickoff-Workshop, Team-Events, Konfliktlosung, klare Rollen, offene Kommunikation, regelmaessiges Feedback."},
{id:91,b:"7.1",t:"Projektmerkmale",q:"Was ist ein Projektportfolio?",o:["Ein einzelnes Projekt","Ein Projektplan","Gesamtheit aller Projekte einer Organisation - werden zentral gesteuert, priorisiert und Ressourcen optimiert","Ein Teilprojekt"],a:2,f:"Projektportfolio: alle Projekte einer Organisation. Portfolio-Management: Priorisierung, Ressourcenverteilung zwischen Projekten, strategische Ausrichtung. Welche Projekte bekommen Ressourcen?"},
{id:92,b:"7.4",t:"Projektphasen",q:"Was ist ein MVP (Minimum Viable Product)?",o:["Das fertige Endprodukt","Testversion","Minimale Version eines Produkts mit gerade genug Funktionen um erste Kunden zu bedienen und Feedback zu sammeln","Fehlerprotokoll"],a:2,f:"MVP: kleinste Version die echten Wert liefert. Fruehes Kundenfeedback, Risiko reduzieren, schneller Markteintritt. Erst MVP validieren, dann Funktionen ausbauen. Kernprinzip agiler Entwicklung."},
{id:93,b:"7.6",t:"Reflexionsmethoden",q:"Was ist eine Abweichungsanalyse im Projekt?",o:["Vergleich von Soll-Werten (Plan) mit Ist-Werten: Warum gibt es Abweichungen? Was sind die Ursachen? Was ist zu tun?","Rueckblick","Prognose","Fehlerprotokoll"],a:0,f:"Abweichungsanalyse: Plan (Budget, Zeit, Qualitaet) vs. Ist. Warum Abweichung? Einmalig (Fehler) oder systematisch (Planungsfehler)? Gegenmassnahmen ableiten. Wichtig fuer fruehzeitiges Gegensteuern."},
{id:94,b:"7.7",t:"Termine",q:"Was ist ein Pufferzeit-Management?",o:["Scope erhoehen","Zeitreserven aufbrauchen","Bewusstes Einplanen und Verwalten von Zeitreserven (Puffer) um unvorhergesehene Probleme abzufedern ohne den Gesamttermin zu gefaehrden","Termine ignorieren"],a:2,f:"Puffermanagement: Puffer am Projektende konzentrieren (Critical Chain), nicht auf jeden Vorgang verteilen (dann wird jeder Puffer verbraucht - Studentensyndrom). Puffer ist kein Freifahrtschein."},
{id:95,b:"7.2",t:"EPK",q:"Kann in einer EPK ein Ereignis direkt auf ein anderes Ereignis folgen?",o:["Nein - Ereignisse und Funktionen wechseln sich immer ab. Zwischen zwei Ereignissen muss immer eine Funktion stehen","Nur am Anfang","Nur mit OR-Operator","Ja, immer"],a:0,f:"Grundregel EPK: E-F-E-F-E Abwechslung. Niemals E-E oder F-F direkt hintereinander (nur durch Verknuepfungsoperatoren bei parallelen Pfaden). EPK startet und endet mit Ereignis."},
{id:96,b:"7.4",t:"Projektphasen",q:"Was ist Continuous Integration/Continuous Deployment (CI/CD)?",o:["Ein Testverfahren","Ein Projektmodell","Automatisierte Praxis: Code-Aenderungen werden automatisch getestet und in Produktion eingespielt - sichert Qualitaet und beschleunigt Lieferung","Ein Scrum-Meeting"],a:2,f:"CI/CD: jeder Code-Commit wird automatisch gebaut, getestet und deployt. Fehler schnell gefunden, haeufige kleine Releases. Typisch in DevOps und agiler Entwicklung."},
{id:97,b:"7.1",t:"Projektmerkmale",q:"Was ist Projektabschluss?",o:["Rechnungsstellung","Teamaufloesung","Das Ende des Budgets","Formale Beendigung des Projekts: Abnahme durch Kunden, Abschlussdokumentation, Lessons Learned, Ressourcenfreigabe, Projektabschlussbestaetigung"],a:3,f:"Projektabschluss: Abnahme der Leistung, Abschlussdokumentation, Lessons Learned Workshop, Ressourcen freigeben (Mitarbeiter zurueck in Linienorganisation), formale Projektbeendigung."},
{id:98,b:"7.5",t:"Teambildung",q:"Was ist ein Kickoff-Meeting?",o:["Abschlussmeeting","Startmeeting eines Projekts: alle Beteiligten werden informiert, Ziele und Regeln kommuniziert, Team lernt sich kennen, Motivation aufgebaut","Statusmeeting","Erstes taegliges Stand-up"],a:1,f:"Kickoff: erstes offizielles Projektmeeting. Ziel: gemeinsames Verstaendnis von Zielen, Scope, Rollen, Zeitplan. Team zusammenfuehren (Forming-Phase unterstuetzen). Meilenstein: Projekt startet offiziell."},
{id:99,b:"7.7",t:"Termine",q:"Was ist ein Termin vs. eine Deadline?",o:["Termin: vereinbarter Zeitpunkt fuer Leistungserbringung. Deadline: absoluter Endtermin der nicht ueberschritten werden darf (haeufig mit Konsequenzen)","Deadline ist flexibler","Termin ist wichtiger","Identisch"],a:0,f:"Termin: Liefertermin, kann oft mit Begruendung angepasst werden. Deadline: harte Grenze (Messe, Gesetzgebung, Vertragsstrafe). Projektleiter muss unterscheiden und priorisieren."},
{id:100,b:"7.2",t:"Netzplan",q:"Wie viele Anfangsereignisse und Endereignisse hat ein Netzplan?",o:["Genau ein Anfangsereignis und ein Endereignis - alle Vorgaenge fuehren zu diesem einen Ende","Kein Ende","Zwei Anfaenge","Beliebig viele"],a:0,f:"Netzplan: ein Start (alle Vorgaenge ohne Vorgaenger) und ein Ende (alle Vorgaenge ohne Nachfolger). Falls mehrere Endvorgaenge: Dummy-Endknoten einfuehren. Garantiert eindeutigen kritischen Weg."}
];
let st={},filt=[...Q];
function init(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});render();}
function render(){
  const c=document.getElementById("qc");c.innerHTML="";
  let lb=null;
  const bn={"7.1":"📋 7.1 Projektmerkmale","7.2":"📊 7.2 Netzplan & EPK","7.3":"🎯 7.3 SMART-Ziele","7.4":"🔄 7.4 Projektphasen & Modelle","7.5":"👥 7.5 Teambildung","7.6":"🔍 7.6 Reflexionsmethoden","7.7":"⏰ 7.7 Termine"};
  filt.forEach(q=>{
    if(q.b!==lb){const d=document.createElement("div");d.className="bh";d.textContent=bn[q.b]||q.b;c.appendChild(d);lb=q.b;}
    c.appendChild(mk(q));
  });up();}
function mk(q){
  const s=st[q.id],d=document.createElement("div"),L=["A","B","C","D"];
  d.className="qc"+(s.done?(s.ok?" ac":" aw"):"");d.id="c"+q.id;
  d.innerHTML=`<div class="qn">FRAGE ${q.id}/100</div><div class="qt">${q.t}</div><div class="qq">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt${s.done?" dis":""}${s.done&&i===q.a?" ok":""}${s.done&&!s.ok&&i===s.ci?" ng":""}" onclick="ans(${q.id},${i})"><span class="ol">${L[i]}</span><span>${o}</span></div>`).join("")}</div>
<div class="fbb${s.done?" show "+(s.ok?"cok":"cng"):""}" id="f${q.id}">${s.done?(s.ok?"✅ ":"❌ ")+q.f:""}</div>`;
  return d;}
function ans(id,i){
  const s=st[id];if(s.done)return;
  const q=Q.find(x=>x.id===id);s.done=true;s.ok=i===q.a;s.ci=i;
  const c=document.getElementById("c"+id);c.className="qc "+(s.ok?"ac":"aw");
  c.querySelectorAll(".opt").forEach((el,j)=>{el.classList.add("dis");if(j===q.a)el.classList.add("ok");if(!s.ok&&j===i)el.classList.add("ng");});
  const f=document.getElementById("f"+id);f.textContent=(s.ok?"✅ ":"❌ ")+q.f;f.className="fbb show "+(s.ok?"cok":"cng");up();}
function up(){
  const tot=Q.length,done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  document.getElementById("sd").textContent=ok+"/"+done;
  document.getElementById("pf").style.width=(done/tot*100)+"%";
  document.getElementById("pl").textContent=done+" von "+tot+" beantwortet";}
function fil(t,btn){
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("act"));btn.classList.add("act");
  if(t==="all")filt=[...Q];
  else if(t==="open")filt=Q.filter(q=>!st[q.id].done);
  else if(t==="wrong")filt=Q.filter(q=>st[q.id].done&&!st[q.id].ok);
  else filt=Q.filter(q=>q.b===t);render();}
function shuf(){filt=[...filt].sort(()=>Math.random()-.5);render();}
function rst(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});filt=[...Q];document.querySelectorAll(".fb").forEach((b,i)=>b.classList.toggle("act",i===0));render();document.getElementById("ov").classList.remove("show");}
function showR(){
  const done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  const pct=done>0?Math.round(ok/done*100):0;
  let e="😅",m="Weiter ueben!";
  if(pct>=90){e="🏆";m="Ausgezeichnet!";}else if(pct>=75){e="🎉";m="Sehr gut!";}else if(pct>=60){e="📚";m="Gut - weiter so!";}
  document.getElementById("oe").textContent=e;document.getElementById("os").textContent=ok+"/"+done;
  document.getElementById("om").textContent=pct+"% richtig - "+m;
  document.getElementById("ov").classList.add("show");}
function closeR(){document.getElementById("ov").classList.remove("show");}
init();
</script></body></html>
