.bh{margin-top:6px;padding:7px 12px;background:linear-gradient(90deg,var(--card),transparent);border-left:3px solid var(--ac);border-radius:0 6px 6px 0;font-size:12px;font-weight:700;color:var(--ac);}

.opt.ng{border-color:var(--ng);background:rgba(239,68,68,.1);}

.ol{min-width:19px;height:19px;border-radius:50%;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.opt.ok .ol{background:var(--ok);color:#000;}.opt.ng .ol{background:var(--ng);color:#fff;}
.fbb{margin-top:9px;padding:8px 11px;border-radius:6px;font-size:12px;line-height:1.5;display:none;}
.fbb.show{display:block;}.fbb.cok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#86efac;}
.fbb.cng{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;}

<script>
const BN={"10.1":"🏆 10.1 QM-Systeme","10.2":"📋 10.2 QS-Normen","10.3":"🏅 10.3 Zertifizierung","10.4":"🎯 10.4 Qualitaetsplanung","10.5":"🔧 10.5 Qualitaetslenkung","10.6":"🔄 10.6 PDCA","10.7":"📝 10.7 Testprotokoll"};
const Q=[
{id:1,b:"10.1",t:"QM-Systeme",q:"Was ist der Plan-Do-Check-Act Ansatz in einem QMS?",o:["Projektplanung","Auditplanung","Iteratives Verbesserungsmodell das dem gesamten QMS zugrunde liegt - kontinuierliche Verbesserung als Grundprinzip","Einmaliger Prozess"],a:2,f:"PDCA durchdringt das gesamte QMS: Qualitaetsplanung (Plan), Durchfuehrung (Do), interne Audits/Management Review (Check), Korrekturmassnahmen (Act)."},
{id:2,b:"10.1",t:"QM-Systeme",q:"Was sind aufgezeichnete Informationen in ISO 9001?",o:["Nur Kundendaten","Nur Fehlerprotokolle","Alle Dokumente und Aufzeichnungen die das QMS beschreiben oder belegen: Prozessbeschreibungen, Pruefprotokolle, Auditberichte","Nur Handbuecher"],a:2,f:"ISO 9001 spricht von aufgezeichneten Informationen (documented information): Dokumentation (wie soll es sein?) und Aufzeichnungen (Nachweis dass es so war). Beide muessen gelenkt werden."},
{id:3,b:"10.1",t:"QM-Systeme",q:"Was ist der Anwendungsbereich eines QMS?",o:["Nur die Qualitaetsabteilung","Nur Produktion","Definition welche Produkte, Dienstleistungen und Organisationsteile das QMS abdeckt - kann eingeschraenkt werden","Alle Abteilungen zwingend"],a:2,f:"Anwendungsbereich: welche Teile der Organisation, Produkte/Dienstleistungen umfasst das QMS? Kann auf Teilbereiche eingeschraenkt werden. Muss dokumentiert und begruendet sein."},
{id:4,b:"10.1",t:"QM-Systeme",q:"Was sind interessierte Parteien (Stakeholder) in ISO 9001?",o:["Nur Lieferanten","Nur Kunden","Alle Gruppen die die Organisation beeinflussen oder von ihr beeinflusst werden: Kunden, Mitarbeiter, Lieferanten, Behoerden, Investoren","Nur Aktionaere"],a:2,f:"Interessierte Parteien ISO 9001 Kapitel 4.2: Kunden (Anforderungen), Mitarbeiter (Arbeitsbedingungen), Lieferanten (Qualitaet), Behoerden (Gesetze), Wettbewerber (Markt). Anforderungen ermitteln."},
{id:5,b:"10.1",t:"QM-Systeme",q:"Was ist ein Prozess im QMS-Kontext?",o:["Satz von Aktivitaeten die Eingaben (Inputs) in Ausgaben (Outputs) umwandeln - hat Eingaben, Aktivitaeten, Ausgaben, Ressourcen, Verantwortliche","Eine Abteilung","Eine Taetigkeit allein","Ein Projekt"],a:0,f:"Prozess: Input -> Aktivitaeten -> Output. Jeder Prozess hat Verantwortlichen, Ressourcen, Messgroessen. Prozessorientierung bedeutet: Prozesse steuern statt nur Ergebnisse pruefen."},
{id:6,b:"10.2",t:"QS-Normen",q:"Was ist ISO 9000 vs ISO 9001?",o:["Identisch","9001 enthaelt keine Anforderungen","ISO 9000: Begriffe und Definitionen. ISO 9001: Anforderungen an das QMS. ISO 9004: Anleitung zur Leistungsverbesserung","9000 ist aktueller"],a:2,f:"ISO 9000-Familie: 9000 (Grundlagen + Vokabular), 9001 (Anforderungen = zertifizierbar), 9004 (Anleitung fuer nachhaltige Leistung). Zertifizierung nur nach 9001."},
{id:7,b:"10.2",t:"QS-Normen",q:"Was ist eine Norm vs eine Vorschrift/Gesetz?",o:["Norm: freiwillig anwendbar (wenn man zertifiziert sein will, muss man erfullen). Gesetz: verpflichtend anwendbar fuer alle","Identisch","Normen sind strenger","Gesetze sind freiwillig"],a:0,f:"Norm (ISO, DIN): freiwillig, aber Marktdruck erzeugt de-facto-Pflicht. Gesetz/Verordnung: staatlich, verpflichtend, Strafen bei Verstoß. CE-Kennzeichnung: EU-Richtlinie = Gesetz."},
{id:8,b:"10.2",t:"QS-Normen",q:"Was ist ISO 13485?",o:["IT-Sicherheitsstandard","Umweltstandard","QMS-Norm speziell fuer Medizinprodukte - strenger als ISO 9001, erfordert Risikoanalyse nach ISO 14971","Allgemeiner QMS-Standard"],a:2,f:"ISO 13485: Medizinprodukte-QMS. Erfordert striktes Risikomanagement, Traceability, strenge Dokumentation. Kombination mit EU MDR (Medical Device Regulation). Strenger als ISO 9001."},
{id:9,b:"10.2",t:"QS-Normen",q:"Was ist SOC 2?",o:["Eine ISO-Norm","Ein EU-Standard","Ein Datenschutzstandard","US-amerikanischer Standard fuer Dienstleister: prueft Sicherheitskontrollen bei Cloud-Anbietern (Trust Service Criteria: Sicherheit, Verfuegbarkeit, Integritaet, Vertraulichkeit, Datenschutz)"],a:3,f:"SOC 2: vom AICPA. Fuer Cloud-Anbieter und Dienstleister in den USA. Prueft ob Sicherheitskontrollen tatsaechlich implementiert und wirksam sind. Wichtig fuer US-Geschaeftsbeziehungen."},
{id:10,b:"10.2",t:"QS-Normen",q:"Was ist PCI-DSS?",o:["Payment Card Industry Data Security Standard: Sicherheitsstandard fuer Unternehmen die Kreditkartendaten verarbeiten","Qualitaetsstandard","Datenschutzgesetz","ISO-Norm"],a:0,f:"PCI-DSS: von Kreditkartenorganisationen (Visa, Mastercard). Pflicht fuer Unternehmen die Kartenzahlungen akzeptieren. 12 Anforderungsbereiche fuer Sicherheit von Kartendaten."},
{id:11,b:"10.3",t:"Zertifizierung",q:"Was ist DAkkS?",o:["Deutsche Autokreditbank","Ein Zertifizierungsbuero","Eine ISO-Norm","Deutsche Akkreditierungsstelle: akkreditiert Zertifizierungsstellen, Pruflabore und Inspektionsstellen in Deutschland"],a:3,f:"DAkkS: staatliche Akkreditierungsstelle Deutschlands. Prueft ob TUeV, DEKRA etc. kompetent und unparteiisch sind. Ohne DAkkS-Akkreditierung sind Zertifikate nicht anerkannt."},
{id:12,b:"10.3",t:"Zertifizierung",q:"Was ist ein Rezertifizierungsaudit?",o:["Erstaudit","Audit nach 3 Jahren Zertifikatslaufzeit um Zertifikat um weitere 3 Jahre zu verlaengern - umfassender als Ueberwachungsaudit","Jaehrliches Audit","Lieferantenaudit"],a:1,f:"Rezertifizierung: nach 3 Jahren. Umfassender als Ueberwachungsaudit - prueft ob QMS weiterhin konform und wirksam ist. Bei Bestehen: Zertifikat fuer weitere 3 Jahre."},
{id:13,b:"10.3",t:"Zertifizierung",q:"Was ist eine Korrekturmassnahme im Audit-Kontext?",o:["Massnahme zur Beseitigung der Ursache einer Nicht-Konformitaet - nicht nur Symptom beheben sondern Ursache","Ein Verbesserungsvorschlag","Eine Bestrafung","Eine Sofortmassnahme"],a:0,f:"Korrekturmassnahme: 1. Sofortmassnahme (Symptom), 2. Ursachenanalyse, 3. Korrekturmassnahme (Ursache), 4. Wirksamkeitspruefung. Nicht mit Sofortmassnahme verwechseln!"},
{id:14,b:"10.3",t:"Zertifizierung",q:"Was ist ein Observation im Audit?",o:["Ein Lob","Eine Nicht-Konformitaet","Hinweis des Auditors auf Verbesserungspotenzial ohne Anforderungsverletzung - kein NC, keine Pflichtmassnahme aber Empfehlung","Ein Fehler"],a:2,f:"Observation: kein NC, kein Zwang. Auditor sieht Verbesserungspotenzial. Unternehmen kann ignorieren (kein Einfluss auf Zertifikat) oder umsetzen (empfohlen). Zeigt Reife des QMS."},
{id:15,b:"10.3",t:"Zertifizierung",q:"Was ist eine Major NC vs Minor NC im Audit?",o:["Major NC: kritische Abweichung, Zertifikat wird nicht ausgestellt. Minor NC: geringere Abweichung, Korrekturmassnahme erforderlich aber Zertifikat moeglich","Major ist lauter","Nur terminologisch","Schwere vs leichte Strafe"],a:0,f:"Major NC: Anforderung nicht erfuellt oder QMS-Prozess nicht implementiert. Zertifikat wird verweigert bis behoben. Minor NC: Einzelabweichung, Zertifikat kann ausgestellt werden wenn Massnahme vereinbart."},
{id:16,b:"10.4",t:"Qualitaetsplanung",q:"Was ist ein Q-Gate?",o:["Ein Netzwerkgeraet","Qualitaetspruefpunkt im Projektablauf: Projekt darf erst weitergemacht werden wenn definierte Qualitaetskriterien erfuellt sind","Eine Norm","Ein Audittyp"],a:1,f:"Q-Gate (Quality Gate): Pruefpunkt zwischen Projektphasen. Projekt geht nur weiter wenn alle Kriterien erfuellt. Beispiel: Architektur-Review bestanden, alle Unit-Tests gruen, Dokumentation vollstaendig."},
{id:17,b:"10.4",t:"Qualitaetsplanung",q:"Was ist eine Qualitaetssicherungsvereinbarung (QSV)?",o:["Zertifizierungsvertrag","ISO-Norm","Vertrag zwischen Lieferant und Kunden der Qualitaetsanforderungen, Pruefmethoden und Verantwortlichkeiten regelt","Kundenvertrag"],a:2,f:"QSV: regelt zwischen Lieferant und Kunden welche Qualitaetsstandards gelten, wer prueft, wie Maengel behandelt werden. Wichtig in der Automotive-Industrie (IATF 16949)."},
{id:18,b:"10.4",t:"Qualitaetsplanung",q:"Was ist Qualitaetszieldefinition nach SMART?",o:["Qualitaet definieren","Allgemeine Ziele setzen","Qualitaetsziele muessen Spezifisch, Messbar, Attraktiv, Realistisch und Terminiert sein - vage Ziele fuehren zu vagen Ergebnissen","Normen erfuellen"],a:2,f:"SMART-Qualitaetsziel: Fehlerrate von 3% auf 2% senken (Spezifisch, Messbar, Attraktiv) bis 31.12.2024 (Terminiert) mit bestehenden Ressourcen (Realistisch)."},
{id:19,b:"10.4",t:"Qualitaetsplanung",q:"Was ist Risikobasiertes Denken in ISO 9001:2015?",o:["Risikomanagement-Software","Sicherheitsdenken","Finanzielles Risikodenken","Proaktive Beruecksichtigung von Risiken und Chancen in allen QMS-Prozessen statt reaktivem Problemloesen"],a:3,f:"Risikobasiertes Denken ISO 9001:2015 (Kapitel 6.1): Was koennte schiefgehen (Risiken)? Was koennte besser werden (Chancen)? Massnahmen praeventiv planen. Ersetzt Vorbeugungsmassnahmen der Vorversion."},
{id:20,b:"10.4",t:"Qualitaetsplanung",q:"Was ist der Unterschied zwischen Qualitaetsziel und Qualitaetspolitik?",o:["Identisch","Ziele sind vager","Politik ist konkreter","Qualitaetspolitik: allgemeines Bekenntnis der Fuehrung. Qualitaetsziele: konkrete messbare Ziele die aus der Politik abgeleitet werden"],a:3,f:"Qualitaetspolitik: Wir verpflichten uns zu Kundenzufriedenheit und kontinuierlicher Verbesserung (abstrakt). Qualitaetsziel: CSAT 90% bis Q4 2024 (konkret, messbar, terminiert)."},
{id:21,b:"10.5",t:"Qualitaetslenkung",q:"Was ist eine Prozessreview?",o:["Regelmaessige Bewertung ob ein Prozess seine Ziele erreicht und Verbesserungspotenziale hat","Managementbewertung","Produktpruefung","Audittyp"],a:0,f:"Prozessreview: regelmaessig pruefen ob Prozess-KPIs erreicht werden, ob Ressourcen ausreichen, ob Schnittstellen funktionieren. Inputs fuer Managementbewertung und Verbesserungsmassnahmen."},
{id:22,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Lieferantenqualitaet?",o:["Kundenzufriedenheit","Eigene Produktqualitaet","Interne Prozessqualitaet","Sicherstellung dass zugekaufte Produkte und Dienstleistungen Anforderungen erfuellen - Lieferantenauswahl, -bewertung und -entwicklung"],a:3,f:"Lieferantenqualitaet: schlechte Zukaufteile gefaehrden eigene Qualitaet. Massnahmen: Lieferantenauswahl (Audits), Incoming Inspection, Lieferantenbewertung (Scorecard), Entwicklung schwacher Lieferanten."},
{id:23,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Traceability (Rueckverfolgbarkeit)?",o:["Lieferkettenmanagement","Faehigkeit den Werdegang, die Verwendung oder den Standort eines Produkts zurueckzuverfolgen - wichtig bei Rueckrufaktionen","GPS-Tracking","Lagerverwaltung"],a:1,f:"Traceability: welche Rohmaterialien (Charge), Maschinen, Mitarbeiter, Prozessparameter wurden fuer ein bestimmtes Produkt verwendet? Bei Fehler: betroffene Produkte identifizieren und zurueckrufen."},
{id:24,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Erstmusterprüfung?",o:["Umfassende Pruefung des ersten serienmassigen Bauteils um zu bestaetigen dass Produktion den Anforderungen entspricht","Stichprobenpruefung","Endpruefung","Erste Qualitaetspruefung"],a:0,f:"Erstmusterpruefung (EMPB/PPAP): vor Serienanlauf wird erstes Serienteil umfassend geprueft. Alle Masse, Eigenschaften, Materialien. Freigabe vor Serienproduktion. In Automotive Pflicht (IATF 16949)."},
{id:25,b:"10.5",t:"Qualitaetslenkung",q:"Was ist eine Abweichung vs Reklamation?",o:["Identisch","Reklamation intern","Abweichung: intern festgestellte Nichtkonformitaet. Reklamation: extern vom Kunden geltend gemachte Beanstandung. Beide erfordern Korrekturmassnahmen","Abweichung extern"],a:2,f:"Abweichung: interne Entdeckung (Eigenentdeckung). Reklamation: Kunde beschwert sich (Kundenentdeckung). Reklamation ist teurer (Imageschaden, Garantiekosten) -> Ziel: intern entdecken!"},
{id:26,b:"10.6",t:"PDCA",q:"Was ist ein A3-Bericht im Lean/PDCA?",o:["Ein Managementbericht","Strukturierter Problembericht auf einem A3-Blatt: Problem, Ist-Zustand, Ursache, Ziel, Massnahmen, Ergebnis - visualisiert PDCA kompakt","Ein Auditbericht","Papierformat"],a:1,f:"A3-Bericht (Toyota): passt auf ein A3-Blatt. Strukturiert: Problemhintergrund, Ist-Zustand, Ziel, Ursachenanalyse, Gegenmassnahmen, Ergebnispruefung, Standardisierung. Foerdert praezises Denken."},
{id:27,b:"10.6",t:"PDCA",q:"Was ist die Wirksamkeitspruefung einer Korrekturmassnahme?",o:["Ein erneutes Audit","Eine neue Pruefung","Sicherstellen dass die ergriffene Massnahme tatsaechlich gewirkt hat und das Problem nicht wiederkehrt","Eine Dokumentation"],a:2,f:"Wirksamkeitspruefung: nach Umsetzung der Korrekturmassnahme pruefen ob Problem nicht wiedergekehrt ist. Wie lange warten? Abhaengig von Haeufigkeit des Problems. ISO 9001 fordert Wirksamkeitspruefung."},
{id:28,b:"10.6",t:"PDCA",q:"Was ist die 8D-Methode?",o:["Ein Auditformat","Strukturierte Problemloesung in 8 Schritten: Team bilden, Problem beschreiben, Sofortmassnahmen, Ursache finden, Massnahmen, Wirksamkeit, Praevention, Team loben","Eine PDCA-Variante","Eine Norm"],a:1,f:"8D: 1.Team, 2.Problem beschreiben, 3.Sofortmassnahmen, 4.Ursache (5-Why), 5.Korrekturmassnahmen, 6.Wirksamkeit pruefen, 7.Systemische Praevention, 8.Team wuerdigen. Standard in Automotive."},
{id:29,b:"10.6",t:"PDCA",q:"Was ist Yokoten?",o:["Horizontale Uebertragung von Verbesserungen auf aehnliche Prozesse - Erfahrungen und PDCA-Ergebnisse teilen","Ein Qualitaetsstandard","Japanisches Essen","Eine PDCA-Phase"],a:0,f:"Yokoten (jap. quer uebertragen): Verbesserung in einem Bereich auf aehnliche Bereiche uebertragen. Beispiel: Prozessverbesserung in Werk A auf Werk B und C anwenden. Wissenstransfer."},
{id:30,b:"10.6",t:"PDCA",q:"Was ist Genchi Genbutsu?",o:["Eine PDCA-Phase","Ein Audit-Ansatz","Japanische Reise","Gehe vor Ort und sieh selbst - Fuehrungskraefte und Qualitaetsverantwortliche sollen sich selbst ein Bild machen statt nur Berichte zu lesen"],a:3,f:"Genchi Genbutsu (jap. Ursprungsort, Ursprungsding): persoenlich an die Quelle gehen und beobachten. Im PDCA: Plan und Check nicht vom Schreibtisch aus machen sondern vor Ort am Prozess."},
{id:31,b:"10.7",t:"Testprotokoll",q:"Was ist der Unterschied Testplan vs Testprotokoll?",o:["Protokoll ist Vorplanung","Testplan: definiert WAS, WANN und WIE geprueft wird (im Voraus). Testprotokoll: dokumentiert was tatsaechlich geprueft wurde und welche Ergebnisse festgestellt wurden (danach)","Testplan kommt danach","Identisch"],a:1,f:"Testplan: Planung vor der Durchfuehrung. Testprotokoll: Dokumentation der tatsaechlich durchgefuehrten Pruefungen und Ergebnisse. Beide erganzen sich: Plan vorher, Protokoll waehrend/nachher."},
{id:32,b:"10.7",t:"Testprotokoll",q:"Was ist eine Checkliste im Testprotokoll?",o:["Strukturiertes Hilfsmittel das sicherstellt dass alle Pruefpunkte beruecksichtigt werden - verhindert Vergessen","Eine To-Do-Liste","Ein Pruefprotokoll","Ein Auditformular"],a:0,f:"Checkliste: alle Pruefpunkte vorstrukturiert. Pruefer hakt ab was geprueft wurde. Verhindert vergessene Pruepunkte. Basis fuer Testprotokoll. Konsistenz bei mehreren Pruefern sichergestellt."},
{id:33,b:"10.7",t:"Testprotokoll",q:"Was passiert wenn Sicherheitsrichtlinien im Testprotokoll nicht bestanden werden?",o:["Ausnahme dokumentieren","Massnahme auf spaeter vertagen","Ignorieren","Arbeitsplatz darf nicht in Betrieb genommen werden - kritischer Pruefpunkt, Sicherheitsmassnahmen muessen vor Uebergabe erfuellt sein"],a:3,f:"Sicherheitsrichtlinien = kritischer Pruefpunkt. Nicht bestanden bedeutet: Inbetriebnahme nicht moeglich. Massnahme sofort und zwingend umsetzen, dann Nachpruefung und erneute Dokumentation."},
{id:34,b:"10.7",t:"Testprotokoll",q:"Was ist Nachkontrolle im Testprotokoll?",o:["Zweites Testprotokoll","Wiederholte Pruefung nach Behebung einer festgestellten Abweichung - bestaetigt dass Massnahme erfolgreich war","Kundenabnahme","Neuer Test"],a:1,f:"Nachkontrolle: Abweichung behoben -> erneut pruefen ob Problem behoben ist. Ergebnis dokumentieren (Datum, Pruefer, Ergebnis). Schliesst den Korrekturkreislauf."},
{id:35,b:"10.7",t:"Testprotokoll",q:"Was sollte ein Testprotokoll fuer die Netzwerkverbindung enthalten?",o:["IP-Adresse, Gateway, DNS, Internetzugang (Test), Netzlaufwerke (zugaenglich), Drucker (verbunden), VPN-Funktionalitaet wenn noetig","Nur IP-Adresse","Nur WLAN","Nur Kabelverbindung"],a:0,f:"Netzwerk-Pruefpunkte: IP-Konfiguration korrekt, Internetzugang funktioniert, Netzlaufwerke erreichbar, Drucker verbunden und druckt, VPN funktioniert (falls relevant), Firewall-Einstellungen."},
{id:36,b:"10.1",t:"QM-Systeme",q:"Was ist ein Qualitaetsmanagementsystem vs Qualitaetssicherung?",o:["Identisch","QMS: umfassendes System aus Prozessen, Dokumenten, Verantwortlichkeiten. QS: Teilbereich des QMS - Massnahmen zur Sicherstellung der Qualitaet","QS ist umfassender","QMS ist eine Abteilung"],a:1,f:"QMS: Gesamtsystem (Strategie, Planung, Prozesse, Massnahmen). QS: Teilbereich innerhalb des QMS - spezifische Massnahmen und Pruefungen. QS ist ein Element des QMS."},
{id:37,b:"10.2",t:"QS-Normen",q:"Was ist GMP (Good Manufacturing Practice)?",o:["Gutes Management Prinzip","IT-Sicherheitsstandard","ISO-Norm","Richtlinien fuer die pharmazeutische und Lebensmittelproduktion die hygienische Herstellungsbedingungen und Qualitaetskontrollen vorschreiben"],a:3,f:"GMP: Pflicht in Pharma, Lebensmittel, Kosmetik. Regelt Herstellungsprozesse um Sicherheit und Qualitaet zu gewaehrleisten. Regulaerische Anforderung (EU, FDA). ISO 9001 erganzt GMP."},
{id:38,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Kalibrierung im QM-Kontext?",o:["Abgleich von Messmitteln mit einem Referenzstandard um Messgenauigkeit sicherzustellen - Voraussetzung fuer zuverlaessige Qualitaetspruefungen","Bildschirmkalibrierung","Computerkalibrierung","Softwarekalibrierung"],a:0,f:"Kalibrierung: Messmittel (Messgeraete, Waagen, Pruefmittel) regelmassig gegen Referenz pruefen. ISO 9001 Kapitel 7.1.5: geeignete Ueberwachungs- und Messmittel bereitstellen und kalibrieren."},
{id:39,b:"10.4",t:"Qualitaetsplanung",q:"Was ist ein Qualitaetsmanagementplan im Projekt?",o:["Projektzeitplan","Budgetplan","Dokument das beschreibt wie Qualitaet im Projekt gesichert wird: welche Standards, welche Tests, welche Reviews, welche Abnahmekriterien","Ressourcenplan"],a:2,f:"QM-Plan im Projekt: Qualitaetsstandards (welche Normen/Regeln gelten?), Qualitaetsaktivitaeten (wann Tests, Reviews?), Verantwortlichkeiten, Abnahmekriterien, Metriken."},
{id:40,b:"10.3",t:"Zertifizierung",q:"Was ist eine Selbstdeklaration vs Zertifizierung?",o:["Identisch","Selbstdeklaration: Unternehmen erklaert selbst Konformitaet (z.B. EU Declaration of Conformity). Zertifizierung: externe Stelle bestaeigt Konformitaet","Zertifizierung ist freiwillig","Selbstdeklaration ist sicherer"],a:1,f:"Selbstdeklaration: Hersteller erklart selbst CE-Konformitaet. Zertifizierung: unabhaengige akkreditierte Stelle bestaeigt. Bei hohem Risiko (Klasse III Medizinprodukte): Zertifizierung Pflicht."},
{id:41,b:"10.6",t:"PDCA",q:"Was ist die Verbindung PDCA - DMAIC?",o:["PDCA ist besser","Beide sind Verbesserungszyklen: PDCA (allgemein, Kaizen), DMAIC (Six Sigma, datengetrieben). PDCA ist einfacher, DMAIC strukturierter und statistisch fundierter","DMAIC ist neuer","Kein Zusammenhang"],a:1,f:"PDCA und DMAIC: beide zyklisch, datenbasiert, auf kontinuierliche Verbesserung ausgerichtet. PDCA allgemeiner (Kaizen, ISO 9001). DMAIC spezifischer (Six Sigma, statistische Analyse)."},
{id:42,b:"10.5",t:"Qualitaetslenkung",q:"Was ist eine Stichprobenpruefung?",o:["Vollpruefung","Sichtpruefung","Zufaellige Pruefung","Statistische Pruefmethode: eine repraesentative Stichprobe wird geprueft um Aussagen ueber die Gesamtproduktion zu machen - nicht jedes Teil"],a:3,f:"Stichprobenpruefung: aus statistischen Tabellen (AQL-Tabellen) Stichprobengroesse ableiten. Akzeptables Qualitaetsniveau (AQL) definiert. Guenstiger als Vollpruefung, aber nicht 100% sicher."},
{id:43,b:"10.1",t:"QM-Systeme",q:"Was ist Kundenzufriedenheitsmessung im QMS?",o:["Nur Beschwerdenauswertung","Systematische Erfassung und Analyse ob Kundenbeduerrnisse und -erwartungen erfuellt wurden - ISO 9001 Kapitel 9.1.2 fordert dies","Nur Umfragen","Optional im QMS"],a:1,f:"Kundenzufriedenheit ISO 9001 Kapitel 9.1.2: Unternehmen muss Kundenzufriedenheit ueberwachen. Methoden: CSAT-Umfragen, NPS, Beschwerdenanalyse, Wiederkaufrate. Ergebnis fuer Managementbewertung."},
{id:44,b:"10.4",t:"Qualitaetsplanung",q:"Was ist ein Massnahmenplan im QM?",o:["Projektplan","Notfallplan","Auditplan","Dokument das konkrete Massnahmen zur Erreichung von Qualitaetszielen auflistet: Was, Wer, Bis wann, Status"],a:3,f:"Massnahmenplan (Action Plan): Ziel, Massnahme, Verantwortlicher, Faelligkeitsdatum, Status (offen/in Arbeit/erledigt). Verbindlich. Regelmaessige Statusverfolgung."},
{id:45,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Verbesserungsmanagement im QMS?",o:["Reaktives Fehlermanagement","Einmalige Verbesserungen","Systematische Identifikation, Priorisierung und Umsetzung von Verbesserungsmassnahmen - aus Audits, Beschwerden, Mitarbeiterideen","Innovationsmanagement"],a:2,f:"Verbesserungsmanagement: Quellen (Audits, Beschwerden, BVW, CSAT). Priorisierung. Umsetzung mit PDCA. Wirksamkeitspruefung. Ergebnisse fuer Managementbewertung. ISO 9001 Kapitel 10."},
{id:46,b:"10.6",t:"PDCA",q:"Was ist Hoshin Kanri?",o:["Eine Zertifizierung","Japanisches Essen","Strategische Planungsmethode: Unternehmensstrategien werden durch alle Hierarchieebenen in konkrete Ziele und Massnahmen heruntergebrochen (Policy Deployment)","Eine PDCA-Variante"],a:2,f:"Hoshin Kanri (jap. Kompassnadel): verbindet strategische Ziele mit operativer Umsetzung. Catchball-Prozess: Ziele werden zwischen Ebenen diskutiert. PDCA auf Strategieebene."},
{id:47,b:"10.7",t:"Testprotokoll",q:"Was ist ein Abnahmetest im IT-Kontext?",o:["Qualitaetspruefung allgemein","Entwicklertest","Belastungstest","Formale Pruefung durch Auftraggeber oder Endnutzer ob System Anforderungen erfuellt - Grundlage fuer formelle Abnahme"],a:3,f:"Abnahmetest (UAT - User Acceptance Test): Auftraggeber prueft ob Anforderungen erfuellt. Ergebnis: Abnahme (Vertrag erfuellt) oder Ablehnung (Maengelprotokoll). Im Testprotokoll dokumentiert."},
{id:48,b:"10.1",t:"QM-Systeme",q:"Was ist Supplier Quality Management (SQM)?",o:["Eigene Qualitaet","Kundenzufriedenheit","Systematisches Management der Qualitaet von Lieferanten: Auswahl, Bewertung, Entwicklung und Auditing von Lieferanten","Interne QS"],a:2,f:"SQM: Lieferantenauswahl (RFQ, Qualifikation), Lieferantenbewertung (Scorecard: Qualitaet, Liefertreue, Preis), Lieferantenaudit (Vor-Ort), Lieferantenentwicklung (bei schwachen Lieferanten)."},
{id:49,b:"10.2",t:"QS-Normen",q:"Was ist CMMI (Capability Maturity Model Integration)?",o:["Ein Zertifizierungsstandard","Ein Qualitaetsstandard fuer Hardware","Eine ISO-Norm","Reifegradmodell fuer Software- und System-Entwicklungsorganisationen - 5 Reifegrade von initial bis optimierend"],a:3,f:"CMMI: 5 Reifegrade: 1 Initial (chaotisch), 2 Managed (Projekte kontrolliert), 3 Defined (Prozesse standardisiert), 4 Quantitatively Managed (Metriken), 5 Optimizing (kontinuierliche Verbesserung)."},
{id:50,b:"10.3",t:"Zertifizierung",q:"Was ist eine Zertifizierungsroadmap?",o:["Landkarte","QMS-Dokument","Zeitplan fuer den Weg zur Zertifizierung: Lueckenanalyse, Massnahmen, Meilensteine, Audit-Datum","Auditbericht"],a:2,f:"Zertifizierungsroadmap: 1. Lueckenanalyse (wo sind wir vs ISO 9001), 2. Massnahmen planen, 3. QMS aufbauen und schulen, 4. Internes Audit, 5. Stage-1-Audit, 6. Stage-2-Audit, 7. Zertifikat."},
{id:51,b:"10.4",t:"Qualitaetsplanung",q:"Was ist Lieferkettenkontinuitaet im QM?",o:["Sicherstellung dass kritische Lieferketten weiterhin funktionieren auch bei Stoerungen - Risiko durch Lieferantenausfaelle minimieren","Bestandsmanagement","Logistikplanung","Einkaufsplanung"],a:0,f:"Supply Chain Continuity: Risiko bei Single-Source (nur ein Lieferant). Massnahmen: alternative Lieferanten, Sicherheitsbestaende, Long-term Agreements, Lieferantenaudit Stabilitaet."},
{id:52,b:"10.5",t:"Qualitaetslenkung",q:"Was ist die Fehler-Entdeckungseffizienz?",o:["Anteil der tatsaechlichen Fehler die durch Pruefmassnahmen entdeckt werden bevor sie zum Kunden gelangen","Fehlerrate","Wie schnell Fehler behoben werden","Pruefungsgeschwindigkeit"],a:0,f:"Entdeckungseffizienz: von 100 Fehlern die entstehen - wie viele werden intern entdeckt? Ziel: 100% intern entdecken, 0% durch Kunden. In FMEA: Entdeckungswahrscheinlichkeit als Faktor."},
{id:53,b:"10.6",t:"PDCA",q:"Was ist eine Vorbeugungsmassnahme in ISO 9001?",o:["Verbesserungsmassnahme","Massnahme die potenzielle Fehler verhindert bevor sie auftreten - in ISO 9001:2015 in risikobasiertes Denken integriert","Sofortmassnahme","Korrekturmassnahme"],a:1,f:"ISO 9001:2015 hat explizite Vorbeugungsmassnahmen abgeschafft und in risikobasiertes Denken (Kapitel 6.1) integriert. Risiken identifizieren und Massnahmen zur Risikominderung = Vorbeugung."},
{id:54,b:"10.7",t:"Testprotokoll",q:"Was sind Software-Pruefpunkte im Testprotokoll bei der Arbeitsplatz-Einrichtung?",o:["Nur Anwendungen","Nur Lizenzen","Nur Betriebssystem","Betriebssystem (installiert, aktiviert, Updates), Pflichtanwendungen (installiert, konfiguriert), Antivirenprogramm (aktuell), Verschluesselung (BitLocker), Zugriffsrechte"],a:3,f:"Software-Pruefpunkte: BS-Version und Updates, notwendige Anwendungen installiert und lizenziert, Antivirensoftware aktiv und aktuell, Festplattenverschluesselung aktiv, Nutzerkonto korrekt konfiguriert."},
{id:55,b:"10.1",t:"QM-Systeme",q:"Was ist Null-Fehler-Prinzip?",o:["Grundsatz dass jeder Fehler ein zu vermeidender Fehler ist und Qualitaet nicht durch Pruefen sondern durch fehlerfreie Prozesse erreicht wird (Philip Crosby)","Unmoeglich","Theorie ohne Praxis","Kostenprinzip"],a:0,f:"Null-Fehler-Prinzip (Philip Crosby): Qualitaet hat keinen Preis (Quality is Free) wenn Fehler von Anfang an vermieden werden. Fehler kosten mehr als Praevention. Bewusstsein schaffen dass Fehler vermeidbar sind."},
{id:56,b:"10.2",t:"QS-Normen",q:"Was ist die Konformitaetserklaerung (Declaration of Conformity)?",o:["Ein Zertifikat","Erklaerung des Herstellers dass sein Produkt alle relevanten EU-Anforderungen erfuellt - Voraussetzung fuer CE-Kennzeichnung","Ein Guetesiegel","Ein ISO-Zertifikat"],a:1,f:"DoC: Hersteller erklart selbst (Selbstdeklaration) dass Produkt EU-Richtlinien erfuellt. Dokument mit Produktbeschreibung, angewendeten Normen, Unterschrift. Pflicht fuer CE."},
{id:57,b:"10.3",t:"Zertifizierung",q:"Was ist Zertifizierungspflicht vs freiwillige Zertifizierung?",o:["Identisch","ISO 9001 ist Pflicht","Pflicht: CE-Kennzeichnung, Medizinprodukte-Zertifizierung. Freiwillig: ISO 9001, ISO 14001. Marktdruck kann freiwillige Zertifizierungen quasi-obligatorisch machen","CE ist freiwillig"],a:2,f:"Pflicht: CE (EU-Richtlinien), MDR (Medizin), ATEX (Explosionsschutz). Freiwillig: ISO 9001, 14001, 27001. Aber: Grossunternehmen verlangen oft ISO 9001 von Lieferanten -> de-facto Pflicht."},
{id:58,b:"10.4",t:"Qualitaetsplanung",q:"Was ist Quality by Design (QbD)?",o:["QMS-Planung","Designqualitaet","Design-Sprint","Ansatz bei dem Qualitaet von Anfang an in das Produkt/Prozess eingebaut wird statt hinterher geprueft zu werden"],a:3,f:"Quality by Design: Qualitaet entsteht durch Design, nicht durch Kontrolle. Anforderungen schon in der Entwicklung berucksichtigen. Poka-Yoke, Designreviews, FMEA als Werkzeuge. Besonders in Pharma verbreitet."},
{id:59,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Erstinstandhaltung vs vorbeugende Instandhaltung?",o:["Nur fuer Maschinen","Erstinstandhaltung: nach Aufstellung eines Geraets. Vorbeugende Instandhaltung: regelmaessig nach Plan um Ausfaelle zu verhindern","Identisch","Beide sind reaktiv"],a:1,f:"Vorbeugende Instandhaltung (PM - Preventive Maintenance): nach Zeitplan oder Betriebsstunden. Verhindert ungeplante Ausfaelle. Kosten fuer PM < Kosten fuer ungeplante Stoerungen."},
{id:60,b:"10.6",t:"PDCA",q:"Was ist der Unterschied zwischen Verbesserung und Innovation im QM?",o:["Verbesserung: schrittweise Optimierung bestehender Prozesse (PDCA, Kaizen). Innovation: grundlegend neuer Ansatz, Sprung (Kaikaku). Beide ergaenzen sich","Innovation ist kontinuierlich","Identisch","Verbesserung ist groesser"],a:0,f:"Kaizen (Verbesserung): kleine Schritte, bestehender Prozess. Kaikaku (Innovation): radikaler Wandel, neuer Ansatz. TQM nutzt beides: Kaizen fuer Alltag, Kaikaku fuer grosse Herausforderungen."},
{id:61,b:"10.1",t:"QM-Systeme",q:"Was ist die Top-Management-Verantwortung in ISO 9001?",o:["Delegation an QMB","Fuehrungsengagement: Top-Management muss QMS aktiv unterstuetzen, nicht nur delegieren - persoenliche Verantwortung der Unternehmensleitung","Externe Verantwortung","Qualitaetsabteilung"],a:1,f:"ISO 9001 Kapitel 5 Leadership: Topmanagement muss QMS aktiv fuehren, Qualitaetspolitik bestimmen, Ressourcen bereitstellen, in Management Review teilnehmen. Delegation allein genuegt nicht."},
{id:62,b:"10.7",t:"Testprotokoll",q:"Was ist Sicherheit als Pruefpunkt im Testprotokoll?",o:["Nur Virenschutz","Physische Sicherheit","Antivirenprogramm aktiv, Firewall aktiv, Festplattenverschluesselung, Passwort-Policy, Bildschirmsperre aktiv","Nur Passwort"],a:2,f:"Sicherheits-Pruefpunkte: Antivirus (installiert, aktuell, aktiv), Firewall (aktiv, Regeln geprueft), Verschluesselung (BitLocker/FileVault), Passwort-Policy (Laenge, Komplexitaet), Bildschirmsperre (timeout)."},
{id:63,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Requalifizierung von Lieferanten?",o:["Erstqualifizierung","Lieferantenaudit normal","Neue Lieferantensuche","Erneute Qualifikationspruefung eines bereits genehmigten Lieferanten - bei Problemen, nach langer Pause oder auf Initiative"],a:3,f:"Requalifizierung: Lieferant hatte Qualitaetsprobleme -> erneute umfassende Pruefung bevor wieder bestellt wird. Oder: nach langer Beschaffungspause. Oder: nach groessen Aenderungen beim Lieferanten."},
{id:64,b:"10.4",t:"Qualitaetsplanung",q:"Was ist eine Gap-Analyse im QMS-Kontext?",o:["Wettbewerbsanalyse","Fehleranalyse","Vergleich des aktuellen QMS-Zustands mit den Normforderungen um Luecken zu identifizieren - vor ISO-Zertifizierung durchgefuehrt","Abteilungsanalyse"],a:2,f:"Gap-Analyse: Anforderungen der Norm vs aktueller Zustand. Wo sind Luecken? Was muss aufgebaut werden? Priorisierung der Massnahmen fuer Zertifizierungsvorbereitung. ISO 9001 Kapitel fuer Kapitel pruefen."},
{id:65,b:"10.6",t:"PDCA",q:"Was ist Gemba (Lean/PDCA)?",o:["Der Ort wo die Wertschoepfung stattfindet - Manager und Qualitaetsfachleute sollen dorthin gehen um Probleme zu verstehen","Eine PDCA-Phase","Japanisches Restaurant","Ein Werkzeug"],a:0,f:"Gemba (jap. Ort des Geschehens): Fabrikhalle, Buero, Baustelle. Gemba-Walk: Fuehrungskraefte gehen regelmaessig an den Ort der Wertschoepfung. Probleme sehen, Mitarbeiter befragen, PDCA einleiten."},
{id:66,b:"10.2",t:"QS-Normen",q:"Was ist Validierung vs Verifizierung?",o:["Verifizierung ist umfassender","Identisch","Verifizierung: Haben wir das Produkt richtig gemacht? (Entspricht es den Spezifikationen). Validierung: Haben wir das richtige Produkt gemacht? (Erfuellt es den Kundenbedarf)","Validierung ist technisch"],a:2,f:"Verifizierung: Soll-Ist-Vergleich gegen Spezifikationen. Validierung: Nutzer bestaetigt dass Produkt seinen Bedarf erfuellt. Beide notwendig: Verifizierung (korrekt gebaut?) und Validierung (richtiges gebaut?)."},
{id:67,b:"10.7",t:"Testprotokoll",q:"Was sind Hardware-Pruefpunkte im Testprotokoll?",o:["Nur Peripheriegeraete","Alle Hardwarekomponenten: PC/Laptop, Bildschirm, Tastatur, Maus, Drucker, Headset, Webcam - jede Komponente separat pruefen","Nur CPU","Nur PC"],a:1,f:"Hardware-Pruefpunkte: PC (startet, Leistung OK), Bildschirm (Aufloesung, keine Pixelfehler), Tastatur (alle Tasten), Maus (alle Tasten, Scroll), Drucker (Test-Ausdruck), Headset/Webcam (Ton/Bild)."},
{id:68,b:"10.1",t:"QM-Systeme",q:"Was ist Lessons Learned im QM?",o:["Schulungsunterlage","Projektabschluss","Systematische Erfassung von Erfahrungen aus abgeschlossenen Projekten oder Qualitaetsvorfaellen fuer kuenftige Nutzung","Fehlerliste"],a:2,f:"Lessons Learned: Was lief gut? Was lief schlecht? Was wuerden wir anders machen? Dokumentiert und zuganglich gemacht. Verhindert Wiederholung von Fehlern in kuenftigen Projekten."},
{id:69,b:"10.3",t:"Zertifizierung",q:"Was ist Konformitaetsbewertung?",o:["Audit","Selbstbewertung","Uebergeordneter Begriff fuer alle Aktivitaeten die zeigen ob eine Anforderung erfuellt wird: Tests, Inspektionen, Zertifizierungen, Akkreditierungen","Interne Pruefung"],a:2,f:"Konformitaetsbewertung (Conformity Assessment): Test (Laborpruefung), Inspektion (Sichtpruefung), Zertifizierung (systembasiert), Akkreditierung (Bewertung der Bewertungsstellen). Hierarchisch."},
{id:70,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Produktvalidierung vs Prozessvalidierung?",o:["Produktvalidierung: Produkt erfuellt Kundenanforderungen. Prozessvalidierung: Prozess erzeugt konsistent das geforderte Produkt - besonders in Pharma/Medizin wichtig","Identisch","Produkt ist wichtiger","Prozess ist unwichtig"],a:0,f:"Prozessvalidierung: beweisen dass ein Prozess konsistent und reproduzierbar die Anforderungen erfuellt. Pflicht in Pharma (GMP) und Medizin (ISO 13485) fuer kritische Prozesse."},
{id:71,b:"10.6",t:"PDCA",q:"Was ist OKR (Objectives and Key Results)?",o:["Zielmanagement-Framework: Objectives (qualitative Ziele) und Key Results (messbare Ergebnisse) - verbindet Strategie mit Execution, quartalsweise","Eine ISO-Norm","Eine PDCA-Methode","Eine Qualitaetsmethode"],a:0,f:"OKR: von Intel/Google popularisiert. Objective = ambitioniertes qualitatives Ziel. Key Results = 2-4 messbare Indikatoren. Quartalsrhythmus. Transparenz und Ausrichtung. Erganzt PDCA gut."},
{id:72,b:"10.4",t:"Qualitaetsplanung",q:"Was ist Qualitaetssicherung in der Softwaretestplanung?",o:["Nur Dokumentation","Nur Bugfixing","Nur Endtests","Planung aller Testaktivitaeten: Testarten (Unit, Integration, System, UAT), Testwerkzeuge, Testabdeckungsziele, Verantwortlichkeiten"],a:3,f:"Software-QS-Planung: Teststrategie (welche Testarten?), Testplan (wann, was, wer), Testabdeckungsziele (80% Code Coverage), Testumgebungen, Werkzeuge (JUnit, Selenium), Akzeptanzkriterien."},
{id:73,b:"10.2",t:"QS-Normen",q:"Was ist TISAX?",o:["Sicherheitsstandard fuer Automobile","ISO-Norm","Trusted Information Security Assessment Exchange: Informationssicherheitsstandard der Automobilindustrie basierend auf ISO 27001","Qualitaetsstandard"],a:2,f:"TISAX: von VDA (Verband der Automobilindustrie). Bewertung der Informationssicherheit bei Automobil-Zulieferern. Basis: ISO 27001 mit Automotive-spezifischen Anforderungen (Prototypenschutz etc.)."},
{id:74,b:"10.7",t:"Testprotokoll",q:"Was ist eine Restpunktliste (Punch List)?",o:["Fehlerliste","Testprotokoll","Abnahmeprotokoll","Liste offener Punkte bei der Abnahme die noch behoben werden muessen - Abnahme kann trotzdem erfolgen wenn Punkte nicht kritisch sind"],a:3,f:"Punch List (Restpunktliste): bei Abnahme festgestellte Kleinmaengel die behoben werden muessen. Abnahme mit Vorbehalt moeglich. Frist fuer Behebung vereinbaren. Nachkontrolle."},
{id:75,b:"10.1",t:"QM-Systeme",q:"Was ist der Unterschied QMS und ISMS?",o:["QMS: Qualitaetsmanagementsystem (ISO 9001) - alle Aspekte der Produktqualitaet. ISMS: Informationssicherheitsmanagementsystem (ISO 27001) - Informationssicherheit","Identisch","QMS ist umfassender","ISMS ist neuer"],a:0,f:"QMS: Qualitaet von Produkten und Dienstleistungen. ISMS: Vertraulichkeit, Integritaet, Verfuegbarkeit von Informationen. Beides kann kombiniert werden (IMS). Verschiedene Schwerpunkte."},
{id:76,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Eskalationsmatrix im QM?",o:["IT-Eskalation","Matrix die festlegt bei welchen Qualitaetsproblemen wer eskaliert wird: nach Schweregrad oder nach Haeufigkeit","Fehlermatrix","Prioritaetsmatrix"],a:1,f:"Eskalationsmatrix QM: 1 Fehler = Qualitaetspruefung, 3 Fehler gleicher Art = Qualitaetsleiter, 10 Fehler = Management, Kundenreklamation = sofortige Managementinformation. Transparente Regeln."},
{id:77,b:"10.3",t:"Zertifizierung",q:"Was ist Scope Creep bei ISO-Zertifizierungen?",o:["Projektwachstum","Eine Norm","Ein Auditfehler","Ungeplante Erweiterung des Zertifizierungsumfangs waehrend der Vorbereitung - erhoehe Kosten und Zeitbedarf"],a:3,f:"Scope Creep: Zertifizierungsumfang waechst unkontrolliert. Loesung: klaren Anwendungsbereich von Anfang an definieren und festhalten. Aenderungen formal entscheiden."},
{id:78,b:"10.6",t:"PDCA",q:"Was ist Catchball in Hoshin Kanri?",o:["Managementbesprechung","Sportwettkampf","Interaktiver Prozess: Ziele werden zwischen Management und Mitarbeitern hin- und hergeworfen bis Einigkeit herrscht - sichert Engagement","Zielaustausch"],a:2,f:"Catchball: Ziel von oben nach unten weitergeben, Mitarbeiter werfen Bedenken und Ideen zurueck. Iterativer Dialog bis Ziele realistisch und akzeptiert sind. Foerdert Commitment."},
{id:79,b:"10.4",t:"Qualitaetsplanung",q:"Was ist Kosten-Nutzen-Analyse im QM?",o:["Buchhalterische Aufgabe","Finanzplanung","Bewertung ob Qualitaetsmassnahmen wirtschaftlich sinnvoll sind: Kosten der Massnahme vs erwarteter Nutzen (Fehlerkosten-Reduzierung)","Investitionsrechnung"],a:2,f:"KNA im QM: Kalibrierungskosten 5.000 EUR/Jahr vs Kosten fehlerhafter Messung (Rueckruf, Schadenersatz) 500.000 EUR Risiko. Kalibrierung lohnt sich klar. ROI von Qualitaetsinvestitionen berechnen."},
{id:80,b:"10.1",t:"QM-Systeme",q:"Was ist Wissensmanagement in ISO 9001?",o:["Personalmanagement","Systematisches Erfassen und Teilen von organisationalem Wissen das fuer Prozesse benoetigt wird - Kapitel 7.1.6 ISO 9001","Dokumentenablage","Schulungsmanagement"],a:1,f:"Wissensmanagement ISO 9001:2015 Kapitel 7.1.6: Welches Wissen benoetigen Prozesse? Wie wird es bewahrt (Dokumentation, Schulungen) und entwickelt (neue Anforderungen)? Know-how nicht personenabhaengig machen."},
{id:81,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Mean Time Between Defects (MTBD)?",o:["Supportzeit","MTBF","Reparaturzeit","Durchschnittliche Zeit zwischen zwei Qualitaetsmaengeln - Kennzahl fuer Prozesstabilitaet"],a:3,f:"MTBD: wie oft tritt im Durchschnitt ein Fehler auf? Je laenger MTBD, desto stabiler der Prozess. Ziel: MTBD kontinuierlich erhoehen durch Prozessverbesserung."},
{id:82,b:"10.6",t:"PDCA",q:"Was ist ein Verbesserungsvorschlag und wie wird er bearbeitet?",o:["Ein Audit-Befund","Idee eines Mitarbeiters zur Verbesserung: Einreichen, Bewertung, Entscheidung, Umsetzung, Anerkennung - Grundlage fuer Kaizen","Eine Reklamation","Eine Beschwerde"],a:1,f:"Verbesserungsvorschlag (BVW): Mitarbeiter reicht Idee ein. Bewerter (meist Teamleiter oder QB) beurteilt Umsetzbarkeit. Umsetzung per PDCA. Anerkennung (Pramie, Lob) foerdert weitere Ideen."},
{id:83,b:"10.7",t:"Testprotokoll",q:"Wann wird ein Testprotokoll aufbewahrt und wie lange?",o:["Unbegrenzt immer","Nicht aufbewahren","Nur 1 Jahr","Aufbewahrung nach Unternehmensvorgaben und gesetzlichen Anforderungen - typisch 5-10 Jahre, bei Sicherheitsrelevanz laenger"],a:3,f:"Aufbewahrung: GoBD empfiehlt 6-10 Jahre. Sicherheitsrelevante Systeme (Medizin, KRITIS): laenger oder unbegrenzt. Unternehmensvorgaben beachten. Digitale Archivierung rechtlich gleichwertig."},
{id:84,b:"10.4",t:"Qualitaetsplanung",q:"Was ist Produkthaftung im QM-Kontext?",o:["Nicht relevant fuer QM","Versicherungsfrage","Rechtliche Verantwortung des Herstellers fuer Schaeden durch fehlerhafte Produkte - QMS reduziert Haftungsrisiko durch Nachweis sorgfaeltiger Qualitaetssicherung","Nur Rechtsthema"],a:2,f:"Produkthaftung: Hersteller haftet fuer Schaeden durch Produktfehler. QMS-Dokumentation ist Nachweis dass Sorgfaltspflicht erfuellt wurde. Traceability: bei Rueckruf betroffene Produkte identifizieren."},
{id:85,b:"10.2",t:"QS-Normen",q:"Was ist EN 9100?",o:["Umweltstandard","QMS-Norm fuer Luft- und Raumfahrt sowie Verteidigung - basiert auf ISO 9001 mit spezifischen Ergaenzungen","Allgemeiner QMS-Standard","IT-Standard"],a:1,f:"EN 9100: QMS-Norm fuer Aerospace, Defence, Space. Basiert auf ISO 9001 mit zusaetzlichen Anforderungen (Risikomanagement, Konfigurationsmanagement, FOD-Praevention). Pflicht fuer Zulieferer."},
{id:86,b:"10.3",t:"Zertifizierung",q:"Was ist Multisite-Zertifizierung?",o:["Zertifizierung mehrerer Standorte eines Unternehmens unter einem Zertifikat - effizient wenn Prozesse standardisiert sind","Gruppenaudit","Mehrfach-Zertifizierung","Zertifikat fuer mehrere Normen"],a:0,f:"Multisite: mehrere Standorte (Werke, Niederlassungen) mit identischen Prozessen werden gemeinsam zertifiziert. Guenstiger als Einzel-Audits. Sampling-Ansatz: nicht alle Standorte jedes Jahr."},
{id:87,b:"10.6",t:"PDCA",q:"Was ist Root-Cause-Corrective-Action (RCCA)?",o:["Kombination: Root Cause Analysis (Ursache finden) und Corrective Action (Massnahme umsetzen) - vollstaendiger Problemloesungszyklus","Eine PDCA-Phase","Eine Norm","Eine Audit-Methode"],a:0,f:"RCCA: 1. Root Cause Analysis (Warum ist das Problem aufgetreten? - 5Why, Ishikawa), 2. Corrective Action (was verhindert Wiederholung?), 3. Wirksamkeitspruefung. Standard in vielen Industrien."},
{id:88,b:"10.1",t:"QM-Systeme",q:"Was ist Outsourcing im QMS?",o:["ISO 9001 fordert: ausgelagerte Prozesse muessen weiterhin gesteuert werden - Kontrolle ueber Lieferanten behalten","Auslagerung allgemein","Delegation","Subcontracting"],a:0,f:"Outsourcing ISO 9001 Kapitel 8.4: ausgelagerte Prozesse koennen Qualitaet beeinflussen. Daher: Lieferantenauswahl, -bewertung, Kontrolle und Anforderungen auch fuer externe Prozesse."},
{id:89,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Total Productive Maintenance (TPM)?",o:["Reaktive Wartung","Vollstaendige Instandhaltung","Nur Instandhaltungsabteilung","Ganzheitlicher Ansatz zur Anlageneffektivitaet: alle Mitarbeiter beteiligen sich an Instandhaltung um Ausfaelle zu minimieren"],a:3,f:"TPM: jeder Mitarbeiter ist fuer seine Maschine mitverantwortlich. Autonome Instandhaltung (Bediener reinigt und pflegt). Geplante Instandhaltung. OEE (Overall Equipment Effectiveness) als Kennzahl."},
{id:90,b:"10.4",t:"Qualitaetsplanung",q:"Was ist OEE (Overall Equipment Effectiveness)?",o:["Personaleffizienz","Prozesseffizienz","Kennzahl fuer Anlageneffektivitaet: OEE = Verfuegbarkeit x Leistung x Qualitaet - Weltklasse: >85%","Allgemeine Effektivitaet"],a:2,f:"OEE: Verfuegbarkeit (ungeplante Ausfaelle), Leistung (Geschwindigkeit vs Optimum), Qualitaet (Gutteile vs Ausschuss). OEE 60% = viel Verbesserungspotenzial. Weltklasse: >85%."},
{id:91,b:"10.6",t:"PDCA",q:"Was ist eine After-Action-Review (AAR)?",o:["Ein Post-Mortem","Strukturierter Rueckblick nach einer Aktivitaet: Was war geplant? Was passierte tatsaechlich? Warum der Unterschied? Was lernen wir?","Ein Audit","Eine Retrospektive fuer Militaer"],a:1,f:"AAR: urspruenglich US-Militaer, jetzt in Unternehmen. 4 Fragen: 1. Was sollte passieren? 2. Was passierte? 3. Warum Unterschied? 4. Was verbessern? Schneller als formale Retrospektive."},
{id:92,b:"10.7",t:"Testprotokoll",q:"Was ist Testautomatisierung und ihr Bezug zu Testprotokollen?",o:["Identisch mit manuellen Tests","Nur fuer Software","Automatisierte Tests erzeugen digitale Protokolle die Testprotokoll-Funktion uebernehmen - schneller, reproduzierbarer, unveraenderlich","Testautomatisierung braucht kein Protokoll"],a:2,f:"Testautomatisierung: JUnit, Selenium etc. erzeugen automatisch detaillierte Testberichte (Pass/Fail, Zeitstempel, Details). Diese ersetzen oder ergaenzen manuelle Testprotokolle. Auditfaehig wenn archiviert."},
{id:93,b:"10.1",t:"QM-Systeme",q:"Was ist Qualitaetskultur?",o:["Gesamtheit der geteilten Werte, Einstellungen und Verhaltensweisen bezueglich Qualitaet - entscheidender weicher Faktor fuer QMS-Erfolg","Eine Zertifizierung","Ein Dokument","Eine Abteilung"],a:0,f:"Qualitaetskultur: kein Dokument kann Qualitaetskultur ersetzen. Wenn Mitarbeiter Qualitaet als ihre Verantwortung sehen und leben, wird QMS lebendig. Fuehrungsvorbildfunktion entscheidend."},
{id:94,b:"10.2",t:"QS-Normen",q:"Was ist GDPR/DSGVO im QM-Kontext?",o:["Nur Datenschutzthema","Datenschutzanforderungen muessen in QMS-Prozesse integriert werden: Kundendaten, Mitarbeiterdaten, Lieferantendaten - Compliance als QM-Anforderung","Sicherheitsstandard","ISO-Norm"],a:1,f:"DSGVO im QMS: Prozesse muessen DSGVO-konform sein. Datenschutz als Qualitaetsanforderung betrachten: Kundendaten sicher verarbeiten ist Teil von Kundenzufriedenheit."},
{id:95,b:"10.3",t:"Zertifizierung",q:"Was ist Transfer-Zertifizierung?",o:["Wechsel der Zertifizierungsstelle waehrend laufender Zertifikatslaufzeit - aktuelles Zertifikat bleibt gueltig","Norm-Uebertragung","Neuzertifizierung","Normenwechsel"],a:0,f:"Transfer-Zertifizierung: Unternehmen wechselt von TUeV zu DEKRA. Neue Stelle prueft Zertifikat und Audithistorie, oft nur kurzes Transfer-Audit. Zertifikat bleibt gueltig bis Ablauf."},
{id:96,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Acceptance Quality Level (AQL)?",o:["Prozessfaehigkeit","Kundenzufriedenheitslevel","Pruefgenauigkeit","Maximaler Anteil fehlerhafter Einheiten in einer Lieferung der als akzeptabel gilt - Basis fuer statistische Stichprobenpruefung"],a:3,f:"AQL: z.B. AQL 1,0 = maximal 1% Fehler toleriert. Aus AQL-Tabellen wird Stichprobengroesse abgeleitet. Standard: ISO 2859. Haendisch oder software-gestuetzt."},
{id:97,b:"10.6",t:"PDCA",q:"Was ist Obeya (Big Room) in Lean/PDCA?",o:["Raum wo alle relevanten Informationen visualisiert sind: Projektstatus, KPIs, Probleme, Massnahmen - foerdert Transparenz und schnelle Entscheidungen","Eine PDCA-Phase","Grosses Buerozimmer","Ein Management-Tool"],a:0,f:"Obeya (jap. grosser Raum): Visualisierungsraum fuer Projektsteuerung. Dashboards, Gantt-Diagramme, KPI-Boards, Problemlisten. Regelmaessige kurze Stand-up-Meetings. Transparenz foerdert Qualitaet."},
{id:98,b:"10.7",t:"Testprotokoll",q:"Was ist ein elektronisches Testprotokoll?",o:["Ein Software-Test","Nur fuer IT","Ein Automatisierungstest","Digitales Testprotokoll statt Papier: Vorteile Faelschungssicherheit (Zeitstempel), einfache Suche, Revisionssicherheit, keine Medienbrueche"],a:3,f:"Elektronisches Testprotokoll: digital signiert, zeitgestempelt, fuer Audit revisionssicher. Vorteile: keine unleserliche Handschrift, schnelle Auswertung, zentrales Ablagesystem, Versionierung."},
{id:99,b:"10.4",t:"Qualitaetsplanung",q:"Was sind Qualitaetskosten?",o:["Alle Kosten die mit Qualitaet zusammenhaengen: Praeventionskosten, Pruefkosten, interne Fehlerkosten, externe Fehlerkosten","Kosten der Qualitaetsabteilung","Nur Fehlerkosten","Nur Pruefkosten"],a:0,f:"Qualitaetskosten: Praevention (Schulungen, QS-System), Pruefung (Tests, Audits), interne Fehler (Ausschuss, Nacharbeit), externe Fehler (Garantie, Rueckruf, Imageschaden). Optimum: mehr Praevention, weniger Fehler."},
{id:100,b:"10.6",t:"PDCA",q:"Was ist Sustainable Improvement?",o:["Umweltverbesserung","Projektverbesserung","Einmalige Verbesserung","Sicherstellung dass Verbesserungen dauerhaft bestehen: Standardisierung, Schulung, Verankerung in Prozessen - verhindert Rueckfall in alte Gewohnheiten"],a:3,f:"Nachhaltige Verbesserung: Verbesserung ohne Standardisierung (Act-Phase) verfaellt nach kurzer Zeit (Rubber-Band-Effekt). SOP anpassen, schulen, Kennzahlen monitoren, regelmaessig pruefen."}
];

let st={},filt=[...Q];
function init(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});render();}
function render(){
  const c=document.getElementById("qc");c.innerHTML="";
  let lb=null;
  filt.forEach(q=>{
    if(q.b!==lb){const d=document.createElement("div");d.className="bh";d.textContent=BN[q.b]||q.b;c.appendChild(d);lb=q.b;}
    c.appendChild(mk(q));
  });up();}
function mk(q){
  const s=st[q.id],d=document.createElement("div"),L=["A","B","C","D"];
  d.className="qc"+(s.done?(s.ok?" ac":" aw"):"");d.id="c"+q.id;
  d.innerHTML=`<div class="qn">FRAGE ${q.id}/${Q.length}</div><div class="qt">${q.t}</div><div class="qq">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt${s.done?" dis":""}${s.done&&i===q.a?" ok":""}${s.done&&!s.ok&&i===s.ci?" ng":""}" onclick="ans(${q.id},${i})"><span class="ol">${L[i]}</span><span>${o}</span></div>`).join("")}</div>
<div class="fbb${s.done?" show "+(s.ok?"cok":"cng"):""}" id="f${q.id}">${s.done?(s.ok?"✅ ":"❌ ")+q.f:""}</div>`;
  return d;}
function ans(id,i){
  const s=st[id];if(s.done)return;
  const q=Q.find(x=>x.id===id);s.done=true;s.ok=i===q.a;s.ci=i;
  const c=document.getElementById("c"+id);c.className="qc "+(s.ok?"ac":"aw");
  c.querySelectorAll(".opt").forEach((el,j)=>{el.classList.add("dis");if(j===q.a)el.classList.add("ok");if(!s.ok&&j===i)el.classList.add("ng");});
  const f=document.getElementById("f"+id);f.textContent=(s.ok?"✅ ":"❌ ")+q.f;f.className="fbb show "+(s.ok?"cok":"cng");up();}
function up(){
  const tot=Q.length,done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  document.getElementById("sd").textContent=ok+"/"+done;
  document.getElementById("pf").style.width=(done/tot*100)+"%";
  document.getElementById("pl").textContent=done+" von "+tot+" beantwortet";}
function fil(t,btn){
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("act"));btn.classList.add("act");
  if(t==="all")filt=[...Q];
  else if(t==="open")filt=Q.filter(q=>!st[q.id].done);
  else if(t==="wrong")filt=Q.filter(q=>st[q.id].done&&!st[q.id].ok);
  else filt=Q.filter(q=>q.b===t);render();}
function shuf(){filt=[...filt].sort(()=>Math.random()-.5);render();}
function rst(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});filt=[...Q];document.querySelectorAll(".fb").forEach((b,i)=>b.classList.toggle("act",i===0));render();document.getElementById("ov").classList.remove("show");}
function showR(){
  const done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  const pct=done>0?Math.round(ok/done*100):0;
  let e="😅",m="Weiter ueben!";
  if(pct>=90){e="🏆";m="Ausgezeichnet!";}else if(pct>=75){e="🎉";m="Sehr gut!";}else if(pct>=60){e="📚";m="Gut weiter so!";}
  document.getElementById("oe").textContent=e;document.getElementById("os").textContent=ok+"/"+done;
  document.getElementById("om").textContent=pct+"% richtig - "+m;
  document.getElementById("ov").classList.add("show");}
function closeR(){document.getElementById("ov").classList.remove("show");}
init();
</script></body></html>
