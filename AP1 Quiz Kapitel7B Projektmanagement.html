<script>
const Q=[
{id:1,b:"7.8",t:"Bedarfsanalyse",q:"Was ist eine Bedarfsanalyse?",o:["Kostenanalyse","Marktanalyse","Risikoanalyse","Systematische Ermittlung des tatsaechlichen Bedarfs und der Anforderungen als Basis fuer Entscheidungen und Projektplanung"],a:3,f:"Bedarfsanalyse: Daten sammeln (Interviews, Umfragen), Anforderungen bewerten und priorisieren, Ergebnisse dokumentieren und mit Stakeholdern abstimmen. Verhindert falsche Investitionen."},
{id:2,b:"7.8",t:"Bedarfsanalyse",q:"Wie wird eine Bedarfsanalyse durchgefuehrt?",o:["Nur durch Kostenvergleich","Erhebung (Interviews, Umfragen, Beobachtung), Analyse (Bewertung und Priorisierung), Dokumentation (Ergebnisse festhalten und abstimmen)","Nur durch interne Schaetzung","Nur durch Marktforschung"],a:1,f:"Bedarfsanalyse-Vorgehen: 1. Erhebung (Interviews, Workshops, Umfragen, Beobachtung), 2. Analyse und Priorisierung der Anforderungen, 3. Dokumentation und Abstimmung mit relevanten Stakeholdern."},
{id:3,b:"7.8",t:"Bedarfsanalyse",q:"Warum ist eine Bedarfsanalyse wichtig?",o:["Pflichtdokument","Nur fuer grosse Projekte","Fuer Buchhaltung","Verhindert falsche Investitionen: nur tatsaechlich benoetiste Funktionen werden entwickelt, Budget wird effizient eingesetzt"],a:3,f:"Ohne Bedarfsanalyse: Systeme werden entwickelt die niemand braucht, Anforderungen sind unklar, Budget wird verschwendet. Mit Bedarfsanalyse: gezielte Investition, hoehere Akzeptanz beim Kunden."},
{id:4,b:"7.8",t:"Bedarfsanalyse",q:"Was sind typische Methoden der Bedarfserhebung?",o:["Nur Befragungen","Nur Dokumentenanalyse","Nur Beobachtung","Interviews, Umfragen, Workshops, Beobachtung, Dokumentenanalyse, Prototyping, Fokusgruppen"],a:3,f:"Methoden: strukturierte Interviews (Einzelgespräche), Umfragen (skalierbar), Workshops (Gruppenarbeit), Beobachtung (echte Ablaeufe), Dokumentenanalyse (bestehende Prozesse), Prototyping (konkretisieren)."},
{id:5,b:"7.8",t:"Bedarfsanalyse",q:"Was ist der Unterschied zwischen Bedarf und Wunsch?",o:["Bedarf: tatsaechlich notwendige Funktion fuer Aufgabenerledigung. Wunsch: optional, nice-to-have, kein direkter Mehrwert fuer Kernaufgaben","Wunsch ist wichtiger","Identisch","Bedarf ist optional"],a:0,f:"Bedarf: ohne diese Funktion kann die Aufgabe nicht erledigt werden (Muss-Anforderung). Wunsch: waere schoen, erleichtert aber nicht zwingend die Arbeit (Kann-Anforderung). Priorisierung wichtig."},
{id:6,b:"7.9",t:"Lasten-/Pflichtenheft",q:"Was ist ein Lastenheft?",o:["Projektplan","Technische Spezifikation des Auftragnehmers","Preisliste","Dokument des Auftraggebers: was er will (Anforderungen und Wuensche aus Kundensicht, WAS und WOFUER)"],a:3,f:"Lastenheft (Requirements Specification): Auftraggeber beschreibt WAS er haben moechte. Technische und nicht-technische Anforderungen. Basis fuer Werkvertrag und fuer das Pflichtenheft des Auftragnehmers."},
{id:7,b:"7.9",t:"Lasten-/Pflichtenheft",q:"Was ist ein Pflichtenheft?",o:["Rechnungsdokument","Abnahmeprotokoll","Anforderungsdokument des Kunden","Dokument des Auftragnehmers: wie er die Anforderungen des Lastenhefts technisch umsetzt (WIE und WOMIT)"],a:3,f:"Pflichtenheft (Functional Specification): Auftragnehmer beschreibt WIE er die Lastenheft-Anforderungen loest. Technische Loesung, Systemarchitektur, Schnittstellen, Testkriterien. Wird Vertragsbestandteil."},
{id:8,b:"7.9",t:"Lasten-/Pflichtenheft",q:"Wer erstellt das Lastenheft?",o:["Auftragnehmer","Auftraggeber (Kunde) - alleine oder in Zusammenarbeit mit dem Auftragnehmer","Externer Berater immer","Gemeinsam zwingend"],a:1,f:"Lastenheft: Auftraggeber erstellt es, ggf. mit Unterstuetzung des Auftragnehmers oder eines Beraters. Es repraesentiert die Kundenperspektive und ist Grundlage fuer Ausschreibungen."},
{id:9,b:"7.9",t:"Lasten-/Pflichtenheft",q:"Wer erstellt das Pflichtenheft?",o:["Auftraggeber","Externer Berater","Gemeinsam zwingend","Auftragnehmer - als Antwort auf das Lastenheft mit konkreter technischer Loesung"],a:3,f:"Pflichtenheft: Auftragnehmer erstellt es als Reaktion auf das Lastenheft. Zeigt wie die Anforderungen technisch umgesetzt werden. Basis fuer Entwicklung und spaetere Abnahme."},
{id:10,b:"7.9",t:"Lasten-/Pflichtenheft",q:"Was ist der Unterschied zwischen Lastenheft und Pflichtenheft?",o:["Lastenheft ist technischer","Lastenheft: WAS will der Auftraggeber (Kundenanforderungen). Pflichtenheft: WIE setzt Auftragnehmer es um (technische Loesung)","Identisch","Pflichtenheft kommt zuerst"],a:1,f:"Lastenheft: Was/Wofuer (Kundensicht). Pflichtenheft: Wie/Womit (technische Loesung). Beispiel: Lastenheft - webbasiertes CRM mit Kundenverwaltung. Pflichtenheft - REST-API, React-Frontend, PostgreSQL-DB."},
{id:11,b:"7.9",t:"Lasten-/Pflichtenheft",q:"Welche Bestandteile hat ein typisches Lastenheft?",o:["Nur Funktionen","Nur technische Specs","Ausgangslage, Ziele, Produkteinsatz, Funktionale Anforderungen, Qualitaetsanforderungen, Lieferumfang, Termine, Budget","Nur Preis und Termin"],a:2,f:"Lastenheft-Inhalte: Ist-Zustand (Ausgangslage), Ziele (warum), Anwendungsbereich, funktionale Anforderungen (Muss/Kann), Qualitaetsanforderungen, Schnittstellen, Termine, Budget, Abnahmekriterien."},
{id:12,b:"7.9",t:"Lasten-/Pflichtenheft",q:"Warum ist das Lastenheft Grundlage eines Werkvertrags?",o:["Nur fuer grosse Projekte","Aus Haftungsgruenden","Gesetzliche Pflicht","Es beschreibt das zu erstellende Werk (Ziel) - Werkvertrag schuldet Ergebnis, Lastenheft definiert dieses Ergebnis"],a:3,f:"Werkvertrag: geschuldet ist ein konkretes Ergebnis (das Werk). Das Lastenheft definiert genau dieses Werk. Abnahme erfolgt anhand der Lastenheft-Anforderungen. Ohne Lastenheft: kein klares Abnahmekriterium."},
{id:13,b:"7.10",t:"Kundenvorgaben",q:"Was sind funktionale Anforderungen?",o:["Beschreiben gewuenschte Funktionen und Eigenschaften des Produkts (z.B. Benutzer kann Passwort zuruecksetzen)","Qualitaetsanforderungen","Technische Infrastruktur","Budget-Vorgaben"],a:0,f:"Funktionale Anforderungen: Was soll das System tun? Konkrete Funktionen, Use Cases, Benutzerinteraktionen. Beispiele: Benutzer kann sich registrieren, System sendet Bestellbestaetigung per E-Mail."},
{id:14,b:"7.10",t:"Kundenvorgaben",q:"Was sind nicht-funktionale Anforderungen?",o:["Zusatzfunktionen","Qualitaetsmerkmale wie Leistung, Sicherheit, Skalierbarkeit, Verfuegbarkeit, Benutzerfreundlichkeit - kein Verhalten sondern Eigenschaften","Optionale Features","Budget-Anforderungen"],a:1,f:"Nicht-funktionale Anforderungen: WIE gut soll das System sein? Performance (Ladezeit <1s), Sicherheit (AES-256), Verfuegbarkeit (99,9%), Skalierbarkeit (1000 gleichzeitige Nutzer), Usability."},
{id:15,b:"7.10",t:"Kundenvorgaben",q:"Was sind technische Vorgaben?",o:["Qualitaetsvorgaben","Funktionale Anforderungen","Spezifikationen zu Hardware, Software, Schnittstellen: z.B. muss auf Windows Server laufen, REST-API, Oracle-Datenbank","Budget-Vorgaben"],a:2,f:"Technische Vorgaben: Betriebssystem, Datenbanktyp, Programmiersprache, API-Protokoll, Hardwareanforderungen, Netzwerkinfrastruktur. Oft durch bestehende IT-Landschaft des Kunden bestimmt."},
{id:16,b:"7.10",t:"Kundenvorgaben",q:"Was sind rechtliche und regulatorische Vorgaben?",o:["Budget-Limits","Compliance-Anforderungen die das System erfuellen muss: DSGVO, Branchenstandards (PCI-DSS, HIPAA), Zertifizierungen, Buchfuehrungspflichten","Technische Specs","Wuensche des Kunden"],a:1,f:"Rechtliche Vorgaben: DSGVO (Datenschutz), PCI-DSS (Zahlungskartenindustrie), ISO 27001 (IT-Sicherheit), GoBD (Buchfuehrung), branchenspezifische Regulierung (Medizin, Finanzsektor)."},
{id:17,b:"7.10",t:"Kundenvorgaben",q:"Wie geht man mit unklaren oder widerspruchlichen Anforderungen um?",o:["Projekt stoppen","Ignorieren","Fruehzeitige Klaerung durch Workshops und Abstimmung mit Kunden, Dokumentation der Entscheidungen, Change-Management fuer spaetere Aenderungen","Selbst entscheiden"],a:2,f:"Unklare Anforderungen: sofort klaeren (nicht spekulieren). Workshops, Prototypen, Beispiele nutzen. Widersprueche: Priorisierung mit Auftraggeber. Alle Entscheidungen dokumentieren."},
{id:18,b:"7.10",t:"Kundenvorgaben",q:"Was ist ein Change Request (CR)?",o:["Ein Statusbericht","Formaler Antrag zur Aenderung des Projektumfangs waehrend des Projekts - wird bewertet, genehmigt und dokumentiert","Eine Abnahme","Ein Fehlerprotokoll"],a:1,f:"Change Request: formaler Prozess fuer Aenderungen. Beschreibt: was soll geaendert werden, warum, welche Auswirkungen auf Budget/Zeit/Qualitaet. Muss von Auftraggeber genehmigt werden."},
{id:19,b:"7.11",t:"Techn. Voraussetzungen",q:"Was sind technische Voraussetzungen eines IT-Systems?",o:["Nur das Betriebssystem","Nur Netzwerkanforderungen","Alle Hard- und Softwareanforderungen die erfuellt sein muessen: OS, CPU, RAM, Speicher, Netzwerk, Softwareabhaengigkeiten","Nur Hardware"],a:2,f:"Technische Voraussetzungen: Betriebssystem (Typ, Version, Architektur), Hardware (CPU, RAM, Speicher, GPU), Netzwerk (Bandbreite, Latenz), Software (Frameworks, Datenbanken, APIs)."},
{id:20,b:"7.11",t:"Techn. Voraussetzungen",q:"Warum sind technische Mindestanforderungen wichtig?",o:["Nur rechtlich","Nur fuer Marketing","Nur fuer Support","Software die auf ungeeigneter Hardware laeuft ist instabil oder gar nicht funktionsfaehig - Mindestanforderungen sichern reibungslosen Betrieb"],a:3,f:"Mindestanforderungen: sicherstellen dass Software wie vorgesehen laeuft. Nicht erfuellt: Abstuerze, Datenverlust, Sicherheitsprobleme. Wichtig fuer Kompatibilitaet und Supportbarkeit."},
{id:21,b:"7.11",t:"Techn. Voraussetzungen",q:"Was sind Netzwerkanforderungen bei IT-Projekten?",o:["Nur WLAN","Nur IP-Adresse","Nur DNS","Mindestbandbreite, Latenzanforderungen, Firewall-Regeln, VPN-Zugang, Protokollunterstuetzung - wichtig fuer Netzwerkanwendungen und Cloud-Dienste"],a:3,f:"Netzwerkanforderungen: Mindestbandbreite (z.B. 100 Mbit/s), maximale Latenz (z.B. <50ms fuer VoIP), offene Ports (z.B. 443 fuer HTTPS), VPN-Unterstuetzung, Proxy-Kompatibilitaet."},
{id:22,b:"7.11",t:"Techn. Voraussetzungen",q:"Was sind Softwareabhaengigkeiten?",o:["Andere Software oder Bibliotheken die eine Anwendung fuer ihren Betrieb benoetigt (z.B. .NET-Framework, Java Runtime, Datenbankserver)","Lizenzkosten","Sicherheitszertifikate","Hardwareanforderungen"],a:0,f:"Softwareabhaengigkeiten: z.B. braucht .NET 8, Java 17, Python 3.11, MySQL 8.0, Node.js 20. Muessen vor Installation vorhanden sein. Paketmanager (npm, pip, Maven) verwalten Abhaengigkeiten automatisch."},
{id:23,b:"7.11",t:"Techn. Voraussetzungen",q:"Was ist Kompatibilitaetspruefung bei IT-Systemen?",o:["Ueberpruefung ob neue Software/Hardware mit bestehenden Systemen zusammenarbeitet (OS, Schnittstellen, Datenformate, Treiber)","Sicherheitspruefung","Qualitaetspruefung","Preisvergleich"],a:0,f:"Kompatibilitaet pruefen: funktioniert neue Software mit bestehendem OS, Browser, Datenbank? Koennen Daten importiert/exportiert werden? Gibt es Schnittstellenprobleme? Proaktive Pruefung verhindert teure Probleme."},
{id:24,b:"7.11",t:"Techn. Voraussetzungen",q:"Was sind Sicherheitsanforderungen als technische Voraussetzung?",o:["Nur Passwort","Nur Backup","Nur Antivirensoftware","Verschluesselung (SSL/TLS, AES), Authentifizierung (2FA, SSO), Zugriffsrechte (RBAC), Firewalls, Schwachstellenscans"],a:3,f:"Sicherheitsanforderungen: Transportverschluesselung (HTTPS/TLS), Datenverschluesselung (AES-256), starke Authentifizierung (2FA), rollenbasierte Zugriffsrechte, regelmaessige Updates, Penetrationstests."},
{id:25,b:"7.12",t:"Budget",q:"Was bedeutet Einhaltung des Budgets im Projekt?",o:["Geplante Finanzmittel werden nicht ueberschritten: detaillierte Planung, regelmaessige Kontrolle, fruehzeitig gegensteuern bei Abweichungen","Budget ist flexibel","Budget nie ueberschreiten egal was","Budget ist Richtwert"],a:0,f:"Budgeteinhaltung: nicht blinder Sparwille, sondern bewusstes Steuern. Detaillierte Planung (alle Kosten erfassen), regelmaessiges Controlling (Plan vs. Ist), fruehzeitige Eskalation bei Problemen."},
{id:26,b:"7.12",t:"Budget",q:"Was sind Massnahmen zur Budgetkontrolle?",o:["Nur fuer grosse Budgets","Nur wenn Budget ueberschritten","Detaillierte Kostenplanung, regelmaessige Budgetueberpruefung (Plan-Ist-Vergleich), Risikomanagement, Kostensenkungsstrategien, Change-Management","Nur jaehrliche Pruefung"],a:2,f:"Budgetkontrolle: fruehzeitige Kalkulation aller Kosten (Personal, Material, Lizenzen), regelmaessiger Soll-Ist-Vergleich durch Controlling, Risikorueckstellungen, Bewertung von Aenderungen auf Budgetauswirkung."},
{id:27,b:"7.12",t:"Budget",q:"Was ist Earned Value Management (EVM)?",o:["Methode zur Projektsteuerung: vergleicht geplanten Wert (PV), erzielten Wert (EV) und tatsaechliche Kosten (AC) - zeigt Kosten- und Zeitabweichungen","Budgetplanung","Gewinnberechnung","Mitarbeiterbewertung"],a:0,f:"EVM: PV (Planned Value) = geplanter Aufwand fuer abgeschlossene Arbeit. EV (Earned Value) = tatsaechlich erbrachter Wert. AC (Actual Cost) = tatsaechliche Kosten. CV = EV-AC (Kostenabweichung). SV = EV-PV (Zeitabweichung)."},
{id:28,b:"7.12",t:"Budget",q:"Was sind Kostensenkungsstrategien im Projekt?",o:["Mitarbeiter entlassen","Budget ignorieren","Qualitaet senken","Ressourcenoptimierung, Lieferantenverhandlungen, unnoetigen Aufwand vermeiden, Prozessoptimierung, Scope reduzieren"],a:3,f:"Kostensenkung: Ressourcen effizienter einsetzen, mit Lieferanten besser verhandeln, unnoetige Ueberstunden vermeiden, Scope priorisieren (Nichtwesentliches verschieben), Open-Source statt teurer Lizenzen."},
{id:29,b:"7.12",t:"Budget",q:"Was ist eine Risikoreserve (Contingency Reserve)?",o:["Geheimfonds","Geplante Budgetreserve fuer bekannte Risiken - typisch 10-20% des Projektbudgets","Unbekannte Kosten","Gewinne"],a:1,f:"Contingency Reserve: Puffer fuer bekannte Risiken die eintreten koennen. Management Reserve: fuer unbekannte unbekannte Risiken. Beide sind Teil des genehmigten Budgets, aber separat ausgewiesen."},
{id:30,b:"7.12",t:"Budget",q:"Was ist Kostenueberwachung (Cost Monitoring)?",o:["Nur Jahresabschluss","Regelmaessiger Vergleich von geplanten und tatsaechlichen Kosten - fruehzeitig Abweichungen erkennen und gegensteuern","Nur fuer Controlling","Nur bei Problemen"],a:1,f:"Kostenueberwachung: tatsaechliche Kosten regelmaessig erfassen, mit Plankosten vergleichen. Abweichungsanalyse: warum teurer/guenstiger? Prognose: wird Budget bis Ende reichen? Fruehzeitig eskalieren."},
{id:31,b:"7.13",t:"Veraenderungsprozesse",q:"Was ist Change Management?",o:["Projektaenderungen","Gesteuerter Prozess zur Umsetzung von Veraenderungen in Unternehmen: Strukturen, Technologien oder Kulturen werden geplant und begleitet","Software-Updates verwalten","Aenderungsantraege"],a:1,f:"Change Management: Menschen durch Veraenderungsprozesse begleiten. Nicht nur Technik aendern, sondern Menschen mitnehmen. Kommunikation, Partizipation, Schulung, Umgang mit Widerstand."},
{id:32,b:"7.13",t:"Veraenderungsprozesse",q:"Was sind typische Ursachen fuer Widerstand gegen Veraenderung?",o:["Zeitmangel","Kostenproblem","Angst vor Unbekanntem, Angst vor Jobverlust, schlechte Kommunikation, schlechte Erfahrungen frueherer Veraenderungen, Angst vor Mehrbelastung","Faulheit"],a:2,f:"Widerstandsursachen: Angst vor Unbekanntem (neue Technologie), Verlustangst (Arbeitsplatz, Status, Einfluss), fehlende Kommunikation (Gruende unklar), negative Erfahrungen, Angst vor mehr Arbeit ohne Nutzen."},
{id:33,b:"7.13",t:"Veraenderungsprozesse",q:"Wer sind Promotoren im Veraenderungsprozess?",o:["Alle Mitarbeiter","Nur externe Berater","Vertreter des Managements","Personen die den Wandel aktiv unterstuetzen und vorantreiben - werden als Change-Agents eingesetzt um andere zu motivieren"],a:3,f:"Promotoren: begeistert vom Wandel, treiben ihn aktiv voran. Strategie: als Change-Agents und Multiplikatoren einsetzen. Sie koennen Kollegen motivieren und Bedenken aus eigener Erfahrung entkraeften."},
{id:34,b:"7.13",t:"Veraenderungsprozesse",q:"Wer sind Bremser im Veraenderungsprozess?",o:["Promotoren","Saboteure","Personen die den Wandel bewusst oder unbewusst verlangsamen - Strategie: Ursachen analysieren, gezielt einbinden, Bedenken ausraeumen","Neutrale"],a:2,f:"Bremser: verzoegern Prozess, oft aus Angst oder Unsicherheit (nicht boesartig). Strategie: Ursachen verstehen, persoenlich gespraechen, konkrete Vorteile aufzeigen, in Entscheidungen einbinden."},
{id:35,b:"7.13",t:"Veraenderungsprozesse",q:"Wer sind Skeptiker im Veraenderungsprozess?",o:["Aktive Saboteure","Personen die an der Veraenderung zweifeln aber offen fuer rationale Argumente sind - Strategie: Transparenz, sachliche Informationen","Promotoren","Widerstaendler"],a:1,f:"Skeptiker: zweifeln, sind aber grundsaetzlich offen. Brauchen Fakten und Beweise. Strategie: transparente Kommunikation, Daten und Erfolgsbeispiele liefern, Pilotprojekte zeigen."},
{id:36,b:"7.13",t:"Veraenderungsprozesse",q:"Wer sind Widerstaendler im Veraenderungsprozess?",o:["Skeptiker","Neutrale Beobachter","Bremser","Personen die den Wandel aktiv ablehnen und dagegen arbeiten - Strategie: offenes Gespraech, Aengste adressieren, letzte Konsequenz: Trennung"],a:3,f:"Widerstaendler: aktiv gegen den Wandel. Schwerste Gruppe. Strategie: offenes Gespraech, tiefe Aengste und Widerstaende verstehen und adressieren. Wenn keine Loesung: moeglicherweise Trennung."},
{id:37,b:"7.13",t:"Veraenderungsprozesse",q:"Was ist eine Gap-Analyse im Veraenderungsmanagement?",o:["Marktanalyse","Analyse von Luecken im Budget","Analyse des Unterschieds zwischen Ist-Zustand und Soll-Zustand - zeigt was veraendert werden muss um das Ziel zu erreichen","Mitarbeiteranalyse"],a:2,f:"Gap-Analyse: Ist-Zustand (wo stehen wir?) vs. Soll-Zustand (wo wollen wir hin?). Gap = Unterschied = was muss veraendert werden. Grundlage fuer Change-Massnahmen und Planung."},
{id:38,b:"7.13",t:"Veraenderungsprozesse",q:"Was ist das Kotter-8-Phasen-Modell?",o:["Projektphasenmodell","Teambildungsmodell","Scrum-Variante","Change-Management-Modell von John Kotter: 8 Schritte fuer erfolgreichen Wandel von Dringlichkeit schaffen bis Veraenderung verankern"],a:3,f:"Kotter 8 Phasen: 1. Dringlichkeit erzeugen 2. Fuehrungsteam bilden 3. Vision entwickeln 4. Vision kommunizieren 5. Hindernisse beseitigen 6. Kurzfristige Erfolge erzielen 7. Erfolge ausbauen 8. Veraenderung verankern."},
{id:39,b:"7.13",t:"Veraenderungsprozesse",q:"Was ist Mitarbeiterqualifizierung bei Veraenderungsprozessen?",o:["Nur externe Schulungen","Nur bei IT-Projekten","Nur Online-Kurse","Schulungen, Workshops, Coaching und Mentoring um Mitarbeiter auf neue Prozesse/Technologien vorzubereiten - reduziert Widerstand"],a:3,f:"Qualifizierung: Schulungen (Grundwissen), Workshops (praktisch), E-Learning (flexibel, skalierbar), Coaching (individuell), Mentoring (erfahrener Kollege begleitet). Reduziert Angst vor Neuem."},
{id:40,b:"7.13",t:"Veraenderungsprozesse",q:"Was ist eine Kommunikationsstrategie im Change Management?",o:["Interne E-Mails","Pressemitteilung","Aushang am Schwarzen Brett","Plan welche Stakeholder wann, wie oft und in welcher Form ueber den Wandel informiert werden - verhindert Geruechte und Unsicherheit"],a:3,f:"Kommunikationsstrategie: wer bekommt welche Info wann und wie? Zielgruppenspezifisch kommunizieren (Management anders als Mitarbeiter). Fruehzeitig, transparent, ehrlich - auch unangenehme Wahrheiten."},
{id:41,b:"7.14",t:"Leistungsuebergabe",q:"Was ist Leistungsuebergabe?",o:["Statusmeeting","Zwischenbericht","Projektabbruch","Formaler Abschluss eines Projekts: erbrachte Leistung wird an Auftraggeber uebergeben und geprueft ob Anforderungen erfuellt wurden"],a:3,f:"Leistungsuebergabe: formaler Akt. Auftragnehmer liefert Ergebnis, Auftraggeber prueft und nimmt formal ab. Rechtlich relevant: Abnahme = Beginn der Gewaehrleistungsfrist, Gefahruebergang, Faelligkeit des Werklohns."},
{id:42,b:"7.14",t:"Leistungsuebergabe",q:"Was ist ein Abnahmeprotokoll?",o:["Angebotsdokument","Rechnungsbeleg","Lieferschein","Rechtlich relevantes Dokument das die Leistungsuebergabe dokumentiert: Liefergegenstand, Pruefkriterien, Maengelliste, Unterschriften beider Parteien"],a:3,f:"Abnahmeprotokoll: Nachweis der vertragsgemassen Erfuellung. Inhalt: was wurde geliefert, welche Pruefungen, welche Maengel (mit Fristen), Ergebnis (angenommen/abgelehnt), Datum, Unterschriften."},
{id:43,b:"7.14",t:"Leistungsuebergabe",q:"Warum ist das Abnahmeprotokoll rechtlich wichtig?",o:["Nur fuer Controlling","Pflicht durch Gesetz","Nur interne Dokumentation","Nachweis fuer Erfuellung der Vertragspflichten - loest Faelligkeit des Zahlungsanspruchs aus, Gefahruebergang, Beginn Gewaehrleistungsfrist"],a:3,f:"Abnahme: 1. Werklohn wird faellig. 2. Gefahruebergang (Auftraggeber traegt Verlustrisiko). 3. Beginn der Gewaehrleistungsfrist (2 Jahre). 4. Beweislastumkehr (Auftraggeber muss Maengel beweisen)."},
{id:44,b:"7.14",t:"Leistungsuebergabe",q:"Was ist ein Sachmangel?",o:["Falschlieferung","Rechtlicher Anspruch Dritter","Minderlieferung","Physische oder funktionale Defekte der Leistung: Produkt funktioniert nicht wie vereinbart, hat Fehler oder entspricht nicht Spezifikationen"],a:3,f:"Sachmangel: Ist-Zustand der Leistung weicht von Soll-Zustand ab. Offene Maengel: sofort erkennbar. Versteckte Maengel: erst spaeter erkennbar. Beide begruenden Gewaehrleistungsansprueche."},
{id:45,b:"7.14",t:"Leistungsuebergabe",q:"Was ist ein Rechtsmangel?",o:["Technischer Fehler","Dritte haben Ansprueche an der gelieferten Sache (z.B. Patentrechte, Lizenzrechte) - Auftraggeber kann Sache nicht uneingeschraenkt nutzen","Formfehler im Vertrag","Lieferverzoegerung"],a:1,f:"Rechtsmangel: z.B. gelieferte Software verletzt Patente eines Dritten, Lieferant hatte keine Rechte an verkauften Lizenzen. Auftraggeber haftet gegenueber Drittem und kann Verkaeufer in Regress nehmen."},
{id:46,b:"7.14",t:"Leistungsuebergabe",q:"Was ist Schlechtleistung bei der Leistungsuebergabe?",o:["Leistung erbracht aber mangelhaft: fehlerhafte Verarbeitung, unzureichende Qualitaet, nicht erfuellte Anforderungen","Nichts geliefert","Falsches Produkt","Falsche Menge"],a:0,f:"Schlechtleistung: Leistung vorhanden aber mangelhaft. Beispiele: Software hat kritische Bugs, Dokument nicht in vereinbartem Format, Leistung nicht in vereinbarter Qualitaet. Gewaehrleistungsansprueche entstehen."},
{id:47,b:"7.14",t:"Leistungsuebergabe",q:"Was ist eine Falschlieferung?",o:["Falsche Menge","Schadhaftes Produkt","Verspaetete Lieferung","Ein anderes als das bestellte Produkt wurde geliefert - Verwechslung in Logistik, Fehlkommunikation, falsche Artikelnummer"],a:3,f:"Falschlieferung: geliefert wurde etwas anderes als bestellt. Ursachen: Verwechslung, Fehlkommunikation, falsche Artikelnummern. Auftraggeber muss Ware zurueck und bekommt richtiges Produkt."},
{id:48,b:"7.14",t:"Leistungsuebergabe",q:"Was ist eine Minderlieferung?",o:["Verspaetete Lieferung","Falsche Ware","Schadhaftes Produkt","Gelieferte Menge ist geringer als bestellt - fehlende Teilmenge muss nachgeliefert werden"],a:3,f:"Minderlieferung: Menge kleiner als bestellt. Ursachen: Fehlberechnungen, Verpackungsfehler, Produktionsprobleme. Auftraggeber kann fehlende Menge einfordern oder anteiligen Preisabzug verlangen."},
{id:49,b:"7.14",t:"Leistungsuebergabe",q:"Was ist der Unterschied zwischen offenen und versteckten Maengeln?",o:["Kein Unterschied","Versteckte Maengel sind selten","Offene Maengel sind schlimmer","Offene Maengel: sofort bei Abnahme erkennbar und muss beruecksichtigt werden. Versteckte Maengel: erst spaeter entdeckt, trotzdem Gewaehrleistung falls bei Abnahme schon vorhanden"],a:3,f:"Offene Maengel: bei sorgfaeltiger Abnahme erkennbar. Im Abnahmeprotokoll festhalten! Versteckte Maengel: bei Abnahme nicht erkennbar, treten spaeter auf. Gewaehrleistungsfrist gilt fuer beide."},
{id:50,b:"7.14",t:"Leistungsuebergabe",q:"Was sind Abnahmekriterien?",o:["Preisvereinbarungen","Vorab definierte Pruefpunkte anhand derer Auftraggeber feststellt ob Leistung vertragsgerecht ist - Basis fuer Abnahme oder Ablehnung","Zahlungsbedingungen","Liefertermine"],a:1,f:"Abnahmekriterien: klar und messbar definiert. Beispiele: Software startet fehlerfrei, alle Testfaelle bestanden, Ladezeit unter 2 Sekunden, alle Anforderungen aus Lastenheft erfuellt."},
{id:51,b:"7.15",t:"Leistungserbringung",q:"Was ist ein Soll-Ist-Vergleich?",o:["Kostenvergleich","Jahresplanung vs. Jahresabschluss","Vergleich der tatsaechlich erbrachten Leistung (Ist) mit den geplanten Vorgaben (Soll) - ermoeglicht fruehzeitige Problemerkennung","Angebotsbewertung"],a:2,f:"Soll-Ist-Vergleich: Plan (Zeit, Budget, Qualitaet) vs. Realitaet. Regelmaessig durchfuehren (nicht erst am Ende). Abweichungen fruehzeitig erkennen und gegensteuern. Basis fuer Projektsteuerung."},
{id:52,b:"7.15",t:"Leistungserbringung",q:"Was ist eine Abweichungsanalyse?",o:["Fehlersuche in Code","Budgetplanung","Wenn Soll-Ist-Vergleich Abweichungen zeigt: Ursachenanalyse (warum?), Auswirkung (wie gross?), Massnahmen (was tun?)","Risikoanalyse"],a:2,f:"Abweichungsanalyse: 1. Abweichung feststellen (wie gross?), 2. Ursache analysieren (warum?), 3. Einmalig oder systematisch?, 4. Prognose (wie entwickelt sich das?), 5. Gegenmassnahmen ableiten."},
{id:53,b:"7.15",t:"Leistungserbringung",q:"Was ist ein Fortschrittsbericht (Status Report)?",o:["Abschlussbericht","Regelmaessiger Bericht ueber Projektstatus: was wurde erreicht, wo stehen wir bei Budget/Zeit/Qualitaet, welche Risiken, naechste Schritte","Jahresbericht","Risikoregister"],a:1,f:"Statusbericht: taeglich/woechentlich/monatlich je nach Bedarf. Inhalt: erledigte Aufgaben, Fortschritt in % oder Meilensteinen, Budget-Status, Risikoentwicklung, naechste Schritte, Eskalationsbedarf."},
{id:54,b:"7.15",t:"Leistungserbringung",q:"Was ist Qualitaetssicherung bei der Leistungserbringung?",o:["Kundenbefragung","Fehler beheben","Abnahme","Praeventive Massnahmen um sicherzustellen dass Anforderungen erfuellt werden: Reviews, Tests, Pruefungen waehrend der Entwicklung"],a:3,f:"QS (Qualitaetssicherung): praeventiv, waehrend der Entwicklung. Reviews (Code, Dokumente), Tests (Unit, Integration, System), Checklisten, Standards. Ziel: Fehler finden bevor sie teuer werden."},
{id:55,b:"7.15",t:"Leistungserbringung",q:"Was ist Qualitaetskontrolle?",o:["Reaktive Pruefung des fertigen Produkts auf Fehler und Einhaltung von Qualitaetsstandards (Gegensatz zu praeventiver QS)","Qualitaetssicherung","Qualitaetsplanung","Qualitaetsmanagement"],a:0,f:"Qualitaetskontrolle: reaktiv, prueft fertiges Ergebnis. Inspektion, Tests, Audits. Unterschied zu QS: QS verhindert Fehler (Prozesse), QK findet Fehler (Ergebnis). Beide sind notwendig."},
{id:56,b:"7.15",t:"Leistungserbringung",q:"Was ist Projektcontrolling?",o:["Nur Zeitcontrolling","Regelmaessige Ueberwachung und Steuerung von Budget, Zeit und Qualitaet - fruehzeitige Erkennung von Abweichungen und Einleitung von Gegenmassnahmen","Buchhaltung fuer Projekte","Nur Kostencontrolling"],a:1,f:"Projektcontrolling: Plan-Ist-Vergleich fuer alle drei Dimensionen (Kosten, Zeit, Qualitaet). Fruehwarnsystem, Berichtswesen, Prognoseerstellung. Unterschied: Controlling steuert, Buchhaltung dokumentiert."},
{id:57,b:"7.15",t:"Leistungserbringung",q:"Was ist ein Meilenstein-Trendanalyse?",o:["Grafische Darstellung wie sich geplante Meilensteintermine im Zeitverlauf verschieben - zeigt ob Projekt fruehzeitig Verzoegerungen entwickelt","Risikoanalyse","Netzplananalyse","Analyse von Projektqualitaet"],a:0,f:"Meilenstein-Trendanalyse (MTA): fuer jeden Meilenstein wird regelmaessig der erwartete Termin eingetragen. Steigt die Linie: Verzoegerung. Bleibt konstant: alles im Plan. Fruehwarnsystem."},
{id:58,b:"7.15",t:"Leistungserbringung",q:"Was ist eine Projektdokumentation?",o:["Nur Protokolle","Nur Vertraege","Alle projektrelevanten Dokumente waehrend des gesamten Projekts: Planung, Protokolle, Aenderungen, Abnahmen, Berichte","Nur Abschlussdokumentation"],a:2,f:"Projektdokumentation: Projektauftrag, Netzplan/Gantt, Statusberichte, Besprechungsprotokolle, Change Requests, Abnahmeprotokolle, Risikoregister. Wichtig fuer Nachvollziehbarkeit und spaetere Projekte."},
{id:59,b:"7.15",t:"Leistungserbringung",q:"Was ist Eskalation im Projektmanagement?",o:["Projektabbruch","Mitarbeiterfuehrung","Weiterleitung eines Problems an hoehere Entscheidungsebene wenn es auf aktueller Ebene nicht loesbar ist - notwendig bei zu grossen Risiken oder Konflikten","Konflikt im Team"],a:2,f:"Eskalation: Problem kann auf PM-Ebene nicht geloest werden, wird an Steuerungskomitee oder Management weitergeleitet. Eskalation ist kein Versagen! Besser fruehzeitig eskalieren als Problem verschweigen."},
{id:60,b:"7.15",t:"Leistungserbringung",q:"Was ist ein Steuerungskomitee (Steering Committee)?",o:["Technisches Team","Gremium aus Entscheidungstraegern (Management, Auftraggeber) das Projekte ueberwacht, strategische Entscheidungen trifft und Eskalationen bearbeitet","Projektteam","Entwicklergruppe"],a:1,f:"Steering Committee: regelmaessige Sitzungen, Projektstatusberichte, strategische Entscheidungen (Budget, Scope-Aenderungen), Eskalationsinstanz. Verbindet Projekt mit Unternehmensstrategie."},
{id:61,b:"7.8",t:"Bedarfsanalyse",q:"Was ist eine Anforderungspriorisierung?",o:["Sortierung der Anforderungen nach Wichtigkeit und Dringlichkeit (z.B. Muss/Kann, MoSCoW-Methode) um begrenzte Ressourcen optimal einzusetzen","Kostenprioritaet","Alle Anforderungen sind gleich wichtig","Technische Prioritaet"],a:0,f:"MoSCoW-Methode: Must Have (unbedingt noetig), Should Have (wichtig aber nicht kritisch), Could Have (nice to have), Won't Have (jetzt nicht). Hilft bei begrenztem Budget und Zeit zu priorisieren."},
{id:62,b:"7.9",t:"Lasten-/Pflichtenheft",q:"Was ist ein Use Case (Anwendungsfall)?",o:["Ein Testfall","Ein Fehlerfall","Ein Feature-Request","Beschreibung einer Interaktion zwischen Benutzer und System zur Erreichung eines bestimmten Ziels - haeufig in Lastenhefte aufgenommen"],a:3,f:"Use Case: Akteur (wer), Ziel (was will er erreichen), Ablauf (Schritte), Varianten (Fehler, Alternativen). Beispiel: Kunde bestellt Produkt - von Warenkorb bis Bestellbestaetigung."},
{id:63,b:"7.10",t:"Kundenvorgaben",q:"Was ist Requirements Engineering?",o:["Software-Entwicklung","Systematischer Prozess zur Erhebung, Analyse, Dokumentation und Verwaltung von Anforderungen - Basis fuer erfolgreiche Systeme","Hardware-Engineering","Testing"],a:1,f:"Requirements Engineering: Erhebung (wer braucht was?), Analyse (Konflikte, Prioritaeten), Spezifikation (Lastenheft/Pflichtenheft), Validierung (sind Anforderungen korrekt?), Management (Aenderungen verwalten)."},
{id:64,b:"7.11",t:"Techn. Voraussetzungen",q:"Was ist eine Systemlandschaft?",o:["Naturlandschaft fuer Rechenzentren","Gesamtheit aller IT-Systeme, Anwendungen und deren Verbindungen in einer Organisation - neue Systeme muessen darin integriert werden","Netzwerkplan","Organigramm"],a:1,f:"Systemlandschaft (IT-Landschaft): alle Anwendungen, Datenbanken, Schnittstellen und Infrastrukturkomponenten. Neue Systeme muessen in bestehende Landschaft integriert werden (Kompatibilitaet, Schnittstellen)."},
{id:65,b:"7.12",t:"Budget",q:"Was ist Projektfinanzierung?",o:["Wie das Projekt Geld verdient","Projektabrechnung","Woher kommen die Mittel fuer das Projekt: internes Budget, externe Foerderung, Kredit, Eigenkapital - beeinflusst Flexibilitaet und Kontrolle","Nur interne Budgets"],a:2,f:"Projektfinanzierung: intern (aus Unternehmensbudget), extern (Bankkredite, Investoren, Foerderprogramme, EU-Mittel). Art der Finanzierung beeinflusst Reporting-Anforderungen und Flexibilitaet."},
{id:66,b:"7.13",t:"Veraenderungsprozesse",q:"Was ist die ADKAR-Methode?",o:["Change-Management-Modell: Awareness (Bewusstsein), Desire (Wunsch), Knowledge (Wissen), Ability (Faehigkeit), Reinforcement (Verankerung)","Eine Scrum-Variante","Teambuilding-Modell","Projektphasenmodell"],a:0,f:"ADKAR: Individuen durchlaufen 5 Phasen bei Veraenderung. Awareness (warum Wandel?), Desire (will ich mitmachen?), Knowledge (weiss ich wie?), Ability (kann ich es umsetzen?), Reinforcement (bleibt es so?)."},
{id:67,b:"7.14",t:"Leistungsuebergabe",q:"Was ist eine Maeengelruege bei IT-Projekten?",o:["Normalfeedback","Schriftliche Mitteilung des Auftraggebers an Auftragnehmer ueber festgestellte Maengel - Voraussetzung fuer Gewaehrleistungsansprueche","Projektabschluss","Kundenbeschwerden"],a:1,f:"Maengelruege: schriftlich, zeitnah (bei offensichtlichen Maengeln sofort), konkret (welcher Mangel, wo, wie). Im B2B-Bereich (HGB): unverzuegliche Ruege Pflicht, sonst Rechtsverlust."},
{id:68,b:"7.15",t:"Leistungserbringung",q:"Was ist technische Schulden (Technical Debt)?",o:["Finanzschulden durch IT","Lizenzschulden","Projektschulden","Aufgeschobene Qualitaetsverbesserungen: schnelle aber schlechte Loesung jetzt = spaeter mehr Aufwand fuer Verbesserung"],a:3,f:"Technical Debt: bewusste oder unbewusste schlechte Designentscheidungen erzeugen spaetere Mehrarbeit. Wie Zinseszins: wird ignoriert, wachsen Schulden. Regelmaessiges Refactoring noetig."},
{id:69,b:"7.13",t:"Veraenderungsprozesse",q:"Was ist Organizational Change Management (OCM)?",o:["Technisches Change Management","Umfassende Begleitung organisationaler Veraenderungen: Kommunikation, Schulung, Stakeholder-Management, Widerstandsbehandlung auf Unternehmensebene","Projektaenderungen","Verwaltung von Aenderungsantraegen"],a:1,f:"OCM: systematischer Ansatz zur Begleitung von Veraenderungen auf Unternehmensebene. Beinhaltet: Stakeholder-Analyse, Kommunikationsplan, Schulungsplan, Widerstandsmanagement, Erfolgsmetriken."},
{id:70,b:"7.10",t:"Kundenvorgaben",q:"Was ist ein Prototyp in der Anforderungsphase?",o:["Finales Produkt","Testversion","Fruehe, oft vereinfachte Version des Systems um Anforderungen zu konkretisieren und Feedback einzuholen - verhindert Missverstaendnisse","Dummy-Daten"],a:2,f:"Prototyp: konkretisiert abstrakte Anforderungen. Kunden koennen sehen und anfassen was sie bestellt haben. Fruehes Feedback reduziert teure spaetere Aenderungen. Arten: Paper-Prototyp, Klickprototyp, funktionaeler Prototyp."},
{id:71,b:"7.9",t:"Lasten-/Pflichtenheft",q:"Was ist der Unterschied zwischen funktionalen und nicht-funktionalen Anforderungen im Lastenheft?",o:["Funktional ist wichtiger","Nicht-funktional ist technisch","Funktional: was das System tun soll (Verhalten). Nicht-funktional: wie gut es das tun soll (Qualitaetsmerkmale wie Performance, Sicherheit)","Kein Unterschied"],a:2,f:"Funktional (Was): Benutzer kann Produkt in Warenkorb legen. Nicht-funktional (Wie gut): Seite ladet in unter 2 Sekunden bei 1000 gleichzeitigen Nutzern. Beide sind essentiell im Lastenheft."},
{id:72,b:"7.12",t:"Budget",q:"Was ist ein Projektkostenplan?",o:["Detaillierte Aufstellung aller geplanten Projektkosten nach Kostenarten und Zeitpunkt - Basis fuer Finanzierung und Controlling","Personalplan","Ressourcenplan","Jahresbudgetplan"],a:0,f:"Projektkostenplan: alle Kosten nach Kategorie (Personal, Material, Lizenzen, Reisen, externe Dienstleistungen) und zeitlicher Verteilung. Cashflow-Planung: wann wird wieviel Geld benoetigt?"},
{id:73,b:"7.14",t:"Leistungsuebergabe",q:"Was ist formelle vs. informelle Abnahme?",o:["Informell ist ausreichend","Formell ist besser","Formelle Abnahme: schriftliches Abnahmeprotokoll, rechtlich bindend. Informelle Abnahme: muendliche Zustimmung, rechtlich unsicher fuer Auftragnehmer","Identisch"],a:2,f:"Formelle Abnahme: schriftliches Abnahmeprotokoll, klar definierte Pruefkriterien, Unterschriften. Rechtlich eindeutig. Auftragnehmer sollte immer formelle Abnahme anstreben fuer Rechtssicherheit."},
{id:74,b:"7.15",t:"Leistungserbringung",q:"Was ist ein Burndown-Chart?",o:["Grafische Darstellung verbleibender Arbeit ueber Zeit im Sprint oder Projekt - zeigt ob Team im Plan ist","Gantt-Diagramm","Kostendiagramm","Risikodiagramm"],a:0,f:"Burndown-Chart: Y-Achse = verbleibende Arbeit (Story Points, Stunden), X-Achse = Zeit. Ideallinie zeigt gleichmaessigen Fortschritt. Kurve darUeber: zu langsam. DarUnter: schneller als geplant."},
{id:75,b:"7.8",t:"Bedarfsanalyse",q:"Was ist eine Stakeholder-Befragung in der Bedarfsanalyse?",o:["Marktforschung","Kundenbefragung nur","Mitarbeiterbewertung","Strukturierte Interviews oder Umfragen mit allen relevanten Interessengruppen um deren Beduerfnisse und Anforderungen zu erheben"],a:3,f:"Stakeholder-Befragung: alle Betroffenen (nicht nur Auftraggeber) befragen. Endnutzer, IT-Admin, Management, Datenschutzbeauftragter. Unterschiedliche Perspektiven ergeben vollstaendigeres Bild."},
{id:76,b:"7.11",t:"Techn. Voraussetzungen",q:"Was ist eine Architekturpruefung?",o:["Coderevision","Bewertung ob geplante technische Architektur die Anforderungen erfuellt: Skalierbarkeit, Sicherheit, Wartbarkeit, Performance, Integrierbarkeit","Lizenzkontrolle","Gebaeudeinspektion"],a:1,f:"Architekturpruefung (Architecture Review): vor Umsetzung pruefen ob die geplante Systemarchitektur alle nicht-funktionalen Anforderungen erfuellen kann. Spart spaetere teure Umbauarbeiten."},
{id:77,b:"7.13",t:"Veraenderungsprozesse",q:"Was ist ein Change-Agent?",o:["Person die Veraenderungsprozesse aktiv vorantreibt und andere dabei unterstuetzt - oft Promotoren die als Multiplikatoren eingesetzt werden","Jemand der Aenderungsantraege stellt","Manager immer","Externer Berater zwingend"],a:0,f:"Change-Agent: Promotor der als Multiplikator eingesetzt wird. Kann Mitarbeiter sein (glaubwuerdiger als Management). Aufgaben: Wandel erklaeren, Bedenken aufnehmen, Kollegen motivieren, Feedback einsammeln."},
{id:78,b:"7.15",t:"Leistungserbringung",q:"Was ist ein Projektabschlussbericht?",o:["Zusammenfassung des gesamten Projekts: Zielerreichung, Budget, Zeit, Lessons Learned, Empfehlungen fuer kuenftige Projekte","Angebotsdokument","Kuendigungsschreiben","Statusbericht"],a:0,f:"Projektabschlussbericht: Soll-Ist-Vergleich (Ziele, Budget, Zeit), Lessons Learned, Offene Punkte, Empfehlungen. Wichtig fuer institutionelles Gedaechtnis und kuenftige Projektplanung."},
{id:79,b:"7.9",t:"Lasten-/Pflichtenheft",q:"Was sind Schnittstellen-Anforderungen im Lastenheft?",o:["Interne Programmschnittstellen","Datenbankschemas","Anforderungen an Verbindungen zu anderen Systemen: Welche Systeme muessen integriert werden? Welche Daten werden ausgetauscht? Welche Protokolle?","Benutzeroberflaechenanforderungen"],a:2,f:"Schnittstellen-Anforderungen: externe Systeme (SAP, CRM, ERP), Datenformate (XML, JSON, CSV), Protokolle (REST, SOAP, SFTP), Authentifizierung, Haeufigkeit und Volumen des Datenaustauschs."},
{id:80,b:"7.10",t:"Kundenvorgaben",q:"Was ist ein Requirement Traceability Matrix (RTM)?",o:["Eine Anforderungsliste","Testplan","Dokument das jede Anforderung mit ihren Tests, Design-Elementen und Implementierungen verknuepft - sichert vollstaendige Umsetzung und Testabdeckung","Abnahmeprotokoll"],a:2,f:"RTM: verfolgt jede Anforderung von Lastenheft bis Test. Sichert: alle Anforderungen sind implementiert, alle sind getestet. Wichtig fuer regulierte Branchen (Medizin, Luftfahrt, Banken)."},
{id:81,b:"7.8",t:"Bedarfsanalyse",q:"Was ist eine Ist-Analyse?",o:["Zukunftsplanung","Kostenanalyse","Erfassung und Dokumentation des aktuellen Zustands von Prozessen, Systemen und Organisation - Ausgangspunkt fuer Verbesserungen","Sofortanalyse"],a:2,f:"Ist-Analyse: Was haben wir aktuell? Wie laufen Prozesse? Welche Systeme existieren? Welche Probleme gibt es? Basis fuer Soll-Konzept. Ohne Ist-Analyse: Gefahr Bestehendes zu verschlechtern oder doppelt zu bauen."},
{id:82,b:"7.11",t:"Techn. Voraussetzungen",q:"Was ist eine Testumgebung?",o:["Die Produktionsumgebung","Separate IT-Umgebung die der Produktionsumgebung aehnelt und fuer Tests von Software vor dem Go-Live genutzt wird","Backup-System","Entwicklungsrechner"],a:1,f:"Testumgebung (Staging): isolierte Umgebung fuer Tests. Entdeckt Fehler bevor sie Produktionsnutzer betreffen. Typisch: Entwicklungsumgebung > Testumgebung > Staging > Produktion (4 Stufen)."},
{id:83,b:"7.14",t:"Leistungsuebergabe",q:"Was ist ein Go-Live?",o:["Abnahme","Projektabschluss","Inbetriebnahme des neuen Systems fuer Endnutzer - Uebergang von Test- zu Produktionsbetrieb","Sprint-Review"],a:2,f:"Go-Live: das neue System geht in den produktiven Betrieb. Kritischer Moment: braucht gute Planung, Rollback-Plan (falls Probleme), intensive Unterstuetzung in ersten Tagen (Hypercare-Phase)."},
{id:84,b:"7.15",t:"Leistungserbringung",q:"Was ist eine Hypercare-Phase?",o:["Zeitraum direkt nach Go-Live mit erhoehter Unterstuetzung und Monitoring bis System stabil laeuft","Testphase","Intensive Dokumentationsphase","Projektabschlussphase"],a:0,f:"Hypercare: 1-4 Wochen nach Go-Live. Team ist in erhoehter Bereitschaft, schnelle Reaktion auf Probleme, intensive Nutzer-Unterstuetzung. Danach: Uebergang in normalen Betrieb (Business as Usual)."},
{id:85,b:"7.12",t:"Budget",q:"Was ist ein Burn Rate?",o:["Projektqualitaet","Mitarbeiterleistung","Geschwindigkeit mit der das Projektbudget verbraucht wird (Euro pro Woche/Monat) - zeigt ob Budget bis Projektende reicht","Zeitverbrauch"],a:2,f:"Burn Rate: Budget-Verbrauchsrate. Beispiel: 100.000 EUR Budget, 10.000 EUR/Monat Burn Rate = 10 Monate Laufzeit. Wenn Burn Rate > geplant: Budget wird vor Ende verbraucht - Gegenmassnahmen noetig."},
{id:86,b:"7.13",t:"Veraenderungsprozesse",q:"Was ist eine Change Readiness Assessment?",o:["Bewertung von Aenderungsantraegen","Bewertung wie bereit eine Organisation fuer Veraenderungen ist: Kultur, Erfahrungen, Ressourcen, Widerstandspotenzial - vor Beginn des Wandels","Risikobewertung","Technische Pruefung"],a:1,f:"Change Readiness: Vor dem Wandel pruefen wie gross das Veraenderungspotenzial ist. Fragen: Hat die Organisation Erfahrung mit Wandel? Ist Fuehrung hinter dem Wandel? Wie gross ist der Widerstand?"},
{id:87,b:"7.9",t:"Lasten-/Pflichtenheft",q:"Was ist ein Abnahmetest?",o:["Entwickler-Test","Lasttest","Test durch den Auftraggeber anhand der Abnahmekriterien um zu pruefen ob das System die Anforderungen des Lastenhefts erfuellt","Unit-Test"],a:2,f:"Abnahmetest (User Acceptance Test, UAT): Auftraggeber oder Endnutzer testen das System anhand realer Szenarien. Bestanden = Grundlage fuer formelle Abnahme. Nicht bestanden = Maengelliste."},
{id:88,b:"7.10",t:"Kundenvorgaben",q:"Was ist ein Wireframe?",o:["Metallgeruest fuer Server","Netzwerkplan","Schematische Darstellung einer Benutzeroberflaeche (ohne Design) - zeigt Struktur, Elemente und Navigationsfluesse fuer fruezes Feedback","Datenbankschema"],a:2,f:"Wireframe: Grobe Skizze einer UI (kein echtes Design). Zeigt welche Elemente wo platziert sind. Guenstig und schnell zu aendern. Gut fuer fruezes Kundenfeedback bevor teure Implementierung beginnt."},
{id:89,b:"7.15",t:"Leistungserbringung",q:"Was ist DevOps?",o:["Eine agile Methode","Ein Projektmodell","Ein Testverfahren","Kombination aus Entwicklung (Dev) und IT-Betrieb (Ops): engere Zusammenarbeit, Automatisierung, schnellere und zuverlaessigere Auslieferung"],a:3,f:"DevOps: Kultur und Praxis die Entwicklung und Betrieb vereint. Ziel: schnellere Releases, hoehere Stabilitaet. Werkzeuge: CI/CD-Pipelines, Infrastructure as Code, Monitoring, automatisierte Tests."},
{id:90,b:"7.8",t:"Bedarfsanalyse",q:"Was ist eine Priorisierungsmatrix?",o:["Werkzeug zur Bewertung und Priorisierung von Anforderungen nach Kriterien wie Wichtigkeit und Dringlichkeit (z.B. Eisenhower-Matrix)","Organigramm","Projektplan","Risikoregister"],a:0,f:"Priorisierungsmatrix: Anforderungen nach zwei Kriterien sortieren. Eisenhower: wichtig+dringend = sofort, wichtig+nicht-dringend = planen, nicht-wichtig+dringend = delegieren, Rest = eliminieren."},
{id:91,b:"7.11",t:"Techn. Voraussetzungen",q:"Was ist eine API (Application Programming Interface)?",o:["Ein Betriebssystem","Ein Netzwerkprotokoll","Definierte Schnittstelle ueber die Systeme miteinander kommunizieren - ermoeglicht Integration und Datenaustausch ohne Kenntnisse der internen Implementierung","Eine Datenbank"],a:2,f:"API: standardisierte Schnittstelle. REST-API (HTTP/JSON): Web-Standard. SOAP (XML): aelter, formeller. GraphQL: flexible Abfragen. API-Dokumentation (z.B. Swagger) beschreibt Endpunkte und Formate."},
{id:92,b:"7.12",t:"Budget",q:"Was ist ein Projektzeitraum vs. Projekttakt?",o:["Projekttakt ist laenger","Projektzeitraum ist kleiner","Identisch","Projektzeitraum: Gesamtdauer von Start bis Ende. Projekttakt: regelmaessige Zyklen/Sprints in denen Arbeit strukturiert wird (z.B. 2-woechige Sprints ueber 6 Monate Projektzeitraum)"],a:3,f:"Projektzeitraum: Start bis Abschluss (z.B. 6 Monate). Projekttakt: wiederkehrender Rhythmus (z.B. 2-woechige Sprints in Scrum, woechentliche Statusberichte, monatliche Steering-Committee-Sitzungen)."},
{id:93,b:"7.13",t:"Veraenderungsprozesse",q:"Was ist eine Pilotphase im Veraenderungsprozess?",o:["Gesamtrollout","Testversion fuer Entwickler","Kontrollierter Rollout bei einer kleinen Gruppe vor breiter Einfuehrung: Feedback sammeln, Probleme erkennen, Schulungskonzept anpassen","Testumgebung"],a:2,f:"Pilotphase: neues System/Prozess zunaechst bei ausgewaehlter Gruppe testen. Vorteile: echtes Feedback, Probleme im kleinen Rahmen beheben, Change-Agents identifizieren, Schulungskonzept verfeinern."},
{id:94,b:"7.14",t:"Leistungsuebergabe",q:"Was ist ein Lieferschein bei IT-Leistungen?",o:["Abnahmeprotokoll","Dokument das die gelieferten Komponenten/Lizenzen auflistet - weniger formell als Abnahmeprotokoll, bestaetigt nur Empfang nicht Qualitaet","Rechnung","Immer Pflicht"],a:1,f:"Lieferschein: bestaetigt Empfang der Lieferung (Hardware, Softwarelizenzen). Keine Qualitaetspruefung. Abnahmeprotokoll: bestaetigt vertragsgerechte Erfullung nach Pruefung. Beide Dokumente sind unterschiedlich."},
{id:95,b:"7.15",t:"Leistungserbringung",q:"Was ist ein Post-Implementation Review?",o:["Statusbericht","Strukturierte Bewertung 3-6 Monate nach Go-Live: wurden die Projektziele erreicht? Nutzt das System wie erwartet? Lessons Learned?","Sprint-Review","Abnahme"],a:1,f:"Post-Implementation Review: einige Monate nach Go-Live bewerten ob die Business-Ziele tatsaechlich erreicht wurden. Gibt Aufschluss ueber Qualitaet der urspruenglichen Bedarfsanalyse und Implementierung."},
{id:96,b:"7.10",t:"Kundenvorgaben",q:"Was ist User Experience (UX)?",o:["Datenbankdesign","Gesamterlebnis eines Nutzers bei der Interaktion mit einem System: Benutzerfreundlichkeit, Intuitivitaet, Effizienz, Zufriedenheit","Netzwerkdesign","Technische Performance"],a:1,f:"UX: wie fuhlt sich die Nutzung an? Leicht zu erlernen? Effizient? Angenehm? UX-Anforderungen im Lastenheft: z.B. neue Mitarbeiter koennen Kernanwendungen in max. 30 Min. erlernen."},
{id:97,b:"7.9",t:"Lasten-/Pflichtenheft",q:"Was ist ein Mengengeruest im Lastenheft?",o:["Angaben ueber erwartete Mengen und Volumen: Nutzeranzahl, Datenvolumen, Transaktionen/Tag - wichtig fuer Dimensionierung und Performance-Planung","Ressourcenplan","Zeitplan","Preisliste"],a:0,f:"Mengengeruest: wieviele Benutzer (gleichzeitig, insgesamt), wieviele Datensaetze, wieviele Transaktionen pro Tag/Stunde. Grundlage fuer Infrastrukturplanung, Performance-Tests und Lizenzierung."},
{id:98,b:"7.12",t:"Budget",q:"Was ist Cost-Benefit-Ratio?",o:["Amortisationszeit","Gewinnmarge","Projektkosten","Verhaeltnis von Nutzen zu Kosten einer Investition - BCR > 1: Nutzen uebersteigt Kosten, Investition lohnt sich"],a:3,f:"Benefit-Cost-Ratio (BCR) = Nutzen / Kosten. BCR = 1,5 bedeutet: fuer jeden investierten Euro entstehen 1,50 EUR Nutzen. BCR > 1: empfehlenswert. Nutzen koennen monetaer und nicht-monetaer sein."},
{id:99,b:"7.13",t:"Veraenderungsprozesse",q:"Was ist eine Ist-Soll-Analyse im Veraenderungsprozess?",o:["Marktanalyse","Budgetplanung","Kostenvergleich","Vergleich des aktuellen Zustands (Ist) mit dem angestrebten Zielzustand (Soll) zur Identifikation von Veraenderungsbedarf und Massnahmen"],a:3,f:"Ist-Soll-Analyse: Ist = aktuelle Realitaet (Prozesse, Systeme, Kompetenzen). Soll = gewuenschter Zielzustand. Gap = Veraenderungsbedarf. Massnahmen schliessen den Gap. Basis jedes Change-Management-Plans."},
{id:100,b:"7.15",t:"Leistungserbringung",q:"Was ist continuous Improvement im Projektkontext?",o:["Grosse Restrukturierung","Fortlaufende Verbesserung von Prozessen und Qualitaet durch regelmaessige Rueckblicke (Retrospektiven) und kleine Anpassungsschritte","Einmalige Optimierung","Projektabschluss"],a:1,f:"Continuous Improvement (Kaizen): in jedem Sprint/Iteration kleine Verbesserungen umsetzen. Kumulativer Effekt: nach einem Jahr viele kleine Verbesserungen = grosser Qualitaetssprung. Gegenmodell zur einmaligen grossen Reform."}
];
let st={},filt=[...Q];
function init(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});render();}
function render(){
  const c=document.getElementById("qc");c.innerHTML="";
  let lb=null;
  const bn={"7.8":"🔍 7.8 Bedarfsanalyse","7.9":"📄 7.9 Lasten-/Pflichtenheft","7.10":"👤 7.10 Kundenvorgaben","7.11":"⚙️ 7.11 Techn. Voraussetzungen","7.12":"💰 7.12 Budget","7.13":"🔄 7.13 Veraenderungsprozesse","7.14":"📦 7.14 Leistungsuebergabe","7.15":"✅ 7.15 Leistungserbringung"};
  filt.forEach(q=>{
    if(q.b!==lb){const d=document.createElement("div");d.className="bh";d.textContent=bn[q.b]||q.b;c.appendChild(d);lb=q.b;}
    c.appendChild(mk(q));
  });up();}
function mk(q){
  const s=st[q.id],d=document.createElement("div"),L=["A","B","C","D"];
  d.className="qc"+(s.done?(s.ok?" ac":" aw"):"");d.id="c"+q.id;
  d.innerHTML=`<div class="qn">FRAGE ${q.id}/100</div><div class="qt">${q.t}</div><div class="qq">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt${s.done?" dis":""}${s.done&&i===q.a?" ok":""}${s.done&&!s.ok&&i===s.ci?" ng":""}" onclick="ans(${q.id},${i})"><span class="ol">${L[i]}</span><span>${o}</span></div>`).join("")}</div>
<div class="fbb${s.done?" show "+(s.ok?"cok":"cng"):""}" id="f${q.id}">${s.done?(s.ok?"✅ ":"❌ ")+q.f:""}</div>`;
  return d;}
function ans(id,i){
  const s=st[id];if(s.done)return;
  const q=Q.find(x=>x.id===id);s.done=true;s.ok=i===q.a;s.ci=i;
  const c=document.getElementById("c"+id);c.className="qc "+(s.ok?"ac":"aw");
  c.querySelectorAll(".opt").forEach((el,j)=>{el.classList.add("dis");if(j===q.a)el.classList.add("ok");if(!s.ok&&j===i)el.classList.add("ng");});
  const f=document.getElementById("f"+id);f.textContent=(s.ok?"✅ ":"❌ ")+q.f;f.className="fbb show "+(s.ok?"cok":"cng");up();}
function up(){
  const tot=Q.length,done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  document.getElementById("sd").textContent=ok+"/"+done;
  document.getElementById("pf").style.width=(done/tot*100)+"%";
  document.getElementById("pl").textContent=done+" von "+tot+" beantwortet";}
function fil(t,btn){
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("act"));btn.classList.add("act");
  if(t==="all")filt=[...Q];
  else if(t==="open")filt=Q.filter(q=>!st[q.id].done);
  else if(t==="wrong")filt=Q.filter(q=>st[q.id].done&&!st[q.id].ok);
  else filt=Q.filter(q=>q.b===t);render();}
function shuf(){filt=[...filt].sort(()=>Math.random()-.5);render();}
function rst(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});filt=[...Q];document.querySelectorAll(".fb").forEach((b,i)=>b.classList.toggle("act",i===0));render();document.getElementById("ov").classList.remove("show");}
function showR(){
  const done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  const pct=done>0?Math.round(ok/done*100):0;
  let e="😅",m="Weiter ueben!";
  if(pct>=90){e="🏆";m="Ausgezeichnet!";}else if(pct>=75){e="🎉";m="Sehr gut!";}else if(pct>=60){e="📚";m="Gut - weiter so!";}
  document.getElementById("oe").textContent=e;document.getElementById("os").textContent=ok+"/"+done;
  document.getElementById("om").textContent=pct+"% richtig - "+m;
  document.getElementById("ov").classList.add("show");}
function closeR(){document.getElementById("ov").classList.remove("show");}
init();
</script></body></html>
