const BN={"11.1":"🔐 CIA","11.2":"⚔️ Angriffe & Technik","11.3":"👮 ITSB","11.4":"🔒 DSB","11.5":"📜 Richtlinien","11.6":"👥 Personell","11.7":"🏛️ BSI","11.8":"⚖️ DSGVO","11.9":"👤 Pers.Daten","11.10":"✊ Rechte","11.11":"🔭 Anonymisierung","11.12":"🏷️ Pseudonymisierung","11.13":"📊 Schutzbedarf"};
const Q=[
{id:1,b:"11.1",t:"CIA Vertiefung",q:"Was ist der Unterschied zwischen Datensicherheit und Datenschutz?",o:["Datensicherheit: technische/organisatorische Massnahmen zum Schutz aller Daten (CIA). Datenschutz: rechtlicher Schutz personenbezogener Daten (DSGVO)","Datensicherheit ist rechtlich","Identisch","Datenschutz ist technisch"],a:0,f:"Datensicherheit: CIA-Schutzziele fuer alle Daten (auch Firmendaten ohne Personenbezug). Datenschutz: rechtlicher Rahmen fuer personenbezogene Daten (DSGVO, BDSG). Beide erganzen sich."},
{id:2,b:"11.1",t:"CIA Vertiefung",q:"Was ist ein Sicherheitsvorfall vs eine Datenpanne?",o:["Sicherheitsvorfall: jedes Ereignis das Sicherheit gefaehrdet (auch ohne Datenverlust). Datenpanne: Verletzung des Schutzes personenbezogener Daten (meldepflichtig nach DSGVO)","Identisch","Sicherheitsvorfall ist DSGVO-relevant","Datenpanne ist groesser"],a:0,f:"Sicherheitsvorfall: z.B. DDoS-Angriff ohne Datenverlust. Datenpanne (DSGVO Art. 4 Nr. 12): Verlust/Offenlegung/Vernichtung personenbezogener Daten -> 72h Meldepflicht."},
{id:3,b:"11.2",t:"Angriffsmethoden",q:"Was ist ein Man-in-the-Middle-Angriff (MitM)?",o:["Angreifer schaltet sich unbemerkt in Kommunikation zwischen zwei Parteien - liest mit und kann Daten manipulieren","Ein Virus","Physischer Angriff","Ein Phishing-Angriff"],a:0,f:"MitM: Angreifer positioniert sich zwischen Kommunikationspartnern. Beispiel: ARP-Spoofing im WLAN, gefaelschtes WLAN (Evil Twin). Schutzmassnahmen: HTTPS, Zertifikatspruefung, VPN."},
{id:4,b:"11.2",t:"Angriffsmethoden",q:"Was ist ein DDoS-Angriff?",o:["Distributed Denial of Service: viele kompromittierte Systeme (Botnet) ueberfluten einen Server mit Anfragen bis er nicht mehr erreichbar ist","Direkter Angriff auf Daten","Ein Phishing-Angriff","Ein Virus"],a:0,f:"DDoS: Botnet sendet Millionen von Anfragen. Server bricht zusammen, legitime Nutzer koennen nicht mehr zugreifen. Verletzt Verfuegbarkeit. Schutzmassnahmen: DDoS-Schutz-Services, CDN, Rate Limiting."},
{id:5,b:"11.2",t:"Angriffsmethoden",q:"Was ist Ransomware?",o:["Ein Antivirusprogramm","Schadsoftware die Daten verschluesselt und Loesegeld fuer den Entschluesselungsschluessel fordert - verletzt Verfuegbarkeit und Vertraulichkeit","Eine Firewall","Ein VPN"],a:1,f:"Ransomware: verschluesselt alle erreichbaren Daten. Loesegeld in Kryptowährung gefordert. Schutzmassnahmen: Backups (offline!), Patch-Management, E-Mail-Filterung, Least Privilege, Endpunktschutz."},
{id:6,b:"11.2",t:"Angriffsmethoden",q:"Was ist SQL-Injection?",o:["Datenbankoptimierung","Netzwerkangriff","Angriff bei dem schaedlicher SQL-Code in Eingabefelder eingeschleust wird um unbefugten Datenbankzugriff zu erhalten","Ein Virus"],a:2,f:"SQL-Injection: Eingabefeld gibt ' OR '1'='1 ein -> Angreifer umgeht Authentifizierung oder liest alle Daten. Schutz: Prepared Statements (parametrisierte Abfragen), Input-Validierung, WAF."},
{id:7,b:"11.2",t:"Angriffsmethoden",q:"Was ist Cross-Site-Scripting (XSS)?",o:["Angriff bei dem schaedliches JavaScript in Webseiten eingeschleust wird um es in Browsern anderer Nutzer auszufuehren","Skript-Optimierung","Datenbankmanipulation","Ein Netzwerkangriff"],a:0,f:"XSS: Angreifer schleust JavaScript in Webseite ein. Wird im Browser des Opfers ausgefuehrt: Cookies stehlen, Tastatureingaben aufzeichnen, Weiterleitungen. Schutz: Input-Sanitisierung, Content Security Policy."},
{id:8,b:"11.2",t:"Angriffsmethoden",q:"Was ist Brute-Force-Angriff?",o:["Systematisches Ausprobieren aller Passwort-Kombinationen bis richtiges gefunden - bei kurzen einfachen Passwoertern schnell erfolgreich","Physische Gewalt","Ein Phishing-Angriff","Social Engineering"],a:0,f:"Brute-Force: alle Kombinationen ausprobieren. 6-stelliges Zahlenpasswort: 10^6 Versuche (schnell). 12-stelliges komplexes Passwort: Jahrzehnte. Schutzmassnahmen: starke Passwoerter, Account-Lockout, 2FA."},
{id:9,b:"11.2",t:"Angriffsmethoden",q:"Was ist ein Zero-Day-Exploit?",o:["Ein Phishing-Angriff","Angriff an Tag Null","Ein neuer Virus","Ausnutzung einer Schwachstelle fuer die noch kein Patch existiert - Hersteller weiss noch nicht davon oder hat noch keinen Fix"],a:3,f:"Zero-Day: Schwachstelle unbekannt oder Patch nicht verfuegbar. Sehr gefaehrlich da keine technische Gegenmassnahme. Schutz: Verhaltensbasierte Erkennung, Least Privilege, Netzwerksegmentierung, schnelles Patchen."},
{id:10,b:"11.2",t:"Angriffsmethoden",q:"Was ist APT (Advanced Persistent Threat)?",o:["Ein DDoS-Angriff","Normaler Virus","Phishing","Hochentwickelter langfristiger gezielter Angriff - staatliche oder professionelle Angreifer bleiben unentdeckt im Netzwerk"],a:3,f:"APT: Nationstaaten oder hochprofessionelle Gruppen. Ziel: Industriespionage, Sabotage. Verbleiben monate-/jahrelang unentdeckt. Lateral Movement: von System zu System. Detection: SIEM, Verhaltensanalyse."},
{id:11,b:"11.2",t:"Angriffsmethoden",q:"Was ist Malware?",o:["Betriebssystemfehler","Oberbegriff fuer schadhafte Software: Viren, Wuermer, Trojaner, Ransomware, Spyware, Adware","Hardwaredefekt","Schlechte Software"],a:1,f:"Malware-Arten: Virus (braucht Wirtsprogramm), Wurm (selbst-replizierend), Trojaner (tarnt sich als nuetzliches Programm), Ransomware (verschluesselt), Spyware (spioniertiert), Adware (Werbung)."},
{id:12,b:"11.2",t:"Angriffsmethoden",q:"Was ist Spear-Phishing?",o:["Gezieltes Phishing an spezifische Person oder Organisation - personalisiert, sehr glaubwuerdig, hoehere Erfolgsquote","Angeln mit Speer","Massen-Phishing","Telefon-Phishing"],a:0,f:"Spear-Phishing: maßgeschneidert auf Zielperson. Nutzt persoenliche Informationen (LinkedIn, Social Media). Beispiel: E-Mail an CFO die aussieht wie von CEO. Hoehere Erfolgsquote als Massen-Phishing."},
{id:13,b:"11.3",t:"ITSB Vertiefung",q:"Was ist eine Risikoanalyse im IT-Sicherheitskontext?",o:["Systematische Identifikation, Bewertung und Behandlung von Sicherheitsrisiken: Bedrohungen, Schwachstellen, Wahrscheinlichkeit, Auswirkung","Schwachstellenscan","Systemanalyse","Kostenanalyse"],a:0,f:"Risikoanalyse: Risiko = Bedrohung x Schwachstelle x Auswirkung. Schritt 1: Assets identifizieren. Schritt 2: Bedrohungen identifizieren. Schritt 3: Schwachstellen bewerten. Schritt 4: Risiko bewerten. Schritt 5: Massnahmen."},
{id:14,b:"11.3",t:"ITSB Vertiefung",q:"Was ist ein Security Operations Center (SOC)?",o:["Eine Sicherheitsabteilung","Sicherheitszentrale","Ein Rechenzentrum","Team das rund um die Uhr IT-Sicherheit ueberwacht, Sicherheitsvorfaelle erkennt und darauf reagiert"],a:3,f:"SOC: 24/7 Ueberwachung von Logs, Alerts, Sicherheitsereignissen. SIEM-System (Security Information and Event Management) aggregiert Daten. Schnelle Incident Response. Kann intern oder extern (MSSP) sein."},
{id:15,b:"11.3",t:"ITSB Vertiefung",q:"Was ist SIEM?",o:["Security Incident Error Management","Security Information and Event Management: zentrales System das Logs und Sicherheitsereignisse aller IT-Systeme sammelt, korreliert und analysiert","Sicherheitszertifikat","System-Inventar-Erfassungs-Modul"],a:1,f:"SIEM: sammelt Logs (Firewall, Server, Anwendungen), korreliert Ereignisse, erkennt Anomalien, generiert Alerts. Beispiele: Splunk, IBM QRadar, Microsoft Sentinel. Grundlage fuer SOC."},
{id:16,b:"11.4",t:"DSB Vertiefung",q:"Was ist ein Datenschutz-Managementsystem?",o:["Datenbanksystem","Software","Systematischer Ansatz zur Verwaltung des Datenschutzes: Richtlinien, Prozesse, Kontrollen, Schulungen - aehnlich wie ISMS fuer Datenschutz","Backup-System"],a:2,f:"Datenschutz-Managementsystem: DSGVO-Anforderungen systematisch erfuellen. Verarbeitungsverzeichnis, DPIA-Prozess, Betroffenenanfragenmanagement, Datenpannenmanagement, DSB-Funktion."},
{id:17,b:"11.5",t:"Sicherheitsrichtlinien Vertiefung",q:"Was ist ein Information Security Policy?",o:["Uebergeordnete Richtlinie die Informationssicherheitsstrategie des Unternehmens beschreibt - Grundlage fuer alle spezifischen Sicherheitsrichtlinien","Eine ISO-Norm","Ein Auditbericht","Ein technisches Dokument"],a:0,f:"Information Security Policy: Bekenntnis der Unternehmensleitung zur Informationssicherheit. Definiert Ziele, Grundsaetze, Verantwortlichkeiten. ISO 27001 Kapitel 5.2 fordert dieses Dokument."},
{id:18,b:"11.5",t:"Sicherheitsrichtlinien Vertiefung",q:"Was ist Multi-Faktor-Authentifizierung (MFA)?",o:["Authentifizierung mit mehr als zwei Faktoren - kombiniert Wissen, Besitz und Biometrie fuer maximale Sicherheit","2FA plus","Mehrere Accounts","Viele Passwoerter"],a:0,f:"MFA: mehr als 2 Faktoren. Kombiniert: Wissen (Passwort), Besitz (Token, Smartphone), Biometrie (Fingerabdruck). Hoehere Sicherheit als 2FA. Standard fuer kritische Systeme und privilegierte Accounts."},
{id:19,b:"11.5",t:"Sicherheitsrichtlinien Vertiefung",q:"Was ist Netzwerksegmentierung?",o:["Netzwerkoptimierung","Aufteilung eines Netzwerks in isolierte Segmente (VLANs, DMZ) um Angriffsausbreitung zu begrenzen","Bandbreitenplanung","Netzwerk teilen"],a:1,f:"Netzwerksegmentierung: DMZ (Webserver), interne Zone, Management-Zone. Kompromittierter Server in DMZ kann nicht direkt auf interne Datenbanken zugreifen. Firewalls zwischen Segmenten."},
{id:20,b:"11.5",t:"Sicherheitsrichtlinien Vertiefung",q:"Was ist DMZ (Demilitarisierte Zone)?",o:["Netzwerksegment zwischen Internet und internem Netz: oeffentlich erreichbare Server (Web, Mail) ohne direkten Zugriff auf interne Systeme","Militaergebiet","Eine Firewall","Ein Sicherheitsstandard"],a:0,f:"DMZ: Pufferzone. Webserver in DMZ erreichbar aus Internet. Direkte Verbindung DMZ zu internem Netz: blockiert. Angreifer der Webserver kompromittiert kommt nicht ins interne Netz."},
{id:21,b:"11.6",t:"Personelle Massnahmen Vertiefung",q:"Was ist eine Sicherheitsschulung?",o:["Regelmaessige Schulung aller Mitarbeiter zu IT-Sicherheitsthemen: Phishing, Passwoerter, Datenschutz, Vorfallmeldung","Technische Schulung","Fuehrungskraefteschulung","Produktschulung"],a:0,f:"Sicherheitsschulung: jeder Mitarbeiter regelmaessig (mind. jaehrlich). Themen: Phishing erkennen, starke Passwoerter, Clean Desk, Vorfaelle melden, Mobile Geraete, Homeoffice. E-Learning skalierbar."},
{id:22,b:"11.6",t:"Personelle Massnahmen Vertiefung",q:"Was ist Insider-Threat?",o:["Naturkatastrophe","Hacker-Angriff","Sicherheitsrisiko durch eigene Mitarbeiter: vorsaetzlich (Sabotage, Datendiebstahl) oder unvorsaetzlich (Fehler, Phishing-Opfer)","Externe Bedrohung"],a:2,f:"Insider-Threat: Mitarbeiter haben privilegierten Zugriff. Vorsaetzlich: unzufriedener Mitarbeiter stiehlt Daten. Unvorsaetzlich: klickt auf Phishing-Link. Massnahmen: Least Privilege, Monitoring, Security Awareness."},
{id:23,b:"11.7",t:"BSI Grundschutz Vertiefung",q:"Was ist IT-Grundschutz-Zertifizierung?",o:["Personenzertifizierung","ISO-Zertifizierung","Zertifizierung nach ISO 27001","Zertifizierung einer Organisation nach BSI IT-Grundschutz - zeigt systematische Umsetzung von IT-Sicherheitsmassnahmen nach BSI-Standard"],a:3,f:"BSI Grundschutz-Zertifizierung: Basisabsicherung (kurz), Standardabsicherung (vollstaendig), oder kombiniert mit ISO 27001. Vom BSI anerkannte Pruefstellen fuehren Audit durch."},
{id:24,b:"11.7",t:"BSI Grundschutz Vertiefung",q:"Was ist ein BSI IT-Grundschutz-Baustein?",o:["Ein Modul","Beschreibung von Sicherheitsmassnahmen fuer ein spezifisches Thema (z.B. B 3.101 Allgemeiner Server, B 5.7 Datentraegeraustausch)","Ein Sicherheitsstandard","Ein technisches Geraet"],a:1,f:"Baustein: beschreibt fuer ein spezifisches Thema typische Gefahrdungen und Gegenmassnahmen. Beispiel: SYS.1.1 Allgemeiner Server: Absicherung beliebiger Server. Bausteine koennen kombiniert werden."},
{id:25,b:"11.7",t:"BSI Grundschutz Vertiefung",q:"Was ist eine Gefaehrdungslage nach BSI?",o:["BSI-Begriff fuer potenzielle Bedrohungen und Schwachstellen die Sicherheitsziele gefaehrden koennen - werden pro Baustein definiert","Ein Sicherheitsvorfall","Eine Risikoanalyse","Ein Audit-Ergebnis"],a:0,f:"Gefaehrdungen nach BSI: Hoherer Gewalt (G 1), Organisatorische Maengel (G 2), Menschliche Fehlhandlungen (G 3), Technisches Versagen (G 4), Vorsaetzliche Handlungen (G 5). Systematische Bedrohungslandschaft."},
{id:26,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist Datenminimierung (Art. 5 DSGVO)?",o:["Datenarchivierung","Datenkompression","Personenbezogene Daten muessen auf das fuer den Zweck notwendige Minimum beschraenkt sein - nicht auf Vorrat sammeln","Datensicherung"],a:2,f:"Datenminimierung: nur Daten erheben die wirklich benoetigt werden. Beispiel: Bestellung erfordert keine Religionszugehoerigkeit. Unnoetiges Feld im Formular = Datenschutzverstoß."},
{id:27,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist Privacy Impact Assessment (PIA)?",o:["Datenschutzaudit","Risikoanalyse allgemein","Sicherheitsaudit","Synonym fuer Datenschutz-Folgenabschaetzung (DPIA) - bewertet Datenschutzrisiken einer geplanten Verarbeitung"],a:3,f:"PIA/DPIA: vor risikoreichen Verarbeitungen. Beschreibung der Verarbeitung, Notwendigkeits- und Verhaeltnismaessigkeitspruefung, Risikoidentifikation, Massnahmen. DSB einbeziehen."},
{id:28,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist Drittlandtransfer in der DSGVO?",o:["Uebermittlung personenbezogener Daten in Laender ausserhalb der EU/EWR - nur mit angemessenem Schutzniveau erlaubt (Art. 44-49 DSGVO)","Export von Waren","Lieferung in die Schweiz nur","Inlandsversand"],a:0,f:"Drittlandtransfer: Daten in USA, China etc. nur wenn: Angemessenheitsbeschluss (z.B. UK, Japan), Standardvertragsklauseln (SCCs), Binding Corporate Rules, oder Ausnahmen (Einwilligung, Vertrag)."},
{id:29,b:"11.8",t:"DSGVO Vertiefung",q:"Was sind Standardvertragsklauseln (SCCs)?",o:["Lieferantenvertraege","Mustervertraege allgemein","DSGVO-Standardregeln","EU-Kommission genehmigte Musterklauseln fuer Datentransfer in Drittlaender - schaffen angemessenes Schutzniveau fuer betroffene Personen"],a:3,f:"SCCs (Standard Contractual Clauses): EU-Kommission genehmigt. Werden in Vertraege mit US-Anbieter etc. einbezogen. Schaffen vertragliche Garantien fuer Datenschutz. Seit 2021 neue Version gueltig."},
{id:30,b:"11.9",t:"Personenbez. Daten Vertiefung",q:"Was ist Profiling nach DSGVO?",o:["Automatisierte Verarbeitung personenbezogener Daten zur Bewertung persoenlicher Aspekte (Verhalten, Praeferenzen, Kreditwuerdigkeit) - Art. 22 DSGVO regelt automatisierte Entscheidungen","Datenbankoptimierung","Kundensegmentierung","Mitarbeiterbeurteilung"],a:0,f:"Profiling: automatisierte Analyse von Personendaten um Charakteristika zu bewerten. Kreditscoring, Werbeprofilierung, Risikoanalyse. Wenn erhebliche Auswirkungen: Recht auf menschliche Kontrolle (Art. 22)."},
{id:31,b:"11.10",t:"Betroffenenrechte Vertiefung",q:"Was ist ein Betroffenenanfragemanagement?",o:["Datenschutzaudit","Prozess zur Bearbeitung von Betroffenenrechtsanfragen: Identifizierung, Verifikation, Bearbeitung, Dokumentation - Frist 1 Monat","Kundensupport","Beschwerdemanagement"],a:1,f:"Betroffenenanfragemanagement: Anfrage erhalten -> Person verifizieren (Identitaet sicherstellen) -> Anfrage bearbeiten -> Antwort binnen 1 Monat -> Dokumentieren. Prozesse und Verantwortliche definieren."},
{id:32,b:"11.10",t:"Betroffenenrechte Vertiefung",q:"Was passiert wenn eine Betroffenenanfrage abgelehnt wird?",o:["Ablehnungsbegruendung schriftlich mitteilen + Hinweis auf Beschwerderecht bei Aufsichtsbehoerde und gerichtlichen Rechtsschutz (Art. 12 DSGVO)","Keine Information","Kein Handlungsbedarf","Nur intern dokumentieren"],a:0,f:"Ablehnung: schriftlich, mit Begruendung, mit Hinweis auf Beschwerdemoeglichkeit bei der Aufsichtsbehoerde und gerichtlichen Rechtsschutz. Unverzueglich, spaetestens in 1 Monat."},
{id:33,b:"11.11",t:"Anonymisierung Vertiefung",q:"Was sind Grenzen der Anonymisierung?",o:["Keine Grenzen","Re-Identifikation: Kombination mit anderen Datensaetzen kann Anonymitaet aufheben - 87% der US-Bevoelkerung eindeutig durch Geburtsdatum, Geschlecht und PLZ identifizierbar","Nur bei grossen Datensaetzen","Technisch unmoeglich"],a:1,f:"Anonymisierungsgrenzen: scheinbar anonyme Daten koennen durch Kombination mit anderen Quellen re-identifiziert werden. Latanya Sweeney 1997: 87% der US-Bevoelkerung eindeutig durch 3 Merkmale. Vorsicht bei Veroeffentlichung."},
{id:34,b:"11.11",t:"Anonymisierung Vertiefung",q:"Was ist l-Diversity?",o:["Ein Anonymisierungsverfahren","Eine Datenschutzregel","Erweiterung von k-Anonymitaet: sicherstellt dass sensible Attribute innerhalb jeder Gruppe vielfaeltig sind - verhindert Rueckschluss auf Attribut","Erweiterung von k-Anonymitaet nur"],a:2,f:"l-Diversity: k-Anonymitaet allein reicht nicht wenn alle k Personen dieselbe Diagnose haben. l-Diversity fordert mind. l verschiedene Werte fuer sensibles Attribut in jeder Gruppe."},
{id:35,b:"11.12",t:"Pseudonymisierung Vertiefung",q:"Was ist ein Salted Hash?",o:["Eine Tokenisierungsmethode","Hashfunktion mit Essen","Hash mit zufaelligem Zufallswert (Salt) der vor dem Hashen hinzugefuegt wird - verhindert Rainbow-Table-Angriffe","Ein Verschluesselungsverfahren"],a:2,f:"Salted Hash: SHA-256(passwort + salt). Salt ist zufaellig und pro Passwort verschieden. Gleiche Passwoerter -> verschiedene Hashes. Verhindert Rainbow-Tables. Standard fuer Passwort-Speicherung (bcrypt, Argon2)."},
{id:36,b:"11.12",t:"Pseudonymisierung Vertiefung",q:"Was ist der Unterschied Verschluesselung vs Pseudonymisierung?",o:["Identisch","Verschluesselung: Inhalt unleserlich gemacht (mathematisch umkehrbar). Pseudonymisierung: Identifikatoren ersetzt durch Pseudonyme (strukturelle Trennung)","Verschluesselung ist staerker","Pseudonymisierung ist mathematisch"],a:1,f:"Verschluesselung: Dateiinhalt wird mathematisch umgewandelt, Schluessel noetig. Pseudonymisierung: Name wird durch ID ersetzt, Zuordnungstabelle separat. Beide dienen Datenschutz, verschiedene Ansaetze."},
{id:37,b:"11.13",t:"Schutzbedarf Vertiefung",q:"Was ist eine Schutzbedarfsfeststellung?",o:["Eine Risikoanalyse","Eine Inventarisierung","Ein Sicherheitsaudit","Formale Bestimmung des Schutzbedarfs fuer konkrete Schutzobjekte nach BSI-Methodik - Basis fuer Massnahmenauswahl"],a:3,f:"Schutzbedarfsfeststellung: dokumentierte Entscheidung welcher Schutzbedarf (niedrig/mittel/hoch) fuer ein spezifisches Schutzobjekt besteht. Begruendung dokumentieren. Basis fuer BSI-Bausteinauswahl."},
{id:38,b:"11.13",t:"Schutzbedarf Vertiefung",q:"Was ist das Kumulationseffekt in der Schutzbedarfsanalyse?",o:["Keine Auswirkung","Nur bei sensiblen Daten","Aggregation verschiedener Daten erhoehen gemeinsamen Schutzbedarf: einzelne niedrige Daten zusammen koennen hohen Schutzbedarf ergeben","Summe aller Schaeden"],a:2,f:"Kumulationseffekt: Vorname allein = niedrig. Nachname allein = niedrig. Vorname + Nachname + Adresse + Bankdaten = hoch. Kombination erhoeh Schutzbedarf. Gesamtbetrachtung noetig."},
{id:39,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist asymmetrische Verschluesselung?",o:["Zwei-Schluessel-System: oeffentlicher Schluessel zum Verschluesseln, privater Schluessel zum Entschluesseln - kein Schluesselaustausch noetig","Symmetrische Verschluesselung","Doppelte Verschluesselung","Hashing"],a:0,f:"Asymmetrisch: RSA, ECC. Oeffentlicher Schluessel (jeder kann verschluesseln), privater Schluessel (nur Empfaenger kann entschluesseln). Langsamer als symmetrisch. Verwendet fuer Schluesselaustausch, digitale Signaturen."},
{id:40,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist symmetrische Verschluesselung?",o:["Ein Schluessel zum Ver- und Entschluesseln - schnell und effizient aber Schluesselaustausch problematisch","Doppelte Verschluesselung","Hashing","Asymmetrische Verschluesselung"],a:0,f:"Symmetrisch: AES, DES. Gleicher Schluessel zum Ver- und Entschluesseln. Schnell, gut fuer grosse Datenmengen. Problem: Schluessel muss sicher uebertragen werden. Loesung: Hybrid mit asymmetrischer Verschluesselung."},
{id:41,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist TLS und wozu dient es?",o:["Ein VPN-Protokoll","Ein Betriebssystem","Ein Antivirusprogramm","Transport Layer Security: Protokoll fuer verschluesselte Kommunikation im Internet (HTTPS, IMAPS, SMTPS) - Nachfolger von SSL"],a:3,f:"TLS: verschluesselt Kommunikation zwischen Browser und Server. HTTPS = HTTP + TLS. Sichert: Vertraulichkeit (verschluesselt), Integritaet (MAC), Authentizitaet (Zertifikat). TLS 1.3 aktueller Standard."},
{id:42,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist PKI (Public Key Infrastructure)?",o:["Eine Verschluesselung","Ein Netzwerkprotokoll","System zur Verwaltung digitaler Zertifikate und Schluesselpare: Certificate Authority (CA) stellt Zertifikate aus die Identitaet bestaetigen","Staatliche Behoerde"],a:2,f:"PKI: Certificate Authority (CA) stellt digitale Zertifikate aus. Zertifikat bestaetigt: dieser oeffentliche Schluessel gehoert zu dieser Organisation. Browser vertraut CA, damit vertraut er auch dem Zertifikat."},
{id:43,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist ein digitales Zertifikat?",o:["Ein Passwort","Elektronisches Dokument das einen oeffentlichen Schluessel einer Identitaet (Person, Organisation, Server) zuordnet - von CA signiert","Eine Lizenz","Ein Sicherheitsaudit"],a:1,f:"Digitales Zertifikat: enthaelt oeffentlichen Schluessel, Inhaber-Identitaet, Gueltigkeit, CA-Signatur. TLS-Zertifikate sichern HTTPS. Code-Signing-Zertifikate sichern Software-Downloads."},
{id:44,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist AES?",o:["Ein Netzwerkprotokoll","Advanced Encryption Standard: symmetrischer Verschluesselungsalgorithmus mit 128/192/256-Bit Schluesseln - Goldstandard fuer Datenverschluesselung","Ein Hashverfahren","Ein VPN-Protokoll"],a:1,f:"AES: symmetrisch, sehr sicher und schnell. AES-256: 2^256 moegliche Schluessel = praktisch unknackbar. Standard fuer Festplattenverschluesselung (BitLocker, FileVault), WLAN (WPA2/WPA3), TLS."},
{id:45,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist ein Security Token?",o:["Ein Passwort","Physisches Geraet oder Software das Einmalpasswoerter (OTP) generiert fuer 2FA/MFA","Eine Kryptowährung","Eine Smartcard"],a:1,f:"Security Token: Hardware (YubiKey, RSA SecurID) oder Software (Google Authenticator, Microsoft Authenticator). Generiert zeitbasierte OTPs (TOTP) oder FIDO2/WebAuthn. Sicherer als SMS-2FA."},
{id:46,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist Endpoint Detection and Response (EDR)?",o:["Netzwerkschutz","Fortgeschrittenes Endpoint-Sicherheitssystem das Angriffe auf Endgeraeten erkennt, analysiert und automatisch reagiert - mehr als Antivirusprogramm","Eine Firewall","Ein Antivirusprogramm"],a:1,f:"EDR: sammelt Telemetriedaten von Endgeraeten, erkennt anomales Verhalten (nicht nur bekannte Signaturen), ermoeglicht forensische Analyse und automatische Reaktion (Prozess beenden, Isolierung)."},
{id:47,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist Zero-Trust-Architektur?",o:["Null Vertrauen in Mitarbeiter","Ein Netzwerkmodell","Eine Firewall-Konfiguration","Sicherheitsmodell: kein Nutzer oder System wird automatisch vertraut - jeder Zugriff wird verifiziert, auch intern (Never trust, always verify)"],a:3,f:"Zero-Trust: vertraue niemandem automatisch, auch nicht im internen Netz. Jeder Zugriff: Identitaet verifizieren, Geraet pruefen, Mindestrechte. Gegensatz zum alten Perimetermodell (Firewall = sicher innen)."},
{id:48,b:"11.7",t:"BSI Grundschutz Vertiefung",q:"Was ist der BSI-Standard 100-2?",o:["Ein Zertifizierungsstandard","BSI-Standard fuer IT-Grundschutz-Vorgehensweise: definiert wie Grundschutz-Methodik anzuwenden ist","Ein DSGVO-Dokument","Ein ISO-Standard"],a:1,f:"BSI-Standard 100-2: beschreibt wie IT-Grundschutz umgesetzt wird. Schritte: Strukturanalyse, Schutzbedarfsanalyse, Modellierung, Basis-Sicherheitscheck, erganznde Sicherheitsanalyse."},
{id:49,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist eine Datenschutzerklaerung?",o:["Nur ein Dokument","Pflichtinformation an Betroffene ueber Datenverarbeitung: Verantwortlicher, Zwecke, Rechtsgrundlagen, Empfaenger, Rechte - Art. 13/14 DSGVO","Optionale Information","Nur fuer Webseiten"],a:1,f:"Datenschutzerklaerung: Art. 13 DSGVO (Daten direkt erhoben), Art. 14 (indirekt erhoben). Muss enthalten: Verantwortlicher, Zweck, Rechtsgrundlage, Empfaenger, Speicherdauer, Betroffenenrechte, Beschwerderecht."},
{id:50,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist die Aufsichtsbehoerde im Datenschutz?",o:["Das BSI","Das Bundesministerium","Eine Bundesbehoerde","Unabhaengige Behoerde die DSGVO-Einhaltung ueberwacht: In Deutschland je nach Bundesland Landesdatenschutzbeauftragter (LDA/LfD) oder Bundesdatenschutzbeauftragter (BfDI)"],a:3,f:"Aufsichtsbehoerden: in Deutschland 16 Landesdatenschutzbeauftragte (je Bundesland) + Bundesdatenschutzbeauftragter (fuer Bundesbehoerden). Betroffene koennen sich beschweren. Koennen Bussgelder verhaengen."},
{id:51,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist Datensouveraenitaet?",o:["Kontrolle ueber eigene Daten: Buerger und Unternehmen sollen selbst bestimmen koennen was mit ihren Daten passiert","Datensicherheit","Datenbesitz","Datenpolitik"],a:0,f:"Datensouveraenitaet: DSGVO staerkt Datensouveraenitaet durch Betroffenenrechte. Digitale Souveraenitaet: Abhaengigkeit von US-Cloud-Anbietern reduzieren, europaeische Alternativen foerdern (GAIA-X)."},
{id:52,b:"11.9",t:"Personenbez. Daten Vertiefung",q:"Was ist das Haushaltsprivileg?",o:["Datenschutzausnahme","BDSG-Sonderregel","Steuerrecht","Ausnahme: Datenverarbeitung rein persoenlicher oder familiaeerer Taetigkeiten faellt nicht unter DSGVO (Art. 2 Abs. 2c) - Privatpersonen keine DSGVO-Pflichten"],a:3,f:"Haushaltsprivileg: Einzelperson verarbeitet Kontaktdaten fuer private Zwecke (Adressbuch) = kein DSGVO. Unternehmen das Kundendaten verarbeitet = DSGVO gilt. Grenze: oeffentlich zugaengliche Plattformen = kein Privileg."},
{id:53,b:"11.10",t:"Betroffenenrechte Vertiefung",q:"Was ist das Recht auf Berichtigung (Art. 16 DSGVO)?",o:["Betroffener kann Korrektur unrichtiger oder Ergaenzung unvollstaendiger Daten verlangen - Unternehmen muss unverzueglich korrigieren","Datenpruefung","Datenloeschung","Datenpruefung"],a:0,f:"Berichtigungsrecht: falsche Adresse, falsches Geburtsdatum -> Antrag auf Korrektur. Unternehmen muss korrigieren und Empfaenger informieren (wenn Daten weitergegeben wurden)."},
{id:54,b:"11.10",t:"Betroffenenrechte Vertiefung",q:"Was sind Ausnahmen vom Loeschungsrecht?",o:["Loeschung immer sofort","Keine Ausnahmen","Nur bei Grossunternehmen","Gesetzliche Aufbewahrungspflichten (Steuerrecht 10 J., GoBD), Verteidigung von Rechtsanspruechen, oeffentliches Interesse (z.B. Forschung)"],a:3,f:"Loeschungsrecht-Ausnahmen (Art. 17 Abs. 3): Rechtspflicht zur Aufbewahrung, Volksgesundheit, Archiv-/Forschungszwecke, Rechtsansprueche. Rechnungen 10 Jahre: nicht loeschen, koennte maskiert werden."},
{id:55,b:"11.11",t:"Anonymisierung Vertiefung",q:"Was ist Differential Privacy?",o:["Eine Anonymisierungsmethode","Datenschutz-Differenzierung","Eine DSGVO-Anforderung","Mathematisches Verfahren: Zufaelliges Rauschen wird hinzugefuegt um statistische Abfragen zu beantworten ohne Einzelpersonen preiszugeben"],a:3,f:"Differential Privacy: Algorithmus fuegt kontrollierten Zufall hinzu. Statistisch korrekte Aggregate moeglich, aber keine Einzelperson identifizierbar. Eingesetzt von Apple, Google fuer Telemetrie."},
{id:56,b:"11.12",t:"Pseudonymisierung Vertiefung",q:"Was ist Format-Preserving Encryption (FPE)?",o:["Normale Verschluesselung","Tokenisierung","Verschluesselung die Format des Originals beibehalt: Kreditkartennummer 16 Ziffern bleibt 16 Ziffern - kompatibel mit bestehenden Systemen","Pseudonymisierung"],a:2,f:"FPE: ver-/entschluesselt ohne Format zu aendern. 4111-1111-1111-1111 -> 7829-3847-2938-4729 (immer noch 16 Ziffern). Nueztlich wenn Systeme ein bestimmtes Format erwarten. AES-FF1/FF3 Algorithmen."},
{id:57,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist berechtigtes Interesse (Art. 6 Abs. 1 lit. f DSGVO)?",o:["Nur fuer Direktwerbung","Rechtsgrundlage wenn Unternehmen legitimes Interesse an Verarbeitung hat das Interessen der Betroffenen ueberwiegt - Abwaegung erforderlich","Gewinnstreben","Immer zutrefffend"],a:1,f:"Berechtigtes Interesse: Interessenabwaegung noetig. Unternehmen: Interesse an Verarbeitung. Betroffener: Datenschutzinteresse. Legitim: Betrugsvorbeugung, IT-Sicherheit, Netzwerkueberwachung. Nicht legitim: Ubiquitaere Profilerstellung."},
{id:58,b:"11.9",t:"Personenbez. Daten Vertiefung",q:"Was ist Richtigkeit als Datenprinzip?",o:["Personenbezogene Daten muessen sachlich richtig sein - unrichtige Daten berichtigen oder loeschen (Art. 5 Abs. 1d DSGVO)","Mathematische Genauigkeit","Datenintegritat","Datenpruefung"],a:0,f:"Richtigkeit: aktuelle korrekte Daten. Veraltete Adresse, falsche Berufsbezeichnung -> berichtigen oder loeschen. Prozesse um Datenqualitaet zu sichern: regelmaessige Pruefung, Aktualisierungsmoeglichkeit fuer Betroffene."},
{id:59,b:"11.13",t:"Schutzbedarf Vertiefung",q:"Was ist Verteilungseffekt in der Schutzbedarfsanalyse?",o:["Backup-Strategie","Redundanz","Datenteilung","Verteilung von Daten auf verschiedene Systeme kann Schutzbedarf eines Systems senken wenn es nur Teile der Gesamtinformationen enthaelt"],a:3,f:"Verteilungseffekt (Gegenteil von Kumulation): wenn Information auf mehrere Systeme verteilt ist und kein System allein Identifikation ermoeglicht, kann Schutzbedarf einzelner Systeme sinken. Beispiel: getrennte Adress- und Diagnosedatenbank."},
{id:60,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist ein Honeypot?",o:["Ein absichtlich verwundbares System das Angreifer anlockt und deren Methoden dokumentiert - Fruehwarnsystem und Angreifer analysieren","Eine Firewall","Ein Antivirusprogramm","Ein suesses Koeder"],a:0,f:"Honeypot: taeucht als echter Server auf, ist aber Falle. Angreifer greift an, wird beobachtet. Lerneffekt: welche Angriffsmethoden werden verwendet? Fruehwarnung fuer echte Angriffe."},
{id:61,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist SAST vs DAST?",o:["Verschiedene Tests","Identisch","DAST ist besser","SAST: Static Application Security Testing - Quellcodeanalyse ohne Ausfuehren. DAST: Dynamic Application Security Testing - laufende Anwendung testen"],a:3,f:"SAST: Quellcode statisch analysieren (SonarQube, Checkmarx). Frueh im Entwicklungsprozess. DAST: laufende Anwendung testen (OWASP ZAP, Burp Suite). Findet andere Luecken. Beide zusammen (IAST) optimal."},
{id:62,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist Vulnerability Management?",o:["Antivirus-Management","Systematischer Prozess zur Identifikation, Bewertung und Behebung von Sicherheitsluecken in IT-Systemen","Fehlerverwaltung","Patch-Management allein"],a:1,f:"Vulnerability Management: Scanning (Nessus, Qualys), Bewertung (CVSS-Score: Critical/High/Medium/Low), Priorisierung, Behebung (Patch oder Mitigationsmaßnahme), Verifikation. Kontinuierlicher Prozess."},
{id:63,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist CVSS?",o:["Ein Antivirusprogramm","Computer Virus Schutz System","Ein Netzwerkstandard","Common Vulnerability Scoring System: standardisiertes System zur Bewertung des Schweregrads von Sicherheitsluecken (0-10, Critical/High/Medium/Low)"],a:3,f:"CVSS: Score 0-10. 9.0-10.0 Critical, 7.0-8.9 High, 4.0-6.9 Medium, 0.1-3.9 Low. Berechnung aus: Angriffskomplexitaet, Privilegien noetig, Nutzerinteraktion, Auswirkungen. Priorisierung von Patches."},
{id:64,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist Binding Corporate Rules (BCR)?",o:["Standardvertragsklauseln","Ein ISO-Standard","Unternehmensregeln allgemein","Von Aufsichtsbehoerde genehmigtes konzerninternes Datenschutzregelwerk fuer Drittlandtransfers innerhalb eines Konzerns"],a:3,f:"BCR: multinationale Konzerne (wie Google, Microsoft) erhalten Genehmigung fuer konzerninterne Datentransfers in Drittlaender. Aufwendig zu genehmigen aber flexibel innerhalb des Konzerns."},
{id:65,b:"11.9",t:"Personenbez. Daten Vertiefung",q:"Was sind Gesundheitsdaten und wie sind sie besonders geschuetzt?",o:["Nur Arztdaten","Nur Krankenhausdaten","Besonders sensible Datenkategorie (Art. 9 DSGVO): Verarbeitung grundsaetzlich verboten, Ausnahmen nur mit ausdruecklicher Einwilligung oder gesetzlicher Grundlage","Normale personenbezogene Daten"],a:2,f:"Gesundheitsdaten (Art. 9): Diagnosen, Behandlungen, Medikamente, psychische Gesundheit, genetische Daten. Grundsatz: Verarbeitungsverbot. Ausnahmen: Einwilligung, Behandlung, oeffentliche Gesundheit, Forschung."},
{id:66,b:"11.10",t:"Betroffenenrechte Vertiefung",q:"Was ist der Unterschied Art. 13 und Art. 14 DSGVO?",o:["Art. 13 gilt fuer Unternehmen","Identisch","Art. 14 ist strenger","Art. 13: Information wenn Daten direkt bei Betroffenen erhoben werden. Art. 14: Information wenn Daten nicht direkt erhoben werden (von Dritten)"],a:3,f:"Art. 13: Daten direkt beim Betroffenen erhoben (Formular, Anmeldung) -> sofort bei Erhebung informieren. Art. 14: Daten von Dritten erhalten -> innerhalb 1 Monat informieren."},
{id:67,b:"11.11",t:"Anonymisierung Vertiefung",q:"Warum ist echte Anonymisierung schwer zu erreichen?",o:["Re-Identifikation durch Kombination mit externen Datensaetzen, verbesserte Algorithmen und Big-Data-Analysen gefaehrden vermeintliche Anonymitaet","Nie moeglich","Technisch unmoeglich","Nur bei kleinen Datensaetzen"],a:0,f:"Anonymisierungsprobleme: externe Datensaetze kombinieren, Machine Learning findet Muster, Netflix-Studie: anonymisierte Filmbewertungen re-identifiziert durch Vergleich mit IMDb. Vollstaendige Anonymisierung ist schwer."},
{id:68,b:"11.12",t:"Pseudonymisierung Vertiefung",q:"Wer muss den Pseudonymisierungsschluessel schuetzen?",o:["Niemand","Der fuer die Verarbeitung Verantwortliche muss Schluessel getrennt und sicher aufbewahren - Zugriff streng begrenzen","Der Betroffene","Eine externe Stelle"],a:1,f:"Schluessel-Management: Schluessel getrennt von pseudonymisierten Daten aufbewahren. Zugriff auf Schluessel streng kontrollieren (Least Privilege). Schluessel verloren = Daten de-facto anonymisiert."},
{id:69,b:"11.13",t:"Schutzbedarf Vertiefung",q:"Was ist eine Geschaeftsauswirkungsanalyse (BIA)?",o:["Ein Datenschutzaudit","Business Impact Analysis: bewertet welche Auswirkungen der Ausfall von IT-Systemen auf Geschaeftsprozesse haette - Basis fuer RTO und RPO","Eine Risikoanalyse","Finanzkennzahl"],a:1,f:"BIA: Welche Prozesse sind kritisch? Welche Schaeeden entstehen bei Ausfall (finanziell, Reputation, rechtlich)? Daraus: maximale Ausfallzeiten (RTO) und Datenverluste (RPO) definieren. Grundlage fuer Business Continuity Plan."},
{id:70,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist Defense in Depth?",o:["Ein Sicherheitsaudit","Eine Verschluesselung","Eine Firewall-Konfiguration","Sicherheitsprinzip: mehrere unabhaengige Sicherheitsschichten - Angreifer muss mehrere Barrieren ueberwinden"],a:3,f:"Defense in Depth: mehrschichtiger Schutz. Perimeter (Firewall), Netzwerksegmentierung, Endpunktschutz, Applikationssicherheit, Datenverschluesselung, Monitoring. Versagen einer Schicht: naechste haelt dagegen."},
{id:71,b:"11.2",t:"Angriffsmethoden",q:"Was ist ein Botnet?",o:["Ein Sicherheitstool","Netzwerk kompromittierter Computer (Bots/Zombies) die vom Angreifer fuer DDoS, Spam, Kryptomining genutzt werden - Eigentuemer wissen es meist nicht","Eine Art Firewall","Ein Computernetzwerk"],a:1,f:"Botnet: Schadsoftware infiziert Computer. Botmaster steuert alle gleichzeitig. Verwendet fuer: DDoS-Angriffe, Spam-Versand, Kryptomining, Phishing-Mails. Bis zu Millionen infizierte Geraete."},
{id:72,b:"11.2",t:"Angriffsmethoden",q:"Was ist ein Trojaner?",o:["Schadsoftware die sich als nuetzliches Programm tarnt - installiert Backdoor, stiehlt Daten oder laed weitere Malware nach","Ein Wurm","Ein Virus","Ein Antivirusprogramm"],a:0,f:"Trojaner: nicht selbst-replizierend (Unterschied zu Virus). Tarnt sich als nuetzliche Software (Spiel, Utility, Update). Backdoor installieren, Spionieren, Ransomware nachladen. Gefaehrlich weil lange unentdeckt."},
{id:73,b:"11.5",t:"Sicherheitsrichtlinien Vertiefung",q:"Was ist ein Incident Response Plan?",o:["Backup-Plan","Vordefinierter Prozessplan fuer die Reaktion auf Sicherheitsvorfaelle: wer macht was in welcher Reihenfolge","Notfallplan fuer Brände","Auditplan"],a:1,f:"Incident Response Plan: vor einem Vorfall definieren was zu tun ist. Phasen: Vorbereitung, Erkennung, Eindaemmung, Beseitigung, Wiederherstellung, Nachbereitung. Rollen und Kontakte festlegen."},
{id:74,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist ein Datenschutzverantwortlicher vs Auftragsverarbeiter?",o:["Verantwortlicher: entscheidet ueber Zweck und Mittel der Verarbeitung. Auftragsverarbeiter: verarbeitet Daten im Auftrag und Weisung des Verantwortlichen","Auftragsverarbeiter entscheidet mehr","Identisch","Verantwortlicher verarbeitet nicht"],a:0,f:"Verantwortlicher (Controller): bestimmt Zweck. Auftragsverarbeiter (Processor): handelt nach Weisung. Beispiel: Unternehmen = Verantwortlicher, Cloud-Anbieter = Auftragsverarbeiter. AVV zwischen beiden Pflicht."},
{id:75,b:"11.9",t:"Personenbez. Daten Vertiefung",q:"Was ist der Unterschied zwischen biometrischen Daten allgemein und biometrischen Daten zur Identifizierung?",o:["Kein Unterschied","Biometrische Daten zur eindeutigen Identifizierung (Fingerabdruck-Scanner) = Art. 9 besondere Kategorien. Biometrie allgemein (Koerpergroesse) = normale personenbezogene Daten","Alle biometrisch = Art. 9","Art. 9 nur bei DNA"],a:1,f:"Art. 9 gilt fuer biometrische Daten die speziell zur eindeutigen Identifizierung verarbeitet werden (Fingerabdruck als Zugangskontrolle, Gesichtserkennung). Koerpergroesse in Akte: normale Verarbeitung."},
{id:76,b:"11.10",t:"Betroffenenrechte Vertiefung",q:"Was ist das Recht auf Beschwerde bei der Aufsichtsbehoerde?",o:["Nur bei Grossunternehmen","Betroffene koennen sich bei der Aufsichtsbehoerde (LDA/BfDI) beschweren wenn sie DSGVO-Verletzungen vermuten - kostenfrei, kein Anwalt noetig","Kein formelles Recht","Nur gerichtlich"],a:1,f:"Beschwerderecht Art. 77 DSGVO: jeder kann bei Aufsichtsbehoerde Beschwerde einlegen. Aufsichtsbehoerde muss Beschwerde pruefen und Ergebnis mitteilen. Effektive Moeglichkeit ohne Gerichtskosten."},
{id:77,b:"11.11",t:"Anonymisierung Vertiefung",q:"Was ist der Unterschied synthetische Daten vs anonymisierte Daten?",o:["Synthetische Daten: KI generiert neue Daten die statistische Eigenschaften der Originaldaten haben ohne reale Personen abzubilden. Anonymisiert: echte Daten ohne Personenbezug","Identisch","Synthetische sind besser","Anonymisierte sind kuenstlich"],a:0,f:"Synthetische Daten: KI (GAN) erzeugt neue Datensaetze. Keine reale Person dahinter. Vorteil: kein Datenschutzrisiko, unendlich skalierbar. Anonymisierte Daten: echte Daten bearbeitet. Beide fuer Forschung/Testing geeignet."},
{id:78,b:"11.13",t:"Schutzbedarf Vertiefung",q:"Was ist ein Sicherheitskonzept?",o:["IT-Sicherheitsrichtlinie","Auditbericht","Umfassendes Dokument das alle Sicherheitsanforderungen, Massnahmen und Verantwortlichkeiten fuer eine Organisation oder ein System beschreibt","Risikobewertung"],a:2,f:"IT-Sicherheitskonzept: Grundlage der IT-Sicherheit. Enthalt: Schutzbedarfsanalyse, Risikoanalyse, Massnahmenkatalog, Verantwortlichkeiten, Pruefverfahren. Wird regelmaessig aktualisiert."},
{id:79,b:"11.5",t:"Sicherheitsrichtlinien Vertiefung",q:"Was ist Security by Design?",o:["Sicherheit wird von Anfang an in Systeme eingebaut statt nachtraeglich hinzugefuegt - aehnlich wie Privacy by Design fuer Sicherheit","Sicheres Design-Buero","Schoenes Design","Ein ISO-Standard"],a:0,f:"Security by Design: Sicherheit als Designprinzip, nicht als Nachgedanke. Threat Modeling im Design. Secure Coding Standards. Code Reviews. Security Testing. Analoge zu Privacy by Design fuer Datenschutz."},
{id:80,b:"11.6",t:"Personelle Massnahmen Vertiefung",q:"Was ist Privilege Access Management (PAM)?",o:["Priviliegierter Zugang","Zugangskontrolle allgemein","Loesung zur sicheren Verwaltung privilegierter Accounts (Admins, Root): sichere Anmeldung, Sitzungsaufzeichnung, Just-in-Time-Zugriff","Passwort-Manager"],a:2,f:"PAM: Admin-Accounts besonders sichern. Just-in-Time-Zugriff (nur wenn noetig, zeitlich begrenzt). Sitzungsaufzeichnung. Passwort-Rotation. Verhindert Miss-brauch privilegierter Accounts. Beispiele: CyberArk, BeyondTrust."},
{id:81,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist NAC (Network Access Control)?",o:["Kontrolle welche Geraete sich mit dem Netzwerk verbinden duerfen: Geraet wird geprueft (aktuelles BS, Antivirus, Patch) bevor Netzwerkzugang","Netzwerkkonfiguration","Netzwerkzaehler","Zugangspunkt"],a:0,f:"NAC: bevor Geraet ins Netz darf: Compliance prufen. Antivirusprogramm aktuell? BS gepatcht? Verschluesselung aktiv? Nicht konformes Geraet: in Quarantaenenetz. Eigenes und fremdes Geraet kontrollieren."},
{id:82,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist Cloud Computing aus DSGVO-Sicht?",o:["Kein Datenschutzthema","Immer verboten","Cloud-Anbieter ist Auftragsverarbeiter: AVV Pflicht. Standort der Server relevant (EU vs USA). Datenschutzerklaerung muss Cloud-Nutzung offenlegen","Immer erlaubt"],a:2,f:"Cloud DSGVO: Cloud-Anbieter = Auftragsverarbeiter -> AVV abschliessen. EU/EWR-Server: keine besonderen Anforderungen. USA-Server: SCCs oder BCR. Sub-Auftragsverarbeiter des Cloud-Anbieters mitberuecksichtigen."},
{id:83,b:"11.9",t:"Personenbez. Daten Vertiefung",q:"Was sind Beschaeftigtendaten nach §26 BDSG?",o:["Alle Mitarbeiterdaten","Nur Stammdaten","Nur Gehaltsdaten","Personenbezogene Daten von Mitarbeitern: duerfen nur soweit verarbeitet werden wie fuer Beschaeftigungsverhaeltnis erforderlich oder Mitarbeiter eingewilligt hat"],a:3,f:"§26 BDSG: Mitarbeiterdaten fuer Begruendung, Durchfuehrung, Beendigung des Arbeitsverhaeltnisses. Ueberwachung von Mitarbeitern sehr eingeschraenkt. Betriebsrat hat Mitbestimmungsrecht."},
{id:84,b:"11.10",t:"Betroffenenrechte Vertiefung",q:"Was ist Schadensersatz bei DSGVO-Verletzungen?",o:["Nur materiell","Nur symbolisch","Art. 82 DSGVO: Betroffene haben Anspruch auf materiellen und immateriellen Schadensersatz wenn DSGVO verletzt wurde - auch immaterielle Schaeden (Stress, Angst)","Nur gegenueber Behoerden"],a:2,f:"Schadensersatz Art. 82: materiell (echter Schaden: Datenmissbrauch fuer Betrug) und immateriell (Stress, Kontrollverlust). Verantwortlicher und Auftragsverarbeiter haften solidarisch. Klagen haeufen sich."},
{id:85,b:"11.7",t:"BSI Grundschutz Vertiefung",q:"Was ist die KRITIS-V (KRITIS-Verordnung)?",o:["Eine ISO-Norm","Rechtsverordnung die definiert welche Betreiber kritischer Infrastruktur nach IT-Sicherheitsgesetz besondere Anforderungen erfuellen muessen","Ein Bundesgesetz","Ein Datenschutzgesetz"],a:1,f:"KRITIS-Verordnung: konkretisiert welche Betreiber in KRITIS-Sektoren betroffen sind (Schwellenwerte). IT-SiG 2.0 Pflichten: Mindest-IT-Sicherheitsniveau, Meldepflichten, Nachweis alle 2 Jahre."},
{id:86,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist das One-Stop-Shop-Prinzip der DSGVO?",o:["Alle Behoerden gleichzeitig","Einheitliches Datenschutzformular","Fuer Unternehmen mit Hauptniederlassung in einem EU-Mitgliedstaat ist die dortige Aufsichtsbehoerde federfuehrend - vereinfacht Grenzueberschreitende Faelle","Datenschutz in einem Schritt"],a:2,f:"One-Stop-Shop: Unternehmen mit EU-Hauptniederlassung hat eine federfuehrende Aufsichtsbehoerde (Lead Supervisory Authority). Koordinierungsverfahren mit anderen Behoerden. Vereinfacht Compliance fuer grenzueberschreitende Verarbeitung."},
{id:87,b:"11.13",t:"Schutzbedarf Vertiefung",q:"Was ist Security Hardening?",o:["Sichere Hardware","Absicherung von Systemen durch Deaktivierung nicht benoetiger Dienste, Entfernen von Standardpasswoertern, Aktualisieren auf sicherstem Stand","Systemoptimierung","Netzwerkkonfiguration"],a:1,f:"Hardening: minimale Angriffsoberflaeche. Nicht benoetigte Dienste deaktivieren, Standardpasswoerter aendern, minimale Benutzerrechte, alle Updates einspielen, sichere Konfiguration nach CIS Benchmarks."},
{id:88,b:"11.2",t:"Angriffsmethoden",q:"Was ist Password Spraying?",o:["Angriff bei dem ein haefig genutztes Passwort gegen viele Konten getestet wird - umgeht Account-Lockout durch geringe Versuche pro Konto","Passwortanalyse","Keylogger","Brutforce-Angriff"],a:0,f:"Password Spraying: statt viele Passwoerter fuer ein Konto, ein Passwort fuer viele Konten. Passwort123 gegen 10.000 Konten: wahrscheinlich einige treffer, kein Account-Lockout ausgeloest."},
{id:89,b:"11.2",t:"Angriffsmethoden",q:"Was ist ein Keylogger?",o:["Ein Virus","Eine Tastatur","Ein Netzwerkmonitor","Software oder Hardware die Tastatureingaben aufzeichnet und an Angreifer sendet - stiehlt Passwoerter und vertrauliche Informationen"],a:3,f:"Keylogger: Hardware (zwischen Tastatur und PC) oder Software (Trojaner). Zeichnet alle Eingaben auf. Passwoerter, Kreditkartennummern, E-Mails. Schutz: Antivirenprogramm, 2FA (abgefangenes Passwort allein nutzlos)."},
{id:90,b:"11.5",t:"Sicherheitsrichtlinien Vertiefung",q:"Was ist eine acceptable use policy?",o:["Richtlinie die festlegt wie IT-Ressourcen erlaubterweise genutzt werden duerfen: private Nutzung, social Media, illegale Inhalte, Verantwortlichkeiten","Allgemeine Nutzungsregeln","Lizenzvereinbarung","Datenschutzrichtlinie"],a:0,f:"Acceptable Use Policy (AUP): regelt erlaubte und verbotene Nutzung von IT-Systemen. Private Nutzung (begrenzt erlaubt?), verbotene Inhalte, Verantwortlichkeit bei Verstoss. Basis fuer arbeitsrechtliche Konsequenzen."},
{id:91,b:"11.6",t:"Personelle Massnahmen Vertiefung",q:"Was ist Security Awareness Measurement?",o:["Messung des tatsaechlichen Sicherheitsverhaltens: Phishing-Klickraten, Passwortsicherheit, Incident-Melderate - nicht nur ob Schulung besucht","Nur Schulungsteilnahme messen","Nicht messbar","Nur Wissenspruefung"],a:0,f:"Awareness-Messung: Phishing-Simulation (Klickrate vor/nach Schulung), Password-Audits, Incident-Melderate, Desk-Audits (Clean Desk). Quantifiziert Sicherheitsverhalten, nicht nur Wissen."},
{id:92,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist Datenschutz bei Cloud-E-Mail-Diensten?",o:["E-Mail-Anbieter als Auftragsverarbeiter: AVV noetig, Serverstandort relevant, Verschluesselung, Zugriffsrechte des Anbieters pruefen","Kein Datenschutzthema","Immer erlaubt","Immer Gmail verwenden"],a:0,f:"Cloud-E-Mail (Microsoft 365, Google Workspace): Anbieter = Auftragsverarbeiter, AVV Pflicht. Serverstandort EU bevorzugt. E-Mail-Inhalte sind personenbezogene Daten. Mitarbeiterdaten im Postfach: §26 BDSG beachten."},
{id:93,b:"11.9",t:"Personenbez. Daten Vertiefung",q:"Was ist Datenschutz bei der Videooverwachung?",o:["Strenge Anforderungen: Rechtsgrundlage noetig (§4 BDSG), Hinweisschild Pflicht, Daten loeschen nach kurzer Zeit, Interessenabwaegung, Betriebsrat","Nur in Banken","Keine Regeln","Immer erlaubt"],a:0,f:"Videooverwachung §4 BDSG: nur zur Wahrnehmung des Hausrechts oder berechtigter Interessen. Hinweisschild: sichtbar, klar. Speicherdauer: minimal (48-72h). Betriebsrat: Mitbestimmungsrecht. DSGVO Art. 6: Rechtsgrundlage."},
{id:94,b:"11.10",t:"Betroffenenrechte Vertiefung",q:"Was ist das Widerrufsrecht der Einwilligung?",o:["Nur schriftlich","Kein Recht","Einwilligung kann jederzeit ohne Nachweis von Gruenden und ohne Nachteile widerrufen werden - vorherige Verarbeitung bleibt rechtmaessig (Art. 7 Abs. 3 DSGVO)","Nur nach 1 Jahr"],a:2,f:"Widerruf: jederzeit, ohne Begruendung, ohne Nachteile (kein schlechterer Service). Widerruf muss genauso einfach sein wie Einwilligung. Nach Widerruf: Daten loeschen. Vorherige Verarbeitung: rechtmaessig geblieben."},
{id:95,b:"11.11",t:"Anonymisierung Vertiefung",q:"Was ist Pseudonymisierung im klinischen Forschungskontext?",o:["Keine Massnahme noetig","Patienten erhalten Pseudonyme (Codes), Arzt behaelt Schluessel. Forscherdaten enthalten nur Codes. DSGVO gilt aber erleichterte Forschungsmoeglichkeit","Normale Patientendaten","Vollstaendige Anonymisierung"],a:1,f:"Klinische Forschung: Pseudonymisierung erlaubt Forschung mit Patientendaten ohne direkten Personenbezug fuer Forscher. Arzt oder vertrauenswuerdige Stelle haelt Schluessel separat. DSGVO Art. 9 Abs. 2j erlaubt Forschungszwecke."},
{id:96,b:"11.12",t:"Pseudonymisierung Vertiefung",q:"Was ist Verschluesselung als Pseudonymisierungsmethode?",o:["Daten sichern","Daten aggregieren","Originaldaten werden verschluesselt, Schluessel wird separat aufbewahrt - Klartext nicht mehr direkt zugaenglich, Entschluesselung nur mit Schluessel","Daten loeschen"],a:2,f:"Verschluesselung als Pseudonymisierung: AES-Verschluesselung der Identifikatoren, Schluessel separat. Entschlueesselung moeglich aber kontrollierbar. Praktisch in Datenbanken: verschluesselte Spalten."},
{id:97,b:"11.13",t:"Schutzbedarf Vertiefung",q:"Was ist Residual Risk?",o:["Restrisiko das nach Umsetzung aller Sicherheitsmassnahmen verbleibt - kann akzeptiert, versichert oder durch weitere Massnahmen reduziert werden","Das groesste Risiko","Null-Risiko","Versicherungsrisiko"],a:0,f:"Residualrisiko: kein Risiko = 0 ist praktisch unmoeglich. Nach Massnahmen bleibt Rest-Risiko. Entscheidung: akzeptieren (Kosten > Nutzen), versichern (Cyberversicherung), oder weitere Massnahmen."},
{id:98,b:"11.2",t:"Sicherheitstechnologien",q:"Was ist Vulnerability Scanning?",o:["Automatisiertes Scannen von IT-Systemen nach bekannten Sicherheitsluecken - regelmaessig durchfuehren und Ergebnisse priorisiert beheben","Antivirus-Scan","Systemtest","Penetrationstest"],a:0,f:"Vulnerability Scan: Tools wie Nessus, OpenVAS scannen Systeme, Dienste, Anwendungen. Vergleich mit Datenbank bekannter CVEs. Ergebnis: Lueckenliste mit CVSS-Scores. Basis fuer Patch-Priorisierung."},
{id:99,b:"11.8",t:"DSGVO Vertiefung",q:"Was ist Loeschkonzept?",o:["Systematisches Dokument das Loeschfristen und -verfahren fuer alle Datenkategorien eines Unternehmens regelt - DSGVO Art. 5 Pflicht","Datenloeschung allgemein","Altdatenbereinigung","Backup-Loeschung"],a:0,f:"Loeschkonzept: welche Daten werden wie lange aufbewahrt und wie geloescht? Beispiel: Kundendaten 3 Jahre nach Vertragsende, Rechnungen 10 Jahre (Steuerrecht), Bewerberdaten 6 Monate. Loeschverfahren: sicheres Ueberschreiben, physische Vernichtung."},
{id:100,b:"11.13",t:"Schutzbedarf Vertiefung",q:"Was ist ein IT-Notfallplan?",o:["Sicherheitsrichtlinie","Vordefinierter Plan fuer den Umgang mit schwerwiegenden IT-Ausfaellen: wer wird informiert, welche Systeme werden als erstes wiederhergestellt, wer entscheidet","Backup-Plan","Feuerschutzplan"],a:1,f:"IT-Notfallplan: Kontaktliste (wer informiert wen?), Systempriorisierung (was zuerst wiederherstellen?), Ausweichverfahren (was wenn System wochenlang weg?), Kommunikationsplan (interne/externe Info). Regelmaessig testen!"}
];

let st={},filt=[...Q];
function init(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});render();}
function render(){
  const c=document.getElementById("qc");c.innerHTML="";
  let lb=null;
  filt.forEach(q=>{
    if(q.b!==lb){const d=document.createElement("div");d.className="bh";d.textContent=BN[q.b]||q.b;c.appendChild(d);lb=q.b;}
    c.appendChild(mk(q));
  });up();}
function mk(q){
  const s=st[q.id],d=document.createElement("div"),L=["A","B","C","D"];
  d.className="qc"+(s.done?(s.ok?" ac":" aw"):"");d.id="c"+q.id;
  d.innerHTML=`<div class="qn">FRAGE ${q.id}/${Q.length}</div><div class="qt">${q.t}</div><div class="qq">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt${s.done?" dis":""}${s.done&&i===q.a?" ok":""}${s.done&&!s.ok&&i===s.ci?" ng":""}" onclick="ans(${q.id},${i})"><span class="ol">${L[i]}</span><span>${o}</span></div>`).join("")}</div>
<div class="fbb${s.done?" show "+(s.ok?"cok":"cng"):""}" id="f${q.id}">${s.done?(s.ok?"✅ ":"❌ ")+q.f:""}</div>`;
  return d;}
function ans(id,i){
  const s=st[id];if(s.done)return;
  const q=Q.find(x=>x.id===id);s.done=true;s.ok=i===q.a;s.ci=i;
  const c=document.getElementById("c"+id);c.className="qc "+(s.ok?"ac":"aw");
  c.querySelectorAll(".opt").forEach((el,j)=>{el.classList.add("dis");if(j===q.a)el.classList.add("ok");if(!s.ok&&j===i)el.classList.add("ng");});
  const f=document.getElementById("f"+id);f.textContent=(s.ok?"✅ ":"❌ ")+q.f;f.className="fbb show "+(s.ok?"cok":"cng");up();}
function up(){
  const tot=Q.length,done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  document.getElementById("sd").textContent=ok+"/"+done;
  document.getElementById("pf").style.width=(done/tot*100)+"%";
  document.getElementById("pl").textContent=done+" von "+tot+" beantwortet";}
function fil(t,btn){
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("act"));btn.classList.add("act");
  if(t==="all")filt=[...Q];
  else if(t==="open")filt=Q.filter(q=>!st[q.id].done);
  else if(t==="wrong")filt=Q.filter(q=>st[q.id].done&&!st[q.id].ok);
  else filt=Q.filter(q=>q.b===t);render();}
function shuf(){filt=[...filt].sort(()=>Math.random()-.5);render();}
function rst(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});filt=[...Q];document.querySelectorAll(".fb").forEach((b,i)=>b.classList.toggle("act",i===0));render();document.getElementById("ov").classList.remove("show");}
function showR(){
  const done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  const pct=done>0?Math.round(ok/done*100):0;
  let e="😅",m="Weiter ueben!";
  if(pct>=90){e="🏆";m="Ausgezeichnet!";}else if(pct>=75){e="🎉";m="Sehr gut!";}else if(pct>=60){e="📚";m="Gut weiter so!";}
  document.getElementById("oe").textContent=e;document.getElementById("os").textContent=ok+"/"+done;
  document.getElementById("om").textContent=pct+"% richtig - "+m;
  document.getElementById("ov").classList.add("show");}
function closeR(){document.getElementById("ov").classList.remove("show");}
init();
</script></body></html>
