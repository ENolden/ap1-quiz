<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<title>IT-Berufe AP1 · Lernzettel Quiz</title>
<style>
  :root{
    --bg:#0F111A;
    --bg-soft:#151827;
    --card:#1A1E2E;
    --card-border:#262B3D;
    --ink:#E8E9F0;
    --ink-soft:#8A8FA3;
    --ink-dim:#5A5F73;
    --orange:#FF7A29;
    --orange-deep:#E0641A;
    --orange-bg:rgba(255,122,41,0.12);
    --green:#3DDC84;
    --green-bg:rgba(61,220,132,0.12);
    --red:#FF5C5C;
    --red-bg:rgba(255,92,92,0.12);
    --chip-bg:#1C2033;
    --chip-border:#2A2F45;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding-bottom:60px;
  }
  .wrap{ max-width:720px; margin:0 auto; padding:20px 16px 40px; }

  .top{ display:flex; align-items:flex-start; gap:14px; margin-bottom:16px; }
  .kap-badge{
    background:var(--orange); color:#1A0E00;
    font-weight:800; font-size:0.82rem;
    padding:7px 12px; border-radius:8px;
    letter-spacing:0.02em; flex:0 0 auto;
  }
  .top h1{ font-size:1.5rem; font-weight:800; margin:0 0 2px; letter-spacing:-0.01em; }
  .top .sub{ color:var(--ink-soft); font-size:0.86rem; }

  .stats-row{ display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .score{ font-size:1.7rem; font-weight:800; color:var(--orange); }
  .iconbtn{
    background:var(--chip-bg); border:1px solid var(--chip-border);
    color:var(--ink); border-radius:9px; width:42px; height:42px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:1.05rem;
  }
  .iconbtn:hover{ border-color:var(--orange); }
  .btn-eval{
    background:var(--orange); color:#1A0E00; border:none;
    font-weight:700; font-size:0.92rem;
    padding:0 20px; height:42px; border-radius:9px; cursor:pointer;
  }
  .btn-eval:hover{ background:var(--orange-deep); }

  .rail{ height:6px; background:var(--card-border); border-radius:3px; overflow:hidden; margin-bottom:8px; }
  .rail-fill{ height:100%; width:0%; background:var(--orange); transition:width .3s ease; }
  .rail-caption{ text-align:right; color:var(--ink-soft); font-size:0.78rem; margin-bottom:18px; }

  .filters{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:22px; }
  .chip{
    background:var(--chip-bg); border:1px solid var(--chip-border);
    color:var(--ink-soft); font-size:0.82rem; font-weight:600;
    padding:8px 14px; border-radius:20px; cursor:pointer; white-space:nowrap;
  }
  .chip.active{ background:var(--orange); border-color:var(--orange); color:#1A0E00; }
  .chip:hover:not(.active){ border-color:var(--orange); color:var(--ink); }

  .chapter-head{
    display:flex; align-items:center; gap:10px;
    border-left:3px solid var(--orange);
    padding:10px 14px; margin:26px 0 14px;
    background:var(--bg-soft); border-radius:0 8px 8px 0;
  }
  .chapter-head h2{ font-size:1.02rem; margin:0; color:var(--orange); font-weight:700; }

  .card{
    background:var(--card); border:1px solid var(--card-border);
    border-radius:12px; padding:20px 18px; margin-bottom:16px;
  }
  .card.hidden{ display:none; }
  .card-meta{ color:var(--ink-dim); font-size:0.7rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:8px; }

    display:inline-block; border:1px solid var(--orange); color:var(--orange);

  .card-q{ font-size:1.05rem; font-weight:700; line-height:1.4; margin:0 0 16px; }

    display:flex; gap:12px; align-items:flex-start;
    border:1px solid var(--card-border); border-radius:9px;
    padding:12px 14px; margin-bottom:9px; cursor:pointer;
    font-size:0.9rem; line-height:1.4; transition:border-color .12s, background .12s;
  }
  .opt:hover{ border-color:var(--orange); }
  .opt .letter{
    flex:0 0 auto; width:24px; height:24px; border-radius:50%;
    background:var(--chip-bg); border:1px solid var(--card-border);
    display:flex; align-items:center; justify-content:center;
    font-size:0.76rem; font-weight:700; color:var(--ink-soft);

  .opt.correct .letter{ background:var(--green); border-color:var(--green); color:#04240F; }
  .opt.wrong{ background:var(--red-bg); border-color:var(--red); }
  .opt.wrong .letter{ background:var(--red); border-color:var(--red); color:#2B0505; }
  .opt.disabled{ cursor:default; }
  .opt.dim{ opacity:0.45; }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(6,7,12,0.72);
    display:none; align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .modal-overlay.show{ display:flex; }

    background:var(--card); border:1px solid var(--card-border); border-radius:14px;
    padding:28px 24px; max-width:420px; width:100%; text-align:center;
  }

  .modal .big span{ color:var(--ink-soft); font-size:1.3rem; }
  .modal .rows{ text-align:left; margin:20px 0; }
  .modal .row{

    border-bottom:1px solid var(--card-border); font-size:0.85rem;
  }
  .modal .row span:last-child{ color:var(--ink-soft); }

    padding:12px 22px; border-radius:9px; cursor:pointer; font-size:0.9rem; margin-top:6px;
  }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>

const TOTAL = QUIZ.length;

// answers[n] = { picked: idx, correct: bool } or undefined
let answers = {};
let currentFilter = 'Alle';
let order = QUIZ.slice(); // current display order (array of question objects)

const chapters = [...new Set(QUIZ.map(q => q.cat))];

function buildFilters(){
  const el = document.getElementById('filters');
  el.innerHTML = '';
  const defs = ['Alle', ...chapters, 'Offen', 'Falsch'];
  defs.forEach(name => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (name === currentFilter ? ' active' : '');
    chip.textContent = name;
    chip.addEventListener('click', () => { currentFilter = name; render(); });
    el.appendChild(chip);
  });
}

function passesFilter(q){
  if(currentFilter === 'Alle') return true;
  if(currentFilter === 'Offen') return !(q.n in answers);
  if(currentFilter === 'Falsch') return (q.n in answers) && !answers[q.n].correct;
  return q.cat === currentFilter;
}

function render(){
  buildFilters();
  const list = document.getElementById('list');
  list.innerHTML = '';
  let lastCat = null;
  let shown = 0;

  const visible = order.filter(passesFilter);
  document.getElementById('emptyMsg').style.display = visible.length ? 'none' : 'block';

  visible.forEach(q => {
    if(q.cat !== lastCat && currentFilter === 'Alle'){
      const head = document.createElement('div');
      head.className = 'chapter-head';
      head.innerHTML = `<h2>${q.cat}</h2>`;
      list.appendChild(head);
      lastCat = q.cat;
    }
    shown++;
    list.appendChild(renderCard(q));
  });

  updateStats();
}

function renderCard(q){
  const card = document.createElement('div');
  card.className = 'card';
  const meta = document.createElement('div');
  meta.className = 'card-meta';
  meta.textContent = `Frage ${q.n} / ${TOTAL}`;
  card.appendChild(meta);

  const tag = document.createElement('div');
  tag.className = 'card-tag';
  tag.textContent = q.cat;
  card.appendChild(tag);

  const qEl = document.createElement('p');
  qEl.className = 'card-q';
  qEl.textContent = q.q;
  card.appendChild(qEl);

  const optsWrap = document.createElement('div');
  const letters = ['A','B','C','D'];
  const state = answers[q.n];

  q.options.forEach((opt, i) => {
    const row = document.createElement('div');
    row.className = 'opt';
    row.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    if(state){
      row.classList.add('disabled');
      if(i === q.correct) row.classList.add('correct');
      else if(i === state.picked) row.classList.add('wrong');
      else row.classList.add('dim');
    } else {
      row.addEventListener('click', () => {
        answers[q.n] = { picked: i, correct: i === q.correct };
        render();
      });
    }
    optsWrap.appendChild(row);
  });
  card.appendChild(optsWrap);
  return card;
}

function updateStats(){
  const answeredCount = Object.keys(answers).length;
  const correctCount = Object.values(answers).filter(a => a.correct).length;
  document.getElementById('scoreLine').textContent = `${correctCount}/${answeredCount}`;
  document.getElementById('railFill').style.width = `${(answeredCount/TOTAL)*100}%`;
  document.getElementById('railCaption').textContent = `${answeredCount} von ${TOTAL} beantwortet`;
}

function shuffleOrder(){
  const a = order.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  order = a;
  render();
}

function resetAll(){
  answers = {};
  render();
}

function showEval(){
  const answeredCount = Object.keys(answers).length;
  const correctCount = Object.values(answers).filter(a => a.correct).length;
  document.getElementById('modalScore').innerHTML = `${correctCount}<span>/${TOTAL}</span>`;
  const rows = document.getElementById('modalRows');
  rows.innerHTML = '';
  chapters.forEach(cat => {
    const qs = QUIZ.filter(q => q.cat === cat);
    const done = qs.filter(q => q.n in answers);
    const right = done.filter(q => answers[q.n].correct);
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `<span>${cat}</span><span>${right.length}/${qs.length}</span>`;
    rows.appendChild(row);
  });
  document.getElementById('modalOverlay').classList.add('show');
}

document.getElementById('shuffleBtn').addEventListener('click', shuffleOrder);
document.getElementById('resetBtn').addEventListener('click', resetAll);
document.getElementById('evalBtn').addEventListener('click', showEval);
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('show');
});
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if(e.target.id === 'modalOverlay') document.getElementById('modalOverlay').classList.remove('show');
});

render();
</script>
