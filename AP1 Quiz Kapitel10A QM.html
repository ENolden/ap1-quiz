.fbb.show{display:block;}.fbb.cok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#86efac;}
.fbb.cng{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}

<script>
const BN={"10.1":"🏆 10.1 QM-Systeme","10.2":"📋 10.2 QS-Normen","10.3":"🏅 10.3 Zertifizierung","10.4":"🎯 10.4 Qualitaetsplanung","10.5":"🔧 10.5 Qualitaetslenkung","10.6":"🔄 10.6 PDCA","10.7":"📝 10.7 Testprotokoll"};
const Q=[
{id:1,b:"10.1",t:"QM-Systeme",q:"Was ist ein Qualitaetsmanagementsystem (QMS)?",o:["Kundenbefragungssystem","Fehlerdatenbank","Strukturierter Ansatz zur Sicherstellung der Qualitaet: Prozesse, Richtlinien und Verantwortlichkeiten zur kontinuierlichen Verbesserung","Softwaretestsystem"],a:2,f:"QMS: umfasst alle geplanten und systematischen Aktivitaeten zur Qualitaetssicherung. Ziel: Produkte und Dienstleistungen erfullen Kundenanforderungen konsistent."},
{id:2,b:"10.1",t:"QM-Systeme",q:"Was sind die Ziele eines QMS?",o:["Kundenzufriedenheit sichern, Fehler reduzieren, Prozesse verbessern, gesetzliche Anforderungen erfuellen","Nur Kostensenkung","Mitarbeiterleistung messen","Nur Zertifizierung"],a:0,f:"QMS-Ziele: Kundenanforderungen erfuellen, Fehlerquoten senken, Prozesse standardisieren, kontinuierlich verbessern, gesetzliche und normative Anforderungen erfullen."},
{id:3,b:"10.1",t:"QM-Systeme",q:"Was ist der Unterschied zwischen Qualitaetssicherung und Qualitaetskontrolle?",o:["QK ist umfassender","Identisch","QS: praeventive Prozesse die Fehler verhindern. QK: reaktive Pruefung ob Ergebnisse den Anforderungen entsprechen","QS findet nach Produktion statt"],a:2,f:"QS (Qualitaetssicherung): praeventiv, waehrend des Prozesses. QK (Qualitaetskontrolle): reaktiv, prueft fertiges Ergebnis. Beide sind Bestandteile des QMS."},
{id:4,b:"10.1",t:"QM-Systeme",q:"Was sind die 7 Grundsaetze des Qualitaetsmanagements nach ISO 9001?",o:["Planen, Tun, Pruefen, Handeln, Messen, Berichten, Verbessern","Kundenorientierung, Fuehrung, Einbindung Mitarbeiter, Prozessorientierung, Verbesserung, Faktenbasierte Entscheidung, Beziehungsmanagement","Schnell, Billig, Gut, Sicher, Nachhaltig, Modern, Digital","Qualitaet, Zeit, Kosten, Service, Sicherheit, Innovation, Nachhaltigkeit"],a:1,f:"7 QM-Grundsaetze ISO 9001: 1.Kundenorientierung, 2.Fuehrung, 3.Einbindung Mitarbeiter, 4.Prozessorientierung, 5.Verbesserung, 6.Faktenbasierte Entscheidungsfindung, 7.Beziehungsmanagement."},
{id:5,b:"10.1",t:"QM-Systeme",q:"Was ist TQM (Total Quality Management)?",o:["Technologisches Qualitaetsmodell","Testqualitaetsmanagement","Umfassender Ansatz: Qualitaet als Verantwortung aller Mitarbeiter auf allen Ebenen - nicht nur der Qualitaetsabteilung","Technisches Qualitaetsmodul"],a:2,f:"TQM: Qualitaet als gesamtunternehmerische Aufgabe. Jeder Mitarbeiter traegt Verantwortung. Kundenorientierung, kontinuierliche Verbesserung, Einbindung aller. Japanischer Ursprung (Kaizen)."},
{id:6,b:"10.1",t:"QM-Systeme",q:"Was ist ein Audit im Qualitaetsmanagement?",o:["Systematische, unabhaengige Pruefung ob QM-Vorgaben eingehalten werden - intern oder extern","Eine Kundenbefragung","Eine Bestrafung","Ein Produkttest"],a:0,f:"Audit: systematische Pruefung. Internes Audit: Selbstbewertung. Externes Audit: durch Zertifizierungsstelle (TUeV, DEKRA). Liefert Grundlage fuer Verbesserungen und Zertifizierungen."},
{id:7,b:"10.1",t:"QM-Systeme",q:"Was ist ein internes vs externes Audit?",o:["Identisch","Extern ist guenstiger","Intern ist strenger","Intern: Unternehmen prueft sich selbst. Extern: unabhaengige Stelle prueft z.B. fuer Zertifizierung"],a:3,f:"Internes Audit: Selbstbewertung, kontinuierliche Verbesserung. Externes Audit: Zertifizierungsstelle prueft Konformitaet mit Norm (z.B. ISO 9001). Ergebnis: Zertifikat oder Nichtkonformitaeten."},
{id:8,b:"10.1",t:"QM-Systeme",q:"Was ist ein Qualitaetsbeauftragter?",o:["Person die QM-System betreut, Audits koordiniert, Verbesserungen initiiert und Managementberichte erstellt","Ein externer Prufer","Ein Mitarbeiter ohne Verantwortung","Ein Testvorbereiter"],a:0,f:"Qualitaetsbeauftragter (QB): koordiniert QMS-Aktivitaeten, plant Audits, berichtet an Management, initiiert Verbesserungen, schult Mitarbeiter. Verbindungsglied zwischen QMS und Unternehmensleitung."},
{id:9,b:"10.1",t:"QM-Systeme",q:"Was ist Konformitaet im QM?",o:["Gleichfoermigkeit","Konformismus","Erfuellung von Anforderungen (Normen, Kundenvorgaben, gesetzliche Vorschriften) - Ziel jedes QMS","Einheitlichkeit im Design"],a:2,f:"Konformitaet: Produkt/Prozess erfuellt alle relevanten Anforderungen. Nicht-Konformitaet (NC): Anforderung wird nicht erfuellt -> muss dokumentiert und behoben werden."},
{id:10,b:"10.1",t:"QM-Systeme",q:"Was ist eine Nichtkonformitaet (NC)?",o:["Eine Kundenbeschwerden","Ein kleiner Fehler ohne Konsequenzen","Ein Produktfehler nur","Abweichung von einer festgelegten Anforderung - muss dokumentiert, analysiert und korrigiert werden"],a:3,f:"NC: festgestellte Abweichung von Anforderung. Korrekturmassnahme erforderlich. Dokumentation: Art der NC, Ursache, Massnahme, Verifizierung. Im Audit: NC-Befunde werden ausgegeben."},
{id:11,b:"10.2",t:"QS-Normen",q:"Was ist ISO 9001?",o:["Umweltstandard","Sicherheitsstandard","Internationale Norm fuer Qualitaetsmanagementsysteme - Grundlage fuer QMS-Zertifizierungen weltweit","Datenschutzstandard"],a:2,f:"ISO 9001: weltweit anerkannte Norm fuer QMS. Aktuelle Version: ISO 9001:2015. Definiert Anforderungen an QMS. Zertifizierung zeigt Kunden dass Unternehmen Qualitaet systematisch managt."},
{id:12,b:"10.2",t:"QS-Normen",q:"Was ist ISO 27001?",o:["Standard fuer Informationssicherheitsmanagementsysteme (ISMS) - systematischer Ansatz zur IT-Sicherheit","Umweltstandard","Medizinstandard","Qualitaetsstandard"],a:0,f:"ISO 27001: ISMS-Standard. Definiert Anforderungen fuer Informationssicherheit. Risikoorientierter Ansatz. Zertifizierung belegt systematisches IT-Sicherheitsmanagement."},
{id:13,b:"10.2",t:"QS-Normen",q:"Was ist ISO 14001?",o:["Qualitaetsstandard","IT-Sicherheitsstandard","Norm fuer Umweltmanagementsysteme - hilft Unternehmen ihre Umweltauswirkungen systematisch zu reduzieren","Medizinstandard"],a:2,f:"ISO 14001: Umweltmanagementsystem-Norm. Aehnliche Struktur wie ISO 9001 (High Level Structure). Unternehmen managen Umweltauswirkungen systematisch. Wird oft kombiniert mit ISO 9001."},
{id:14,b:"10.2",t:"QS-Normen",q:"Was ist CE-Kennzeichnung?",o:["Pflichtkonformitaetszeichen fuer bestimmte Produkte im EU-Markt - bestaetigt Erfuellung EU-Richtlinien","Deutsche Normierung","Guetesiegel","Qualitaetssiegel freiwillig"],a:0,f:"CE-Kennzeichnung: Pflicht fuer bestimmte Produktkategorien in der EU (Elektrogeraete, Spielzeug, Medizinprodukte). Hersteller erklaert Konformitaet mit EU-Richtlinien. Kein Guetesiegel!"},
{id:15,b:"10.2",t:"QS-Normen",q:"Was ist DIN (Deutsches Institut fuer Normung)?",o:["Ein Bundesamt","Ein Prueflabor","Ein Zertifizierungsbuero","Nationales Normungsinstitut Deutschlands - erstellt Deutsche Normen (DIN), oft europaeisch (EN) oder international (ISO) harmonisiert"],a:3,f:"DIN: deutsches Normungsinstitut. DIN-Normen koennen auch EN (europaeisch) oder ISO (international) sein. Beispiel: DIN EN ISO 9001 = identisch mit ISO 9001 in Deutschland."},
{id:16,b:"10.2",t:"QS-Normen",q:"Was ist ITIL-Zertifizierung?",o:["Pflicht fuer IT-Unternehmen","Sicherheitszertifikat","ISO-Zertifikat","Freiwillige Zertifizierung fuer ITSM-Best-Practices - Personen oder Organisationen werden in ITIL zertifiziert"],a:3,f:"ITIL-Zertifizierung: Personen: Foundation, Practitioner, Expert. Organisationen: koennen ITIL-konformitaet nachweisen aber kein offizielles ITIL-Zertifikat. Belegt Kenntnis der ITIL-Best-Practices."},
{id:17,b:"10.2",t:"QS-Normen",q:"Was ist BSI IT-Grundschutz?",o:["Britische Sicherheitsnorm","Ein ISO-Standard","Deutsches BSI-Rahmenwerk fuer IT-Sicherheit: Grundschutz-Bausteine und Schutzbedarfsermittlung","Eine Zertifizierung"],a:2,f:"BSI IT-Grundschutz: vom deutschen Bundesamt fuer Sicherheit in der Informationstechnik. Bietet Bausteine fuer IT-Sicherheitsmassnahmen. Basis fuer ISO 27001-Implementierung in DE."},
{id:18,b:"10.2",t:"QS-Normen",q:"Was ist der Unterschied zwischen ISO 9001 und ISO 27001?",o:["Identisch","27001 ist umfassender","9001 ist neuer","ISO 9001: allgemeines Qualitaetsmanagement (alle Branchen). ISO 27001: Informationssicherheitsmanagement (IT/Datenschutz spezifisch)"],a:3,f:"ISO 9001: Qualitaet von Produkten und Dienstleistungen. ISO 27001: Informationssicherheit (Vertraulichkeit, Integritaet, Verfuegbarkeit). Beide koennen kombiniert werden (IMS)."},
{id:19,b:"10.2",t:"QS-Normen",q:"Was ist ein integriertes Managementsystem (IMS)?",o:["Kombination mehrerer Managementnormen (z.B. ISO 9001 + 14001 + 27001) in einem einheitlichen System","Ein QMS allein","Ein Datenmanagementsystem","Ein Softwaresystem"],a:0,f:"IMS: mehrere Normen zusammenfuehren (ISO 9001, 14001, 45001, 27001). Vermeidet Doppelarbeit. High Level Structure der ISO-Normen ermoeglicht Integration. Ein Audit fuer mehrere Normen."},
{id:20,b:"10.2",t:"QS-Normen",q:"Was sind QS-Normen und warum sind sie wichtig?",o:["Nur fuer Grossunternehmen","Standards die Qualitaetsanforderungen definieren - Vertrauen bei Kunden, Wettbewerbsvorteile, gesetzliche Compliance","Nur fuer Produktion","Nur buerokratische Pflicht"],a:1,f:"QS-Normen: Vertrauensgrundlage. Kunden vertrauen zertifizierten Lieferanten mehr. Manche Auftraege erfordern Zertifizierung (Behörden, Grossunternehmen). Interne Prozessverbesserung."},
{id:21,b:"10.3",t:"Zertifizierung",q:"Was ist eine Zertifizierung?",o:["Formaler Nachweis dass Unternehmen/Produkt festgelegte Standards erfuellt - durch externe Prüfstellen","Eine Selbstbewertung","Ein internes Audit","Eine Auszeichnung"],a:0,f:"Zertifizierung: externe unabhaengige Pruefung und formaler Nachweis der Normkonformitaet. Zertifikat gilt typisch 3 Jahre mit jaehrlichen Ueberwachungsaudits."},
{id:22,b:"10.3",t:"Zertifizierung",q:"Wie laeuft eine ISO-Zertifizierung ab?",o:["Antrag stellen und Zertifikat erhalten","Vorbereitung -> Internes Audit -> Zertifizierungsaudit (Stufe 1: Dokumentenpruefung, Stufe 2: Systempruefung) -> Zertifikat -> Jaehrliche Ueberwachungsaudits","Nur ein Audit","Zertifikat kaufen"],a:1,f:"Zertifizierungsprozess: 1.Vorbereitung (QMS aufbauen), 2.Internes Audit, 3.Zertifizierungsaudit Stufe 1 (Dokumentenpruefung), 4.Zertifizierungsaudit Stufe 2 (Systempruefung vor Ort), 5.Zertifikat (3 Jahre)."},
{id:23,b:"10.3",t:"Zertifizierung",q:"Was sind Nichtkonformitaeten im Zertifizierungsaudit?",o:["Qualitaetsfehler","Verbesserungsvorschlaege","Festgestellte Abweichungen von der Norm - muessen vor Zertifikat oder innerhalb Frist behoben werden (Major NC = Zertifikat verweigert)","Informationsanfragen"],a:2,f:"NC im Audit: Major NC (kritische Abweichung, Zertifikat wird nicht ausgestellt), Minor NC (geringere Abweichung, Korrekturmassnahme erforderlich), Observation (Verbesserungshinweis)."},
{id:24,b:"10.3",t:"Zertifizierung",q:"Welche Zertifizierungsstellen gibt es?",o:["Nur ISO","Nur TUeV","Nur staatliche Stellen","TUeV, DEKRA, DQS, SGS, Bureau Veritas - akkreditierte Zertifizierungsstellen fuer verschiedene Normen"],a:3,f:"Zertifizierungsstellen (Certification Bodies): muessen akkreditiert sein (DAkkS in Deutschland). Beispiele: TUeV, DEKRA, DQS, Bureau Veritas, SGS. Alle gleichwertig bezueglich ISO-Normen."},
{id:25,b:"10.3",t:"Zertifizierung",q:"Wie lange gilt ein ISO-Zertifikat?",o:["1 Jahr","3 Jahre mit jaehrlichen Ueberwachungsaudits und nach 3 Jahren Rezertifizierungsaudit","5 Jahre","Unbegrenzt"],a:1,f:"ISO-Zertifikat: 3 Jahre Laufzeit. Jahr 1: Erstzertifizierung. Jahr 2+3: Ueberwachungsaudits (kleiner als Zertifizierungsaudit). Nach 3 Jahren: Rezertifizierungsaudit."},
{id:26,b:"10.3",t:"Zertifizierung",q:"Was ist Akkreditierung vs Zertifizierung?",o:["Zertifizierung ist fuer Pruefstellen","Identisch","Akkreditierung ist fuer Unternehmen","Akkreditierung: Pruefung ob Zertifizierungsstelle kompetent ist (durch DAkkS). Zertifizierung: Pruefung ob Unternehmen Norm erfuellt (durch akkreditierte Stelle)"],a:3,f:"Akkreditierung: DAkkS prueft ob TUeV/DEKRA kompetent sind. Zertifizierung: TUeV/DEKRA prueft ob Unternehmen ISO-konform ist. Hierarchie: DAkkS akkreditiert Zertifizierungsstellen."},
{id:27,b:"10.4",t:"Qualitaetsplanung",q:"Was ist Qualitaetsplanung?",o:["Projektplanung","Definition von Qualitaetszielen und Massnahmen zur Erreichung - Was soll erreicht werden und Wie?","Budgetplanung","Nur Produktplanung"],a:1,f:"Qualitaetsplanung: Qualitaetsziele festlegen, Massnahmen bestimmen, Ressourcen planen, Verantwortlichkeiten definieren. Wer macht was bis wann um welches Qualitaetsziel zu erreichen?"},
{id:28,b:"10.4",t:"Qualitaetsplanung",q:"Was sind Qualitaetsziele?",o:["Allgemeine Ziele","Marketingziele","Qualitaetsversprechen","Messbare, konkrete Ziele zur Qualitaetsverbesserung (z.B. Fehlerquote um 20% senken, Kundenzufriedenheit 95%)"],a:3,f:"Qualitaetsziele: SMART - Fehlerquote von 5% auf 4% senken bis Q4. Kundenzufriedenheit von 85% auf 90% steigern. Lieferpuenktlichkeit auf 98% erhoehen."},
{id:29,b:"10.4",t:"Qualitaetsplanung",q:"Was ist der Ist-Zustand in der Qualitaetsplanung?",o:["Das gewuenschte Ergebnis","Der Zielzustand","Die Massnahmen","Analyse der aktuellen Situation: welche Prozesse existieren, welche Fehler treten auf, was sagen Kunden?"],a:3,f:"Ist-Zustand: Ausgangsbasis der Qualitaetsplanung. Aktuelle Fehlerquoten, Kundenbewertungen, Prozessbeschreibungen analysieren. Nur wenn man weiss wo man steht, kann man planen wohin."},
{id:30,b:"10.4",t:"Qualitaetsplanung",q:"Was ist der Ziel-Zustand in der Qualitaetsplanung?",o:["Die Massnahmen","Das Budget","Der aktuelle Zustand","Das angestrebte Ergebnis: konkrete messbare Qualitaetsziele die erreicht werden sollen"],a:3,f:"Ziel-Zustand: klares Bild des angestrebten Qualitaetsniveaus. SMART-Ziele: Fehlerrate < 2%, CSAT > 4,5/5, Lieferzeit <24h. Basis fuer Massnahmenplanung."},
{id:31,b:"10.4",t:"Qualitaetsplanung",q:"Was ist eine Qualitaetsplanung nach ISO 9001?",o:["Audit","Dokumentenpflicht","Zertifizierung","Planungsprozess der sicherstellt dass QMS-Anforderungen erfuellt und Qualitaetsziele erreicht werden - Teil von ISO 9001 Kapitel 6"],a:3,f:"Qualitaetsplanung ISO 9001 Kapitel 6: Massnahmen zum Umgang mit Risiken und Chancen, Qualitaetsziele festlegen, Planung von Massnahmen zur Zielerreichung."},
{id:32,b:"10.4",t:"Qualitaetsplanung",q:"Was ist Qualitaetspolitik?",o:["QMS-Dokumentation","Uebergeordnete Ausrichtung und Absichten des Unternehmens bezueglich Qualitaet - verabschiedet von der Unternehmensleitung","Qualitaetsziele selbst","Unternehmensstrategie allgemein"],a:1,f:"Qualitaetspolitik: bekenntnis der Unternehmensleitung zu Qualitaet. Beispiel: Wir setzen auf kontinuierliche Verbesserung und Kundenzufriedenheit. Bildet Rahmen fuer Qualitaetsziele."},
{id:33,b:"10.4",t:"Qualitaetsplanung",q:"Was ist das Qualitaetshandbuch?",o:["Testhandbuch","Dokument das QMS beschreibt: Anwendungsbereich, Qualitaetspolitik, Prozesse, Verantwortlichkeiten","Produkthandbuch","Bedienungsanleitung"],a:1,f:"Qualitaetshandbuch: uebergeordnetes QMS-Dokument. In ISO 9001:2015 nicht mehr zwingend vorgeschrieben aber in der Praxis haeufig. Beschreibt wie QMS aufgebaut ist."},
{id:34,b:"10.4",t:"Qualitaetsplanung",q:"Was sind Qualitaetsindikatoren (KPIs)?",o:["Mitarbeiterkennzahlen","Finanzindikatoren","Produkteigenschaften","Messgroessen zur Bewertung der Qualitaet: Fehlerrate, Reklamationsquote, Kundenzufriedenheit, Liefertreue"],a:3,f:"Qualitaets-KPIs: First Pass Yield (Anteil fehlerfrei beim ersten Durchlauf), Fehlerrate (%), CSAT, NPS, Reklamationsquote, Liefertreue. Messung und Monitoring fuer kontinuierliche Verbesserung."},
{id:35,b:"10.4",t:"Qualitaetsplanung",q:"Was ist Ressourcenplanung im Qualitaetsmanagement?",o:["Zeitplanung allein","Materialplanung","Sicherstellen dass die notwendigen Ressourcen (Personal, Infrastruktur, Know-how) fuer Qualitaetsziele vorhanden sind","Nur Budgetplanung"],a:2,f:"Ressourcenplanung fuer QM: geschultes Personal, geeignete Infrastruktur, Messtechnik, Software-Tools. ISO 9001 Kapitel 7 fordert Bereitstellung notwendiger Ressourcen."},
{id:36,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Qualitaetslenkung?",o:["Massnahmen zur Steuerung und Kontrolle von Prozessen zur Einhaltung der Qualitaetsanforderungen - waehrend des Prozesses","Zertifizierung","Qualitaetspruefung nach Abschluss","Qualitaetsplanung"],a:0,f:"Qualitaetslenkung: steuert Prozesse waehrend der Ausfuehrung. Praeventiv (Standards einhalten) und korrektiv (bei Abweichungen eingreifen). Prozesskontrollen, SPC (Statistical Process Control)."},
{id:37,b:"10.5",t:"Qualitaetslenkung",q:"Was sind Methoden der Qualitaetslenkung?",o:["Prozesskontrollen, Qualitaetspruefungen waehrend Produktion, Fehleranalyse, Poka-Yoke (Fehlerverhinderung), SPC","Nur Audits","Nur Kontrolle am Ende","Nur Kundenbefragungen"],a:0,f:"Qualitaetslenkungsmethoden: Prozesskontrollen (Messungen waehrend Prozess), Poka-Yoke (fehlervorbeugend durch Design), SPC (statistische Prozesskontrolle), Checklisten, Pruefplaene."},
{id:38,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Poka-Yoke?",o:["Statistisches Verfahren","Fehlervermeidungsprinzip: Produkt oder Prozess so gestalten dass Fehler gar nicht erst entstehen koennen","Qualitaetskontrolle nach Produktion","Japanisches Essen"],a:1,f:"Poka-Yoke (jap. Fehler vermeiden): mechanische oder elektronische Massnahmen die Fehler verhindern. Beispiel: USB-Stecker passt nur in einer Richtung, Sicherheitsgurt-Warnsignal, Pflichtfelder in Formularen."},
{id:39,b:"10.5",t:"Qualitaetslenkung",q:"Was ist SPC (Statistical Process Control)?",o:["Statistische Methode zur Ueberwachung und Steuerung von Prozessen anhand von Kontrollkarten","Softwarequalitaet","Personalcontrolling","Servermonitoring"],a:0,f:"SPC: Kontrollkarten zeigen Prozessstreuung. Wenn Messwerte ausserhalb Kontrollgrenzen: Prozess ausser Kontrolle -> Eingriff. Unterscheidet zufaellige (akzeptabel) von systematischen Ursachen (beheben!)."},
{id:40,b:"10.5",t:"Qualitaetslenkung",q:"Was ist praeventive vs korrektive Qualitaetslenkung?",o:["Praeventiv ist teurer","Praeventiv: verhindert Fehler durch Standards und Schulungen. Korrektiv: behebt erkannte Maengel nach Feststellung","Korrektiv ist besser","Identisch"],a:1,f:"Praeventiv: Fehler verhindern (Schulungen, Standards, Poka-Yoke). Korrektiv: Fehler beheben nach Feststellung. Praeventiv ist langfristig guenstiger (Fehler kosten 10x mehr in der Produktion als in der Planung)."},
{id:41,b:"10.5",t:"Qualitaetslenkung",q:"Was ist feedbackbasierte Qualitaetslenkung?",o:["Einmaliger Feedback","Jahresbewertung","Nur Kundenbewertungen","Kontinuierliche Anpassung von Prozessen basierend auf Kunden- und Mitarbeiterfeedback"],a:3,f:"Feedbackbasierte Qualitaetslenkung: Kundenbeschwerden, CSAT-Daten, Mitarbeiter-Feedback auswerten und in Prozessverbesserungen umsetzen. Schliesst Regelkreis."},
{id:42,b:"10.5",t:"Qualitaetslenkung",q:"Was ist ein Pruefplan?",o:["Auditplan","Dokument das festlegt was, wann, wie und von wem geprueft wird - konkrete Vorgaben fuer Qualitaetspruefungen","Testplan in Software","Qualitaetshandbuch"],a:1,f:"Pruefplan: Pruefmerkmal (was?), Pruefmethode (wie?), Pruefzeitpunkt (wann?), Verantwortlicher (wer?), Toleranz (wie genau?). Sichert einheitliche Pruefung."},
{id:43,b:"10.5",t:"Qualitaetslenkung",q:"Was ist ein Kontrollpunkt (Control Point)?",o:["Passwort-Pruefung","Ein Audit","Ein Kontrollraum","Definierter Punkt im Prozess wo eine Pruefung oder Messung stattfindet - erkennt Abweichungen bevor sie eskalieren"],a:3,f:"Kontrollpunkt: strategisch platzierte Messung im Prozess. Beispiel: nach jedem Produktionsschritt, vor Auslieferung, bei Wareneingang. Frueehe Fehler erkennen spart Kosten."},
{id:44,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Prozessfaehigkeit?",o:["Prozessflexibilitaet","Prozesseffizienz","Prozessgeschwindigkeit","Mass dafuer ob ein Prozess dauerhaft Ergebnisse innerhalb der Toleranzgrenzen liefert (Cpk-Wert)"],a:3,f:"Prozessfaehigkeit (Cpk): Cpk > 1,33 = faehiger Prozess. Cpk < 1 = nicht faehig, viele Ausschussteile. SPC und Prozessanalyse zur Verbesserung der Faehigkeit."},
{id:45,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Qualitaetssicherung in der Software-Entwicklung?",o:["Nur am Ende testen","Nur Dokumentation","Nur Testen","Alle Massnahmen waehrend Entwicklung die Qualitaet sicherstellen: Reviews, Tests, Standards, Metriken, Prozessdisziplin"],a:3,f:"Software-QS: Code Reviews, Unit-Tests, Integrationstests, statische Analyse (Lint), Coding-Standards, Continuous Integration. Fehler fruehzeitig finden (je frueher, desto guenstiger zu beheben)."},
{id:46,b:"10.6",t:"PDCA",q:"Was ist der PDCA-Zyklus?",o:["Iteratives Verbesserungsmodell: Plan-Do-Check-Act fuer kontinuierliche Qualitaetsverbesserung","Projektmanagementmethode","Scrum-Prozess","Wasserfall-Modell"],a:0,f:"PDCA (Deming-Zyklus): 1.Plan (Planen), 2.Do (Umsetzen), 3.Check (Ueberpruefen), 4.Act (Handeln/Standardisieren). Kontinuierliche Schleife. Basis fuer Kaizen und ISO 9001."},
{id:47,b:"10.6",t:"PDCA",q:"Was passiert in der Plan-Phase des PDCA?",o:["Massnahmen umsetzen","Massnahmen standardisieren","Problem analysieren, Ursache finden, Massnahmen planen, Ziele definieren","Ergebnisse auswerten"],a:2,f:"Plan: Problem oder Verbesserungsbedarf erkennen, Ist-Zustand analysieren, Ziel-Zustand definieren, Massnahmen planen. SMART-Ziele. Verantwortliche festlegen."},
{id:48,b:"10.6",t:"PDCA",q:"Was passiert in der Do-Phase?",o:["Massnahmen in kleinem Rahmen testen/umsetzen - Pilotierung um Risiken zu minimieren","Nur messen","Nur planen","Alles auf einmal aendern"],a:0,f:"Do: Massnahmen umsetzen, oft zunaechst im kleinen Rahmen (Pilotprojekt). Daten sammeln. Pilotierung reduziert Risiko grosser Fehler bei vollstaendiger Umsetzung."},
{id:49,b:"10.6",t:"PDCA",q:"Was passiert in der Check-Phase?",o:["Neue Massnahmen planen","Massnahmen abbrechen","Ergebnisse der Do-Phase auswerten: Wurden Ziele erreicht? Gab es unerwartete Effekte?","Massnahmen standardisieren"],a:2,f:"Check: Soll-Ist-Vergleich. Hat die Massnahme gewirkt? Welche Verbesserung wurde erzielt? Welche Probleme traten auf? Basis fuer Act-Entscheidung."},
{id:50,b:"10.6",t:"PDCA",q:"Was passiert in der Act-Phase?",o:["Erfolgreiche Massnahmen standardisieren und ausrollen, Misserfolge analysieren, naechsten PDCA-Zyklus starten","Neues Projekt starten","Massnahmen abbrechen","Planung revidieren"],a:0,f:"Act: erfolgreich = standardisieren (SOPs anpassen, Schulungen). Nicht erfolgreich = Ursachen analysieren, neuen PDCA-Zyklus starten. Zyklus wiederholt sich = kontinuierliche Verbesserung."},
{id:51,b:"10.6",t:"PDCA",q:"Was ist der Unterschied zwischen PDCA und DMAIC?",o:["PDCA ist komplexer","DMAIC ist aelter","Identisch","PDCA: allgemeines Verbesserungsmodell. DMAIC: Define-Measure-Analyze-Improve-Control = strukturiertere Six Sigma Methode"],a:3,f:"PDCA: einfacher, allgemein anwendbar. DMAIC (Six Sigma): Define (Problem), Measure (Messen), Analyze (Ursache), Improve (Verbessern), Control (Kontrollieren). Beide zyklisch und datenbasiert."},
{id:52,b:"10.6",t:"PDCA",q:"Wer hat den PDCA-Zyklus entwickelt?",o:["Frederick Taylor","Walter Shewhart (Grundlage) und W. Edwards Deming (popularisiert) - daher auch Deming-Zyklus","Kaizen","Joseph Juran"],a:1,f:"PDCA: Walter Shewhart entwickelte urspruengliches Konzept. Deming popularisierte es in Japan nach WWII. Daher auch Shewhart-Zyklus oder Deming-Zyklus."},
{id:53,b:"10.6",t:"PDCA",q:"Was ist Kaizen und wie haengt es mit PDCA zusammen?",o:["Japanisches QM-Werkzeug ohne Zusammenhang","Kaizen ersetzt PDCA","Kaizen (jap. Veraenderung zum Besseren): kontinuierliche kleine Verbesserungen durch alle Mitarbeiter - PDCA ist methodisches Werkzeug fuer Kaizen","Kaizen ist ein Auditsystem"],a:2,f:"Kaizen: Kultur der kontinuierlichen kleinen Verbesserungen. PDCA: methodisches Werkzeug um Kaizen durchzufuehren. Zusammen: jeder Mitarbeiter wendet PDCA auf seinen Arbeitsbereich an."},
{id:54,b:"10.6",t:"PDCA",q:"Wie wird PDCA in ISO 9001 angewendet?",o:["ISO 9001 ist auf PDCA-Logik aufgebaut: Plan (Kontext, Planung), Do (Unterstuetzung, Betrieb), Check (Bewertung), Act (Verbesserung)","Nicht in ISO 9001","Nur fuer Audits","Nur in Check-Phase"],a:0,f:"ISO 9001 folgt PDCA: Kapitel 4-6 = Plan, Kapitel 7-8 = Do, Kapitel 9 = Check (Leistungsbewertung), Kapitel 10 = Act (Verbesserung). Gesamtes QMS als PDCA-Zyklus."},
{id:55,b:"10.6",t:"PDCA",q:"Was ist kontinuierliche Verbesserung (KVP/CI)?",o:["Restrukturierung","Einmalige grosse Verbesserung","Fortlaufender Prozess zur schrittweisen Optimierung von Prozessen und Produkten - kein Endpunkt, immer besser werden","Radikale Innovation"],a:2,f:"KVP (Kontinuierlicher Verbesserungsprozess) / CI (Continuous Improvement): kleinen Verbesserungen akkumulieren zu grossen Qualitaetsgewinnen. PDCA und Kaizen als Methodik. Verankert in ISO 9001."},
{id:56,b:"10.7",t:"Testprotokoll",q:"Was ist ein Testprotokoll?",o:["Fehlerprotokoll","Dokument das Pruefungen und Ergebnisse beim Einrichten eines Arbeitsplatzes oder Systems dokumentiert","Auditprotokoll","Meetingprotokoll"],a:1,f:"Testprotokoll: Datum, Pruefer, Arbeitsplatz-ID, Pruefpunkte (Hardware, Software, Netzwerk, Sicherheit), Ergebnisse (Bestanden/Nicht bestanden), Abweichungen, Massnahmen."},
{id:57,b:"10.7",t:"Testprotokoll",q:"Was enthaelt ein Testprotokoll typischerweise?",o:["Allgemeine Daten (Datum, Pruefer), Pruefpunkte, Ergebnisse je Punkt, Abweichungen und Massnahmen","Nur Fehler","Nur Ergebnisse","Nur Datum und Unterschrift"],a:0,f:"Testprotokoll-Inhalte: 1.Allgemeine Daten (Datum, Prufer, Arbeitsplatz-ID), 2.Pruefpunkte (Hardware/Software/Netzwerk/Sicherheit), 3.Ergebnis pro Punkt, 4.Abweichungen, 5.Massnahmen und Nachkontrolle."},
{id:58,b:"10.7",t:"Testprotokoll",q:"Warum ist ein Testprotokoll wichtig?",o:["Pflicht durch Gesetz","Nur Buerokratie","Nachweisdokumentation dass Pruefungen stattgefunden haben, Abweichungen bekannt sind und Massnahmen eingeleitet wurden","Nur intern"],a:2,f:"Testprotokoll: Nachweis fuer Qualitaet und Compliance. Bei Problemen: Pruefpfad zeigt was wann geprueft wurde. Auditgrundlage. Uebergabedokumentation bei Installation."},
{id:59,b:"10.7",t:"Testprotokoll",q:"Was sind typische Pruefpunkte bei einem Arbeitsplatz-Testprotokoll?",o:["Nur Software","Nur Netzwerkverbindung","Hardware (Funktionsfaehigkeit aller Komponenten), Software (Installation, Lizenzen), Netzwerk (Verbindung, Zugriffsrechte), Sicherheitsrichtlinien (Passwort, Verschluesselung)","Nur Hardware"],a:2,f:"Pruefpunkte: Hardware (Eingabegeraete, Monitor, Drucker), Software (BS, Anwendungen, Lizenzen), Netzwerk (IP, Internetzugang, Netzlaufwerke), Sicherheit (Antivirssoftware, Verschluesselung, Passwort-Policy)."},
{id:60,b:"10.7",t:"Testprotokoll",q:"Was passiert nach einer Nicht-Bestanden-Bewertung im Testprotokoll?",o:["Neuer Arbeitsplatz bestellt","Test wird abgebrochen","Massnahme zur Behebung wird definiert, Verantwortlicher benannt, Nachkontrolle geplant und dokumentiert","Alles bleibt so"],a:2,f:"Nicht-Bestanden: Abweichung dokumentieren, Massnahme beschreiben (was wird behoben und wie), Verantwortlichen benennen, Frist setzen, Nachkontrolle nach Behebung und Ergebnis protokollieren."},
{id:61,b:"10.6",t:"PDCA",q:"Was ist der Unterschied zwischen PDCA und PDSA?",o:["PDCA = Plan-Do-Check-Act. PDSA = Plan-Do-Study-Act (Deming bevorzugte Study statt Check - tieferes Verstaendnis der Ergebnisse)","PDSA ist neuer","PDCA ist besser","Identisch"],a:0,f:"Deming bevorzugte PDSA (Study statt Check): Study impliziert tieferes Lernen und Verstehen der Ergebnisse, nicht nur Abgleich. In der Praxis werden PDCA und PDSA synonym verwendet."},
{id:62,b:"10.5",t:"Qualitaetslenkung",q:"Was ist ein Regelkreis in der Qualitaetslenkung?",o:["Geschlossenes System: Messen -> Soll-Ist-Vergleich -> Steuereingriff bei Abweichung -> Ergebnis pruefen -> Zyklus wiederholen","Qualitaetsaudit","Elektrischer Regelkreis","Planungszyklus"],a:0,f:"Qualitaets-Regelkreis: Ist messen, Soll vergleichen, Abweichung feststellen, Stellgroesse anpassen, erneut messen. Wie in der Technik: Thermostat, Tempomat. Automatisierung moeglich."},
{id:63,b:"10.4",t:"Qualitaetsplanung",q:"Was sind messbarer Qualitaetsziele Beispiele in der IT?",o:["Ziele sind nicht messbar","Nur allgemeine Ziele","Nur Finanziele","Systemverfuegbarkeit 99,9%, Ticketloesungszeit <4h bei P2, Kundenzufriedenheit >4,2/5, Sicherheitspatches innerhalb 48h eingespielt"],a:3,f:"IT-Qualitaetsziele: Verfuegbarkeit 99,9%, MTTR P1 < 1h, FCR > 70%, CSAT > 4,0/5, Patchquote > 95% innerhalb 30 Tage, Vulnerability-Behebung kritisch < 72h."},
{id:64,b:"10.2",t:"QS-Normen",q:"Was ist die High Level Structure (HLS) der ISO-Normen?",o:["Normenhierarchie","Gemeinsame Kapitelstruktur aller modernen ISO-Managementsystemnormen - erleichtert Integration mehrerer Normen","Hierarchisches System","Technischer Standard"],a:1,f:"HLS: seit 2012 haben ISO 9001, 14001, 27001, 45001 identische Kapitelstruktur (1-10). Erleichtert Integration (IMS). Kapiteln 4-10 sind die eigentlichen Anforderungen."},
{id:65,b:"10.3",t:"Zertifizierung",q:"Was ist ein Ueberwachungsaudit?",o:["Lieferantenaudit","Kleineres jaehrliches Audit um sicherzustellen dass Zertifikat noch verdient ist - zwischen den Rezertifizierungsaudits","Hauptaudit","Kundenaudit"],a:1,f:"Ueberwachungsaudit: jaehrlich zwischen Zertifizierungsaudits. Prueoft Stichprobenweise ob QMS aufrechterhalten wird. Kleiner als Erstzertifizierungsaudit. Bei Maengeln: Zertifikat kann suspendiert werden."},
{id:66,b:"10.1",t:"QM-Systeme",q:"Was ist ein QMS-Dokument?",o:["Externe Dokumentation","Rechtsdokument","Kundendokument","Aufgezeichnete Information die das QMS beschreibt oder belegt: Prozessbeschreibungen, Pruefplaene, Qualitaetsaufzeichnungen"],a:3,f:"QMS-Dokumente: Qualitaetshandbuch, Prozessbeschreibungen, Arbeitsanweisungen, Formulare, Pruefplaene. Qualitaetsaufzeichnungen: Pruefprotokolle, Auditberichte (Nachweis der Konformitaet)."},
{id:67,b:"10.1",t:"QM-Systeme",q:"Was ist Managementbewertung (Management Review)?",o:["Mitarbeiterbeurteilung","Kundenreview","Regelmaessige Bewertung des QMS durch die oberste Leitung - ist QMS wirksam und angemessen?","Produktreview"],a:2,f:"Management Review: mindestens jaehrlich. Themen: Audit-Ergebnisse, Kundenzufriedenheit, Zielerfuellungsgrad, Ressourcenbedarf. Ergebnis: Entscheidungen zur Verbesserung. ISO 9001 Kapitel 9.3."},
{id:68,b:"10.5",t:"Qualitaetslenkung",q:"Was ist ein Verbesserungsvorschlagswesen?",o:["Auditsystem","Fehlerdatenbank","System in dem Mitarbeiter Ideen zur Verbesserung einreichen koennen - Foerderung von Kaizen und Mitarbeiterbeteiligung","Beschwerdesystem"],a:2,f:"Verbesserungsvorschlagswesen (BVW): Mitarbeiter kennen Prozesse am besten. Ideen einsammeln, bewerten, umsetzen, belohnen. Foerdert Engagement und Kaizen-Kultur."},
{id:69,b:"10.6",t:"PDCA",q:"Was ist ein PDCA-Werkzeug?",o:["Hammer und Saege","A3-Bericht (ein A3-Blatt strukturiert Problem und Massnahmen nach PDCA), fischgraetdiagramm, 5-Why, Kontrollkarte","Software-Tool","Audit-Checkliste"],a:1,f:"PDCA-Werkzeuge: A3-Bericht (Toyota: Problem, Ziel, Analyse, Massnahmen auf einer A3-Seite), 5-Why, Ishikawa, SPC-Karten. Visualisieren den Verbesserungsprozess."},
{id:70,b:"10.7",t:"Testprotokoll",q:"Wer unterzeichnet ein Testprotokoll?",o:["Nur der Pruefer","Pruefer (hat geprueft) und ggf. Auftraggeber/Abnahme (bestaetigt Ergebnisse) - beidseitige Unterschrift bei oebernahme","Nur der Kunde","Nur der Vorgesetzte"],a:1,f:"Testprotokoll-Unterschriften: Pruefer (hat geprueft), Verantwortlicher fuer Abnahme (bestaetigt Ergebnisse). Beidseitige Unterschrift als Nachweis. Datum nicht vergessen."},
{id:71,b:"10.1",t:"QM-Systeme",q:"Was ist Risikomanagement im QM?",o:["Nur Versicherungen","Fehlermanagement","Systematische Identifikation, Bewertung und Behandlung von Risiken die Qualitaetsziele gefaehrden koennen - ISO 9001 Kapitel 6.1","Krisenmanagement"],a:2,f:"Risikomanagement QM: Risiken und Chancen identifizieren (was koennte schieflaufen?), bewerten (Wahrscheinlichkeit x Auswirkung), behandeln (vermeiden, mindern, akzeptieren). ISO 9001 erfordert risikobasiertes Denken."},
{id:72,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Six Sigma?",o:["Qualitaetsmethode: Reduktion von Prozessfehlern auf 3,4 pro Million Moeglichkeiten durch statistische Methoden (DMAIC)","Eine Norm","Ein Audit-Standard","Eine IT-Methode"],a:0,f:"Six Sigma: Ziel 99,99966% fehlerfreie Ergebnisse. DMAIC-Methode (Define, Measure, Analyze, Improve, Control). Kombination mit Lean = Lean Six Sigma. Datengetrieben."},
{id:73,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Lean Management in Bezug auf Qualitaet?",o:["Personalabbau","Schlanke Mitarbeiter","Eliminierung von Verschwendung (Muda) um Wert fuer Kunden zu maximieren: Ueberproduktion, Wartezeiten, Transport etc. vermeiden","Kostensenken allein"],a:2,f:"Lean: Verschwendung eliminieren. 7 Arten Muda: Ueberproduktion, Wartezeiten, Transport, Ueberverarbeitung, Lager, Fehler, Bewegung. Qualitaet verbessert sich wenn Verschwendung reduziert wird."},
{id:74,b:"10.2",t:"QS-Normen",q:"Was ist ISO 45001?",o:["Norm fuer Arbeits- und Gesundheitsschutzmanagementsysteme - Mitarbeitersicherheit systematisch managen","Umweltmanagement","IT-Sicherheit","Qualitaetsstandard"],a:0,f:"ISO 45001: Arbeits- und Gesundheitsschutzmanagementsystem (ISMS). Nachfolger von OHSAS 18001. Zeigt Engagement fuer Mitarbeitersicherheit. Oft Teil von IMS (9001+14001+45001)."},
{id:75,b:"10.4",t:"Qualitaetsplanung",q:"Was ist Benchmarking im Qualitaetsmanagement?",o:["Interne Messung allein","Wettbewerbsanalyse","Vergleich eigener Leistungen mit Best Practices anderer Unternehmen (Branche oder branchenuebergreifend) um Verbesserungspotenziale zu identifizieren","Finanzplanung"],a:2,f:"Benchmarking: Wo stehen wir im Vergleich zum Branchenbesten? Identifiziert Luecken und Lernpotenzial. Intern (Abteilungen), Wettbewerber, Best-in-Class (branchenuebergreifend)."},
{id:76,b:"10.3",t:"Zertifizierung",q:"Was ist ein Lieferantenaudit?",o:["Selbstaudit","Audit beim Lieferanten um sicherzustellen dass dieser Qualitaetsanforderungen des Kunden erfuellt","Internes Audit","Kundenaudit"],a:1,f:"Lieferantenaudit: Einkaeufender prueft Lieferanten vor Ort. Qualitaetssystem, Prozesse, Kapazitaeten bewerten. Wichtig bei kritischen Lieferanten. Grundlage fuer Lieferantenfreigabe."},
{id:77,b:"10.1",t:"QM-Systeme",q:"Was ist Prozessorientierung im QM?",o:["Abteilungsdenken","Produktfokus","Mitarbeiterfokus","QMS betrachtet Taetigkeiten als Prozesse die Eingaben in Ausgaben umwandeln - optimiert wird der Prozess, nicht nur das Ergebnis"],a:3,f:"Prozessorientierung ISO 9001: Unternehmen als Netzwerk von Prozessen. Inputs -> Prozess -> Outputs. Prozesse messen, steuern und verbessern statt nur Ergebnisse pruefen."},
{id:78,b:"10.6",t:"PDCA",q:"Was ist Standardisierung im PDCA-Zyklus?",o:["Zertifizierung","Erfolgreiche Massnahmen als neuer Standard festschreiben: SOPs aktualisieren, Schulungen anpassen, neuer Normalzustand","Normen anwenden","Dokumentation"],a:1,f:"Standardisierung (Act-Phase): erfolgreiche Verbesserung wird neuer Standard. SOP (Standard Operating Procedure) anpassen. Schulungen aktualisieren. Sichert Nachhaltigkeit der Verbesserung."},
{id:79,b:"10.5",t:"Qualitaetslenkung",q:"Was ist 5S im Qualitaetsmanagement?",o:["5 Qualitaetsregeln","Fuenf-Stufen-Auditsystem","5 Schichten Sicherheit","Japanische Methode zur Arbeitsplatzorganisation: Sortieren, Setzen, Saeubern, Standardisieren, Selbstdisziplin"],a:3,f:"5S: Seiri (Sortieren), Seiton (Systematisieren), Seiso (Saeubern), Seiketsu (Standardisieren), Shitsuke (Selbstdisziplin). Saubere organisierte Arbeitsplaetze reduzieren Fehler und Suchzeiten."},
{id:80,b:"10.1",t:"QM-Systeme",q:"Was ist ein Qualitaetsbewusstsein?",o:["Das Verstaendnis und die Haltung aller Mitarbeiter dass Qualitaet ihre Verantwortung ist - Grundlage fuer TQM","Nur Qualitaetsabteilung","Nur Fuehrungsaufgabe","Wissen ueber Qualitaetsnormen"],a:0,f:"Qualitaetsbewusstsein: alle Mitarbeiter verstehen wie ihre Arbeit die Gesamtqualitaet beeinflusst und handeln entsprechend. ISO 9001 Kapitel 7.3: Bewusstsein schaffen."},
{id:81,b:"10.6",t:"PDCA",q:"Wie oft sollte PDCA angewendet werden?",o:["Einmalig","Nur bei Problemen","Jaehrlich","Kontinuierlich - PDCA ist ein Endloskreislauf, der nach jedem Act-Schritt neu beginnt"],a:3,f:"PDCA ist endlos: nach Standardisierung beginnt naechster Zyklus mit neuem Verbesserungspotenzial. Kontinuierliche Verbesserung hat kein Endziel. Perfektion ist unerreichbar, Verbesserung ist immer moeglich."},
{id:82,b:"10.4",t:"Qualitaetsplanung",q:"Was ist eine Qualitaetsmanagementbeauftragter (QMB)?",o:["Externer Auditor","Qualitaetspruefer","Zertifizierungsstelle","Person die ISO 9001 QMS verwaltet und gegenueber dem Management verantwortet - oft auch Qualitaetsbeauftragter genannt"],a:3,f:"QMB/QB: verantwortlich fuer QMS. Koordiniert Audits, berichtet an Management, initiiert Verbesserungen, pflegt Dokumentation. In kleinen Unternehmen oft Nebenfunktion."},
{id:83,b:"10.7",t:"Testprotokoll",q:"Was ist ein Werkzeugtest vs Systemtest im Testprotokoll?",o:["Systemtest ist guenstiger","Werkzeugtest ist umfassender","Identisch","Werkzeugtest: prueft einzelne Komponente. Systemtest: prueft Zusammenspiel aller Komponenten im Gesamtsystem"],a:3,f:"Im Testprotokoll werden beide dokumentiert: einzelne Komponenten (Bildschirm funktioniert, Maus funktioniert) und Gesamtsystem (alle zusammen in Netzwerk eingebunden, Software laeuft)."},
{id:84,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Qualitaet nach ISO 9000?",o:["Grad in dem inhaeente Merkmale eines Objekts Anforderungen erfuellen - Qualitaet relativ zu Anforderungen, nicht absolut","Kundenzufriedenheit allein","Fehlerfrei","Luxus"],a:0,f:"Qualitaet ISO 9000: Grad der Anforderungserfuellung. Wichtig: Anforderungen muessen bekannt sein! Qualitaet ist relativ. Ein guenstiges Produkt kann hohe Qualitaet haben wenn es Anforderungen erfuellt."},
{id:85,b:"10.2",t:"QS-Normen",q:"Was ist IATF 16949?",o:["Qualitaetsmanagementnorm speziell fuer die Automobilindustrie - basiert auf ISO 9001 mit branchenspezifischen Ergaenzungen","IT-Sicherheitsstandard","Medizinstandard","Umweltstandard"],a:0,f:"IATF 16949: QMS-Norm fuer Automobilzulieferer. Basiert auf ISO 9001 mit zusaetzlichen Anforderungen (FMEA, MSA, PPAP, SPC). Verpflichtend fuer Zulieferer grosser Automobilhersteller."},
{id:86,b:"10.4",t:"Qualitaetsplanung",q:"Was ist eine FMEA (Fehlermoeoglichkeits- und Einflussanalyse)?",o:["Fehlerdatenbank","Testverfahren","Praeventive Methode zur Identifikation moeglicher Fehler, ihrer Ursachen und Auswirkungen - priorisiert nach Risikoprioritaetszahl (RPZ)","Auditverfahren"],a:2,f:"FMEA: systematische Praeventivmethode. RPZ = Auftretenswahrscheinlichkeit x Bedeutung x Entdeckungswahrscheinlichkeit. Hohe RPZ -> prioritaere Massnahmen. Praeventiv vor Produktionsstart."},
{id:87,b:"10.3",t:"Zertifizierung",q:"Was ist der Unterschied zwischen Zertifizierung und Akkreditierung fuer Laboratorien?",o:["Labore akkreditieren sich (nach ISO 17025) um Kompetenz fuer bestimmte Tests nachzuweisen. Unternehmen zertifizieren sich (ISO 9001) fuer ihr QMS","Identisch","Zertifizierung fuer Labore","Akkreditierung ist fuer Unternehmen"],a:0,f:"Laborakkreditierung (ISO 17025): Nachweis der Kompetenz fuer spezifische Tests. Unternehmenszertifizierung (ISO 9001): QMS-Konformitaet. Beide durch externe Stellen, aber verschiedene Anforderungen."},
{id:88,b:"10.6",t:"PDCA",q:"Was ist der Unterschied zwischen Korrekturmassnahme und Verbesserungsmassnahme?",o:["Verbesserung ist reaktiv","Identisch","Korrektur ist groesser","Korrekturmassnahme: beseitigt Ursache einer Nicht-Konformitaet. Verbesserungsmassnahme: proaktive Verbesserung ohne Nicht-Konformitaet"],a:3,f:"Korrekturmassnahme: reaktiv, behebt Ursache einer NC. Verbesserungsmassnahme: proaktiv, auch wenn kein Fehler vorliegt. Beide sind im QMS wichtig. ISO 9001 fordert Korrekturmassnahmen explizit."},
{id:89,b:"10.1",t:"QM-Systeme",q:"Was ist Dokumentenlenkung im QM?",o:["Digitale Dokumentenverwaltung","Kontrolle ueber QMS-Dokumente: Erstellung, Freigabe, Aenderung, Verteilung, Archivierung - sichert dass alle mit aktuellen Versionen arbeiten","Schreibtischordnung","Archivierung allein"],a:1,f:"Dokumentenlenkung: verhindern dass veraltete Dokumente verwendet werden. Versionskontrolle, Freigabeprozess, kontrollierte Verteilung, Archivierung. ISO 9001 Kapitel 7.5."},
{id:90,b:"10.5",t:"Qualitaetslenkung",q:"Was ist ein Qualitaetszirkel?",o:["Qualitaetspruefstelle","Kleine Gruppe von Mitarbeitern die regelmaessig Qualitaetsprobleme in ihrem Bereich identifizieren und Loesungen erarbeiten","Managementrunde","Auditgruppe"],a:1,f:"Qualitaetszirkel: japanisches Konzept (QC Circles). Mitarbeiter der gleichen Ebene treffen sich regelmaessig um Qualitaetsprobleme zu loesen. Foerdert Mitarbeiterbeteiligung und Kaizen."},
{id:91,b:"10.6",t:"PDCA",q:"Wie unterscheidet sich PDCA von Projektmanagement?",o:["PDCA: Endlosschleife zur kontinuierlichen Verbesserung eines bestehenden Prozesses. PM: zeitlich begrenzt, definiertes Ergebnis, Ende definiert","PDCA ist einmalig","PM ist ein Zyklus","Identisch"],a:0,f:"PDCA: kein Ende, kontinuierlich. Projektmanagement: Start, Ende, definiertes Ergebnis. Projekte koennen PDCA nutzen fuer Qualitaet, aber das Projekt selbst endet."},
{id:92,b:"10.4",t:"Qualitaetsplanung",q:"Was ist eine Qualitaetsplanung fuer ein IT-Projekt?",o:["Festlegung welche Qualitaetsmassnahmen im Projekt durchgefuehrt werden: Tests, Reviews, Abnahmekriterien, Metriken","Budgetplanung","Projektplanung allein","Ressourcenplanung"],a:0,f:"QM-Plan im IT-Projekt: welche Tests werden wann durchgefuehrt, welche Review-Prozesse, Abnahmekriterien, Qualitaetsmetriken (Testabdeckung, Fehlerrate), Verantwortliche."},
{id:93,b:"10.7",t:"Testprotokoll",q:"Was ist ein Abnahmeprotokoll vs Testprotokoll?",o:["Identisch","Test ist formeller","Abnahme kommt zuerst","Testprotokoll: dokumentiert technische Pruefung. Abnahmeprotokoll: formale Bestaetigung dass Leistung vertragsgerecht ist (rechtlich relevant)"],a:3,f:"Testprotokoll: technische Pruefergebnisse. Abnahmeprotokoll: formaler Abschluss eines Projekts/Lieferung, rechtlich bindend, Startpunkt der Gewaehrleistungsfrist."},
{id:94,b:"10.5",t:"Qualitaetslenkung",q:"Was ist Fehlerkostenanalyse?",o:["Personalkosten","Budgetplanung","Analyse was Fehler tatsaechlich kosten: interne Fehlerkosten (Ausschuss, Nacharbeit) und externe (Garantie, Imageschaden)","Produktkostenanalyse"],a:2,f:"Fehlerkosten: Praevention (guenstigste Investition), Pruefung (mittel), interne Fehler (Nacharbeit, Ausschuss), externe Fehler (Garantie, Rueckruf, Imageschaden). Je spaeter Fehler entdeckt, desto teurer."},
{id:95,b:"10.3",t:"Zertifizierung",q:"Was ist ein Stage-1 vs Stage-2 Audit?",o:["Interne Audits","Lieferantenaudits","Stage 1: Dokumentenpruefung, Systemreife pruefen. Stage 2: Vor-Ort-Audit des QMS - prueeft ob Anforderungen tatsaechlich gelebt werden","Ueberwachungsaudits"],a:2,f:"Stage 1: Desk Review - Dokumentation pruefem, Systemreife feststellen, Auditplan erstellen. Stage 2: Vor-Ort-Audit - Implementierung pruefen, Mitarbeiter befragen, Belege pruefen. Dann Zertifikat oder NCs."},
{id:96,b:"10.1",t:"QM-Systeme",q:"Was ist der Kontext der Organisation in ISO 9001?",o:["Verstaendnis aller internen und externen Faktoren die das QMS beeinflussen (Markt, Regulierung, Stakeholder, Staerken/Schwaecchen)","Organigram","Unternehmensgeschichte","Standort des Unternehmens"],a:0,f:"Kontext ISO 9001 Kapitel 4: Was beeinflusst uns intern (Kultur, Ressourcen) und extern (Markt, Gesetze, Technologie)? Wer sind unsere Stakeholder? Basis fuer Risiken und Chancen."},
{id:97,b:"10.6",t:"PDCA",q:"Was ist der Zusammenhang zwischen PDCA und Kaizen?",o:["Kaizen ist die Kultur der kontinuierlichen Verbesserung, PDCA das methodische Werkzeug zur Umsetzung - beide untrennbar verbunden","Kaizen ist die Theorie","Kein Zusammenhang","PDCA ersetzt Kaizen"],a:0,f:"Kaizen + PDCA: Kaizen = Philosophie (immer besser werden). PDCA = Methode (wie man besser wird). Zusammen: Mitarbeiter wenden PDCA kontinuierlich auf ihren Arbeitsbereich an (Kaizen-Geist)."},
{id:98,b:"10.2",t:"QS-Normen",q:"Was ist DIN EN ISO?",o:["Eine strengere Norm","Eine nationale Sondernorm","Eine besondere ISO-Norm","Deutsche Norm (DIN) die gleichzeitig europaeische Norm (EN) und internationale ISO-Norm ist - dreifach harmonisiert"],a:3,f:"DIN EN ISO: Norm wurde auf EU-Ebene (EN) und international (ISO) identisch vereinbart und dann national als DIN uebernommen. Beispiel: DIN EN ISO 9001:2015 = identisch in DE, EU und weltweit."},
{id:99,b:"10.7",t:"Testprotokoll",q:"In welchem Kontext wird ein Testprotokoll bei der Arbeitsplatzeinrichtung erstellt?",o:["Nur bei Neukauf","Nach jedem Aufbau oder jeder Aenderung eines Arbeitsplatzes: Pruefung ob alle Komponenten korrekt eingerichtet und funktionsfaehig sind","Nur bei Grosskunden","Nur fuer Laptops"],a:1,f:"Testprotokoll Arbeitsplatz: nach Neueinrichtung, nach Hardware-Austausch, nach OS-Neuinstallation. Prueft ob Hardware, Software, Netzwerk und Sicherheitsrichtlinien korrekt sind. Dokumentiert Uebergabe."},
{id:100,b:"10.6",t:"PDCA",q:"Was ist der Hauptzweck des PDCA-Zyklus?",o:["Kontinuierliche Verbesserung durch strukturiertes Vorgehen: Lernen aus Erfahrungen und systematische Optimierung","Fehlerprotokollierung","Einmalige Problemloesung","Zertifizierungsvorbereitung"],a:0,f:"PDCA-Hauptzweck: strukturiertes kontinuierliches Lernen und Verbessern. Nicht Perfektionismus im ersten Anlauf, sondern schrittweise Verbesserung durch Wiederholung des Zyklus."}
];

let st={},filt=[...Q];
function init(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});render();}
function render(){
  const c=document.getElementById("qc");c.innerHTML="";
  let lb=null;
  filt.forEach(q=>{
    if(q.b!==lb){const d=document.createElement("div");d.className="bh";d.textContent=BN[q.b]||q.b;c.appendChild(d);lb=q.b;}
    c.appendChild(mk(q));
  });up();}
function mk(q){
  const s=st[q.id],d=document.createElement("div"),L=["A","B","C","D"];
  d.className="qc"+(s.done?(s.ok?" ac":" aw"):"");d.id="c"+q.id;
  d.innerHTML=`<div class="qn">FRAGE ${q.id}/${Q.length}</div><div class="qt">${q.t}</div><div class="qq">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt${s.done?" dis":""}${s.done&&i===q.a?" ok":""}${s.done&&!s.ok&&i===s.ci?" ng":""}" onclick="ans(${q.id},${i})"><span class="ol">${L[i]}</span><span>${o}</span></div>`).join("")}</div>
<div class="fbb${s.done?" show "+(s.ok?"cok":"cng"):""}" id="f${q.id}">${s.done?(s.ok?"✅ ":"❌ ")+q.f:""}</div>`;
  return d;}
function ans(id,i){
  const s=st[id];if(s.done)return;
  const q=Q.find(x=>x.id===id);s.done=true;s.ok=i===q.a;s.ci=i;
  const c=document.getElementById("c"+id);c.className="qc "+(s.ok?"ac":"aw");
  c.querySelectorAll(".opt").forEach((el,j)=>{el.classList.add("dis");if(j===q.a)el.classList.add("ok");if(!s.ok&&j===i)el.classList.add("ng");});
  const f=document.getElementById("f"+id);f.textContent=(s.ok?"✅ ":"❌ ")+q.f;f.className="fbb show "+(s.ok?"cok":"cng");up();}
function up(){
  const tot=Q.length,done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  document.getElementById("sd").textContent=ok+"/"+done;
  document.getElementById("pf").style.width=(done/tot*100)+"%";
  document.getElementById("pl").textContent=done+" von "+tot+" beantwortet";}
function fil(t,btn){
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("act"));btn.classList.add("act");
  if(t==="all")filt=[...Q];
  else if(t==="open")filt=Q.filter(q=>!st[q.id].done);
  else if(t==="wrong")filt=Q.filter(q=>st[q.id].done&&!st[q.id].ok);
  else filt=Q.filter(q=>q.b===t);render();}
function shuf(){filt=[...filt].sort(()=>Math.random()-.5);render();}
function rst(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});filt=[...Q];document.querySelectorAll(".fb").forEach((b,i)=>b.classList.toggle("act",i===0));render();document.getElementById("ov").classList.remove("show");}
function showR(){
  const done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  const pct=done>0?Math.round(ok/done*100):0;
  let e="😅",m="Weiter ueben!";
  if(pct>=90){e="🏆";m="Ausgezeichnet!";}else if(pct>=75){e="🎉";m="Sehr gut!";}else if(pct>=60){e="📚";m="Gut weiter so!";}
  document.getElementById("oe").textContent=e;document.getElementById("os").textContent=ok+"/"+done;
  document.getElementById("om").textContent=pct+"% richtig - "+m;
  document.getElementById("ov").classList.add("show");}
function closeR(){document.getElementById("ov").classList.remove("show");}
init();
</script></body></html>
