<!DOCTYPE html>

<title>AP1 Quiz – Kapitel 4: Installation & Konfiguration</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--card:#20243a;--accent:#f97316;--correct:#22c55e;--wrong:#ef4444;--text:#e2e8f0;--muted:#94a3b8;--border:#2d3450;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
header{background:#1a1d27;border-bottom:2px solid var(--accent);padding:16px 24px;position:sticky;top:0;z-index:100;}
.hi{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.badge{background:var(--accent);color:#fff;font-weight:800;font-size:12px;padding:3px 9px;border-radius:5px;}
h1{font-size:18px;font-weight:700;}
.sub{font-size:12px;color:var(--muted);}
.sd{font-size:20px;font-weight:800;color:var(--accent);}
.ctrl{display:flex;gap:6px;flex-wrap:wrap;}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.p{background:var(--accent);border-color:var(--accent);color:#fff;}
.pw{max-width:900px;margin:10px auto 0;padding:0 24px;}
.pt{background:var(--border);border-radius:999px;height:4px;overflow:hidden;}
.pf{background:var(--accent);height:100%;border-radius:999px;transition:width .4s;}
.pl{font-size:11px;color:var(--muted);margin-top:3px;text-align:right;}
.fb-bar{max-width:900px;margin:14px auto 0;padding:0 24px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.fl{font-size:11px;color:var(--muted);}
.fb{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:4px 11px;border-radius:20px;cursor:pointer;font-size:11px;transition:all .15s;}
.fb:hover,.fb.act{background:var(--accent);border-color:var(--accent);color:#fff;}
main{max-width:900px;margin:20px auto 60px;padding:0 24px;display:flex;flex-direction:column;gap:14px;}
.bh{margin-top:8px;padding:8px 14px;background:linear-gradient(90deg,var(--card),transparent);border-left:3px solid var(--accent);border-radius:0 7px 7px 0;font-size:12px;font-weight:700;color:var(--accent);}
.qc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;transition:border-color .2s;}
.qc.ac{border-color:var(--correct);}
.qc.aw{border-color:var(--wrong);}
.qn{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:1px;margin-bottom:4px;}
.qt{display:inline-block;font-size:10px;background:var(--surface);color:var(--accent);border:1px solid var(--border);padding:2px 7px;border-radius:10px;margin-bottom:8px;font-weight:600;}
.qq{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:12px;}
code{background:#1e293b;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12px;color:#fb923c;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px 12px;cursor:pointer;display:flex;align-items:flex-start;gap:9px;font-size:13px;transition:all .15s;}
.opt:hover:not(.dis){border-color:var(--accent);background:#1e2235;}
.opt.ok{border-color:var(--correct);background:rgba(34,197,94,.1);}
.opt.ng{border-color:var(--wrong);background:rgba(239,68,68,.1);}
.opt.dis{cursor:default;}
.ol{min-width:20px;height:20px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.opt.ok .ol{background:var(--correct);color:#000;}
.opt.ng .ol{background:var(--wrong);color:#fff;}
.fbb{margin-top:10px;padding:9px 12px;border-radius:7px;font-size:12px;line-height:1.5;display:none;}
.fbb.show{display:block;}
.fbb.cok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#86efac;}
.fbb.cng{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;}
.ov.show{display:flex;}
.ob{background:var(--card);border:2px solid var(--accent);border-radius:18px;padding:36px 44px;text-align:center;max-width:380px;width:90%;}
.oe{font-size:52px;margin-bottom:12px;}
.ot{font-size:22px;font-weight:800;margin-bottom:6px;}
.os{font-size:44px;font-weight:900;color:var(--accent);margin:14px 0;}
.om{font-size:13px;color:var(--muted);margin-bottom:20px;}
.ob-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
</style>
</head>
