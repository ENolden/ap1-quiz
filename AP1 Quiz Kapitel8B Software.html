const Q=[
{id:1,b:"8.6",t:"Skriptsprachen",q:"Was ist eine Skriptsprache?",o:["Eine Datenbank-Sprache","Interpretierte Sprache fuer meist kleinere Programme und Automatisierung - Code wird zeilenweise ausgefuehrt ohne vorherige Kompilierung","Kompilierte Sprache","Eine Markup-Sprache"],a:1,f:"Skriptsprachen: interpretiert (kein Compiler), oft dynamisch typisiert, hoehere Abstraktionsebene. Beispiele: Python, JavaScript, Bash, PHP, Ruby. Gut fuer Automatisierung und schnelle Skripte."},
{id:2,b:"8.6",t:"Skriptsprachen",q:"Was ist ein Shellskript?",o:["Skript das vom Shell-Interpreter ausgefuehrt wird (bash, sh) - automatisiert Systemaufgaben und Befehlsfolgen unter Linux/Mac","Ein Python-Skript","Ein Datenbankskript","Ein Windows-Programm"],a:0,f:"Shellskript: Datei mit Shell-Befehlen, Dateiendung .sh. Erste Zeile: #!/bin/bash (Shebang). Beispiel: Backup-Automatisierung, Server-Konfiguration, Log-Analyse."},
{id:3,b:"8.6",t:"Skriptsprachen",q:"Was ist der Shebang (#!) in einem Shellskript?",o:["Ein Kommentar","Ein Befehl","Ein Variablenname","Erste Zeile eines Skripts die den Interpreter angibt (z.B. #!/bin/bash) - OS weiss damit welches Programm das Skript ausfuehren soll"],a:3,f:"Shebang: #!/bin/bash oder #!/usr/bin/env python3. Muss erste Zeile sein. OS liest diese Zeile und startet den angegebenen Interpreter mit dem Skript als Eingabe."},
{id:4,b:"8.6",t:"Skriptsprachen",q:"Was ist der Unterschied zwischen interpretierten und kompilierten Sprachen?",o:["Kein Unterschied","Interpretiert: Code wird zeilenweise ausgefuehrt (Python, JS). Kompiliert: Code wird vorher in Maschinencode uebersetzt (C, Java) - schneller aber weniger flexibel","Kompiliert ist flexibler","Interpretiert ist schneller"],a:1,f:"Interpretiert: kein separater Kompilierungsschritt, plattformuebergreifend, aber langsamer. Kompiliert: schneller, aber plattformspezifisch. Java: hybrider Ansatz (Bytecode + JVM)."},
{id:5,b:"8.6",t:"Skriptsprachen",q:"Was ist Python als Skriptsprache?",o:["Nur fuer Web","Hochsprachige, interpretierte Sprache mit klarer Syntax - vielseitig: Skripting, Web, Data Science, KI, Automatisierung","Nur fuer Betriebssysteme","Nur fuer Datenbanken"],a:1,f:"Python: lesbar, vielseitig, grosse Standardbibliothek, riesiges Oekosystem (PyPI). Skripte: .py-Dateien. Dynamisch typisiert. Einzug statt geschweifter Klammern. Grosse Community."},
{id:6,b:"8.6",t:"Skriptsprachen",q:"Was kann man mit Shellskripten automatisieren?",o:["Webseiten nur","Dateisystem-Operationen, Backups, Server-Konfiguration, Log-Analyse, Deployment-Prozesse, Batch-Verarbeitung","Grafische Anwendungen","Datenbankabfragen nur"],a:1,f:"Shellskript-Anwendungen: automatische Backups, Server-Setup, Log-Rotation, Deployment, Dateiumbenennungen en masse, Systempruefungen, Cron-Jobs fuer periodische Aufgaben."},
{id:7,b:"8.6",t:"Skriptsprachen",q:"Was ist JavaScript als Skriptsprache?",o:["Eine kompilierte Sprache","Nur fuer Mobile","Skriptsprache fuer den Browser (Frontend) und mit Node.js auch serverseitig - einzige Sprache die nativ im Browser laeuft","Nur fuer Backend"],a:2,f:"JavaScript: urspruenglich Browser-Skriptsprache, jetzt auch Server (Node.js), Mobile (React Native), Desktop (Electron). Asynchron, eventbasiert, dynamisch typisiert."},
{id:8,b:"8.6",t:"Skriptsprachen",q:"Was ist der Unterschied zwischen Skript und Programm?",o:["Skript: interpretiert, meist kuerzer, fuer spezifische Aufgaben. Programm: oft kompiliert, groesser, vollstaendige Anwendung mit GUI etc.","Identisch","Programme sind kuerzer","Skripte sind besser"],a:0,f:"Grenze unscharf: Skripte eher kurz, interpretiert, Aufgaben-spezifisch. Programme eher komplexer, kompiliert, vollstaendige Anwendungen. Python-Skript kann zur vollstaendigen Anwendung wachsen."},
{id:9,b:"8.7",t:"Pseudocode",q:"Was ist der Zweck von Pseudocode?",o:["Sprachunabhaengige Beschreibung eines Algorithmus fuer Planung und Kommunikation - vor der eigentlichen Implementierung","Direkte Ausfuehrung","Ein Testverfahren","Dokumentation des fertigen Codes"],a:0,f:"Pseudocode: Algorithmus beschreiben ohne Sprachdetails. Ermoeglicht Planung unabhaengig von Sprache, leicht verstaendlich fuer verschiedene Entwickler, Kommunikation mit Nicht-Technikern."},
{id:10,b:"8.7",t:"Pseudocode",q:"Wie schreibt man eine IF-Anweisung in Pseudocode?",o:["WENN Bedingung MACHE","if(bedingung){","IF Bedingung THEN Anweisung(en) END IF","bedingung ? wahr : falsch"],a:2,f:"Pseudocode IF: IF Bedingung THEN / Anweisung(en) / END IF. Mit else: IF Bedingung THEN / ... / ELSE / ... / END IF. Klar und verstaendlich ohne sprachspezifische Syntax."},
{id:11,b:"8.7",t:"Pseudocode",q:"Wie schreibt man eine WHILE-Schleife in Pseudocode?",o:["while(bed){","WHILE Bedingung DO Anweisung(en) END WHILE","fuer alle elemente","SOLANGE Bedingung WIEDERHOLE"],a:1,f:"Pseudocode WHILE: WHILE Bedingung DO / Anweisung(en) / END WHILE. Kopfgesteuerte Schleife: Bedingung zuerst. Beispiel: WHILE zaehler < 10 DO / zaehler = zaehler + 1 / END WHILE."},
{id:12,b:"8.7",t:"Pseudocode",q:"Wie schreibt man eine FOR-Schleife in Pseudocode?",o:["ZAEHLE VON BIS","FOR EACH element DO","FOR Variable = Startwert TO Endwert DO Anweisung(en) END FOR","for(int i=0;i<n;i++)"],a:2,f:"Pseudocode FOR: FOR i = 1 TO 10 DO / Anweisung(en) / END FOR. Zaehlergesteuerte Schleife, Anzahl bekannt. Klar erkennbar welchen Bereich die Variable durchlaeuft."},
{id:13,b:"8.7",t:"Pseudocode",q:"Wie schreibt man SWITCH/CASE in Pseudocode?",o:["switch(var){}","SWITCH Variable CASE Wert1: Anw. BREAK CASE Wert2: Anw. BREAK DEFAULT: Anw. END SWITCH","FALLS variable IST","WENN DANN SONST"],a:1,f:"Pseudocode SWITCH: SWITCH variable / CASE wert1: Anweisung(en) BREAK / CASE wert2: Anweisung(en) BREAK / DEFAULT: Anweisung(en) / END SWITCH."},
{id:14,b:"8.7",t:"Pseudocode",q:"Wie schreibt man eine REPEAT-UNTIL-Schleife in Pseudocode?",o:["do{} while()","REPEAT Anweisung(en) UNTIL Bedingung","FOR i DOWNTO 0","WHILE NOT Bedingung DO"],a:1,f:"REPEAT-UNTIL: Anweisungen laufen MINDESTENS EINMAL, dann wird Bedingung geprueft. Equivalent zu do-while. REPEAT / eingabe = lies() / UNTIL eingabe > 0."},
{id:15,b:"8.7",t:"Pseudocode",q:"Was ist der Vorteil von Pseudocode bei der Teamarbeit?",o:["Sprachunabhaengig: Java-, Python- und C-Entwickler koennen alle denselben Pseudocode verstehen und dann in ihrer Sprache implementieren","Ist ausfuehrbar","Schneller als Code","Kein Vorteil"],a:0,f:"Pseudocode als gemeinsame Sprache: Team diskutiert Algorithmus, nicht Sprachsyntax. Auch Nicht-Programmierer (Fachexperten) koennen Logik verstehen und validieren. Pruefungen nutzen oft Pseudocode."},
{id:16,b:"8.8",t:"UML",q:"Was ist UML?",o:["Ein Framework","Eine Datenbank","Unified Modeling Language: grafische Modellierungssprache fuer Software-Systeme - verschiedene Diagrammtypen fuer verschiedene Aspekte","Eine Programmiersprache"],a:2,f:"UML: standardisierte Modellierungssprache (OMG-Standard). Ermoeglicht visuelle Darstellung von Systemstruktur und -verhalten. Verschiedene Diagramme: Klassen-, Aktivitaets-, Anwendungsfall-, Sequenzdiagramm."},
{id:17,b:"8.8",t:"UML",q:"Was ist ein Aktivitaetsdiagramm?",o:["Ablauf von Aktivitaeten und Aktionen innerhalb eines Systems - zeigt Workflow, Verzweigungen, Parallelitaet","Klassenstruktur darstellen","Sequenz von Nachrichten","Benutzer und Anwendungsfaelle"],a:0,f:"Aktivitaetsdiagramm: Workflow-Darstellung. Elemente: Start (gefuellter Kreis), Aktivitaet (Rechteck), Entscheidung (Raute), Gabel/Zusammenfuehrung (Balken), Ende (Kreis im Kreis). Aehnlich wie Flussdiagramm."},
{id:18,b:"8.8",t:"UML",q:"Was ist ein Anwendungsfalldiagramm (Use Case Diagram)?",o:["Datenbankstruktur","Programmablauf","Zeigt Beziehungen zwischen Akteuren (Benutzern) und Anwendungsfaellen (Systemfunktionen) - funktionale Anforderungen visualisieren","Klassenstruktur"],a:2,f:"Use-Case-Diagramm: Akteur (Strichmennchen), Anwendungsfall (Oval), System-Boundary (Rechteck). Beziehungen: Assoziation, Include (obligatorisch), Extend (optional), Generalisierung."},
{id:19,b:"8.8",t:"UML",q:"Was ist der Unterschied zwischen include und extend im Use-Case-Diagramm?",o:["Kein Unterschied","Include ist optional","Include: Anwendungsfall wird IMMER eingebunden. Extend: Anwendungsfall wird nur UNTER BESTIMMTEN BEDINGUNGEN eingebunden","Extend ist obligatorisch"],a:2,f:"Include: A beinhaltet immer B (Pfeil zeigt auf B). Beispiel: Bestellen includes Authentifizierung. Extend: B erweitert A nur unter Bedingung (Pfeil zeigt auf A). Beispiel: Bestellen wird durch Express-Lieferung erweitert."},
{id:20,b:"8.8",t:"UML",q:"Was ist ein Klassendiagramm?",o:["Anwendungsfaelle","Aktivitaetsablauf","Statische Struktur: Klassen mit Attributen und Methoden sowie Beziehungen zwischen Klassen (Vererbung, Assoziation, Aggregation, Komposition)","Datenbankschema"],a:2,f:"Klassendiagramm: Klasse = Rechteck mit 3 Sektionen (Name, Attribute, Methoden). Zugriffsmodifikatoren: + (public), - (private), # (protected). Beziehungen: Pfeil (Vererbung), Linie (Assoziation)."},
{id:21,b:"8.8",t:"UML",q:"Wie wird Vererbung im Klassendiagramm dargestellt?",o:["Gestrichelter Pfeil mit Dreieck","Durchgezogene Linie mit offenem Dreieck/Pfeil der zur Elternklasse zeigt","Gestrichelte Linie","Doppellinie"],a:1,f:"Vererbung (Generalisierung) im Klassendiagramm: durchgezogene Linie mit hohlem Dreieck/Pfeil an der Elternklasse. Hund ----▷ Tier. Interface-Implementierung: gestrichelte Linie mit hohlem Dreieck."},
{id:22,b:"8.8",t:"UML",q:"Was ist ein Startknoten im Aktivitaetsdiagramm?",o:["Ein Rechteck","Ein Raute","Ein leerer Kreis","Ausgefuellter schwarzer Kreis - markiert den einzigen Startpunkt des Aktivitaetsdiagramms"],a:3,f:"Startknoten: ausgefuellter schwarzer Kreis. Genau ein Startknoten pro Diagramm. Endknoten: Kreis mit ausgefuelltem Kreis innen (oder X). Entscheidung: Raute (Diamond) mit Bedingungen an Kanten."},
{id:23,b:"8.8",t:"UML",q:"Was ist ein Entscheidungsknoten im Aktivitaetsdiagramm?",o:["Ein Balken","Ein Kreis","Ein Rechteck","Raute (Diamond) von der mehrere Pfade ausgehen, jeder mit einer Bedingung - XOR: genau einer wird ausgefuehrt"],a:3,f:"Entscheidungsknoten (Decision): Raute mit einem Eingang und mehreren Ausgaengen. Jeder Ausgang hat eine Bedingung in eckigen Klammern [bedingung]. Genau ein Ausgang wird genommen."},
{id:24,b:"8.8",t:"UML",q:"Was ist eine Gabel und Zusammenfuehrung im Aktivitaetsdiagramm?",o:["Start und Ende","Schleifen-Elemente","Gabel (Fork): ein Fluss wird in mehrere parallele Fluesse aufgeteilt. Zusammenfuehrung (Join): parallele Fluesse werden synchronisiert","Entscheidung und Merge"],a:2,f:"Fork (Gabel): Balken von dem mehrere parallele Pfade ausgehen (AND-Split). Join (Zusammenfuehrung): Balken der auf mehrere eingehende Pfade wartet (AND-Join/Synchronisation). Beide als dicker Balken."},
{id:25,b:"8.8",t:"UML",q:"Was ist ein Akteur im Anwendungsfalldiagramm?",o:["Eine Funktion","Eine Datenbank","Ein Modul","Person oder externes System das mit dem System interagiert und Anwendungsfaelle ausloest (dargestellt als Strichmennchen)"],a:3,f:"Akteur: Strichmennchen. Koennen sein: Benutzer (Kunde, Admin, Mitarbeiter), externe Systeme (Zahlungsdienstleister, Email-Server). Akteure sind ausserhalb des Systems."},
{id:26,b:"8.9",t:"Tests",q:"Was ist ein White-Box-Test?",o:["Test ohne Codekenntnis","Test der Benutzeroberflaeche","Tester kennt den Quellcode und testet interne Logik, Zweige und Anweisungen - geeignet fuer Unit-Tests","Test des Gesamtsystems"],a:2,f:"White-Box (Glass-Box): Tester sieht den Code. Prueft: alle Anweisungen ausgefuehrt (Statement Coverage), alle Zweige genommen (Branch Coverage), alle Bedingungen geprueft (Condition Coverage)."},
{id:27,b:"8.9",t:"Tests",q:"Was ist ein Black-Box-Test?",o:["Unit-Test","Tester kennt nur Ein- und Ausgaben, kein Einblick in Implementierung - testet Verhalten aus Benutzerperspektive","Code-Review","Test mit Codekenntnis"],a:1,f:"Black-Box: kein Einblick in Code. Testet ob System spezifikationsgerecht funktioniert. Geeignet fuer System- und Abnahmetests. Testfaelle aus Anforderungen/Lastenheft abgeleitet."},
{id:28,b:"8.9",t:"Tests",q:"Was ist ein Schreibtisch-Test?",o:["Test am Schreibtisch mit Computer","Ein automatisierter Test","Ein Black-Box-Test","Manuelles Durchgehen des Codes oder Algorithmus im Kopf ohne Ausfuehren - Simulation des Computerverhaltens zur Fehlerfindung"],a:3,f:"Schreibtisch-Test (Desk Check): Algorithmus oder Code wird im Kopf durchgespielt, Variablenwerte schriftlich verfolgt. Guenstig und schnell fuer einfache Algorithmen. Keine Ausfuehrung noetig."},
{id:29,b:"8.9",t:"Tests",q:"Was ist ein Unit-Test?",o:["Test einer einzelnen kleinen Einheit (Funktion/Methode) isoliert von Rest des Systems - schnell, automatisierbar","Test des gesamten Systems","Test der Benutzeroberflaeche","Test der Datenbank"],a:0,f:"Unit-Test: kleinste Testeinheit. Testet eine Funktion/Methode isoliert. Mock-Objekte fuer Abhaengigkeiten. Framework: JUnit (Java), pytest (Python), Jest (JS). Schnell, haeufig ausfuehren (CI)."},
{id:30,b:"8.9",t:"Tests",q:"Was ist ein Integrationstest?",o:["Systemtest","Abnahmetest","Test des Zusammenspiels mehrerer Komponenten/Module - prueft ob Schnittstellen korrekt funktionieren","Unit-Test"],a:2,f:"Integrationstest: testet Zusammenspiel von Modulen. Z.B.: Service + Datenbank, Frontend + Backend. Findet Probleme an Schnittstellen die Unit-Tests nicht sehen. Laeuft langsamer als Unit-Tests."},
{id:31,b:"8.9",t:"Tests",q:"Was ist ein Systemtest?",o:["Performance-Test","Unit-Test","Test des gesamten Systems als Ganzes unter produktionsaehnlichen Bedingungen - prueft Gesamtverhalten gegen Anforderungen","Integrationstest"],a:2,f:"Systemtest: vollstaendiges System wird gegen Anforderungen getestet. Black-Box-Ansatz. Laeuft auf Testumgebung aehnlich der Produktion. Findet Fehler die Komponenten-Tests uebersehn."},
{id:32,b:"8.9",t:"Tests",q:"Was ist ein Regressionstest?",o:["Test neuer Features","Sicherheitstest","Lasttest","Wiederholung frueherer Tests nach Aenderungen um sicherzustellen dass bestehende Funktionen noch funktionieren - verhindert Regressionen"],a:3,f:"Regressionstest: nach jeder Aenderung alle bestehenden Tests erneut ausfuehren. Verhindert dass neue Funktionen alte beschaedigen. Automatisierung wichtig: sonst zu zeitaufwendig. Teil von CI/CD."},
{id:33,b:"8.9",t:"Tests",q:"Was ist ein Lasttest (Load Test)?",o:["Test wie das System unter erwartetem Lastniveau funktioniert - prueft Performance bei normaler und Spitzenlast","Security-Test","Funktionstest","Qualitaetstest"],a:0,f:"Lasttest: System unter realistischer Last betreiben. Prueft: Antwortzeiten, Durchsatz, Ressourcenverbrauch. Tools: JMeter, k6, Gatling. Oft: Lastniveau steigern bis System versagt (Stresstest)."},
{id:34,b:"8.9",t:"Tests",q:"Was ist Testabdeckung (Code Coverage)?",o:["Qualitaet der Tests","Prozentualer Anteil des Codes der durch Tests ausgefuehrt wird - 100% bedeutet jede Zeile/Bedingung wird von mindestens einem Test getestet","Testdauer","Anzahl der Tests"],a:1,f:"Code Coverage: Statement Coverage (Zeilen), Branch Coverage (Zweige), Condition Coverage (Bedingungen). Tool: JaCoCo (Java), coverage.py (Python). 80%+ gilt oft als Mindeststandard."},
{id:35,b:"8.9",t:"Tests",q:"Was ist TDD (Test-Driven Development)?",o:["Tests nach Code schreiben","Tests weglassen","Entwicklungsmethode: erst Test schreiben (scheitert), dann minimal code implementieren damit Test besteht, dann refactoren (Red-Green-Refactor)","Nur manuelle Tests"],a:2,f:"TDD: 1. Red (Test schreiben, scheitert). 2. Green (minimalen Code schreiben um Test zu bestehen). 3. Refactor (Code verbessern, Tests behalten gruen). Fuehrt zu testbarem, sauberem Design."},
{id:36,b:"8.10",t:"UI/Ergonomie",q:"Was ist Softwareergonomie?",o:["Hardware-Ergonomie","Netzwerkplanung","Datenbank-Design","Gestaltung benutzerfreundlicher und intuitiver Software-Oberflaechen die effiziente und angenehme Nutzung ermoeglicht"],a:3,f:"Softwareergonomie: Software soll effizient, erlernbar, fehlertolerant, zufriedenstellend und sicher nutzbar sein. Prinzipien: konsistentes Layout, klare Beschriftungen, minimale Klicks, sinnvolles Feedback."},
{id:37,b:"8.10",t:"UI/Ergonomie",q:"Was sind Grundprinzipien der Softwareergonomie?",o:["Groesstes Schriftbild","Maximale Funktionen auf einer Seite","Maximale Farben","Konsistentes Layout, klare Beschriftungen, minimale Komplexitaet (wenige Klicks), Feedback bei Aktionen (Ladeanzeigen, Bestaedigungen)"],a:3,f:"Ergonomie-Prinzipien: Aufgabenangemessenheit, Selbstbeschreibungsfaehigkeit, Steuerbarkeit, Erwartungskonformitaet, Fehlertoleranz, Individualisierbarkeit, Lernfoerderlichkeit (DIN EN ISO 9241)."},
{id:38,b:"8.10",t:"UI/Ergonomie",q:"Was ist Corporate Identity (CI) bei Software?",o:["Einheitlicher Markenauftritt in der Software: definierte Farben, Schriften, Logos, konsistenter Stil gemaess Unternehmensrichtlinien","Unternehmensidentitaet allgemein","Barrierefreiheit","Datenschutz"],a:0,f:"CI: Farben (Primary/Secondary Brand Colors), Typographie (definierte Schriftarten), Logo-Verwendung, Bildsprache, Tonalitaet. Style-Guides und Design-Systeme (z.B. Storybook) dokumentieren CI."},
{id:39,b:"8.10",t:"UI/Ergonomie",q:"Was ist Barrierefreiheit (Accessibility) bei Software?",o:["Offline-Verfuegbarkeit","Gestaltung die auch Menschen mit Einschraenkungen (Sehbehinderung, Motorik, Kognition) die volle Nutzung ermoeglicht","Mehrsprachigkeit","Zugaenglichkeit ohne Passwort"],a:1,f:"Barrierefreiheit: hoher Kontrast (WCAG AA: min. 4,5:1), skalierbare Schriftgroessen, Alternative Texte fuer Bilder (screen reader), Tastatur-Navigation, ARIA-Labels, keine Information nur durch Farbe."},
{id:40,b:"8.10",t:"UI/Ergonomie",q:"Was sind WCAG-Richtlinien?",o:["Ein Datenbankstandard","Ein UML-Standard","Web Content Accessibility Guidelines: internationaler Standard fuer barrierefreie Web-Inhalte (Level A, AA, AAA)","Ein Sicherheitsstandard"],a:2,f:"WCAG (W3C): 4 Prinzipien: Wahrnehmbar, Bedienbar, Verstaendlich, Robust (POUR). Level AA ist oft gesetzliche Mindestanforderung (EU-Webzugaenglichkeitsrichtlinie). Contrast-Ratio, Alt-Texte etc."},
{id:41,b:"8.10",t:"UI/Ergonomie",q:"Was ist Feedback in der Softwareergonomie?",o:["Team-Feedback","Programmier-Feedback","Benutzer-Bewertungen","Systemantworten auf Benutzeraktionen: Ladeanzeigen, Bestaedigungsdialoge, Fehlermeldungen - zeigt dass Aktion registriert wurde"],a:3,f:"Feedback: System kommuniziert Zustand nach Aktion. Ladeanzeige (Aktion laeuft), Bestaeatigung (Aktion erfolgreich), Fehlermeldung (Aktion fehlgeschlagen + Loesung). Ohne Feedback: Nutzer weiss nicht ob Klick funktioniert hat."},
{id:42,b:"8.10",t:"UI/Ergonomie",q:"Was ist Responsives Design?",o:["Animiertes Design","Barrierefreies Design","Schnelles Design","Design das sich automatisch an verschiedene Bildschirmgroessen und Geraete anpasst (Desktop, Tablet, Smartphone)"],a:3,f:"Responsive Design: flexible Layouts (Grid/Flexbox), Media Queries (CSS), skalierbare Bilder. Mobile-First-Ansatz: zuerst fuer kleine Bildschirme designen, dann fuer groessere erweitern."},
{id:43,b:"8.10",t:"UI/Ergonomie",q:"Was ist Usability-Testing?",o:["Code-Testing","Lasttest","Security-Test","Benutzer testen die Software und beobachtet werden - Probleme in der Benutzbarkeit werden direkt aufgedeckt"],a:3,f:"Usability-Test: echte Benutzer fuehren Aufgaben in der Software durch. Beobachter protokollieren Probleme. 5 Testpersonen reichen um ca. 85% aller Usability-Probleme zu finden (Nielsen)."},
{id:44,b:"8.11",t:"Datenbanken",q:"Was ist eine relationale Datenbank?",o:["Eine Graphdatenbank","Eine Dateiensammlung","Datenbank die Daten in Tabellen (Relationen) mit Zeilen und Spalten speichert, Tabellen werden ueber Schluessel verknuepft","Eine JSON-Datenbank"],a:2,f:"Relationale DB: Tabellen (Relationen), Zeilen (Tupel/Datensaetze), Spalten (Attribute). Beziehungen ueber Primaer- und Fremdschluessel. SQL fuer Abfragen. Beispiele: MySQL, PostgreSQL, Oracle, SQLite."},
{id:45,b:"8.11",t:"Datenbanken",q:"Was ist ein Primaerschluessel (Primary Key)?",o:["Ein Fremdschluessel","Jedes Attribut","Ein Index","Attribut oder Attributkombination das jeden Datensatz einer Tabelle eindeutig identifiziert - darf nicht NULL sein und muss eindeutig sein"],a:3,f:"Primary Key: eindeutig, NOT NULL. Oft kuenstlicher Schluessel (Auto-Increment ID). Beispiel: Kunden-ID, Artikel-Nr. Zusammengesetzter PK: mehrere Attribute gemeinsam eindeutig."},
{id:46,b:"8.11",t:"Datenbanken",q:"Was ist ein Fremdschluessel (Foreign Key)?",o:["Ein Primaerschluessel","Ein Index","Ein NULL-Wert","Attribut in einer Tabelle das auf den Primaerschluessel einer anderen Tabelle verweist - stellt referenzielle Integritaet her"],a:3,f:"Foreign Key: verweist auf PK einer anderen Tabelle. Garantiert referenzielle Integritaet: FK-Wert muss existierenden PK-Wert haben oder NULL sein. Verhindert verwaiste Datensaetze."},
{id:47,b:"8.11",t:"Datenbanken",q:"Was ist referenzielle Integritaet?",o:["Regeln die sicherstellen dass Fremdschluessel immer auf existierende Primaerschluessel verweisen - Beziehungen bleiben konsistent","Datenverschluesselung","Datennormalisierung","Datenredundanz"],a:0,f:"Referenzielle Integritaet: FK muss auf existierenden PK zeigen oder NULL sein. Primärschlüssel kann nicht geloescht werden solange FK darauf verweist. Datenbank bleibt konsistent."},
{id:48,b:"8.11",t:"Datenbanken",q:"Was ist Normalisierung?",o:["Systematischer Prozess zur Strukturierung von Datenbanken: Redundanzen vermeiden und Anomalien verhindern durch Normalformen","Datenkompression","Datenverschluesselung","Datensortierung"],a:0,f:"Normalisierung: Datenbankstruktur verbessern. 1NF: atomare Werte, keine Wiederholungsgruppen. 2NF: 1NF + keine partiellen Abhaengigkeiten. 3NF: 2NF + keine transitiven Abhaengigkeiten."},
{id:49,b:"8.11",t:"Datenbanken",q:"Was ist die 1. Normalform (1NF)?",o:["Keine Duplikate","Alle Tabellen verbunden","Keine Fremdschluessel","Alle Attributwerte sind atomar (unteilbar), keine Wiederholungsgruppen, jede Zeile ist eindeutig identifizierbar (PK vorhanden)"],a:3,f:"1NF: atomare Werte (kein Comma-separated in einer Zelle), keine Wiederholungsgruppen (keine Telefon1, Telefon2 Spalten), jede Zeile eindeutig (PK). Grundvoraussetzung fuer relationale DB."},
{id:50,b:"8.11",t:"Datenbanken",q:"Was ist die 2. Normalform (2NF)?",o:["Ist in 1NF UND alle Nicht-Schluesselattribute sind vollstaendig vom gesamten Primaerschluessel abhaengig (kein partielles Abhaengigkeit bei zusammengesetztem PK)","Keine transitiven Abhaengigkeiten","Nur Primaerschluessel","Alle Attribute normalisiert"],a:0,f:"2NF: 1NF erfuellt + kein Nicht-Schluesselattribut haengt nur von einem TEIL des zusammengesetzten Primaerschluessels ab. Betrifft nur Tabellen mit zusammengesetztem PK. Loesung: Tabelle aufteilen."},
{id:51,b:"8.11",t:"Datenbanken",q:"Was ist die 3. Normalform (3NF)?",o:["Keine Primaerschluessel-Abhaengigkeiten","Alle Fremdschluessel gesetzt","Ist in 2NF UND kein Nicht-Schluesselattribut haengt transitiv von einem anderen Nicht-Schluesselattribut ab","Keine Duplikate"],a:2,f:"3NF: 2NF erfuellt + keine transitiven Abhaengigkeiten. Beispiel: Kunde (KdNr, PLZ, Stadt) - Stadt haengt von PLZ ab, nicht direkt von KdNr. Loesung: PLZ-Tabelle auslagern."},
{id:52,b:"8.11",t:"Datenbanken",q:"Was ist eine Einfuegeanomalie?",o:["Fehler beim Loeschen","Suchanomalie","Aenderungsanomalie","Neue Daten koennen nicht eingefuegt werden ohne fehlende Pflichtinformationen mitzuliefern - entsteht durch schlechtes Datenbankdesign"],a:3,f:"Einfuegeanomalie: Bsp: Mitarbeiter-Abteilung in einer Tabelle. Neue Abteilung kann nicht angelegt werden ohne einen Mitarbeiter. Loesung: Normalisierung, separate Abteilungs-Tabelle."},
{id:53,b:"8.11",t:"Datenbanken",q:"Was ist eine Aenderungsanomalie?",o:["Loeschanomalie","Fehler beim Einfuegen","Suchanomalie","Information ist redundant an mehreren Stellen gespeichert - Aenderung muss ueberall erfolgen, sonst entstehen widersprueechliche Daten"],a:3,f:"Aenderungsanomalie: Stadtname in jeder Bestellzeile gespeichert. Stadt aendert Namen -> muss in allen Zeilen geaendert werden. Vergiss eine Zeile: inkonsistente Daten. Loesung: Normalisierung."},
{id:54,b:"8.11",t:"Datenbanken",q:"Was ist eine Loeschanomalie?",o:["Fehler beim Einfuegen","Aenderungsanomalie","Einfuegeanomalie","Beim Loeschen eines Datensatzes gehen unbeabsichtigt noch benoestigte Informationen verloren"],a:3,f:"Loeschanomalie: Bsp: Einziger Mitarbeiter einer Abteilung wird entlassen - damit werden auch alle Abteilungsinformationen geloescht. Loesung: Normalisierung, separate Abteilungs-Tabelle."},
{id:55,b:"8.11",t:"Datenbanken",q:"Was ist Datenredundanz?",o:["Datenverschluesselung","Identische Daten werden mehrfach an verschiedenen Stellen gespeichert - fuehrt zu Anomalien und verschwendertem Speicherplatz","Datenkompression","Datensicherung"],a:1,f:"Redundanz: gleiche Information mehrfach gespeichert. Problem: Konsistenz schwer zu halten, mehr Speicher, Anomalien moeglich. Normalisierung reduziert Redundanz. Manchmal bewusst fuer Performance (Denormalisierung)."},
{id:56,b:"8.11",t:"Datenbanken",q:"Was ist Datenkonsistenz?",o:["Datenverschluesselung","Daten sind korrekt, widerspruchsfrei und vollstaendig - alle gespeicherten Werte sind logisch kohaerent und aktuell","Datenredundanz","Datensicherung"],a:1,f:"Konsistenz: Daten stimmen untereinander und mit Regeln ueberein. Integritaetsbedingungen (PK, FK, NOT NULL, CHECK) erzwingen Konsistenz. Transaktionstests (ACID) sichern Konsistenz."},
{id:57,b:"8.11",t:"Datenbanken",q:"Was sind SQL-Grundbefehle (DML)?",o:["COMMIT, ROLLBACK","GRANT, REVOKE","CREATE, DROP, ALTER","SELECT, INSERT, UPDATE, DELETE - Data Manipulation Language fuer Datenzugriff und -veraenderung"],a:3,f:"DML (Data Manipulation Language): SELECT (lesen), INSERT (einfuegen), UPDATE (aendern), DELETE (loeschen). Wichtigste Kategorie fuer taegliche Datenbankarbeit."},
{id:58,b:"8.11",t:"Datenbanken",q:"Was ist SQL SELECT?",o:["Tabelle erstellen","Daten aus Tabellen abfragen: SELECT Spalten FROM Tabelle WHERE Bedingung ORDER BY Spalte","Daten loeschen","Neue Daten einfuegen"],a:1,f:"SELECT: SELECT name, alter FROM kunden WHERE alter > 18 ORDER BY name. SELECT *: alle Spalten. WHERE: filtern. ORDER BY: sortieren. LIMIT: Anzahl begrenzen."},
{id:59,b:"8.11",t:"Datenbanken",q:"Was ist SQL JOIN?",o:["Daten filtern","Tabellen loeschen","Verknuepfung von Daten aus mehreren Tabellen anhand gleicher Werte (meist PK=FK): INNER JOIN, LEFT JOIN, RIGHT JOIN","Daten sortieren"],a:2,f:"JOIN: INNER JOIN = nur uebereinstimmende Zeilen. LEFT JOIN = alle Zeilen der linken Tabelle + passende rechts. RIGHT JOIN = umgekehrt. FULL OUTER JOIN = alle Zeilen beider Tabellen."},
{id:60,b:"8.11",t:"Datenbanken",q:"Was ist eine Transaktion in Datenbanken?",o:["Eine Abfrage","Eine Backup-Operation","Gruppe von Datenbankoperationen die als Einheit ausgefuehrt werden: entweder alle erfolgreich (COMMIT) oder alle zurueckgesetzt (ROLLBACK)","Eine einzelne SQL-Abfrage"],a:2,f:"Transaktion: ACID. Atomic: alles oder nichts. Consistent: Integritaet gewahrt. Isolated: Transaktionen stoeren sich nicht. Durable: erfolgreiche Transaktionen bleiben auch nach Absturz."},
{id:61,b:"8.11",t:"Datenbanken",q:"Was ist Kardinalitaet in Datenbanken?",o:["Anzahl der Beziehungen zwischen Entitaeten: 1:1, 1:n (Eins-zu-Viele), m:n (Viele-zu-Viele)","Datenbankgeschwindigkeit","Groesse der Datenbank","Anzahl der Tabellen"],a:0,f:"Kardinalitaet: 1:1 (ein Mitarbeiter hat einen Arbeitsvertrag), 1:n (ein Kunde hat viele Bestellungen), m:n (ein Student hat viele Kurse, ein Kurs hat viele Studenten - Zwischentabelle noetig!)."},
{id:62,b:"8.11",t:"Datenbanken",q:"Was ist eine m:n-Beziehung und wie wird sie umgesetzt?",o:["m:n MUSS durch eine Beziehungstabelle (Verbindungstabelle) aufgeloest werden die die PK beider Tabellen als FK enthaelt","Durch redundante Speicherung","Direkte Verknuepfung in einer Tabelle","Durch doppelte Fremdschluessel"],a:0,f:"m:n: Student - Kurs. Loesung: Einschreibung-Tabelle mit (StudentID FK, KursID FK, Datum). So werden 1:n Beziehungen zu beiden Seiten hergestellt. Beziehungstabelle kann eigene Attribute haben."},
{id:63,b:"8.11",t:"Datenbanken",q:"Was ist ein Index in Datenbanken?",o:["Ein Fremdschluessel","Eine Tabelle","Zusaetzliche Datenstruktur die schnellere Suche in Tabellen ermoeglicht - auf Kosten von Speicher und Schreibgeschwindigkeit","Ein Primaerschluessel"],a:2,f:"Index: wie Buchregister. Beschleunigt SELECT-Abfragen auf bestimmten Spalten. Nachteil: verlangsamt INSERT/UPDATE/DELETE, braucht Speicher. PK und FK werden oft automatisch indiziert."},
{id:64,b:"8.12",t:"ERD",q:"Was ist ein ERD (Entity-Relationship-Diagram)?",o:["Ein Klassendiagramm","Ein Aktivitaetsdiagramm","Ein UML-Diagramm","Grafische Darstellung der Datenbankstruktur: Entitaeten, ihre Attribute und die Beziehungen zwischen Entitaeten (Chen-Notation oder Kraehenfu)"],a:3,f:"ERD: Modellierungswerkzeug fuer Datenbankdesign. Entitaet (Rechteck), Attribut (Oval), Beziehung (Raute), Kardinalitaeten (1, n, m). Chen-Notation vs. Kraehenfuss-Notation."},
{id:65,b:"8.12",t:"ERD",q:"Was ist eine Entitaet im ERD?",o:["Ein Schluessel","Ein eindeutig identifizierbares Objekt der realen Welt das in der Datenbank gespeichert wird (z.B. Kunde, Produkt, Bestellung)","Ein Attribut","Eine Beziehung"],a:1,f:"Entitaet: konkretes oder abstraktes Objekt. Dargestellt als Rechteck. Beispiele: Kunde, Produkt, Mitarbeiter, Abteilung. Entitaetsmenge: alle gleichartigen Entitaeten (alle Kunden)."},
{id:66,b:"8.12",t:"ERD",q:"Was ist ein Attribut im ERD?",o:["Eigenschaft/Merkmal einer Entitaet (z.B. Name, Geburtsdatum, Preis) - dargestellt als Oval","Ein Schluessel","Eine Entitaet","Eine Beziehung"],a:0,f:"Attribut: Eigenschaft einer Entitaet. Im ERD als Oval. Schluesselattribut: unterstrichen (Primaerschluessel). Mehrwertiges Attribut: doppeltes Oval. Abgeleitetes Attribut: gestricheltes Oval."},
{id:67,b:"8.12",t:"ERD",q:"Wie wird eine Beziehung im Chen-ERD dargestellt?",o:["Als Oval","Als Kreis","Als Raute mit Verbindungslinien zu den beteiligten Entitaeten - Kardinalitaeten werden an die Linien geschrieben","Als Rechteck"],a:2,f:"Beziehung (Relationship): Raute mit Beschriftung (z.B. kauft, arbeitet-in). Linien verbinden Raute mit Entitaeten. Kardinalitaeten (1, n, m) stehen an den Verbindungslinien."},
{id:68,b:"8.12",t:"ERD",q:"Was ist eine schwache Entitaet?",o:["Eine Vererbung","Entitaet die nicht selbstaendig existieren kann und zur Identifikation die Existenz einer anderen Entitaet benoetigt - dargestellt mit doppeltem Rechteck","Eine kleine Entitaet","Eine optionale Entitaet"],a:1,f:"Schwache Entitaet: existiert nur in Abhaengigkeit von starker Entitaet. Beispiel: Bestellposition haengt von Bestellung ab. Doppeltes Rechteck im Chen-ERD. Teilschluessel identifiziert innerhalb der starken Entitaet."},
{id:69,b:"8.12",t:"ERD",q:"Was ist Totalpartizipaon (totale Teilnahme)?",o:["JEDE Instanz einer Entitaet muss an der Beziehung teilnehmen (dargestellt durch Doppellinie) - Gegensatz: partielle Teilnahme (optional)","Alle Beziehungen sind 1:1","Keine optionalen Attribute","Alle Attribute sind Schluessel"],a:0,f:"Totalpartizipation (obligatorisch): jede Entitaet MUSS an Beziehung teilnehmen. Doppellinie im ERD. Beispiel: jede Bestellung MUSS einem Kunden zugeordnet sein. Partielle (optionale) Teilnahme: einfache Linie."},
{id:70,b:"8.12",t:"ERD",q:"Was ist Kraehenfu-Notation (Crow's Foot)?",o:["Chen-Notation","Alternative ERD-Notation die Kardinalitaeten durch Symbole (Kraehenfu fuer viele, Strich fuer eins) direkt an den Verbindungslinien zeigt","Eine Tierdarstellung","UML-Klassendiagramm"],a:1,f:"Kraehenfuss: moderner als Chen. Symbole: gerader Strich = genau 1, Kraehenfu = viele, Kreis = 0 (optional), Strich = 1 (obligatorisch). Kombiniert: Kreis+Kraehenfu = 0..n, Strich+Kraehenfu = 1..n."},
{id:71,b:"8.8",t:"UML",q:"Was ist ein Sequenzdiagramm in UML?",o:["Zeigt zeitliche Abfolge von Nachrichten/Aufrufen zwischen Objekten oder Systemen - Interaktionen ueber Zeit","Anwendungsfaelle","Systemstruktur","Klassenstruktur"],a:0,f:"Sequenzdiagramm: X-Achse = Objekte/Akteure, Y-Achse = Zeit (nach unten). Lebenslinie (Dashed Line), Aktivierungsbalken, Nachrichten (Pfeile). Gut fuer API-Aufrufe, Protokolle, Ablaeufe."},
{id:72,b:"8.9",t:"Tests",q:"Was ist ein Mock-Objekt beim Testen?",o:["Simuliertes Ersatzobjekt fuer echte Abhaengigkeiten (Datenbank, API) - ermoeglicht isolierte Tests ohne echte Ressourcen","Ein echtes Objekt","Ein fehlerhaftes Objekt","Ein Test-Report"],a:0,f:"Mock: simuliert Verhalten einer echten Abhaengigkeit. Beispiel: Statt echter Datenbank wird Mock verwendet der festgelegte Daten zurueckgibt. Schnellere, isoliertere Tests. Frameworks: Mockito (Java), unittest.mock (Python)."},
{id:73,b:"8.10",t:"UI/Ergonomie",q:"Was ist ein Design-System?",o:["Ein Wireframe","Eine Designagentur","Sammlung von wiederverwendbaren UI-Komponenten, Richtlinien und Dokumentation die konsistentes Design ueber ein Produkt sicherstellen","Ein UML-Tool"],a:2,f:"Design-System: Komponenten (Button, Modal, Card), Design-Tokens (Farben, Abstande, Schriften), Richtlinien (wie wird Komponente verwendet). Beispiele: Material Design (Google), Ant Design, Bootstrap."},
{id:74,b:"8.11",t:"Datenbanken",q:"Was ist NoSQL?",o:["Eine Abfragesprache","Kein SQL erlaubt","Nicht-relationale Datenbanken fuer unstrukturierte/semistrukturierte Daten: Dokument-DB (MongoDB), Key-Value (Redis), Graph-DB (Neo4j), Spalten-DB (Cassandra)","SQL ohne WHERE"],a:2,f:"NoSQL: Schema-frei oder flexibel, horizontal skalierbar, gut fuer grosse Datenmengen und schnelle Schreiboperationen. Kompromiss: weniger ACID-Garantien. BASE statt ACID."},
{id:75,b:"8.11",t:"Datenbanken",q:"Was sind DDL-Befehle in SQL?",o:["Data Definition Language: CREATE, ALTER, DROP - erstellt, aendert und loescht Datenbankstrukturen (Tabellen, Indizes, Views)","DQL-Befehle","DML-Befehle","DCL-Befehle"],a:0,f:"DDL: CREATE TABLE, ALTER TABLE, DROP TABLE, CREATE INDEX. Aendert Datenbankstruktur, nicht Daten. COMMIT nach DDL automatisch (in den meisten DBMS). Gegensatz: DML (SELECT, INSERT, UPDATE, DELETE)."},
{id:76,b:"8.9",t:"Tests",q:"Was ist ein Testplan?",o:["Dokument das Teststrategie, Testumfang, Ressourcen, Zeitplan und Kriterien fuer die Testaktivitaeten eines Projekts definiert","Ein Testbericht","Ein Test-Framework","Ein Testcode"],a:0,f:"Testplan: was wird getestet (Scope), wer testet (Ressourcen), wie wird getestet (Methoden), wann (Zeitplan), was sind Eingangs-/Ausgangskriterien, welche Tools, wie wird dokumentiert."},
{id:77,b:"8.8",t:"UML",q:"Was ist ein Komponentendiagramm in UML?",o:["Sequenzdiagramm","Zeigt physische Struktur eines Systems: Komponenten (Module, DLLs, Services) und ihre Abhaengigkeiten und Schnittstellen","Aktivitaetsdiagramm","Klassendiagramm"],a:1,f:"Komponentendiagramm: Komponente (Rechteck mit kleinen Rechtecken), bereitgestellte Schnittstellen (Lollipop), benoetigte Schnittstellen (Halbkreis). Gut fuer Systemarchitektur und Deployment."},
{id:78,b:"8.12",t:"ERD",q:"Was ist ein Schluesselattribut im ERD?",o:["Attribut das eine Entitaet eindeutig identifiziert (Primaerschluessel) - im Chen-ERD unterstrichen dargestellt","Ein Pflichtattribut","Ein Fremdschluessel","Jedes Attribut einer Entitaet"],a:0,f:"Schluesselattribut: unterstrichen im ERD (Chen). Identifiziert Entitaet eindeutig. Beispiel: KundenNr, ISBN, Personalausweisnummer. Entspricht dem Primaerschluessel in der Tabelle."},
{id:79,b:"8.11",t:"Datenbanken",q:"Was ist eine View (Sicht) in SQL?",o:["Ein Index","Virtuelle Tabelle basierend auf einer SELECT-Abfrage - vereinfacht komplexe Abfragen und kann Datenzugriffsrechte einschraenken","Eine Tabellenkopie","Eine gespeicherte Prozedur"],a:1,f:"View: CREATE VIEW kundeninfo AS SELECT name, email FROM kunden WHERE aktiv=1. Sieht aus wie Tabelle, ist aber gespeicherte Abfrage. Aktuell: Daten kommen aus Basistabellen. Sicherheit: nur bestimmte Spalten zeigen."},
{id:80,b:"8.9",t:"Tests",q:"Was ist ein Penetrationstest?",o:["Benutzertest","Leistungstest","Funktionstest","Sicherheitstest: autorisierter Angriff auf System um Sicherheitsluecken zu finden bevor echte Angreifer es tun"],a:3,f:"Pentest: ethisches Hacking. White-Box (Kenntnis der Systeme), Black-Box (nur IP/URL bekannt). Phasen: Aufklaerung, Scanning, Exploitation, Reporting. Tools: Metasploit, Burp Suite, nmap."},
{id:81,b:"8.10",t:"UI/Ergonomie",q:"Was ist das Gesetz von Fitts in der UI-Gestaltung?",o:["Farben sollten kontrastreich sein","Keine Relevanz fuer UI","Text sollte lesbar sein","Grossere und naehere Ziele sind schneller zu treffen - wichtige Buttons sollten gross und gut erreichbar sein"],a:3,f:"Fittssches Gesetz: Zeit = a + b * log2(2D/W). D = Distanz, W = Breite des Ziels. Konsequenz: haeufig genutzter Button gross und nah an Mausposition. Ecken/Raender sind durch Mausbremse gut erreichbar."},
{id:82,b:"8.11",t:"Datenbanken",q:"Was ist eine gespeicherte Prozedur (Stored Procedure)?",o:["Eine Transaktion","In der Datenbank gespeicherte, aufrufbare Funktion die SQL-Befehle kapselt und wiederverwenden laesst","Eine View","Ein Index"],a:1,f:"Stored Procedure: in der DB gespeicherter SQL-Code. Vorteil: Wiederverwendung, bessere Performance (kompiliert), Sicherheit (nur Prozeduraufruf moeglich, kein direkter Tabellenaccess). Nachteil: an DBMS gebunden."},
{id:83,b:"8.12",t:"ERD",q:"Was ist der Unterschied zwischen ERD und Klassendiagramm?",o:["Klassendiagramm ist aelter","ERD: modelliert Datenbankstruktur (Entitaeten, Attribute, Beziehungen). Klassendiagramm: modelliert OOP-Struktur (Klassen, Methoden, Vererbung)","ERD ist groesser","Identisch"],a:1,f:"ERD: Datenperspektive, Fokus auf Daten und Beziehungen, fuer Datenbankdesign. Klassendiagramm: Softwareperspektive, Fokus auf Klassen mit Methoden, fuer OOP-Design. Aehnliche Elemente, verschiedene Zwecke."},
{id:84,b:"8.8",t:"UML",q:"Was ist Multiplizitaet im Klassendiagramm?",o:["Anzahl der Methoden","Anzahl der Attribute","Angabe wie viele Instanzen an einer Assoziation beteiligt sind (z.B. 1, 0..1, *, 1..*) - entspricht Kardinalitaet im ERD","Vererbungstiefe"],a:2,f:"Multiplizitaet: 1 = genau eine, 0..1 = null oder eine, * = beliebig viele, 1..* = eine oder mehr. An Enden von Assoziationslinien. Entspricht Kardinalitaet im Datenbankkontext."},
{id:85,b:"8.9",t:"Tests",q:"Was ist Continuous Testing?",o:["Automatisierte Tests die bei jedem Code-Commit ausgefuehrt werden (Teil von CI/CD) - sofortiges Feedback ueber Qualitaet","Manuelle Tests immer wieder","Abnahmetests","Testplanung"],a:0,f:"Continuous Testing: Tests laufen automatisch bei jedem Commit. Sofortiges Feedback. Teil der CI-Pipeline: commit -> build -> unit tests -> integration tests -> deployment. Fehler frueh erkennen."},
{id:86,b:"8.10",t:"UI/Ergonomie",q:"Was ist ein Heuristik-Review nach Nielsen?",o:["Ein Lasttest","Ein Benutzertest","Expertenbewertung der Usability anhand von 10 Heuristiken (z.B. Sichtbarkeit des Systemstatus, Fehlerpraevention, Konsistenz)","Ein Code-Review"],a:2,f:"Nielsen Heuristiken: 1. Systemstatus sichtbar 2. Realitaet entsprechen 3. Benutzerkontrolle 4. Konsistenz 5. Fehlerpraeevention 6. Erkennen statt Erinnern 7. Flexibilitaet 8. Minimales Design 9. Fehlerbehandlung 10. Hilfe."},
{id:87,b:"8.11",t:"Datenbanken",q:"Was bedeutet ACID?",o:["Ein Datenbanktyp","Transaktionseigenschaften: Atomicity (alles oder nichts), Consistency (Integritaet gewahrt), Isolation (Transaktionen unabhaengig), Durability (Ergebnis dauerhaft)","Ein SQL-Befehl","Ein Sicherheitsstandard"],a:1,f:"ACID: Atomicity (Transaktion ganz oder gar nicht), Consistency (Datenbank bleibt konsistent), Isolation (parallele Transaktionen stören sich nicht), Durability (committe Daten bleiben auch nach Absturz)."},
{id:88,b:"8.12",t:"ERD",q:"Was ist ein abgeleitetes Attribut im ERD?",o:["Attribut das aus anderen Attributen berechnet werden kann - im ERD als gestricheltes Oval dargestellt (z.B. Alter aus Geburtsdatum)","Ein Schluessel","Ein Fremdschluessel","Ein Pflichtattribut"],a:0,f:"Abgeleitetes Attribut: wird nicht gespeichert, sondern berechnet. Alter = aktuelles Datum - Geburtsdatum. Gestricheltes Oval im Chen-ERD. In Datenbank: besser als berechnete Spalte oder View realisieren."},
{id:89,b:"8.9",t:"Tests",q:"Was ist Exploratory Testing?",o:["Nicht-skriptgesteuertes Testen: Tester erkundet das System frei und verwendet Erfahrung und Intuition um Fehler zu finden","Strukturierter Testplan","Leistungstest","Automatisiertes Testen"],a:0,f:"Exploratory Testing: kein vordefinierter Testplan. Tester erkundet System, notiert interessante Stellen, folgt Intuition. Gut zum Entdecken von Randfaellen die skriptgesteuerte Tests uebersehen."},
{id:90,b:"8.11",t:"Datenbanken",q:"Was ist SQL GROUP BY?",o:["Tabellen verknuepfen","Daten sortieren","Daten filtern","Ergebnisse nach gleichen Werten gruppieren und Aggregatfunktionen (COUNT, SUM, AVG, MAX, MIN) anwenden"],a:3,f:"GROUP BY: SELECT abteilung, COUNT(*) FROM mitarbeiter GROUP BY abteilung. Alle gleichen abteilung-Werte werden zusammengefasst. HAVING filtert Gruppen (wie WHERE fuer Gruppen)."},
{id:91,b:"8.8",t:"UML",q:"Was ist der Unterschied zwischen Aktivitaets- und Sequenzdiagramm?",o:["Aktivitaet zeigt Klassen","Aktivitaet: zeigt ABLAUF von Aktionen (Workflow, Algorithmus). Sequenz: zeigt INTERAKTION zwischen Objekten/Systemen ueber Zeit (Nachrichten-Austausch)","Sequenz ist aelter","Kein Unterschied"],a:1,f:"Aktivitaet: Flussdiagramm-aehnlich, zeigt Kontrollfluss und parallele Aktionen. Sequenz: zeigt konkret welche Objekte miteinander in welcher Reihenfolge kommunizieren (API-Aufrufe, Methodenaufruf-Ketten)."},
{id:92,b:"8.10",t:"UI/Ergonomie",q:"Was ist Dark Mode / Light Mode aus Ergonomiesicht?",o:["Anpassung der Farbgebung an Umgebungslicht und Benutzerpraeferenz - Dark Mode schont Augen bei Dunkelheit, Light Mode bei hellem Umfeld","Nur ein Trend","Nur Performance","Nur Aesthetik"],a:0,f:"Dark/Light Mode: Nutzer sollte waehlen koennen. Dark Mode: weniger Blaulicht, Strom sparen (OLED), Augen bei Dunkelheit. Light Mode: besser lesbar bei Tageslicht. System-Praeferenz erkennen und umsetzen."},
{id:93,b:"8.11",t:"Datenbanken",q:"Was ist ein Datenbankschema?",o:["Eine Abfrage","Ein Index","Die logische Struktur einer Datenbank: welche Tabellen, welche Spalten, welche Datentypen, welche Constraints, welche Beziehungen","Ein Backup"],a:2,f:"Datenbankschema: Blaupause der Datenbank. Tabellennamen, Spalten mit Datentypen, PK, FK, Constraints (NOT NULL, UNIQUE, CHECK). Wird mit DDL erstellt. ERD ist das visuelle Schema."},
{id:94,b:"8.12",t:"ERD",q:"Was ist ein mehrwertiges Attribut im ERD?",o:["Ein Schluessel","Ein Attribut mit grossem Wert","Ein abgeleitetes Attribut","Attribut das mehrere Werte annehmen kann (z.B. Telefonnummern einer Person) - im Chen-ERD als doppeltes Oval dargestellt"],a:3,f:"Mehrwertiges Attribut: doppeltes Oval im Chen-ERD. Beispiel: Telefonnummern (kann mehrere geben). Besser: eigene Tabelle erstellen (Normalisierung!) statt mehrwertige Attribute zu verwenden."},
{id:95,b:"8.9",t:"Tests",q:"Was ist eine Testautomatisierung?",o:["Testplanung","Manuelle Tests","Automatisiertes Ausfuehren von Tests durch Software - reproduzierbar, schnell, nicht muede, fuer CI/CD unbedingt noetig","Test-Dokumentation"],a:2,f:"Testautomatisierung: Tests einmal schreiben, beliebig oft ausfuehren. Tools: Selenium (Web-UI), JUnit/pytest (Unit), RestAssured (API), Appium (Mobile). Investition lohnt sich bei regelmaessiger Ausfuehrung."},
{id:96,b:"8.8",t:"UML",q:"Was ist eine Schnittstelle (Interface) im Klassendiagramm?",o:["Eine Klasse","Eine Vererbung","Ein abstraktes Attribut","Mit <<interface>> markierter Typ der nur Methodensignaturen definiert - implementierende Klassen muessen alle Methoden realisieren"],a:3,f:"Interface im Klassendiagramm: Klasse mit <<interface>> Stereotyp. Implementierung durch gestrichelte Linie mit hohlem Dreieck. Klasse implements Interface = gestrichelter Pfeil zur Interface-Klasse."},
{id:97,b:"8.11",t:"Datenbanken",q:"Was ist ein Trigger in Datenbanken?",o:["Ein Index","Ein Fehler","Automatisch ausgefuehrte Aktion die bei bestimmten DB-Ereignissen (INSERT, UPDATE, DELETE) ausgeloest wird - fuer automatische Konsistenzpruefungen","Ein Backup-Mechanismus"],a:2,f:"Trigger: BEFORE/AFTER INSERT, UPDATE, DELETE. Beispiel: Trigger nach UPDATE von Bestellung -> Status-Aenderung in Log-Tabelle schreiben. Vorteil: Automatismus. Nachteil: Komplexitaet, schwer zu debuggen."},
{id:98,b:"8.10",t:"UI/Ergonomie",q:"Was ist ein Wireframe in der UI-Entwicklung?",o:["Ein Metall-Rahmen","Ein Prototyp","Schematische Skizze einer Benutzeroberflaeche ohne Design - zeigt Struktur, Platzierung von Elementen und Navigation fuer fruehes Feedback","Ein ferties Design"],a:2,f:"Wireframe: Grob-Skizze (Strichmennchen-Level). Zeigt Layout ohne Farben/Design. Schnell und guenstig zu aendern. Varianten: Lo-Fi (Papier/Bleistift), Hi-Fi (Figma, Adobe XD). Vor dem eigentlichen Design."},
{id:99,b:"8.12",t:"ERD",q:"Welche Schritte gibt es bei der Datenbank-Modellierung?",o:["1. Konzeptuelles Modell (ERD), 2. Logisches Modell (Normalisierung, Tabellen), 3. Physisches Modell (DBMS-spezifisch, Indizes, Performance)","Nur Tabellen erstellen","Direkt Tabellen erstellen","Nur ERD erstellen"],a:0,f:"Datenbankdesign-Phasen: Konzeptuell (ERD, unabhaengig von DBMS), Logisch (Tabellenschemata, Normalisierung, SQL-Tabellen), Physisch (Indexe, Partitionierung, DBMS-spezifische Optimierungen)."},
{id:100,b:"8.11",t:"Datenbanken",q:"Was ist SQL HAVING?",o:["Filtert Ergebnisse NACH GROUP BY - wie WHERE aber fuer Gruppen/Aggregate (z.B. nur Abteilungen mit mehr als 5 Mitarbeitern)","Wie WHERE fuer Zeilen","Ein Join-Typ","Ein Sortierbefehl"],a:0,f:"HAVING: SELECT abteilung, COUNT(*) FROM mitarbeiter GROUP BY abteilung HAVING COUNT(*) > 5. WHERE filtert Zeilen vor Gruppierung. HAVING filtert Gruppen nach Aggregation."}
];
let st={},filt=[...Q];
function init(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});render();}
function render(){
  const c=document.getElementById("qc");c.innerHTML="";
  let lb=null;
  const bn={"8.6":"📜 8.6 Skriptsprachen","8.7":"📝 8.7 Pseudocode","8.8":"📐 8.8 UML-Diagramme","8.9":"🧪 8.9 Tests","8.10":"🖥️ 8.10 UI & Ergonomie","8.11":"🗄️ 8.11 Relationale Datenbanken","8.12":"🔗 8.12 ERD Chen-Notation"};
  filt.forEach(q=>{
    if(q.b!==lb){const d=document.createElement("div");d.className="bh";d.textContent=bn[q.b]||q.b;c.appendChild(d);lb=q.b;}
    c.appendChild(mk(q));
  });up();}
function mk(q){
  const s=st[q.id],d=document.createElement("div"),L=["A","B","C","D"];
  d.className="qc"+(s.done?(s.ok?" ac":" aw"):"");d.id="c"+q.id;
  d.innerHTML=`<div class="qn">FRAGE ${q.id}/100</div><div class="qt">${q.t}</div><div class="qq">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt${s.done?" dis":""}${s.done&&i===q.a?" ok":""}${s.done&&!s.ok&&i===s.ci?" ng":""}" onclick="ans(${q.id},${i})"><span class="ol">${L[i]}</span><span>${o}</span></div>`).join("")}</div>
<div class="fbb${s.done?" show "+(s.ok?"cok":"cng"):""}" id="f${q.id}">${s.done?(s.ok?"✅ ":"❌ ")+q.f:""}</div>`;
  return d;}
function ans(id,i){
  const s=st[id];if(s.done)return;
  const q=Q.find(x=>x.id===id);s.done=true;s.ok=i===q.a;s.ci=i;
  const c=document.getElementById("c"+id);c.className="qc "+(s.ok?"ac":"aw");
  c.querySelectorAll(".opt").forEach((el,j)=>{el.classList.add("dis");if(j===q.a)el.classList.add("ok");if(!s.ok&&j===i)el.classList.add("ng");});
  const f=document.getElementById("f"+id);f.textContent=(s.ok?"✅ ":"❌ ")+q.f;f.className="fbb show "+(s.ok?"cok":"cng");up();}
function up(){
  const tot=Q.length,done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  document.getElementById("sd").textContent=ok+"/"+done;
  document.getElementById("pf").style.width=(done/tot*100)+"%";
  document.getElementById("pl").textContent=done+" von "+tot+" beantwortet";}
function fil(t,btn){
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("act"));btn.classList.add("act");
  if(t==="all")filt=[...Q];
  else if(t==="open")filt=Q.filter(q=>!st[q.id].done);
  else if(t==="wrong")filt=Q.filter(q=>st[q.id].done&&!st[q.id].ok);
  else filt=Q.filter(q=>q.b===t);render();}
function shuf(){filt=[...filt].sort(()=>Math.random()-.5);render();}
function rst(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});filt=[...Q];document.querySelectorAll(".fb").forEach((b,i)=>b.classList.toggle("act",i===0));render();document.getElementById("ov").classList.remove("show");}
function showR(){
  const done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  const pct=done>0?Math.round(ok/done*100):0;
  let e="😅",m="Weiter ueben!";
  if(pct>=90){e="🏆";m="Ausgezeichnet!";}else if(pct>=75){e="🎉";m="Sehr gut!";}else if(pct>=60){e="📚";m="Gut - weiter so!";}
  document.getElementById("oe").textContent=e;document.getElementById("os").textContent=ok+"/"+done;
  document.getElementById("om").textContent=pct+"% richtig - "+m;
  document.getElementById("ov").classList.add("show");}
function closeR(){document.getElementById("ov").classList.remove("show");}
init();
</script></body></html>
