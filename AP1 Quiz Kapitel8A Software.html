<script>
const Q=[
{id:1,b:"8.1",t:"Variablen",q:"Was ist eine Variable?",o:["Ein Kommentar","Eine Funktion","Ein benannter Speicherplatz mit Datentyp und Wert der sich aendern kann","Ein Befehl"],a:2,f:"Variable: Name + Datentyp + Wert. Beispiel: int alter = 25; Name=alter, Typ=int, Wert=25. Wert kann sich waehrend Programmausfuehrung aendern."},
{id:2,b:"8.1",t:"Datentypen",q:"Was ist der Datentyp int?",o:["Ganze Zahlen ohne Dezimalstellen (z.B. 1, -5, 100)","Einzelne Zeichen","Kommazahlen","Wahrheitswerte"],a:0,f:"int (Integer): ganze Zahlen. In den meisten Sprachen 32-Bit: -2.147.483.648 bis 2.147.483.647. Fuer groessere Zahlen: long (64-Bit)."},
{id:3,b:"8.1",t:"Datentypen",q:"Was ist der Datentyp float?",o:["Ganze Zahlen","Texte","Wahrheitswerte","Gleitkommazahlen mit Dezimalstellen (z.B. 3.14, -0.5)"],a:3,f:"float: Gleitkommazahlen (Fliesskommazahlen). Beispiele: 3.14, -0.5, 2.0. Achtung: Rundungsfehler moeglich! Fuer hoehere Praezision: double (doppelte Genauigkeit)."},
{id:4,b:"8.1",t:"Datentypen",q:"Was ist der Datentyp bool?",o:["Boolescher Wahrheitswert: nur true oder false","Ein Zeichen","Eine Zeichenkette","Eine Zahl"],a:0,f:"bool (Boolean): nur zwei Werte - true (wahr) oder false (falsch). Verwendet fuer Bedingungen, Flags, Zustande. Benannt nach Mathematiker George Boole."},
{id:5,b:"8.1",t:"Datentypen",q:"Was ist der Datentyp char?",o:["Ein Wahrheitswert","Einzelnes Zeichen (z.B. 'a', 'A', '!')","Eine Zeichenkette","Eine Zahl"],a:1,f:"char (Character): ein einzelnes Zeichen. In einfachen Anfuehrungszeichen: 'a', 'Z', '5', '!'. Intern als Zahl gespeichert (ASCII/Unicode). Beispiel: 'A' = 65."},
{id:6,b:"8.1",t:"Datentypen",q:"Was ist der Datentyp string?",o:["Ein Zeichen","Eine ganze Zahl","Zeichenkette: Folge von Zeichen (z.B. Hallo, Welt)","Ein Wahrheitswert"],a:2,f:"String: Zeichenkette, Folge von chars. In doppelten Anführungszeichen: \"Hallo\". Methoden: Laenge, Suchen, Ersetzen, Zusammenfuegen (Konkatenation)."},
{id:7,b:"8.1",t:"Datentypen",q:"Was ist der Unterschied zwischen float und double?",o:["float ist genauer","double ist ganzzahlig","double hat doppelte Praezision (64-Bit) gegenueber float (32-Bit) - weniger Rundungsfehler","Kein Unterschied"],a:2,f:"float: 32-Bit, ca. 7 signifikante Stellen. double: 64-Bit, ca. 15 signifikante Stellen. Fuer Finanzberechnungen: weder float noch double, sondern Decimal/BigDecimal verwenden."},
{id:8,b:"8.1",t:"Datenstrukturen",q:"Was ist ein Array?",o:["Eine Funktion","Sammlung von Werten desselben Datentyps mit festgelegter Groesse, zugaenglich ueber Index (z.B. zahlen[0])","Eine Klasse","Ein Schleifen-Typ"],a:1,f:"Array: feste Anzahl von Elementen gleichen Typs. Zugriff per Index (beginnt bei 0). zahlen[0] = erstes Element. Groesse meist fix bei Erstellung. Effizient fuer direkten Zugriff."},
{id:9,b:"8.1",t:"Datenstrukturen",q:"Was ist ein Stack?",o:["Eine Warteschlange","Eine Liste","Ein Baum","LIFO-Datenstruktur: Last In First Out - zuletzt hinzugefuegtes Element wird zuerst entfernt"],a:3,f:"Stack (Stapel): LIFO (Last In First Out). push() = oben drauflegen, pop() = oberstes entfernen, peek() = oberstes ansehen. Beispiel: Rueckgaengig-Funktion, Funktionsaufruf-Stack."},
{id:10,b:"8.1",t:"Datenstrukturen",q:"Was ist eine Queue?",o:["Ein Baum","Ein Stapel","Eine Hash-Tabelle","FIFO-Datenstruktur: First In First Out - zuerst hinzugefuegtes Element wird zuerst entfernt"],a:3,f:"Queue (Warteschlange): FIFO (First In First Out). enqueue() = hinten anstellen, dequeue() = vorne entfernen. Beispiel: Druckerwarteschlange, Aufgabenverwaltung."},
{id:11,b:"8.1",t:"Datenstrukturen",q:"Was ist eine verknuepfte Liste (Linked List)?",o:["Ein Array","Liste wo jedes Element einen Zeiger auf das naechste Element enthaelt - flexible Groesse, kein direkter Index-Zugriff","Ein Stack","Eine Queue"],a:1,f:"Linked List: Knoten mit Datenwert und Zeiger auf naechsten Knoten. Vorteil: flexibel in der Groesse, einfaches Einfuegen/Loeschen. Nachteil: kein direkter Zugriff per Index, mehr Speicher."},
{id:12,b:"8.1",t:"Datenstrukturen",q:"Was ist eine Hash-Tabelle?",o:["Ein Baum","Eine sortierte Liste","Datenstruktur mit Schluessel-Wert-Paaren: Schuessel wird per Hash-Funktion in Index umgewandelt - sehr schneller Zugriff O(1)","Ein Stack"],a:2,f:"Hash-Tabelle (Dictionary/Map): Schluessel -> Hashfunktion -> Index -> Wert. Sehr schnell (O(1) durchschnittlich). Beispiel: Python dict, Java HashMap. Problem: Hash-Kollisionen."},
{id:13,b:"8.1",t:"Datenstrukturen",q:"Was ist der Unterschied zwischen Stack und Queue?",o:["Stack ist groesser","Kein Unterschied","Stack: LIFO (letztes rein, erstes raus). Queue: FIFO (erstes rein, erstes raus)","Queue ist schneller"],a:2,f:"Stack: LIFO - wie ein Stapel Teller. Queue: FIFO - wie eine Warteschlange. Beide wichtige abstrakte Datenstrukturen mit unterschiedlichen Anwendungsfeldern."},
{id:14,b:"8.1",t:"Datenstrukturen",q:"Was ist eine Struct?",o:["Ein Array","Eine Funktion","Sammlung von Variablen verschiedener Datentypen die zusammen eine logische Einheit bilden - kein vollstaendiges OOP wie Klasse","Eine Klasse mit Methoden"],a:2,f:"Struct (Structure): fasst verschiedene Datentypen zu einer Einheit zusammen. Beispiel: struct Person { string name; int alter; }. In OOP-Sprachen oft durch Klassen ersetzt."},
{id:15,b:"8.1",t:"Variablen",q:"Was ist eine Konstante?",o:["Ein Datentyp","Eine Variable die sich aendert","Ein Wert der einmal festgelegt wird und sich nie aendert (z.B. const PI = 3.14159)","Eine Funktion"],a:2,f:"Konstante: unveraendlicher Wert. Deklaration: const (JS), final (Java), readonly (C#). Beispiele: PI, MAX_SIZE, STEUERSATZ. Verhindert versehentliche Aenderung wichtiger Werte."},
{id:16,b:"8.1",t:"Variablen",q:"Was ist Typsicherheit (Type Safety)?",o:["Speichersicherheit","Verschluesselung von Daten","Eigenschaft einer Sprache: Compiler prüft ob Operationen auf Variablen typkonform sind und verhindert falsche Zuweisungen","Datenbankintegrität"],a:2,f:"Typsicherheit: stark typisierte Sprachen (Java, C#) pruefen Typen beim Kompilieren. Schwach typisierte (JS, Python) pruefen erst zur Laufzeit. Typsicherheit verhindert ganze Klassen von Fehlern."},
{id:17,b:"8.1",t:"Datentypen",q:"Was ist Typkonvertierung (Type Casting)?",o:["Datenkopie","Typdeklaration","Daten loeschen","Umwandlung eines Wertes von einem Datentyp in einen anderen (z.B. int in float oder float in int)"],a:3,f:"Typkonvertierung: implizit (automatisch: int -> float ohne Verlust) oder explizit (manuell: (int)3.9 = 3, Datenverlust!). Achtung: explizites Casting kann Daten veraendern oder verlieren."},
{id:18,b:"8.1",t:"Datenstrukturen",q:"Was ist der Unterschied zwischen Array und Liste?",o:["Array ist flexibler","Kein Unterschied","Liste ist schneller","Array: feste Groesse, direkter Indexzugriff, homogene Typen. Liste (z.B. ArrayList): dynamische Groesse, kann wachsen/schrumpfen"],a:3,f:"Array: statisch, schneller Indexzugriff, feste Groesse. ArrayList/List: dynamisch wächst automatisch, flexibler, aber etwas mehr Overhead. Fuer unbekannte Mengen: Liste bevorzugen."},
{id:19,b:"8.1",t:"Variablen",q:"Was ist der Scope (Gueltigkeitsbereich) einer Variable?",o:["Name der Variablen","Datentyp der Variablen","Bereich im Code in dem eine Variable sichtbar und verwendbar ist (lokal in einer Funktion vs. global im gesamten Programm)","Wert der Variablen"],a:2,f:"Scope: lokale Variable (nur in ihrer Funktion/Block sichtbar), globale Variable (im gesamten Programm). Lokale Variablen bevorzugen fuer bessere Wartbarkeit und Vermeidung von Seiteneffekten."},
{id:20,b:"8.1",t:"Variablen",q:"Was ist eine Deklaration vs. Initialisierung?",o:["Deklaration: Variable wird bekannt gemacht (int x). Initialisierung: Variable bekommt ersten Wert (x = 5). Oft kombiniert: int x = 5","Nur in C noetig","Identisch","Initialisierung kommt immer zuerst"],a:0,f:"Deklaration: int x; (Variable existiert, hat noch keinen Wert). Initialisierung: x = 5; (erster Wert wird gesetzt). Kombination: int x = 5; Uninitialisierte Variablen fuehren zu Fehlern."},
{id:21,b:"8.2",t:"Kontrollstrukturen",q:"Was ist eine Folgestruktur?",o:["Eine Bedingung","Eine Funktion","Eine Schleife","Sequenzielle Ausfuehrung von Anweisungen in der Reihenfolge in der sie geschrieben sind - von oben nach unten"],a:3,f:"Folgestruktur: einfachste Kontrollstruktur. Anweisungen werden der Reihe nach ausgefuehrt. Kein Sprung, keine Wiederholung. Beispiel: einlesen, berechnen, ausgeben."},
{id:22,b:"8.2",t:"Kontrollstrukturen",q:"Was ist eine if-else-Struktur?",o:["Eine Schleife","Eine Folge","Eine Funktion","Zweiseitige Auswahl: wenn Bedingung wahr -> Block A, sonst -> Block B"],a:3,f:"If-else: if(bedingung) { Block A } else { Block B }. Genau ein Pfad wird ausgefuehrt. Bedingung ist ein bool-Ausdruck. Ohne else: einseitige Auswahl (nur wenn wahr)."},
{id:23,b:"8.2",t:"Kontrollstrukturen",q:"Was ist ein switch-case?",o:["Eine Funktion","Eine Schleife","Eine Schleife","Fallunterscheidung: ein Ausdruck wird mit mehreren Werten verglichen - effizienter als viele if-else-if-Ketten bei bekannten Werten"],a:3,f:"Switch/Case: switch(variable) { case Wert1: ...; break; case Wert2: ...; break; default: ... }. Ohne break: Durchfall (Fall-through) zum naechsten Case. Default: kein passender Case."},
{id:24,b:"8.2",t:"Kontrollstrukturen",q:"Was ist eine for-Schleife?",o:["Fussgesteuerte Schleife","Kopfgesteuerte offene Schleife","Endlosschleife","Zaehlergesteuerte Schleife mit bekannter Anzahl von Durchlaeufen (for i = 0; i < 10; i++)"],a:3,f:"For-Schleife: Initialisierung; Bedingung; Inkrement. for(int i=0; i<10; i++) { ... }. Laeuft genau 10 Mal (i=0..9). Ideal wenn Anzahl der Durchlaufe bekannt ist."},
{id:25,b:"8.2",t:"Kontrollstrukturen",q:"Was ist eine while-Schleife?",o:["Schleife mit festem Ende","Zaehlergesteuerte Schleife","Kopfgesteuerte Schleife: Bedingung wird VOR jedem Durchlauf geprueft - Schleife laeuft solange Bedingung wahr ist","Fussgesteuerte Schleife"],a:2,f:"While: while(bedingung) { ... }. Bedingung am Anfang geprueft. Wenn Bedingung von Anfang falsch: Schleife laeuft 0 Mal. Verwendet wenn Anzahl der Durchlaufe unbekannt."},
{id:26,b:"8.2",t:"Kontrollstrukturen",q:"Was ist eine do-while-Schleife?",o:["Kopfgesteuerte Schleife","Schleife mit festem Ende","Fussgesteuerte Schleife: Anweisungen werden MINDESTENS EINMAL ausgefuehrt, dann Bedingung geprueft","Zaehlergesteuerte Schleife"],a:2,f:"Do-while: do { ... } while(bedingung). Anweisung laeuft mindestens einmal, dann wird geprueft ob weiter. Beispiel: Benutzereingabe einlesen und pruefen - muss mindestens einmal eingelesen werden."},
{id:27,b:"8.2",t:"Kontrollstrukturen",q:"Was ist der Unterschied zwischen while und do-while?",o:["Kein Unterschied","while prueft Bedingung VORHER (0 Mal moeglich). do-while prueft DANACH (mindestens 1 Mal garantiert)","do-while ist schneller","while ist moderner"],a:1,f:"while: Bedingung zuerst, kann 0 Mal laufen. do-while: Aktion zuerst, dann Bedingung - garantiert mindestens eine Ausfuehrung. do-while fuer Pflichtdurchlaeufe (z.B. Menu zeigen bis gueltige Eingabe)."},
{id:28,b:"8.2",t:"Kontrollstrukturen",q:"Was ist eine Endlosschleife?",o:["Eine do-while-Schleife","Schleife deren Abbruchbedingung nie erreicht wird - fuehrt zu eingefrorenen Programmen (haeufiger Programmierfehler)","Eine for-Schleife","Eine sehr lange Schleife"],a:1,f:"Endlosschleife: while(true) { } oder for(;;). Absichtlich: Server-Loop, Betriebssystem-Kern. Unabsichtlich: Programmierfehler, Bedingung aendert sich nie. Erkennung: Programm reagiert nicht mehr."},
{id:29,b:"8.2",t:"Kontrollstrukturen",q:"Was macht break in einer Schleife?",o:["Neustart der Schleife","Ueberspringt eine Iteration","Verlaeesst sofort die Schleife (oder switch), Programmausfuehrung springt zur naechsten Anweisung nach der Schleife","Pause der Schleife"],a:2,f:"break: sofortiger Ausstieg aus Schleife oder switch. Verwendung: Suchschleife (gefunden -> break), Fehlerbehandlung. Nur die innerste Schleife wird verlassen."},
{id:30,b:"8.2",t:"Kontrollstrukturen",q:"Was macht continue in einer Schleife?",o:["Beendet die Schleife","Neustart der Schleife","Pause","Ueberspringt den Rest der aktuellen Iteration und springt zum naechsten Schleifendurchlauf"],a:3,f:"continue: aktuellen Durchlauf abbrechen, aber Schleife laeuft weiter. Beispiel: for(i=0..10) { if(i==5) continue; ... } = i=5 wird uebersprungen, alle anderen werden ausgefuehrt."},
{id:31,b:"8.2",t:"Kontrollstrukturen",q:"Was ist eine foreach-Schleife?",o:["Eine Bedingungsschleife","Eine Endlosschleife","Eine Zaehler-Schleife","Schleife die nacheinander alle Elemente einer Sammlung (Array, Liste) durchlaeuft ohne Index-Verwaltung"],a:3,f:"foreach/for-each: for(Typ element : sammlung) { ... }. Kein Index noetig, kein Zaehler. Lesbar und fehlerarm. Nachteil: kein direkter Indexzugriff, kann sammlung nicht veraendern."},
{id:32,b:"8.2",t:"Kontrollstrukturen",q:"Was ist Pseudocode?",o:["Ein Diagramm","Ein Testverfahren","Sprachunabhaengige strukturierte Beschreibung eines Algorithmus in verstaendlichem Text - kein ausfuehrbarer Code","Eine Programmiersprache"],a:2,f:"Pseudocode: formlose Beschreibung des Algorithmus. Menschenlesbar, sprachunabhaengig. Hilft bei Algorithmus-Design vor der Implementierung. IF Bedingung THEN Anweisung END IF."},
{id:33,b:"8.2",t:"Kontrollstrukturen",q:"Was ist ein if-else-if-Konstrukt?",o:["Eine Folgestruktur","Mehrstufige Auswahl: erste zutreffende Bedingung wird ausgefuehrt, Rest ignoriert (auch: else-if, elif)","Eine switch-Anweisung","Eine Schleife"],a:1,f:"If-else-if: if(B1) { } else if(B2) { } else if(B3) { } else { }. Nur EINE Bedingung wird ausgefuehrt - die erste zutreffende. Wichtig: Reihenfolge der Bedingungen beachten."},
{id:34,b:"8.2",t:"Kontrollstrukturen",q:"Was ist eine bedingte Zuweisung (ternarer Operator)?",o:["Eine Funktion","Eine if-Anweisung","Kurzschreibweise: ergebnis = (bedingung) ? wert_wenn_wahr : wert_wenn_falsch","Eine Schleife"],a:2,f:"Ternaerer Operator: x = (a > b) ? a : b; = wenn a > b dann x=a, sonst x=b. Kompakt aber kann unleserlich werden. Fuer einfache Zuweisungen geeignet."},
{id:35,b:"8.2",t:"Kontrollstrukturen",q:"Was ist Schachtelung (Nesting) von Kontrollstrukturen?",o:["Gleichzeitige Ausfuehrung","Kontrollstrukturen innerhalb anderer: Schleife in Schleife, if in Schleife etc. - erhoeht Komplexitaet","Mehrere Variablen","Mehrere Funktionen"],a:1,f:"Nesting: Schleife in Schleife (n x m Durchlaeufe), if in Schleife, if in if. Tiefes Nesting vermeiden (max. 3 Ebenen): schlechte Lesbarkeit, hoehere Fehleranfaelligkeit."},
{id:36,b:"8.3",t:"Funktionen",q:"Was ist eine Funktion?",o:["Benannter, wiederverwendbarer Codeblock der eine bestimmte Aufgabe ausfuehrt und ggf. Werte uebergeben bekommt und zurueckgibt","Eine Variable","Eine Schleife","Ein Datentyp"],a:0,f:"Funktion (Methode/Prozedur): DRY-Prinzip (Don't Repeat Yourself). Einmal definieren, mehrfach aufrufen. Vorteile: Wiederverwendung, Lesbarkeit, Testbarkeit, Wartbarkeit."},
{id:37,b:"8.3",t:"Funktionen",q:"Was ist eine einfache Funktion (ohne Parameter und Rueckgabe)?",o:["Funktion die nur Code ausfuehrt ohne Eingabe zu erwarten und ohne Ergebnis zurueckzugeben (void)","Methode einer Klasse","Funktion mit Return-Wert","Rekursive Funktion"],a:0,f:"Einfache Funktion (void, keine Parameter): void sagHallo() { print(Hallo); }. Kein Input, kein Output. Typisch fuer Aktionen wie drucken, initialisieren, Bildschirm loeschen."},
{id:38,b:"8.3",t:"Funktionen",q:"Was ist ein Rueckgabewert?",o:["Eine globale Variable","Wert den eine Funktion nach ihrer Ausfuehrung an den Aufrufer zurueckliefert (return-Anweisung)","Ein Parameter","Eine Endlosschleife"],a:1,f:"Return-Wert: Funktion berechnet Ergebnis und gibt es mit return zurueck. int addiere(int a, int b) { return a + b; }. Aufruf: int summe = addiere(3, 5); summe = 8."},
{id:39,b:"8.3",t:"Funktionen",q:"Was ist Call-by-Value?",o:["Objekt uebergeben","Adresse uebergeben","Referenz uebergeben","Eine Kopie des Wertes wird uebergeben - Original bleibt unveraendert, Funktion arbeitet mit Kopie"],a:3,f:"Call-by-Value: Funktion erhaelt Kopie. Aenderungen in der Funktion beeinflussen das Original nicht. Standard fuer primitive Typen (int, float, bool). Sicher, aber Kopier-Overhead."},
{id:40,b:"8.3",t:"Funktionen",q:"Was ist Call-by-Reference?",o:["Mehrere Rueckgabewerte","Ein Rueckgabewert","Wertkopie uebergeben","Eine Referenz/Adresse auf den Originalwert wird uebergeben - Funktion kann das Original veraendern"],a:3,f:"Call-by-Reference: Funktion erhaelt Adresse des Originals. Aenderungen wirken sich direkt auf den Originalwert aus. Standard fuer Objekte in Java/Python. Effizient fuer grosse Datenstrukturen."},
{id:41,b:"8.3",t:"Funktionen",q:"Was ist Rekursion?",o:["Ein Datentyp","Eine Funktion die sich selbst aufruft bis eine Abbruchbedingung erreicht ist (Basisfall)","Eine Schleife","Eine Endlosschleife"],a:1,f:"Rekursion: Funktion ruft sich selbst auf. MUSS Basisfall haben (kein weiterer Aufruf), sonst Endlosrekursion (Stack Overflow). Beispiel: Fakultaet n! = n * (n-1)!. Basisfall: 0! = 1."},
{id:42,b:"8.3",t:"Funktionen",q:"Was ist eine Prozedur?",o:["Eine Funktion mit Rueckgabewert","In manchen Sprachen: Funktion ohne Rueckgabewert (void) - fuehrt Aktionen aus ohne Ergebnis zurueckzugeben","Ein Datentyp","Eine Klasse"],a:1,f:"Prozedur: wie eine Funktion aber ohne Rueckgabewert. In C: void-Funktion. In Pascal: procedure. In modernen Sprachen oft nicht mehr unterschieden - alles heisst Funktion oder Methode."},
{id:43,b:"8.3",t:"Funktionen",q:"Was ist eine Signatur einer Funktion?",o:["Nur die Parameter","Nur der Name","Name + Parameterliste (Typen und Anzahl der Parameter) - identifiziert eine Funktion eindeutig bei Ueberladen","Der Rueckgabewert allein"],a:2,f:"Signatur: Name + Parametertypen. addiere(int, int) vs addiere(float, float) = verschiedene Signaturen. Wichtig fuer Method Overloading (gleichnamige Funktionen mit verschiedenen Parametern)."},
{id:44,b:"8.3",t:"Funktionen",q:"Was ist Ueberladung (Overloading)?",o:["Mehrere Funktionen mit gleichem Namen aber verschiedenen Parametern (Typ oder Anzahl) - Compiler waehlt richtige Version","Fehler im Code","Rekursion","Vererbung"],a:0,f:"Overloading: gleicher Name, verschiedene Signaturen. print(int), print(float), print(String) - Compiler waehlt anhand der uebergebenen Argumente. Verbessert Lesbarkeit und Benutzerfreundlichkeit."},
{id:45,b:"8.3",t:"Funktionen",q:"Was ist eine Lambda-Funktion (anonyme Funktion)?",o:["Ein Interface","Eine Klasse","Eine kurze Funktion ohne Namen die direkt definiert und verwendet wird (z.B. x -> x*2 in Java)","Eine Schleife"],a:2,f:"Lambda: anonyme, oft einzeilige Funktion. Java: (x) -> x*2. Python: lambda x: x*2. Nützlich fuer kurze Operationen, Callbacks, Sortierkriterien. Macht Code kompakter."},
{id:46,b:"8.4",t:"OOP",q:"Was ist eine Klasse?",o:["Bauplan/Vorlage fuer Objekte: definiert Attribute (Daten) und Methoden (Verhalten) die alle Instanzen dieser Klasse teilen","Ein Datentyp","Ein Objekt","Eine Funktion"],a:0,f:"Klasse: Vorlage. Auto-Klasse definiert: Attribute (Farbe, Marke, PS), Methoden (fahren(), bremsen()). Aus Klasse koennen beliebig viele Objekte (Instanzen) erstellt werden."},
{id:47,b:"8.4",t:"OOP",q:"Was ist ein Objekt (Instanz)?",o:["Eine Methode","Ein Attribut","Eine Klasse","Konkretes Exemplar einer Klasse mit eigenen Attributwerten (z.B. meinAuto = neues Auto-Objekt mit Farbe=rot)"],a:3,f:"Objekt: konkrete Auspraegung einer Klasse. Auto meinAuto = new Auto(); meinAuto.farbe = rot; meinAuto.ps = 150. Jedes Objekt hat eigene Attributwerte, teilt aber Methoden mit der Klasse."},
{id:48,b:"8.4",t:"OOP",q:"Was ist Kapselung (Encapsulation)?",o:["Vererbung","Daten (Attribute) und Methoden in einer Klasse zusammenfassen und Direktzugriff von aussen verbergen - Zugriff nur ueber getter/setter","Daten kopieren","Polymorphie"],a:1,f:"Kapselung: Attribute als private, Zugriff nur ueber public getter/setter-Methoden. Vorteile: Kontrolle ueber Zugriff, Validation moeglich, Implementierung kapseln. Datengeheimnis."},
{id:49,b:"8.4",t:"OOP",q:"Was ist Vererbung (Inheritance)?",o:["Kapselung","Polymorphie","Daten kopieren","Kindklasse erbt Attribute und Methoden der Elternklasse und kann sie erweitern oder ueberschreiben"],a:3,f:"Vererbung: Kindklasse (extends) erbt alle public/protected Attribute und Methoden der Elternklasse. Kann hinzufuegen (neue Methoden) und ueberschreiben (Override). Wiederverwendung von Code."},
{id:50,b:"8.4",t:"OOP",q:"Was ist Polymorphie?",o:["Kapselung","Mehrere Klassen","Vererbung","Eine Methode hat in verschiedenen Klassen der gleichen Hierarchie unterschiedliche Implementierungen aber denselben Namen"],a:3,f:"Polymorphie: gleicher Methodenname, verschiedene Implementierungen. Tier.sprichAch(): Hund = Wau, Katze = Miau. Objekt bestimmt welche Implementierung ausgefuehrt wird (Laufzeit-Polymorphie)."},
{id:51,b:"8.4",t:"OOP",q:"Was ist public, private, protected?",o:["Datentypen","Netzwerkprotokolle","Dateizugriffsrechte","Zugriffsmodifikatoren: public=ueberall sichtbar, private=nur in eigener Klasse, protected=Klasse und Kindklassen"],a:3,f:"Public: von ueberall aufrufbar. Private: nur innerhalb der eigenen Klasse. Protected: Klasse + Kindklassen. Standard: kein Modifikator = package-private (Java). Gute Kapselung: Attribute meist private."},
{id:52,b:"8.4",t:"OOP",q:"Was ist Assoziation?",o:["Komposition","Kapselung","Lose Beziehung zwischen Klassen: Objekt A kennt Objekt B und kann es verwenden, beide koennen unabhaengig existieren","Vererbung"],a:2,f:"Assoziation: Klassen kennen einander. Student hat Referenz auf Kurs-Objekt. Beide koennen unabhaengig existieren. Loseate Beziehungsform in OOP."},
{id:53,b:"8.4",t:"OOP",q:"Was ist Aggregation?",o:["Komposition","Assoziation","Vererbung","Schwache hat-ein-Beziehung: Teile koennen unabhaengig vom Ganzen existieren (z.B. Abteilung hat Mitarbeiter - Mitarbeiter existiert auch ohne Abteilung)"],a:3,f:"Aggregation: has-a mit schwacher Bindung. Auto hat Reifen - Reifen koennen demontiert werden und existieren weiter. Teile leben auch ohne das Ganze."},
{id:54,b:"8.4",t:"OOP",q:"Was ist Komposition?",o:["Starke hat-ein-Beziehung: Teile koennen NICHT unabhaengig existieren - wenn das Ganze stirbt, sterben die Teile (z.B. Haus hat Zimmer - Zimmer ohne Haus sinnlos)","Polymorphie","Aggregation","Vererbung"],a:0,f:"Komposition: starke has-a-Bindung. Herz gehort zu Mensch - ohne Mensch kein Herz (konzeptionell). Teil kann nicht ohne das Ganze existieren. Staerkste Beziehungsform nach Vererbung."},
{id:55,b:"8.4",t:"OOP",q:"Was ist ein Konstruktor?",o:["Ein Interface","Eine normale Methode","Spezielle Methode die beim Erstellen eines Objekts aufgerufen wird - initialisiert Attribute des neuen Objekts","Eine Destruktor"],a:2,f:"Konstruktor: gleicher Name wie Klasse, kein Rueckgabetyp. Auto(String farbe, int ps) { this.farbe = farbe; this.ps = ps; }. Wird bei new Auto(...) aufgerufen."},
{id:56,b:"8.4",t:"OOP",q:"Was ist ein Interface?",o:["Vertrag: definiert Methodensignaturen die implementierende Klassen bereitstellen muessen - ohne Implementierung","Eine abstrakte Klasse","Eine Methode","Eine Klasse"],a:0,f:"Interface: Vorlage die vorschreibt WELCHE Methoden eine Klasse haben muss (nicht WIE). Klasse implements Interface muss alle Interface-Methoden implementieren. Ermoeglicht Polymorphie ohne Vererbung."},
{id:57,b:"8.4",t:"OOP",q:"Was ist eine abstrakte Klasse?",o:["Ein Interface","Klasse die nicht direkt instanziiert werden kann - enthalt abstract-Methoden (ohne Implementierung) die Kindklassen implementieren muessen","Eine normale Klasse","Eine finale Klasse"],a:1,f:"Abstrakte Klasse: kann nicht direkt instanziiert werden. Kombination: konkrete Methoden (fertige Implementierung) + abstrakte Methoden (Pflicht fuer Kindklassen). Zwischen Interface und normaler Klasse."},
{id:58,b:"8.4",t:"OOP",q:"Was sind die 4 Grundprinzipien der OOP?",o:["Public, Private, Protected, Package","Klassen, Objekte, Methoden, Attribute","Kapselung, Vererbung, Polymorphie, Abstraktion","Schnell, Guenstig, Gut, Einfach"],a:2,f:"4 OOP-Prinzipien: 1. Kapselung (Daten verbergen), 2. Vererbung (Code wiederverwenden), 3. Polymorphie (gleicher Name, verschiedenes Verhalten), 4. Abstraktion (Komplexitaet verbergen)."},
{id:59,b:"8.4",t:"OOP",q:"Was ist Abstraktion in der OOP?",o:["Polymorphie","Vereinfachung: nur relevante Eigenschaften und Verhaltensweisen nach aussen zeigen, Implementierungsdetails verbergen","Daten verschluesseln","Vererbung"],a:1,f:"Abstraktion: Benutzer einer Klasse muss nicht wissen WIE etwas implementiert ist, nur WAS sie tut. Auto.starten() - User weiss nicht ob Benzin- oder Elektromotor. Interfaces und abstrakte Klassen foerdern Abstraktion."},
{id:60,b:"8.4",t:"OOP",q:"Was ist Overriding (Ueberschreiben)?",o:["Neue Methode hinzufuegen","Overloading","Kindklasse implementiert eine Methode der Elternklasse neu - gleiche Signatur, andere Implementierung (Laufzeit-Polymorphie)","Kapselung"],a:2,f:"Override: Kindklasse reimplementiert Elternklassenmethode mit gleicher Signatur. @Override in Java. Tier.sprichAch() wird in Hund als Wau ueberschrieben. Basis der Laufzeit-Polymorphie."},
{id:61,b:"8.4",t:"OOP",q:"Was ist this in einer Klasse?",o:["Eine Konstante","Eine statische Variable","Eine Schleife","Referenz auf das aktuelle Objekt - unterscheidet Attribut von Parameter mit gleichem Namen (this.name = name)"],a:3,f:"this: Zeiger auf aktuelles Objekt. Verwendet wenn Parametername = Attributname: this.farbe = farbe (Attribut = Parameter). Auch fuer Konstruktorverkettung: this(parameter)."},
{id:62,b:"8.4",t:"OOP",q:"Was ist eine static-Methode?",o:["Methode die zur Klasse gehoert, nicht zu einer Instanz - kann ohne Objekt aufgerufen werden: Klasse.methode()","Eine private Methode","Eine Instanzmethode","Eine abstrakte Methode"],a:0,f:"static: gehoert zur Klasse, nicht zum Objekt. Math.sqrt(), Integer.parseInt(). Kein Zugriff auf Instanzattribute (kein this). Nuetzlich fuer Hilfsfunktionen ohne Zustand."},
{id:63,b:"8.5",t:"Bibliotheken",q:"Was ist eine Bibliothek (Library)?",o:["Ein Compiler","Eine IDE","Ein Framework","Sammlung vorgefertigter Funktionen und Klassen die wiederverwendet werden koennen - reduziert Entwicklungsaufwand"],a:3,f:"Bibliothek: fertige Loesungen fuer haeufige Aufgaben. Beispiele: Math-Bibliothek, String-Funktionen, Date/Time, JSON-Parser. Import und direkte Nutzung. Kein Rahmen, kein Inversion of Control."},
{id:64,b:"8.5",t:"Bibliotheken",q:"Was ist ein Framework?",o:["Ein Compiler","Eine Bibliothek","Umfassender Rahmen der Struktur, Konventionen und oft Inversion of Control vorgibt - Code wird vom Framework aufgerufen (Hollywood-Prinzip)","Eine IDE"],a:2,f:"Framework: gibt Struktur vor, ruft eigenen Code auf (Hollywood-Prinzip: don't call us, we'll call you). Beispiele: Spring (Java), Django (Python), React (JS). Mehr Einschraenkung aber mehr Unterstuetzung."},
{id:65,b:"8.5",t:"Bibliotheken",q:"Was ist der Unterschied zwischen Bibliothek und Framework?",o:["Bibliothek ist groesser","Framework ist kostenlos","Kein Unterschied","Bibliothek: du rufst sie auf (Kontrolle bei dir). Framework: es ruft dich auf (Inversion of Control, Kontrolle beim Framework)"],a:3,f:"Bibliothek: du steuerst den Ablauf, rufst Funktionen auf. Framework: Framework steuert Ablauf, ruft deinen Code auf (Inversion of Control). Bibliothek = Werkzeugkasten, Framework = Geruest."},
{id:66,b:"8.5",t:"Bibliotheken",q:"Was sind Vorteile von Bibliotheken und Frameworks?",o:["Nur Nachteile","Keine Vorteile","Immer langsamer","Weniger Code schreiben, Wiederverwendung, kuerzere Entwicklungszeit, bewaehrte Loesungen, Community und Support"],a:3,f:"Vorteile: Entwicklungszeit reduziert, bewaehrte und getestete Loesungen, Community-Support, Wartung der Bibliothek durch andere, Standardisierung im Team."},
{id:67,b:"8.5",t:"Bibliotheken",q:"Was ist npm (Node Package Manager)?",o:["Ein Framework","Ein Betriebssystem","Eine IDE","Paketmanager fuer JavaScript/Node.js: installiert, verwaltet und aktualisiert Bibliotheken und Abhaengigkeiten"],a:3,f:"npm: Paketmanager fuer JavaScript. npm install react installiert React und alle Abhaengigkeiten. package.json listet alle Abhaengigkeiten. Alternative: yarn, pnpm."},
{id:68,b:"8.5",t:"Bibliotheken",q:"Was ist Maven / Gradle?",o:["Build-Management-Werkzeuge fuer Java: verwalten Abhaengigkeiten, kompilieren Code, fuehren Tests aus und paketieren Anwendungen","Datenbanken","Texteditoren","Programmiersprachen"],a:0,f:"Maven/Gradle: Build-Tools fuer Java. Deklaration von Abhaengigkeiten in pom.xml (Maven) oder build.gradle (Gradle). Automatisches Herunterladen, Kompilieren, Testen, Paketieren."},
{id:69,b:"8.5",t:"Bibliotheken",q:"Was sind Frameworks fuer Web-Frontend?",o:["Express, FastAPI","Spring, Django, Flask","React, Vue, Angular - JavaScript-Frameworks fuer die Entwicklung moderner Web-Benutzeroberflaechen","JUnit, TestNG"],a:2,f:"Frontend-Frameworks: React (Facebook, Komponenten-basiert), Vue (progressiv, einfach), Angular (Google, vollstaendig). Alle auf JavaScript/TypeScript. Komponentenbasierte Entwicklung, Virtual DOM."},
{id:70,b:"8.5",t:"Bibliotheken",q:"Was sind Backend-Frameworks?",o:["JUnit, Selenium","Spring (Java), Django (Python), Express (Node.js), Flask (Python) - Frameworks fuer serverseitige Entwicklung","React, Vue, Angular","Bootstrap, Tailwind"],a:1,f:"Backend-Frameworks: Spring (Java, Enterprise), Django (Python, batteries included), Express (Node.js, minimal), Flask (Python, micro), FastAPI (Python, modern). Serverseitige Logik, API-Entwicklung."},
{id:71,b:"8.1",t:"Variablen",q:"Was ist eine globale Variable und welches Risiko hat sie?",o:["Keine Risiken","Variable die im gesamten Programm sichtbar ist - Risiko: unbeabsichtigte Aenderung von verschiedenen Stellen, schwerer zu debuggen","Eine Konstante","Eine Klassenvariable"],a:1,f:"Globale Variable: ueberall sichtbar und veraenderbar. Risiken: Seiteneffekte (Funktion A aendert Wert, Funktion B berechnet falsch), schwer zu testen, Code nicht portierbar. Lieber lokale Variablen."},
{id:72,b:"8.2",t:"Kontrollstrukturen",q:"Was ist short-circuit evaluation?",o:["Compiler-Optimierung","Ein Optimierungsverfahren","Bei logischen Operatoren wird die Auswertung abgebrochen sobald das Ergebnis feststeht (z.B. bei && wenn erste Bedingung falsch ist)","Eine Schleifenoptimierung"],a:2,f:"Short-circuit: bei AND (&&): wenn erste Bedingung falsch -> zweite wird nicht mehr geprueft. Bei OR (||): wenn erste wahr -> zweite wird nicht geprueft. Nuetzlich: if(obj != null && obj.wert > 0)."},
{id:73,b:"8.3",t:"Funktionen",q:"Was ist das DRY-Prinzip?",o:["Do Run Yourself","Don't Repeat Yourself: Code sollte nicht dupliziert werden - gleiche Logik einmal in Funktion auslagern und wiederverwenden","Do Refactor Yourself","Design Rules Yourself"],a:1,f:"DRY: identischer Code an mehreren Stellen = Wartungsproblem. Aenderung muss ueberall gemacht werden, Fehler an einer Stelle nicht korrigiert. Loesung: gemeinsame Logik in Funktion auslagern."},
{id:74,b:"8.4",t:"OOP",q:"Was ist das SOLID-Prinzip?",o:["Eine Testmethode","Eine Programmiersprache","5 Entwurfsprinzipien fuer OOP: Single Responsibility, Open/Closed, Liskov Substitution, Interface Segregation, Dependency Inversion","Ein Framework"],a:2,f:"SOLID: S=Single Responsibility (eine Klasse, eine Aufgabe), O=Open/Closed (offen fuer Erweiterung, geschlossen fuer Aenderung), L=Liskov, I=Interface Segregation, D=Dependency Inversion."},
{id:75,b:"8.4",t:"OOP",q:"Was bedeutet Single Responsibility Principle?",o:["Eine Klasse ist oeffentlich","Nur eine Vererbungsebene","Eine Klasse sollte nur eine einzige Aufgabe haben und nur einen Grund sich zu aendern","Eine Klasse hat eine Methode"],a:2,f:"SRP: Klasse/Modul hat genau eine Verantwortung. Beispiel: UserAuthentication-Klasse nur fuer Auth, nicht auch fuer Email-Versand und Datenbankzugriff. Weniger Abhaengigkeiten, besser testbar."},
{id:76,b:"8.5",t:"Bibliotheken",q:"Was ist ein API-Client als Bibliothek?",o:["Eine Datenbank","Ein Framework","Bibliothek die die Kommunikation mit einer externen API vereinfacht (z.B. HTTP-Requests, Authentifizierung, Antwortparsing)","Ein Testmodul"],a:2,f:"API-Client-Bibliothek: abstrahiert HTTP-Kommunikation. Beispiele: Axios (HTTP fuer JS), Requests (HTTP fuer Python), OpenAI-SDK. Statt manueller HTTP-Anfragen: einfache Methodenaufrufe."},
{id:77,b:"8.3",t:"Funktionen",q:"Was ist Stack Overflow bei Rekursion?",o:["Eine Optimierung","Fehler wenn Rekursion zu tief wird: zu viele verschachtelte Funktionsaufrufe belegen den Call-Stack bis er voll ist","Eine Bibliothek","Ein Programmierfehler-Forum"],a:1,f:"Stack Overflow: jeder Funktionsaufruf belegt Speicher auf dem Call-Stack. Endlose Rekursion (fehlender Basisfall) fuellt Stack komplett = Programmabsturz. Fehlermeldung: StackOverflowError."},
{id:78,b:"8.4",t:"OOP",q:"Was ist ein Entwurfsmuster (Design Pattern)?",o:["Ein Algorithmus","Bewaehrte Loesung fuer haeufig auftretende Entwurfsprobleme in der Softwareentwicklung (z.B. Singleton, Factory, Observer)","Ein Testverfahren","Ein UML-Diagramm"],a:1,f:"Design Patterns: Katalog bewaehrter Loesungsansaetze (GoF-Buch). Singleton: nur eine Instanz. Factory: Objekte erstellen. Observer: Benachrichtigungen. Facade: vereinfachte Schnittstelle."},
{id:79,b:"8.2",t:"Kontrollstrukturen",q:"Was ist ein Sentinel-Wert?",o:["Ein Default-Wert","Ein Debug-Wert","Ein spezieller Wert der das Ende einer Eingabe signalisiert (z.B. -1 um Ende einer Zahleneingabe zu markieren)","Ein Fehlerwert"],a:2,f:"Sentinel: spezielle Eingabe signalisiert Schleifenende. Beispiel: Zahlen eingeben bis -1 eingegeben wird. while((zahl = eingabe()) != -1) { ... }. Alternative: bestimmte Anzahl vorher bekannt."},
{id:80,b:"8.4",t:"OOP",q:"Was ist Polymorphie durch Interfaces?",o:["Verschiedene Klassen implementieren dasselbe Interface und koennen ueber den Interface-Typ angesprochen werden (lose Kopplung)","Vererbungspolymorphie","Abstraktion","Overloading"],a:0,f:"Interface-Polymorphie: Zahlbar-Interface, implementiert von Kreditkarte, PayPal, Bankueberweisung. Funktion erwartet Zahlbar - egal welche konkrete Klasse. Lose Kopplung, hohe Flexibilitaet."},
{id:81,b:"8.1",t:"Datenstrukturen",q:"Was ist ein binaerer Baum (Binary Tree)?",o:["Ein Array","Ein Stack","Eine Linked List","Hierarchische Datenstruktur: jeder Knoten hat maximal 2 Kindknoten (links und rechts) - effizient fuer Suche und Sortierung"],a:3,f:"Binaerer Baum: Wurzel -> bis zu 2 Kinder pro Knoten. Binary Search Tree (BST): links kleiner, rechts groesser. Suche in O(log n) statt O(n) bei Liste. Grundlage vieler Algorithmen."},
{id:82,b:"8.2",t:"Kontrollstrukturen",q:"Was ist ein Algorithmus?",o:["Endliche Folge von eindeutigen Anweisungen zur Loesung eines Problems - klar definiert, ausfuehrbar, terminiert","Eine Funktion","Eine Variable","Ein Programm"],a:0,f:"Algorithmus: schrittweise Loesung. Eigenschaften: endlich (terminiert), eindeutig (keine Mehrdeutigkeit), Eingabe, Ausgabe, ausfuehrbar. Beispiele: Sortieralgorithmen, Suche, Routenberechnung."},
{id:83,b:"8.3",t:"Funktionen",q:"Was ist ein Parameter vs. Argument?",o:["Identisch","Parameter ist der Rueckgabewert","Parameter: Platzhaltervariable in der Funktionsdefinition. Argument: konkreter Wert der beim Aufruf uebergeben wird","Argument ist der Datentyp"],a:2,f:"Parameter: in der Funktionsdefinition (void begruesse(String name)). Argument: beim Aufruf (begruesse(Anna)). Name ist Parameter, Anna ist Argument. Terminologisch wichtig bei Pruefungen."},
{id:84,b:"8.4",t:"OOP",q:"Was ist ein Getter und Setter?",o:["Statische Methoden","Zwei Arten von Konstruktoren","Vererbungsmethoden","Methoden fuer kontrollierten Zugriff auf private Attribute: getAttribut() liest, setAttribut(wert) schreibt mit optionaler Validierung"],a:3,f:"Getter: public int getAlter() { return alter; }. Setter: public void setAlter(int alter) { if(alter > 0) this.alter = alter; }. Setter ermoeglicht Validierung vor dem Setzen."},
{id:85,b:"8.5",t:"Bibliotheken",q:"Was ist eine Standardbibliothek (Standard Library)?",o:["Eine externe Bibliothek","Ein Compiler","Ein Framework","Sammlung von Funktionen und Klassen die standardmaessig mit einer Programmiersprache mitgeliefert werden (z.B. java.util, Python os)"],a:3,f:"Standardbibliothek: bereits bei der Sprache dabei, kein extra Install. Java: java.lang, java.util, java.io. Python: os, sys, json, datetime, math. C: stdio.h, stdlib.h, string.h."},
{id:86,b:"8.1",t:"Datentypen",q:"Was ist NULL/null/None?",o:["Spezialwert der die Abwesenheit eines Wertes repraesentiert - Variable zeigt auf kein Objekt","Die Zahl 0","Ein leerer String","Ein Fehler"],a:0,f:"Null/None/nil: kein Wert vorhanden. Haeufige Fehlerquelle: NullPointerException (Java), AttributeError auf None (Python). Pruefung: if(obj != null). Modernes Konzept: Optional<T> vermeidet Null."},
{id:87,b:"8.2",t:"Kontrollstrukturen",q:"Was ist Ausnahmebehandlung (Exception Handling)?",o:["Eine Schleife","Mechanismus um Laufzeitfehler abzufangen und zu behandeln: try-catch-finally verhindert Programmabsturz","Eine Bedingung","Fehler ignorieren"],a:1,f:"try { risikoCode(); } catch(Exception e) { fehlerBehandlung(); } finally { aufraeumen(); }. Verhindert Absturz bei Fehlern (Division durch 0, Datei nicht gefunden, Netzwerkfehler)."},
{id:88,b:"8.4",t:"OOP",q:"Was ist das Prinzip der losen Kopplung?",o:["Wenig Code","Klassen sollen moeglichst wenig voneinander abhaengig sein - Aenderung einer Klasse beeinflusst andere wenig","Viele Abhaengigkeiten","Starke Bindung"],a:1,f:"Lose Kopplung: Klassen kommunizieren ueber Interfaces, nicht ueber konkrete Implementierungen. Vorteil: Austauschbarkeit, bessere Testbarkeit (Mocking), weniger Aenderungskaskaden."},
{id:89,b:"8.3",t:"Funktionen",q:"Was ist hohe Kosaehenz (High Cohesion)?",o:["Polymorphie","Klasse/Funktion hat einen klar definierten Zweck, alle Teile arbeiten eng zusammen - Gegensatz zu God-Class mit zu vielen Aufgaben","Viele Abhaengigkeiten","Vererbung"],a:1,f:"Hohe Kohäsion: Klasse tut eine Sache gut. Niedrige Kohäsion: Klasse tut alles (God-Class). Ziel: hohe Kohäsion + lose Kopplung = wartbarer, testbarer Code."},
{id:90,b:"8.5",t:"Bibliotheken",q:"Was ist ein SDK (Software Development Kit)?",o:["Ein Framework","Sammlung von Tools, Bibliotheken, Dokumentation und Beispielen fuer die Entwicklung auf einer bestimmten Plattform (z.B. Android SDK, iOS SDK)","Eine Bibliothek allein","Ein IDE-Plugin"],a:1,f:"SDK: alles was man braucht fuer Entwicklung auf einer Plattform. Android SDK: Java/Kotlin-Bibliotheken, Emulator, Build-Tools, Dokumentation. Groesser als Bibliothek, spezialisierter als Framework."},
{id:91,b:"8.4",t:"OOP",q:"Was ist Mehrfachvererbung und welches Problem gibt es?",o:["Kapselung","Kindklasse erbt von zwei Elternklassen ohne Probleme","Polymorphie","Kindklasse erbt von mehreren Elternklassen - Diamond-Problem: welche Implementierung wird bei gleichnamigen Methoden verwendet?"],a:3,f:"Mehrfachvererbung: in Java nicht erlaubt (nur via Interfaces). C++ unterstuetzt es, Diamond-Problem: wenn A und B von C erben und D von A und B - welche C-Methode gilt in D?"},
{id:92,b:"8.2",t:"Kontrollstrukturen",q:"Was ist ein Match-Statement (Pattern Matching)?",o:["Eine for-Schleife","Eine alte switch-Anweisung","Moderne Erweiterung von switch/case: kann Muster statt nur Werte matchen, typsicher, oft ausdruecksbasiert (z.B. in Python 3.10+, Java 21)","Eine Bedingung"],a:2,f:"Match/Pattern Matching: modernes switch. Python: match variable: case int(): ... case str(): ... Prueft nicht nur Werte sondern auch Typen und Muster. Cleaner als lange if-elif-Ketten."},
{id:93,b:"8.3",t:"Funktionen",q:"Was ist eine Higher-Order Function?",o:["Eine rekursive Funktion","Eine sehr lange Funktion","Eine Klassenmethode","Funktion die andere Funktionen als Parameter entgegennimmt oder als Ergebnis zurueckgibt (z.B. map, filter, sort mit Vergleichsfunktion)"],a:3,f:"Higher-Order Function: map(funktion, liste), filter(bedingung, liste), sort(liste, key=funktion). Funktionale Programmierung. Erlaubt sehr ausdrucksstarken, kompakten Code."},
{id:94,b:"8.1",t:"Datenstrukturen",q:"Was ist der Unterschied zwischen Heap und Stack Speicher?",o:["Kein Unterschied","Stack ist groesser","Stack: automatisch verwaltet, lokale Variablen, schnell, klein. Heap: manuell/GC verwaltet, dynamische Objekte, groesser aber langsamer","Heap ist schneller"],a:2,f:"Stack (Aufruf-Stack): lokale Variablen, Funktionsaufrufe, automatisch freigegeben. Heap: dynamisch allozierte Objekte (new), Garbage Collector in Java/Python. C/C++: manuelle Verwaltung noetig (malloc/free)."},
{id:95,b:"8.4",t:"OOP",q:"Was ist ein Singleton-Pattern?",o:["Ein Interface","Eine abstrakte Klasse","Eine Klasse mit vielen Instanzen","Entwurfsmuster das sicherstellt dass von einer Klasse nur EINE einzige Instanz existiert - ueberall zugaenglich"],a:3,f:"Singleton: private Konstruktor, statische Instanz, static getInstance()-Methode. Verwendung: Logger, Datenbankverbindung, Konfigurationsmanager. Vorsicht: macht Testen schwieriger."},
{id:96,b:"8.5",t:"Bibliotheken",q:"Was ist Dependency Injection?",o:["Abhaengigkeiten direkt erstellen","Bibliothek importieren","Vererbung","Abhaengigkeiten werden von aussen uebergeben statt intern erstellt - verbessert Testbarkeit und lose Kopplung"],a:3,f:"Dependency Injection: Klasse erstellt Abhaengigkeiten nicht selbst, bekommt sie per Konstruktor oder Setter uebergeben. Vorteil: beim Testen koennen Mocks uebergeben werden. Spring/CDI verwalten DI automatisch."},
{id:97,b:"8.2",t:"Kontrollstrukturen",q:"Was ist der Unterschied zwischen == und equals()?",o:["== ist praeziser","equals() ist veraltet","== vergleicht Referenzen (zeigen auf dasselbe Objekt?). equals() vergleicht Inhalte (haben sie denselben Wert?)","Identisch"],a:2,f:"In Java: == vergleicht ob beide Variablen auf dasselbe Objekt zeigen. equals() vergleicht ob Inhalt gleich ist. String a = new String(Hallo); String b = new String(Hallo); a==b ist FALSE, a.equals(b) ist TRUE."},
{id:98,b:"8.3",t:"Funktionen",q:"Was ist Memoization?",o:["Ein Design-Pattern","Eine Rekursionsform","Speicherverwaltung","Technik: Ergebnisse aufwendiger Berechnungen zwischenspeichern und bei gleichen Eingaben wiederverwenden statt neu berechnen"],a:3,f:"Memoization: Cache fuer Funktionsergebnisse. Fibonacci(40) ohne Memo: exponentiell viele Berechnungen. Mit Memo: jeder Wert einmal berechnet, dann gecacht. Dramatische Beschleunigung bei Rekursion."},
{id:99,b:"8.4",t:"OOP",q:"Was ist das Observer-Pattern?",o:["Eine Testmethode","Entwurfsmuster: Objekte (Observer) registrieren sich bei einem Subject und werden automatisch benachrichtigt wenn sich dessen Zustand aendert","Eine Klasse beobachtet Fehler","Ein Algorithmus"],a:1,f:"Observer: Event-Listener in GUIs, Datenbank-Triggers, Newsletter-System. Subject = Nachrichtenquelle. Observer = Abonnenten. Wenn Subject sich aendert: alle Observer werden benachrichtigt."},
{id:100,b:"8.5",t:"Bibliotheken",q:"Was ist eine Versionsnummer (Semantic Versioning)?",o:["Ein Datum","Eine Builddnummer","Nur eine interne Nummer","MAJOR.MINOR.PATCH: MAJOR = inkompatible Aenderungen, MINOR = neue Funktionen (abwaertskompatibel), PATCH = Bugfixes (z.B. 2.3.1)"],a:3,f:"Semantic Versioning (SemVer): 2.3.1 = Major 2, Minor 3, Patch 1. Major-Aenderung: API-Bruch (Abhaengigkeiten koennen brechen). Minor: neue Features (kompatibel). Patch: nur Bugfixes."}
];
let st={},filt=[...Q];
function init(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});render();}
function render(){
  const c=document.getElementById("qc");c.innerHTML="";
  let lb=null;
  const bn={"8.1":"📦 8.1 Variablen, Datentypen & Strukturen","8.2":"🔀 8.2 Kontrollstrukturen","8.3":"⚙️ 8.3 Funktionen & Prozeduren","8.4":"🏗️ 8.4 Objektorientierung","8.5":"📚 8.5 Bibliotheken & Frameworks"};
  filt.forEach(q=>{
    if(q.b!==lb){const d=document.createElement("div");d.className="bh";d.textContent=bn[q.b]||q.b;c.appendChild(d);lb=q.b;}
    c.appendChild(mk(q));
  });up();}
function mk(q){
  const s=st[q.id],d=document.createElement("div"),L=["A","B","C","D"];
  d.className="qc"+(s.done?(s.ok?" ac":" aw"):"");d.id="c"+q.id;
  d.innerHTML=`<div class="qn">FRAGE ${q.id}/100</div><div class="qt">${q.t}</div><div class="qq">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt${s.done?" dis":""}${s.done&&i===q.a?" ok":""}${s.done&&!s.ok&&i===s.ci?" ng":""}" onclick="ans(${q.id},${i})"><span class="ol">${L[i]}</span><span>${o}</span></div>`).join("")}</div>
<div class="fbb${s.done?" show "+(s.ok?"cok":"cng"):""}" id="f${q.id}">${s.done?(s.ok?"✅ ":"❌ ")+q.f:""}</div>`;
  return d;}
function ans(id,i){
  const s=st[id];if(s.done)return;
  const q=Q.find(x=>x.id===id);s.done=true;s.ok=i===q.a;s.ci=i;
  const c=document.getElementById("c"+id);c.className="qc "+(s.ok?"ac":"aw");
  c.querySelectorAll(".opt").forEach((el,j)=>{el.classList.add("dis");if(j===q.a)el.classList.add("ok");if(!s.ok&&j===i)el.classList.add("ng");});
  const f=document.getElementById("f"+id);f.textContent=(s.ok?"✅ ":"❌ ")+q.f;f.className="fbb show "+(s.ok?"cok":"cng");up();}
function up(){
  const tot=Q.length,done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  document.getElementById("sd").textContent=ok+"/"+done;
  document.getElementById("pf").style.width=(done/tot*100)+"%";
  document.getElementById("pl").textContent=done+" von "+tot+" beantwortet";}
function fil(t,btn){
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("act"));btn.classList.add("act");
  if(t==="all")filt=[...Q];
  else if(t==="open")filt=Q.filter(q=>!st[q.id].done);
  else if(t==="wrong")filt=Q.filter(q=>st[q.id].done&&!st[q.id].ok);
  else filt=Q.filter(q=>q.b===t);render();}
function shuf(){filt=[...filt].sort(()=>Math.random()-.5);render();}
function rst(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});filt=[...Q];document.querySelectorAll(".fb").forEach((b,i)=>b.classList.toggle("act",i===0));render();document.getElementById("ov").classList.remove("show");}
function showR(){
  const done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  const pct=done>0?Math.round(ok/done*100):0;
  let e="😅",m="Weiter ueben!";
  if(pct>=90){e="🏆";m="Ausgezeichnet!";}else if(pct>=75){e="🎉";m="Sehr gut!";}else if(pct>=60){e="📚";m="Gut - weiter so!";}
  document.getElementById("oe").textContent=e;document.getElementById("os").textContent=ok+"/"+done;
  document.getElementById("om").textContent=pct+"% richtig - "+m;
  document.getElementById("ov").classList.add("show");}
function closeR(){document.getElementById("ov").classList.remove("show");}
init();
</script></body></html>
