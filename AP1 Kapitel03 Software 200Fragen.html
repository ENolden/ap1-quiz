<style>
:root{--bg:#0a0c12;--s:#13161f;--s2:#1c2030;--b:#252a3d;--a:#a78bfa;--a2:#06d6a0;--r:#ff4d6d;--g:#06d6a0;--y:#ffd166;--t:#e8eaf6;--t2:#8890aa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:"Segoe UI",system-ui,sans-serif;font-size:15px;line-height:1.6;}
.hdr{background:linear-gradient(135deg,#13161f,#1c2030);border-bottom:2px solid var(--b);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;}

.pt{font-size:12px;color:var(--t2);}
.sb{background:var(--s2);border:1px solid var(--b);border-radius:20px;padding:4px 14px;font-size:13px;font-weight:700;color:var(--a2);}
.ctrl{padding:10px 22px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--b);}
.btn{border:none;padding:7px 15px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}

.sr{margin-left:auto;display:flex;gap:12px;font-size:13px;color:var(--t2);}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.dg{background:var(--g);} .dr{background:var(--r);} .dy{background:var(--y);}
.flt{padding:8px 22px;background:var(--s);border-bottom:1px solid var(--b);display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

.fb.ac{background:var(--a);border-color:var(--a);color:#fff;}
.fb.aa{background:var(--a2);border-color:var(--a2);color:#111;font-weight:700;}

.si input:focus{border-color:var(--a);}
.qc{padding:18px 22px;max-width:1600px;margin:0 auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:13px;}
.card{background:var(--s);border:1.5px solid var(--b);border-radius:14px;overflow:hidden;}
.card.ok{border-color:var(--g);} .card.err{border-color:var(--r);}
.qh{padding:9px 13px;background:var(--s2);display:flex;justify-content:space-between;border-bottom:1px solid var(--b);}
.qn{font-size:11px;font-weight:700;color:var(--t2);}
.card.ok .qn::before{content:"✓ ";color:var(--g);} .card.err .qn::before{content:"✗ ";color:var(--r);}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--b);color:var(--a);}
.qb{padding:11px 13px;}
.qt{font-size:14px;margin-bottom:8px;line-height:1.5;}
.ops{display:flex;flex-direction:column;gap:5px;}
.op{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border:1.5px solid var(--b);border-radius:9px;cursor:pointer;background:var(--s2);}
.op:hover:not(.dis){border-color:var(--a);}
.op.sel{border-color:var(--a);background:#16183a;}
.op.cor{border-color:var(--g)!important;background:#071a12!important;}
.op.wrg{border-color:var(--r)!important;background:#1a0710!important;}
.op.dis{cursor:default;}
.ol{width:20px;height:20px;min-width:20px;border-radius:50%;background:var(--b);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-top:1px;}
.op.cor .ol{background:var(--g);color:#111;} .op.wrg .ol{background:var(--r);color:#fff;} .op.sel:not(.cor):not(.wrg) .ol{background:var(--a);color:#fff;}
.ot{font-size:13px;line-height:1.4;}
.exp{margin-top:8px;padding:9px 11px;background:#071a12;border-left:3px solid var(--g);border-radius:0 8px 8px 0;font-size:13px;color:#a7f3d0;display:none;}
.exp.show{display:block;} .exp.werr{background:#1a0710;border-color:var(--r);color:#fca5a5;}
.sh{grid-column:1/-1;background:var(--s2);border:1.5px solid var(--b);border-radius:12px;padding:11px 16px;font-size:14px;font-weight:700;margin-top:6px;color:var(--a);}
.rp{display:none;background:var(--s);border:2px solid var(--b);border-radius:14px;padding:22px;margin-bottom:18px;text-align:center;}
.rp.show{display:block;}
.rscore{font-size:50px;font-weight:900;background:linear-gradient(90deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.rlbl{color:var(--t2);margin-bottom:12px;} .rgrade{font-size:18px;font-weight:700;margin-bottom:10px;}
.rstats{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:12px;}
.rst{background:var(--s2);border:1px solid var(--b);border-radius:12px;padding:9px 16px;}
.rsv{font-size:22px;font-weight:800;} .rsl{font-size:12px;color:var(--t2);}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}
</style>

<script>
const Q=[
{id:1,t:"sw-arten",q:"Was ist Anwendungssoftware?",o:["Firmware","Das Betriebssystem","Programme für bestimmte Aufgaben des Endnutzers (Browser, Office, Spiele, Fachanwendungen)","Middleware"],a:2,e:"Anwendungssoftware: Standardsoftware (alle), Branchensoftware (spezifisch), Individualsoftware (maßgeschneidert)."},
{id:2,t:"sw-arten",q:"Was ist Standardsoftware?",o:["Open-Source-Software","Fertige Software für die breite Masse (z.B. Microsoft Word, Excel, Chrome, Adobe Reader)","Branchensoftware","Nur für einen Kunden"],a:1,e:"Standardsoftware: kostengünstig, schnell verfügbar, weit verbreitet. Nachteil: nicht perfekt anpassbar."},
{id:3,t:"sw-arten",q:"Was ist Individualsoftware?",o:["Open-Source","Software für alle","Standardsoftware","Maßgeschneiderte Software speziell für einen bestimmten Kunden entwickelt – teuer aber perfekt passend"],a:3,e:"Individualsoftware: höchste Kosten, längste Entwicklungszeit, aber optimale Anpassung an Kundenbedürfnisse."},
{id:4,t:"sw-arten",q:"Was ist Branchensoftware?",o:["Software für alle Branchen","Software speziell für eine bestimmte Branche entwickelt (z.B. Arztpraxis-Software, Hotel-Verwaltung)","Individualsoftware","Standardsoftware"],a:1,e:"Branchensoftware: zwischen Standard und Individual. Fertig aber branchenspezifisch. Beispiel: DATEV (Steuer), Lexware."},
{id:5,t:"sw-arten",q:"Was ist proprietäre Software?",o:["Closed-Source-Software mit beschränkten Nutzungsrechten, oft kostenpflichtig (Windows, Adobe CC, MS Office)","Kostenlose Software","Freie Software","Open-Source"],a:0,e:"Proprietär: Quellcode geheim, darf nicht geändert/weitergegeben werden. Gegenteil: FOSS (Free/Open Source)."},
{id:6,t:"sw-arten",q:"Was ist Open-Source-Software?",o:["Ohne Lizenz","Nur für Entwickler","Software mit öffentlich zugänglichem Quellcode – kann eingesehen, verändert und weitergegeben werden","Immer kostenlos"],a:2,e:"Open Source: Linux, Firefox, LibreOffice, VLC, Git. Lizenzen variieren: GPL, MIT, Apache. Nicht immer kostenlos!"},
{id:7,t:"sw-arten",q:"Was ist der Unterschied zwischen Freeware und Open Source?",o:["Open Source ist Freeware","Freeware ist Open Source","Kein Unterschied","Freeware: kostenlos nutzbar, aber Quellcode meist nicht verfügbar. Open Source: Quellcode offen, kann kostenpflichtig sein"],a:3,e:"Freeware: gratis nutzbar (z.B. Skype, 7-Zip). Open Source: Quellcode verfügbar. Beides kann, muss aber nicht, das andere sein."},
{id:8,t:"sw-arten",q:"Was ist Shareware?",o:["Open-Source-Software","Software die kostenlos ausprobiert werden kann, aber nach Testphase bezahlt werden muss (Freemium-Modell)","Kostenlose Software","Proprietäre Software"],a:1,e:"Shareware: WinRAR-Prinzip. Testphase unbegrenzt, aber Aufforderung zur Bezahlung. Heute: Freemium (Basis gratis, Premium bezahlt)."},
{id:9,t:"sw-arten",q:"Was ist Systemsoftware?",o:["Nur Dienstprogramme","Software die die Hardware verwaltet und Basis für Anwendungssoftware bildet (BS, Treiber, Utilities)","Nur Treiber","Nur das Betriebssystem"],a:1,e:"Systemsoftware: Betriebssystem, Gerätetreiber, Dienstprogramme (Defragmentierung, Backup). Läuft im Hintergrund."},
{id:10,t:"sw-arten",q:"Was ist Middleware?",o:["Ein Betriebssystem","Ein Compiler","Ein Treiber","Software-Schicht zwischen Betriebssystem und Anwendungen die Kommunikation und Integration ermöglicht"],a:3,e:"Middleware: Datenbank-Treiber, Message-Broker (RabbitMQ), API-Gateway. Verbindet heterogene Systeme."},
{id:11,t:"bs",q:"Was ist ein Betriebssystem?",o:["Ein Antivirenprogramm","Eine Anwendungssoftware","Grundsoftware die Hardware verwaltet, Ressourcen verteilt und Schnittstelle zwischen Benutzer und Hardware bildet","Ein Netzwerkprotokoll"],a:2,e:"BS-Aufgaben: Prozessverwaltung, Speicherverwaltung, Dateisystem, Geräteverwaltung, Benutzeroberfläche."},
{id:12,t:"bs",q:"Was ist der Kernel?",o:["Ein Treiber","Die Benutzeroberfläche","Ein Anwendungsprogramm","Der Kern des Betriebssystems – verwaltet Hardware direkt, Prozesse, Speicher und Systemaufrufe"],a:3,e:"Kernel: Monolithisch (Linux), Mikrokernel (MINIX), Hybridkernel (Windows NT, macOS XNU). Läuft im privilegierten Ring 0."},
{id:13,t:"bs",q:"Was sind bekannte Desktop-Betriebssysteme?",o:["Nur Windows","Windows (Microsoft), macOS (Apple), Linux (Verschiedene Distributionen)","Nur Linux","Nur macOS"],a:1,e:"Windows: 73% Marktanteil. macOS: 15%. Linux: ~4% Desktop, dominiert Server/Supercomputer/Smartphones (Android)."},
{id:14,t:"bs",q:"Was ist Android?",o:["Linux-basiertes mobiles Betriebssystem von Google für Smartphones und Tablets","Ein Apple-System","Ein Desktop-OS","Ein Windows-System"],a:0,e:"Android: Open Source (AOSP), 72% Smartphone-Marktanteil. Verschiedene Hersteller: Samsung (One UI), Xiaomi (MIUI)."},
{id:15,t:"bs",q:"Was ist eine Linux-Distribution?",o:["Ein Dateisystem","Ein Linux-Kernel","Eine vollständige Linux-basierte BS-Version mit Kernel, Paketverwaltung und vorinstallierter Software (Ubuntu, Debian, Fedora)","Ein Windows-Äquivalent"],a:2,e:"Distributionen: Ubuntu (einsteigerfreundlich), Debian (stabil), Fedora (aktuell), Arch (minimal), RHEL/CentOS (Server)."},
{id:16,t:"bs",q:"Was ist Multitasking?",o:["Hardware-Funktion","Nur auf Multi-Core-CPUs","Fähigkeit des BS mehrere Programme scheinbar gleichzeitig auszuführen (Zeitscheiben-Verfahren/Scheduling)","Nur ein Programm gleichzeitig"],a:2,e:"Multitasking: preemptives (BS unterbricht Prozesse) vs. kooperatives (Prozesse geben CPU freiwillig ab). Heute: preemptiv."},
{id:17,t:"bs",q:"Was ist Multiuser-Fähigkeit?",o:["Mehrere Benutzer können gleichzeitig auf dasselbe System zugreifen (Linux/Windows Server)","Mehrere Monitore","Mehrere Festplatten","Mehrere CPUs"],a:0,e:"Multiuser: jeder Nutzer hat eigene Session, Rechte, Dateien. Terminal-Server, SSH-Verbindungen. Windows 10: nur ein User aktiv."},
{id:18,t:"bs",q:"Was ist Prozessverwaltung im BS?",o:["Nur Programmstarten","Nur Programmbeenden","Nur Fehlerbehandlung","Erstellung, Scheduling, Synchronisation und Beendigung von Prozessen – CPU-Zeit fair verteilen"],a:3,e:"Prozess-Zustände: Bereit, Laufend, Wartend. Scheduler verteilt CPU-Zeit (Round-Robin, Priority-Based)."},
{id:19,t:"bs",q:"Was ist der Unterschied zwischen Prozess und Thread?",o:["Prozess: eigener Adressraum, Ressourcen. Thread: leichtgewichtiger Ausführungsstrang innerhalb eines Prozesses, teilt Adressraum","Prozess hat keine Ressourcen","Kein Unterschied","Thread ist langsamer"],a:0,e:"Multithreading: ein Prozess, mehrere Threads (z.B. Browser-Tab = eigener Thread). Kontextwechsel bei Threads schneller."},
{id:20,t:"bs",q:"Was ist virtueller Speicher?",o:["BS nutzt Festplattenplatz (Swap/Auslagerungsdatei) als Erweiterung des physischen RAMs","RAM-Erweiterung durch Hardware","Zusätzlicher Cache","Cloud-Speicher"],a:0,e:"Virtual Memory: jeder Prozess sieht eigenen virtuellen Adressraum. Paging: 4KB-Pages. Swapping bei RAM-Mangel (sehr langsam!)."},
{id:21,t:"bs",q:"Was ist POST?",o:["E-Mail-Protokoll","Ein Netzwerkprotokoll","Power-On Self-Test – BIOS/UEFI prüft beim Start grundlegende Hardware auf Fehler","Ein Betriebssystem"],a:2,e:"POST: prüft RAM, CPU, Grafikkarte, Tastatur. Fehler → Beep-Codes oder UEFI-Fehlermeldung. Vor OS-Start."},
{id:22,t:"bs",q:"Was ist ein Bootloader?",o:["Ein Treiber","Ein Antivirenprogramm","Erstes Programm nach BIOS/UEFI das den OS-Kernel lädt (GRUB für Linux, Windows Boot Manager)","Ein Dateisystem"],a:2,e:"Bootloader: GRUB (Multi-Boot), Windows Boot Manager (BCD). Lädt OS-Kernel in RAM und übergibt Kontrolle."},
{id:23,t:"bs",q:"Was ist Plug and Play?",o:["Ein Netzwerkprotokoll","Ein BIOS-Feature","Eine USB-Funktion","BS erkennt und konfiguriert angeschlossene Hardware automatisch ohne manuelle Treiberinstallation"],a:3,e:"PnP: BS erkennt neue Hardware, sucht Treiber (lokal oder Windows Update). BIOS weist Ressourcen zu (IRQ, I/O-Ports)."},
{id:24,t:"bs",q:"Was ist ein Deadlock?",o:["Ein Netzwerkfehler","Ein Programmabsturz","Ein Speicherfehler","Zustand in dem zwei oder mehr Prozesse gegenseitig auf Ressourcen warten und keiner weitermachen kann"],a:3,e:"Deadlock-Bedingungen (Coffman): Mutual Exclusion, Hold & Wait, No Preemption, Circular Wait. Alle 4 müssen gelten."},
{id:25,t:"bs",q:"Was ist ein Semaphor?",o:["Ein Netzwerkgerät","Ein Dateisystem","Synchronisationsprimitive im BS zur Koordination des Zugriffs auf gemeinsame Ressourcen (Mutex ist Spezialfall)","Ein Prozessor-Typ"],a:2,e:"Semaphor: Zähler für verfügbare Ressourcen. wait() (P): dekrementiert. signal() (V): inkrementiert. Mutex: binärer Semaphor."},
{id:26,t:"compiler",q:"Was ist ein Compiler?",o:["Ein Linker","Ein Assembler","Ein Interpreter","Übersetzt GESAMTEN Quellcode VOR der Ausführung in Maschinencode (C, C++, Go, Rust)"],a:3,e:"Compiler: einmal übersetzen → schnelle Ausführung. Schritte: Lexer → Parser → Semantik → Optimierung → Codegen."},
{id:27,t:"compiler",q:"Was ist ein Interpreter?",o:["Ein Linker","Ein Compiler","Ein Assembler","Führt Quellcode DIREKT zeilenweise aus ohne vorherige Übersetzung in Maschinencode (Python, Ruby, JS)"],a:3,e:"Interpreter: plattformunabhängig, leichter zu debuggen, aber langsamer. Python, JavaScript, PHP, Ruby."},
{id:28,t:"compiler",q:"Was ist ein Linker?",o:["Verbindet Objektdateien (.o) zu ausführbarer Datei und löst externe Referenzen (Bibliotheken) auf","Ein Compiler","Ein Debugger","Ein Interpreter"],a:0,e:"Linker: statisches Linken (alles in EXE) vs. dynamisches Linken (DLLs/SOs zur Laufzeit geladen)."},
{id:29,t:"compiler",q:"Was ist ein Assembler?",o:["Übersetzt Assembler-Code (mnemonische Befehle) in Maschinencode (1:1 Übersetzung)","Ein Interpreter","Ein Linker","Ein Compiler für Python"],a:0,e:"Assembler: MOV AX, 1 → Maschinencode. Hardwarenah, architekturspezifisch (x86, ARM). Heute selten außer Embedded."},
{id:30,t:"compiler",q:"Was ist ein Debugger?",o:["Tool zum Finden von Fehlern: schrittweise Ausführung, Breakpoints, Variable inspizieren","Ein Interpreter","Ein Linker","Ein Compiler"],a:0,e:"Debugger: GDB (Linux), Visual Studio Debugger, Chrome DevTools. Breakpoints, Step Over/Into/Out, Watch-Expressions."},
{id:31,t:"compiler",q:"Was ist eine IDE?",o:["Eine Datenbank","Ein Betriebssystem","Integrated Development Environment: Editor + Compiler + Debugger + Versionskontrolle in einem Tool","Ein Compiler"],a:2,e:"IDE: VS Code, Eclipse, IntelliJ IDEA, PyCharm, Visual Studio. Features: IntelliSense, Refactoring, Git-Integration."},
{id:32,t:"compiler",q:"Was ist der Unterschied zwischen Bytecode und Maschinencode?",o:["Bytecode ist schneller","Maschinencode: direkt von CPU ausführbar. Bytecode: für virtuelle Maschine (JVM, CLR) – plattformunabhängig","Maschinencode ist portabler","Kein Unterschied"],a:1,e:"Java: Javac → .class (Bytecode) → JVM interpretiert/JIT-kompiliert. 'Write once, run anywhere'."},
{id:33,t:"compiler",q:"Was ist JIT-Kompilierung?",o:["Just-In-Time: Code wird früher kompiliert","Ein Linker","Just-In-Time: Bytecode wird zur Laufzeit in Maschinencode kompiliert – Kompromiss zwischen Interpreter und Compiler","Eine Sprache"],a:2,e:"JIT: JVM (Java), CLR (.NET), V8 (JavaScript) nutzen JIT. Häufig ausgeführter Code wird nativ kompiliert → schneller."},
{id:34,t:"compiler",q:"Was ist ein Paketmanager?",o:["Ein Dateisystem","Ein Compiler","Tool zur automatisierten Installation, Aktualisierung und Verwaltung von Software-Paketen","Ein Netzwerkprotokoll"],a:2,e:"Paketmanager: apt (Ubuntu/Debian), yum/dnf (RHEL), pacman (Arch), npm (Node.js), pip (Python), Homebrew (macOS)."},
{id:35,t:"compiler",q:"Was ist eine Bibliothek (Library)?",o:["Sammlung vordefinierter Funktionen/Klassen die wiederverwendet werden können (z.B. NumPy, jQuery)","Ein Compiler","Ein Buch über Programmierung","Ein Framework"],a:0,e:"Library vs. Framework: Library = du rufst sie auf. Framework = es ruft dich auf (Inversion of Control). Django, React = Frameworks."},
{id:36,t:"compiler",q:"Was ist eine API?",o:["Eine Programmiersprache","Ein Protokoll","Ein Betriebssystem","Application Programming Interface – definierte Schnittstelle für Software-Kommunikation (REST, SOAP, GraphQL)"],a:3,e:"API: Vertrag zwischen Softwareteilen. REST-API: HTTP-Methoden (GET, POST, PUT, DELETE), JSON/XML. Beispiel: Twitter-API."},
{id:37,t:"compiler",q:"Was ist ein Framework?",o:["Ein Compiler","Eine Bibliothek","Umfassendes Grundgerüst das Struktur und Konventionen für Anwendungen vorgibt (Django, React, Spring)","Ein Betriebssystem"],a:2,e:"Framework: Inversion of Control – Framework ruft deinen Code auf. React (UI), Django (Web), Spring (Java-Enterprise)."},
{id:38,t:"compiler",q:"Was ist ein SDK?",o:["Software Development Kit – Sammlung von Tools, Bibliotheken, Dokumentation für eine Plattform (Android SDK, iOS SDK)","Ein Betriebssystem","Ein API","Ein Framework"],a:0,e:"SDK: enthält Compiler, Debugger, Emulator, Bibliotheken, API-Dokumentation. Plattformspezifisch."},
{id:39,t:"compiler",q:"Was ist Versionskontrolle?",o:["Ein Debugger","System das Änderungen am Quellcode verfolgt, verschiedene Versionen verwaltet und Zusammenarbeit ermöglicht (Git)","Eine Backup-Methode","Ein Paketmanager"],a:1,e:"Git: dezentrales VCS. Commit, Branch, Merge, Pull Request. GitHub, GitLab, Bitbucket als Hosting-Plattformen."},
{id:40,t:"compiler",q:"Was ist ein Shellskript?",o:["Ein Compilerprogramm","Ein Python-Programm","Ein Windows-Programm","Textdatei mit Befehlen die vom Shell-Interpreter ausgeführt werden (Shebang: #!/bin/bash)"],a:3,e:"Shell: Bash (Linux/Mac), PowerShell (Windows). chmod +x script.sh → ./script.sh. Automatisierung von Aufgaben."},
{id:41,t:"cloud",q:"Was ist Cloud Computing?",o:["Eigene Server","Ein Betriebssystem","Bereitstellung von IT-Ressourcen über das Internet als Service – keine eigene Hardware nötig","Ein Netzwerkprotokoll"],a:2,e:"Cloud: Skalierbarkeit, Pay-per-Use, kein Hardwareaufwand. AWS, Azure, Google Cloud sind die Big Three."},
{id:42,t:"cloud",q:"Was ist SaaS?",o:["Plattform als Service","Software as a Service – Anwendungen über Internet als Abonnement (Office 365, Salesforce, Google Workspace)","Infrastruktur als Service","Desktop als Service"],a:1,e:"SaaS: kein lokales Installieren. Browser genügt. Anbieter verwaltet alles. Beispiele: Gmail, Zoom, Dropbox."},
{id:43,t:"cloud",q:"Was ist PaaS?",o:["Platform as a Service – Entwicklungsplattform in der Cloud: Entwickler deployen Code ohne Infrastruktur zu verwalten","Desktop als Service","Software als Service","Infrastruktur als Service"],a:0,e:"PaaS: Heroku, Google App Engine, Azure App Service. Code deployen → Plattform kümmert sich um Server, Skalierung."},
{id:44,t:"cloud",q:"Was ist IaaS?",o:["Desktop als Service","Software als Service","Infrastructure as a Service – virtuelle Server, Storage, Netzwerk in der Cloud (AWS EC2, Azure VMs)","Plattform als Service"],a:2,e:"IaaS: du verwaltest OS und Anwendungen, Anbieter verwaltet Hardware. AWS EC2, Azure VMs, Google Compute Engine."},
{id:45,t:"cloud",q:"Was ist DaaS?",o:["Software als Service","Infrastruktur als Service","Desktop as a Service – virtuelle Desktops über Cloud, Zugriff von jedem Gerät (Azure Virtual Desktop, Citrix)","Daten als Service"],a:2,e:"DaaS = VDI aus der Cloud. Thin Clients genügen. Zentrale Verwaltung, gut für BYOD-Sicherheit."},
{id:46,t:"cloud",q:"Was ist Public Cloud?",o:["Ressourcen werden von vielen Unternehmen geteilt und über Internet bezogen (AWS, Azure, Google Cloud)","Auf eigenen Servern","Nur für ein Unternehmen","Kombiniert mit Private"],a:0,e:"Public Cloud: günstig, skalierbar, aber weniger Kontrolle. Datenschutzbedenken bei sensiblen Daten."},
{id:47,t:"cloud",q:"Was ist Private Cloud?",o:["Cloud-Infrastruktur exklusiv für ein Unternehmen – On-Premise oder dediziert beim Provider","Ein VPN","Ein öffentlicher Cloud-Dienst","Hybrid-Modell"],a:0,e:"Private Cloud: volle Kontrolle, hohe Sicherheit, teuer. OpenStack, VMware vSphere. Für Banken, Behörden."},
{id:48,t:"cloud",q:"Was ist Hybrid Cloud?",o:["Nur Public Cloud","Nur Private Cloud","Kombination aus Private und Public Cloud – sensible Daten privat, skalierbare Last öffentlich","Ein Multi-Cloud-Ansatz"],a:2,e:"Hybrid: Normalauslastung in Private Cloud, Spitzenlasten in Public Cloud (Cloud Bursting). Flexible Architektur."},
{id:49,t:"cloud",q:"Was sind Vorteile von Cloud Computing?",o:["Skalierbarkeit, Pay-per-Use, keine Hardware-Anschaffung, globale Verfügbarkeit, automatische Updates","Keine Vorteile","Immer sicherer","Immer günstiger"],a:0,e:"Vorteile: OpEx statt CapEx, schnelle Bereitstellung, globale Reichweite. Nachteile: Datenschutz, Abhängigkeit, laufende Kosten."},
{id:50,t:"cloud",q:"Was ist Serverless Computing?",o:["Ein PaaS-Dienst","Entwickler deployen Funktionen ohne Server zu verwalten – Cloud führt Code bei Bedarf aus (AWS Lambda)","Server existieren nicht","Ein IaaS-Dienst"],a:1,e:"Serverless (FaaS): AWS Lambda, Azure Functions. Zahlung nur für Ausführung (Millisekunden). Auto-Skalierung. Für Event-driven Apps."},
{id:51,t:"cloud",q:"Was ist ein Container (z.B. Docker)?",o:["Ein Cloud-Dienst","Ein Betriebssystem","Leichtgewichtige isolierte Ausführungsumgebung die App + Abhängigkeiten kapselt – schneller als VMs","Eine virtuelle Maschine"],a:2,e:"Docker: Container teilen OS-Kernel. Image → Container. Dockerfile definiert Inhalt. Docker Hub = Image-Registry."},
{id:52,t:"cloud",q:"Was ist der Unterschied zwischen Container und VM?",o:["VMs sind schneller","Container sind sicherer","Container: teilen OS-Kernel, sehr leichtgewichtig (MB). VM: eigenes OS, schwergewichtig (GB), stärkere Isolation","Kein Unterschied"],a:2,e:"VM: Hypervisor (VMware, Hyper-V, KVM) emuliert Hardware. Container: Docker Engine. VM sicherer, Container schneller."},
{id:53,t:"cloud",q:"Was ist Kubernetes?",o:["Container-Orchestrierungsplattform – verwaltet, skaliert und deployt Container-Anwendungen automatisch","Ein Betriebssystem","Ein Cloud-Anbieter","Ein Container-Format"],a:0,e:"Kubernetes (K8s): Pods (Container-Gruppen), Services, Deployments, Namespaces. Auto-Healing, Auto-Scaling."},
{id:54,t:"cloud",q:"Was ist DevOps?",o:["Kombination aus Development und Operations – verbessert Zusammenarbeit und beschleunigt Software-Lieferung","Ein Cloud-Dienst","Eine Programmiersprache","Ein Betriebssystem"],a:0,e:"DevOps: CI/CD-Pipelines, Automatisierung, Infrastructure as Code (Terraform), Monitoring. GitLab CI, Jenkins, GitHub Actions."},
{id:55,t:"cloud",q:"Was ist CI/CD?",o:["Ein Betriebssystem","Ein Cloud-Dienst","Ein Programmierparadigma","Continuous Integration/Continuous Delivery: automatisches Testen und Deployen bei jedem Code-Commit"],a:3,e:"CI: automatisch bauen und testen. CD: automatisch deployen. Tools: GitLab CI, GitHub Actions, Jenkins, CircleCI."},
{id:56,t:"lizenzen",q:"Was ist eine EULA?",o:["Ein Mietvertrag","Ein Kaufvertrag","Eine Open-Source-Lizenz","End User License Agreement – Nutzungsvertrag der die Bedingungen für Softwarenutzung festlegt"],a:3,e:"EULA: kein Eigentum am Code, nur Nutzungsrecht. Kauf = Lizenz kaufen. Meistens Click-Through beim Installieren."},
{id:57,t:"lizenzen",q:"Was ist eine Einzelplatz-Lizenz?",o:["Lizenz die nur auf einem Computer genutzt werden darf – günstig aber unflexibel","Floating-Lizenz","Netzwerklizenz","Named-User-Lizenz"],a:0,e:"Einzelplatz/Nodelocked: an Gerät gebunden. Identifikation per MAC-Adresse, Seriennummer oder Dongle."},
{id:58,t:"lizenzen",q:"Was ist eine Volumenlizenz?",o:["Eine Testlizenz","Eine Einzellizenz","Sammelvertrag für viele Lizenzen zu günstigeren Konditionen – für Unternehmen mit vielen Nutzern","Eine Floating-Lizenz"],a:2,e:"Volumenlizenz: Microsoft Open License, Adobe VIP. Günstigerer Preis pro Einheit, zentrale Verwaltung."},
{id:59,t:"lizenzen",q:"Was ist eine Concurrent-License (Floating)?",o:["Lizenz pro Nutzer","Testlizenz","Lizenz pro Gerät","Eine bestimmte Anzahl gleichzeitiger Nutzer erlaubt – Lizenzserver verwaltet Vergabe"],a:3,e:"Floating/Concurrent: 10 Lizenzen für 100 Nutzer möglich, wenn nie alle gleichzeitig arbeiten. Lizenzserver (FlexNet)."},
{id:60,t:"lizenzen",q:"Was ist eine Subscription-Lizenz (Abonnement)?",o:["Lebenslange Lizenz","Regelmäßige Zahlungen (monatlich/jährlich) für Softwarenutzung – Software immer aktuell (Microsoft 365, Adobe CC)","Kostenlose Lizenz","Einmalkauf"],a:1,e:"SaaS-Modell: immer aktuelle Version, Cloud-Funktionen inklusive. Nachteil: kein Eigentum, Kosten bei Nichtnutzung."},
{id:61,t:"lizenzen",q:"Was ist die GPL-Lizenz?",o:["BSD-Lizenz","GNU General Public License – Open-Source-Copyleft-Lizenz: Abgeleitetes muss auch GPL sein (Linux-Kernel)","MIT-Lizenz","Proprietäre Lizenz"],a:1,e:"GPL (Copyleft): 'viral' – wer GPL-Code nutzt und verbreitet, muss eigenen Code auch GPL lizenzieren. GPL v2, v3."},
{id:62,t:"lizenzen",q:"Was ist die MIT-Lizenz?",o:["Proprietäre Lizenz","Sehr permissive Open-Source-Lizenz: fast keine Einschränkungen, auch kommerzielle Nutzung erlaubt","Copyleft-Lizenz","GPL-ähnlich"],a:1,e:"MIT: Namensnennung reicht. Keine Copyleft-Pflicht. Beliebt: Node.js, React, Angular, Bootstrap nutzen MIT."},
{id:63,t:"lizenzen",q:"Was ist die Apache-2.0-Lizenz?",o:["Copyleft-Lizenz","Proprietäre Lizenz","Permissive Open-Source-Lizenz: erlaubt kommerzielle Nutzung, Modifikation und Verteilung mit Namensnennung","GPL-ähnlich"],a:2,e:"Apache 2.0: Patentklausel (schützt vor Patent-Klagen). Nutzung: Android (AOSP), Kubernetes, TensorFlow."},
{id:64,t:"lizenzen",q:"Was ist ein Software-Escrow?",o:["Drittpartei verwahrt den Quellcode – Kunde erhält Zugang wenn Anbieter insolvent wird","Eine Cloud-Lösung","Ein Lizenztyp","Ein Backup"],a:0,e:"Escrow: Sicherheit für Kunden bei Individualsoftware. Wenn Anbieter aufhört, kann Kunde Software selbst warten."},
{id:65,t:"lizenzen",q:"Was ist Software-Auditing?",o:["Überprüfung ob ein Unternehmen alle genutzten Softwarelizenzen korrekt besitzt – oft von Herstellern durchgeführt","Ein Backup-Prozess","Ein Sicherheitstest","Code-Review"],a:0,e:"Lizenz-Audit: Microsoft, SAP, Oracle auditieren Kunden. SAM (Software Asset Management) hilft Compliance sichern."},
{id:66,t:"lizenzen",q:"Was ist SAM?",o:["Ein Netzwerkdienst","System Access Management","Ein Backup-System","Software Asset Management – Verwaltung aller Softwarelizenzen im Unternehmen für Compliance und Kostenoptimierung"],a:3,e:"SAM: Inventarisierung, Lizenz-Compliance, Kostenoptimierung. Tools: Snow Software, Flexera, Microsoft SCCM."},
{id:67,t:"security",q:"Was ist ein Virenscanner (Antivirus)?",o:["Ein VPN","Eine Firewall","Software die Schadsoftware erkennt und entfernt durch Signaturen, Heuristik und Verhaltensanalyse","Ein Backup-Tool"],a:2,e:"Antivirus: Signaturbasiert (bekannte Malware), Heuristisch (verdächtiges Verhalten), Sandbox (sichere Ausführung)."},
{id:68,t:"security",q:"Was ist ein Trojaner?",o:["Eine Ransomware","Ein Wurm","Schadsoftware die sich als nützliches Programm tarnt und im Hintergrund Schaden anrichtet","Ein Virus"],a:2,e:"Trojaner: Backdoor öffnen, Daten stehlen, Keylogger installieren. Verbreitung durch E-Mail-Anhänge, Downloads."},
{id:69,t:"security",q:"Was ist Ransomware?",o:["Schadsoftware die Dateien verschlüsselt und Lösegeld für die Entschlüsselung fordert (WannaCry, Ryuk)","Ein Wurm","Ein Trojaner","Ein Virus"],a:0,e:"Ransomware: verschlüsselt Dateien (RSA+AES), fordert Bitcoin-Zahlung. Schutz: Backups, Patches, keine Makros."},
{id:70,t:"security",q:"Was ist Spyware?",o:["Schadsoftware die heimlich Benutzeraktivitäten überwacht und Daten sammelt (Tastatureingaben, Passwörter)","Ein Virus","Eine Ransomware","Ein Trojaner"],a:0,e:"Spyware: Keylogger, Screenshot-Tools, Kamera-Zugriff. Oft mit Freeware gebündelt. Schutz: Antivirus, Vorsicht."},
{id:71,t:"security",q:"Was ist Adware?",o:["Nützliche Werbung","Eine Ransomware","Unerwünschte Software die Werbung anzeigt, oft mit kostenloser Software gebündelt","Ein Virus"],a:2,e:"Adware: zeigt Pop-ups, Browser-Toolbars, ändert Startseite. Oft nicht illegal aber lästig und datenschutzproblematisch."},
{id:72,t:"security",q:"Was ist ein Botnet?",o:["Ein normales Netzwerk","Netzwerk infizierter Computer (Bots/Zombies) die von einem Command-and-Control-Server gesteuert werden","Ein VPN-Netz","Ein Sicherheits-Tool"],a:1,e:"Botnet: für DDoS-Angriffe, Spam, Bitcoin-Mining, Passwort-Cracking. Mirai-Botnet: infizierte IoT-Geräte."},
{id:73,t:"security",q:"Was ist ein DDoS-Angriff?",o:["Distributed Denial of Service: viele Systeme überfluten einen Server mit Anfragen bis er zusammenbricht","Ein Trojaner","Ein Virus","Ein Phishing-Angriff"],a:0,e:"DDoS: Volumetric (Traffic-Flut), Protocol (SYN-Flood), Application Layer (HTTP-Flood). Schutz: CDN, Rate-Limiting, Scrubbing."},
{id:74,t:"security",q:"Was ist Phishing?",o:["Ein Rootkit","Ein Computervirus","Ein Netzwerkangriff","Angriffsmethode bei der gefälschte E-Mails/Webseiten Zugangsdaten stehlen"],a:3,e:"Phishing: E-Mail mit gefälschtem Absender, Link zu Fake-Login. Spear-Phishing: gezielt auf Person/Unternehmen."},
{id:75,t:"security",q:"Was ist ein Rootkit?",o:["Ein Trojaner","Schadsoftware die sich tief im System versteckt und Administratorrechte verbirgt – schwer zu entfernen","Ein Virus","Ein Backup-Tool"],a:1,e:"Rootkit: modifiziert OS-Kernel oder Bootsektor. Kernel-Mode-Rootkit: unsichtbar für normale Antivirus-Software."},
{id:76,t:"security",q:"Was ist Social Engineering?",o:["Software-Entwicklung","Ein Virus","Manipulation von Menschen statt technischer Systeme um Zugang oder Informationen zu erlangen","Ein Netzwerkangriff"],a:2,e:"Social Engineering: Phishing, Vishing (Telefon), Pretexting (falsche Identität), Tailgating (physisch). Mensch = schwächstes Glied."},
{id:77,t:"security",q:"Was ist ein Zero-Day-Exploit?",o:["Ein DDoS-Angriff","Ein Phishing-Angriff","Ausnutzung einer Sicherheitslücke die dem Hersteller noch unbekannt ist – kein Patch verfügbar","Ein bekannter Exploit"],a:2,e:"Zero-Day: zwischen Entdeckung und Patch. Sehr wertvoll auf dem Schwarzmarkt. State-Sponsored Hacking nutzt sie."},
{id:78,t:"security",q:"Was ist ein Patch?",o:["Ein neues Betriebssystem","Ein Update der alle Features ändert","Ein Backup","Kleine Software-Aktualisierung die spezifische Sicherheitslücken oder Bugs behebt"],a:3,e:"Patch-Management: regelmäßige Patches sind wichtigste Sicherheitsmaßnahme. Patch-Dienstag (Microsoft: 2. Dienstag/Monat)."},
{id:79,t:"security",q:"Was ist eine Sandbox?",o:["Isolierte Umgebung in der Code/Programme sicher ausgeführt werden können ohne das Hauptsystem zu gefährden","Ein Spielplatz","Eine VM","Ein Container"],a:0,e:"Sandbox: Browser-Tabs, PDF-Reader, E-Mail-Anhänge. Antivirus führt verdächtige Dateien in Sandbox aus."},
{id:80,t:"security",q:"Was ist Verschlüsselung von Software?",o:["Schutz von Software-Code durch Obfuskation und Lizenzmechanismen gegen Reverse Engineering","Datenverschlüsselung","Code unleserlich machen","Netzwerkverschlüsselung"],a:0,e:"Code-Obfuskation: Variablen umbenennen, verschachteln. DRM (Digital Rights Management): verhindert illegale Nutzung."},
{id:81,t:"quali",q:"Was ist Software-Testing?",o:["Nur das Testen auf Fehler","Nur Unit-Tests","Systematische Prüfung ob Software korrekt funktioniert, Anforderungen erfüllt und keine Fehler enthält","Nur Benutzer-Tests"],a:2,e:"Testing: Unit-Test (Einheit), Integrations-Test (Zusammenspiel), System-Test (Gesamtsystem), Abnahme-Test (Kunde)."},
{id:82,t:"quali",q:"Was ist ein Unit-Test?",o:["Test einer einzelnen Funktion/Methode/Klasse isoliert von anderen Komponenten","Ein Integrationstest","Ein Lasttest","Test des gesamten Systems"],a:0,e:"Unit-Test: JUnit (Java), pytest (Python), Jest (JS). Schnell, automatisiert, hohe Abdeckung anstreben. AAA: Arrange-Act-Assert."},
{id:83,t:"quali",q:"Was ist ein Integrationstest?",o:["Test des Zusammenspiels mehrerer Komponenten oder Module","Ein Lasttest","Test einer einzelnen Funktion","Ein Unit-Test"],a:0,e:"Integrationstest: prüft Schnittstellen zwischen Modulen. Bottom-Up, Top-Down oder Big-Bang-Integration."},
{id:84,t:"quali",q:"Was ist ein Systemtest?",o:["Test einer Funktion","Ein Unit-Test","Test des vollständigen integrierten Systems gegen die Anforderungen in produktionsnaher Umgebung","Ein Integrationstest"],a:2,e:"Systemtest: Black-Box-Test. Funktionale und nicht-funktionale Anforderungen (Performance, Sicherheit)."},
{id:85,t:"quali",q:"Was ist ein Abnahmetest (UAT)?",o:["User Acceptance Test – Endnutzer oder Auftraggeber prüfen ob System Anforderungen erfüllt","Entwicklertest","Ein Systemtest","Ein Unit-Test"],a:0,e:"UAT: letzter Test vor Go-Live. Auftraggeber unterschreibt nach erfolgreichem UAT das Abnahmeprotokoll."},
{id:86,t:"quali",q:"Was ist Testgetriebene Entwicklung (TDD)?",o:["Erst testen dann vergessen","Ein Framework","Eine Testmethode","Test first: Tests werden VOR dem Produktionscode geschrieben – Red-Green-Refactor-Zyklus"],a:3,e:"TDD: 1.Schreibe fehlschlagenden Test (Red), 2.Schreibe minimalen Code (Green), 3.Refactor. Besseres Design, mehr Vertrauen."},
{id:87,t:"quali",q:"Was ist Code Review?",o:["Ein Backup","Ein Deployment-Prozess","Automatisiertes Testen","Manuelle Überprüfung von Code durch andere Entwickler vor dem Merge – findet Fehler und verbessert Qualität"],a:3,e:"Code Review: Pull/Merge Requests (GitHub/GitLab). 4-Augen-Prinzip. Wissenstransfer, Konsistenz, Fehlerprävention."},
{id:88,t:"quali",q:"Was ist statische Code-Analyse?",o:["Automatisierte Analyse des Quellcodes ohne Ausführung – findet Bugs, Sicherheitslücken, Code-Smells","Ein Compiler","Code ausführen und testen","Ein Debugger"],a:0,e:"Statische Analyse: SonarQube, ESLint, Pylint, SpotBugs. Findet: unused Variables, SQL-Injection, Buffer Overflow."},
{id:89,t:"quali",q:"Was ist ein Bug (Software-Fehler)?",o:["Unerwünschtes Verhalten oder Defekt im Code der zu falschen Ergebnissen oder Abstürzen führt","Eine Optimierung","Eine Funktion","Ein Feature"],a:0,e:"Bug-Typen: Syntaxfehler (Compiler findet), Laufzeitfehler (Exception), Logikfehler (falsches Ergebnis)."},
{id:90,t:"quali",q:"Was ist technische Schuld (Technical Debt)?",o:["Akkumulierte schlechte Code-Entscheidungen die zukünftige Entwicklung verlangsamen und verteuren","Ein Fehler","Ein Zahlungsrückstand","Ein Bug"],a:0,e:"Technical Debt: schnelle Lösungen heute = Mehraufwand morgen. Refactoring baut Schulden ab. Code-Metriken messen sie."},
{id:91,t:"quali",q:"Was ist Agile Softwareentwicklung?",o:["Ein Wasserfall-Modell","Ein starres Vorgehensmodell","Iterativer Ansatz: kleine inkrementelle Releases, enge Kundenzusammenarbeit, schnelle Anpassung an Änderungen","Ein Testverfahren"],a:2,e:"Agile Manifesto (2001): Individuen > Prozesse, Software > Dokumentation, Kunden > Vertragsverhandlung, Veränderung > Plan."},
{id:92,t:"quali",q:"Was ist SCRUM?",o:["Agiles Framework mit Sprints (2-4 Wochen), definierten Rollen (PO, SM, Team) und Zeremonien","Eine Programmiersprache","Ein Testing-Framework","Ein Wasserfall-Modell"],a:0,e:"SCRUM: Product Backlog → Sprint Planning → Sprint → Daily Standup → Sprint Review → Retrospective."},
{id:93,t:"quali",q:"Was ist das Wasserfallmodell?",o:["Lineares Vorgehensmodell: Anforderungen → Design → Implementierung → Test → Betrieb (keine Rücksprünge)","Ein SCRUM-Modell","Ein agiles Modell","Ein iteratives Modell"],a:0,e:"Wasserfall: klar definierte Phasen. Vorteil: planbar. Nachteil: Anforderungsänderungen schwierig, Fehler spät entdeckt."},
{id:94,t:"quali",q:"Was ist Clean Code?",o:["Code der leicht lesbar, verständlich und wartbar ist – selbsterklärende Variablennamen, kleine Funktionen","Schneller Code","Kurzer Code","Kommentierter Code"],a:0,e:"Clean Code (Robert C. Martin): SOLID-Prinzipien, DRY (Don't Repeat Yourself), KISS (Keep It Simple, Stupid)."},
{id:95,t:"quali",q:"Was ist das DRY-Prinzip?",o:["Don't Repeat Yourself – jede Information sollte nur einmal im System existieren (keine Code-Duplikation)","Delete Redundant Yield","Do Repeat Yourself","Delete Remaining Yield"],a:0,e:"DRY: Code-Duplikation in Funktionen/Klassen auslagern. Änderungen nur an einer Stelle. Gegenteil: WET (Write Everything Twice)."},
{id:96,t:"quali",q:"Was ist ein Software-Lifecycle (SDLC)?",o:["Nur Entwicklung","Nur Testing","Nur Deployment","Software Development Lifecycle: Planung → Analyse → Design → Entwicklung → Test → Deployment → Wartung"],a:3,e:"SDLC: strukturierter Prozess für Software-Entwicklung. Modelle: Wasserfall, Agile, Spiral, V-Modell."},
{id:97,t:"quali",q:"Was ist Refactoring?",o:["Neue Features hinzufügen","Code löschen","Bugs beheben","Code-Umstrukturierung ohne Änderung des externen Verhaltens – verbessert Lesbarkeit und Wartbarkeit"],a:3,e:"Refactoring: Rename, Extract Method, Move Method, Extract Class. IDE-Tools automatisieren es. Tests sichern Verhalten ab."},
{id:98,t:"quali",q:"Was ist Documentation (Dokumentation)?",o:["Nur Benutzerhandbücher","Nur Kommentare im Code","Nur API-Docs","Beschreibung von Software: Code-Kommentare, API-Dokumentation, Benutzerhandbücher, Architektur-Diagramme"],a:3,e:"Doku: Inline (Kommentare), API (JSDoc, Javadoc), Architektur (ADRs), User (Handbuch). 'Code as documentation.'"},
{id:99,t:"quali",q:"Was ist Performance-Testing?",o:["Funktionstest","Ein Sicherheitstest","Prüft wie das System unter Last reagiert: Lasttest, Stresstest, Volumentest, Soak-Test","Ein Unit-Test"],a:2,e:"Lasttest: normales Benutzeraufkommen. Stresstest: über Grenzen gehen. Soak-Test: lange Laufzeit. Tools: JMeter, Gatling."},
{id:100,t:"quali",q:"Was ist Continuous Monitoring?",o:["Automatisierte Überwachung von Produktionssystemen in Echtzeit für Performance, Fehler, Sicherheit","Gelegentliche Überprüfung","Ein Testing-Framework","Ein Deployment-Tool"],a:0,e:"Monitoring: Prometheus + Grafana, ELK-Stack, Datadog, New Relic. Metriken: Latenz, Fehlerrate, Throughput."},
{id:101,t:"bs",q:"Was ist ein Dateisystem?",o:["Strukturiert die Speicherung und Organisation von Dateien auf Datenträgern (NTFS, EXT4, APFS, FAT32)","Ein Netzwerkprotokoll","Eine Datenbank","Ein Betriebssystem"],a:0,e:"Dateisystem: Hierarchie (Verzeichnisse/Ordner), Metadaten (Name, Größe, Datum, Berechtigungen), Fragmentierung."},
{id:102,t:"bs",q:"Was ist ein Prozess-Scheduler?",o:["Ein Speichermanager","Ein Kalender","Ein Dateisystem","BS-Komponente die entscheidet welcher Prozess als nächstes CPU-Zeit bekommt (Round-Robin, Priority, FIFO)"],a:3,e:"Scheduler: Long-term (welche Prozesse starten), Medium-term (Swap), Short-term (welcher Prozess läuft). CPU-Burst."},
{id:103,t:"bs",q:"Was ist ein System-Call (Syscall)?",o:["Ein Interrupt","Schnittstelle über die Anwendungen Betriebssystem-Dienste anfordern (Dateizugriff, Netzwerk, Speicher)","Ein API-Aufruf","Ein normaler Funktionsaufruf"],a:1,e:"Syscall: Übergang vom User-Mode (Ring 3) in Kernel-Mode (Ring 0). read(), write(), fork(), exec() in Linux."},
{id:104,t:"bs",q:"Was ist Swapping?",o:["Datenaustausch zwischen Programmen","Auslagern von Prozessen/Pages vom RAM auf die Festplatte bei Speichermangel – sehr langsam","Eine Backup-Methode","Ein Netzwerkprotokoll"],a:1,e:"Swapping: Windows pagefile.sys, Linux /swap. SSD-Swap deutlich schneller als HDD-Swap. Thrashing: zu viel Swapping."},
{id:105,t:"bs",q:"Was ist ein Interrupt?",o:["Ein Programmfehler","Ein Systemabsturz","Ein Netzwerkpaket","Signal an die CPU dass ein Ereignis Aufmerksamkeit erfordert – BS unterbricht aktuellen Prozess (Hardware/Software)"],a:3,e:"Hardware-Interrupt: Tastendruck, Netzwerkpaket. Software-Interrupt: System-Call. IRQ (Interrupt Request). ISR (Handler)."},
{id:106,t:"bs",q:"Was ist ein User Mode vs. Kernel Mode?",o:["Nur in Linux","Kein Unterschied","User Mode (Ring 3): eingeschränkte Rechte für Anwendungen. Kernel Mode (Ring 0): voller Hardware-Zugriff für OS","Nur für Sicherheit"],a:2,e:"Privilege Levels: Ring 0 (Kernel), Ring 3 (User). Schutz vor Anwendungsfehlern die das System abstürzen lassen."},
{id:107,t:"bs",q:"Was ist ein Hypervisor?",o:["Software die mehrere virtuelle Maschinen auf einem physischen Host ausführt (VMware, Hyper-V, KVM)","Ein Dateimanager","Ein Compiler","Ein Browser"],a:0,e:"Typ-1 (Bare-Metal): direkt auf Hardware (VMware ESXi, Hyper-V, KVM). Typ-2 (Hosted): auf OS (VirtualBox, VMware Workstation)."},
{id:108,t:"bs",q:"Was ist ein BSOD (Blue Screen of Death)?",o:["Ein Netzwerkfehler","Eine Warnung","Ein Sicherheitsfehler","Kritischer Windows-Systemfehler der das System anhält (STOP-Fehler) – Fehlercode hilft bei Diagnose"],a:3,e:"BSOD: Kernel-Panic in Windows. Ursachen: fehlerhafte Treiber, RAM-Defekt, Hardware-Fehler. Dump-Datei für Analyse."},
{id:109,t:"bs",q:"Was ist ein Kernel-Panic?",o:["Ein Windows-Fehler","Eine Warnung","Ein Anwendungsfehler","Kritischer Systemfehler in Linux/macOS der das System zum Stillstand bringt (wie BSOD in Windows)"],a:3,e:"Kernel Panic: OS kann Fehler nicht sicher beheben. Ursachen: fehlerhafte Treiber, Speicherfehler, Dateisystemkorruption."},
{id:110,t:"bs",q:"Was ist ein Daemon (Linux)?",o:["Ein Benutzer","Hintergrundprozess in Linux/Unix der Dienste bereitstellt (z.B. sshd, httpd, cron, systemd)","Ein Virus","Ein Kernel-Modul"],a:1,e:"Daemon: startet bei Boot, läuft im Hintergrund. systemd verwaltet Daemons. ps aux zeigt alle laufenden Prozesse."},
{id:111,t:"sw-arten",q:"Was ist Embedded Software?",o:["Software für PCs","Software die direkt in Hardware-Geräte eingebettet ist (Firmware für Router, Drucker, Waschmaschinen, Autos)","Cloud-Software","Eine App"],a:1,e:"Embedded: RTOS (Real-Time OS), oft C/C++, begrenzte Ressourcen, zuverlässig und deterministisch."},
{id:112,t:"sw-arten",q:"Was ist eine Web-Applikation?",o:["Eine Desktop-App","Software die im Browser läuft und über HTTP/HTTPS bereitgestellt wird (Gmail, GitHub, Netflix)","Eine Native App","Eine Mobile-App"],a:1,e:"Web-App: HTML/CSS/JavaScript (Frontend), Node.js/Python/PHP (Backend). SPA (Single Page Application): React, Vue, Angular."},
{id:113,t:"sw-arten",q:"Was ist eine native App?",o:["Eine Cross-Platform-App","Eine Web-App","App speziell für eine Plattform entwickelt und optimiert (Swift für iOS, Kotlin für Android)","Eine Web-App"],a:2,e:"Native: beste Performance und UX, Zugriff auf alle Hardware-Features. Nachteil: separate Entwicklung pro Plattform."},
{id:114,t:"sw-arten",q:"Was ist Cross-Platform-Entwicklung?",o:["Entwicklung von Apps die auf mehreren Plattformen laufen (Flutter, React Native, Xamarin)","Nur für Web","Nur für Desktop","Nur für eine Plattform"],a:0,e:"Flutter (Dart), React Native (JS), Xamarin (.NET): eine Codebasis für iOS und Android. Kompromiss bei Leistung/UX."},
{id:115,t:"sw-arten",q:"Was ist eine Progressive Web App (PWA)?",o:["Eine native App","Eine Desktop-App","Web-App die sich wie eine native App verhält: offline-fähig, installierbar, Push-Notifications","Eine Hybrid-App"],a:2,e:"PWA: Service Worker (Offline), Web App Manifest (Installierbarkeit), HTTPS. Beispiele: Twitter Lite, Starbucks."},
{id:116,t:"cloud",q:"Was ist Infrastructure as Code (IaC)?",o:["Code auf Servern","Ein Betriebssystem","Verwaltung von IT-Infrastruktur durch Code/Konfigurationsdateien (Terraform, Ansible, CloudFormation)","Ein Cloud-Dienst"],a:2,e:"IaC: Terraform (deklarativ, Multi-Cloud), Ansible (imperativ, Konfiguration), Puppet, Chef. Version-Control für Infrastruktur."},
{id:117,t:"cloud",q:"Was ist Auto-Scaling?",o:["Ein Backup-System","Automatisches Anpassen der Ressourcen basierend auf Last – mehr Server bei hohem Traffic, weniger bei wenig","Manuelles Hochskalieren","Ein Monitoring-Tool"],a:1,e:"Auto-Scaling: AWS Auto Scaling Groups, Azure VMSS, Kubernetes HPA. Spart Kosten und sichert Verfügbarkeit."},
{id:118,t:"cloud",q:"Was ist ein Microservices-Architektur?",o:["Eine Monolith-Anwendung","Ein Protokoll","Anwendung aufgeteilt in kleine unabhängige Dienste die über APIs kommunizieren (Netflix, Uber, Amazon)","Ein Container-Format"],a:2,e:"Microservices: unabhängig deploybar, skalierbar, verschiedene Technologien möglich. Nachteil: Komplexität, Netzwerk-Latenz."},
{id:119,t:"cloud",q:"Was ist ein Monolith?",o:["Ein Microservice","Eine kleine App","Traditionelle Architektur wo alle Funktionen in einer einzigen Anwendung/Deployment-Einheit zusammengefasst sind","Ein Container"],a:2,e:"Monolith: einfacher zu entwickeln und debuggen. Nachteil: schwer skalierbar, kleine Änderung = vollständiges Redeployment."},
{id:120,t:"cloud",q:"Was ist Load Balancing?",o:["Ein Monitoring-Tool","Netzwerklast messen","Verteilung von Anfragen auf mehrere Server – verhindert Überlastung, erhöht Verfügbarkeit","Ein Sicherheits-Tool"],a:2,e:"Load Balancer: Round-Robin, Least Connections, IP-Hash. AWS ALB/NLB, nginx, HAProxy. Layer 4 oder Layer 7."},
{id:121,t:"quali",q:"Was ist SOLID in der Software-Entwicklung?",o:["Ein Programmierparadigma","Ein Testframework","Eine Methode","5 Prinzipien für gutes OOP-Design: Single Responsibility, Open/Closed, Liskov, Interface Segregation, Dependency Inversion"],a:3,e:"S=Single Responsibility, O=Open/Closed, L=Liskov Substitution, I=Interface Segregation, D=Dependency Inversion."},
{id:122,t:"quali",q:"Was ist das Single Responsibility Principle (SRP)?",o:["Nur eine Datei","Eine Methode ein Parameter","Eine Klasse macht alles","Eine Klasse sollte nur EINE Aufgabe haben und nur EINEN Grund zur Änderung – erhöht Kohäsion"],a:3,e:"SRP: 'A class should have only one reason to change' (Robert C. Martin). Fördert Modularität und Testbarkeit."},
{id:123,t:"quali",q:"Was ist das Open/Closed Principle?",o:["Software-Entitäten sollen OFFEN für Erweiterungen aber GESCHLOSSEN für Modifikationen sein","Software offen für alle","Keine Klassen schließen","Offener Quellcode"],a:0,e:"Open/Closed: neue Features durch Vererbung/Interfaces hinzufügen, nicht bestehenden Code ändern. Strategy Pattern."},
{id:124,t:"compiler",q:"Was ist ein Garbage Collector?",o:["Ein Virenscanner","Automatische Speicherverwaltung: gibt nicht mehr benötigten Speicher frei (Java, Python, C#, Go)","Ein Compiler","Ein Debugger"],a:1,e:"GC: Mark-and-Sweep, Reference Counting. Java: G1 GC. Python: Reference Counting + Cyclic GC. C/C++: manuell (malloc/free)."},
{id:125,t:"compiler",q:"Was ist ein Stack Overflow?",o:["Ein Speicherfehler","Fehler wenn der Call-Stack überläuft – oft durch infinite Rekursion ohne Basisfall","Ein Netzwerkfehler","Eine Website"],a:1,e:"Stack Overflow: Rekursion ohne Ende füllt Stack. Java/Python: StackOverflowError/RecursionError. Max-Rekursionstiefe typisch 1000-10000."},
{id:126,t:"quali",q:"Was ist Kanban?",o:["Ein agiles Framework mit Sprints","Agile Methode: Work-in-Progress begrenzen, Arbeit visualisieren (Kanban-Board: To Do, In Progress, Done)","Ein Testing-Verfahren","Ein Wasserfall-Modell"],a:1,e:"Kanban: kontinuierlicher Fluss statt Sprints. WIP-Limits verhindern Multitasking. Trello, Jira, GitHub Projects."},
{id:127,t:"cloud",q:"Was ist Edge Computing?",o:["Verarbeitung von Daten nah am Entstehungsort (IoT-Gerät) statt in der Cloud – reduziert Latenz","Ein Betriebssystem","Ein Netzwerkprotokoll","Cloud-Computing"],a:0,e:"Edge: autonomes Fahren, Industrie 4.0, Smart Cameras. Daten lokal vorverarbeiten, nur Ergebnisse in Cloud senden."},
{id:128,t:"cloud",q:"Was ist Disaster Recovery?",o:["Plan und Prozesse zur Wiederherstellung von IT-Systemen nach einem Katastrophenfall (RTO und RPO)","Ein Sicherheits-Tool","Ein Monitoring-Tool","Ein Backup"],a:0,e:"DR: RTO (Recovery Time Objective = max. Ausfallzeit), RPO (Recovery Point Objective = max. Datenverlust). Hot/Warm/Cold Standby."},
{id:129,t:"cloud",q:"Was ist High Availability (HA)?",o:["Systemdesign das Ausfälle minimiert durch Redundanz – Ziel: 99,9% (8,7h/Jahr) bis 99,999% (5,3 Min/Jahr) Verfügbarkeit","Immer erreichbar ohne Ausfall","Ein Monitoring-Tool","Ein Backup-System"],a:0,e:"HA: redundante Komponenten, Failover, Load Balancing. Five Nines (99,999%) = max. 5,26 Minuten Ausfall pro Jahr."},
{id:130,t:"cloud",q:"Was ist ein Message Broker?",o:["Ein Datenbank","Ein E-Mail-Server","Middleware die Nachrichten zwischen Anwendungen asynchron vermittelt (RabbitMQ, Apache Kafka, Azure Service Bus)","Ein API-Gateway"],a:2,e:"Message Broker: Entkopplung, Pufferung, Skalierbarkeit. Kafka: Stream-Processing. RabbitMQ: klassische Queue."},
{id:131,t:"bs",q:"Was ist das Registry in Windows?",o:["Ein Dienst","Ein Dateiformat","Zentrale hierarchische Datenbank für Windows-Konfigurationseinstellungen (System, Hardware, Software, Benutzer)","Ein Verzeichnis"],a:2,e:"Registry: regedit.exe. HKEY_LOCAL_MACHINE (System), HKEY_CURRENT_USER (Benutzer). Vorsicht bei manuellen Änderungen!"},
{id:132,t:"bs",q:"Was ist Active Directory?",o:["Ein Betriebssystem","Ein Dateisystem","Ein Netzwerkprotokoll","Microsoft-Verzeichnisdienst für zentrale Benutzerverwaltung, Authentifizierung und Gruppenrichtlinien in Windows-Netzen"],a:3,e:"AD: Domänencontroller, OU (Organizational Units), Gruppenrichtlinien (GPO). Kerberos für Authentifizierung."},
{id:133,t:"bs",q:"Was ist ein Gruppenrichtlinienobjekt (GPO)?",o:["Ein Netzwerkprofil","Ein Dateiserver","Konfigurationseinstellungen die zentral auf Benutzer/Computer in einer AD-Domäne angewendet werden","Ein Benutzer"],a:2,e:"GPO: Software-Installation, Desktop-Hintergrund, Passwort-Richtlinien, Software-Einschränkungen. GPMC für Verwaltung."},
{id:134,t:"bs",q:"Was ist LDAP?",o:["Lightweight Directory Access Protocol – Protokoll für Verzeichnisdienste (Active Directory, OpenLDAP)","Ein Dateiprotokoll","Ein Routing-Protokoll","Ein E-Mail-Protokoll"],a:0,e:"LDAP: Port 389 (unverschlüsselt), 636 (LDAPS). Hierarchische Struktur: dc=example,dc=com → ou=Users → cn=Max."},
{id:135,t:"bs",q:"Was ist SSO (Single Sign-On)?",o:["Eine Sicherheitsschwäche","Einmalige Authentifizierung gibt Zugang zu mehreren Anwendungen ohne erneutes Login (Kerberos, SAML, OAuth)","Ein Passwort-Manager","Einmalige Anmeldung"],a:1,e:"SSO: SAML 2.0 (Enterprise), OAuth 2.0 + OpenID Connect (Web). 'Login mit Google/Microsoft'. Kerberos: Windows-SSO."},
{id:136,t:"security",q:"Was ist ein Keylogger?",o:["Ein Keyboard-Treiber","Schadsoftware oder Hardware die Tastatureingaben aufzeichnet – stiehlt Passwörter, Kreditkartendaten","Ein Debugging-Tool","Ein Systemüberwachungs-Tool"],a:1,e:"Keylogger: Hardware (zwischen Tastatur und PC) oder Software (Treiber-Level). Schutz: Virtuelle Tastatur, 2FA."},
{id:137,t:"security",q:"Was ist Man-in-the-Middle (MitM)?",o:["Ein DDoS-Angriff","Angreifer schaltet sich in Kommunikation zwischen zwei Parteien – liest mit oder manipuliert Daten","Ein physischer Angriff","Ein Phishing-Angriff"],a:1,e:"MitM: ARP-Spoofing, Evil-Twin-WLAN, SSL-Stripping. Schutz: HTTPS, HSTS, Zertifikat-Pinning, VPN."},
{id:138,t:"security",q:"Was ist SQL-Injection?",o:["Ein Optimierungsverfahren","Ein Programmierparadigma","Angriff bei dem Angreifer SQL-Code über Eingabefelder einschleust um Datenbank zu manipulieren oder auszulesen","Eine Datenbankfunktion"],a:2,e:"SQL-Injection: ' OR '1'='1. Schutz: Prepared Statements, Parameterized Queries, Input-Validierung, WAF."},
{id:139,t:"security",q:"Was ist Cross-Site-Scripting (XSS)?",o:["Ein Phishing-Angriff","Angriff bei dem Angreifer JavaScript in Webseiten einschleust die im Browser anderer Nutzer ausgeführt wird","Eine Datenbankfunktion","Ein DDoS-Angriff"],a:1,e:"XSS: Reflected (in URL), Stored (in DB), DOM-based. Schutz: Output-Encoding, CSP (Content Security Policy), HttpOnly-Cookies."},
{id:140,t:"security",q:"Was ist Cross-Site-Request-Forgery (CSRF)?",o:["Ein XSS-Angriff","Ein SQL-Angriff","Ein Phishing-Angriff","Angriff der Nutzer zwingt ungewollte Aktionen auf authentifizierten Webseiten auszuführen"],a:3,e:"CSRF: Browser sendet Cookies automatisch mit. Schutz: CSRF-Token, SameSite-Cookie, Origin-Header prüfen."},
{id:141,t:"compiler",q:"Was ist objektorientierte Programmierung (OOP)?",o:["Eine Programmiersprache","Paradigma das Daten und Methoden in Objekten (Instanzen von Klassen) kapselt","Ein Framework","Ein Betriebssystem"],a:1,e:"OOP: Kapselung, Vererbung, Polymorphie, Abstraktion. Java, Python, C++, C#, Ruby. Fördert Wiederverwendbarkeit."},
{id:142,t:"compiler",q:"Was ist funktionale Programmierung?",o:["OOP-Variante","Eine Datenbank","Paradigma das Berechnungen als Auswertung mathematischer Funktionen behandelt – keine Seiteneffekte (Haskell, Erlang, Scala)","Ein Betriebssystem"],a:2,e:"Funktional: Pure Functions, Immutability, Higher-Order Functions, Map/Filter/Reduce. Python, JavaScript unterstützen beide Stile."},
{id:143,t:"compiler",q:"Was ist prozedurale Programmierung?",o:["Paradigma das Programme als Folge von Prozeduren/Funktionen strukturiert (C, Pascal, FORTRAN)","OOP","Logische Programmierung","Funktionale Programmierung"],a:0,e:"Prozedural: Code in Funktionen aufteilen. Top-Down-Design. C ist prozedural. Einfacher als OOP für kleine Programme."},
{id:144,t:"compiler",q:"Was ist eine Variable?",o:["Benannter Speicherbereich der einen Wert speichert der sich ändern kann (int x = 5)","Eine Funktion","Ein Datentyp","Ein fester Wert"],a:0,e:"Variable: Name, Datentyp, Wert, Adresse. Gültigkeitsbereich (lokal/global). Strongly-typed vs. dynamisch typisiert."},
{id:145,t:"compiler",q:"Was ist Rekursion?",o:["Eine Schleife","Ein Algorithmus","Funktion die sich selbst aufruft – braucht Basisfall (Abbruchbedingung) um infinite Rekursion zu vermeiden","Ein Datentyp"],a:2,e:"Rekursion: Fakultät (n! = n * (n-1)!), Fibonacci, Baumtraversal. Stack Frame pro Aufruf. Stack Overflow bei zu tiefer Rekursion."},
{id:146,t:"compiler",q:"Was ist ein regulärer Ausdruck (Regex)?",o:["Ein mathematischer Begriff","Muster-Sprache zum Suchen und Verarbeiten von Zeichenketten (z.B. E-Mail-Validierung: ^[\w+@\w+\.\w+$)","Ein Netzwerkprotokoll","Ein Algorithmus"],a:1,e:"Regex: grep (Linux), Python re-Modul, JavaScript /pattern/flags. Nützlich für: Validierung, Suchen/Ersetzen, Parsing."},
{id:147,t:"sw-arten",q:"Was ist ein CMS (Content Management System)?",o:["Eine Programmiersprache","System zur Verwaltung von Web-Inhalten ohne Programmierkenntnisse (WordPress, Joomla, Drupal, Typo3)","Ein Betriebssystem","Ein Datenbanksystem"],a:1,e:"CMS: WordPress (43% aller Webseiten), Joomla, Drupal. WYSIWYG-Editor, Plugin-System, Themes."},
{id:148,t:"sw-arten",q:"Was ist ein ERP-System?",o:["Ein CMS","Ein Datenbanksystem","Ein Content-System","Enterprise Resource Planning: integriertes System für Unternehmensressourcen (SAP, Microsoft Dynamics, Oracle)"],a:3,e:"ERP: integriert Finanzbuchhaltung, Einkauf, Vertrieb, Produktion, HR in einem System. SAP dominiert Enterprise-Markt."},
{id:149,t:"sw-arten",q:"Was ist ein CRM-System?",o:["Customer Relationship Management: verwaltet Kundenbeziehungen, Verkaufspipelines, Support (Salesforce, HubSpot)","Ein Dateisystem","Ein Buchhaltungs-System","Ein ERP-System"],a:0,e:"CRM: Lead-Management, Kontaktverwaltung, Email-Automatisierung, Reporting. Salesforce: größter CRM-Anbieter."},
{id:150,t:"sw-arten",q:"Was ist ein DBMS (Datenbankverwaltungssystem)?",o:["Software zur Verwaltung von Datenbanken: Zugriffskontrolle, Abfragen, Transaktionen (MySQL, PostgreSQL, Oracle, SQL Server)","Ein Betriebssystem","Eine Datenbank","Ein Dateisystem"],a:0,e:"DBMS: relationale (SQL), dokumentenbasierte (MongoDB), Schlüssel-Wert (Redis), spaltenbasierte (Cassandra)."},
{id:151,t:"cloud",q:"Was ist REST?",o:["Representational State Transfer: Architekturstil für APIs über HTTP (GET, POST, PUT, DELETE, PATCH)","Ein Protokoll","Ein Betriebssystem","Ein Schlafzustand"],a:0,e:"REST: stateless, Client-Server, einheitliche Schnittstelle. JSON als Datenformat. HTTP-Statuscodes: 200, 201, 404, 500."},
{id:152,t:"cloud",q:"Was ist GraphQL?",o:["Eine Datenbank","Ein Netzwerkprotokoll","Abfragesprache für APIs: Client bestimmt exakt welche Daten er braucht – vermeidet Over-/Underfetching","Ein Betriebssystem"],a:2,e:"GraphQL (Facebook/Meta): ein Endpoint, flexibler als REST. Client fragt genau was er braucht. Apollo, Hasura."},
{id:153,t:"cloud",q:"Was ist ein Webhook?",o:["HTTP-Callback: Server sendet automatisch Daten an URL wenn ein Ereignis eintritt (statt Polling)","Ein Monitoring-Tool","Ein Browser-Plugin","Ein API-Gateway"],a:0,e:"Webhook: Zahlungs-Provider sendet bei erfolgreicher Zahlung POST-Request. Effizienter als regelmäßiges Polling."},
{id:154,t:"cloud",q:"Was ist Caching?",o:["Eine Backup-Strategie","Zwischenspeicherung häufig benötigter Daten für schnelleren Zugriff (Browser-Cache, Redis, CDN, CPU-Cache)","Datensicherung","Ein Verschlüsselungsverfahren"],a:1,e:"Cache-Strategie: Cache-Aside, Read-Through, Write-Through, Write-Behind. Redis: In-Memory-Datenbank als Cache."},
{id:155,t:"cloud",q:"Was ist ein API-Gateway?",o:["Ein Proxy","Ein Firewall","Zentraler Einstiegspunkt für Microservices-APIs: Routing, Auth, Rate-Limiting, Logging, Load Balancing","Ein Router"],a:2,e:"API-Gateway: AWS API Gateway, Kong, nginx. Entkoppelt Clients von Microservices. SSL-Terminierung, Caching."},
{id:156,t:"quali",q:"Was ist Code-Coverage?",o:["Anzahl der Codezeilen","Anteil des Codes der durch Tests ausgeführt wird – Metrik für Test-Vollständigkeit (Ziel: >80%)","Ein Deployment-Metrik","Ein Qualitätsmaß für Design"],a:1,e:"Coverage-Typen: Line (welche Zeilen), Branch (welche if/else), Path (welche Pfade). JaCoCo (Java), Istanbul (JS)."},
{id:157,t:"quali",q:"Was ist Pair Programming?",o:["Ein Framework","Zwei Entwickler arbeiten gemeinsam an einem Code: Driver (tippt) und Navigator (prüft) – verbessert Qualität","Eine Testing-Methode","Remote-Arbeit"],a:1,e:"Pair Programming: sofortiger Code-Review, Wissenstransfer, weniger Bugs. Teuer aber sehr effektiv."},
{id:158,t:"quali",q:"Was ist ein Sprint Review?",o:["Eine Retrospektive","SCRUM-Zeremonie: Team präsentiert am Sprint-Ende abgeschlossene Arbeit dem Product Owner und Stakeholdern","Ein Daily Standup","Eine Code-Review"],a:1,e:"Sprint Review: Was wurde fertiggestellt? Demonstration der Funktionen. Stakeholder-Feedback. Backlog anpassen."},
{id:159,t:"quali",q:"Was ist eine Retrospektive (SCRUM)?",o:["Eine Code-Review","Ein Planning","SCRUM-Zeremonie: Team reflektiert am Sprint-Ende: Was lief gut? Was schlecht? Was verbessern?","Ein Sprint Review"],a:2,e:"Retro: Continuous Improvement. Aktionspunkte für nächsten Sprint. Formate: Start/Stop/Continue, Mad/Sad/Glad."},
{id:160,t:"quali",q:"Was ist ein Product Backlog?",o:["Ein Sprint-Plan","Eine To-Do-Liste","Priorisierte Liste aller gewünschten Features und Anforderungen für das Produkt – vom Product Owner verwaltet","Ein Testplan"],a:2,e:"Product Backlog: User Stories, Epics, Bugs. Priorisiert nach Geschäftswert. Grooming/Refinement: Details klären."},
{id:161,t:"compiler",q:"Was ist ein Datentyp?",o:["Ein Variablenname","Ein Algorithmus","Klassifikation von Daten die angibt welche Werte eine Variable speichern kann (int, float, string, bool)","Eine Funktion"],a:2,e:"Primitive: int, float, bool, char. Zusammengesetzt: Array, String, Struct, Object. Stark vs. schwach typisiert."},
{id:162,t:"compiler",q:"Was ist ein Array?",o:["Eine einzelne Variable","Ein Datentyp","Geordnete Sammlung von Elementen desselben Typs mit Index-Zugriff (arr[0], arr[1], ...)","Eine Funktion"],a:2,e:"Array: feste oder dynamische Größe. O(1) für Index-Zugriff. C-Array: feste Größe. Python-List: dynamisch."},
{id:163,t:"compiler",q:"Was ist ein Dictionary/HashMap?",o:["Ein Stack","Ein Buch","Ein Array","Schlüssel-Wert-Datenstruktur: schneller Zugriff über Schlüssel O(1) (Python dict, Java HashMap, JS Object)"],a:3,e:"HashMap: Hashing-Funktion für O(1) Zugriff. Kollisionen durch Chaining oder Open Addressing gelöst."},
{id:164,t:"compiler",q:"Was ist eine verknüpfte Liste (Linked List)?",o:["Ein Stack","Ein Array","Datenstruktur wo jedes Element einen Zeiger auf das nächste Element enthält – dynamische Größe","Eine Queue"],a:2,e:"Linked List: schnelles Einfügen/Löschen O(1), langsamer Zugriff O(n). Singly/Doubly/Circular. Basis für Stack/Queue."},
{id:165,t:"compiler",q:"Was ist ein Stack (Datenstruktur)?",o:["Ein Stapelüberlauf","LIFO-Datenstruktur (Last In, First Out): push() und pop(). Nutzung: Funktionsaufruf-Stack, Undo-Funktion","Eine Queue","Ein Array"],a:1,e:"Stack: Browser-History (zurück), Undo/Redo, Klammer-Überprüfung, Infix→Postfix-Konvertierung."},
{id:166,t:"compiler",q:"Was ist eine Queue (Datenstruktur)?",o:["FIFO-Datenstruktur (First In, First Out): enqueue() und dequeue(). Nutzung: Druckwarteschlange, Message Queue","Ein Baum","Ein Stack","Ein Array"],a:0,e:"Queue: Druckerwarteschlange, Prozess-Scheduling, BFS (Breitensuche), Event-Loop in JavaScript."},
{id:167,t:"compiler",q:"Was ist Binäre Suche?",o:["Sequentielle Suche","Eine Sortierungsmethode","Ein Hash-Algorithmus","Effiziente Suchmethode in sortierten Arrays: halbiert Suchbereich bei jedem Schritt – O(log n)"],a:3,e:"Binary Search: O(log n) vs. lineare Suche O(n). Voraussetzung: sortiertes Array. Klassisches Divide-and-Conquer."},
{id:168,t:"compiler",q:"Was ist Bubble Sort?",o:["Ein Suchalgorithmus","Ein Graphen-Algorithmus","Einfacher Sortier-Algorithmus: vergleicht benachbarte Elemente und tauscht sie – O(n²), sehr ineffizient","Ein effizienter Sortier-Algorithmus"],a:2,e:"Bubble Sort: O(n²) worst/average. Nur für Lernzwecke. Effizientere Algorithmen: QuickSort O(n log n), MergeSort O(n log n)."},
{id:169,t:"compiler",q:"Was ist ein Algorithmus?",o:["Ein Programm","Endliche, eindeutige Folge von Anweisungen die ein Problem löst – terminiert, deterministisch","Ein Betriebssystem","Eine Programmiersprache"],a:1,e:"Algorithmus-Eigenschaften: Endlichkeit, Eindeutigkeit, Ausführbarkeit, Korrektheit, Effizienz. O-Notation für Komplexität."},
{id:170,t:"compiler",q:"Was ist Big-O-Notation?",o:["Ein Framework","Ein Datentyp","Beschreibt die Laufzeit-/Speicherkomplexität eines Algorithmus im Worst-Case in Abhängigkeit der Eingabegröße","Ein Programmierstil"],a:2,e:"O(1) konstant, O(log n) logarithmisch, O(n) linear, O(n log n) log-linear, O(n²) quadratisch, O(2^n) exponentiell."},
{id:171,t:"bs",q:"Was ist Containerisierung?",o:["Eine VM","Technologie die Anwendungen mit ihren Abhängigkeiten in isolierten Containern verpackt (Docker)","Datensicherung","Ein Betriebssystem"],a:1,e:"Container: teilen OS-Kernel des Hosts. Schnell starten, portabel, konsistente Umgebung. Basis für Cloud-native Apps."},
{id:172,t:"bs",q:"Was ist ein Cron-Job?",o:["Ein Benutzer","Ein Dateisystem","Geplante automatisierte Aufgabe in Linux/Unix die zu bestimmten Zeiten ausgeführt wird","Ein Netzwerkdienst"],a:2,e:"Cron: * * * * * = Minute Stunde Tag Monat Wochentag. '0 2 * * *' = täglich um 2:00 Uhr. crontab -e bearbeiten."},
{id:173,t:"bs",q:"Was ist ein Service (Windows)?",o:["Hintergrundprozess in Windows der ohne Benutzeranmeldung läuft (wie Daemon in Linux)","Eine Anwendung","Ein Treiber","Ein Kernel-Modul"],a:0,e:"Windows Service: services.msc oder sc.exe. Startet mit System. Beispiele: Windows Update, DHCP Client, Print Spooler."},
{id:174,t:"sw-arten",q:"Was ist ein Plugin?",o:["Ein eigenständiges Programm","Erweiterung die Funktionalität zu einer bestehenden Software hinzufügt (Browser-Addon, WordPress-Plugin)","Ein Framework","Ein Betriebssystem"],a:1,e:"Plugin/Extension/Addon: nahtlose Integration. Browser-Plugins: uBlock Origin, LastPass. IDE-Plugins: ESLint, Prettier."},
{id:175,t:"sw-arten",q:"Was ist ein Makro?",o:["Ein großes Programm","Ein Betriebssystem","Automatisierungssequenz von Aktionen/Befehlen die per Tastendruck ausgeführt werden (Office-Makros, VBA)","Ein Plugin"],a:2,e:"Makro: Office-Makros (VBA), Terminal-Makros. Vorsicht: Office-Makros häufiger Malware-Verbreitungsweg!"},
{id:176,t:"cloud",q:"Was ist ein CDN?",o:["Ein lokales Netzwerk","Ein VPN","Ein DNS-Server","Content Delivery Network: verteiltes Servernetzwerk das Inhalte nah beim Nutzer ausliefert (Cloudflare, Akamai)"],a:3,e:"CDN: reduziert Latenz, erhöht Verfügbarkeit, DDoS-Schutz. Statische Inhalte (Bilder, JS, CSS) werden gecacht."},
{id:177,t:"cloud",q:"Was ist ein SLA?",o:["Ein Datenschutzvertrag","Software License Agreement","Service Level Agreement: definiert messbare Servicezusagen (Verfügbarkeit, Reaktionszeit, Support)","Ein Kaufvertrag"],a:2,e:"SLA: 99,9% Verfügbarkeit = max. 8,76h Ausfall/Jahr. Penalties bei Nichteinhaltung. MTTR, MTBF als Kennzahlen."},
{id:178,t:"cloud",q:"Was ist ein Data Lake?",o:["Ein Datenbanktyp","Ein Backup-System","Zentrales Repository für rohe, unstrukturierte und strukturierte Daten in großem Maßstab (AWS S3, Azure Data Lake)","Ein Cloud-Dienst"],a:2,e:"Data Lake: Schema-on-Read (Struktur beim Lesen). Vs. Data Warehouse: Schema-on-Write. Für Big Data Analytics."},
{id:179,t:"cloud",q:"Was ist Big Data?",o:["Ein Cloud-Dienst","Große Datenbanken","Sehr große Datenmengen die mit traditionellen Methoden nicht verarbeitet werden können (5 V's: Volume, Velocity, Variety, Veracity, Value)","Ein Algorithmus"],a:2,e:"Big Data: Apache Hadoop, Spark. 3 V's: Volumen (Petabyte), Geschwindigkeit (Echtzeit), Vielfalt (Strukturiert/Unstrukturiert)."},
{id:180,t:"cloud",q:"Was ist künstliche Intelligenz in der Cloud?",o:["Eine Cloud-Anwendung","Nur lokale KI","Cloud-Dienste die KI-Funktionen als APIs bereitstellen (AWS SageMaker, Azure AI, Google Cloud AI/ML)","Nur ChatGPT"],a:2,e:"KI-as-a-Service: vorgefertigte Modelle (Bilderkennungs-API, Übersetzungs-API). Keine eigene KI-Infrastruktur nötig."},
{id:181,t:"quali",q:"Was ist ein Mockup?",o:["Ein fertiges Design","Visuelle Darstellung (Entwurf) einer Anwendung/Webseite vor der Entwicklung – zeigt Layout und Design","Ein vollständiges Produkt","Ein Prototyp"],a:1,e:"Mockup: Figma, Adobe XD, Sketch. Zeigt UI ohne Funktion. Wireframe (grob) → Mockup (Detail) → Prototyp (interaktiv)."},
{id:182,t:"quali",q:"Was ist User Story?",o:["Ein Test-Fall","Kurze Beschreibung einer Funktion aus Nutzerperspektive: 'Als [Nutzer] möchte ich [Funktion] um [Nutzen]'","Ein Requirement-Dokument","Ein Benutzerhandbuch"],a:1,e:"User Story: Akzeptanzkriterien definieren wann Story 'Done' ist. Story Points für Aufwandschätzung. Epic = große Story."},
{id:183,t:"quali",q:"Was ist Definition of Done (DoD)?",o:["Gemeinsame Vereinbarung wann eine User Story als vollständig gilt (Code geschrieben, getestet, reviewed, dokumentiert)","Ein Sprint-Plan","Ein Abnahmeprotokoll","Ein Testplan"],a:0,e:"DoD: Code Review bestanden, Unit-Tests grün, Code deployed, Dokumentation aktuell. Qualitätsstandard für Team."},
{id:184,t:"quali",q:"Was ist ein Burndown-Chart?",o:["Diagramm das verbleibende Arbeit über Zeit im Sprint zeigt – erkennt ob Team im Zeitplan liegt","Ein Fehlerdiagramm","Ein Qualitätsdiagramm","Ein Architektur-Diagramm"],a:0,e:"Burndown: y-Achse=Story Points, x-Achse=Tage. Ideale Linie vs. tatsächliche Linie. Sprint- und Release-Burndown."},
{id:185,t:"quali",q:"Was ist Velocity (SCRUM)?",o:["Codequalität","Teamgeschwindigkeit","Durchschnittliche Story Points pro Sprint – für Planung zukünftiger Sprints und Release-Prognose","Testabdeckung"],a:2,e:"Velocity: stabilisiert sich nach 3-4 Sprints. Vergleich zwischen Sprints möglich. Keine Metrik für Teamleistung!"},
{id:186,t:"security",q:"Was ist ein Penetrationstest?",o:["Ein Virenscan","Ein Backup","Ein Software-Test","Autorisierter Angriff auf eigene Systeme zur Aufdeckung von Sicherheitslücken – ethisches Hacking"],a:3,e:"Pentest: Black-Box (kein Vorwissen), White-Box (volle Info), Grey-Box. Tools: Metasploit, Burp Suite, Nmap."},
{id:187,t:"security",q:"Was ist das Principle of Least Privilege?",o:["Nutzer/Prozesse erhalten nur die Mindestrechte die für ihre Aufgaben nötig sind – minimiert Angriffsfläche","Ein Netzwerkprinzip","Jeder hat alle Rechte","Ein Backup-Prinzip"],a:0,e:"Least Privilege: Standard-Nutzer statt Admin, Read-Only wenn keine Schreibrechte nötig. Wichtigstes Sicherheitsprinzip."},
{id:188,t:"security",q:"Was ist Defense in Depth?",o:["Mehrschichtige Sicherheitsstrategie: mehrere unabhängige Sicherheitsmaßnahmen die sich gegenseitig ergänzen","Ein Antivirus","Eine Firewall","Eine VPN"],a:0,e:"Defense in Depth: Firewall + IDS + Antivirus + Verschlüsselung + MFA. Eine Schicht versagt → nächste schützt noch."},
{id:189,t:"security",q:"Was ist eine WAF?",o:["Eine Netzwerk-Firewall","Web Application Firewall: filtert HTTP/HTTPS-Traffic und schützt vor SQL-Injection, XSS, CSRF","Ein Netzwerk-Gerät","Ein VPN"],a:1,e:"WAF: AWS WAF, ModSecurity, Cloudflare. Layer-7-Schutz. OWASP Top 10 als Grundlage für Regeln."},
{id:190,t:"sw-arten",q:"Was ist Firmware?",o:["Software fest in Hardware eingebettet – steuert grundlegende Gerätefunktionen (BIOS/UEFI, Router, Drucker)","Ein Betriebssystem","Ein Treiber","Eine App"],a:0,e:"Firmware: Flash-Speicher (ROM/EEPROM). Updates: Router-Firmware, BIOS-Update. Sicherheitslücken in Firmware gefährlich."},
{id:191,t:"compiler",q:"Was ist ein Design Pattern (Entwurfsmuster)?",o:["Eine Programmiersprache","Ein UI-Design","Ein Framework","Bewährte Lösungsvorlage für wiederkehrende Software-Designprobleme (Singleton, Factory, Observer, MVC)"],a:3,e:"GoF-Patterns: Creational (Singleton, Factory), Structural (Adapter, Decorator), Behavioral (Observer, Strategy)."},
{id:192,t:"compiler",q:"Was ist das MVC-Pattern?",o:["Ein Betriebssystem","Ein Netzwerkprotokoll","Ein Framework","Model-View-Controller: trennt Daten (Model), Darstellung (View) und Logik (Controller) in Webanwendungen"],a:3,e:"MVC: Django, Ruby on Rails, Spring MVC. Model=Datenbank, View=HTML-Template, Controller=Business Logic."},
{id:193,t:"compiler",q:"Was ist Polymorphismus?",o:["Mehrere Klassen","Viele Variablen","Mehrfachvererbung","Fähigkeit dass gleicher Methodenname unterschiedliches Verhalten in verschiedenen Klassen hat (Überschreiben)"],a:3,e:"Polymorphismus: dynamische Bindung (Runtime Polymorphism). Interface/abstrakte Klasse definiert Vertrag. Duck Typing in Python."},
{id:194,t:"compiler",q:"Was ist Vererbung (Inheritance)?",o:["Kindklassen übernehmen Eigenschaften/Methoden der Elternklasse und können sie erweitern oder überschreiben","Ein Datentyp","Ein Entwurfsmuster","Code kopieren"],a:0,e:"Vererbung: extends (Java), : (C++), Subclass (Python). DRY-Prinzip. Mehrfachvererbung: C++ (Probleme), Python (MRO)."},
{id:195,t:"compiler",q:"Was ist Kapselung (Encapsulation)?",o:["Zusammenfassung von Daten und Methoden in einer Klasse + Zugriffskontrolle durch private/public/protected","Daten löschen","Daten verstecken","Daten komprimieren"],a:0,e:"Kapselung: private Attribute, Getter/Setter. Verhindert unkontrollierten Zugriff. Java: private int age; getAge()."},
{id:196,t:"compiler",q:"Was ist Abstraktion?",o:["Ein Datentyp","Alles verstecken","Ein Algorithmus","Komplexität verbergen und nur relevante Details nach außen zeigen (Interface, abstrakte Klasse)"],a:3,e:"Abstraktion: Interface definiert WAS, Implementierung definiert WIE. Nutzer muss nicht wissen wie es intern funktioniert."},
{id:197,t:"sw-arten",q:"Was sind Vor- und Nachteile von Open-Source-Software?",o:["Vorteile: kostenlos, transparent, Community-Support, anpassbar. Nachteile: kein kommerzieller Support, Sicherheitsrisiko bei schlechtem Code","Nur Nachteile","Nur Vorteile","Kein Unterschied zu proprietär"],a:0,e:"Open Source: Vorteile überwiegen oft. Sicherheit: mehr Augen sehen Code (Linus' Law). Aber: Heartbleed in OpenSSL war open source!"},
{id:198,t:"quali",q:"Was ist A/B-Testing?",o:["Unit-Testing","Ein Lasttest","Zwei Varianten einer Funktion/UI werden parallel an verschiedenen Nutzergruppen getestet – datenbasierte Entscheidung","Ein Penetrationstest"],a:2,e:"A/B-Test: Variante A (Kontrolle) vs. Variante B (Experiment). Statistische Signifikanz wichtig. Google Optimize, Optimizely."},
{id:199,t:"cloud",q:"Was ist ein Service Mesh?",o:["Infrastrukturschicht für Microservices-Kommunikation: Lastverteilung, Verschlüsselung, Observability (Istio, Linkerd)","Ein Netzwerk","Ein API-Gateway","Ein Cloud-Dienst"],a:0,e:"Service Mesh: Sidecar-Proxy (Envoy). mTLS zwischen Services, Circuit Breaker, Distributed Tracing."},
{id:200,t:"quali",q:"Was ist Observability (Beobachtbarkeit)?",o:["Ein Testing-Framework","Fähigkeit den internen Zustand eines Systems aus seinen Ausgaben zu verstehen: Logs, Metrics, Traces","Nur Monitoring","Ein Deployment-Tool"],a:1,e:"3 Säulen: Logs (Ereignisse), Metrics (Zahlen), Traces (Request-Pfad). ELK-Stack, Prometheus+Grafana, Jaeger."}
];

let state={};
let order=Q.map(q=>q.id);
let cf={t:'all',s:'all',q:''};
function init(){Q.forEach(q=>{state[q.id]={sel:null,ans:false};});upStats();}
function mkCard(q){
  const s=state[q.id];
  const d=document.createElement('div');
  d.className='card';d.id='c'+q.id;
  if(s.ans)d.classList.add(s.sel===q.a?'ok':'err');
  const opts=q.o.map((o,i)=>{
    let c='op';
    if(s.ans){c+=' dis';if(i===q.a)c+=' cor';else if(i===s.sel)c+=' wrg';}
    else if(i===s.sel)c+=' sel';
    return`<div class="${c}" onclick="pick(${q.id},${i})"><div class="ol">${['A','B','C','D'][i]}</div><div class="ot">${o}</div></div>`;
  }).join('');
  const ec=s.ans?('exp show'+(s.sel!==q.a?' werr':'')):'exp';
  d.innerHTML=`<div class="qh"><div class="qn">Frage ${q.id}/200</div><span class="tag">${q.t}</span></div>
  <div class="qb"><div class="qt">${q.q}</div><div class="ops">${opts}</div><div class="${ec}">💡 ${q.e}</div></div>`;
  return d;
}
function render(){
  const g=document.getElementById('grid');g.innerHTML='';
  const shown={};
  order.forEach(id=>{
    const q=Q.find(x=>x.id===id);if(!q||!passes(q))return;
    if(!shown[q.t]&&cf.t==='all'){shown[q.t]=true;const h=document.createElement('div');h.className='sh';h.textContent=q.t;g.appendChild(h);}
    g.appendChild(mkCard(q));
  });
}
function passes(q){
  const s=state[q.id];
  if(cf.t!=='all'&&q.t!==cf.t)return false;
  if(cf.s==='open'&&s.ans)return false;
  if(cf.s==='wrong'&&(!s.ans||s.sel===q.a))return false;
  if(cf.q&&!q.q.toLowerCase().includes(cf.q))return false;
  return true;
}
function pick(id,i){
  const s=state[id];if(s.ans)return;
  s.sel=i;s.ans=true;
  document.getElementById('c'+id).replaceWith(mkCard(Q.find(q=>q.id===id)));
  upStats();upProg();
}
function upStats(){
  let c=0,w=0,o=0;
  Q.forEach(q=>{const s=state[q.id];if(!s.ans)o++;else if(s.sel===q.a)c++;else w++;});
  document.getElementById('sc').textContent=c;document.getElementById('sw').textContent=w;document.getElementById('so').textContent=o;document.getElementById('sb').textContent=c+' Pkt';
}
function upProg(){
  const a=Q.filter(q=>state[q.id].ans).length;
  document.getElementById('pf').style.width=(a/Q.length*100)+'%';document.getElementById('pt').textContent=a+' / '+Q.length;
}
function ft(t,btn){cf.t=t;cf.s='all';cf.q='';document.getElementById('si').value='';document.querySelectorAll('.fb').forEach(b=>b.classList.remove('ac','aa'));btn.classList.add('ac');render();}
function fs(s,btn){cf.s=cf.s===s?'all':s;cf.t='all';document.querySelectorAll('.fb').forEach(b=>b.classList.remove('ac','aa'));document.querySelectorAll('.fb')[0].classList.add('ac');if(cf.s!=='all')btn.classList.add('aa');render();}
function fsearch(){cf.q=document.getElementById('si').value.toLowerCase();render();}
function shuffle(){for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}cf={t:'all',s:'all',q:''};document.getElementById('si').value='';document.querySelectorAll('.fb').forEach(b=>b.classList.remove('ac','aa'));document.querySelectorAll('.fb')[0].classList.add('ac');render();}
function showall(){cf={t:'all',s:'all',q:''};document.getElementById('si').value='';document.querySelectorAll('.fb').forEach(b=>b.classList.remove('ac','aa'));document.querySelectorAll('.fb')[0].classList.add('ac');render();}
function resetAll(){Q.forEach(q=>{state[q.id]={sel:null,ans:false};});order=Q.map(q=>q.id);upStats();upProg();document.getElementById('rp').classList.remove('show');render();}
function showRes(){
  let c=0,w=0,o=0;Q.forEach(q=>{const s=state[q.id];if(!s.ans)o++;else if(s.sel===q.a)c++;else w++;});
  const a=c+w,p=a>0?Math.round(c/a*100):0;
  const grades=[[92,'🏆 Sehr gut!'],[81,'✅ Gut – Prüfungsfit!'],[67,'🟡 Befriedigend'],[50,'🟠 Ausreichend']];
  const g=grades.find(([t])=>p>=t)?.[1]||'🔴 Noch üben!';
  document.getElementById('rs').textContent=p+'%';document.getElementById('rg').textContent=g;
  document.getElementById('rc').textContent=c;document.getElementById('rw').textContent=w;document.getElementById('ro').textContent=o;document.getElementById('rpts').textContent=c;
  const rp=document.getElementById('rp');rp.classList.add('show');rp.scrollIntoView({behavior:'smooth'});
}
init();render();
</script></body></html>
