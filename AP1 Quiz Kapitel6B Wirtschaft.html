<script>
const Q=[
{id:1,b:"6.9",t:"Vertragsarten",q:"Was ist ein Kaufvertrag?",o:["Nutzungsrecht gegen Gebuehr","Rechtsverbindliche Vereinbarung ueber entgeltlichen Erwerb von Waren oder Dienstleistungen","Herstellung eines Werks","Nutzung ohne Eigentumserwerb"],a:1,f:"Kaufvertrag: Eigentumsuebergang gegen Zahlung. Pflichten: Verkaeufer liefert mangelfreie Ware, Kaeufer zahlt Kaufpreis. Geregelt in BGB SS433 ff."},
{id:2,b:"6.9",t:"Vertragsarten",q:"Was ist ein Mietvertrag?",o:["Nutzung einer Sache gegen regelmaessige Mietzahlung ohne Eigentumserwerb","Erbringung von Dienstleistungen","Eigentumsuebergang","Herstellung eines Werks"],a:0,f:"Mietvertrag: Vermieter stellt Sache zur Nutzung bereit und haelt sie instand. Mieter zahlt regelmaessig und behandelt Sache sorgfaeltig. Kein Eigentumsuebergang."},
{id:3,b:"6.9",t:"Vertragsarten",q:"Was ist Leasing?",o:["Spezielle Mietform: Leasingnehmer nutzt Sache gegen Leasingrate, Leasinggeber bleibt Eigentuemer und traegt meist Restwertrisiko","Langfristiger Mietvertrag","Finanzierungsvertrag mit Eigentumserwerb","Kauf mit Ratenzahlung"],a:0,f:"Leasing: aehnlich Miete, aber typisch fuer Investitionsgueter (Fahrzeuge, IT-Equipment). Leasingnehmer nutzt, Leasinggeber ist Eigentuemer und traegt Restwertrisiko."},
{id:4,b:"6.9",t:"Vertragsarten",q:"Was ist ein Werkvertrag?",o:["Verpflichtung zur Herstellung eines konkreten Werks (Ergebnis) - Bezahlung erst nach erfolgreicher Abnahme","Nutzungsrecht","Dauerschuldverhaeltnis","Erbringen einer Taetigkeit"],a:0,f:"Werkvertrag: geschuldet ist ein Erfolg (das fertige Werk), nicht nur Taetigkeit. Beispiele: Software-Entwicklung, Reparatur, Bau. Bezahlung nach Abnahme."},
{id:5,b:"6.9",t:"Vertragsarten",q:"Was ist ein Dienstvertrag?",o:["Herstellung eines Werks","Erbringung von Dienstleistungen ohne Erfolgsgarantie - Bezahlung fuer die Taetigkeit unabhaengig vom Ergebnis","Mietvertrag","Kaufvertrag"],a:1,f:"Dienstvertrag: geschuldet ist Taetigkeit, nicht Ergebnis. Beispiele: Arbeitsvertrag, Arztbehandlung, Steuerberatung. Bezahlung auch wenn Ergebnis nicht wie gewuenscht."},
{id:6,b:"6.9",t:"Vertragsarten",q:"Was ist der Unterschied zwischen Werk- und Dienstvertrag?",o:["Dienstvertrag ist teurer","Kein Unterschied","Werkvertrag ist kuerzfristiger","Werkvertrag schuldet Erfolg (fertiges Werk), Dienstvertrag schuldet nur Taetigkeit (kein garantiertes Ergebnis)"],a:3,f:"Werkvertrag: Auftragnehmer schuldet Ergebnis (funktionierende Software). Dienstvertrag: Auftragnehmer schuldet Taetigkeit (Beratungsstunden). Wichtig fuer Haftung bei Maengeln."},
{id:7,b:"6.9",t:"Vertragsarten",q:"Was ist ein Werkliefervertrag?",o:["Kombination aus Werk- und Kaufvertrag: Herstellung UND Lieferung eines individuellen Werks (z.B. massgeschneiderte Moebel, kundenspezifische Hardware)","Mietvertrag mit Werkleistung","Reiner Werkvertrag","Reiner Kaufvertrag"],a:0,f:"Werkliefervertrag: Auftragnehmer stellt individuelles Werk her UND liefert es. Kombination aus Werkvertrag (Herstellung) und Kaufrecht (Lieferung). Beispiel: massgeschneiderte IT-Hardware."},
{id:8,b:"6.9",t:"Vertragsarten",q:"Was ist ein Servicevertrag (Wartungsvertrag)?",o:["Mietvertrag","Einmaliger Reparaturauftrag","Langfristiger Vertrag ueber regelmaessige Wartung oder Supportleistungen (z.B. IT-Supportvertrag, Wartungsvertrag fuer Server)","Kaufvertrag"],a:2,f:"Servicevertrag: regelmaessige Wartung, Entstoerung und Support gegen Pauschalgebuehr. Beispiele: IT-Supportvertrag (Helpdesk), Wartungsvertrag fuer Server, Geraetepflege."},
{id:9,b:"6.9",t:"Vertragsarten",q:"Was ist ein Lizenzvertrag?",o:["Kaufvertrag fuer Software","Dienstvertrag","Mietvertrag fuer Software","Erlaubt die Nutzung von Rechten (z.B. Software, Patente, Marken) gegen Gebuehr - kein Eigentumserwerb"],a:3,f:"Lizenzvertrag: Lizenzgeber erteilt Nutzungsrechte, Lizenznehmer haelt sich an Bedingungen. Kein Eigentumserwerb. Typisch fuer Software, Patente, Marken."},
{id:10,b:"6.9",t:"Vertragsarten",q:"Welche Pflichten hat der Verkaeufer im Kaufvertrag?",o:["Nur Verpackung","Nur Lieferung","Lieferung der Ware, Verschaffung von Eigentum und Uebergabe einer mangelfreien Sache","Nur Zahlung annehmen"],a:2,f:"Verkaeufer-Pflichten: mangelfreie Ware liefern, Eigentum uebertragen, Ware rechtzeitig liefern. Maengel = Gewaehrleistungsansprueche des Kaeufers."},
{id:11,b:"6.9",t:"Vertragsarten",q:"Was ist ein SLA (Service Level Agreement)?",o:["Kaufvertrag","Vereinbarung ueber Qualitaet und Verfuegbarkeit eines Dienstes: Uptime, Reaktionszeiten, Wiederherstellungszeit","Lizenzvertrag","Arbeitsvertrag"],a:1,f:"SLA: definiert messbare Servicequalitaet. Typische Parameter: Verfuegbarkeit (z.B. 99,9%), Reaktionszeit bei Stoerungen (z.B. 1 Stunde bei kritisch), Wiederherstellungszeit."},
{id:12,b:"6.9",t:"Vertragsarten",q:"Was ist ein Rahmenvertrag?",o:["Grundsatzvertrag der Konditionen fuer zukuenftige Einzelbestellungen regelt (Preise, Liefer- und Zahlungsbedingungen) - spart Verhandlungsaufwand","Lizenzvertrag","Jaehrlicher Servicevertrag","Einzelner Kaufvertrag"],a:0,f:"Rahmenvertrag: einmalig ausgehandelte Konditionen fuer alle kuenftigen Bestellungen. Spart Verhandlungszeit, sichert guenstige Preise bei regelmaessigem Bedarf."},
{id:13,b:"6.9",t:"Vertragsarten",q:"Was ist Zustandekommen eines Vertrags?",o:["Nur schriftliche Vereinbarung","Angebot + Annahme (Einigung ueber wesentliche Punkte) - grundsaetzlich auch muendlich oder per Handschlag moeglich","Nur nach Bezahlung","Nur mit Notar"],a:1,f:"Vertrag = Angebot + Annahme. Grundsaetzlich formfrei (auch muendlich). Ausnahmen: Immobilien (Notar), Buergschaften (Schriftform). IT-Vertraege oft schriftlich aus Beweisgrundsaetzen."},
{id:14,b:"6.9",t:"Vertragsarten",q:"Was ist Gewaehrleistung?",o:["Herstellergarantie","Versicherungsschutz","Gesetzliche Haftung des Verkaeufers fuer Maengel die beim Kauf bereits vorhanden waren - 2 Jahre gesetzlich (BGB)","Freiwillige Serviceleistung"],a:2,f:"Gewaehrleistung (Maengelgewaehr): gesetzliche Pflicht, 2 Jahre (BGB). Rechte bei Maengeln: Nacherfuellung (Reparatur/Ersatz), Preisminderung, Ruecktritt, Schadensersatz."},
{id:15,b:"6.9",t:"Vertragsarten",q:"Was ist der Unterschied zwischen Gewaehrleistung und Garantie?",o:["Garantie ist laenger","Gewaehrleistung: gesetzlich vorgeschrieben (2 Jahre, BGB). Garantie: freiwillige Herstellerzusage (z.B. 3 Jahre) oft mit mehr Leistungen","Identisch","Gewaehrleistung ist freiwillig"],a:1,f:"Gewaehrleistung: gesetzlich, 2 Jahre, deckt Maengel bei Kauf. Garantie: freiwillig, vom Hersteller, oft laenger und breiter (z.B. auch Verschleiss). Beide koennen parallel gelten."},
{id:16,b:"6.10",t:"Vertragsbestandteile",q:"Was sind Pflichtbestandteile eines Vertrags?",o:["Nur Liefertermin","Leistungsbeschreibung, Termine, Entgelte (Preise), Parteien, und bei bestimmten Vertraegen Sanktionen/Konventionalstrafen","Nur Preis und Name","Nur Unterschrift"],a:1,f:"Typische Vertragsbestandteile: Parteien, Leistungsbeschreibung (was wird geliefert?), Termine, Entgelt (Preis), Zahlungsbedingungen, Sanktionen, Gerichtsstand, Kuendigungsfristen."},
{id:17,b:"6.10",t:"Vertragsbestandteile",q:"Was ist eine Leistungsbeschreibung im Vertrag?",o:["Detaillierte Beschreibung der geschuldeten Leistung: was genau wird geliefert, welche Qualitaet, welcher Umfang","Zahlungsmodalitaeten","Allgemeine Unternehmensbeschreibung","Preisliste"],a:0,f:"Leistungsbeschreibung: praezise Definition WAS zu leisten ist. Basis fuer Abnahme und Streitvermeidung. Je genauer, desto weniger Interpretationsspielraum und Konflikte."},
{id:18,b:"6.10",t:"Vertragsbestandteile",q:"Was ist eine Konventionalstrafe (Vertragsstrafe)?",o:["Vorab vereinbarte Zahlung bei Vertragsverletzung (z.B. Lieferverzoegerung) - kein Schadensnachweise noetig","Busse","Staatliche Geldstrafe","Schadensersatz nach Nachweis"],a:0,f:"Konventionalstrafe: bei Vertragsverstoß (z.B. Lieferung zu spaet) zahlbar ohne Schadensnachweis. Beispiel: 0,5% des Auftragswertes pro Werktag Verzoegerung, max. 5%."},
{id:19,b:"6.10",t:"Vertragsbestandteile",q:"Was sind Zahlungsbedingungen im Vertrag?",o:["Lieferbedingungen","Regelungen ueber Zahlungszeitpunkt, -form und -fristen (z.B. 30 Tage netto, 2% Skonto bei Zahlung innerhalb 10 Tagen)","Maengelruege","Produktbeschreibung"],a:1,f:"Zahlungsbedingungen: wann (sofort, 14/30 Tage), wie (Ueberweisung, SEPA), Skonto-Regelungen. Zahlungsziel 30 Tage netto = Zahlung innerhalb 30 Tagen ohne Abzug."},
{id:20,b:"6.10",t:"Vertragsbestandteile",q:"Was ist Skonto?",o:["Preisnachlass bei fruehzeitiger Zahlung (z.B. 2% Skonto bei Zahlung innerhalb 10 Tagen)","Mengenrabatt","Rabatt auf Menge","Lieferrabatt"],a:0,f:"Skonto: z.B. 2/10 netto 30 bedeutet: 2% Nachlass wenn innerhalb 10 Tagen gezahlt wird, sonst voller Betrag innerhalb 30 Tagen. Fuer Kaeufer lohnend wenn Liquiditaet vorhanden."},
{id:21,b:"6.10",t:"Vertragsbestandteile",q:"Was sind Lieferbedingungen (Incoterms)?",o:["Garantiebedingungen","Zahlungsbedingungen","Internationale Handelsbedingungen die regeln wer Transportkosten, Risiko und Versicherung traegt (z.B. EXW, FOB, CIF, DDP)","Produktspezifikationen"],a:2,f:"Lieferbedingungen/Incoterms: regeln Gefahruebergang und Kostenverteilung beim Transport. EXW (ab Werk): Kaeufer traegt alles. DDP (geliefert, verzollt): Verkaeufer traegt alles."},
{id:22,b:"6.10",t:"Vertragsbestandteile",q:"Was ist ein Gerichtsstand im Vertrag?",o:["Festlegung welches Gericht bei Streitigkeiten zustaendig ist - wichtig bei internationalen Vertraegen","Schlichtungsverfahren","Verhandlungsort","Schiedsklausel"],a:0,f:"Gerichtsstand: welches Gericht ist zustaendig? Typisch: Sitz des Aufragnehmers oder -gebers. Bei internationalen Vertraegen wichtig: welches Recht gilt, welche Sprache."},
{id:23,b:"6.10",t:"Vertragsbestandteile",q:"Was ist eine Kuendigungsfrist im Vertrag?",o:["Zeitraum den man vor Vertragsende einhalten muss um den Vertrag zu beenden (z.B. 3 Monate zum Quartalsende)","Lieferfrist","Vertragsstrafe","Zahlungsfrist"],a:0,f:"Kuendigungsfrist: wie lange vor Vertragsende muss Kuendigung erfolgen? Beispiel: 3 Monate zum Quartalsende. Bei Nichteinhaltung: Vertrag laeuft weiter."},
{id:24,b:"6.10",t:"Vertragsbestandteile",q:"Was ist eine AGB (Allgemeine Geschaeftsbedingungen)?",o:["Einzeln ausgehandelte Klauseln","Gesetzliche Vorschriften","Vorformulierte Standardklauseln die fuer viele Vertraege gelten - muessen bei Vertragsschluss einbezogen werden, unterliegen Inhaltskontrolle (BGB)","Internationale Standards"],a:2,f:"AGB: vorformulierte Bedingungen. Mussen vor Vertragsschluss transparent gemacht werden. Bestimmte Klauseln sind unwirksam (Benachteiligung des Vertragspartners). Inhaltskontrolle durch SS305 ff. BGB."},
{id:25,b:"6.10",t:"Vertragsbestandteile",q:"Was ist eine Abnahmeklausel im IT-Vertrag?",o:["Regelung wie und wann der Auftraggeber die fertige Leistung abnimmt und welche Kriterien erfuellt sein muessen","Kuendigungsklausel","Gewaehrleistungsklausel","Zahlungsklausel"],a:0,f:"Abnahme: formeller Akt bei dem Auftraggeber bestaetigt dass die Leistung vertragsgerecht ist. Wichtig beim Werkvertrag: Abnahme = Gefahruebergang und Beginn der Gewaehrleistungsfrist."},
{id:26,b:"6.10",t:"Vertragsbestandteile",q:"Was ist eine Datenschutzklausel im IT-Vertrag?",o:["Regelungen zur DSGVO-konformen Verarbeitung personenbezogener Daten - Auftragsverarbeitungsvertrag wenn Dienstleister Daten verarbeitet","Geheimhaltungsklausel","Preisklausel","Haftungsklausel"],a:0,f:"Bei IT-Projekten mit Personendaten: Auftragsverarbeitungsvertrag (AVV) nach DSGVO Art. 28 noetig. Regelt welche Daten wie verarbeitet werden duerfen und Sicherheitsmassnahmen."},
{id:27,b:"6.10",t:"Vertragsbestandteile",q:"Was ist ein Haftungsausschluss im Vertrag?",o:["Gewaehrleistungsausschluss","Schadensersatzklausel","Klausel die Haftung fuer bestimmte Schaeden begrenzt oder ausschliesst - bei groesser Fahrlaessigkeit und Vorsatz oft unwirksam","Versicherungsklausel"],a:2,f:"Haftungsausschluss: begrenzt Schadensersatzpflicht. Aber: Haftungsausschluss fuer Vorsatz und grobe Fahrlaessigkeit ist unwirksam. Haftung fuer Koerperverletzung kann nicht ausgeschlossen werden."},
{id:28,b:"6.10",t:"Vertragsbestandteile",q:"Was ist eine Geheimhaltungsklausel (NDA) im Vertrag?",o:["Urheberrechtsklausel","Datenschutzklausel","Verpflichtung zur Vertraulichkeit ueber ausgetauschte Informationen - schuetzt Geschaeftsgeheimnisse und vertrauliche Projektdaten","Wettbewerbsverbot"],a:2,f:"Geheimhaltungsklausel (NDA): beide Parteien verpflichten sich zur Verschwiegenheit. Wichtig bei: Projektvergaben, Kooperationen, Personalangelegenheiten, sensiblen Geschaeftsinformationen."},
{id:29,b:"6.10",t:"Vertragsbestandteile",q:"Was bedeutet Skonto 2/10 netto 30?",o:["30 Tage Rabatt 2%","2% Skonto bei Zahlung innerhalb 10 Tagen, ansonsten voller Betrag faellig innerhalb 30 Tagen","2 Tage Zahlungsziel mit 30% Rabatt","30% Rabatt bei 2 Tagen Zahlung"],a:1,f:"2/10 netto 30: 2% Preisnachlass wenn binnen 10 Tagen gezahlt wird. Sonst Nettobetrag faellig innerhalb 30 Tagen. Annualisiert ca. 36% Rendite - fast immer lohnenswert Skonto zu ziehen."},
{id:30,b:"6.10",t:"Vertragsbestandteile",q:"Was ist ein Pflichtenheft im Vertragskontext?",o:["Dokument des Auftragnehmers: wie er die Anforderungen des Lastenhefts umsetzen wird - wird Teil des Vertrags","Anforderungsdokument des Kunden","Projektplan","Preisliste"],a:0,f:"Pflichtenheft: Auftragnehmer beschreibt WIE er die Anforderungen (aus Lastenheft) umsetzt. Technische Loesung, Systemarchitektur, Schnittstellen. Wird Vertragsbestandteil."},
{id:31,b:"6.11",t:"Vertragsstoerungen",q:"Was ist Leistungsverzug?",o:["Nichterfuellung","Verspätete Erfuellung der vertraglichen Leistung - Leistung wird erbracht aber zu spaet","Teillieferung","Schlechtleistung"],a:1,f:"Leistungsverzug: Leistung kommt zu spaet (z.B. Software-Lieferung 2 Wochen nach Termin). Folgen: Schadenersatz, Ruecktritt, Vertragsstrafe wenn vereinbart."},
{id:32,b:"6.11",t:"Vertragsstoerungen",q:"Was ist Schlechtleistung?",o:["Teillieferung","Verspaetete Lieferung","Keine Lieferung","Leistung wird erbracht aber mit Maengeln (z.B. Software hat Fehler, Hardware entspricht nicht Spezifikation)"],a:3,f:"Schlechtleistung (Maengel): Leistung erbracht aber mangelhaft. Rechte: Nacherfuellung (Nachbesserung oder Ersatzlieferung), Minderung, Ruecktritt, Schadensersatz."},
{id:33,b:"6.11",t:"Vertragsstoerungen",q:"Was ist Nichterfuellung?",o:["Vollstaendiges Ausbleiben der vertraglich geschuldeten Leistung (z.B. Auftragnehmer liefert gar nichts)","Teillieferung","Verspaetete Lieferung","Schlechte Qualitaet"],a:0,f:"Nichterfuellung: Leistung bleibt komplett aus. Rechte: Schadensersatz statt der Leistung, Ruecktritt vom Vertrag, Ersatzvornahme (Dritter fuehrt auf Kosten des Schuldners aus)."},
{id:34,b:"6.11",t:"Vertragsstoerungen",q:"Was ist Stoerung der Geschaeftsgrundlage?",o:["Kuendigung","Unerwartete grundlegende Aenderung der Vertragsumstaende die beide Parteien nicht vorhersehen konnten (z.B. extreme Rohstoffknappheit durch Krieg)","Normaler Preisanstieg","Vertragsaenderung"],a:1,f:"Stoerung der Geschaeftsgrundlage (SS313 BGB): unvorhergesehene Umstaende die Vertragserfuellung unzumutbar machen. Kann Vertragsanpassung oder -aufloesung ermoeglichen."},
{id:35,b:"6.11",t:"Vertragsstoerungen",q:"Was sind die Rechte des Kaeufers bei Maengeln (Gewaehrleistung)?",o:["Nur Ruecktritt","Nacherfuellung (Reparatur oder Ersatzlieferung), dann Preisminderung oder Ruecktritt, plus ggf. Schadensersatz","Nur Preisminderung","Nur Schadensersatz"],a:1,f:"Maengelrechte: 1. Nacherfuellung (Reparatur oder neue Sache). 2. Falls Nacherfuellung scheitert: Minderung oder Ruecktritt. 3. Zusaetzlich Schadensersatz bei Verschulden."},
{id:36,b:"6.11",t:"Vertragsstoerungen",q:"Was ist Nacherfuellung?",o:["Zweite Zahlung","Preisminderung","Primaeres Recht bei Maengeln: Auftragnehmer repariert oder liefert neue Ware - zwei Versuche stehen ihm zu","Schadensersatz"],a:2,f:"Nacherfuellung: Auftragnehmer hat Recht auf zwei Versuche die Maaengel zu beheben (Reparatur oder Ersatzlieferung). Erst nach Scheitern koennen andere Rechte geltend gemacht werden."},
{id:37,b:"6.11",t:"Vertragsstoerungen",q:"Was ist Preisminderung (Minderung)?",o:["Vollstaendiger Kaufpreiserlass","Ruecktritt vom Vertrag","Herabsetzung des Kaufpreises proportional zur Wertminderung durch den Mangel","Schadensersatz"],a:2,f:"Minderung: Kaufpreis wird proportional zum Mangel reduziert. Beispiel: Laptop mit kleinem Displayfehler, Wert 10% gemindert = 10% Preisrueckerstattung. Alternative zum Ruecktritt."},
{id:38,b:"6.11",t:"Vertragsstoerungen",q:"Was ist Annahmeverzug?",o:["Verkaeufer liefert nicht","Lieferverzug","Zahlungsverzug","Glaeubiger (Kaeufer) nimmt die angebotene Leistung nicht an obwohl diese korrekt angeboten wurde"],a:3,f:"Annahmeverzug (Glaeubigerverzug): Kaeufer verweigert Annahme der korrekten Lieferung. Folgen: Schuldner (Verkaeufer) kann auf Kosten des Glaeubiger einlagern, haftet nur noch fuer Vorsatz/grobe Fahrlaessigkeit."},
{id:39,b:"6.11",t:"Vertragsstoerungen",q:"Was ist Zahlungsverzug?",o:["Schuldner (Kaeufer) zahlt nicht zum faelligen Zeitpunkt - nach 30 Tagen tritt Verzug automatisch ein (bei Verbrauchern nach Mahnung)","Lieferverzug","Schlechtleistung","Annahmeverzug"],a:0,f:"Zahlungsverzug: Kaufpreis nicht rechtzeitig bezahlt. Folgen: Verzugszinsen (5% ueber Basiszins bei B2B, 9% ueber Basiszins bei B2B-Geschaeften), Mahnkosten, Schadensersatz."},
{id:40,b:"6.11",t:"Vertragsstoerungen",q:"Was ist eine Mahnung?",o:["Gerichtsklage","Schadensersatzforderung","Formelle Aufforderung eine faellige Leistung zu erbringen - versetzt Schuldner in Verzug","Vertragskuendigung"],a:2,f:"Mahnung: schriftliche Aufforderung zur Leistung. Versetzt Schuldner in Verzug (falls nicht schon durch Kalendertermin). Empfehlung: schriftlich mit Fristsetzung per Einschreiben."},
{id:41,b:"6.11",t:"Vertragsstoerungen",q:"Was ist eine Ersatzvornahme?",o:["Ersatzlieferung des Verkaeufers","Preisminderung","Vertragsruecktritt","Glaeubiger laesst Leistung auf Kosten des Schuldners durch Dritte erbringen wenn Schuldner nicht leistet"],a:3,f:"Ersatzvornahme: wenn Auftragnehmer nicht liefert, kann Auftraggeber einen anderen beauftragen und die Mehrkosten beim urspruenglichen Auftragnehmer einklagen."},
{id:42,b:"6.11",t:"Vertragsstoerungen",q:"Was ist Ruecktritt vom Vertrag?",o:["Rueckabwicklung: beide Parteien muessen bereits Geleistetes zurueckgeben - Vertrag gilt als nie geschlossen","Schadensersatz","Minderung","Kuendigung fuer die Zukunft"],a:0,f:"Ruecktritt: Vertrag wird rueckabgewickelt. Verkaeufer nimmt Ware zurueck, Kaeufer bekommt Geld zurueck. Moeglich bei: wesentlichen Maengeln nach gescheiterter Nacherfuellung, Lieferverzug."},
{id:43,b:"6.11",t:"Vertragsstoerungen",q:"Was ist Schadensersatz bei Vertragsverletzung?",o:["Ersetzt Maengelrechte","Immer automatisch","Nur moeglich bei Vorsatz","Anspruch auf Ausgleich entstandener Schaeden durch Vertragsverletzung - erfordert Verschulden (Vorsatz oder Fahrlaessigkeit)"],a:3,f:"Schadensersatz: Ausgleich fuer entstandene Schaeden. Voraussetzungen: Pflichtverletzung, Verschulden (Vorsatz/Fahrlaessigkeit), Schaden, Kausalitaet. Kann neben anderen Rechten geltend gemacht werden."},
{id:44,b:"6.11",t:"Vertragsstoerungen",q:"Was ist force majeure (hoehere Gewalt)?",o:["Normale Lieferverzoegerung","Insolvenz","Unvorhersehbare, unabwendbare Ereignisse (Naturkatastrophen, Krieg, Pandemie) die Vertragserfuellung verhindern - kein Verschulden","Streik"],a:2,f:"Hoehere Gewalt: unvorhersehbare, unabwendbare Ereignisse ausserhalb der Einflussspaere beider Parteien. Typischerweise Haftungsausschluss im Vertrag. Beispiele: Naturkatastrophen, Krieg, Pandemie."},
{id:45,b:"6.11",t:"Vertragsstoerungen",q:"Was ist eine Maengelruege?",o:["Schriftliche Mitteilung des Kaeufers an Verkaeufer ueber festgestellte Maengel - Voraussetzung fuer Gewaehrleistungsansprueche im Handelsrecht","Maengelbeseitigung","Ruecktrittserklaerung","Schadensersatzklage"],a:0,f:"Maengelruege: im Handelsrecht (HGB) muss Kaeufer (Unternehmer) Maengel unverzueglich ruegen, sonst verliert er Gewaehrleistungsansprueche. Bei Verbrauchern nicht noetig."},
{id:46,b:"6.12",t:"Zielsetzungen",q:"Was sind oekonomische Zielsetzungen eines Unternehmens?",o:["Umweltschutz","Wirtschaftliche Ziele: Gewinnmaximierung, Umsatzwachstum, Kostenoptimierung, Marktanteilssicherung","Oekologische Nachhaltigkeit","Soziale Gerechtigkeit"],a:1,f:"Oekonomische Ziele: Gewinn, Umsatz, Marktanteil, ROI, Kostensenkung, Liquiditaetssicherung. Klassisches primaeres Unternehmensziel im marktwirtschaftlichen System."},
{id:47,b:"6.12",t:"Zielsetzungen",q:"Was sind oekologische Zielsetzungen?",o:["Gewinnmaximierung","Marktanteilssicherung","Nachhaltigkeitsziele: CO2-Reduktion, Ressourcenschonung, erneuerbare Energien, umweltfreundliche Produktion","Mitarbeiterzufriedenheit"],a:2,f:"Oekologische Ziele: Klimaneutralitaet, Ressourcenschonung, Kreislaufwirtschaft, erneuerbare Energien, nachhaltige Lieferketten. Zunehmend durch Regulierung (EU Taxonomie) erzwungen."},
{id:48,b:"6.12",t:"Zielsetzungen",q:"Was sind soziale Zielsetzungen?",o:["Gewinnziele","Kostenziele","Umsatzziele","Gesellschaftliche Verantwortung: faire Loehne, Arbeitnehmerrechte, Diversitaet, Gemeinwohlbeitraege, Work-Life-Balance"],a:3,f:"Soziale Ziele: faire Bezahlung, Arbeitssicherheit, Diversitaet, Work-Life-Balance, Ausbildungsplaetze, regionale Foerderung. Teil des CSR (Corporate Social Responsibility)."},
{id:49,b:"6.12",t:"Zielsetzungen",q:"Was ist das magische Dreieck der Zielsetzungen?",o:["Preis-Leistung-Qualitaet","Qualitaet-Zeit-Kosten","Planung-Durchfuehrung-Kontrolle","Konfliktbeziehung zwischen oekonomischen, oekologischen und sozialen Zielen - Verbesserung eines Ziels oft auf Kosten anderer"],a:3,f:"Magisches Dreieck: oekonomisch (Gewinn), oekologisch (Umwelt), sozial (Gesellschaft) stehen oft in Konflikt. Oekologische Massnahmen kosten Geld, soziale Leistungen erhoehen Kosten."},
{id:50,b:"6.12",t:"Zielsetzungen",q:"Was ist CSR (Corporate Social Responsibility)?",o:["Finanzberichterstattung","Unternehmerische Verantwortung gegenueber Gesellschaft und Umwelt ueber gesetzliche Mindestanforderungen hinaus","Marketingstrategie","Kundenservice-Rating"],a:1,f:"CSR: Unternehmen uebernehmen gesellschaftliche Verantwortung freiwillig: Umweltschutz, soziale Projekte, ethische Lieferketten, Transparenz, Mitarbeiterfoerderung."},
{id:51,b:"6.13",t:"Aufbauorganisation",q:"Was ist ein Einliniensystem?",o:["Projektorganisation","Mehrere Vorgesetzte pro Mitarbeiter","Hierarchische Struktur: jeder Mitarbeiter hat genau einen direkten Vorgesetzten - klare Zustaendigkeiten, aber lange Entscheidungswege","Matrixorganisation"],a:2,f:"Einliniensystem: klare Hierarchie, ein Vorgesetzter pro Mitarbeiter. Vorteile: klare Zustaendigkeiten, einfache Kontrolle. Nachteile: lange Entscheidungswege, Vorgesetzte stark belastet."},
{id:52,b:"6.13",t:"Aufbauorganisation",q:"Was ist ein Mehrliniensystem?",o:["Selbstorganisation","Mitarbeiter haben mehrere direkte Vorgesetzte fuer verschiedene Fachbereiche (z.B. disziplinarisch und fachlich getrennt)","Ein Vorgesetzter pro Mitarbeiter","Flache Hierarchie"],a:1,f:"Mehrliniensystem: Mitarbeiter berichten an mehrere Vorgesetzte. Vorteile: Spezialisierung, kuerzere Kommunikationswege. Nachteile: unklare Verantwortlichkeiten, Konfliktpotenzial."},
{id:53,b:"6.13",t:"Aufbauorganisation",q:"Was ist ein Stabliniensystem?",o:["Mehrliniensystem","Einliniensystem ergaenzt durch Stabsstellen: Spezialisten beraten Fuehrungskraefte ohne eigene Weisungsbefugnis (z.B. IT-Abteilung, Rechtsabteilung als Stab)","Einliniensystem ohne Stab","Projektorganisation"],a:1,f:"Stabliniensystem: Einlinienstruktur + Stabsstellen. Stab beraten, haben aber keine Weisungsbefugnis. Vorteile: Entlastung der Fuehrung, Expertenwissen. Nachteil: Kosten, moegliche Konflikte."},
{id:54,b:"6.13",t:"Aufbauorganisation",q:"Was ist eine Matrixorganisation?",o:["Stabsorganisation","Kombination aus funktionaler und projektorientierter Struktur: Mitarbeiter haben sowohl Linienvorgesetzten als auch Projektverantwortlichen","Einlinienorganisation","Reine Linienorganisation"],a:1,f:"Matrixorganisation: Mitarbeiter berichten an zwei Vorgesetzte (Linienvorgesetzter + Projektleiter). Vorteile: Flexibilitaet, gute Ressourcennutzung. Nachteile: Konflikte, hoher Kommunikationsaufwand."},
{id:55,b:"6.13",t:"Aufbauorganisation",q:"Was ist der Vorteil der Matrixorganisation?",o:["Hohe Flexibilitaet und effiziente Ressourcennutzung: Mitarbeiter koennen gleichzeitig in mehreren Projekten eingesetzt werden","Einfache Kontrolle","Kurze Hierarchie","Klare Zustaendigkeiten"],a:0,f:"Matrix-Vorteil: Ressourcen (Experten) koennen gleichzeitig in mehreren Projekten genutzt werden. Hohe Flexibilitaet bei wechselnden Anforderungen. Wissenstransfer zwischen Projekten."},
{id:56,b:"6.13",t:"Aufbauorganisation",q:"Was ist der Nachteil der Matrixorganisation?",o:["Zu unflexibel","Zu viele Hierarchien","Zu teuer","Hoher Kommunikationsaufwand und potenzielle Konflikte zwischen Linien- und Projektverantwortlichen um Ressourcen"],a:3,f:"Matrix-Nachteil: Konfliktpotenzial (Linienvorgesetzter vs. Projektleiter wollen beide den Mitarbeiter), hoher Kommunikationsaufwand, unklare Prioritaeten bei Ressourcenkonflikten."},
{id:57,b:"6.13",t:"Aufbauorganisation",q:"Was ist eine Spartenorganisation (Divisionale Struktur)?",o:["Funktionale Gliederung","Stabsorganisation","Gliederung nach Produkten, Regionen oder Kunden: jede Sparte ist weitgehend selbstaendig mit eigenen Funktionen","Einlinienorganisation"],a:2,f:"Spartenorganisation: Unternehmen in Geschaeftsbereiche (Sparten) gegliedert z.B. nach Produkt (Sparte IT-Hardware, Sparte Software) oder Region (Europa, Amerika). Jede Sparte fast eigenstaendig."},
{id:58,b:"6.13",t:"Aufbauorganisation",q:"Was ist eine funktionale Organisation?",o:["Gliederung nach Produkten","Regionale Gliederung","Gliederung nach Funktionen/Aufgaben: Abteilungen nach Vertrieb, Produktion, IT, Personal, Finanzen unabhaengig von Produkten","Projektorganisation"],a:2,f:"Funktionale Organisation: klassische Gliederung nach Unternehmensfunktionen (Marketing, Produktion, IT, Finanzen, Personal). Spezialisierung innerhalb der Funktionen. Typisch fuer kleine/mittlere Unternehmen."},
{id:59,b:"6.13",t:"Aufbauorganisation",q:"Was ist ein Organigramm?",o:["Prozessdiagramm","Grafische Darstellung der Aufbauorganisation: Hierarchien, Abteilungen, Berichtslinien und Stellenbezeichnungen","Arbeitsplan","Netzplan"],a:1,f:"Organigramm: visuelle Darstellung der Unternehmensstruktur. Zeigt: Hierarchieebenen, Abteilungen, Beziehungen, Stellenbezeichnungen. Wichtig fuer Orientierung neuer Mitarbeiter."},
{id:60,b:"6.13",t:"Aufbauorganisation",q:"Was ist der Unterschied zwischen Aufbau- und Ablauforganisation?",o:["Ablauf ist wichtiger","Aufbau ist wichtiger","Aufbauorganisation: WER macht WAS (Struktur, Hierarchie, Stellen). Ablauforganisation: WIE, WANN und IN WELCHER REIHENFOLGE (Prozesse, Ablaeufe)","Identisch"],a:2,f:"Aufbauorganisation: statische Struktur (Organigramm, Stellen, Hierarchien). Ablauforganisation: dynamische Prozesse (Arbeitsablaeufe, Zustaendigkeiten im Prozess, Zeitplanung)."},
{id:61,b:"6.14",t:"Vollmachten",q:"Was ist eine Handlungsvollmacht?",o:["Befugnis bestimmte Geschaefte im Rahmen der Unternehmensrichtlinien zu fuehren - enger als Prokura, begrenzt auf bestimmte Taetigkeiten","Sondervollmacht","Unbegrenzte Vertretungsmacht","Gesetzliche Vertretung"],a:0,f:"Handlungsvollmacht: Befugnis im Rahmen des ueblichen Geschaeftsbetriebs zu handeln. Enger als Prokura. Kann branchenspezifisch unterschiedlich sein. Typisch fuer Angestellte im Verkauf."},
{id:62,b:"6.14",t:"Vollmachten",q:"Was ist Prokura?",o:["Umfassende kaufmaennische Vertretungsbefugnis fuer alle gerichtlichen und aussergerichtlichen Geschaefte - muss ins Handelsregister eingetragen werden","Einfache Unterschriftsberechtigung","Gesamtvollmacht","Handlungsvollmacht"],a:0,f:"Prokura: weitreichende Vollmacht fuer alle Handelsgeschaefte. Ausnahmen: Grundstuecksveraeusserungen, Prokura erteilen. Muss im Handelsregister eingetragen werden. Erkennbar durch Kuerzel ppa. (per procura)."},
{id:63,b:"6.14",t:"Vollmachten",q:"Was ist eine Gesamtvollmacht?",o:["Mehrere Personen muessen gemeinsam handeln um wirksame Entscheidungen zu treffen (z.B. Gesamtprokura: zwei Prokuristen muessen gemeinsam unterschreiben)","Ein Einzelner entscheidet allein","Handlungsvollmacht","Unbegrenzte Einzelvollmacht"],a:0,f:"Gesamtvollmacht: mehrere Personen koennen nur gemeinsam wirksam handeln. Beispiel: Gesamtprokura - zwei Prokuristen muessen gemeinsam unterschreiben. Sicherheitsmassnahme gegen Missbrauch."},
{id:64,b:"6.14",t:"Vollmachten",q:"Was ist eine Einzelvollmacht?",o:["Dauervollmacht","Vollmacht fuer eine bestimmte Einzelhandlung (z.B. genau diesen Vertrag unterzeichnen) - erlischt nach Ausfuehrung","Prokura","Befugnis fuer eine einmalige Handlung"],a:1,f:"Einzelvollmacht: berechtigt zur Durchfuehrung genau einer bestimmten Handlung. Beispiel: Vollmacht zum Unterzeichnen eines spezifischen Kaufvertrags. Erlischt nach Ausfuehrung automatisch."},
{id:65,b:"6.14",t:"Vollmachten",q:"Was ist der Unterschied zwischen Prokura und Handlungsvollmacht?",o:["Prokura: umfassend fuer alle Handelsgeschaefte, Handelsregistereintrag noetig. Handlungsvollmacht: enger begrenzt, kein Handelsregistereintrag","Prokura ist schwaecher","Kein Unterschied","Handlungsvollmacht erfordert Eintrag"],a:0,f:"Prokura: sehr weitreichend (alle kaufmaennischen Geschaefte), Handelsregisterpflicht, nur von eingetragenen Kaufleuten erteilbar. Handlungsvollmacht: enger, bereichsspezifisch, kein Eintrag noetig."},
{id:66,b:"6.14",t:"Vollmachten",q:"Was bedeutet das Kuerzel ppa. unter einer Unterschrift?",o:["Per Procura: der Unterzeichner handelt in Vertretung mit Prokura","Projekt-Analyse","Preisvereinbarung","Post-Annahme"],a:0,f:"ppa. (per procura): kennzeichnet dass der Unterzeichner Prokurist ist und in Vertretung des Unternehmens mit Prokura handelt. Erkennbar fuer Dritte aus dem Handelsregister."},
{id:67,b:"6.14",t:"Vollmachten",q:"Was ist Vertretungsmacht?",o:["Befugnis im Namen und mit Wirkung fuer eine andere Person oder ein Unternehmen zu handeln","Stimmrecht","Unterschriftsrecht","Eigene Entscheidungsfreiheit"],a:0,f:"Vertretungsmacht: Befugnis rechtlich wirksam fuer jemand anderen zu handeln. Rechtsgeschaefte des Vertreters binden direkt den Vertretenen. Grundlage: Vollmacht oder gesetzliche Vertretung."},
{id:68,b:"6.14",t:"Vollmachten",q:"Was passiert wenn jemand ohne Vollmacht handelt?",o:["Schwebend unwirksam: Vertrag wird wirksam wenn Vertreter (Geschaeftsherr) genehmigt, sonst Haftung des vollmachtlosen Vertreters","Automatisch wirksam nach 30 Tagen","Strafrechtliche Konsequenzen","Vertrag ist immer wirksam"],a:0,f:"Handeln ohne Vollmacht (vollmachtloser Vertreter): Vertrag schwebend unwirksam. Geschaeftsherr kann genehmigen (dann wirksam) oder ablehnen. Bei Ablehnung: Vertreter haftet persoenlich."},
{id:69,b:"6.14",t:"Vollmachten",q:"Was ist Delegation von Aufgaben?",o:["Kuendigung eines Mitarbeiters","Outsourcing","Uebertragung von Aufgaben, Kompetenzen und Verantwortung an Mitarbeiter - Fuehrungskraft gibt Aufgaben ab aber behaelt Gesamtverantwortung","Arbeitsteilung"],a:2,f:"Delegation: Vorgesetzter uebertraegt Aufgaben und Entscheidungskompetenzen an Mitarbeiter. Vorteile: Entlastung, Mitarbeiterentwicklung. Gesamtverantwortung bleibt beim Vorgesetzten."},
{id:70,b:"6.14",t:"Vollmachten",q:"Was ist das Subsidiaritaetsprinzip in der Organisation?",o:["Zentralisierung aller Entscheidungen","Gleichverteilung von Macht","Entscheidungen sollen auf der niedrigst-moeglichen Ebene getroffen werden - nur wenn noetig wird hoehere Ebene eingeschaltet","Staat regelt alles"],a:2,f:"Subsidiaritaet: Entscheidungen auf niedrigst-moeglicher Ebene. Stichwort: dezentrale Entscheidungsfindung. Fuer IT-Unternehmen: lokale Teams entscheiden selbst soweit moeglich, Eskalation nur bei Bedarf."},
{id:71,b:"6.9",t:"Vertragsarten",q:"Was ist ein Finanzierungsvertrag?",o:["Vertrag ueber Kreditgewaehrung zur Finanzierung von Investitionen mit Zinszahlung und Rueckzahlung in Raten","Mietvertrag","Leasingvertrag","Kaufvertrag"],a:0,f:"Finanzierungsvertrag: Bank stellt Kapital bereit, Kreditnehmer zahlt Zinsen und tilgt. Nach vollstaendiger Tilgung geht Eigentum auf Kreditnehmer ueber (anders als Leasing)."},
{id:72,b:"6.9",t:"Vertragsarten",q:"Was ist ein Outsourcing-Vertrag?",o:["Vertrag ueber die Auslagerung von Geschaeftsprozessen an externe Dienstleister (z.B. IT-Betrieb, Buchhaltung, Kundenservice)","Kaufvertrag","Mietvertrag","Arbeitsvertrag"],a:0,f:"Outsourcing-Vertrag: Unternehmen lagert Funktionen aus. Regelt: Leistungsumfang, SLAs, Datenschutz (AVV bei Personendaten), Kuendigungsfristen, Rueckuebertragung bei Vertragsende."},
{id:73,b:"6.10",t:"Vertragsbestandteile",q:"Was ist ein Angebot im Vertragsrecht?",o:["Ein Kostenvoranschlag","Eine verbindliche Erklaerung mit der jemand zum Vertragsschluss auffordert - bindet den Anbieter fuer bestimmte Zeit","Eine Preisliste","Eine unverbindliche Werbung"],a:1,f:"Angebot (Antrag): verbindliche Erklaerung zum Vertragsschluss. Muss Wesentliches enthalten (Preis, Leistung, Menge). Bindet Anbieter bis Fristablauf. Annahme = Vertrag geschlossen."},
{id:74,b:"6.10",t:"Vertragsbestandteile",q:"Was ist ein Kostenvoranschlag?",o:["Unverbindliche Schaetzung der voraussichtlichen Kosten - kein Vertragsangebot, lediglich Orientierung","Verbindliches Angebot","Rechnung","Lastenheft"],a:0,f:"Kostenvoranschlag: unverbindlich, gibt nur Groessenordnung an. Wichtig: ausdruecklich als KVA kennzeichnen! Ohne Kennzeichnung kann er als verbindliches Angebot interpretiert werden."},
{id:75,b:"6.11",t:"Vertragsstoerungen",q:"Was ist ein Ruecktritt vom Vertrag und welche Voraussetzungen gibt es?",o:["Automatisch bei Verzoegerung","Nur per Gericht","Kuendigung fuer die Zukunft","Rueckabwicklung eines Vertrags: setzt Fristsetzung voraus (ausser bei ernsthafter Verweigerung oder Unmoeglickeit). Beide Parteien restituieren Geleistetes"],a:3,f:"Ruecktritt: Voraussetzungen: Pflichtverletzung (Mangel, Verzoegerung) + erfolglose Fristsetzung (ausser entbehrlich). Rechtsfolge: Rueckgewaehr aller Leistungen."},
{id:76,b:"6.12",t:"Zielsetzungen",q:"Was sind SMART-Ziele im Unternehmenskontext?",o:["Finanzielle Ziele","Einfache Ziele","Spezifisch, Messbar, Attraktiv/Akzeptiert, Realistisch, Terminiert - Methode zur praezisen Zieldefinition","Schlaue Ziele"],a:2,f:"SMART: Specific (konkret), Measurable (messbar), Achievable (erreichbar), Relevant (relevant), Time-bound (zeitlich begrenzt). Beispiel: IT-Kosten um 15% bis Ende Q3 senken."},
{id:77,b:"6.13",t:"Aufbauorganisation",q:"Was ist Lean Management?",o:["Managementphilosophie zur Verschlankung von Prozessen: Verschwendung eliminieren, Wert aus Kundensicht maximieren","Kostensparprogramm","Entlassungsprogramm","Schlanke Mitarbeiter"],a:0,f:"Lean Management: Ursprung Toyota. Ziel: alle nicht-wertschoepfenden Aktivitaeten (Verschwendung/Muda) eliminieren. Werkzeuge: Kaizen, 5S, Kanban, Wertstromanalyse."},
{id:78,b:"6.13",t:"Aufbauorganisation",q:"Was ist Outsourcing in der Aufbauorganisation?",o:["Stellenabbau","Verlagerung von Geschaeftsprozessen oder Abteilungen an externe Dienstleister (z.B. IT-Betrieb, HR, Buchhaltung auslagern)","Interne Umstrukturierung","Fuehrungswechsel"],a:1,f:"Outsourcing: Auslagerung nicht-kernkompetenter Bereiche. Vorteile: Kosteneinsparung, Konzentration auf Kerngeschaeft, Expertenwissen des Dienstleisters. Nachteile: Abhaengigkeit, Kontrollverlust."},
{id:79,b:"6.13",t:"Aufbauorganisation",q:"Was ist Insourcing?",o:["Zurueckholung ausgelagerter Prozesse oder Neugliederung bisher extern erbrachter Leistungen in das eigene Unternehmen","Outsourcing","Akquisition","Fusion"],a:0,f:"Insourcing: externe Leistungen werden intern erbracht. Gruende: Kostensenkung (wenn intern guenstiger), Kontrolle, strategische Bedeutung, schlechte Erfahrungen mit Outsourcing."},
{id:80,b:"6.14",t:"Vollmachten",q:"Was ist Zentralisierung vs. Dezentralisierung?",o:["Dezentralisierung ist immer besser","Zentralisierung ist besser","Zentralisierung: Entscheidungen bei Zentrale. Dezentralisierung: Entscheidungen bei lokalen Einheiten/Teams - schneller aber weniger einheitlich","Kein Unterschied"],a:2,f:"Zentralisierung: einheitliche Entscheidungen, bessere Kontrolle, Skaleneffekte. Dezentralisierung: schnellere Entscheidungen, mehr Flexibilitaet, bessere lokale Anpassung. Abwaegung je nach Situation."},
{id:81,b:"6.9",t:"Vertragsarten",q:"Welcher Vertragstyp ist typisch fuer IT-Entwicklungsprojekte?",o:["Mietvertrag","Werkvertrag (bei genau definiertem Ergebnis) oder Dienstvertrag (bei Entwicklung nach Aufwand/Zeit und Material)","Kaufvertrag","Lizenzvertrag"],a:1,f:"IT-Entwicklung: Werkvertrag wenn Ergebnis klar definiert (fertige Software). Dienstvertrag/Time&Material wenn Umfang offen und nach Aufwand abgerechnet wird. Hybridmodelle moeglich."},
{id:82,b:"6.9",t:"Vertragsarten",q:"Was ist ein SaaS-Vertrag rechtlich?",o:["Lizenzvertrag","Werkvertrag","Meist Mietvertrag oder Dienstvertrag: Nutzer mietet Zugang zur Software, kein Eigentumserwerb, regelmaessige Zahlung","Kaufvertrag"],a:2,f:"SaaS rechtlich: Mietvertrag (regelmaessige Nutzungsgebuehr) oder Dienstvertrag (Betrieb des Dienstes). Kein Kauf der Software. Kuendigung beendet Zugang."},
{id:83,b:"6.10",t:"Vertragsbestandteile",q:"Was ist ein Abnahmeprotokoll?",o:["Lieferschein","Rechnungsbeleg","Schriftliches Dokument das den Abschluss der Abnahme bestaetigt: was wurde geprueft, welche Maengel gab es, wurde die Leistung akzeptiert","Angebotsdokument"],a:2,f:"Abnahmeprotokoll: dokumentiert formelle Abnahme der Leistung. Inhalt: geprueft Punkte, festgestellte Maengel, Ergebnis (angenommen/abgelehnt), Unterschriften beider Parteien."},
{id:84,b:"6.11",t:"Vertragsstoerungen",q:"Was ist ein Mahnbescheid?",o:["Gerichtliches Mahnverfahren: vereinfachtes Inkasso-Verfahren ohne Klageverfahren - schneller und guenstiger als Klage","Kuendigung","Mahnung vom Glaeubiger","Steuermahnbescheid"],a:0,f:"Mahnbescheid: gerichtliches Mahnverfahren beim Amtsgericht. Schuldner kann Widerspruch einlegen, sonst Vollstreckungsbescheid. Guenstiger als Klage bei unbestrittenen Forderungen."},
{id:85,b:"6.13",t:"Aufbauorganisation",q:"Was ist Taylorismus?",o:["Modernes Agiles Management","Fruehes Managementkonzept von Frederick Taylor: wissenschaftliche Arbeitsteilung, Standardisierung, Trennung von Planung und Ausfuehrung","Scrum","Lean Management"],a:1,f:"Taylorismus: Arbeitsteilung, Standardisierung, Zeit-Bewegungsstudien. Trennung Planung (Management) und Ausfuehrung (Arbeiter). Grundlage industrieller Massenproduktion. Heute oft kritisiert."},
{id:86,b:"6.13",t:"Aufbauorganisation",q:"Was sind Stabsstellen in einer Organisation?",o:["Linienstellen mit Weisungsbefugnis","Aufsichtsrat","Beratende Stellen ohne eigene Weisungsbefugnis die Fuehrungskraefte mit Fachexpertise unterstuetzen (z.B. Rechtsabteilung, IT-Abteilung als Stab, Controllingabteilung)","Projektteams"],a:2,f:"Stabsstellen: Experten die beraten und Entscheidungsgrundlagen liefern, aber keine direkte Weisungsbefugnis haben. Beispiele: Rechtsabteilung, Unternehmensplanung, Interne Revision."},
{id:87,b:"6.12",t:"Zielsetzungen",q:"Was sind operative vs. strategische Ziele?",o:["Strategisch ist kurzfristiger","Strategisch: langfristig (3-5 Jahre), grundlegende Richtung. Operativ: kurzfristig (1 Jahr), konkrete Massnahmen um strategische Ziele zu erreichen","Operative Ziele sind wichtiger","Identisch"],a:1,f:"Strategische Ziele: Marktfuehrerschaft in 5 Jahren, neue Maerkte erschliessen. Operative Ziele: IT-Kosten dieses Jahr um 10% senken, bis Q3 neues CRM einführen. Operativ setzt Strategie um."},
{id:88,b:"6.12",t:"Zielsetzungen",q:"Was ist eine Balanced Scorecard?",o:["Qualitaetssystem","Buchhaltungssystem","Projektplanungstool","Strategisches Steuerungssystem mit vier Perspektiven: Finanzen, Kunden, Prozesse, Lernen/Entwicklung - prueft ob Strategie erreicht wird"],a:3,f:"Balanced Scorecard (Kaplan/Norton): vier Perspektiven: Finanziell (ROI, Gewinn), Kunden (Zufriedenheit, Marktanteil), Interne Prozesse (Effizienz, Qualitaet), Lernen/Innovation (Mitarbeiter, IT)."},
{id:89,b:"6.14",t:"Vollmachten",q:"Was ist eine Innenvollmacht?",o:["Vollmacht die nur intern gegenueber dem Vertreter erteilt wird - Dritte wissen nicht davon (z.B. interner Budgetrahmen)","Oeffentliche Vollmacht","Prokura","Handlungsregistereintrag"],a:0,f:"Innenvollmacht: nur im Innenverhaeltnis erteilt. Dritten gegenueber nicht sichtbar. Gegensatz: Aussenvollmacht (Dritten mitgeteilt oder erkennbar, z.B. durch Aushang oder Handelsregister)."},
{id:90,b:"6.14",t:"Vollmachten",q:"Was ist eine Duldungsvollmacht?",o:["Jemand wird regelmaessig ohne Widerspruch des Geschaeftsherrn als Vertreter taetig - Geschaeftsherr toleriert es, daher entsteht Anscheinsvollmacht","Aktiv erteilte Vollmacht","Gesetzliche Vollmacht","Schriftliche Vollmacht"],a:0,f:"Duldungsvollmacht: Geschaeftsherr weiss von Vertretertaetigkeit und duldet sie. Dritte duerfen auf diese Vollmacht vertrauen. Geschaeftsherr haeftet fuer Handlungen des Dulders."},
{id:91,b:"6.9",t:"Vertragsarten",q:"Was ist ein Kaufvertrag ueber Software nach BGB?",o:["Immer Dienstvertrag","Immer Werkvertrag","Immer Mietvertrag","Standard-Software (fertig, unveraendert): Kaufvertrag. Individualsoftware: Werkvertrag. SaaS: Mietvertrag. Die Art bestimmt Gewaehrleistung und Haftung"],a:3,f:"Software-Vertragstypen: Standard-Software (Box/Download) = Kaufvertrag (2 Jahre Gewaehrleistung). Individual-Software = Werkvertrag (Abnahme, Maengelansprueche). SaaS = Mietvertrag."},
{id:92,b:"6.10",t:"Vertragsbestandteile",q:"Was ist Factoring als Finanzierungsinstrument?",o:["Buergschaft","Leasing","Verkauf von Forderungen (offene Rechnungen) an einen Factoring-Dienstleister gegen sofortige Zahlung - verbessert Liquiditaet","Kreditaufnahme"],a:2,f:"Factoring: Unternehmen verkauft Kundenforderungen an Factor, erhaelt sofort Liquiditaet (abzueglich Gebuehr). Vorteil: kein Forderungsausfallrisiko, sofortige Liquiditaet. Kosten: Factoring-Gebuehr."},
{id:93,b:"6.11",t:"Vertragsstoerungen",q:"Wie viele Nacherfuellungsversuche stehen dem Verkaeufer zu?",o:["Einer","Grundsaetzlich zwei - erst nach zweimaligem Scheitern koennen weitere Rechte (Minderung, Ruecktritt) geltend gemacht werden","Drei","Unbegrenzt"],a:1,f:"Nacherfuellung: Verkaeufer hat Recht auf zwei Versuche. Erst nach zweimaligem Scheitern der Nacherfuellung koennen Minderung, Ruecktritt oder Schadensersatz geltend gemacht werden."},
{id:94,b:"6.12",t:"Zielsetzungen",q:"Was ist ein Leitbild (Mission Statement)?",o:["Grundsatzdokument das Zweck, Werte und Identitaet eines Unternehmens beschreibt - warum existiert das Unternehmen?","Jahresplan","Organigramm","Produktkatalog"],a:0,f:"Leitbild/Mission Statement: beschreibt Existenzgrund, Werte und Grundprinzipien des Unternehmens. Beispiel: Googles frueheres Motto - Information weltweit zu organisieren und zugaenglich zu machen."},
{id:95,b:"6.13",t:"Aufbauorganisation",q:"Was ist eine flache Hierarchie?",o:["Wenige Hierarchieebenen: kurze Entscheidungswege, grosse Fuehrungsspannen, viel Eigenverantwortung der Mitarbeiter - typisch fuer Startups und Tech-Unternehmen","Viele Fuehrungsebenen","Viele Zwischenstufen","Buerokratische Struktur"],a:0,f:"Flache Hierarchie: wenige Ebenen zwischen CEO und Mitarbeiter. Vorteile: schnelle Entscheidungen, direkter Kommunikation, mehr Eigenverantwortung. Typisch: Startups, agile Unternehmen."},
{id:96,b:"6.14",t:"Vollmachten",q:"Was ist Geschaftsfaehigkeit Voraussetzung fuer?",o:["Abstimmen bei Wahlen","Wirksames Abschliessen von Rechtsgeschaeften (Vertraegen) - volle Geschaeftsfaehigkeit ab 18 Jahren, beschraenkt ab 7 Jahren","Jede Handlung","Beantragen von Ausweisen"],a:1,f:"Geschaeftsfaehigkeit: Faehigkeit wirksam Rechtsgeschaefte abzuschliessen. 0-7 Jahre: geschaeftsunfaehig. 7-18 Jahre: beschraenkt (brauchen Zustimmung der Eltern). Ab 18: voll geschaeftsfaehig."},
{id:97,b:"6.9",t:"Vertragsarten",q:"Was ist ein Generalunternehmervertrag?",o:["Rahmenvertrag","Einfacher Kaufvertrag","Teilleistungsvertrag","Auftragnehmer uebernimmt Gesamtverantwortung fuer ein Projekt und koordiniert alle Subunternehmer - Auftraggeber hat nur einen Ansprechpartner"],a:3,f:"Generalunternehmer: ein Unternehmen uebernimmt Gesamtleistung und -verantwortung, koordiniert Subunternehmer. Vorteil fuer Auftraggeber: ein Ansprechpartner, klare Verantwortung."},
{id:98,b:"6.11",t:"Vertragsstoerungen",q:"Was ist ein Vertragsruecktritt vs. Kuendigung?",o:["Kuendigung ist staerker","Identisch","Ruecktritt ist nur fuer Kaeufer","Ruecktritt: rueckwirkende Vertragsaufhebung (alles zurueck). Kuendigung: beendet Dauerschuldverhaeltnis fuer die Zukunft (bereits Geleistetes bleibt)"],a:3,f:"Ruecktritt: Vertrag rueckwirkend aufgehoben, alles zurueckgeben. Kuendigung: Dauerschuldverhaeltnis (Miet-/Arbeitsvertrag) wird beendet, Leistungen der Vergangenheit bleiben erhalten."},
{id:99,b:"6.13",t:"Aufbauorganisation",q:"Was ist Change Management in der Organisation?",o:["Risikomanagement","Gesteuerter Wandel von Unternehmensstrukturen, Prozessen oder Kulturen mit Begleitung der betroffenen Menschen durch den Veraenderungsprozess","Software-Update-Management","Dokumentenmanagement"],a:1,f:"Change Management: Veraenderungsprozesse systematisch steuern. Elemente: Kommunikation, Einbindung Betroffener, Schulung, Foerderung von Promotoren, Umgang mit Widerstand."},
{id:100,b:"6.14",t:"Vollmachten",q:"Was ist Fuehrungsspanne?",o:["Anzahl der Mitarbeiter die ein Vorgesetzter direkt fuehren kann - typisch 5-15 Personen je nach Komplexitaet der Aufgaben","Gehaltsspanne","Budgetspanne","Projektlaufzeit"],a:0,f:"Fuehrungsspanne: Anzahl direkt unterstellter Mitarbeiter. Schmal (3-5): bei komplexen Aufgaben, intensive Betreuung. Breit (10-20): bei einfachen Aufgaben, geringe Betreuungsintensitaet."}
];
let st={},filt=[...Q];
function init(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});render();}
function render(){
  const c=document.getElementById("qc");c.innerHTML="";
  let lb=null;
  const bn={"6.9":"📄 6.9 Vertragsarten","6.10":"📋 6.10 Vertragsbestandteile","6.11":"⚠️ 6.11 Vertragsstoerungen","6.12":"🎯 6.12 Zielsetzungen","6.13":"🏢 6.13 Aufbauorganisation","6.14":"🔑 6.14 Vollmachten"};
  filt.forEach(q=>{
    if(q.b!==lb){const d=document.createElement("div");d.className="bh";d.textContent=bn[q.b]||q.b;c.appendChild(d);lb=q.b;}
    c.appendChild(mk(q));
  });up();}
function mk(q){
  const s=st[q.id],d=document.createElement("div"),L=["A","B","C","D"];
  d.className="qc"+(s.done?(s.ok?" ac":" aw"):"");d.id="c"+q.id;
  d.innerHTML=`<div class="qn">FRAGE ${q.id}/100</div><div class="qt">${q.t}</div><div class="qq">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt${s.done?" dis":""}${s.done&&i===q.a?" ok":""}${s.done&&!s.ok&&i===s.ci?" ng":""}" onclick="ans(${q.id},${i})"><span class="ol">${L[i]}</span><span>${o}</span></div>`).join("")}</div>
<div class="fbb${s.done?" show "+(s.ok?"cok":"cng"):""}" id="f${q.id}">${s.done?(s.ok?"✅ ":"❌ ")+q.f:""}</div>`;
  return d;}
function ans(id,i){
  const s=st[id];if(s.done)return;
  const q=Q.find(x=>x.id===id);s.done=true;s.ok=i===q.a;s.ci=i;
  const c=document.getElementById("c"+id);c.className="qc "+(s.ok?"ac":"aw");
  c.querySelectorAll(".opt").forEach((el,j)=>{el.classList.add("dis");if(j===q.a)el.classList.add("ok");if(!s.ok&&j===i)el.classList.add("ng");});
  const f=document.getElementById("f"+id);f.textContent=(s.ok?"✅ ":"❌ ")+q.f;f.className="fbb show "+(s.ok?"cok":"cng");up();}
function up(){
  const tot=Q.length,done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  document.getElementById("sd").textContent=ok+"/"+done;
  document.getElementById("pf").style.width=(done/tot*100)+"%";
  document.getElementById("pl").textContent=done+" von "+tot+" beantwortet";}
function fil(t,btn){
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("act"));btn.classList.add("act");
  if(t==="all")filt=[...Q];
  else if(t==="open")filt=Q.filter(q=>!st[q.id].done);
  else if(t==="wrong")filt=Q.filter(q=>st[q.id].done&&!st[q.id].ok);
  else filt=Q.filter(q=>q.b===t);render();}
function shuf(){filt=[...filt].sort(()=>Math.random()-.5);render();}
function rst(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});filt=[...Q];document.querySelectorAll(".fb").forEach((b,i)=>b.classList.toggle("act",i===0));render();document.getElementById("ov").classList.remove("show");}
function showR(){
  const done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  const pct=done>0?Math.round(ok/done*100):0;
  let e="😅",m="Weiter ueben!";
  if(pct>=90){e="🏆";m="Ausgezeichnet!";}else if(pct>=75){e="🎉";m="Sehr gut!";}else if(pct>=60){e="📚";m="Gut - weiter so!";}
  document.getElementById("oe").textContent=e;document.getElementById("os").textContent=ok+"/"+done;
  document.getElementById("om").textContent=pct+"% richtig - "+m;
  document.getElementById("ov").classList.add("show");}
function closeR(){document.getElementById("ov").classList.remove("show");}
init();
</script></body></html>
