{id:176,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Raubkopie (Piracy)?",o:["Illegale Vervielfältigung und Nutzung urheberrechtlich geschützter Software ohne gültige Lizenz","Open-Source-Nutzung","Erlaubte Privatkopie","Kopie auf einem Schiff"],a:0,f:"Software-Piraterie: illegale Kopie/Nutzung ohne Lizenz. Formen: Crack (Kopierschutz umgangen), Key-Generator, illegale Weitergabe. Strafbar: Schadensersatz + Strafanzeige möglich."},
{id:177,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Keylogger im Kontext von Software-Piraterie?",o:["Keyboard-Treiber","Schadsoftware die häufig in gecrackte Software eingebettet wird – zeichnet Tastatureingaben auf und stiehlt Passwörter","Lizenz-Verwaltungstool","Keyboard-Shortcut-Manager"],a:1,f:"Gecrackte Software enthält oft Malware: Keylogger, Trojaner, Ransomware. Neben illegaler Nutzung (Strafrisiko) auch erhebliches Sicherheitsrisiko. Grund: keine Qualitätskontrolle der Quellen."},
{id:178,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Zwangslizenz?",o:["Open-Source-Pflicht","Pflichtlizenz für alle","Bildungslizenz","Staatlich angeordnete Nutzungserlaubnis für patentierte Erfindungen bei öffentlichem Interesse ohne Zustimmung des Patentinhabers"],a:3,f:"Zwangslizenz: Staat erlaubt Nutzung patentierter Technologien ohne Zustimmung des Inhabers bei öffentlichem Interesse (z.B. Medikamente in Pandemien). Im IT-Bereich selten angewendet."},
{id:179,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Softwarevertrag nach §651 BGB?",o:["Dienstvertrag","Kaufvertrag: bei Standard-Software die körperlich übertragen wird – Gewährleistungsrecht des Kaufrechts gilt","Mietvertrag","Werkvertrag"],a:1,f:"Standardsoftware auf Datenträger = Kaufvertrag. Individualsoftware = Werkvertrag. SaaS = Mietvertrag/Dienstvertrag. Die Vertragsart bestimmt Gewährleistungsrechte und Haftung."},
{id:180,b:"5.2b",t:"Software-Lizenzen",q:"Was ist Indemnification in Software-Lizenzen?",o:["Schadensersatz für Bugs","Freistellungsklausel: Anbieter stellt Kunde von Ansprüchen Dritter frei (z.B. Patentverletzungen durch genutzte Software)","Haftungsausschluss","Garantieklausel"],a:1,f:"Indemnification: Lizensgeber verpflichtet sich den Lizenznehmer von Ansprüchen Dritter freizustellen, falls die Software Rechte Dritter verletzt. Wichtig bei Enterprise-Verträgen."},
{id:181,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein SLA (Service Level Agreement) in Software-Verträgen?",o:["Lizenzvertrag","Softwarelizenz","Wartungsvertrag","Vereinbarung über Qualität und Verfügbarkeit eines Dienstes: Uptime (z.B. 99,9%), Reaktionszeiten bei Fehlern"],a:3,f:"SLA: definiert messbare Servicequalität. Typische Kennzahlen: Verfügbarkeit (99,9% = max. 8,7h Downtime/Jahr), Reaktionszeit bei kritischen Fehlern (z.B. 1 Stunde), Wiederherstellungszeit."},
{id:182,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Lizenz-Downgrades-Berechtigung?",o:["Neuere Version kaufen","Lizenz übertragen","Lizenz zurückgeben","Recht eine ältere Version der Software zu nutzen obwohl eine neuere lizenziert ist (z.B. Windows 11 Lizenz → Windows 10 nutzen)"],a:3,f:"Downgrade-Recht: Besitzer neuerer Lizenz darf ältere Version nutzen. Typisch bei Windows Enterprise oder Server. Nützlich wenn ältere Systeme kompatibel bleiben müssen."},
{id:183,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Use-It-or-Lose-It-Klausel?",o:["Klausel die verhindert dass ungenutzte Lizenzen dauerhaft &#39;gehortet&#39; werden – Lizenzen verfallen wenn nicht genutzt","Automatische Verlängerung","Pflicht zur Nutzung","Spielregel"],a:0,f:"Use-It-or-Lose-It: manche Lizenzmodelle sehen vor dass ungenutzte Lizenzen verfallen oder zurückgezogen werden können. Schützt Anbieter vor Lizenzhorting, fördert aktives SAM."},
{id:184,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Quellcode-Escrow?",o:["Hinterlegung des Quellcodes bei einem Treuhänder – Kunde erhält Zugang wenn Hersteller insolvent wird","Backup-Vertrag","Open-Source-Pflicht","Lizenz-Depot"],a:0,f:"Source Code Escrow: Quellcode wird bei neutralem Treuhänder hinterlegt. Wenn Hersteller insolvent wird, erhält der Kunde den Code. Schützt bei kritischer proprietärer Software."},
{id:185,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Resale License?",o:["NFR-Lizenz","Lizenz die zurückgegeben wird","Lizenz die ausdrücklich den Weiterverkauf an Endkunden erlaubt – für Händler und Distributoren","Open-Source-Lizenz"],a:2,f:"Resale License: ermöglicht Händlern Software weiterzuverkaufen. Wird von Softwareherstellern an autorisierte Reseller vergeben. Endkunden ohne Resale-Berechtigung dürfen Software nicht weiterverkaufen."},
{id:186,b:"5.2b",t:"Software-Lizenzen",q:"Was ist die Besonderheit der AGPL gegenüber der GPL?",o:["AGPL schließt die &#39;SaaS-Lücke&#39;: auch wenn Software nur über Netzwerk angeboten wird (kein Download) muss Quellcode verfügbar gemacht werden","AGPL hat kein Copyleft","Schwächeres Copyleft","AGPL erlaubt proprietäre Nutzung"],a:0,f:"GPL-Lücke: GPL verlangt Quellcode-Offenlegung nur bei Distribution. SaaS distribuiert nicht – Nutzer bekommen die Software nie. AGPL schließt diese Lücke: Netzwerknutzung = Distribution."},
{id:187,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Hardware-gebundene Aktivierung?",o:["Benutzer-Aktivierung","Software-Aktivierung die an Hardware-Merkmale gebunden ist (CPU-ID, MAC-Adresse, Mainboard-ID) – bei Hardware-Wechsel muss reaktiviert werden","Cloud-Aktivierung","Software kaufen"],a:1,f:"Hardware-gebundene Aktivierung: Software prüft beim Start Hardware-Fingerprint. Bei Hardware-Wechsel (neue Grafikkarte, Mainboard) kann Reaktivierung nötig werden. Typisch: Windows OEM."},
{id:188,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Lizenz-Klausel zur Technologie-Neutralität?",o:["Kompatibilitätsklausel","Klausel die sicherstellt dass Lizenz unabhängig von genutzter Technologie/Plattform gilt","Software läuft auf jeder Hardware","Open-Source-Klausel"],a:1,f:"Technologieneutralität: Lizenz-Bedingungen sollen unabhängig von genutzter Technologie (Windows, Linux, ARM, x86) gelten. Teil der Open Source Definition (OSD) und CC 4.0."},
{id:189,b:"5.2b",t:"Software-Lizenzen",q:"Was ist &#39;Software Reuse&#39; lizenzrechtlich?",o:["Software sichern","Software löschen","Software recyceln","Wiederverwendung von Software-Komponenten in neuen Projekten – jede Komponente bringt ihre Lizenz mit, Kompatibilität muss geprüft werden"],a:3,f:"Software Reuse: Wiederverwendung von Bibliotheken und Code. Jede Komponente bringt Lizenz mit. Vor Reuse: Lizenztyp prüfen (GPL = Copyleft-Risiko), Kompatibilität mit eigener Lizenz sicherstellen."},
{id:190,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Lizenz-Kündigung?",o:["Lizenz erneuern","Lizenz verkaufen","Lizenz übertragen","Beendigung einer zeitlichen Lizenz (Abonnement) – bei vorzeitiger Kündigung können Gebühren anfallen, Nutzung endet sofort oder zum Vertragsende"],a:3,f:"Lizenz-Kündigung: Abonnements können gekündigt werden. Fristen beachten! Bei Jahreslizenz: oft 30 Tage vor Verlängerung kündigen. Nach Kündigung: kein Zugriff mehr auf Software/Daten."},
{id:191,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Lizenz für Virtualisierung?",o:["Spezielle Regelungen wie Lizenzen in virtualisierten Umgebungen gezählt werden (z.B. pro physischem Host, pro VM, pro vCPU)","Keine Sonderregeln","Lizenz für VMs kaufen","Floating License für VMs"],a:0,f:"Virtualisierungs-Lizenzierung: komplex! Microsoft: Windows Server Datacenter deckt unbegrenzte VMs auf physischem Host. Standard: 2 VMs. Oracle: jeder mögliche physische Core muss lizenziert werden."},
{id:192,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Academic Free License (AFL)?",o:["GPL-Variante","Creative-Commons-Lizenz","Permissive Open-Source-Lizenz ähnlich MIT aber mit Klausel gegen Patent-Trolling – OSI-approved","Lizenzen für Schüler"],a:2,f:"AFL (Academic Free License): permissive OSI-approved Lizenz. Ähnlich MIT, aber mit expliziter Patenklausel. Entwickelt um Patent-Missbrauch zu verhindern. Selten genutzt heute."},
{id:193,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Contributor License Agreement (CLA)?",o:["Vertrag zwischen Open-Source-Projekt und Entwickler: Entwickler räumt dem Projekt bestimmte Rechte am eigenen Beitrag ein","Nutzerlizenz","Endbenutzer-Vertrag","Vertriebslizenz"],a:0,f:"CLA: Entwickler die zu Open-Source-Projekten beitragen, unterzeichnen CLA. Räumt dem Projekt (oder Unternehmen dahinter) Rechte an Beiträgen ein. Ermöglicht Relizenzierung oder kommerzielle Nutzung."},
{id:194,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Dual-Source-Strategie?",o:["Zwei Betriebssysteme","Gleichzeitige Nutzung von Open-Source und propriäterer Software für kritische Funktionen um Abhängigkeit zu reduzieren","Zwei Hersteller für Hardware","Zwei Lizenzen"],a:1,f:"Dual-Source: für kritische Funktionen wird sowohl eine Open-Source- als auch proprietäre Alternative gepflegt. Reduziert Vendor-Lock-in. Beispiel: eigene Datenbank UND MySQL-Kompatibilität."},
{id:195,b:"5.2b",t:"Software-Lizenzen",q:"Was bedeutet Vendor Lock-in im Kontext von Lizenzen?",o:["WLAN-Sicherheitsproblem","Open-Source-Problem","Hersteller sperrt Software","Starke Abhängigkeit von einem Anbieter durch proprietäre Formate, APIs oder Lizenzen – Wechsel ist teuer und schwierig"],a:3,f:"Vendor Lock-in: proprietäre Software, Datenformate und APIs machen Wechsel zu Konkurrenz teuer. Mitigation: Open Standards, Open Source, exportierbare Datenformate, portable Architekturen."},
{id:196,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine ISC-Lizenz?",o:["GPL-Variante","CC-Lizenz","Sehr permissive Open-Source-Lizenz, noch kürzer als MIT – verzichtet auf &#39;ohne Haftung&#39;-Paragraphen der MIT","Internationale Software-Charta"],a:2,f:"ISC-Lizenz: funktional äquivalent zu MIT, aber kürzer. Nur zwei Bedingungen: Copyright-Hinweis und Permission-Notice beibehalten. Genutzt von OpenBSD und vielen npm-Paketen."},
{id:197,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Lizenz-Key-Generator (Keygen)?",o:["Aktivierungs-Tool","Passwort-Manager","Illegales Programm das gültige Lizenz-Keys für Software generiert – zur Umgehung von Kopierschutz (Software-Piraterie)","Legales Tool"],a:2,f:"Keygen: Schadsoftware die Lizenz-Keys fälscht oder generiert. Illegal (Urheberrechtsverletzung) und gefährlich (enthält oft Malware). Keine gültige Lizenz – Software nicht rechtmäßig genutzt."},
{id:198,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine License Server Redundancy?",o:["Floating-License-Backup","Redundanter Lizenzserver für Hochverfügbarkeit – fällt der primäre Lizenzserver aus übernimmt der Sekundäre","Backup für Lizenzdatei","Lizenz-Kopie"],a:1,f:"License Server HA: für kritische Floating-License-Umgebungen werden redundante Lizenzserver eingesetzt. Ausfall des Lizenzservers = alle Clients können Software nicht mehr starten!"},
{id:199,b:"5.2b",t:"Software-Lizenzen",q:"Was ist der &#39;Viral&#39;-Effekt von GPL-Lizenzen?",o:["Computervirus","Virenscanner-Pflicht","Marketingeffekt","GPL-Code &#39;infiziert&#39; proprietären Code: wenn GPL-Code in proprietäre Software eingebunden wird, muss die gesamte Software unter GPL veröffentlicht werden"],a:3,f:"GPL-Viralereffekt (Copyleft-Kontagion): GPL-Lizenz &#39;breitet sich aus&#39;. Propriätare Software die GPL-Code nutzt und distribuiert wird GPL-pflichtig. Deshalb meiden viele Unternehmen GPL in kommerziellen Produkten."},
{id:200,b:"5.2b",t:"Software-Lizenzen",q:"Was ist das wichtigste Prinzip beim Einsatz von Open-Source-Software im Unternehmen?",o:["Nur MIT-Lizenzen sind sicher","Lizenzen sind unwichtig","Open Source ist immer kostenlos und problemlos","Jede genutzte Open-Source-Komponente hat eine Lizenz deren Bedingungen geprüft und eingehalten werden müssen – besonders bei Copyleft-Lizenzen wie GPL"],a:3,f:"Kernprinzip: keine Open-Source-Software nutzen ohne ihre Lizenz zu prüfen. Copyleft-Lizenzen (GPL) können eigenen Code &#39;viral&#39; machen. SBOM pflegen, regelmäßige Open-Source-Audits, License-Compliance sicherstellen."}
];
let st={},filt=[...Q];
function init(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});render();}
function render(){
  const c=document.getElementById('qc');c.innerHTML='';
  let lb=null;
  const bn={'5.1':'⚖️ 5.1 Urheberrecht Grundlagen','5.2a':'🔓 5.2 Creative Commons Lizenzen','5.2b':'📋 5.2 Software-Lizenzmodelle'};
  filt.forEach(q=>{
    if(q.b!==lb){const d=document.createElement('div');d.className='bh';d.textContent=bn[q.b]||q.b;c.appendChild(d);lb=q.b;}
    c.appendChild(mk(q));
  });up();}
function mk(q){
  const s=st[q.id],d=document.createElement('div'),L=['A','B','C','D'];
  d.className='qc'+(s.done?(s.ok?' ac':' aw'):'');d.id='c'+q.id;
  d.innerHTML=`<div class="qn">FRAGE ${q.id}/200</div><div class="qt">${q.t}</div><div class="qq">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt${s.done?' dis':''}${s.done&&i===q.a?' ok':''}${s.done&&!s.ok&&i===s.ci?' ng':''}" onclick="ans(${q.id},${i})"><span class="ol">${L[i]}</span><span>${o}</span></div>`).join('')}</div>
<div class="fbb${s.done?' show '+(s.ok?'cok':'cng'):''}" id="f${q.id}">${s.done?(s.ok?'✅ ':'❌ ')+q.f:''}</div>`;
  return d;}
function ans(id,i){
  const s=st[id];if(s.done)return;
  const q=Q.find(x=>x.id===id);s.done=true;s.ok=i===q.a;s.ci=i;
  const c=document.getElementById('c'+id);c.className='qc '+(s.ok?'ac':'aw');
  c.querySelectorAll('.opt').forEach((el,j)=>{el.classList.add('dis');if(j===q.a)el.classList.add('ok');if(!s.ok&&j===i)el.classList.add('ng');});
  const f=document.getElementById('f'+id);f.textContent=(s.ok?'✅ ':'❌ ')+q.f;f.className='fbb show '+(s.ok?'cok':'cng');up();}
function up(){
  const tot=Q.length,done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  document.getElementById('sd').textContent=ok+'/'+done;
  document.getElementById('pf').style.width=(done/tot*100)+'%';
  document.getElementById('pl').textContent=done+' von '+tot+' beantwortet';}
function fil(t,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('act'));btn.classList.add('act');
  if(t==='all')filt=[...Q];
  else if(t==='open')filt=Q.filter(q=>!st[q.id].done);
  else if(t==='wrong')filt=Q.filter(q=>st[q.id].done&&!st[q.id].ok);
  else filt=Q.filter(q=>q.b===t);render();}
function shuf(){filt=[...filt].sort(()=>Math.random()-.5);render();}
function rst(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});filt=[...Q];document.querySelectorAll('.fb').forEach((b,i)=>b.classList.toggle('act',i===0));render();document.getElementById('ov').classList.remove('show');}
function showR(){
  const done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  const pct=done>0?Math.round(ok/done*100):0;
  let e='😅',m='Weiter üben!';
  if(pct>=90){e='🏆';m='Ausgezeichnet!';}else if(pct>=75){e='🎉';m='Sehr gut!';}else if(pct>=60){e='📚';m='Gut – noch etwas üben!';}
  document.getElementById('oe').textContent=e;document.getElementById('os').textContent=ok+'/'+done;
  document.getElementById('om').textContent=pct+'% richtig – '+m+' ('+(Q.length-done)+' offen)';
  document.getElementById('ov').classList.add('show');}
function closeR(){document.getElementById('ov').classList.remove('show');}
init();
</script></body></html>
