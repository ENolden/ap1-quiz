<script>
const Q=[
// === 5.1 Urheberrecht (1-70) ===
{id:1,b:"5.1",t:"Urheberrecht Grundlagen",q:"Wo ist das Urheberrecht in Deutschland gesetzlich geregelt?",o:["Bürgerliches Gesetzbuch (BGB)","Urheberrechtsgesetz (UrhG)","Grundgesetz (GG)","Handelsgesetzbuch (HGB)"],a:1,f:"Das Urheberrecht ist in Deutschland im Urheberrechtsgesetz (UrhG) geregelt. Es schützt Schöpfer geistiger Werke vor unbefugter Nutzung."},
{id:2,b:"5.1",t:"Urheberrecht Grundlagen",q:"Wann entsteht das Urheberrecht an einem Werk?",o:["Nach 1 Jahr","Nach Registrierung beim Patentamt","Nach Veröffentlichung","Automatisch mit der Schöpfung des Werks – keine Registrierung nötig"],a:3,f:"Das Urheberrecht entsteht automatisch mit der Schöpfung des Werks. Es ist keine Anmeldung oder Registrierung erforderlich."},
{id:3,b:"5.1",t:"Urheberrecht Grundlagen",q:"Wie lange gilt das Urheberrecht in Deutschland?",o:["Unbegrenzt","10 Jahre nach Schöpfung","25 Jahre nach Veröffentlichung","70 Jahre nach dem Tod des Urhebers"],a:3,f:"Das Urheberrecht gilt in der Regel 70 Jahre nach dem Tod des Urhebers. Danach wird das Werk gemeinfrei."},
{id:4,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was sind geschützte Werke nach dem UrhG?",o:["Nur Bücher und Musik","Texte, Musik, Bilder, Software, Filme, wissenschaftliche Werke etc.","Nur kommerzielle Produkte","Nur digitale Werke"],a:1,f:"Geschützt sind: Texte, Musik, Bilder, Computerprogramme (Software), Filme, wissenschaftliche Werke und viele weitere kreative Schöpfungen."},
{id:5,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was sind Urheberpersönlichkeitsrechte?",o:["Schutz der persönlichen Beziehung zum Werk: Namensnennung, Schutz vor Entstellung","Recht auf Verbreitung","Recht auf Vervielfältigung","Recht auf Bezahlung"],a:0,f:"Urheberpersönlichkeitsrechte: Recht auf Namensnennung als Urheber, Schutz vor Entstellung oder Verfälschung des Werks. Sind nicht übertragbar."},
{id:6,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was sind Verwertungsrechte?",o:["Wirtschaftliche Rechte: Vervielfältigung, Verbreitung, öffentliche Wiedergabe – können lizenziert werden","Persönliche Rechte des Urhebers","Namensrechte","Moralische Rechte"],a:0,f:"Verwertungsrechte sind die wirtschaftlichen Rechte: Vervielfältigung, Verbreitung, öffentliche Wiedergabe, Bearbeitung. Sie können durch Lizenzen anderen eingeräumt werden."},
{id:7,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was sind Nutzungsrechte?",o:["Moralische Rechte","Rechte des Urhebers selbst","Persönlichkeitsrechte","Rechte die der Urheber anderen Personen durch Lizenzen einräumt"],a:3,f:"Nutzungsrechte werden vom Urheber durch Lizenzen an andere Personen vergeben. Sie erlauben die Nutzung des Werks in einem definierten Rahmen."},
{id:8,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was passiert bei einer Urheberrechtsverletzung?",o:["Nur eine Verwarnung","Automatische Löschung des Werks","Abmahnung, Schadensersatzforderungen oder strafrechtliche Konsequenzen","Nichts"],a:2,f:"Verstöße gegen das Urheberrecht können Abmahnungen, Schadensersatz und strafrechtliche Folgen nach sich ziehen. Im IT-Bereich z.B. bei illegaler Softwarenutzung."},
{id:9,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist eine Privatkopie?",o:["Eine für den persönlichen Gebrauch erlaubte Kopie – sofern keine Kopierschutzmaßnahmen umgangen werden","Nur für Musik erlaubt","Illegale Kopie","Kommerziell nutzbare Kopie"],a:0,f:"Privatkopie: Im deutschen Urheberrecht darf man für den privaten Gebrauch Kopien anfertigen, solange keine technischen Schutzmaßnahmen umgangen werden."},
{id:10,b:"5.1",t:"Urheberrecht Grundlagen",q:"Wann sind Zitate urheberrechtlich erlaubt?",o:["Nie","Nur bei kommerziellen Werken","Immer und überall","Bei Angabe der Quelle und wenn das Zitat einem bestimmten Zweck dient (Zitat-Schranke)"],a:3,f:"Zitate sind zulässig, wenn die Quelle angegeben wird und das Zitat einem selbstständigen wissenschaftlichen, kritischen oder erläuternden Zweck dient (§51 UrhG)."},
{id:11,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was sind Schrankenregelungen im Urheberrecht?",o:["Strafen bei Verletzung","Registrierungspflichten","Ausnahmen vom Urheberrechtsschutz für Bildung, Wissenschaft und Berichterstattung","Verbote für Urheber"],a:2,f:"Schrankenregelungen erlauben die Nutzung urheberrechtlich geschützter Werke ohne Erlaubnis in bestimmten Fällen: Bildung, Wissenschaft, Berichterstattung, Zitate."},
{id:12,b:"5.1",t:"Urheberrecht Grundlagen",q:"Ist Software urheberrechtlich geschützt?",o:["Nein, Software ist frei","Nur Open-Source-Software","Ja, Computerprogramme sind nach UrhG geschützt wie literarische Werke","Nur kommerzielle Software"],a:2,f:"Ja! Computerprogramme sind nach §69a UrhG wie Sprachwerke geschützt. Der Quellcode und der Objektcode genießen automatisch Urheberrechtsschutz."},
{id:13,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist der Unterschied zwischen Urheberrecht und Patent?",o:["Urheberrecht schützt automatisch kreative Werke; Patent schützt Erfindungen und muss angemeldet werden","Patent ist stärker","Urheberrecht muss auch angemeldet werden","Kein Unterschied"],a:0,f:"Urheberrecht: automatisch, schützt kreative Ausdrucksform (z.B. Code). Patent: muss angemeldet werden, schützt technische Erfindungen (z.B. Algorithmen, Verfahren)."},
{id:14,b:"5.1",t:"Urheberrecht Grundlagen",q:"Wer ist der Urheber eines Werks?",o:["Der Verleger","Der Käufer","Die natürliche Person, die das Werk geschaffen hat – juristischen Personen können keine Urheber sein","Das Unternehmen das es veröffentlicht"],a:2,f:"Urheber kann nur eine natürliche Person (Mensch) sein – nicht Unternehmen oder KI. Bei Auftragswerken hat das Unternehmen jedoch oft Nutzungsrechte."},
{id:15,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist ein Mitarbeiterwerk?",o:["Freiberufliche Arbeit","Privates Kunstwerk","Werk das ein Arbeitnehmer im Rahmen seiner beruflichen Pflichten erstellt – Nutzungsrechte gehen auf Arbeitgeber über","Open-Source-Beitrag"],a:2,f:"Bei Software, die Arbeitnehmer in Erfüllung ihrer Arbeitsaufgaben erstellen (§69b UrhG), stehen dem Arbeitgeber ausschließlich die Nutzungsrechte zu."},
{id:16,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist gemeinfrei (Public Domain)?",o:["Software die kostenlos ist","Freeware","Open-Source-Software","Werke deren Urheberrechtsschutz abgelaufen ist und die ohne Einschränkungen genutzt werden dürfen"],a:3,f:"Gemeinfrei: Urheberrechtsschutz ist abgelaufen (70 Jahre nach Tod des Urhebers) oder wurde explizit aufgegeben (CC0). Kann ohne Einschränkungen genutzt werden."},
{id:17,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist ein Lizenzvertrag?",o:["Kaufvertrag für Software","Mietvertrag für Hardware","Arbeitsvertrag","Vertrag, der einem Nutzer bestimmte Nutzungsrechte am urheberrechtlich geschützten Werk einräumt"],a:3,f:"Ein Lizenzvertrag regelt, welche Nutzungsrechte der Lizenznehmer erhält: z.B. wie viele Installationen, auf welchen Geräten, für welchen Zeitraum, ob Weitergabe erlaubt ist."},
{id:18,b:"5.1",t:"Urheberrecht Grundlagen",q:"Darf man gekaufte Software an andere weitergeben?",o:["Niemals","Nur wenn die Lizenz dies ausdrücklich erlaubt – viele EULAs verbieten Weiterverkauf oder -gabe","Immer","Nur an Familienmitglieder"],a:1,f:"Das hängt von den Lizenzbedingungen ab. EULAs (End User License Agreements) verbieten oft die Weitergabe. Bei Box-Software (Einzelhandelskauf) ist Weiterverkauf oft erlaubt."},
{id:19,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist eine EULA?",o:["End User License Agreement – Endbenutzer-Lizenzvertrag der die Nutzungsbedingungen für Software festlegt","Ein Urheberrechts-Gesetz","Eine Creative-Commons-Lizenz","Eine Art Open-Source-Lizenz"],a:0,f:"EULA (End User License Agreement): der Vertrag zwischen Softwareanbieter und Nutzer. Legt fest was der Nutzer mit der Software darf und nicht darf. Wird beim Installieren akzeptiert."},
{id:20,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was bedeutet &#39;proprietäre Software&#39;?",o:["Closed-Source-Software mit beschränkten Nutzungsrechten – oft kostenpflichtig (z.B. Windows, Adobe Suite)","Freeware","Open-Source-Software","Kostenlose Software"],a:0,f:"Proprietäre Software: Quellcode ist nicht öffentlich, Nutzungsrechte stark eingeschränkt (keine Weitergabe, Modifikation, kein Einblick in Code). Beispiele: Windows, Microsoft Office, Adobe."},
{id:21,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist Freeware?",o:["Freie Open-Source-Software","Kostenlos nutzbare Software, aber nicht Open Source – Quellcode bleibt geschützt","Public-Domain-Software","Gemeinnützige Software"],a:1,f:"Freeware ist kostenlos nutzbar, aber nicht Open Source. Der Quellcode ist nicht einsehbar, Modifikation ist nicht erlaubt. Beispiele: WinRAR (kostenlos mit Nag-Screen), VLC."},
{id:22,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist Shareware?",o:["Freeware","Software die kostenlos für eine Testphase genutzt werden darf – danach ist Kauf erforderlich","Gemeinsam entwickelte Software","Open-Source-Software"],a:1,f:"Shareware: Testversion kostenlos verfügbar, nach Ablauf der Testphase oder bei vollem Funktionsumfang kostenpflichtig. Heute oft als &#39;Freemium&#39; bezeichnet."},
{id:23,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist Open Source Software?",o:["Software bei der der Quellcode öffentlich zugänglich ist – Nutzung, Modifikation und Weitergabe oft erlaubt (je nach Lizenz)","Proprietäre Software","Freeware","Kostenlose Software ohne Einschränkungen"],a:0,f:"Open Source: Quellcode ist einsehbar und oft veränderbar. Nutzung/Modifikation/Weitergabe je nach Lizenz (GPL, MIT, Apache). Beispiele: Linux, Firefox, Python, VLC."},
{id:24,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist der Unterschied zwischen Freeware und Open Source?",o:["Freeware ist Open Source","Open Source ist kostenlos, Freeware nicht","Kein Unterschied","Freeware ist kostenlos aber Quellcode bleibt geschützt; Open Source gibt Quellcode frei und erlaubt Modifikation"],a:3,f:"Freeware: kostenlos, aber Closed Source. Open Source: Quellcode frei, aber nicht zwingend kostenlos. Open Source kann kommerziell sein, Freeware muss kostenlos sein."},
{id:25,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was versteht man unter &#39;Copyleft&#39;?",o:["Kein Urheberrecht","Öffentliche Domain","Klausel in Open-Source-Lizenzen: Abgeleitete Werke müssen unter derselben Lizenz weitergegeben werden (z.B. GPL)","Umgekehrtes Copyright"],a:2,f:"Copyleft (z.B. in der GPL): Wer Software modifiziert und weitergibt, muss die Änderungen ebenfalls unter der gleichen Open-Source-Lizenz veröffentlichen."},
{id:26,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist eine permissive Open-Source-Lizenz?",o:["Sehr restriktive Lizenz","GPL-Lizenz","Copyleft-Lizenz","Freizügige Lizenz die wenige Einschränkungen hat – Nutzung auch in proprietärer Software erlaubt (z.B. MIT, BSD, Apache)"],a:3,f:"Permissive Lizenzen (MIT, BSD, Apache 2.0): erlauben fast alles, auch Einbindung in kommerzielle/proprietäre Software. Einzige Pflicht oft: Urheberrechtshinweis beibehalten."},
{id:27,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist die GPL (GNU General Public License)?",o:["Eine Creative-Commons-Lizenz","Eine permissive Lizenz","Eine proprietäre Lizenz","Starke Copyleft-Lizenz: Software und alle Ableitungen müssen als Open Source veröffentlicht werden"],a:3,f:"GPL: starke Copyleft-Lizenz von GNU/Free Software Foundation. Wer GPL-Software nutzt und verändert, muss den Quellcode der Änderungen ebenfalls unter GPL veröffentlichen."},
{id:28,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist die MIT-Lizenz?",o:["Sehr permissive Open-Source-Lizenz: Nutzung, Modifikation, Weitergabe auch kommerziell erlaubt – einzige Pflicht: Copyright-Hinweis beibehalten","GPL-Variante","Creative-Commons-Lizenz","Restriktive Copyleft-Lizenz"],a:0,f:"MIT-Lizenz: eine der freizügigsten Open-Source-Lizenzen. Nutzung in eigenen (auch kommerziellen) Projekten erlaubt. Einzige Bedingung: MIT-Lizenztext und Copyright-Hinweis beibehalten."},
{id:29,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist Software-Piraterie?",o:["Entwicklung von Software auf einem Schiff","Legale Weitergabe von Software","Open-Source-Entwicklung","Illegale Vervielfältigung, Verbreitung oder Nutzung von Software ohne gültige Lizenz"],a:3,f:"Software-Piraterie: illegale Nutzung von Software ohne Lizenz (z.B. gecrackte Software, illegale Kopien). Kann zu Schadensersatz und Strafverfolgung führen."},
{id:30,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist Software-Audit?",o:["Backup-Prüfung","Prüfung ob ein Unternehmen alle genutzten Software-Lizenzen korrekt besitzt und einhält","Software-Entwicklung","Software-Test"],a:1,f:"Software-Audit: Überprüfung ob alle eingesetzte Software lizenzrechtlich korrekt ist. Wird von Softwareherstellern oder intern durchgeführt. Verstöße können teuer werden."},
{id:31,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist SAM (Software Asset Management)?",o:["Sicherheits-Management","Systematische Verwaltung aller Software-Lizenzen eines Unternehmens – Überblick über installierte Software und Lizenzen","Server-Management","Storage-Management"],a:1,f:"SAM: Software-Lizenz-Verwaltung im Unternehmen. Ziel: Überblick über alle Lizenzen behalten, Über- oder Unterlizenzierung vermeiden, Compliance sicherstellen."},
{id:32,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist Überlizenzierung?",o:["Mehr Lizenzen als nötig gekauft – unnötige Kosten","Zu wenige Lizenzen","Falsche Lizenzart","Lizenzverletzung"],a:0,f:"Überlizenzierung: Unternehmen kauft mehr Lizenzen als benötigt. Kostet unnötig Geld. Gegenteil: Unterlizenzierung (zu wenige Lizenzen) = Lizenzverstoß."},
{id:33,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist Unterlizenzierung?",o:["Kostenloser Bonus","Zu viele Lizenzen","Weniger Lizenzen als tatsächlich genutzte Installationen – Lizenzverstoß mit Haftungsrisiko","Upgrade-Berechtigung"],a:2,f:"Unterlizenzierung: mehr Installationen als Lizenzen vorhanden. Ist eine Urheberrechtsverletzung. Bei einem Software-Audit drohen Nachzahlungen und Strafen."},
{id:34,b:"5.1",t:"Urheberrecht Grundlagen",q:"Darf man urheberrechtlich geschützten Code in eigene Software einbauen?",o:["Immer","Nur bei Open Source","Nur mit entsprechender Lizenz oder Genehmigung des Urhebers","Nie"],a:2,f:"Code ist urheberrechtlich geschützt. Einbau in eigene Software nur erlaubt wenn: passende Open-Source-Lizenz (MIT, Apache), explizite Genehmigung, oder eigene Schöpfung."},
{id:35,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist das Recht auf Softwaredecompilierung?",o:["Immer erlaubt","In engen Grenzen erlaubt: zur Fehlerbeseitigung oder Herstellung von Interoperabilität (§69e UrhG)","Nur für Open Source","Immer verboten"],a:1,f:"§69e UrhG: Dekompilierung ist unter engen Voraussetzungen erlaubt, z.B. zur Herstellung von Interoperabilität mit anderer Software – aber nicht zur Rekonstruktion des Quellcodes zum Kopieren."},
{id:36,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist ein Urheberrechtsvermerk (Copyright-Zeichen)?",o:["Pflichtangabe für alle Werke","Hinweis der Inhaber und Jahr des Urheberrechts dokumentiert (z.B. © 2024 MaxMustermann). Nicht Pflicht in Deutschland, aber üblich","Markenzeichen","Registrierungszeichen"],a:1,f:"Das ©-Zeichen dokumentiert den Urheber und das Jahr. In Deutschland ist es nicht gesetzlich erforderlich (Schutz entsteht automatisch), aber international üblich und empfehlenswert."},
{id:37,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist das Datenbankwerk?",o:["Eine strukturierte Sammlung von Daten die durch Auswahl und Anordnung eine eigene Schöpfung darstellt – urheberrechtlich geschützt","Nur Excel-Tabellen","Eine Datenbank-Software","Nur SQL-Datenbanken"],a:0,f:"Datenbankwerke (§4 UrhG): Datenbanken die durch Auswahl und Anordnung der Inhalte eine persönliche geistige Schöpfung darstellen. Zusätzlich: Sui-generis-Datenbankrecht (Investitionsschutz)."},
{id:38,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was schützt das Markenrecht?",o:["Kreative Werke","Namen, Logos und Zeichen die ein Unternehmen oder Produkt identifizieren – muss im Gegensatz zum Urheberrecht angemeldet werden","Software-Algorithmen","Patente"],a:1,f:"Markenrecht schützt Namen, Logos, Zeichen (z.B. Apple-Logo, Microsoft). Muss beim DPMA angemeldet werden. Schutz: 10 Jahre, beliebig verlängerbar. Anders als Urheberrecht."},
{id:39,b:"5.1",t:"Urheberrecht Grundlagen",q:"Kann KI-generierter Content urheberrechtlich geschützt sein?",o:["Ja nach 5 Jahren","Nur wenn teuer","Nein – aktuell kann nur ein Mensch Urheber sein; KI-Outputs ohne menschliche Kreativität sind nicht geschützt","Immer ja"],a:2,f:"Aktuell (2024): KI-generierte Inhalte ohne menschliche kreative Leistung genießen keinen Urheberrechtsschutz. Wenn ein Mensch wesentlich kreativ beigetragen hat, kann Schutz bestehen."},
{id:40,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist das Erstveröffentlichungsrecht?",o:["Recht zur Bearbeitung","Das ausschließliche Recht des Urhebers zu entscheiden, ob und wann ein Werk erstmals veröffentlicht wird","Recht zur Vervielfältigung","Recht zum Verkauf"],a:1,f:"Das Erstveröffentlichungsrecht (§12 UrhG) liegt beim Urheber: nur er entscheidet, ob, wie und wann ein Werk erstmals der Öffentlichkeit zugänglich gemacht wird."},
{id:41,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was bedeutet &#39;einfaches Nutzungsrecht&#39;?",o:["Nutzungsrecht ohne Bedingungen","Kostenloses Nutzungsrecht","Lizenz bei der der Urheber das Recht auch anderen einräumen darf (nicht exklusiv)","Exklusives Nutzungsrecht"],a:2,f:"Einfaches Nutzungsrecht: nicht-exklusiv. Der Urheber kann das gleiche Recht auch anderen einräumen. Gegensatz: ausschließliches (exklusives) Nutzungsrecht."},
{id:42,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was bedeutet &#39;ausschließliches Nutzungsrecht&#39;?",o:["Exklusives Nutzungsrecht: nur dieser Lizenznehmer darf das Werk nutzen – nicht mal der Urheber selbst","Kostenloses Recht","Recht zur Weitergabe","Unbefristetes Recht"],a:0,f:"Ausschließliches Nutzungsrecht: exklusiv. Nur der Lizenznehmer darf das Werk nutzen. Der Urheber kann das Recht nicht nochmals an andere vergeben."},
{id:43,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist ein Leistungsschutzrecht?",o:["Markenrecht","Schutzrecht für Personen die zur Verbreitung eines Werks beitragen (z.B. Verleger, Musiker bei Aufnahmen) – ähnlich wie Urheberrecht, aber nicht identisch","Urheberrecht für Erfinder","Patentrecht"],a:1,f:"Leistungsschutzrechte schützen z.B. ausübende Künstler, Tonträgerhersteller, Sendeunternehmen. Entstehen ebenfalls ohne Anmeldung, gelten 50-70 Jahre nach Erscheinen."},
{id:44,b:"5.1",t:"Urheberrecht Grundlagen",q:"Darf man Software auf einer Backup-Kopie installieren?",o:["Nur mit Sondererlaubnis","Nur bei Open Source","Ja – eine Sicherungskopie für den persönlichen Gebrauch ist nach §69d UrhG erlaubt","Nein, niemals"],a:2,f:"§69d UrhG: Der rechtmäßige Benutzer darf eine Sicherungskopie der Software erstellen, sofern dies für die Sicherung erforderlich ist."},
{id:45,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist ein Softwarevertrag typischerweise?",o:["Dienstleistungsvertrag","Kaufvertrag","Oft ein Lizenzvertrag (Nutzungsrecht) oder Werkvertrag (Erstellung), selten ein echter Kaufvertrag da kein Eigentumserwerb an der Software stattfindet","Mietvertrag"],a:2,f:"Beim Softwarekauf erwirbt man meist nur ein Nutzungsrecht (Lizenz), kein Eigentum an der Software selbst. Die Software bleibt geistiges Eigentum des Herstellers."},
{id:46,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist eine Volumenlizenz?",o:["Lizenz für einen Computer","Unbegrenzte Lizenz","Lizenz für eine bestimmte Anzahl von Installationen/Benutzern – günstiger als Einzellizenzen für Unternehmen","Lizenz für einen Nutzer"],a:2,f:"Volumenlizenz: Unternehmen kaufen Nutzungsrechte für eine definierte Anzahl von Computern/Nutzern zu Sonderkonditionen. Beispiele: Microsoft Open License, Adobe Value Incentive Plan."},
{id:47,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist ein OEM-Produkt?",o:["Open Source Software","Original Equipment Manufacturer – Softwarelizenz die an eine bestimmte Hardware gebunden ist (z.B. Windows auf neuem PC)","Freeware","Volumen-Software"],a:1,f:"OEM (Original Equipment Manufacturer): Software die mit Hardware verkauft wird und daran gebunden ist. Windows OEM darf nicht auf anderen Computern installiert werden. Günstiger als Retail-Version."},
{id:48,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist der Unterschied zwischen Retail- und OEM-Softwarelizenz?",o:["OEM ist besser","Retail: Hardware-unabhängig, übertragbar, teurer. OEM: an spezifische Hardware gebunden, nicht übertragbar, günstiger","Kein Unterschied","Retail ist immer billiger"],a:1,f:"Retail-Lizenz: kann auf neuem PC reinstalliert werden, übertragbar. OEM-Lizenz: an ursprüngliche Hardware gebunden, erlischt wenn PC defekt. OEM ist günstiger aber weniger flexibel."},
{id:49,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was bedeutet &#39;Copyleft&#39; konkret bei der GPL?",o:["Nur Namensnennung erforderlich","Wer GPL-Software modifiziert und weitergibt, muss die Änderungen ebenfalls unter GPL veröffentlichen","Software muss kostenlos sein","Software muss open source sein ohne andere Pflichten"],a:1,f:"GPL-Copyleft: Wenn man GPL-Software verändert und weitergibt (distribuiert), muss man den gesamten Quellcode der Änderungen ebenfalls unter GPL veröffentlichen."},
{id:50,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist ein Softwarepatent?",o:["Patent auf eine in Software implementierte Erfindung/Methode – in EU sehr eingeschränkt, in USA verbreitet","Marke für Software","Lizenz für Software","Urheberrecht für Software"],a:0,f:"Softwarepatente schützen Algorithmen und Verfahren in Software. In der EU kaum möglich (nur technische Erfindungen patentierbar). In den USA weit verbreitet und umstritten."},
{id:51,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist Reverse Engineering und wann ist es erlaubt?",o:["Nur bei Open Source","Immer verboten","Analyse von Software um ihre Funktionsweise zu verstehen – in engen Grenzen erlaubt (Interoperabilität, Sicherheitsforschung)","Immer erlaubt"],a:2,f:"Reverse Engineering ist grundsätzlich durch Urheberrecht eingeschränkt. Ausnahmen: Interoperabilität (§69e UrhG), Sicherheitsforschung, eigene Fehlerbeseitigung."},
{id:52,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist ein SaaS-Lizenzmodell?",o:["Software as a Service – Software wird als Dienst über Internet genutzt, keine Installation, Abonnement-Modell","Open-Source-Modell","Perpetual-Lizenz","Software kaufen"],a:0,f:"SaaS (Software as a Service): Software läuft auf Servern des Anbieters, Nutzer greifen per Browser zu. Kein Kauf, Abonnement. Beispiele: Microsoft 365, Google Workspace, Salesforce."},
{id:53,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist eine Perpetual License (Dauerlizenz)?",o:["Einmalige Zahlung für unbefristete Nutzungsrechte an einer Softwareversion","Abonnement","Zeitlich begrenzte Lizenz","Open-Source-Lizenz"],a:0,f:"Perpetual License: einmalig zahlen, Software dauerhaft nutzen (eine bestimmte Version). Kein laufendes Abonnement. Nachteil: Updates müssen extra bezahlt werden."},
{id:54,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist eine Subscription-Lizenz?",o:["Zeitlich begrenzte Lizenz mit regelmäßiger Zahlung (monatlich/jährlich) – inklusive Updates und Support","Dauerlizenz","Freeware-Lizenz","Open-Source-Lizenz"],a:0,f:"Subscription: regelmäßige Zahlung für Nutzungsrecht + Updates + Support. Beispiele: Adobe Creative Cloud, Microsoft 365. Vorteil: immer aktuelle Version. Nachteil: laufende Kosten."},
{id:55,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist eine Site License?",o:["Lizenz für einen Server","Lizenz die die Nutzung an einem bestimmten Standort/Gebäude für alle Mitarbeiter erlaubt","Volumenlizenz für 10 Nutzer","Lizenz für eine Webseite"],a:1,f:"Site License: erlaubt unbegrenzte Nutzung der Software an einem bestimmten Unternehmensstandort. Einfacher zu verwalten als Einzellizenzen."},
{id:56,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist eine Enterprise License?",o:["Umfangreiche Lizenz für ein gesamtes Unternehmen – deckt alle Mitarbeiter und Standorte ab","Lizenz für kleine Firmen","Testlizenz","Lizenz für einen Nutzer"],a:0,f:"Enterprise License: deckt das gesamte Unternehmen ab (alle Mitarbeiter, alle Standorte). Pauschalpreis. Einfache Verwaltung, günstig bei großen Mitarbeiterzahlen."},
{id:57,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist GNU?",o:["Ein Datenbankformat","Ein Betriebssystem-Unternehmen","Ein Programmierstandard","GNU&#39;s Not Unix – freies Betriebssystem-Projekt von Richard Stallman, Grundlage für GNU/Linux und die GPL"],a:3,f:"GNU (GNU&#39;s Not Unix): freies Software-Projekt von Richard Stallman (1983). Entwickelt freie Alternativen zu UNIX-Tools. Kombiniert mit Linux-Kernel = GNU/Linux. Entwickelte die GPL."},
{id:58,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist die FSF?",o:["Fast Software Framework","File System Format","Free Software Foundation – Organisation von Richard Stallman die freie Software fördert und die GPL herausgibt","Federal Software Foundation"],a:2,f:"FSF (Free Software Foundation): Non-Profit-Organisation gegründet von Richard Stallman 1985. Fördert freie Software, entwickelt und pflegt die GNU-Tools und die GPL."},
{id:59,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was sind die vier Freiheiten der Free Software Foundation?",o:["Ausführen (0), Studieren (1), Weitergeben (2), Verbessern (3) – definieren &#39;freie Software&#39;","Kopieren, Verkaufen, Patentieren, Veröffentlichen","Lesen, Schreiben, Ausführen, Löschen","Kostenlos, teilbar, änderbar, druckbar"],a:0,f:"Die vier Freiheiten: 0=Ausführen für jeden Zweck, 1=Studieren wie es funktioniert (Quellcode), 2=Weitergeben von Kopien, 3=Verbessern und Verbesserungen verteilen."},
{id:60,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist der Unterschied zwischen &#39;Free Software&#39; und &#39;Open Source&#39;?",o:["Open Source ist kostenlos","Free Software muss GPL sein","Identisch","Philosophisch: Free Software (FSF) = Freiheitsrecht. Open Source (OSI) = praktischer Entwicklungsansatz. Meistens gleiche Lizenzen, verschiedene Ideologien"],a:3,f:"Free Software (Stallman/FSF): politisch-philosophisch, Freiheit als Grundrecht. Open Source (Raymond/OSI): pragmatisch, Fokus auf Entwicklungsmodell. Viele Lizenzen erfüllen beide Definitionen."},
{id:61,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist die Apache License 2.0?",o:["Permissive Open-Source-Lizenz: Nutzung auch kommerziell erlaubt, kein Copyleft, aber Patentrechte werden explizit geregelt","Proprietäre Lizenz","Creative-Commons-Lizenz","GPL-Variante mit Copyleft"],a:0,f:"Apache 2.0: permissive Lizenz. Kein Copyleft, kommerzielle Nutzung erlaubt. Besonderheit: explizite Patentlizenz – Contributer räumen auch Patentrechte ein. Beliebt im Unternehmensumfeld."},
{id:62,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist die BSD-Lizenz?",o:["GPL-Variante","Proprietäre Lizenz","Permissive Open-Source-Lizenz, sehr ähnlich MIT. 2-Clause BSD: nur Urheberhinweis pflicht. 3-Clause: zusätzlich keine Namensnennung für Werbung","GNU-Lizenz"],a:2,f:"BSD-Lizenz: permissiv, ursprünglich von der University of California Berkeley. Modifikationen können unter beliebigen Bedingungen (auch proprietär) weitergegeben werden."},
{id:63,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist die LGPL?",o:["MIT-Variante","Creative-Commons-Variante","Lesser GPL – schwächeres Copyleft: erlaubt Einbindung in proprietäre Software als Bibliothek, ohne den eigenen Code offenlegen zu müssen","Strengere GPL"],a:2,f:"LGPL (Lesser GPL): Bibliotheken unter LGPL können in proprietäre Software eingebunden werden, ohne dass deren Quellcode offengelegt werden muss. Copyleft gilt nur für die LGPL-Bibliothek selbst."},
{id:64,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist die AGPL?",o:["MIT-Variante","BSD-Lizenz","Affero GPL – erweitertes Copyleft: auch Software die nur über Netzwerk genutzt wird muss als Open Source veröffentlicht werden","Schwächere GPL"],a:2,f:"AGPL (Affero GPL): schließt die &#39;SaaS-Lücke&#39; der GPL. Wenn man AGPL-Software über ein Netzwerk anbietet (z.B. Web-App), muss man den Quellcode veröffentlichen."},
{id:65,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was bedeutet &#39;dual licensing&#39;?",o:["Software wird gleichzeitig unter zwei verschiedenen Lizenzen angeboten (z.B. GPL für Open Source und kommerziell für Unternehmen)","RAID für Lizenzen","Zwei Kopien kaufen","Zwei Benutzer eine Lizenz"],a:0,f:"Dual Licensing: Anbieter veröffentlicht Software unter zwei Lizenzen gleichzeitig, z.B. GPL (kostenlos, Open Source) und kommerzielle Lizenz (kostenpflichtig, kein Copyleft)."},
{id:66,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist License Compliance?",o:["Lizenz erneuern","Sicherstellen dass alle verwendeten Software-Lizenzen korrekt eingehalten werden – wichtig bei Open-Source-Software in Produkten","Lizenzen kaufen","Lizenz verkaufen"],a:1,f:"License Compliance: prüfen ob Open-Source-Lizenzbedingungen eingehalten werden. Beispiel: GPL-Software in eigenem Produkt = Quellcode veröffentlichungspflichtig. Tools: FOSSA, Black Duck."},
{id:67,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist ein NDA (Non-Disclosure Agreement)?",o:["Arbeitsvertrag","Softwarelizenz","Open-Source-Lizenz","Geheimhaltungsvereinbarung – verpflichtet Parteien zur Vertraulichkeit über ausgetauschte Informationen"],a:3,f:"NDA (Non-Disclosure Agreement / Geheimhaltungsvereinbarung): vertraglich vereinbarte Verschwiegenheitspflicht. Wichtig bei Kooperationen, Entwicklungsaufträgen, Mitarbeitern."},
{id:68,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was regelt §69a UrhG?",o:["Sonderschutz für Computerprogramme – sie werden wie Sprachwerke geschützt, Quellcode und Objektcode sind geschützt","Markenrecht","Allgemeines Urheberrecht","Datenbankrecht"],a:0,f:"§69a UrhG: Computerprogramme (inkl. Entwurfsmaterial) sind wie Sprachwerke urheberrechtlich geschützt. Schutz gilt für Quellcode und Objektcode. Schutzvoraussetzung: eigene geistige Schöpfung."},
{id:69,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist das &#39;Erschöpfungsprinzip&#39; im Urheberrecht?",o:["Urheber ist erschöpft","Lizenz läuft aus","Nach dem erstmaligen Inverkehrbringen eines Werkexemplars durch den Urheber erlischt das Verbreitungsrecht – Weiterverkauf ist erlaubt (gilt für körperliche Werke)","Urheberrecht läuft ab"],a:2,f:"Erschöpfungsprinzip: Nach dem ersten Verkauf eines Exemplars (z.B. Buch, CD) erlischt das Verbreitungsrecht des Urhebers. Der Käufer darf es weiterverkaufen. Bei Downloadsoftware umstritten."},
{id:70,b:"5.1",t:"Urheberrecht Grundlagen",q:"Was ist der CCC (Chaos Computer Club) in Bezug auf IT-Recht?",o:["Software-Unternehmen","Lizenz-Prüfstelle","Regierungsbehörde","Größter europäischer Hackerverband – engagiert sich für digitale Rechte, Datenschutz und kritisiert Urheberrechtsverschärfungen"],a:3,f:"CCC (Chaos Computer Club): seit 1981 aktivster europäischer Hackerverband. Engagiert sich für Datenschutz, Informationsfreiheit, kritisiert Überwachung und restriktives Urheberrecht."},
// === 5.2 Creative Commons (71-130) ===
{id:71,b:"5.2a",t:"Creative Commons",q:"Was ist Creative Commons (CC)?",o:["Non-Profit-Organisation die standardisierte Lizenzen bereitstellt, mit denen Urheber ihre Werke unter definierten Bedingungen frei geben können","Ein Urheberrechtsgesetz","Ein Software-Unternehmen","Ein Gerichtssystem"],a:0,f:"Creative Commons: 2001 gegründete Non-Profit, stellt standardisierte Lizenzen bereit. Ermöglicht Urhebern, Werke unter bestimmten Bedingungen zu teilen – Mitte zwischen &#39;alle Rechte&#39; und &#39;keine Rechte&#39;."},
{id:72,b:"5.2a",t:"Creative Commons",q:"Was bedeutet das CC-Kürzel &#39;BY&#39;?",o:["Bypass – Nutzung ohne Bedingungen","Attribution – Urheber muss genannt werden","Buy only – nur käuflich","By default (Standard)"],a:1,f:"BY = Attribution (Namensnennung): Der Urheber muss bei jeder Nutzung namentlich genannt werden. BY ist in nahezu allen CC-Lizenzen enthalten."},
{id:73,b:"5.2a",t:"Creative Commons",q:"Was bedeutet das CC-Kürzel &#39;SA&#39;?",o:["Share Always","Sell Allowed","Same Author","ShareAlike – Abgeleitete Werke müssen unter gleicher Lizenz veröffentlicht werden (ähnlich Copyleft)"],a:3,f:"SA = ShareAlike (Weitergabe unter gleichen Bedingungen): Ableitungen müssen unter der gleichen oder einer kompatiblen CC-Lizenz veröffentlicht werden. Das CC-Äquivalent zu Copyleft."},
{id:74,b:"5.2a",t:"Creative Commons",q:"Was bedeutet das CC-Kürzel &#39;ND&#39;?",o:["No Distribution","No Download","NoDerivatives – keine Veränderung oder Bearbeitung erlaubt, nur Weitergabe in Originalform","No Definition"],a:2,f:"ND = NoDerivatives (Keine Bearbeitung): Das Werk darf nicht verändert, bearbeitet oder remixed werden. Nur Weitergabe in unveränderter Form erlaubt."},
{id:75,b:"5.2a",t:"Creative Commons",q:"Was bedeutet das CC-Kürzel &#39;NC&#39;?",o:["No Copyright","NonCommercial – keine kommerzielle Nutzung erlaubt","New Creation","No Content"],a:1,f:"NC = NonCommercial (Nicht-kommerziell): Das Werk darf nur für nicht-kommerzielle Zwecke genutzt werden. Keine Nutzung zur Gewinnerzielung."},
{id:76,b:"5.2a",t:"Creative Commons",q:"Was ist CC0?",o:["CC mit Namensnennung","CC für kommerzielle Nutzung","CC Zero – Urheber verzichtet vollständig auf alle Rechte, Werk wird gemeinfrei (Public Domain Dedication)","Eine restriktive CC-Lizenz"],a:2,f:"CC0: Der Urheber verzichtet auf alle Urheberrechte weltweit. Das Werk kann ohne jegliche Einschränkungen genutzt werden – wie gemeinfrei. Ideal für Daten und wissenschaftliche Werke."},
{id:77,b:"5.2a",t:"Creative Commons",q:"Was erlaubt die Lizenz CC BY?",o:["Nur private Nutzung","Nutzung, Veränderung, Weitergabe (auch kommerziell) erlaubt – einzige Pflicht: Urheber nennen","Keine Veränderung erlaubt","Nur nicht-kommerzielle Nutzung"],a:1,f:"CC BY: Die freizügigste CC-Lizenz mit Bedingung. Alles erlaubt (teilen, verändern, auch kommerziell) solange der Urheber genannt wird."},
{id:78,b:"5.2a",t:"Creative Commons",q:"Was erlaubt/verbietet CC BY-NC?",o:["Nutzung und Veränderung erlaubt, aber keine kommerzielle Nutzung – Urheber muss genannt werden","Kommerzielle Nutzung erlaubt","Nur Weitergabe unverändert","Keine Veränderung"],a:0,f:"CC BY-NC: Teilen und verändern erlaubt, aber KEIN kommerzieller Einsatz. Urheber muss genannt werden. Beispiel: Bildung, Forschung, private Blogs."},
{id:79,b:"5.2a",t:"Creative Commons",q:"Was erlaubt CC BY-SA?",o:["Kein Urheberverweis nötig","Nur private Nutzung","Keine Veränderung","Nutzung und Veränderung erlaubt (auch kommerziell) – Ableitungen müssen unter gleicher Lizenz veröffentlicht werden"],a:3,f:"CC BY-SA: Ähnlich CC BY, aber mit Copyleft. Ableitungen müssen unter CC BY-SA oder kompatible Lizenz veröffentlicht werden. Wikipedia verwendet CC BY-SA."},
{id:80,b:"5.2a",t:"Creative Commons",q:"Was erlaubt CC BY-ND?",o:["Veränderung erlaubt","Keine Weitergabe","Nur nicht-kommerzielle Nutzung","Teilen erlaubt (auch kommerziell), aber KEINE Veränderung – Urheber nennen"],a:3,f:"CC BY-ND: Weitergabe (auch kommerziell) erlaubt, aber keine Bearbeitung oder Remix. Das Werk muss unverändert weitergegeben werden."},
{id:81,b:"5.2a",t:"Creative Commons",q:"Was erlaubt CC BY-NC-SA?",o:["Nur Weitergabe unverändert","Kommerzielle Nutzung erlaubt","Keine Bedingungen","Teilen und verändern erlaubt, aber KEIN kommerzielles Einsatz und Ableitungen müssen unter gleicher Lizenz stehen"],a:3,f:"CC BY-NC-SA: Nicht-kommerziell + ShareAlike. Teilen und verändern für nicht-kommerzielle Zwecke erlaubt, Ableitungen unter CC BY-NC-SA."},
{id:82,b:"5.2a",t:"Creative Commons",q:"Was erlaubt CC BY-NC-ND?",o:["Weitgehende Freiheit","Keine Einschränkungen","Nur kommerzielle Nutzung","Restriktivste CC-Lizenz: nur nicht-kommerzielles Teilen in unveränderter Form erlaubt – kein Remix, keine kommerzielle Nutzung"],a:3,f:"CC BY-NC-ND: die restriktivste CC-Lizenz (nach CC0 die &#39;strengste&#39;). Nur unveränderte, nicht-kommerzielle Weitergabe. Kein Remix, kein kommerzieller Einsatz."},
{id:83,b:"5.2a",t:"Creative Commons",q:"Welche CC-Lizenz nutzt Wikipedia?",o:["CC0","CC BY-SA 4.0 (und GFDL)","CC BY-NC","CC BY"],a:1,f:"Wikipedia verwendet CC BY-SA 4.0 (Creative Commons Attribution-ShareAlike 4.0) und die GFDL (GNU Free Documentation License). ShareAlike bedeutet: Ableitungen müssen unter gleicher Lizenz stehen."},
{id:84,b:"5.2a",t:"Creative Commons",q:"Sind CC-Lizenzen kumulierbar mit dem Urheberrecht?",o:["Nein, sie ersetzen es","Nur in bestimmten Ländern","Ja – CC-Lizenzen bauen auf dem Urheberrecht auf. Der Urheber behält das Urheberrecht, räumt aber bestimmte Nutzungsrechte per Lizenz ein","CC ersetzt das Urheberrecht komplett"],a:2,f:"CC-Lizenzen ersetzen das Urheberrecht nicht – sie bauen darauf auf. Der Urheber behält alle Rechte und gewährt durch die CC-Lizenz bestimmte Nutzungsrechte an alle."},
{id:85,b:"5.2a",t:"Creative Commons",q:"Können CC-Lizenzen zurückgezogen werden?",o:["Ja, jederzeit","Ja, nach 1 Jahr","Nein – CC-Lizenzen sind unwiderruflich. Bestehende Lizenznehmer behalten ihre Rechte auch wenn der Urheber die Lizenz ändert","Nur bei CC0"],a:2,f:"CC-Lizenzen sind unwiderruflich: Wer ein Werk unter CC BY lizenziert hat, kann die Lizenz für bereits vergebene Rechte nicht zurückziehen. Der Urheber kann künftige Versionen anders lizenzieren."},
{id:86,b:"5.2a",t:"Creative Commons",q:"Was ist CC 4.0?",o:["Die aktuelle Version der Creative-Commons-Lizenzen – international harmonisiert, gilt weltweit ohne nationale Anpassungen","Die 4. Version des Urhebergesetzes","Ein Kompressionssystem","Eine restriktive Lizenz"],a:0,f:"CC 4.0 (2013): aktuelle und empfohlene Version der CC-Lizenzen. Wichtige Verbesserungen: international harmonisiert, gilt direkt weltweit, klarere Datenbankregeln."},
{id:87,b:"5.2a",t:"Creative Commons",q:"Was muss man bei CC BY-Werken immer angeben?",o:["Nur den Werknamen","Nur den Lizenztyp","Nur die Quelle","Name des Urhebers, Titel des Werks, URL der Lizenz, und Quelle – das TASL-Prinzip"],a:3,f:"TASL: Title (Titel), Author (Urheber), Source (Quelle), License (Lizenztyp mit URL). Diese Angaben sind bei der Attribution (BY) erforderlich."},
{id:88,b:"5.2a",t:"Creative Commons",q:"Wofür eignet sich CC0 besonders?",o:["Für geschützte Werke","Für proprietäre Werke","Für wissenschaftliche Daten, Forschungsdaten und Werke die ohne Einschränkungen geteilt werden sollen","Für kommerzielle Software"],a:2,f:"CC0 eignet sich besonders für wissenschaftliche Daten, Forschungsergebnisse und andere Werke, die maximale Nachnutzung ermöglichen sollen. Häufig bei Open Data verwendet."},
{id:89,b:"5.2a",t:"Creative Commons",q:"Was ist der Unterschied zwischen CC und Open Source?",o:["CC ist restriktiver","Identisch","CC-Lizenzen für Kreativwerke (Bilder, Texte, Musik). Open-Source-Lizenzen für Software. CC-Lizenzen sind für Software NICHT empfohlen","Open Source ist stärker"],a:2,f:"CC: für kreative Werke (Texte, Bilder, Musik, Videos). Open Source (GPL, MIT): für Software-Code. Creative Commons empfiehlt explizit, ihre Lizenzen NICHT für Software zu verwenden."},
{id:90,b:"5.2a",t:"Creative Commons",q:"Was passiert wenn man ein NC-lizenziertes Werk kommerziell nutzt?",o:["Man muss zahlen","Nichts","Man muss den Urheber fragen","Urheberrechtsverletzung – NC bedeutet Non-Commercial, kommerzielle Nutzung ist explizit ausgeschlossen"],a:3,f:"Kommerzielle Nutzung eines NC-lizenzierten Werks ohne Genehmigung des Urhebers ist eine Urheberrechtsverletzung. Für kommerzielle Nutzung benötigt man eine separate Vereinbarung mit dem Urheber."},
// === 5.2b Software-Lizenzen (131-200) ===
{id:91,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Nodelocked License?",o:["Lizenz die an einen bestimmten Computer (Node) gebunden ist – Software darf nur auf diesem Gerät installiert/genutzt werden","Lizenz für das gesamte Netzwerk","Lizenz für einen Nutzer","Floating License"],a:0,f:"Nodelocked License: gebunden an Hardware-ID oder MAC-Adresse eines bestimmten Computers. Software kann nur auf genau diesem Gerät genutzt werden."},
{id:92,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Named User License?",o:["Lizenz für eine Abteilung","Lizenz die einer bestimmten namentlich genannten Person zugeordnet ist – diese kann die Software auf verschiedenen Geräten nutzen","Floating License","Nodelocked License"],a:1,f:"Named User License (NUL): Eine bestimmte Person (namentlich in der Lizenz aufgeführt) darf die Software nutzen, unabhängig vom Gerät. Typisch bei Enterprise-Software."},
{id:93,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Floating License (Concurrent Use License)?",o:["Lizenz für mobile Geräte","Nodelocked License","Lizenz die gleichzeitige Nutzung durch eine definierte Anzahl von Benutzern erlaubt – wer gerade nicht nutzt, gibt den &#39;Slot&#39; frei","Lizenz die sich bewegt"],a:2,f:"Floating License: X Lizenzen = X Benutzer gleichzeitig. Wenn ein Nutzer beendet, kann ein anderer nutzen. Verwaltung durch Lizenzserver. Effizient wenn nicht alle gleichzeitig arbeiten."},
{id:94,b:"5.2b",t:"Software-Lizenzen",q:"Was ist Pay per Use / Metered Service?",o:["Einmalige Zahlung","Nutzungsbasiertes Lizenzmodell: Bezahlung nur für tatsächliche Nutzung (z.B. API-Anfragen, Rechenzeit, Datenmenge)","Volumenlizenz","Abonnement"],a:1,f:"Pay per Use: Bezahlung nach tatsächlichem Verbrauch. Beispiele: AWS (pro Stunde/Sekunde), API-Dienste (pro Anfrage), Cloud-Datenbanken (pro GB). Vorteil: nur zahlen was man nutzt."},
{id:95,b:"5.2b",t:"Software-Lizenzen",q:"Was ist der Vorteil einer Floating License gegenüber Named User?",o:["Kein Unterschied","Named User ist ineffizienter","Floating ist günstiger","Floating ist effizienter: wenn Mitarbeiter in verschiedenen Zeitzonen arbeiten oder nicht alle gleichzeitig die Software benötigen"],a:3,f:"Floating License ist effizienter wenn nicht alle Nutzer gleichzeitig arbeiten: z.B. 50 Mitarbeiter aber max. 10 gleichzeitig aktiv → 10 Floating Lizenzen statt 50 Named User Lizenzen."},
{id:96,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Einzelplatzlizenz (Single User License)?",o:["Lizenz für ein Gerät, mehrere Nutzer","Lizenz für eine bestimmte Person auf einem Gerät","Lizenz für ein Gerät beliebig viele Nutzer","Volumenlizenz"],a:1,f:"Einzelplatzlizenz: eine Person, ein Gerät. Die häufigste private Lizenzform. Für Heimnutzer bei Kauf von z.B. Microsoft Office Home."},
{id:97,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Lizenzserver?",o:["Ein Download-Server","Ein Server auf dem Software installiert ist","Ein Backup-Server","Server der Floating Licenses verwaltet und kontrolliert wer die Software gerade nutzen darf"],a:3,f:"Lizenzserver: verwaltet Floating Licenses und Concurrent User Limits. Clients verbinden sich beim Start zum Lizenzserver, der prüft ob noch ein &#39;Slot&#39; frei ist. Beispiele: FlexNet, Sentinel."},
{id:98,b:"5.2b",t:"Software-Lizenzen",q:"Was ist der Unterschied zwischen Lizenz kaufen und Software kaufen?",o:["Kein Unterschied","Lizenz ist immer günstiger","Software gehört dem Käufer","Beim Lizenzkauf erwirbt man nur Nutzungsrechte – kein Eigentum an der Software. Software bleibt Eigentum des Herstellers"],a:3,f:"Softwarekauf = Lizenzerwerb: Man kauft ein Nutzungsrecht, kein Eigentum. Die Software (Code) bleibt geistiges Eigentum des Herstellers. Daher: &#39;Lizenzierung&#39; statt &#39;Kauf&#39;."},
{id:99,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Educational License?",o:["Günstigere Lizenz für Bildungseinrichtungen (Schulen, Universitäten) und Studenten – oft mit Nutzungsbeschränkungen (kein kommerzieller Einsatz)","Lizenz zum Lernen programmieren","Software für Lehrer","Lern-Software"],a:0,f:"Educational License: reduzierter Preis für Bildungseinrichtungen und Studenten. Oft mit Einschränkungen: nur für Bildungszwecke, kein kommerzieller Einsatz. Beispiele: Microsoft DreamSpark, Adobe für Studenten."},
{id:100,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Trial License (Testlizenz)?",o:["Dauerlizenz","Zeitlich begrenzte (z.B. 30 Tage) kostenlose Lizenz zum Testen der Software vor dem Kauf – oft eingeschränkter Funktionsumfang","Open-Source-Lizenz","Volumenlizenz"],a:1,f:"Trial/Evaluation License: kostenlos für begrenzte Zeit oder mit eingeschränkten Funktionen zum Testen. Nach Ablauf: Kauf erforderlich oder Software deaktiviert sich."},
{id:101,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Open-Core-Lizenzierung?",o:["Vollständig Open Source","Kern der Software ist Open Source, erweiterte Funktionen sind proprietär und kostenpflichtig (z.B. GitLab CE vs EE)","Vollständig proprietär","Dual Licensing"],a:1,f:"Open Core: Basis-Version Open Source (Community Edition), erweiterte Enterprise-Funktionen kostenpflichtig (Enterprise Edition). Beispiele: GitLab, Elasticsearch, MySQL."},
{id:102,b:"5.2b",t:"Software-Lizenzen",q:"Was ist Softwarenormierung/Compliance-Prüfung?",o:["Systematische Prüfung ob alle eingesetzten Software-Lizenzen korrekt lizenziert und deren Bedingungen eingehalten werden","Performance-Test","Qualitätsprüfung","Software-Entwicklungsstandard"],a:0,f:"Compliance-Prüfung: regelmäßige Kontrolle ob alle Software korrekt lizenziert ist. Wichtig bei Open-Source-Software in Produkten (GPL!), Volumenlizenz-Einhaltung."},
{id:103,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Lizenz-Key?",o:["Eindeutiger Code (oft alphanumerisch) der bei der Aktivierung die Lizenz dem Benutzer zuordnet","Ein Netzwerkschlüssel","Ein Verschlüsselungsschlüssel","Ein Passwort"],a:0,f:"Lizenz-Key (Product Key): eindeutiger Code zur Aktivierung von Software. Verknüpft die Lizenz mit dem Computer oder Microsoft/Adobe-Konto. Oft 25 Zeichen in 5er-Gruppen."},
{id:104,b:"5.2b",t:"Software-Lizenzen",q:"Was ist Software-as-a-Service (SaaS) lizenzrechtlich?",o:["Kauf der Software","Freeware","Mietmodell: Zugang zur Software über Internet gegen Abonnement – kein Download, keine Installation","Open-Source-Lizenz"],a:2,f:"SaaS: kein klassischer Lizenzkauf. Nutzer &#39;mietet&#39; Zugang zur Software. Bei Abo-Ende kein Zugriff mehr. Beispiele: Microsoft 365, Salesforce, Google Workspace."},
{id:105,b:"5.2b",t:"Software-Lizenzen",q:"Was ist der Unterschied zwischen Nodelocked und Named User?",o:["Nodelocked erlaubt mehrere Nutzer","Named User ist an Hardware gebunden","Identisch","Nodelocked: an Hardware gebunden. Named User: an Person gebunden – diese kann die Software auf verschiedenen Geräten nutzen"],a:3,f:"Nodelocked: Software läuft nur auf einem bestimmten Computer (Hardware-gebunden). Named User: eine Person kann die Software auf mehreren Geräten nutzen (personengebunden)."},
{id:106,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Softwareabonnement (Subscription)?",o:["Freie Software","Einmaliger Kauf","Open-Source-Zugang","Regelmäßige Zahlung (monatlich/jährlich) für Nutzungsrecht inkl. Updates – bei Nichtzahlung erlischt Zugang"],a:3,f:"Subscription: regelmäßige Zahlungen für Software-Nutzung + Updates + Support. Bei Nichtzahlung: kein Zugriff mehr. Trend in der Branche: Adobe CC, Microsoft 365, AutoCAD."},
{id:107,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Lizenz-Compliance-Verletzung?",o:["Absichtlicher Fehler","Netzwerkfehler","Nutzung von Software über die lizenzierten Rechte hinaus (z.B. mehr Installationen als Lizenzen, falsche Edition)","Technischer Fehler"],a:2,f:"Compliance-Verletzung: Software wird nicht entsprechend der Lizenz genutzt. Konsequenzen: Nachzahlungen, Schadensersatz, Abmahnung, Reputationsverlust. Wird oft durch Software-Audits aufgedeckt."},
{id:108,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Concurrent User Model?",o:["Netzwerk-Modell","Alle Nutzer gleichzeitig","Einzelner Nutzer","Definierte maximale Anzahl gleichzeitiger Nutzer – entspricht der Floating License"],a:3,f:"Concurrent User (gleichzeitige Nutzer): z.B. 20 Concurrent Licenses = max. 20 Personen können gleichzeitig die Software nutzen. Mehr Nutzer möglich, aber nicht gleichzeitig."},
{id:109,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Campuslizenz?",o:["Lizenz für externe Nutzer","Lizenz für eine Hochschulstadt","Lizenz für alle Mitglieder einer Bildungseinrichtung (Studenten, Lehrkräfte, Mitarbeiter) gegen pauschale Gebühr","Lizenz für einen Raum"],a:2,f:"Campuslizenz: günstige Lizenz für alle Angehörigen einer Hochschule oder großen Bildungseinrichtung. Vereinfacht Verwaltung: eine Lizenz für alle. Beispiel: Campuslizenz für MATLAB."},
{id:110,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Lizenz-Dongle?",o:["BIOS-Chip","USB-Stick mit Software","Hardware-Schlüssel (USB/Parallel) der in den Computer gesteckt werden muss damit die lizenzierte Software startet","Lizenz-Key-Generator"],a:2,f:"Lizenz-Dongle (Hardware Key): physischer USB/Parallel-Stecker der die Lizenz enthält. Software prüft beim Start ob Dongle vorhanden ist. Sicher gegen Kopieren, aber unpraktisch bei Verlust."},
{id:111,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine perpetual Floating License?",o:["Nodelocked Dauerlizenz","Floating License mit Ablaufdatum","Unbefristete Floating License – einmal kaufen, dauerhaft nutzbar für X gleichzeitige Nutzer (im Gegensatz zur Subscription-Floating)","Zeitlich begrenzte Floating License"],a:2,f:"Perpetual Floating: einmalige Zahlung für unbefristete Floating License. X Concurrent Users dauerhaft, ohne laufende Kosten (außer optionalem Support/Maintenance-Vertrag)."},
{id:112,b:"5.2b",t:"Software-Lizenzen",q:"Was ist das Prinzip &#39;Bring Your Own License&#39; (BYOL)?",o:["Open-Source nutzen","Lizenzen tauschen","Neue Lizenz kaufen","Bestehende On-Premise-Lizenzen in die Cloud übertragen – spart Kosten da keine neue Cloud-Lizenz nötig"],a:3,f:"BYOL: vorhandene Software-Lizenzen (z.B. Windows Server, SQL Server) in Cloud-Umgebungen (AWS, Azure) einsetzen. Spart Cloud-Lizenzkosten, da man bereits bezahlte Lizenzen nutzt."},
{id:113,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Software Maintenance Contract?",o:["Vertrag für Updates, Bugfixes und Support für bereits erworbene Software (oft jährlich, % des Lizenzpreises)","Service-Level-Agreement","Reparaturvertrag für Hardware","Backup-Vertrag"],a:0,f:"Software Maintenance: jährlicher Vertrag (typisch 18-22% des Lizenzpreises) der Zugang zu Updates, neuen Versionen und technischem Support sichert. Ohne Maintenance: keine Updates."},
{id:114,b:"5.2b",t:"Software-Lizenzen",q:"Was ist GNU GPL v2 vs. v3?",o:["v3 ist schwächer","GPL v3 (2007) schließt Patent-Lücken, verhindert Tivoization, stärker gegen DRM – GPL v2 ist älter und hat diese Schutzmaßnahmen nicht","Kein Unterschied","v2 ist neuer"],a:1,f:"GPL v3 Verbesserungen gegenüber v2: explizite Patenklausel (ähnlich Apache 2.0), Anti-Tivoization (Hardware darf GPL-Software nicht sperren), Anti-DRM-Klausel, internationaler."},
{id:115,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein ELA (Enterprise License Agreement)?",o:["Umfassendes Lizenzabkommen zwischen Softwareanbieter und großem Unternehmen – deckt alle Mitarbeiter/Produkte zu Sonderkonditionen","Evaluation License","Einzelnutzer-Lizenz","Educational License"],a:0,f:"ELA: Unternehmensweite Lizenzvereinbarung mit einem Anbieter. Deckt alle Produkte und alle Mitarbeiter ab. Einheitliche Konditionen, vereinfachte Verwaltung, Mengenrabatte."},
{id:116,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Transferable License?",o:["Lizenz die auf einen anderen Nutzer oder Computer übertragen werden kann (z.B. beim Verkauf oder Mitarbeiterwechsel)","Floating License","Lizenz die sich verändert","Locked License"],a:0,f:"Transferable License: kann auf andere Person oder Gerät übertragen werden. Beispiel: Retail-Windows kann auf neuen PC übertragen werden. OEM-Lizenzen sind NICHT transferierbar."},
{id:117,b:"5.2b",t:"Software-Lizenzen",q:"Was ist der Unterschied zwischen Lizenz und Copyright?",o:["Copyright muss angemeldet werden","Lizenz ist stärker","Copyright (Urheberrecht) schützt das Werk des Urhebers. Lizenz ist die Erlaubnis die der Urheber anderen zur Nutzung seines Werks erteilt","Identisch"],a:2,f:"Copyright: das Schutzrecht des Urhebers (automatisch). Lizenz: die vertragliche Erlaubnis die der Urheber anderen erteilt. Copyright ohne Lizenz = alle Rechte vorbehalten."},
{id:118,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Abonnement-Modell bei Cloud-Software?",o:["Regelmäßige (monatliche/jährliche) Zahlung für Zugang zu Software und Diensten in der Cloud","Open-Source-Modell","Perpetual-Lizenz","Einmalige Zahlung"],a:0,f:"Cloud-Abonnement: monatlich/jährlich zahlen für Software-Zugang. Vorteile: immer aktuelle Version, skalierbar, keine Installation. Nachteile: laufende Kosten, Abhängigkeit vom Anbieter."},
{id:119,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Evaluation License?",o:["Zeitlich begrenzte kostenlose Lizenz zum Bewerten der Software vor Kaufentscheidung – oft voller Funktionsumfang","Open-Source-Lizenz","Dauerlizenz","Studentenlizenz"],a:0,f:"Evaluation License: 30/60/90 Tage kostenlos, oft mit vollem Funktionsumfang. Ziel: Kaufentscheidung ermöglichen. Nach Ablauf: Kauf oder Deaktivierung."},
{id:120,b:"5.2b",t:"Software-Lizenzen",q:"Was ist &#39;License Harvesting&#39;?",o:["Lizenzen kaufen","Zurückgewinnen ungenutzter Lizenzen (z.B. von ausgeschiedenen Mitarbeitern) zur Weiterzuweisung – spart Kosten","Lizenzen stehlen","Lizenzen archivieren"],a:1,f:"License Harvesting: ungenutzte Lizenzen (z.B. von ausgeschiedenen Mitarbeitern, nicht mehr verwendeten Projekten) einsammeln und für andere Nutzer wiederverwenden. Senkt Lizenzkosten."},
{id:121,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Academic License?",o:["Schulungslizenz","Stark vergünstigte Lizenz für Forschungseinrichtungen und Hochschulen – oft für Forschungszwecke, kein kommerzieller Einsatz","Evaluationslizenz","Freeware"],a:1,f:"Academic License: stark vergünstigte Software für Hochschulen und Forschung. Einschränkung: nur für akademische, nicht-kommerzielle Zwecke. Oft über Hochschulrechenzentren verfügbar."},
{id:122,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Government License?",o:["Staatliche Zensur von Software","Open-Government-Lizenz","Spezielle Lizenzkonditionen für Behörden und staatliche Stellen – oft mit Sicherheitsanforderungen und Sonderpreisen","Pflichtlizenz"],a:2,f:"Government License: spezielle Konditionen für öffentliche Verwaltung. Oft mit erhöhten Sicherheitsanforderungen, Compliance-Anforderungen (z.B. DSGVO, BSI) und Sonderpreisen."},
{id:123,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Lizenz-Pool?",o:["Backup-Lizenzen","Lizenz-Datenbank","Schwimmbad mit Lizenzen","Sammlung von Lizenzen die bedarfsgerecht verteilt werden – Mitarbeiter nehmen Lizenzen bei Bedarf aus dem Pool"],a:3,f:"Lizenz-Pool: Lizenzen werden zentral verwaltet und nach Bedarf zugewiesen. Effizient bei wechselndem Bedarf. Ermöglicht bessere Auslastung und Kostenkontrolle."},
{id:124,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Reseller License?",o:["Lizenz für Händler die erlaubt Software an Kunden weiterzuverkaufen – mit Marge und unter eigenen Bedingungen","Lizenz für den Endkunden","OEM-Lizenz","Retail-Lizenz"],a:0,f:"Reseller License: erlaubt Händlern (Value Added Resellers, VAR) Software weiterzuverkaufen, oft mit Unterstützungspflichten. Händler kaufen günstiger und verkaufen mit Marge."},
{id:125,b:"5.2b",t:"Software-Lizenzen",q:"Was ist der Unterschied zwischen Freemium und Free Trial?",o:["Free Trial hat weniger Funktionen","Identisch","Freemium ist zeitlich begrenzt","Freemium: Basis-Funktionen dauerhaft kostenlos, Extras kostenpflichtig. Free Trial: volles Produkt für begrenzte Zeit kostenlos"],a:3,f:"Freemium: dauerhaft kostenlos mit eingeschränkten Funktionen, Upgrade für mehr. Free Trial: volle Funktionen für begrenzte Zeit (30/60 Tage), danach Kauf erforderlich."},
{id:126,b:"5.2b",t:"Software-Lizenzen",q:"Warum ist Lizenzmanagement in Unternehmen wichtig?",o:["Nur aus Kostengründen","Nur bei Open Source","Rechtliche Compliance, Kostenkontrolle, Sicherheit (nur lizenzierte Software = bekannte Quelle), und Audit-Schutz","Nur für große Unternehmen"],a:2,f:"Lizenzmanagement: rechtliche Sicherheit (keine Verstöße), Kostenkontrolle (keine Über-/Unterlizenzierung), Sicherheit (keine unbekannte Software), Vorbereitung auf Software-Audits."},
{id:127,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Software-Audit?",o:["Sicherheits-Audit","Technische Software-Prüfung","Code-Review","Prüfung durch Softwarehersteller ob das Unternehmen alle Lizenzen korrekt hält und einhält"],a:3,f:"Software-Audit: Hersteller (z.B. Microsoft, SAP, Oracle) prüfen ob Unternehmen ausreichend lizenziert sind. Oft überraschend angekündigt. Verstöße = Nachzahlungen + Strafen."},
{id:128,b:"5.2b",t:"Software-Lizenzen",q:"Was ist der Unterschied zwischen Open Source und Public Domain?",o:["Identisch","Public Domain ist restriktiver","Open Source hat Lizenz mit Bedingungen (z.B. Namensnennung, Copyleft). Public Domain ist frei von jeglichem Urheberrecht","Open Source ist kostenlos"],a:2,f:"Open Source: es gibt eine Lizenz mit Bedingungen (auch wenn freizügig). Public Domain: keinerlei Urheberrecht, komplett frei. CC0 ist der einfachste Weg Public Domain zu erreichen."},
{id:129,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Non-Exclusive License?",o:["Einzel-Lizenz","Transferable License","Nicht-exklusive Lizenz: der Urheber kann das gleiche Nutzungsrecht auch anderen vergeben","Exklusive Lizenz"],a:2,f:"Non-Exclusive (nicht-ausschließlich): Urheber kann gleiche Rechte mehrfach vergeben. Die meisten Endverbraucher-Lizenzen sind non-exclusive. Gegenteil: exclusive license."},
{id:130,b:"5.2b",t:"Software-Lizenzen",q:"Was ist &#39;License Creep&#39;?",o:["Lizenzen ablaufen lassen","Lizenzen übertragen","Unkontrolliertes Anwachsen von Lizenzen über die Zeit – mehr Lizenzen als nötig führt zu unnötigen Kosten","Lizenzen werden günstiger"],a:2,f:"License Creep: Lizenzanzahl wächst unkontrolliert – z.B. weil alte Lizenzen nicht zurückgegeben werden. SAM (Software Asset Management) soll License Creep verhindern."},
{id:131,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Concurrent License?",o:["Nodelocked License","Lizenz für einen Nutzer","Dauerlizenz","Entspricht der Floating License: definierte Anzahl gleichzeitiger Nutzer, verwaltet über Lizenzserver"],a:3,f:"Concurrent License = Floating License: X Nutzer können gleichzeitig die Software verwenden. Bei > X gleichzeitigen Versuchen wird die Verbindung verweigert."},
{id:132,b:"5.2b",t:"Software-Lizenzen",q:"Was regelt typischerweise eine EULA?",o:["Nur den Preis","Nur technische Anforderungen","Nur den Support","Nutzungsrechte, Einschränkungen, Gewährleistungsausschluss, Gerichtsstand, Anzahl der Installationen, verbotene Aktionen"],a:3,f:"EULA: Nutzungsrechte (wie viele Geräte/Nutzer), Verbote (Reverse Engineering, Weitervertrieb), Haftungsausschluss, Gerichtsstand, Datenschutzhinweise."},
{id:133,b:"5.2b",t:"Software-Lizenzen",q:"Was ist der Zweck von Software Asset Management (SAM)?",o:["Systematische Verwaltung aller Software-Lizenzen im Unternehmen: Überblick, Compliance, Kostenkontrolle","Software entwickeln","Netzwerk verwalten","Software testen"],a:0,f:"SAM: Verzeichnis aller installierten Software und Lizenzen pflegen. Ziele: keine Unterlizenzierung (Rechtsrisiko), keine Überlizenzierung (Kostenverschwendung), Audit-Bereitschaft."},
{id:134,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein ISV (Independent Software Vendor)?",o:["Ein Systemintegrator","Ein Hardware-Hersteller","Ein Reseller","Unabhängiger Softwareentwickler/Hersteller der Software verkauft – eigene Produkte, unabhängig von Hardwareherstellern"],a:3,f:"ISV (Independent Software Vendor): Unternehmen das eigene Software entwickelt und verkauft, unabhängig von Hardware-Herstellern. Beispiele: SAP, Salesforce, Adobe."},
{id:135,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine NFR-Lizenz (Not For Resale)?",o:["Retail-Lizenz","Produktionslizenz","Lizenz die verkauft werden darf","Lizenz die NICHT weiterverkauft werden darf – für Partner, Entwickler oder Evaluierungszwecke"],a:3,f:"NFR (Not For Resale): kostenlose oder günstige Lizenz für Vertriebspartner, Entwickler oder Evaluierungszwecke. Explizit nicht zum Weiterverkauf. Darf nur intern oder zu Demonstrationszwecken genutzt werden."},
{id:136,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Produktionslizenz vs. Entwicklerlizenz?",o:["Entwicklerlizenz ist teurer","Produktionslizenz ist günstiger","Identisch","Produktionslizenz: für Live-Systeme mit echten Daten. Entwicklerlizenz: günstig/kostenlos für Entwicklung und Test – darf nicht produktiv eingesetzt werden"],a:3,f:"Viele Hersteller (Oracle, SAP) bieten günstige/kostenlose Lizenzen für Entwicklung und Test. Für Produktionssysteme mit echten Geschäftsdaten sind teurere Produktionslizenzen erforderlich."},
{id:137,b:"5.2b",t:"Software-Lizenzen",q:"Was ist der Unterschied zwischen Cloud- und On-Premise-Lizenz?",o:["Kein Unterschied","Cloud: Software läuft beim Anbieter, Zugriff per Internet, Abonnement. On-Premise: Software läuft auf eigener Hardware, Kauf/Dauerlizenz","On-Premise ist besser","Cloud ist günstiger"],a:1,f:"Cloud-Lizenz: Software beim Anbieter, Abonnement, kein eigener Server. On-Premise: Software auf eigenem Server, Kauf oder Dauerlizenz, höhere Einmalinvestition, mehr Kontrolle."},
{id:138,b:"5.2b",t:"Software-Lizenzen",q:"Was passiert wenn eine Floating License erschöpft ist?",o:["Software deinstalliert sich","Alle Nutzer werden abgemeldet","Neue Nutzer werden abgewiesen (Lizenz-Checkout fehlgeschlagen) – sie müssen warten bis ein Slot frei wird","Software stürzt ab"],a:2,f:"Wenn alle Floating Slots belegt sind, können keine weiteren Nutzer die Software starten (Checkout denied). Nutzer bekommen Fehlermeldung: &#39;Maximum concurrent users reached&#39;."},
{id:139,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Lizenzmetrik?",o:["Software-Versionsnummer","Messung der Software-Qualität","Die Grundlage auf der Lizenzkosten berechnet werden (z.B. pro Nutzer, pro Prozessor, pro Kern, pro GB Daten)","Lizenz-Ablaufdatum"],a:2,f:"Lizenzmetrik: was wird gezählt und berechnet? Pro Named User, pro Concurrent User, pro CPU/Core, pro Server, pro Datenbankgröße, pro API-Aufruf. Wichtig für Kostenschätzung und Compliance."},
{id:140,b:"5.2b",t:"Software-Lizenzen",q:"Was ist das Ziel einer Software-Lizenzstrategie?",o:["Optimale Balance zwischen ausreichender Lizenzierung (Compliance) und minimalen Kosten (keine Überlizenzierung)","Möglichst viele Lizenzen kaufen","Nur Open Source nutzen","Lizenzen vermeiden"],a:0,f:"Lizenzstrategie: sicherstellen dass alle Software korrekt lizenziert ist (Compliance), gleichzeitig unnötige Lizenzkosten vermeiden (Überlizenzierung). SAM-Tools helfen dabei."},
{id:141,b:"5.2b",t:"Software-Lizenzen",q:"Was ist Copyleft im Kontext von Software-Unternehmen?",o:["Kein Problem","Vorteil für Unternehmen","Nur für Open-Source-Firmen","Risiko: wenn GPL-Software in proprietären Produkten verwendet wird, muss der eigene Code auch GPL werden – oft unerwünscht"],a:3,f:"Copyleft-Risiko für Unternehmen: versehentliche Nutzung von GPL-Code in proprietärer Software kann dazu führen, dass der eigene Code veröffentlicht werden muss. Open-Source-Review wichtig."},
{id:142,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein License Management Tool?",o:["Netzwerk-Monitor","Software zur automatisierten Verwaltung von Software-Lizenzen (Inventar, Compliance, Kostenoptimierung). Beispiele: Flexera, Snow Software","Virus-Scanner","Software zum Programmieren"],a:1,f:"License Management Tools automatisieren SAM: erkennen installierte Software, prüfen gegen Lizenzbestand, melden Compliance-Lücken, helfen bei Audit-Vorbereitung. Beispiele: Flexera, Snow, Ivanti."},
{id:143,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Lizenz für Open-Source-Komponenten in proprietärer Software?",o:["Jede Open-Source-Komponente hat eine Lizenz deren Bedingungen eingehalten werden müssen – bei GPL: Quellcode-Offenlegung; bei MIT: nur Copyright-Hinweis","Nur GPL-Lizenzen sind relevant","Alle OS-Lizenzen erlauben alles","Keine Lizenz nötig"],a:0,f:"Software Composition Analysis (SCA): Open-Source-Komponenten in eigenem Code analysieren. Jede Komponente bringt ihre Lizenz mit. GPL = Quellcode-Pflicht; MIT/Apache = nur Hinweis. Compliance-Pflicht!"},
{id:144,b:"5.2b",t:"Software-Lizenzen",q:"Was ist das OSI (Open Source Initiative)?",o:["Österreichisches Software-Institut","Regierungsbehörde","Lizenz-Verkäufer","Organisation die Open-Source-Lizenzen prüft und zertifiziert ob sie der Open Source Definition entsprechen"],a:3,f:"OSI (Open Source Initiative, 1998): prüft und zertifiziert Lizenzen anhand der Open Source Definition (OSD). OSI-approved Lizenzen: GPL, MIT, Apache, BSD etc. Gegründet von Eric Raymond und Bruce Perens."},
{id:145,b:"5.2b",t:"Software-Lizenzen",q:"Was ist die Open Source Definition (OSD)?",o:["10 Kriterien der OSI die eine Lizenz erfüllen muss um als Open Source anerkannt zu werden (freie Weitergabe, Quellcode verfügbar, Modifikation erlaubt etc.)","Definition von kostenlosen Programmen","GNU-Definition","Definition von Freeware"],a:0,f:"OSD: 10 Kriterien für Open Source: freie Weitergabe, Quellcode verfügbar, Ableitungen erlaubt, kein Diskriminierungsverbot, technologieneutral etc. Alle OSI-approved Lizenzen erfüllen diese Kriterien."},
{id:146,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein License Agreement vs. Terms of Service?",o:["ToS ist für Software","License Agreement: regelt Nutzungsrechte an Software. Terms of Service (ToS): regelt Nutzung eines Dienstes/Plattform (z.B. Web-Service, Social Media)","Identisch","License Agreement ist für Dienste"],a:1,f:"License Agreement (EULA): für Software-Nutzungsrechte. Terms of Service (ToS/AGB): für Online-Dienste und Plattformen. Beide sind Verträge, aber unterschiedliche Schwerpunkte."},
{id:147,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine GPU-Lizenz in der Cloud?",o:["GPU-Treiber-Lizenz","Grafikkarte kaufen","Lizenz für Spielesoftware","Nutzungsrecht für GPU-Rechenkapazität in der Cloud – abgerechnet nach Zeit (pro Stunde) oder Nutzung"],a:3,f:"Cloud-GPU-Lizenzierung: GPU-Rechenzeit in der Cloud (AWS, Azure, GCP) wird nach Stunden oder Minuten abgerechnet. Typisch für KI-Training, Rendering, wissenschaftliche Berechnungen."},
{id:148,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Runtime License?",o:["Debug-Lizenz","Test-Lizenz","Lizenz zur Entwicklung","Lizenz zur Ausführung (Deployment) von entwickelter Software in Produktionsumgebungen – zusätzlich zur Entwicklerlizenz"],a:3,f:"Runtime License: erlaubt die Ausführung von Software in Produktionsumgebungen. Separate Lizenz zur Developer License. Beispiel: Oracle JDK Runtime License für Produktionssysteme."},
{id:149,b:"5.2b",t:"Software-Lizenzen",q:"Was sollte man beim Einsatz von Open-Source-Software im Unternehmen beachten?",o:["Nur GPL verwenden","Lizenztyp prüfen (Copyleft-Risiko), Compliance sicherstellen, Security-Updates verfolgen, und Support klären","Nur MIT verwenden","Nichts – Open Source ist immer kostenlos und problemlos"],a:1,f:"Open Source im Unternehmen: Copyleft-Risiko prüfen (GPL!), Lizenzbedingungen einhalten, Security-Patches verfolgen, Support und Maintenance klären, SBOM (Software Bill of Materials) pflegen."},
{id:150,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein SBOM (Software Bill of Materials)?",o:["Einkaufsliste für Hardware","Backup-Liste","Software-Inventar","Vollständige Liste aller Software-Komponenten in einem Produkt inkl. ihrer Versionen und Lizenzen – wichtig für Sicherheit und Compliance"],a:3,f:"SBOM: strukturierte Liste aller verwendeten Software-Komponenten (Open Source und proprietär), ihrer Versionen und Lizenzen. Wichtig für: Sicherheitslücken-Management, Lizenz-Compliance, EU Cyber Resilience Act."},
{id:151,b:"5.2b",t:"Software-Lizenzen",q:"Was ist der Unterschied zwischen Lizenz und Wartungsvertrag?",o:["Lizenz: Nutzungsrecht an der Software. Wartungsvertrag (Maintenance): separater Vertrag für Updates und Support – oft zusätzliche jährliche Kosten","Wartungsvertrag ist günstiger","Lizenz enthält immer Wartung","Identisch"],a:0,f:"Lizenz: das Recht die Software zu nutzen. Maintenance/Wartung: Updates, neue Versionen und Support – separat und zusätzlich. Ohne Maintenance: Software läuft, aber keine neuen Versionen."},
{id:152,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Entwicklerlizenz (Developer License)?",o:["Produktionslizenz","Lizenz die einem Entwickler erlaubt Software zu entwickeln, testen und auszuprobieren – oft günstiger, kein Produktionseinsatz","Open-Source-Lizenz","Lizenz für alle Entwickler im Team"],a:1,f:"Developer License: für Entwicklung und Testing. Günstig oder kostenlos. Nicht für Produktionssysteme mit echten Nutzern/Daten. Typisch: Oracle Database Developer Free, SQL Server Developer Edition."},
{id:153,b:"5.2b",t:"Software-Lizenzen",q:"Was ist das Copyleft-Problem bei Bibliotheken?",o:["Kein Problem","MIT-Bibliotheken sind problematisch","GPL-Bibliotheken können proprietäre Software &#39;infizieren&#39;: Nutzung einer GPL-Bibliothek kann dazu führen, dass das gesamte Programm unter GPL veröffentlicht werden muss","LGPL-Bibliotheken sind sicher"],a:2,f:"GPL-Kontagion: Wenn ein proprietäres Programm eine GPL-Bibliothek dynamisch oder statisch verlinkt, kann das Programm GPL-pflichtig werden. Lösung: LGPL-Bibliotheken oder MIT/Apache nutzen."},
{id:154,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Open-Source-Lizenz-Kompatibilität?",o:["Alle Lizenzen sind kompatibel","Nur bei kommerzieller Nutzung relevant","Ob zwei verschiedene Open-Source-Lizenzen in einem Projekt kombiniert werden dürfen – z.B. GPL und Apache 2.0 sind nicht immer kombinierbar","Kompatibilität ist unwichtig"],a:2,f:"Lizenz-Kompatibilität: Nicht alle Open-Source-Lizenzen können kombiniert werden. GPL 2 und Apache 2.0 sind nicht kompatibel. GPL 3 und Apache 2.0 sind kompatibel. Verletzung = Urheberrechtsverletzung."},
{id:155,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine &#39;Copyleft-freie&#39; (permissive) Lizenz?",o:["Eine besonders restriktive Lizenz","Lizenz die fast keine Einschränkungen hat und Nutzung auch in proprietärer Software erlaubt (MIT, BSD, Apache)","Lizenz ohne Copyright","GPL-Lizenz"],a:1,f:"Permissive = copyleft-frei: MIT, BSD, Apache. Ableitungen können proprietär sein. Einzige Bedingung oft: Copyright-Hinweis beibehalten. Gegensatz: Copyleft-Lizenzen (GPL)."},
{id:156,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine OEM-Bundling-Lizenz?",o:["Volumenlizenz","Einzellizenz","Lizenz die Hardware-Hersteller berechtigt die Software mit ihrer Hardware vorzuinstallieren und zu verkaufen (z.B. Windows auf Laptop)","Retail-Lizenz"],a:2,f:"OEM-Bundling: Hersteller (Lenovo, Dell) kaufen Lizenzen en masse und installieren Software vorinstalliert. Günstiger für Endkunden, aber Lizenz an Hardware gebunden."},
{id:157,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine per-Core-Lizenz?",o:["Lizenz pro Server","Lizenzierung basierend auf der Anzahl der CPU-Kerne – je mehr Kerne, desto mehr Lizenzen nötig (z.B. SQL Server, Oracle DB)","Lizenz pro Standort","Lizenz pro Nutzer"],a:1,f:"Per-Core-Lizenz: Kosten basieren auf CPU-Kern-Anzahl des Servers. SQL Server Standard: 4 Core-Minimum. Oracle: pro physischem Core. Bei modernen Servern mit vielen Kernen sehr teuer!"},
{id:158,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Lizenz-Transfergebühr?",o:["Gebühr die manche Hersteller verlangen wenn eine Lizenz auf einen anderen Nutzer oder Computer übertragen wird","Kosten für neue Lizenz","Updategebühr","Verlängerungsgebühr"],a:0,f:"Manche Hersteller verlangen Transfergebühren bei Lizenzübertragung (z.B. von ausgesch. Mitarbeiter auf neuen). Wichtig beim Unternehmensverkauf oder Mitarbeiterwechsel."},
{id:159,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Thin-Client-Lizenz?",o:["Speziallizenz für Server-basierte Anwendungen auf Thin Clients – oft günstigere Konditionen da Verarbeitung auf Server stattfindet","Lizenz für kleine Software","Mobile-Lizenz","Cloud-Lizenz"],a:0,f:"Thin-Client-Lizenzen: für Umgebungen wo Software zentral auf Servern läuft (Citrix, RDS). Günstigere Alternativen zu Desktop-Lizenzen da kein lokales Processing. Windows RDS CAL erforderlich."},
{id:160,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine CAL (Client Access License)?",o:["Client Application License","Creative Arts License","Certificate Access Level","Zugriffslizenz die Clients berechtigt auf einen Microsoft-Server zuzugreifen (z.B. Windows Server CAL, Exchange CAL)"],a:3,f:"CAL (Client Access License): jeder Nutzer oder jedes Gerät das auf einen Microsoft-Server zugreift benötigt eine CAL zusätzlich zur Server-Lizenz. User CAL: pro Person. Device CAL: pro Gerät."},
{id:161,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein License Audit Trigger?",o:["Update-Trigger","Ereignis das einen Software-Audit auslöst: z.B. Unternehmensübernahme, Kündigung vieler Mitarbeiter, Verdacht auf Unterlizenzierung","Backup-Trigger","Software-Fehler"],a:1,f:"Audit-Trigger: Softwarehersteller können jederzeit Audits ankündigen. Häufige Anlässe: Unternehmensübernahmen, Hinweise auf Compliance-Verstöße, Ende eines ELA. Proaktives SAM schützt davor."},
{id:162,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine SaaS-Multi-Tenant-Architektur lizenzrechtlich?",o:["Open-Source-Modell","Ein Software-Anbieter hostet eine Instanz für viele Kunden – lizenzrechtlich kaufen Kunden Abonnements, kein Zugriff auf Code","Jeder Kunde bekommt Source Code","Jeder Kunde braucht eigene Software"],a:1,f:"Multi-Tenant SaaS: eine Software-Instanz für viele Kunden (Tenants). Kunden haben kein Recht auf Code (kein Open Source), nur Zugang. Typisch: Salesforce, HubSpot, Office 365."},
{id:163,b:"5.2b",t:"Software-Lizenzen",q:"Was ist das Prinzip &#39;Software Defined Everything&#39; lizenzrechtlich?",o:["Hardware ersetzt Software","Kein lizenzrechtlicher Aspekt","Trend: mehr Software-Lizenzen statt Hardware-Kauf – z.B. SDN (Netzwerk), SDS (Storage) werden durch Software und entsprechende Lizenzen kontrolliert","Open-Source-Trend"],a:2,f:"Software Defined Everything: immer mehr Hardware-Funktionen werden durch Software realisiert. Bedeutet: mehr Software-Lizenzen, komplexeres Lizenzmanagement, höhere Software-Lizenzkosten."},
{id:164,b:"5.2b",t:"Software-Lizenzen",q:"Was ist Abandonware?",o:["Software die vom Hersteller aufgegeben wurde und nicht mehr verkauft wird – rechtlich weiterhin urheberrechtlich geschützt, oft nicht legal nutzbar","Open-Source-Software","Public Domain Software","Neue Software"],a:0,f:"Abandonware: Software die nicht mehr verkauft oder unterstützt wird. Urheberrecht besteht trotzdem weiter! Ohne Genehmigung des Urhebers (auch wenn Unternehmen insolvent) nicht legal nutzbar."},
{id:165,b:"5.2b",t:"Software-Lizenzen",q:"Was ist die BSL (Business Source License)?",o:["Lizenz die nach einem definierten Zeitraum (z.B. 4 Jahre) automatisch zu einer Open-Source-Lizenz wird – bis dahin eingeschränkte Nutzung","GPL-Variante","Creative-Commons-Lizenz","BSD-Variante"],a:0,f:"BSL (Business Source License, von MariaDB): Code ist sichtbar aber nicht Open Source. Nach einer definierten Zeit (Change Date) wechselt die Lizenz automatisch zu Open Source (z.B. GPL). Umstritten in der Community."},
{id:166,b:"5.2b",t:"Software-Lizenzen",q:"Was ist ein Perpetual License Upgrade?",o:["Lizenz übertragen","Recht bestehende Dauerlizenz auf neue Version upzugraden – oft durch Maintenance-Vertrag oder separaten Upgrade-Kauf","Neue Lizenz kaufen","Lizenz verlängern"],a:1,f:"Perpetual Upgrade: von älterer auf neuere Version upgraden. Möglich durch: aktiven Maintenance-Vertrag, oder durch Kauf eines Upgrades. Ohne Maintenance: volle neue Lizenz erforderlich."},
{id:167,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Named-Device License?",o:["Lizenz für namentlich genannte Personen","Lizenz gebunden an ein bestimmtes Gerät (nach Seriennummer oder Asset-Tag) – jedes Gerät benötigt eigene Lizenz","Named User License","Floating License"],a:1,f:"Named Device: Lizenz gilt für ein bestimmtes Gerät (nicht Person). Jedes lizenzierte Gerät hat eigene Lizenz, unabhängig von der Anzahl der Nutzer. Typisch bei Workstations mit wechselnden Nutzern."},
{id:168,b:"5.2b",t:"Software-Lizenzen",q:"Was ist das &#39;Right to Use&#39; (RTU)?",o:["Das Grundprinzip von Software-Lizenzen: das erworbene Recht die Software zu nutzen – kein Eigentum an der Software selbst","Recht auf Rückgabe","Recht auf Quellcode","Recht auf Updates"],a:0,f:"RTU (Right to Use): der Kern jeder Software-Lizenz. Man erwirbt das Recht die Software zu nutzen – nicht die Software selbst. Die Software bleibt Eigentum des Herstellers."},
{id:169,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Source Code License?",o:["Lizenz die Zugang zum Quellcode gewährt – in proprietären Umgebungen selten, ermöglicht Anpassung, Debugging","Lizenz zum Lesen des Codes","Open-Source-Lizenz","Kompilier-Lizenz"],a:0,f:"Source Code License: proprietärer Hersteller gewährt Zugang zum Quellcode (gegen hohe Gebühren). Ermöglicht eigene Modifikationen, tiefes Debugging. Selten, für Großkunden."},
{id:170,b:"5.2b",t:"Software-Lizenzen",q:"Was ist die SSPL (Server Side Public License)?",o:["MIT-Variante","GPL-Variante","MongoDB-Lizenz: wer SSPL-Software als Dienst anbietet muss seinen gesamten Dienst-Stack als Open Source veröffentlichen – schließt &#39;Cloud-Lücke&#39;","BSD-Lizenz"],a:2,f:"SSPL: von MongoDB entwickelt. Extrem starkes Copyleft: wer SSPL-Software als Cloud-Dienst anbietet, muss den gesamten Management-Stack (Software für den Betrieb des Dienstes) offenlegen. Nicht OSI-approved."},
{id:171,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Processor-Value-Unit (PVU) Lizenz (IBM)?",o:["IBM-Lizenzmetrik: Kosten basieren auf Prozessortyp und -anzahl – jeder Prozessor hat einen PVU-Wert","Lizenz pro GB","Lizenz pro Server","Preis pro Nutzer"],a:0,f:"PVU (IBM): jeder CPU-Typ bekommt einen PVU-Wert (z.B. 70-120 PVU/Core). Software-Kosten = Anzahl Cores × PVU-Wert × Preis/PVU. Sehr komplex bei virtualisierten Umgebungen."},
{id:172,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Workspace-Lizenz?",o:["Floating License","Named Device License","Lizenz für physischen Arbeitsplatz","Lizenz die einem Nutzer ermöglicht Software auf mehreren Geräten gleichzeitig zu nutzen (Desktop, Laptop, Tablet) – typisch bei modernen Abonnements"],a:3,f:"Workspace-Lizenz: ein Nutzer, mehrere Geräte gleichzeitig. Microsoft 365 Family erlaubt z.B. 5 Geräte gleichzeitig pro Nutzer. Sinnvoll für hybrides Arbeiten."},
{id:173,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine ESD (Electronic Software Distribution)?",o:["Kauf und Lieferung von Software ohne physische Medien – Download nach Kauf, Lizenz-Key per E-Mail","Email-Dienst-Lizenz","Verschlüsselungslizenz","Elektronische Signaturlizenz"],a:0,f:"ESD: Software wird digital ausgeliefert (kein Datenträger). Kauf online, Download sofort, Lizenz-Key per E-Mail. Günstiger als Box-Version, sofort verfügbar. Standard heute."},
{id:174,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Box-Lizenz (Retail-Box)?",o:["Digitale Lizenz","OEM-Lizenz","Software mit physischem Datenträger (DVD) und Lizenz-Key auf Aufkleber – heutiger Standard ist ESD","Cloud-Lizenz"],a:2,f:"Box-Lizenz/Retail: physische Verpackung mit DVD und Lizenz-Key. Heute selten, da ESD dominiert. Vorteil: keine Internetverbindung für Installation nötig, Weiterverkauf oft erlaubt."},
{id:175,b:"5.2b",t:"Software-Lizenzen",q:"Was ist eine Offline-Aktivierung bei Software?",o:["Aktivierung der Software ohne Internetverbindung – z.B. per Telefon oder manuellen Code-Austausch","Deaktivierung","Permanente Offline-Nutzung","Software ohne Lizenz nutzen"],a:0,f:"Offline-Aktivierung: wenn keine Internetverbindung vorhanden, kann Software per Telefon oder manuellen Datei-Austausch aktiviert werden. Wichtig in gesicherten Netzwerken (Air Gap)."},
