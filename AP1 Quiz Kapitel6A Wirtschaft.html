<script>
const Q=[
{id:1,b:"6.1",t:"Kosten",q:"Was sind Anschaffungskosten?",o:["Einmalige Kosten beim Erwerb: Kaufpreis, Transport, Installation, Schulung","Finanzierungszinsen","Monatliche Lizenzgebühren","Laufende Betriebskosten"],a:0,f:"Anschaffungskosten sind einmalig: Kaufpreis, Transportkosten, Installationskosten, Schulungskosten. Sie entstehen nur beim Erwerb eines Gutes."},
{id:2,b:"6.1",t:"Kosten",q:"Was sind Betriebskosten?",o:["Abschreibungen","Laufende Kosten: Strom, Wartung, Reparaturen, Lizenzen, Personalkosten","Einmalige Kaufkosten","Finanzierungsgebühren"],a:1,f:"Betriebskosten sind laufend: Strom, Wasser, Heizung, Wartung, Reparaturen, Lizenzen und Abonnements, Personalkosten."},
{id:3,b:"6.1",t:"Kosten",q:"Was sind fixe Kosten?",o:["Einmalige Investitionen","Variable Ausgaben","Kosten die mit Produktion steigen","Kosten die unabhaengig von Nutzung/Produktion anfallen (z.B. Miete, Gehaelter, Versicherungen)"],a:3,f:"Fixe Kosten bleiben konstant unabhaengig von der Produktionsmenge: Miete, Grundgehaelter, Versicherungen, Abschreibungen."},
{id:4,b:"6.1",t:"Kosten",q:"Was sind variable Kosten?",o:["Kosten die mit Nutzung/Produktion steigen (z.B. Materialkosten, Stromverbrauch)","Konstante monatliche Kosten","Einmalige Anschaffung","Mietkosten"],a:0,f:"Variable Kosten aendern sich mit der Produktionsmenge: Materialkosten, nutzungsabhaengiger Strom, Verbrauchsmaterial, variable Personalkosten (Ueberstunden)."},
{id:5,b:"6.1",t:"Kosten",q:"Was sind Finanzierungskosten?",o:["Zinsen fuer Kredite und Gebuehren fuer Finanzierungsmodelle (z.B. Leasinggebuehren, Buerschaftskosten)","Kosten fuer Software-Lizenzen","Personalkosten","Transportkosten"],a:0,f:"Finanzierungskosten entstehen durch Kapitalbeschaffung: Zinsen fuer Kredite, Leasinggebuehren, Gebuehren fuer Buerschafte oder Sicherheiten."},
{id:6,b:"6.1",t:"Kosten",q:"Was ist der Vorteil von Leasing gegenueber Kauf?",o:["Planbare Raten ohne hohe Anfangsinvestition - keine grosse Einmalzahlung noetig","Keine Bindung","Man besitzt das Geraet","Guenstiger langfristig"],a:0,f:"Leasing-Vorteil: planbare monatliche Raten, keine hohe Anfangsinvestition, Liquiditaet bleibt erhalten. Nachteil: kein Eigentumsrecht, langfristig teurer."},
{id:7,b:"6.1",t:"Kosten",q:"Was ist der Nachteil von Leasing?",o:["Hohe Anfangsinvestition","Schlechte Planbarkeit","Kein Support","Keine Eigentumsrechte und langfristig hoehere Gesamtkosten als Kauf"],a:3,f:"Leasing-Nachteil: kein Eigentumserwerb, Abhaengigkeit vom Leasinggeber, langfristig oft teurer als direkter Kauf."},
{id:8,b:"6.1",t:"Kosten",q:"Was ist der Vorteil eines direkten Kaufs?",o:["Eigentumserwerb und keine laufenden Verpflichtungen nach der Zahlung","Immer guenstiger","Kein Wertverlust","Niedrige monatliche Kosten"],a:0,f:"Kauf-Vorteil: vollstaendiges Eigentum, keine laufenden Zahlungsverpflichtungen, freie Verfuegung ueber das Gut. Nachteil: hohe Anfangsinvestition, Wertverlust."},
{id:9,b:"6.1",t:"Kosten",q:"Was ist Pay-per-Use?",o:["Monatliches Abonnement","Jaehrliche Pauschale","Einmaliger Kauf","Nutzungsbasiertes Modell: Zahlung nur fuer tatsaechlich genutzten Umfang (z.B. Cloud-Ressourcen)"],a:3,f:"Pay-per-Use: nur zahlen was genutzt wird. Vorteil: keine Fixkosten bei Nichtnutzung. Nachteil: unvorhersehbare Kosten, langfristig teurer bei hoher Auslastung."},
{id:10,b:"6.1",t:"Kosten",q:"Was sind Gesamtbetriebskosten (TCO - Total Cost of Ownership)?",o:["Monatliche Leasingrate","Nur Wartungskosten","Alle Kosten ueber die gesamte Nutzungsdauer: Anschaffung + Betrieb + Wartung + Entsorgung","Nur der Kaufpreis"],a:2,f:"TCO (Total Cost of Ownership): Gesamtkosten inkl. Anschaffung, Betrieb, Wartung, Schulung, Support und Entsorgung. Gibt ein vollstaendiges Kostenbild ueber die Lebensdauer."},
{id:11,b:"6.1",t:"Kosten",q:"Was ist Abschreibung (AfA)?",o:["Betriebskosten","Finanzierungskosten","Monatliche Mietzahlung","Verteilung des Wertverlust eines Wirtschaftsguts ueber seine Nutzungsdauer (z.B. PC 3 Jahre, 33% pro Jahr)"],a:3,f:"Abschreibung (Absetzung fuer Abnutzung): Anschaffungskosten werden ueber Nutzungsdauer verteilt. PC mit 900 EUR Anschaffung, 3 Jahre Nutzungsdauer = 300 EUR Abschreibung pro Jahr."},
{id:12,b:"6.1",t:"Kosten",q:"Was ist der Break-Even-Point?",o:["Punkt an dem Erloese die Gesamtkosten decken - ab hier wird Gewinn erzielt","Maximaler Gewinn","Mindestverkaufspreis","Maximale Produktionsmenge"],a:0,f:"Break-Even-Point (Gewinnschwelle): Umsatz = Gesamtkosten. Bis dahin: Verlust. Ab dann: Gewinn. Berechnung: Fixkosten / (Preis - variable Kosten pro Stueck)."},
{id:13,b:"6.1",t:"Kosten",q:"Was sind Opportunitaetskosten?",o:["Steuerliche Abzuege","Entgangene Ertraege durch Wahl einer Alternative - der Wert der besten nicht gewaehlten Option","Vertane Gewinne durch falsche Investitionen","Rueckstellungen"],a:1,f:"Opportunitaetskosten: was man durch eine Entscheidung aufgibt. Beispiel: Kauf eines Servers statt Cloud = Opportunitaetskosten sind die entgangene Flexibilitaet der Cloud."},
{id:14,b:"6.1",t:"Kosten",q:"Was ist der Unterschied zwischen Kosten und Ausgaben?",o:["Kosten sind immer groesser","Identisch","Ausgaben sind buchhalterisch","Ausgaben = tatsaechlicher Geldfluss. Kosten = wertmaessiger Verbrauch (z.B. Abschreibung ist Kosten aber keine Ausgabe)"],a:3,f:"Ausgaben: Geld fliesst ab (Zahlung). Kosten: bewerteter Gueterverbrauch im Betrieb. Abschreibung = Kosten aber keine Ausgabe. Kreditrueckzahlung = Ausgabe aber keine Kosten."},
{id:15,b:"6.1",t:"Kosten",q:"Was ist eine Kostenstellenrechnung?",o:["Zuordnung von Kosten zu Unternehmensbereichen (z.B. IT-Abteilung, Vertrieb) fuer interne Kostentransparenz","Steuerrechnung","Preiskalkulation","Gewinn-Berechnung"],a:0,f:"Kostenstellen: Orte der Kostenentstehung (z.B. IT-Abteilung, Produktion, Vertrieb). Kostenstellenrechnung ordnet Kosten den verursachenden Bereichen zu. Basis fuer Controlling."},
{id:16,b:"6.1",t:"Kosten",q:"Was versteht man unter Gemeinkosten?",o:["Direkt zurechenbare Kosten","Kosten die nicht direkt einem Produkt zugerechnet werden koennen (z.B. Verwaltung, IT-Infrastruktur, Gebaeude)","Materialkosten","Personalkosten"],a:1,f:"Gemeinkosten (indirekte Kosten): nicht direkt einem Produkt zurechenbar. Beispiele: Verwaltung, Gebaeudemiete, allgemeine IT-Infrastruktur. Werden ueber Schluessel auf Produkte verteilt."},
{id:17,b:"6.1",t:"Kosten",q:"Was sind Einzelkosten?",o:["Kosten die direkt einem Produkt oder Auftrag zugerechnet werden koennen (z.B. direktes Material, Fertigungsloehne)","Gemeinkosten","Overhead-Kosten","Fixkosten"],a:0,f:"Einzelkosten (direkte Kosten): direkt einem Produkt zurechenbar. Beispiele: Rohstoffe, direkter Arbeitslohn fuer dieses Produkt, spezifische Lizenzen fuer ein Projekt."},
{id:18,b:"6.1",t:"Kosten",q:"Was ist ein Kostenvergleich bei IT-Beschaffung?",o:["Nur Monatskosen vergleichen","Gesamtkosten verschiedener Beschaffungsoptionen gegenueberstellen (Kauf, Leasing, Miete, Pay-per-Use) ueber gleichen Zeitraum","Nur Kaufpreis vergleichen","Nur Anschaffungskosten"],a:1,f:"Kostenvergleich: alle Optionen ueber gleichen Zeitraum vergleichen (z.B. 3 Jahre). Kauf: Anschaffung + Betrieb. Leasing: Raten + Rueckgabe. Pay-per-Use: nutzungsabhaengig."},
{id:19,b:"6.1",t:"Kosten",q:"Was sind Folgekosten bei IT-Systemen?",o:["Lizenzkosten allein","Anschaffungskosten","Transportkosten","Kosten nach dem Kauf: Wartung, Support, Updates, Schulungen, Stromverbrauch - oft hoeher als Anschaffung"],a:3,f:"Folgekosten werden oft unterschaetzt: Wartungsvertraege, Software-Updates, Schulungen, Energiekosten, IT-Support. Koennen ueber Nutzungsdauer das 2-3-fache der Anschaffung betragen."},
{id:20,b:"6.1",t:"Kosten",q:"Was ist Investitionsrechnung?",o:["Liquiditaetsplanung","Steuerberechnung","Methoden zur Bewertung von Investitionen (Kapitalwertmethode, Amortisationsrechnung, ROI) um optimale Entscheidung zu treffen","Berechnung von Gehaeltern"],a:2,f:"Investitionsrechnung prueft ob eine Investition wirtschaftlich sinnvoll ist: ROI (Return on Investment), Amortisationszeit (wann ist Investition eingespielt?), Kapitalwertmethode."},
{id:21,b:"6.2",t:"Angebotsvergleich",q:"Was ist ein quantitativer Angebotsvergleich?",o:["Bewertung des Services","Vergleich von Qualitaetsmerkmalen","Vergleich messbarer Zahlengroessen: Preis, Leistung, Kapazitaet, Lieferzeit","Nutzwertanalyse"],a:2,f:"Quantitativer Vergleich: messbare Groessen. Beispiele: Preis in EUR, CPU-Takte, RAM-Groesse, Lieferzeit in Tagen, Garantiedauer in Jahren."},
{id:22,b:"6.2",t:"Angebotsvergleich",q:"Was ist ein qualitativer Angebotsvergleich?",o:["Lieferzeitvergleich","Vergleich nicht direkt messbarer Merkmale: Benutzerfreundlichkeit, Ruf des Lieferanten, Qualitaet des Supports, Zukunftssicherheit","Garantievergleich","Nur Preisvergleich"],a:1,f:"Qualitativer Vergleich: subjektive/nicht direkt messbare Merkmale. Beispiele: Benutzerfreundlichkeit, Lieferantenzuverlaessigkeit, Supportqualitaet, Innovationspotenzial."},
{id:23,b:"6.2",t:"Angebotsvergleich",q:"Warum reicht ein reiner Preisvergleich bei IT-Beschaffung nicht aus?",o:["Qualitaet spielt keine Rolle","Preis ist immer gleich","Preis ist das einzige Kriterium","Qualitative Aspekte wie Support, Kompatibilitaet und Zukunftssicherheit haben grossen Einfluss auf den Gesamtwert"],a:3,f:"Guenstigstes Angebot ist nicht immer bestes: schlechter Support kostet langfristig mehr, inkompatible Systeme verursachen Folgekosten, mangelnde Updates = Sicherheitsrisiko."},
{id:24,b:"6.2",t:"Angebotsvergleich",q:"Was ist ein Lastenheft im Kontext Angebotsvergleich?",o:["Dokument des Auftraggebers mit allen Anforderungen - Grundlage fuer Angebote der Lieferanten","Angebotsdokument des Lieferanten","Lieferschein","Rechnungsdokument"],a:0,f:"Lastenheft: Auftraggeber beschreibt WAS er will (Anforderungen). Lieferanten erstellen darauf basierend ihre Angebote. Ermoeglicht vergleichbaren Angebotsvergleich."},
{id:25,b:"6.2",t:"Angebotsvergleich",q:"Welche Kriterien sind typisch beim quantitativen IT-Angebotsvergleich?",o:["Farbe, Design, Markenname","Mitarbeiterfreundlichkeit","Unternehmensgroesse des Lieferanten","Preis, Leistungsdaten (CPU, RAM, SSD), Lieferzeit, Garantiedauer, Energieverbrauch"],a:3,f:"Quantitative IT-Kriterien: Gesamtpreis (inkl. Zubehoer), CPU-Kerne/GHz, RAM-Groesse, SSD-Kapazitaet, Lieferzeit in Tagen, Garantiedauer in Jahren, Watt-Verbrauch."},
{id:26,b:"6.3",t:"Nutzwertanalyse",q:"Was ist eine Nutzwertanalyse?",o:["Eine Buchhaltugsform","Ein Marktforschungsinstrument","Eine Kostenrechnung","Methode zur Entscheidungsfindung: Kriterien werden gewichtet und Alternativen bewertet - beste Alternative hat hoechsten Nutzwert"],a:3,f:"Nutzwertanalyse: systematische Entscheidungsmethode. Schritte: Kriterien festlegen, gewichten (%), Alternativen bewerten (z.B. 1-10), gewichtete Punkte summieren."},
{id:27,b:"6.3",t:"Nutzwertanalyse",q:"Wie werden Kriterien in der Nutzwertanalyse gewichtet?",o:["Nach Alphabetischer Reihenfolge","Alle Kriterien gleichwertig","Nach Kosten","Prozentual nach Wichtigkeit, Summe aller Gewichtungen = 100%"],a:3,f:"Gewichtung: jedem Kriterium wird ein Prozentsatz zugeordnet, alle Gewichtungen summieren sich zu 100%. Beispiel: Preis 40%, Leistung 30%, Support 20%, Lieferzeit 10%."},
{id:28,b:"6.3",t:"Nutzwertanalyse",q:"Wie berechnet sich der gewichtete Nutzwert eines Kriteriums?",o:["Bewertung / Gewichtung","Bewertung x Gewichtung (z.B. Note 8 x 40% = 3,2 Punkte)","Summe aller Noten","Bewertung + Gewichtung"],a:1,f:"Gewichteter Nutzwert = Punktzahl x Gewichtung. Beispiel: Angebot A bekommt fuer Preis Note 8, Gewichtung 40% = 8 x 0,4 = 3,2 gewichtete Punkte."},
{id:29,b:"6.3",t:"Nutzwertanalyse",q:"Welches Angebot gewinnt bei der Nutzwertanalyse?",o:["Das mit dem hoechsten Gesamtnutzwert (Summe aller gewichteten Einzelbewertungen)","Das schnellste","Das guenstigste","Das bekannteste"],a:0,f:"Sieger = hoechster Gesamtnutzwert (Summe aller gewichteten Punkte ueber alle Kriterien). Nicht zwingend das guenstigste Angebot!"},
{id:30,b:"6.3",t:"Nutzwertanalyse",q:"Was ist der Vorteil der Nutzwertanalyse gegenueber reinem Preisvergleich?",o:["Sie beruecksichtigt qualitative und quantitative Kriterien gleichzeitig und macht sie vergleichbar","Sie ist gesetzlich vorgeschrieben","Sie ist schneller","Sie ist objektiver"],a:0,f:"Nutzwertanalyse macht qualitative Kriterien (z.B. Support-Qualitaet) quantifizierbar und vergleichbar. Ermoeglicht ganzheitliche Entscheidung statt reinem Preisfokus."},
{id:31,b:"6.3",t:"Nutzwertanalyse",q:"Was koennte ein typisches Bewertungsschema in der Nutzwertanalyse sein?",o:["Prozentzahlen","Ja/Nein","Punkteskala 1-10 oder 0-5, wobei hoehere Punkte besser sind","Buchstabennoten A-F"],a:2,f:"Typisch: Punkteskala 1-10 (10=sehr gut, 1=sehr schlecht) oder 0-5. Die Skala wird festgelegt bevor bewertet wird. Alle Angebote werden nach gleicher Skala bewertet."},
{id:32,b:"6.3",t:"Nutzwertanalyse",q:"Wann sollte eine Nutzwertanalyse eingesetzt werden?",o:["Bei komplexen Entscheidungen mit mehreren Alternativen und verschiedenen Kriterien (z.B. Serverkauf, Softwareauswahl)","Immer bei kleinen Entscheidungen","Nur intern","Nur bei Preisvergleichen"],a:0,f:"Nutzwertanalyse eignet sich bei: mehreren Alternativen, verschiedenen (auch qualitativen) Kriterien, wichtigen Entscheidungen. Nicht sinnvoll bei einfachen Entscheidungen mit klarem Sieger."},
{id:33,b:"6.3",t:"Nutzwertanalyse",q:"Was ist eine Muss-Anforderung bei der Angebotsauswahl?",o:["Wunschkriterium","Mindestanforderung: Angebote die diese nicht erfuellen werden sofort aussortiert (K.O.-Kriterium)","Preisgrenze","Optionales Feature"],a:1,f:"Muss-Anforderungen (K.O.-Kriterien): Mindeststandards die ein Angebot erfuellen muss. Beispiele: min. 16 GB RAM, Windows 11 kompatibel, Lieferung innerhalb 5 Tage. Nicht erfuellt = disqualifiziert."},
{id:34,b:"6.3",t:"Nutzwertanalyse",q:"Was ist eine Soll-Anforderung?",o:["Pflichtanforderung","Wunschkriterium das in die Bewertung einfliesst aber nicht zwingend erfuellt sein muss","Technische Mindestanforderung","Gesetzliche Vorschrift"],a:1,f:"Soll-Anforderungen: Wunschkriterien die bewertet werden. Nichterfuellung fuehrt nicht zur Disqualifikation, reduziert aber die Punktzahl in der Nutzwertanalyse."},
{id:35,b:"6.3",t:"Nutzwertanalyse",q:"Nennen Sie die Schritte der Nutzwertanalyse in richtiger Reihenfolge.",o:["Angebote einholen, billigstes auswaehlen","Kriterien festlegen, Gewichten, Alternativen bewerten, Nutzwerte berechnen, Ergebnis interpretieren","Bewerten, Gewichten, Vergleichen","Preis vergleichen, Qualitaet pruefen"],a:1,f:"Schritte: 1. Bewertungskriterien festlegen 2. Kriterien gewichten (100%) 3. Alternativen nach jedem Kriterium bewerten 4. Gewichtete Punkte berechnen 5. Summen vergleichen 6. Sieger bestimmen."},
{id:36,b:"6.4",t:"Wertschoepfung",q:"Was bedeutet Wertschoepfung durch IT?",o:["IT schafft Mehrwert: direkte Effizienzsteigerung, indirekte Qualitaetsverbesserung und neue strategische Geschaeftschancen","Nur interne Vorteile","Nur Umsatzsteigerung","Nur Kostensenkung"],a:0,f:"IT-Wertschoepfung: direkt (schnellere Prozesse, Fehlerreduktion), indirekt (bessere Entscheidungsgrundlage, Qualitaetsverbesserung), strategisch (neue Geschaeftsmodelle, Wettbewerbsvorteile)."},
{id:37,b:"6.4",t:"Wertschoepfung",q:"Warum reicht reine Kostenbetrachtung bei IT-Investitionen nicht aus?",o:["Kosten sind unwichtig","Nur Kosten zaehlen","Kosten sind immer bekannt","IT-Systeme schaffen auch nicht-monetaere Vorteile wie Qualitaetsverbesserung, Kundenzufriedenheit und Innovationspotenzial"],a:3,f:"Reine Kostenbetrachtung vernachlaessigt: Umsatzwachstum durch bessere Systeme, Kundenbindung, Qualitaetsverbesserung, strategische Positionierung, Innovationsmoeglichkeiten."},
{id:38,b:"6.4",t:"Wertschoepfung",q:"Was ist ROI (Return on Investment)?",o:["Kennzahl fuer Rentabilitaet: (Gewinn/Investitionskosten) x 100% - gibt an wie viel Prozent die Investition einbringt","Amortisationsdauer","Kapitalwert","Risiko einer Investition"],a:0,f:"ROI = (Nettogewinn / Investitionskosten) x 100%. Beispiel: 10.000 EUR Investition, 3.000 EUR jaehrlicher Gewinn = ROI 30% pro Jahr. Je hoeher, desto besser."},
{id:39,b:"6.4",t:"Wertschoepfung",q:"Was ist die Amortisationszeit?",o:["Zeitraum bis eine Investition durch Ertraege oder Einsparungen vollstaendig ausgeglichen ist","Abschreibungsdauer","Nutzungsdauer eines Gutes","Garantiezeit"],a:0,f:"Amortisationszeit: wann hat sich die Investition eingespielt? Beispiel: 10.000 EUR Investition spart 2.500 EUR pro Jahr = 4 Jahre Amortisationszeit."},
{id:40,b:"6.4",t:"Wertschoepfung",q:"Was ist die Wertschoepfungskette nach Porter?",o:["Modell das alle Aktivitaeten eines Unternehmens zeigt die zur Werterhoehung beitragen (primaere und unterstuetzende Aktivitaeten)","Lieferkette","Produktionskette","Vertriebskanal"],a:0,f:"Porters Wertschoepfungskette: primaere Aktivitaeten (Eingangslogistik, Produktion, Ausgangslogistik, Marketing, Service) + unterstuetzende Aktivitaeten (IT, Personalwesen, Beschaffung)."},
{id:41,b:"6.5",t:"Projekte & Kalkulation",q:"Was ist eine Machbarkeitsanalyse?",o:["Eine Kosten-Aufstellung","Ein Risikoregister","Bewertung ob ein Projekt technisch, wirtschaftlich und rechtlich umsetzbar ist","Ein Projektplan"],a:2,f:"Machbarkeitsanalyse prueft: technische Machbarkeit (Technologie vorhanden?), wirtschaftliche Machbarkeit (rentabel?), rechtliche Machbarkeit (gesetzeskonform?)."},
{id:42,b:"6.5",t:"Projekte & Kalkulation",q:"Was ist eine Vorkalkulation?",o:["Schaetzung der anfallenden Kosten VOR Projektstart - Basis fuer Budgetplanung und Entscheidung","Jaehliche Bilanz","Abrechnung nach Projektende","Stundensatz-Berechnung"],a:0,f:"Vorkalkulation: alle erwarteten Kosten vor Projektstart schatzen (Material, Personal, externe Dienstleistungen). Grundlage fuer Budgetplanung und Angebotserstellung."},
{id:43,b:"6.5",t:"Projekte & Kalkulation",q:"Was ist eine Nachkalkulation?",o:["Monatliche Kostenerfassung","Erneute Kostenschaetzung","Erfassung der tatsaechlichen Kosten NACH Projektabschluss und Vergleich mit der Vorkalkulation","Jaehrliche Revision"],a:2,f:"Nachkalkulation: tatsaechliche Kosten nach Projektabschluss erfassen, mit Vorkalkulation vergleichen, Abweichungen analysieren, Optimierungspotenziale fuer kuenftige Projekte ableiten."},
{id:44,b:"6.5",t:"Projekte & Kalkulation",q:"Was sind Stakeholder eines Projekts?",o:["Nur externe Partner","Nur Investoren","Nur das Projektteam","Alle Personen oder Gruppen die ein Interesse am Projekt haben: Auftraggeber, Kunden, Team, Lieferanten, Behoerden"],a:3,f:"Stakeholder: Auftraggeber, Kunden, Projektteam, Lieferanten, Behoerden, Mitarbeiter die betroffen sind. Ihre Interessen muessen beruecksichtigt und gemanagt werden."},
{id:45,b:"6.5",t:"Projekte & Kalkulation",q:"Was ist eine Stakeholder-Analyse?",o:["Identifikation aller Stakeholder, Bewertung ihres Einflusses und ihrer Interessen, Ableitung von Kommunikationsstrategien","Marktanalyse","Mitarbeiter-Beurteilung","Kundenbefragung"],a:0,f:"Stakeholder-Analyse: Wer ist betroffen? Wie gross ist ihr Einfluss? Was sind ihre Interessen? Daraus: Kommunikationsstrategie und Massnahmen zur Einbindung."},
{id:46,b:"6.5",t:"Projekte & Kalkulation",q:"Was sind technische Projektrisiken?",o:["Budget-Risiken","Unvorhergesehene technische Herausforderungen: Technologie funktioniert nicht wie erwartet, Kompatibilitaetsprobleme, fehlende Expertise","Risiken durch Markt","Risiken durch Mitarbeiter"],a:1,f:"Technische Risiken: Technologie nicht reif, Kompatibilitaetsprobleme, fehlende Infrastruktur, Ausfaelle, mangelnde Expertise im Team."},
{id:47,b:"6.5",t:"Projekte & Kalkulation",q:"Was sind wirtschaftliche Projektrisiken?",o:["Teamkonflikte","Rechtliche Aenderungen","Technische Probleme","Budgetueberschreitungen, Marktveraenderungen, Waehrungsschwankungen, Preiserhoehungen bei Lieferanten"],a:3,f:"Wirtschaftliche Risiken: Kostenexplosion, sinkende Nachfrage, Lieferanteninsolvenz, Wechselkursschwankungen, Preissteigerungen fuer Material oder Personal."},
{id:48,b:"6.5",t:"Projekte & Kalkulation",q:"Was sind organisatorische Projektrisiken?",o:["Technische Ausfaelle","Ressourcenknappheit, Zeitverzoegerungen, Kommunikationsprobleme, Personalausfall, unklare Verantwortlichkeiten","Finanzielle Risiken","Marktrisiken"],a:1,f:"Organisatorische Risiken: Mitarbeiter fallen aus, Ressourcen werden nicht rechtzeitig bereitgestellt, Kommunikation zwischen Teams funktioniert nicht, unklaere Zustaendigkeiten."},
{id:49,b:"6.5",t:"Projekte & Kalkulation",q:"Wie wird ein Risiko bewertet?",o:["Nur nach Eintrittswahrscheinlichkeit","Alphabetisch","Nur nach Kosten","Nach Eintrittswahrscheinlichkeit und Auswirkung (Schadenshoehe) - Risiko = W x A"],a:3,f:"Risikobewertung: Risiko = Eintrittswahrscheinlichkeit x Auswirkung. Hohe Wahrscheinlichkeit + grosser Schaden = kritisches Risiko. Priorisierung der Massnahmen nach Risikohoehe."},
{id:50,b:"6.5",t:"Projekte & Kalkulation",q:"Was ist eine Budgetvorgabe bei Projekten?",o:["Empfohlenes Budget","Minimalbudget","Verbindlicher Finanzrahmen fuer ein Projekt inkl. Personal, Material, Infrastruktur und Reserve fuer unvorhergesehenes","Jahresbudget"],a:2,f:"Budgetvorgabe: definiert den maximalen Finanzrahmen. Umfasst: Personal, Material, externe Dienstleistungen, Infrastruktur, Puffer fuer Unvorhergesehenes (Risikoreserve)."},
{id:51,b:"6.6",t:"Marktformen",q:"Was ist ein Monopol?",o:["Keine Marktmacht","Ein einziger Anbieter beherrscht den Markt und kann Preise und Mengen selbst bestimmen","Zwei Anbieter","Viele Anbieter im Markt"],a:1,f:"Monopol: nur ein Anbieter. Vollstaendige Preissetzungsmacht. Beispiel: Staatsmonopol fuer Strom in einer Region, Microsoft Windows in frueheren Jahren."},
{id:52,b:"6.6",t:"Marktformen",q:"Was ist ein Oligopol?",o:["Ein Anbieter","Viele kleine Anbieter","Staatlich regulierter Markt","Wenige grosse Anbieter mit starker Marktmacht die Preise beeinflussen koennen"],a:3,f:"Oligopol: wenige grosse Anbieter. Beispiele: Automobilindustrie (VW, Toyota, GM), Smartphone-Markt (Apple, Samsung), Telekommarkt in Deutschland (Telekom, Vodafone, o2)."},
{id:53,b:"6.6",t:"Marktformen",q:"Was ist ein Polypol?",o:["Viele Anbieter ohne dominante Marktmacht - Preise entstehen durch Marktmechanismus (Angebot/Nachfrage)","Staatliche Preisfestsetzung","Zwei Anbieter","Ein Anbieter ohne Wettbewerb"],a:0,f:"Polypol: viele Anbieter, keiner hat dominante Macht. Preise durch Angebot und Nachfrage. Beispiele: Lebensmittelmarkt, App-Store-Apps, Freelancer-Markt."},
{id:54,b:"6.6",t:"Marktformen",q:"Was ist ein Kaeufermarkt?",o:["Staatlich regulierter Markt","Mehr Angebot als Nachfrage: Anbieter konkurrieren um Kaeufer - Kaeufer haben Verhandlungsmacht, Preise sinken","Mehr Nachfrage als Angebot","Viele Kaeufer, viele Anbieter"],a:1,f:"Kaeufermarkt: Angebot uebersteigt Nachfrage. Kaeufer haben Verhandlungsmacht, koennen Preise druecken. Beispiel: Gebrauchtwagenmarkt, viele Anbieter, wenige Interessenten."},
{id:55,b:"6.6",t:"Marktformen",q:"Was ist ein Verkaeufermarkt?",o:["Viele Anbieter, wenige Kaeufer","Staatliche Kontrolle","Preise sinken","Mehr Nachfrage als Angebot: Kaeufer konkurrieren um Produkte - Verkaeufer haben Verhandlungsmacht, Preise steigen"],a:3,f:"Verkaeufermarkt: Nachfrage uebersteigt Angebot. Verkaeufer haben Macht, koennen hoehre Preise verlangen. Beispiel: Wohnungsmarkt in Grossstaedten, Chipmangel 2021/22."},
{id:56,b:"6.6",t:"Marktformen",q:"Welche Marktform hat der IT-Markt fuer Prozessoren (Intel/AMD)?",o:["Oligopol - wenige grosse Anbieter (Intel, AMD, Apple Silicon) dominieren den Markt","Staatsmonopol","Monopol","Polypol"],a:0,f:"Prozessormarkt = Oligopol: Intel und AMD dominieren x86, Apple Silicon fuer eigene Geraete. Wenige Anbieter mit starker Marktmacht und hohen Markteintrittsbarrieren."},
{id:57,b:"6.6",t:"Marktformen",q:"Was sind Markteintrittsbarrieren?",o:["Hindernisse die neuen Wettbewerbern den Markteintritt erschweren (hohe Investitionen, Patente, Netzwerkeffekte, Regulierung)","Personalkosten","Steuern fuer neue Unternehmen","Einfuhrzölle"],a:0,f:"Markteintrittsbarrieren: Kapitalanforderungen, Patente/IP-Schutz, Skalenvorteile etablierter Anbieter, Netzwerkeffekte, Regulierung, etablierte Kundenbeziehungen. Halten Wettbewerb gering."},
{id:58,b:"6.6",t:"Marktformen",q:"Was ist Marktmacht?",o:["Marktanteil in Prozent","Groesse eines Unternehmens","Anzahl der Mitarbeiter","Faehigkeit eines Unternehmens Preise oder Konditionen ueber Wettbewerbsniveau zu setzen - bei Monopol/Oligopol"],a:3,f:"Marktmacht: Faehigkeit Preise ueber Wettbewerbsniveau zu setzen oder Konditionen zu diktieren. Hohe Marktmacht bei Monopol. Geringe Marktmacht bei Polypol."},
{id:59,b:"6.6",t:"Marktformen",q:"Was ist Preissetzungsmacht?",o:["Faehigkeit guenstig einzukaufen","Skontogewaehrung","Moeglichkeit eines Anbieters Preise unabhaengig vom Wettbewerb festzulegen - nur bei Monopol vollstaendig","Preisempfehlung"],a:2,f:"Preissetzungsmacht: bei Monopol vollstaendig (Preis kann frei gesetzt werden), bei Oligopol eingeschraenkt (Wettbewerber beobachten sich), bei Polypol nicht vorhanden (Marktpreis)."},
{id:60,b:"6.6",t:"Marktformen",q:"Was ist ein natuerliches Monopol?",o:["Staatlich verordnetes Monopol","Markt wo ein Anbieter effizienter ist als mehrere (z.B. Stromnetze, Schienennetz) - hohe Fixkosten machen Wettbewerb unwirtschaftlich","Temporaeres Monopol","Monopol durch Patent"],a:1,f:"Natuerliches Monopol: ein Anbieter kann Markt effizienter bedienen als mehrere. Typisch bei Infrastruktur (Stromtrassen, Schienennetz, Glasfaser). Oft staatlich reguliert."},
{id:61,b:"6.7",t:"Vertriebsformen",q:"Was ist direkter Vertrieb?",o:["Multi-Level-Marketing","Hersteller verkauft direkt an Endkunden ohne Zwischenhaendler (z.B. eigener Webshop, Direktverkauf)","Verkauf ueber Haendler","Verkauf ueber Grosshaendler"],a:1,f:"Direktvertrieb: Hersteller zum Endkunden ohne Zwischenstufen. Beispiele: Apple-Store, Dell-Webshop, lokales Handwerk. Vorteil: hoehere Marge, direkter Kundenkontakt."},
{id:62,b:"6.7",t:"Vertriebsformen",q:"Was ist indirekter Vertrieb?",o:["Abo-Modell","Direktverkauf","Produkt gelangt ueber einen oder mehrere Zwischenhaendler zum Endkunden (Grosshaendler, Einzelhaendler, Reseller)","Onlineverkauf"],a:2,f:"Indirekter Vertrieb: Hersteller -> Grosshaendler -> Einzelhaendler -> Endkunde. Vorteil: groessere Reichweite. Nachteil: Marge wird geteilt, weniger Kontrolle ueber Kundenerlebnis."},
{id:63,b:"6.7",t:"Vertriebsformen",q:"Was ist ein Vorteil des direkten Vertriebs?",o:["Groessere Reichweite","Geringerer Aufwand","Hoehere Gewinnmarge, direkter Kundenkontakt und Kontrolle ueber Markenauftritt","Weniger Lagerkosten"],a:2,f:"Direktvertrieb-Vorteile: hoehere Marge (kein Haendler), direktes Kundenfeedback, volle Kontrolle ueber Preis und Marke, direktere Kundenbeziehung."},
{id:64,b:"6.7",t:"Vertriebsformen",q:"Was ist ein Nachteil des direkten Vertriebs?",o:["Geringere Marge","Hoehere eigene Kosten (Vertriebspersonal, Logistik, Webshop) und geringere Reichweite als Haendlernetz","Kontrollverlust","Abhaengigkeit von Haendlern"],a:1,f:"Direktvertrieb-Nachteile: hohe eigene Vertriebskosten, geringere Reichweite (kein Haendlernetz), mehr Aufwand fuer Logistik und Kundenservice."},
{id:65,b:"6.7",t:"Vertriebsformen",q:"Was ist ein Value Added Reseller (VAR)?",o:["Online-Haendler","Grosshaendler","Normaler Einzelhaendler","Haendler der Produkte mit eigenen Dienstleistungen kombiniert und so Mehrwert schafft (z.B. IT-Systemhaus das Hardware + Installation + Support anbietet)"],a:3,f:"VAR: Reseller der Mehrwert hinzufuegt (Konfiguration, Installation, Support, Schulung). Beispiel: IT-Systemhaus kauft Server-Hardware und verkauft als fertige IT-Loesung mit Service."},
{id:66,b:"6.7",t:"Vertriebsformen",q:"Was ist E-Commerce als Vertriebsform?",o:["Telefonverkauf","Elektronischer Handel ueber Internet - direkt oder ueber Plattformen wie Amazon, Ebay","Haustuerverkauf","Postverkauf"],a:1,f:"E-Commerce: Onlinevertrieb. Direkt: eigener Webshop. Ueber Plattformen: Amazon Marketplace, Ebay. Vorteil: geringe Einstiegskosten, globale Reichweite, 24/7-Verfuegbarkeit."},
{id:67,b:"6.7",t:"Vertriebsformen",q:"Was ist Multi-Channel-Vertrieb?",o:["Franchising","Gleichzeitige Nutzung mehrerer Vertriebskanaele (Ladengeschaeft + Webshop + Telefonverkauf)","Nur Online-Vertrieb","Nur ein Vertriebskanal"],a:1,f:"Multi-Channel: mehrere Vertriebskanaele parallel. Beispiel: Saturn verkauft im Laden, im Webshop und per App. Vorteil: groessere Reichweite. Nachteil: hoehere Komplexitaet."},
{id:68,b:"6.7",t:"Vertriebsformen",q:"Was ist Franchising als Vertriebsform?",o:["Direktvertrieb","Haendlernetz","Lizenzsystem: Franchisenehmer nutzen Marke, Konzept und Know-how des Franchisegebers gegen Gebuehr (z.B. McDonald's, OBI)","Onlinevertrieb"],a:2,f:"Franchising: Franchisegeber (Marke, Konzept) + Franchisenehmer (selbstaendig, zahlt Gebuehren). Beispiele: McDonald's, Subway, OBI. Vorteil: schnelle Expansion ohne Eigenkapital."},
{id:69,b:"6.7",t:"Vertriebsformen",q:"Was ist Direktmarketing als Vertriebsform?",o:["Massenwerbung","Plakatwerbung","Direkte Kommunikation mit potenziellen Kunden (E-Mail, Post, Telefon) ohne Zwischenhaendler","Fernsehwerbung"],a:2,f:"Direktmarketing: direkte Ansprache von Zielgruppen ohne Massenmedien. Beispiele: Newsletter, personalisierte Mailings, Telefonakquise. Vorteil: messbar und personalisierbar."},
{id:70,b:"6.7",t:"Vertriebsformen",q:"Was versteht man unter Omnichannel-Strategie?",o:["Multi-Channel ohne Vernetzung","Nur Online-Verkauf","Nahtlose Verzahnung aller Vertriebskanaele sodass Kunden kanaluebergreifend einkaufen koennen (z.B. online bestellen, im Laden umtauschen)","Franchise-System"],a:2,f:"Omnichannel: alle Kanaele sind vernetzt und bieten einheitliche Kundenerfahrung. Beispiel: Produkt online ansehen, im Laden ausprobieren, per App kaufen, im Laden umtauschen."},
{id:71,b:"6.8",t:"Zielgruppen",q:"Was ist eine Zielgruppe?",o:["Spezifische Gruppe von Personen die ein Unternehmen mit seinen Produkten oder Marketingmassnahmen ansprechen moechte","Nur Grosskaeufer","Alle potenziellen Kaeufer weltweit","Nur Bestandskunden"],a:0,f:"Zielgruppe: definierte Gruppe mit gemeinsamen Merkmalen (demografisch, psychografisch, verhaltensbasiert) die als potenzielle Kaeufer eines Produkts oder einer Dienstleistung gelten."},
{id:72,b:"6.8",t:"Zielgruppen",q:"Was sind demografische Zielgruppenmerkmale?",o:["Messbare Bevoelkerungsmerkmale: Alter, Geschlecht, Bildung, Einkommen, Familienstand, Beruf","Persoenlichkeit","Interessen","Kaufverhalten"],a:0,f:"Demografische Merkmale: Alter (18-35 Jahre), Geschlecht, Bildungsstand, Haushaltseinkommen, Beruf, Familienstand. Einfach messbar und fuer Targeting nutzbar."},
{id:73,b:"6.8",t:"Zielgruppen",q:"Was sind psychografische Zielgruppenmerkmale?",o:["Wohnort","Werte, Einstellungen, Lebensstil, Interessen, Persoenlichkeit - schwerer messbar aber oft entscheidend fuer Kaufentscheidung","Einkommen","Alter und Geschlecht"],a:1,f:"Psychografische Merkmale: Werte (Nachhaltigkeit), Lebensstil (sportlich, kreativ), Einstellungen, Interessen, Persoenlichkeit. Basis fuer emotionale Markenkommunikation."},
{id:74,b:"6.8",t:"Zielgruppen",q:"Was sind verhaltensbasierte Zielgruppenmerkmale?",o:["Demografische Daten","Wohnort","Kaufverhalten, Markentreue, Nutzungsintensitaet, Kaufhaeufigkeit, Preissensibilitaet","Berufsfeld"],a:2,f:"Verhaltensbasierte Merkmale: kauft haeufig, ist markentreu, preissensibel, kauft nur Premiumprodukte, nutzt Mobile-App intensiv. Basis fuer personalisiertes Marketing."},
{id:75,b:"6.8",t:"Zielgruppen",q:"Warum ist Zielgruppendefinition wichtig?",o:["Pflicht durch Gesetz","Fuer Buchhaltung","Effizienteres Marketing: Ressourcen werden auf relevante Personen konzentriert statt breit gestreut - hoehere Conversion-Rate","Nur fuer grosse Unternehmen"],a:2,f:"Zielgruppendefinition: gezieltes Marketing spart Kosten, erhoehe Relevanz der Botschaft, hoehere Conversion-Rate. Massenwerbung ist ineffizient und teuer."},
{id:76,b:"6.8",t:"Zielgruppen",q:"Was ist eine Persona?",o:["Kundenbefragung","Fiktives repraesentatives Kundenprofil mit Namen, Bild, Eigenschaften - konkretisiert abstrakte Zielgruppe fuer Marketing und Produktentwicklung","Echte Kundendaten","Demografische Statistik"],a:1,f:"Persona: fiktiver aber realistischer Vertreter der Zielgruppe mit Namen, Alter, Beruf, Zielen, Problemen. Beispiel: IT-Admin Thomas, 35 J., kauft fuer Unternehmen, entscheidungsorientiert."},
{id:77,b:"6.8",t:"Zielgruppen",q:"Was ist B2B (Business to Business)?",o:["Geschaeftsbeziehungen zwischen Unternehmen: Produkte/Dienstleistungen werden an andere Unternehmen verkauft","Behördengeschaeft","Verkauf an Endverbraucher","E-Commerce"],a:0,f:"B2B: Unternehmen verkauft an Unternehmen. Beispiele: IT-Systemhaus verkauft Server an Unternehmen, Grosshaendler an Einzelhaendler. Laengere Entscheidungsprozesse, groessere Auftragsvolumen."},
{id:78,b:"6.8",t:"Zielgruppen",q:"Was ist B2C (Business to Consumer)?",o:["B2B-Variante","Unternehmen verkauft direkt an Endverbraucher (Privatpersonen)","Regierungsauftrag","Unternehmensverkauf"],a:1,f:"B2C: Unternehmen an Privatperson. Beispiele: Online-Shop, Supermarkt, Mobilfunkvertrag. Grosser Markt, kuerzere Entscheidungsprozesse, Preis oft wichtiger als bei B2B."},
{id:79,b:"6.8",t:"Zielgruppen",q:"Was ist Marktsegmentierung?",o:["Preisfestsetzung","Marktforschung","Markteintrittsstrategie","Aufteilung eines Gesamtmarkts in kleinere homogene Teilmaerkte (Segmente) mit aehnlichen Beduerfnissen"],a:3,f:"Marktsegmentierung: Gesamtmarkt in Segmente aufteilen. Beispiele: nach Alter, Einkommen, Region, Nutzerverhalten. Jedes Segment kann gezielt angesprochen werden."},
{id:80,b:"6.8",t:"Zielgruppen",q:"Was ist eine Nischenstrategie?",o:["Massenstrategie","Expansionsstrategie","Niedrigpreisstrategie","Fokus auf kleines spezifisches Marktsegment das von grossen Anbietern vernachlaessigt wird - oft hoehere Margen moeglich"],a:3,f:"Nischenstrategie: kleines Marktsegment intensiv bedienen. Vorteil: weniger Wettbewerb, hoehere Margen, starke Kundenbindung. Beispiel: IT-Spezialanbieter fuer Medizintechnik-Software."},
{id:81,b:"6.8",t:"Zielgruppen",q:"Was ist Targeting im Digitalmarketing?",o:["Printanzeigen","Allgemeine Werbeschaltung","Gezielte Aussteuerung von Werbung an spezifische Zielgruppen basierend auf Daten (demografisch, Interessen, Verhalten)","TV-Werbung"],a:2,f:"Targeting: Werbung gezielt an definierte Zielgruppen ausspielen. Plattformen: Google Ads (Suchabsicht), Facebook/Instagram (demografisch + Interessen), LinkedIn (Berufsgruppen)."},
{id:82,b:"6.8",t:"Zielgruppen",q:"Was ist eine Zielgruppenabgrenzung?",o:["Kundensegmentierung","Klare Definition WER zur Zielgruppe gehoert und WER nicht - verhindert Streuverluste im Marketing","Markenpositionierung","Ausschluss aller Kunden"],a:1,f:"Zielgruppenabgrenzung: klare Grenzen setzen. Nicht jeder ist Kunde. Beispiel: Premium-IT-Produkt richtet sich an IT-Entscheider in Unternehmen mit >50 Mitarbeitern, nicht Heimanwender."},
{id:83,b:"6.8",t:"Zielgruppen",q:"Welche Fragen helfen bei der Zielgruppendefinition?",o:["Wie alt ist unser CEO?","Wie hoch ist unser Budget?","Wo soll das Produkt gebaut werden?","Wer sind unsere Kunden? Was brauchen sie? Wie entscheiden sie? Wo sind sie erreichbar? Was loest unser Produkt fuer sie?"],a:3,f:"Zielgruppenfragen: Wer braucht das Produkt? Welches Problem loest es? Wie trifft die Zielgruppe Kaufentscheidungen? Welche Kanaele nutzen sie? Was sind ihre Bedenken?"},
{id:84,b:"6.8",t:"Zielgruppen",q:"Was ist Customer Journey?",o:["Der gesamte Weg eines Kunden von erster Wahrnehmung bis Kauf und danach - zeigt alle Beruehrungspunkte (Touchpoints)","Lieferprozess","Kundendienstreise","Onboarding-Prozess"],a:0,f:"Customer Journey: alle Phasen der Kundeninteraktion. Phasen: Awareness (Kennenlernen), Consideration (Bewertung), Purchase (Kauf), Retention (Bindung), Advocacy (Weiterempfehlung)."},
{id:85,b:"6.8",t:"Zielgruppen",q:"Was ist ein USP (Unique Selling Proposition)?",o:["Allgemeine Produktbeschreibung","Werbeslogan","Das einzigartige Merkmal das ein Produkt/Unternehmen von Wettbewerbern unterscheidet und warum Kunden es waehlen sollten","Preisargument"],a:2,f:"USP: das Alleinstellungsmerkmal. Was macht das Produkt besonders? Beispiel: Apple = Design + Oekosystem, Volvo = Sicherheit, Google = beste Suche. Basis fuer Marketingbotschaft."},
{id:86,b:"6.8",t:"Zielgruppen",q:"Was sind geografische Zielgruppenmerkmale?",o:["Wohnort, Region, Land, Stadt vs. Land, Klimazone - relevant fuer lokale oder regionale Angebote","Einkommen","Kaufverhalten","Alter und Geschlecht"],a:0,f:"Geografische Merkmale: Stadt, Region, Land, PLZ-Gebiet. Relevant fuer: lokale Werbung, regionale Preisunterschiede, Liefergebiete, Kulturunterschiede."},
{id:87,b:"6.8",t:"Zielgruppen",q:"Was ist Massenmarketing?",o:["B2B-Ansatz","Einheitliche Marketingbotschaft an alle potenziellen Kunden ohne Segmentierung (z.B. TV-Werbung fuer Alltagsprodukte)","Zielgruppenmarketing","Nischenstrategie"],a:1,f:"Massenmarketing: eine Botschaft fuer alle. Typisch bei: Haushaltsprodukten, Lebensmitteln, Grundbedarfsgueter. Vorteil: Skaleneffekte. Nachteil: viele Streuverluste."},
{id:88,b:"6.8",t:"Zielgruppen",q:"Was ist Influencer-Marketing im Kontext Zielgruppen?",o:["TV-Werbung","Radio-Werbung","Pressearbeit","Kooperation mit Meinungsfuehrern die eine spezifische Zielgruppe erreichen - authentischere Ansprache als klassische Werbung"],a:3,f:"Influencer-Marketing: Personen mit grosser Reichweite in einer Zielgruppe (z.B. Tech-YouTuber fuer IT-Produkte) bewerben Produkte. Vorteil: hohe Glaubwuerdigkeit, zielgruppengenau."},
{id:89,b:"6.8",t:"Zielgruppen",q:"Was ist Retargeting?",o:["Newsletter-Marketing","Zielgruppe neu definieren","Werbemassnahme die Nutzer erneut anspricht die bereits Interesse gezeigt haben (z.B. Webseite besucht aber nicht gekauft)","Kundenbindungsprogramm"],a:2,f:"Retargeting: Nutzer die eine Website besucht oder Produkte angesehen haben, werden durch gezielte Werbung auf anderen Plattformen erneut angesprochen. Hoehere Conversion-Rate als Erstkontakt."},
{id:90,b:"6.8",t:"Zielgruppen",q:"Was ist der Unterschied zwischen Zielgruppe und Buyer Persona?",o:["Persona ist groesser","Zielgruppe ist spezifischer","Zielgruppe: breite demografische Gruppe. Buyer Persona: spezifisches fiktives Profil einer Person innerhalb der Zielgruppe mit Namen, Geschichte, Zielen, Problemen","Identisch"],a:2,f:"Zielgruppe: IT-Entscheider in Unternehmen 50-500 Mitarbeiter. Persona: Thomas, 42 J., IT-Leiter, kauft 2-3 Server/Jahr, preisbewusst aber qualitaetsorientiert, entscheidet nach TCO."},
{id:91,b:"6.1",t:"Kosten",q:"Was ist eine Vollkostenrechnung?",o:["Nur variable Kosten","Nur Materialkosten","Nur Fixkosten","Kostenrechnung die alle Kosten (fix und variabel) auf Produkte verteilt - gibt vollstaendiges Kostenbild"],a:3,f:"Vollkostenrechnung: alle Kosten (Einzel- und Gemeinkosten) werden auf Kostentraeger (Produkte/Leistungen) verteilt. Vollstaendiges Bild, aber Gemeinkosten-Verteilung kann willkuerlich sein."},
{id:92,b:"6.1",t:"Kosten",q:"Was ist eine Teilkostenrechnung (Deckungsbeitragsrechnung)?",o:["Vollkostenrechnung","Alle Kosten werden berechnet","Nur Fixkosten","Nur variable Kosten werden dem Produkt zugerechnet - Deckungsbeitrag = Preis minus variable Kosten zeigt Beitrag zu Fixkostendeckung"],a:3,f:"Teilkostenrechnung: DB = Erloese - variable Kosten. Der Deckungsbeitrag muss die Fixkosten decken und Gewinn erzeugen. Besser fuer kurzfristige Entscheidungen (Mindestpreis)."},
{id:93,b:"6.1",t:"Kosten",q:"Was sind Rueckstellungen?",o:["Passivposten fuer kuenftige Zahlungsverpflichtungen die dem Grunde nach sicher aber der Hoehe oder Zeit nach ungewiss sind (z.B. Garantieleistungen, Pensionen)","Bereits bezahlte Kosten","Reserven fuer Investitionen","Abschreibungen"],a:0,f:"Rueckstellungen: z.B. Pensionsrueckstellungen, Garantieverpflichtungen, Steuerrueckstellungen. Werden gebildet wenn Aufwand schon entstand aber Zahlung noch aussteht."},
{id:94,b:"6.1",t:"Kosten",q:"Was ist ein Investitionsplan?",o:["Planung aller geplanten Investitionen eines Unternehmens mit Zeitplan und Finanzmitteln","Jaehrliches Budget","Betriebskosten-Uebersicht","Liquiditaetsplanung"],a:0,f:"Investitionsplan: welche Investitionen (Hardware, Software, Gebaeude) werden wann getaetigt? Basis fuer Budgetplanung und Finanzierungsentscheidungen."},
{id:95,b:"6.5",t:"Projekte & Kalkulation",q:"Was ist eine Kosten-Nutzen-Analyse?",o:["Nur Kostenvergleich","Risikoanalyse","Nutzwertanalyse","Gegenueberstellen aller Kosten und aller Nutzenpositionen einer Investition - Entscheidungsgrundlage ob Projekt wirtschaftlich sinnvoll"],a:3,f:"Kosten-Nutzen-Analyse: alle Kosten vs. alle Nutzengroessen (monetaer und nicht-monetaer). Ergebnis: Nutzen ueberwiegt Kosten? Entscheidungsgrundlage fuer Investitionsentscheidungen."},
{id:96,b:"6.5",t:"Projekte & Kalkulation",q:"Was ist ein Projektbudget?",o:["Jahresgehalt","Mitarbeitergehaelter","Marketingbudget","Gesamter finanzieller Rahmen fuer ein Projekt inkl. aller Kostenarten (Personal, Material, Infrastruktur, Reserve)"],a:3,f:"Projektbudget: genehmigter Finanzrahmen. Beinhaltet: Personalkosten (oft groeesster Posten), Material, Lizenzen, externe Dienstleistungen, Reisekosten, Risikoreserve (10-20%)."},
{id:97,b:"6.5",t:"Projekte & Kalkulation",q:"Was ist ein Meilenstein in einem Projekt?",o:["Ein kleiner Projektschritt","Tagesziel","Wichtiger Zwischenpunkt mit definiertem Ergebnis - markiert bedeutenden Fortschritt oder Abschluss einer Phase","Wochenbericht"],a:2,f:"Meilenstein: definierter Zwischenerfolg im Projekt. Beispiel: Anforderungsanalyse abgeschlossen, Prototyp fertig, Abnahmetest bestanden. Wichtig fuer Projektueberwachung und Kommunikation."},
{id:98,b:"6.6",t:"Marktformen",q:"Was ist ein Duopol?",o:["Zwei Maerkte","Sonderfall des Oligopols mit genau zwei Anbietern die sich den Markt teilen (z.B. Airbus und Boeing fuer Grossraumflugzeuge)","Staatlich kontrollierter Markt","Zwei Kunden"],a:1,f:"Duopol: zwei Anbieter. Sonderfall des Oligopols. Beispiele: Airbus/Boeing (Passagierflugzeuge), Visa/Mastercard (Kreditkarten), Intel/AMD (Desktop-CPUs)."},
{id:99,b:"6.7",t:"Vertriebsformen",q:"Was ist After-Sales-Service?",o:["Werbemassnahmen","Produktentwicklung","Kundendienst nach dem Kauf: Support, Wartung, Updates, Ersatzteile - wichtig fuer Kundenbindung und Weiterempfehlungen","Vorverkaufsberatung"],a:2,f:"After-Sales: Service nach Kauf. Fuer IT: Support-Hotline, Garantieabwicklung, Software-Updates, Schulungen, Wartungsvertraege. Sichert Kundenzufriedenheit und Folgegeschaefte."},
{id:100,b:"6.8",t:"Zielgruppen",q:"Was ist eine Zielgruppenanalyse?",o:["Systematische Untersuchung einer Zielgruppe: wer sind sie, was brauchen sie, wie verhalten sie sich, wie kann man sie erreichen","Konkurrenzanalyse","Produktanalyse","Marktpreisanalyse"],a:0,f:"Zielgruppenanalyse: Datenerhebung und Auswertung ueber Zielgruppe. Methoden: Kundenbefragungen, Marktforschung, Datenanalyse, Social-Media-Insights, Fokusgruppen."}
];
let st={},filt=[...Q];
function init(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});render();}
function render(){
  const c=document.getElementById("qc");c.innerHTML="";
  let lb=null;
  const bn={"6.1":"💰 6.1 Kosten","6.2":"📊 6.2 Angebotsvergleich","6.3":"⚖️ 6.3 Nutzwertanalyse","6.4":"📈 6.4 Wertschoepfung","6.5":"🏗️ 6.5 Projekte & Kalkulation","6.6":"🏪 6.6 Marktformen","6.7":"🚚 6.7 Vertriebsformen","6.8":"🎯 6.8 Zielgruppen"};
  filt.forEach(q=>{
    if(q.b!==lb){const d=document.createElement("div");d.className="bh";d.textContent=bn[q.b]||q.b;c.appendChild(d);lb=q.b;}
    c.appendChild(mk(q));
  });up();}
function mk(q){
  const s=st[q.id],d=document.createElement("div"),L=["A","B","C","D"];
  d.className="qc"+(s.done?(s.ok?" ac":" aw"):"");d.id="c"+q.id;
  d.innerHTML=`<div class="qn">FRAGE ${q.id}/100</div><div class="qt">${q.t}</div><div class="qq">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt${s.done?" dis":""}${s.done&&i===q.a?" ok":""}${s.done&&!s.ok&&i===s.ci?" ng":""}" onclick="ans(${q.id},${i})"><span class="ol">${L[i]}</span><span>${o}</span></div>`).join("")}</div>
<div class="fbb${s.done?" show "+(s.ok?"cok":"cng"):""}" id="f${q.id}">${s.done?(s.ok?"✅ ":"❌ ")+q.f:""}</div>`;
  return d;}
function ans(id,i){
  const s=st[id];if(s.done)return;
  const q=Q.find(x=>x.id===id);s.done=true;s.ok=i===q.a;s.ci=i;
  const c=document.getElementById("c"+id);c.className="qc "+(s.ok?"ac":"aw");
  c.querySelectorAll(".opt").forEach((el,j)=>{el.classList.add("dis");if(j===q.a)el.classList.add("ok");if(!s.ok&&j===i)el.classList.add("ng");});
  const f=document.getElementById("f"+id);f.textContent=(s.ok?"✅ ":"❌ ")+q.f;f.className="fbb show "+(s.ok?"cok":"cng");up();}
function up(){
  const tot=Q.length,done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  document.getElementById("sd").textContent=ok+"/"+done;
  document.getElementById("pf").style.width=(done/tot*100)+"%";
  document.getElementById("pl").textContent=done+" von "+tot+" beantwortet";}
function fil(t,btn){
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("act"));btn.classList.add("act");
  if(t==="all")filt=[...Q];
  else if(t==="open")filt=Q.filter(q=>!st[q.id].done);
  else if(t==="wrong")filt=Q.filter(q=>st[q.id].done&&!st[q.id].ok);
  else filt=Q.filter(q=>q.b===t);render();}
function shuf(){filt=[...filt].sort(()=>Math.random()-.5);render();}
function rst(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});filt=[...Q];document.querySelectorAll(".fb").forEach((b,i)=>b.classList.toggle("act",i===0));render();document.getElementById("ov").classList.remove("show");}
function showR(){
  const done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  const pct=done>0?Math.round(ok/done*100):0;
  let e="😅",m="Weiter ueben!";
  if(pct>=90){e="🏆";m="Ausgezeichnet!";}else if(pct>=75){e="🎉";m="Sehr gut!";}else if(pct>=60){e="📚";m="Gut - weiter so!";}
  document.getElementById("oe").textContent=e;document.getElementById("os").textContent=ok+"/"+done;
  document.getElementById("om").textContent=pct+"% richtig - "+m;
  document.getElementById("ov").classList.add("show");}
function closeR(){document.getElementById("ov").classList.remove("show");}
init();
</script></body></html>
