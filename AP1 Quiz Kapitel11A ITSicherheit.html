const BN={"11.1":"🔐 CIA-Triade","11.2":"🛡️ Massnahmen","11.3":"👮 ITSB","11.4":"🔒 DSB","11.5":"📜 Richtlinien","11.6":"👥 Personell","11.7":"🏛️ BSI Grundschutz","11.8":"⚖️ DSGVO/BDSG","11.9":"👤 Pers.Daten","11.10":"✊ Betroffenenrechte","11.11":"🔭 Anonymisierung","11.12":"🏷️ Pseudonymisierung","11.13":"📊 Schutzbedarf"};
const Q=[
{id:1,b:"11.1",t:"CIA-Triade",q:"Was sind die drei Schutzziele der IT-Sicherheit (CIA-Triade)?",o:["Vertraulichkeit, Integritaet, Verfuegbarkeit","Kontrolle, Identitaet, Autorisierung","Compliance, Integration, Auditierung","Confidentiality, Inspection, Availability"],a:0,f:"CIA: Confidentiality (Vertraulichkeit), Integrity (Integritaet), Availability (Verfuegbarkeit). Grundlage jedes IT-Sicherheitskonzepts."},
{id:2,b:"11.1",t:"CIA-Triade",q:"Was bedeutet Vertraulichkeit?",o:["Daten koennen nicht veraendert werden","Nur autorisierte Personen duerfen auf Daten zugreifen","Daten sind korrekt","Daten sind immer verfuegbar"],a:1,f:"Vertraulichkeit: Zugriff nur fuer Berechtigte. Massnahmen: Verschluesselung (TLS, AES), Zugriffskontrollen (RBAC), 2FA, Datensparsamkeit."},
{id:3,b:"11.1",t:"CIA-Triade",q:"Was bedeutet Integritaet?",o:["Daten sind verschluesselt","Daten sind geheim","Daten duerfen nicht unbemerkt veraendert werden - Korrektheit und Vollstaendigkeit sicherstellen","Daten sind verfuegbar"],a:2,f:"Integritaet: Daten unveraendert. Massnahmen: Hashing (SHA-256), digitale Signaturen, Pruefsummen, Zugriffskontrollen, Aenderungsprotokolle, WORM-Speicher."},
{id:4,b:"11.1",t:"CIA-Triade",q:"Was bedeutet Verfuegbarkeit?",o:["Daten sind korrekt","Zugriff ist eingeschraenkt","Daten sind geheim","Daten und Systeme muessen fuer Berechtigte jederzeit zugreifbar sein"],a:3,f:"Verfuegbarkeit: Systeme erreichbar wenn benoetigt. Massnahmen: Redundanz (Cluster, RAID), Backups, DDoS-Schutz, Notfallplaene, regelmaessige Wartung."},
{id:5,b:"11.1",t:"CIA-Triade",q:"Was ist ein Beispiel fuer eine Verletzung der Vertraulichkeit?",o:["Festplattendefekt","Serverausfall","Datendiebstahl: Unbefugter liest oder kopiert Kundendaten","Netzwerkausfall"],a:2,f:"Vertraulichkeitsverletzung: Datenpanne, Hacker liest Kundendaten, unverschluesseltes WLAN abgehoert. Konsequenz: DSGVO-Meldepflicht, Bussgelder."},
{id:6,b:"11.1",t:"CIA-Triade",q:"Was ist ein Beispiel fuer eine Verletzung der Integritaet?",o:["Ransomware veraendert Daten, Man-in-the-Middle-Angriff aendert Datenuebertragung","Server nicht erreichbar","WLAN-Ausfall","Passwort vergessen"],a:0,f:"Integritaetsverletzung: Ransomware, SQL-Injection aendert Datenbank, manipulierter Software-Update, MITM aendert Transaktionsdaten."},
{id:7,b:"11.1",t:"CIA-Triade",q:"Was ist ein Beispiel fuer eine Verletzung der Verfuegbarkeit?",o:["Datenleck","Datenpanne","DDoS-Angriff, Ransomware verschluesselt alle Daten, Serverausfall ohne Redundanz","Datenfaelschung"],a:2,f:"Verfuegbarkeitsverletzung: DDoS, Ransomware, Hardwareausfall ohne Failover, Naturkatastrophe ohne DR-Plan."},
{id:8,b:"11.1",t:"CIA-Triade",q:"Welche Massnahme schuetzt primaer die Vertraulichkeit?",o:["Verschluesselung (TLS, AES) verhindert dass Unbefugte Daten lesen koennen","Loadbalancer","RAID","Backup"],a:0,f:"Verschluesselung schuetzt Vertraulichkeit: selbst abgefangene Daten sind ohne Schluessel unlesbar. TLS fuer Transport, AES fuer Speicherung."},
{id:9,b:"11.1",t:"CIA-Triade",q:"Welche Massnahme schuetzt primaer die Integritaet?",o:["Hashing (SHA-256): Pruefsumme sichert ob Daten unveraendert sind","Firewall","VPN","Backup"],a:0,f:"Hash: SHA-256 erzeugt eindeutigen Fingerabdruck. Jede Aenderung = anderer Hash. Manipulation erkennbar. Digitale Signaturen kombinieren Hashing mit asymmetrischer Verschluesselung."},
{id:10,b:"11.1",t:"CIA-Triade",q:"Welche Massnahme schuetzt primaer die Verfuegbarkeit?",o:["Redundanz und Backups: RAID, Cluster, Backup-Systeme","Hashing","Verschluesselung","Zugangskontrolle"],a:0,f:"Redundanz: RAID 1 (Spiegelfestplatte), Cluster (Server uebernimmt), USV (Stromausfall), georedundante RZs, regelmaessige getestete Backups."},
{id:11,b:"11.1",t:"CIA-Triade",q:"Was ist Authentizitaet als erweitertes Schutzziel?",o:["Verfuegbarkeit","Vertraulichkeit","Integritaet","Sicherstellung dass eine Identitaet wirklich die ist die sie vorgibt zu sein - verhindert Spoofing"],a:3,f:"Authentizitaet: Echtheit und Glaubwuerdigkeit. Digitale Signaturen, Zertifikate (PKI), 2FA. Neben CIA oft als viertes Schutzziel."},
{id:12,b:"11.1",t:"CIA-Triade",q:"Was ist Non-Repudiation (Nicht-Abstreitbarkeit)?",o:["Senderschaft kann nicht abgestritten werden - digitale Signaturen beweisen wer eine Transaktion erstellt hat","Datenschutz","Verschluesselung","Datenpflicht"],a:0,f:"Non-Repudiation: Absender kann nicht bestreiten dass er gesendet hat. Wichtig bei rechtlich verbindlichen elektronischen Dokumenten."},
{id:13,b:"11.1",t:"CIA-Triade",q:"Was ist der Zusammenhang zwischen CIA und DSGVO?",o:["CIA ersetzt DSGVO","DSGVO ersetzt CIA","Kein Zusammenhang","DSGVO fordert TOM zum Schutz personenbezogener Daten - entspricht CIA-Prinzipien (Art. 32 DSGVO)"],a:3,f:"DSGVO Art. 32 fordert TOM: Verschluesselung (Vertraulichkeit), Integritaet, Verfuegbarkeit. CIA-Schutzziele sind Basis fuer DSGVO-Konformitaet."},
{id:14,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was sind technische IT-Sicherheitsmassnahmen?",o:["Hard- und Softwareloesungen: Firewalls, IDS/IPS, Verschluesselung, 2FA, Antivirus, VPN","Vertraulichkeitsvereinbarungen","Schulungen","Richtlinien"],a:0,f:"Technische Massnahmen: Firewalls, IDS/IPS, Verschluesselung, 2FA, Antivirus, VPN, RBAC, Patch-Management, Backupsysteme."},
{id:15,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was sind organisatorische Massnahmen?",o:["Hardware","Schulungen allein","Technische Systeme","Regeln und Prozesse: Sicherheitsrichtlinien, Zugriffskonzepte, Notfallplaene, Incident Response, ISMS"],a:3,f:"Organisatorische Massnahmen: Sicherheitsrichtlinien, Rollen- und Rechtekonzepte, Notfallmanagement, Change Management, Incident Response, ISMS nach ISO 27001."},
{id:16,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was sind personelle Massnahmen?",o:["Firewalls","Technische Systeme","Mitarbeiter als Sicherheitsfaktor: Schulungen, Awareness-Training, Phishing-Tests, Verhaltensrichtlinien, NDAs","Backups"],a:2,f:"Personelle Massnahmen: regelmaessige Schulungen, Phishing-Tests, Verhaltensrichtlinien, NDAs, Sicherheitskultur foerdern."},
{id:17,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was ist das Least Privilege Principle?",o:["Guenstigstes System","Mitarbeiter erhalten nur minimal notwendige Berechtigungen - reduziert Schadensausmass bei Kompromittierung","Keine Berechtigungen","Mindest-Sicherheit"],a:1,f:"Least Privilege: minimale Rechte. Admin-Accounts nicht fuer taegliche Arbeit. Kompromittiertes Konto kann nur begrenzt Schaden anrichten."},
{id:18,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was ist RBAC?",o:["Ressourcenbasierte Kontrolle","Role-Based Access Control: Berechtigungen werden Rollen zugewiesen, Nutzer bekommen Rollen","Regelbasierte Kontrolle","Randomisierte Zugriffskontrolle"],a:1,f:"RBAC: Rolle Buchhalter hat Zugriff auf Buchhaltungssysteme. Neue Mitarbeiter: Rolle zuweisen. Skalierbar und uebersichtlich."},
{id:19,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was ist eine Firewall?",o:["Antivirenprogramm","VPN-Dienst","Verschluesselung","Netzwerksicherheitssystem das Datenverkehr nach Regeln filtert und unerlaubte Verbindungen blockiert"],a:3,f:"Firewall: filtert nach Regeln (IP, Port, Protokoll). Packet Filter (Layer 3/4), Stateful Inspection, WAF (Webanwendungen). Verhindert unbefugten Zugriff."},
{id:20,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was ist IDS vs IPS?",o:["IDS: erkennt Angriffe und meldet. IPS: erkennt UND blockiert automatisch","IDS ist moderner","Identisch","IPS ist passiv"],a:0,f:"IDS: passiv, erkennt und meldet (Alarm). IPS: aktiv, erkennt und blockiert. Beide analysieren Netzwerkverkehr auf Anomalien und bekannte Angriffsmuster."},
{id:21,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was ist Zwei-Faktor-Authentifizierung (2FA)?",o:["Doppeltes Passwort","Zwei Konten","Identitaetsnachweis durch zwei Faktoren: Wissen (Passwort) + Besitz (Token) oder Biometrie","Zwei Passwoerter"],a:2,f:"2FA: Wissen + Besitz oder Biometrie. Selbst wenn Passwort gestohlen: ohne 2. Faktor kein Zugriff. Wesentliche Erhoehung der Kontosicherheit."},
{id:22,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was ist ein VPN?",o:["Firewall","Antivirusprogramm","Ein Protokoll","Virtual Private Network: verschluesselter Tunnel durch oeffentliches Netz - sichert Remote-Zugriff"],a:3,f:"VPN: verschluesselter Tunnel. Daten fuer Dritte unlesbar. Anwendung: Homeoffice, oeffentliches WLAN absichern, Standortvernetzung."},
{id:23,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was ist die 3-2-1-Backup-Regel?",o:["3 Kopien, auf 2 verschiedenen Medientypen, 1 Kopie ausser Haus","3 Backups taeglich","Woechentliches Backup","Drei Backups auf einem Medium"],a:0,f:"3-2-1: 3 Kopien (Original + 2 Backups), 2 Medientypen (HDD + Cloud), 1 Offsite. Schuetzt vor Katastrophen, Hardwareausfall, Ransomware."},
{id:24,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was ist Social Engineering?",o:["Netzwerkangriff","Manipulation von Menschen um vertrauliche Informationen zu erhalten - umgeht technische Sicherheit","Technischer Angriff","Soziales Netzwerk"],a:1,f:"Social Engineering: Phishing (E-Mails), Pretexting (falsche Identitaet), Vishing (Telefon), Baiting (USB-Stick). Menschen sind die schwaechste Sicherheitskomponente."},
{id:25,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was ist ein ISMS?",o:["Internetsicherheitssystem","Firewall","Antivirenprogramm","Information Security Management System: systematischer Ansatz fuer Informationssicherheit nach ISO 27001"],a:3,f:"ISMS: Richtlinien, Prozesse, Massnahmen fuer Informationssicherheit. Risikobasiert: Risiken identifizieren, bewerten, behandeln. Zertifizierbar nach ISO 27001."},
{id:26,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was ist Patch-Management?",o:["Backup-Strategie","Systematisches Einspielen von Sicherheitspatches um bekannte Schwachstellen zu schliessen","Update-Verwaltung","Software-Entwicklung"],a:1,f:"Patch-Management: kritische Patches schnellstmoeglich einspielen (24-72h). Testen vor Rollout. Automatisierung (WSUS, Ansible). Schliesst bekannte Angriffsvektoren."},
{id:27,b:"11.2",t:"IT-Sicherheitsmassnahmen",q:"Was ist Datensparsamkeit?",o:["Weniger Daten kaufen","DSGVO-Prinzip: nur fuer den Zweck notwendige personenbezogene Daten erheben","Datensicherung","Datenkompression"],a:1,f:"Datensparsamkeit (DSGVO Art. 5): nur notwendige Daten erheben. Nicht auf Vorrat sammeln. Reduziert Sicherheitsrisiko und Compliance-Aufwand."},
{id:28,b:"11.3",t:"IT-Sicherheitsbeauftragter",q:"Was ist die Aufgabe des ITSB?",o:["Netzwerkbetrieb","Planung, Umsetzung und Ueberwachung der IT-Sicherheitsmassnahmen - Richtlinien, Risikoanalysen, Schulungen, Incident Response","Datenbankadministration","Firewall konfigurieren"],a:1,f:"ITSB: Sicherheitsrichtlinien entwickeln, IT-Standards ueberwachen (ISO 27001, BSI), Risikoanalysen, Mitarbeiter schulen, Sicherheitsvorfaelle koordinieren."},
{id:29,b:"11.3",t:"IT-Sicherheitsbeauftragter",q:"Ist ein ITSB gesetzlich vorgeschrieben?",o:["Nur Grossunternehmen","Nicht grundsaetzlich - empfohlen nach IT-SiG; in KRITIS kann er erforderlich sein","Ja, immer","Nur Behoerden"],a:1,f:"ITSB: kein allgemeiner Pflichtposten. Aber IT-SiG und KRITIS-Regulierung koennen ihn erfordern. DSGVO fordert angemessene Massnahmen die der ITSB koordiniert."},
{id:30,b:"11.3",t:"IT-Sicherheitsbeauftragter",q:"Was ist KRITIS?",o:["Eine ISO-Norm","Kritische Software","Kritische Infrastrukturen: Energie, Wasser, Transport, Gesundheit, Finanzen - Ausfaelle haetten erhebliche gesellschaftliche Folgen","Ein Sicherheitsstandard"],a:2,f:"KRITIS: Sektoren die bei Ausfall oeffentliche Versorgung gefaehrden. IT-SiG 2.0: Mindest-Sicherheitsstandards, Meldepflichten, BSI-Anforderungen."},
{id:31,b:"11.4",t:"Datenschutzbeauftragter",q:"Was ist die Aufgabe des DSB?",o:["Ueberwachung der DSGVO/BDSG-Einhaltung: Beratung, Datenschutzrichtlinien, DPIA, Schulungen, Aufsichtsbehoerde","IT-Sicherheit allgemein","Datenbankadministration","Daten sichern"],a:0,f:"DSB: DSGVO-Einhaltung, Geschaeftsfuehrung beraten, Datenschutzrichtlinien erstellen, Datenschutz-Folgenabschaetzungen (DPIA), Mitarbeiter schulen."},
{id:32,b:"11.4",t:"Datenschutzbeauftragter",q:"Wann ist ein DSB pflichtmaessig?",o:["Nur freiwillig","Immer","Ab 20 Personen mit automatisierter Verarbeitung personenbezogener Daten, bei sensitiven Daten oder als Behoerde (§38 BDSG)","Ab 50 Mitarbeitern"],a:2,f:"DSB Pflicht §38 BDSG: mind. 20 Personen mit automatisierter Datenverarbeitung, Kerntaetigkeit umfangreiche sensible Daten, oder oeffentliche Stelle."},
{id:33,b:"11.4",t:"Datenschutzbeauftragter",q:"Was sind Anforderungen an einen DSB?",o:["Fachkunde Datenschutzrecht und IT-Sicherheit, Unabhaengigkeit, Weisungsfreiheit, keine Interessenkonflikte","Nur Kommunikation","Nur Rechtskenntnisse","Nur IT-Kenntnisse"],a:0,f:"DSB: Datenschutzrecht (DSGVO, BDSG), IT-Sicherheitskenntnis, Unabhaengigkeit, Weisungsfreiheit, kein Interessenkonflikt (z.B. nicht gleichzeitig IT-Leiter)."},
{id:34,b:"11.4",t:"Datenschutzbeauftragter",q:"Was ist der Unterschied ITSB und DSB?",o:["DSB ersetzt ITSB","ITSB: IT-Sicherheit allgemein (CIA). DSB: Datenschutz nach DSGVO/BDSG (personenbezogene Daten). Enge Zusammenarbeit","Identisch","ITSB ist wichtiger"],a:1,f:"ITSB: technische und organisatorische IT-Sicherheit. DSB: Rechtskonformitaet bei personenbezogenen Daten. Verschiedene Rollen, enge Zusammenarbeit bei TOM und Datenpannen."},
{id:35,b:"11.5",t:"IT-Sicherheitsrichtlinien",q:"Was sind IT-Sicherheitsrichtlinien?",o:["Verbindliche Vorgaben zur Gewaehrleistung von CIA: Regeln zum Schutz vor Angriffen, Datenverlust und unbefugtem Zugriff","Gesetze","Technische Standards","Empfehlungen"],a:0,f:"IT-Sicherheitsrichtlinien: verbindlich fuer alle. Inhalte: Passwortregeln, Datenschutz, Netzwerksicherheit, Endgeraete, Incident-Meldewege, Homeoffice."},
{id:36,b:"11.5",t:"IT-Sicherheitsrichtlinien",q:"Was ist Datenklassifizierung?",o:["Dateinamensgebung","Datenkategorisierung in DB","Einteilung von Daten nach Schutzbedarf: oeffentlich, intern, vertraulich, streng vertraulich","Datensortierung"],a:2,f:"Datenklassifizierung: oeffentlich (Webseite), intern (Betriebsanweisungen), vertraulich (Kundendaten), streng vertraulich (Gehaelter, Patente). Je hoeher Klasse, desto mehr Schutz."},
{id:37,b:"11.5",t:"IT-Sicherheitsrichtlinien",q:"Was sind BYOD-Richtlinien?",o:["Buchhaltergeraete","Beste Datenverwaltung","Buy Your Own Device","Bring Your Own Device: Regeln fuer private Geraete die dienstlich genutzt werden - MDM, Verschluesselung, Datentrennung"],a:3,f:"BYOD: private Geraete fuer Arbeit. Risiken: Malware, Datenverlust bei Verlust. Massnahmen: MDM, Container-Loesungen, Verschluesselung, klare Richtlinien."},
{id:38,b:"11.5",t:"IT-Sicherheitsrichtlinien",q:"Was ist eine Clean-Desk-Policy?",o:["Reinigungsplan","Putzplan","Richtlinie dass Arbeitsplaetze bei Abwesenheit geraeumt werden: keine vertraulichen Dokumente sichtbar, Computer gesperrt","Schreibtischordnung"],a:2,f:"Clean-Desk: keine vertraulichen Unterlagen sichtbar lassen, Computer sperren. Verhindert: Schulter-Surfing, Dokumentendiebstahl, unbeaufsichtigter PC-Zugriff."},
{id:39,b:"11.6",t:"Personelle Massnahmen",q:"Was ist Security Awareness?",o:["Pflichtschulung","Sensibilisierung aller Mitarbeiter fuer IT-Risiken: Phishing erkennen, richtiger Umgang mit Daten, Vorfaelle melden","IT-Wissen fuer Experten","Nur technisches Wissen"],a:1,f:"Security Awareness: menschliches Fehlverhalten ist haeufigste Ursache. Schulungen, Phishing-Simulationen, E-Learning. Ziel: Mitarbeiter als menschliche Firewall."},
{id:40,b:"11.6",t:"Personelle Massnahmen",q:"Was sind Phishing-Tests?",o:["Virentests","Simulierte Phishing-Angriffe durch eigenes Unternehmen zur Messung der Mitarbeitersensibilitaet","Echte Angriffe","Passwortkontrollen"],a:1,f:"Phishing-Simulation: eigenes Team sendet gefaelschte Mail. Wer klickt -> bekommt sofort Schulung. Misst Awareness, identifiziert Schulungsbedarf. Kein Strafsystem."},
{id:41,b:"11.6",t:"Personelle Massnahmen",q:"Was sind Verhaltensrichtlinien fuer Mitarbeiter?",o:["Benimmregeln","Kleiderordnung","Regeln fuer sicheres IT-Verhalten: Passwoerter, E-Mail-Umgang, externe Geraete, Homeoffice-Sicherheit","Anwesenheitsregeln"],a:2,f:"Verhaltensrichtlinien: starke Passwoerter nutzen, keine Zugangsdaten weitergeben, Links pruefen, keine fremden USB-Sticks, VPN im Homeoffice, verdaechtige Mails melden."},
{id:42,b:"11.6",t:"Personelle Massnahmen",q:"Was ist ein NDA in der IT-Sicherheit?",o:["Non-Disclosure Agreement: Mitarbeiter/Lieferanten/Partner verpflichten sich zur Vertraulichkeit ueber sensible Informationen","Netzwerkdefinition","Neue Datenauthentifizierung","Netzwerkdesign"],a:0,f:"NDA: rechtliche Absicherung der Vertraulichkeit. Mitarbeiter bei Einstellung, Externe vor Projektzugang. Regelt welche Infos vertraulich sind und Konsequenzen."},
{id:43,b:"11.7",t:"BSI Grundschutz",q:"Was ist das BSI IT-Grundschutz-Kompendium?",o:["Standardwerk des BSI: Bausteine und Massnahmen fuer IT-Sicherheit in Unternehmen und Behoerden","Ein Zertifizierungsstandard","Eine ISO-Norm","Ein Gesetz"],a:0,f:"BSI IT-Grundschutz: Kompendium des Bundesamts fuer Sicherheit in der Informationstechnik. Bausteine fuer IT-Sicherheitsmassnahmen. Basis fuer ISO 27001-Implementierung in Deutschland."},
{id:44,b:"11.7",t:"BSI Grundschutz",q:"Was sind die 5 Schichten des BSI IT-Grundschutz-Schichtenmodells?",o:["Planung, Umsetzung, Pruefung, Verbesserung, Betrieb","ORP, INF, NET, SYS, APP - uebergreifende Aspekte, Infrastruktur, Netze, IT-Systeme, Anwendungen","Netzwerk, Hardware, Software, Daten, Nutzer","Vertraulichkeit, Integritaet, Verfuegbarkeit, Authentizitaet, Non-Repudiation"],a:1,f:"BSI-Schichten: ORP (Organisation/Personal), INF (Infrastruktur), NET (Netzwerke), SYS (IT-Systeme), APP (Anwendungen). Jede Schicht hat spezifische Sicherheitsbausteine."},
{id:45,b:"11.7",t:"BSI Grundschutz",q:"Was ist ORP im BSI Grundschutz?",o:["Online-Regelwerk Protokoll","Organisation und Personal: Bausteine fuer Sicherheitsrichtlinien, Schulungen, Notfallmanagement, Sicherheitsorganisation","Online-Ressourcenschutz","Offene Ressourcenplanung"],a:1,f:"ORP (Organisation und Personal): Sicherheitsrichtlinien, Schulungen und Sensibilisierung, Notfallmanagement, Sicherheitsorganisation. Uebergreifende organisatorische Massnahmen."},
{id:46,b:"11.7",t:"BSI Grundschutz",q:"Was ist INF im BSI Grundschutz?",o:["Infrastruktur: Bausteine fuer physische Sicherheit von Raeumen, Gebaeuden, Rechenzentren, Verkabelung","Interne Netzwerke","Intelligente Firewalls","Informationsschutz"],a:0,f:"INF (Infrastruktur): Rechenzentren (Klimatisierung, Brandschutz, Zutrittskontrolle), Serverschraenke, Verkabelung, Buerogebaeude. Physische Sicherheitsmassnahmen."},
{id:47,b:"11.7",t:"BSI Grundschutz",q:"Was ist NET im BSI Grundschutz?",o:["Notfallplaene","Neue Technologien","Netzwerktest","Netzwerke: Bausteine fuer Firewall, VPN, WLAN-Sicherheit, Netzwerkarchitektur, Fernzugriff"],a:3,f:"NET (Netzwerke): Firewall-Konfiguration, VPN, WLAN-Sicherheit, Netzwerksegmentierung (DMZ), sichere Fernzugriffsloesungen, Schutz vor Netzwerkangriffen."},
{id:48,b:"11.7",t:"BSI Grundschutz",q:"Was ist SYS im BSI Grundschutz?",o:["Systemadministration allgemein","Systemkauf","IT-Systeme: Bausteine fuer Server, Clients, mobile Geraete, Drucker, Virtualisierung - jeweils spezifische Sicherheitsmassnahmen","Systemplanung"],a:2,f:"SYS (IT-Systeme): Sicherheitsmassnahmen fuer Server (Haertung, Patches), Clients (Antivirus, Verschluesselung), mobile Geraete (MDM), Drucker, Virtualisierungsplattformen."},
{id:49,b:"11.7",t:"BSI Grundschutz",q:"Was ist APP im BSI Grundschutz?",o:["Applikationsentwicklung allgemein","Application Programming","App-Store","Anwendungen: Bausteine fuer Webanwendungen, Datenbanken, E-Mail, Cloud-Dienste - anwendungsspezifische Sicherheit"],a:3,f:"APP (Anwendungen): Webanwendungssicherheit (OWASP), Datenbankabsicherung, E-Mail-Sicherheit (SPF, DKIM), Cloud-Dienste, Office-Produkte. Anwendungsebene absichern."},
{id:50,b:"11.7",t:"BSI Grundschutz",q:"Was ist der Unterschied BSI Grundschutz vs ISO 27001?",o:["ISO 27001 ist deutschspezifisch","Identisch","BSI ist strenger","BSI: detaillierte deutsche Bausteine (Kochbuch). ISO 27001: internationale Norm fuer ISMS (Was, nicht Wie). BSI kann Basis fuer ISO 27001 sein"],a:3,f:"BSI Grundschutz: sehr detailliert, deutsche Bausteine, Kochbuchcharakter. ISO 27001: internationale Norm, prinzipienbasiert (definiert WAS noetig ist). BSI-Zertifizierung und ISO 27001 ergaenzen sich."},
{id:51,b:"11.8",t:"DSGVO/BDSG",q:"Was regelt die DSGVO?",o:["Schutz personenbezogener Daten in der EU - Rechte der Betroffenen, Pflichten der Verantwortlichen, Sanktionen bei Verstoessen","IT-Sicherheit allgemein","Cybersicherheit allgemein","Urheberrecht"],a:0,f:"DSGVO: EU-weit gueltig seit Mai 2018. Regelt Erhebung, Verarbeitung, Speicherung personenbezogener Daten. Bussgelder bis 4% des globalen Jahresumsatzes oder 20 Mio. EUR."},
{id:52,b:"11.8",t:"DSGVO/BDSG",q:"Was regelt das BDSG?",o:["Bundesdatenschutzgesetz: ergaenzt DSGVO mit nationalen deutschen Regelungen (§38 DSB-Pflicht, §22 sensible Daten, §26 Beschaeftigtendatenschutz)","Bundessicherheitsgesetz","Bundesdigitalgesetz","Bundesbankdaten"],a:0,f:"BDSG: nationales deutsches Datenschutzgesetz das die DSGVO ergaenzt. §38: DSB-Pflicht, §22: sensible Daten, §26: Beschaeftigtendatenschutz, §4: Videooverwachung."},
{id:53,b:"11.8",t:"DSGVO/BDSG",q:"Was sind Prinzipien der DSGVO (Art. 5)?",o:["Nur Vertraulichkeit","Sicherheit, Transparenz, Kontrolle","Rechtmaessigkeit, Zweckbindung, Datensparsamkeit, Richtigkeit, Speicherbegrenzung, Integritaet/Vertraulichkeit, Rechenschaftspflicht","Einwilligung, Vertragserfuellung, Interessen"],a:2,f:"DSGVO Art. 5 Grundsaetze: Rechtmaessigkeit (Rechtsgrundlage), Zweckbindung (nur fuer definierten Zweck), Datensparsamkeit, Richtigkeit, Speicherbegrenzung, Integritaet/Vertraulichkeit, Rechenschaftspflicht."},
{id:54,b:"11.8",t:"DSGVO/BDSG",q:"Was sind Rechtsgrundlagen fuer die Datenverarbeitung nach DSGVO?",o:["Art. 6 DSGVO: Einwilligung, Vertragserfuellung, rechtliche Verpflichtung, lebenswichtige Interessen, oeffentliche Aufgabe, berechtigte Interessen","Nur Einwilligung","Nur Gesetz","Nur Vertrag"],a:0,f:"Rechtsgrundlagen Art. 6 DSGVO: a) Einwilligung, b) Vertragserfuellung, c) Rechtliche Verpflichtung, d) Lebenswichtige Interessen, e) Oeffentliche Aufgabe, f) Berechtigte Interessen. Ohne Rechtsgrundlage: unzulaessig."},
{id:55,b:"11.8",t:"DSGVO/BDSG",q:"Was sind technisch-organisatorische Massnahmen (TOM) nach DSGVO?",o:["Nur fuer IT-Abteilung","Nur technische Sicherheit","Massnahmen zur Sicherheit der Datenverarbeitung (Art. 32): Verschluesselung, Pseudonymisierung, Vertraulichkeit, Integritaet, Verfuegbarkeit, Belastbarkeit, Wiederherstellung","Nur organisatorisch"],a:2,f:"TOM Art. 32: Verschluesselung und Pseudonymisierung, Vertraulichkeit/Integritaet/Verfuegbarkeit/Belastbarkeit der Systeme, schnelle Wiederherstellung nach Vorfall, regelmaessige Ueberpruefung."},
{id:56,b:"11.8",t:"DSGVO/BDSG",q:"Was ist Meldepflicht bei Datenpannen (Art. 33 DSGVO)?",o:["Keine Pflicht","Nur bei grossen Pannen","Datenpannen muessen innerhalb 72 Stunden an die Aufsichtsbehoerde gemeldet werden wenn Rechte und Freiheiten der Betroffenen gefaehrdet","Nur innerhalb eines Monats"],a:2,f:"Art. 33 DSGVO: Meldung an Aufsichtsbehoerde (z.B. LDA Bayern) innerhalb 72 Stunden wenn Datenpanne Risiko fuer Betroffene birgt. Art. 34: Benachrichtigung Betroffener bei hohem Risiko."},
{id:57,b:"11.8",t:"DSGVO/BDSG",q:"Was ist eine Datenschutz-Folgenabschaetzung (DPIA)?",o:["Kundenbefragung","Art. 35 DSGVO: systematische Bewertung des Risikos einer Datenverarbeitung bevor sie beginnt - bei hohem Risiko fuer Betroffene Pflicht","Ein Datenschutzaudit","Jaehrliche Pruefung"],a:1,f:"DPIA: bei Verarbeitungen mit hohem Risiko (Videooverwachung, Profiling, sensible Daten). Beschreibt Verarbeitung, bewertet Risiken, definiert Massnahmen. Dokumentation Pflicht."},
{id:58,b:"11.8",t:"DSGVO/BDSG",q:"Was ist ein Verzeichnis von Verarbeitungstaetigkeiten (Art. 30 DSGVO)?",o:["Produktkatalog","Kundendatenbank","Dokumentation aller Datenverarbeitungen im Unternehmen: Zweck, Kategorien, Empfaenger, Loeschfristen, TOM - Pflicht fuer die meisten Unternehmen","Datenliste"],a:2,f:"Verarbeitungsverzeichnis: jede Datenverarbeitung dokumentieren (Name, Zweck, Kategorien, Empfaenger, Drittlaender, Fristen, TOM). Pflicht fuer Unternehmen mit mehr als 250 Mitarbeitern oder bestimmten Verarbeitungen."},
{id:59,b:"11.8",t:"DSGVO/BDSG",q:"Was ist ein Auftragsverarbeitungsvertrag (AVV)?",o:["Kaufvertrag","Mietvertrag","Art. 28 DSGVO: Pflichtvertrag wenn externer Dienstleister personenbezogene Daten im Auftrag verarbeitet (z.B. Cloud-Anbieter, IT-Dienstleister)","Lieferantenvertrag"],a:2,f:"AVV (Auftragsverarbeitungsvertrag): Cloud-Anbieter, IT-Outsourcing, Steuerberater verarbeiten Ihre Kundendaten? AVV Pflicht. Regelt: Zweck, Massnahmen, Unterauftragnehmer, Kontrollen, Loeschung."},
{id:60,b:"11.8",t:"DSGVO/BDSG",q:"Was sind die Sanktionen bei DSGVO-Verstoessen?",o:["Bussgelder bis 20 Mio. EUR oder 4% des globalen Jahresumsatzes (je nachdem was hoeher), Abmahnungen, Schadensersatzansprueche","Keine Sanktionen","Nur Abmahnungen","Nur Verwarnungen"],a:0,f:"DSGVO-Bussgelder: bis 20 Mio. EUR oder 4% des weltweiten Jahresumsatzes fuer schwere Verstoesse (Art. 83 Abs. 5). Bis 10 Mio. EUR oder 2% fuer leichtere Verstoesse. Zusaetzlich Schadensersatz."},
{id:61,b:"11.9",t:"Personenbezogene Daten",q:"Was sind personenbezogene Daten (Art. 4 DSGVO)?",o:["Nur digitale Daten","Nur Namen und Adressen","Alle Informationen die sich auf eine identifizierte oder identifizierbare natuerliche Person beziehen","Nur biometrische Daten"],a:2,f:"Personenbezogene Daten: Name, Adresse, Telefon, E-Mail, IP-Adresse, Cookie-IDs, Standortdaten, Kundennummern. Alles womit eine Person identifiziert werden kann."},
{id:62,b:"11.9",t:"Personenbezogene Daten",q:"Was sind besondere Kategorien personenbezogener Daten (Art. 9 DSGVO)?",o:["Sensible Daten die besonderen Schutz benoetigen: Gesundheitsdaten, biometrische Daten, Rasse/Ethnizitaet, politische Meinungen, religioese Ueberzeugungen, Gewerkschaftszugehoerigkeit","Alle personenbezogenen Daten","Nur biometrische Daten","Nur Gesundheitsdaten"],a:0,f:"Art. 9 DSGVO: Gesundheitsdaten, biometrische Daten (Fingerabdruck, Gesichtserkennung), Rassische/ethnische Herkunft, politische Meinungen, religioese Ueberzeugungen, Gewerkschaft, Sexualleben. Verstaerkter Schutz."},
{id:63,b:"11.9",t:"Personenbezogene Daten",q:"Was ist direkte vs indirekte Identifikation?",o:["Direkt ist sicherer","Direkt: Person eindeutig durch Datenwert identifizierbar (Name, Personalausweisnummer). Indirekt: Kombination von Daten ermoeglicht Identifikation (Alter+PLZ+Beruf)","Kein Unterschied","Indirekt ist nicht personenbezogen"],a:1,f:"Direkte Identifikation: Name, Personalausweisnummer. Indirekte Identifikation: Geburtsort + Beruf + PLZ zusammen koennen Person eindeutig machen. Beide sind personenbezogene Daten."},
{id:64,b:"11.9",t:"Personenbezogene Daten",q:"Warum sind IP-Adressen personenbezogene Daten?",o:["Sind keine personenbezogenen Daten","Nur bei statischen IPs","Weil der Internetanbieter die IP-Adresse einem Anschluss zuordnen kann - Identifikation ist moeglich (EuGH-Rechtsprechung)","Nur bei privaten IPs"],a:2,f:"IP-Adressen: EuGH 2016: auch dynamische IPs sind personenbezogen wenn Identifizierung durch Kombination mit anderen Daten moeglich ist (z.B. durch Auskunft beim Provider)."},
{id:65,b:"11.10",t:"Rechte der Betroffenen",q:"Was sind die Rechte der Betroffenen nach DSGVO?",o:["Nur Widerspruch","Nur Loeschungsrecht","Nur Auskunftsrecht","Information, Auskunft, Berichtigung, Loeschung, Einschraenkung, Datenuebertragbarkeit, Widerspruch, kein automatisierter Entscheid (Art. 12-22)"],a:3,f:"Betroffenenrechte: Recht auf Information (Art.13/14), Auskunft (Art.15), Berichtigung (Art.16), Loeschung (Art.17), Einschraenkung (Art.18), Datenuebertragbarkeit (Art.20), Widerspruch (Art.21), kein automatisierter Entscheid (Art.22)."},
{id:66,b:"11.10",t:"Rechte der Betroffenen",q:"Was ist das Recht auf Auskunft (Art. 15 DSGVO)?",o:["Nur Zweck","Nur Datenliste","Nur Speicherdauer","Betroffener kann Kopie seiner gespeicherten Daten fordern plus: Herkunft, Empfaenger, Speicherdauer, Zweck - innerhalb 1 Monat zu beantworten"],a:3,f:"Auskunftsrecht: Kopie der Daten + welche Daten, Zweck, Rechtsgrundlage, Empfaenger, Speicherdauer, Herkunft, Rechte. Unternehmen muss innerhalb 1 Monat antworten."},
{id:67,b:"11.10",t:"Rechte der Betroffenen",q:"Was ist das Recht auf Loeschung (Art. 17 DSGVO)?",o:["Nur auf Antrag ohne Gruende","Immer moeglich","Recht auf Vergessenwerden: Loeschung wenn Daten nicht mehr noetig, Einwilligung widerrufen, unrechtmaessige Verarbeitung - Ausnahmen: gesetzliche Aufbewahrungspflichten","Nie moeglich"],a:2,f:"Loeschungsrecht: Daten nicht mehr noetig, Einwilligung widerrufen, Widerspruch erfolgreich, unrechtmaessige Verarbeitung. Ausnahmen: gesetzliche Aufbewahrung (GoBD 6-10 Jahre, Steuerrecht 10 Jahre)."},
{id:68,b:"11.10",t:"Rechte der Betroffenen",q:"Was ist das Recht auf Datenuebertragbarkeit (Art. 20 DSGVO)?",o:["Nur bei Social Media","Nur E-Mail-Daten","Betroffener kann eigene Daten in maschinenlesbarem Format erhalten oder direkt an anderen Anbieter uebertragen lassen (Portabilitaet)","Datenkopie intern"],a:2,f:"Datenuebertragbarkeit: Daten in maschinenlesbarem Format (JSON, CSV) erhalten oder direkt zu anderem Anbieter portieren. Gilt fuer Daten die auf Einwilligung oder Vertrag basieren und automatisiert verarbeitet."},
{id:69,b:"11.10",t:"Rechte der Betroffenen",q:"Was ist das Widerspruchsrecht (Art. 21 DSGVO)?",o:["Einspruch gegen Bussgelder","Nur bei Profiling","Betroffener kann Verarbeitung jederzeit aus persoenlichen Gruenden untersagen - ausser bei zwingenden schutzwuerdigen Interessen des Verantwortlichen","Nur bei Direktwerbung"],a:2,f:"Widerspruchsrecht: Verarbeitung auf Basis berechtigter Interessen (Art. 6 lit. f) kann widersprochen werden. Direktwerbung: absolutes Widerspruchsrecht. Sonst: Abwaegung noetig."},
{id:70,b:"11.10",t:"Rechte der Betroffenen",q:"Was ist das Recht auf Einschraenkung der Verarbeitung (Art. 18)?",o:["Nur Archivierung","Daten duerfen nur noch gespeichert aber nicht mehr aktiv verarbeitet werden - z.B. waehrend Pruefung der Richtigkeit oder Widerspruch","Blockierung","Teilloeschung"],a:1,f:"Einschraenkung: Daten eingefroren. Nur Speicherung, keine Nutzung. Wenn: Richtigkeit bestritten (bis Klaerung), Verarbeitung unrechtmaessig aber Betroffener lehnt Loeschung ab, Daten fuer Rechtsdurchsetzung benoetigt."},
{id:71,b:"11.11",t:"Anonymisierung",q:"Was ist Anonymisierung?",o:["Temporaere Datenmaskierung","Irreversibles Entfernen des Personenbezugs - Daten koennen danach keiner Person mehr zugeordnet werden. DSGVO gilt dann nicht mehr","Pseudonymisierung","Verschluesselung"],a:1,f:"Anonymisierung: dauerhafter Verlust des Personenbezugs. Kein Schluessel zur Rueckfuehrung. DSGVO gilt nicht mehr. Methoden: Datenaggregation, Generalisierung, k-Anonymitaet, Rauschen."},
{id:72,b:"11.11",t:"Anonymisierung",q:"Was ist Datenaggregation als Anonymisierungsmethode?",o:["Datenkompression","Zusammenfassung von Einzelwerten zu Gruppen (z.B. Durchschnittswerte statt individueller Datenpunkte) - Identifikation einzelner Personen nicht mehr moeglich","Datenverschluesselung","Datenloeschung"],a:1,f:"Datenaggregation: statt Gehalt von 100 EUR-Schritten: Gehaltsgruppe 2000-2500 EUR. Einzelperson nicht mehr erkennbar. Haeufig in Statistiken verwendet."},
{id:73,b:"11.11",t:"Anonymisierung",q:"Was ist k-Anonymitaet?",o:["Daten werden nur veroeffentlicht wenn mindestens k Personen dieselben Merkmale teilen - jede Person versteckt sich in einer Gruppe von mindestens k Personen","k Datenkopien","k Datenpunkte loeschen","k Verschluesselungsrunden"],a:0,f:"k-Anonymitaet: k=5 bedeutet: jeder Datensatz ist mindestens 5 anderen identisch. Einzelidentifikation unmoeglich wenn k gross genug. Hoehere k = bessere Anonymitaet, aber weniger Datenutzbarkeit."},
{id:74,b:"11.11",t:"Anonymisierung",q:"Was ist Generalisierung als Anonymisierungsmethode?",o:["Datenkompression","Reduzierung der Praezision von Daten (z.B. Alter 25 -> Altersgruppe 20-30, genaue Adresse -> PLZ-Gebiet)","Verallgemeinerung von Aussagen","Datenloeschung"],a:1,f:"Generalisierung: Alter 25 -> 20-30 Jahre. Adresse Musterstrasse 5 -> PLZ 80333. Praezision nimmt ab, Anonymitaet nimmt zu. Tradeoff zwischen Datenutzbarkeit und Datenschutz."},
{id:75,b:"11.12",t:"Pseudonymisierung",q:"Was ist Pseudonymisierung?",o:["Vollstaendige Anonymisierung","Datenverschluesselung","Datenmaskierung permanent","Reversibler Ersatz des Personenbezugs durch Pseudonym (z.B. Kennzahl) - mit Schluessel wiederherstellbar. DSGVO gilt weiterhin (Art. 4 Nr. 5)"],a:3,f:"Pseudonymisierung: Name durch ID ersetzen (123 statt Mueller). Mit separatem Schluessel rueckfuehrbar. DSGVO gilt weiterhin da Identifikation theoretisch moeglich. Verbessert Datenschutz aber kein Ersatz fuer Anonymisierung."},
{id:76,b:"11.12",t:"Pseudonymisierung",q:"Was ist der Unterschied Anonymisierung vs Pseudonymisierung?",o:["Anonymisierung ist umkehrbar","Anonymisierung: irreversibel, DSGVO gilt nicht mehr. Pseudonymisierung: reversibel mit Schluessel, DSGVO gilt weiterhin","Identisch","Pseudonymisierung ist staerker"],a:1,f:"Anonymisierung: kein Schluessel, keine Rueckfuehrung, nicht DSGVO-pflichtig. Pseudonymisierung: Schluessel vorhanden, Rueckfuehrung moeglich, DSGVO gilt. Anonymisierung ist staerker fuer Datenschutz."},
{id:77,b:"11.12",t:"Pseudonymisierung",q:"Was ist Hashing als Pseudonymisierungsmethode?",o:["Tokenisierung","Verschluesselung","Umwandlung von Daten in einen Hash-Wert (z.B. SHA-256) - ohne Schluessel nicht rueckfuehrbar, aber gleiches Datum = gleicher Hash","Datenkompression"],a:2,f:"Hashing: SHA-256(mueller@test.de) = abc123... Gleiche E-Mail = immer gleicher Hash. Kein Schluessel noetig fuer Zuordnung. Achtung: Rainbow-Tabellen koennen Hashes aufloesen -> Salt hinzufuegen!"},
{id:78,b:"11.12",t:"Pseudonymisierung",q:"Was ist Tokenisierung?",o:["Anonymisierung","Datenaggregation","Ersetzen sensibler Daten durch zufaellige Token - Original und Token werden separat gespeichert (Schluessel)","Datenverschluesselung"],a:2,f:"Tokenisierung: Kreditkartennummer 4111-1111-1111-1111 -> Token 7829-3847-2938-4729. Token hat keine mathematische Beziehung zur Original. Haeufig in Zahlungssystemen (PCI-DSS)."},
{id:79,b:"11.13",t:"Schutzbedarfsanalyse",q:"Was ist eine Schutzbedarfsanalyse?",o:["Datenschutz-Folgenabschaetzung","Bewertung der Sicherheitsanforderungen von Daten, IT-Systemen und Infrastruktur um angemessene Schutzmassnahmen abzuleiten","Sicherheitsaudit","Risikoanalyse allgemein"],a:1,f:"Schutzbedarfsanalyse: welchen Schaden wuerde Verlust/Ausfall/Manipulation verursachen? Einordnung in niedrig/mittel/hoch. Daraus: erforderliche Schutzmassnahmen ableiten."},
{id:80,b:"11.13",t:"Schutzbedarfsanalyse",q:"Wie wird eine Schutzbedarfsanalyse durchgefuehrt?",o:["Einmalig nur","Nur technische Pruefung","1. Schutzobjekte identifizieren, 2. Schutzbedarf bewerten (niedrig/mittel/hoch), 3. Schutzmassnahmen ableiten, 4. Dokumentieren und regelmaessig ueberpruefen","Nur rechtliche Pruefung"],a:2,f:"Schutzbedarfsanalyse: 1. Was muss geschuetzt werden (Daten, Systeme, Raeume)? 2. Wie hoch ist Schaden bei Ausfall/Verlust/Manipulation? 3. Welche Massnahmen sind proportional? 4. Dokumentieren."},
{id:81,b:"11.13",t:"Schutzbedarfsanalyse",q:"Was sind Schutzbedarfsstufen?",o:["Sicher, Unsicher, Gefaehrdet","Gut, Besser, Beste","Kritisch, Normal, Unwichtig","Niedrig (begrenzte Auswirkung), Mittel (erhebliche Auswirkung), Hoch (schwerwiegende Auswirkung) - beeinflusst Wahl der Massnahmen"],a:3,f:"Schutzbedarfsstufen: Niedrig (Webseite mit oeffentlichen Infos), Mittel (Kundendaten), Hoch (Gesundheitsdaten, Zahlungsinformationen). Je hoeher, desto mehr Massnahmen erforderlich."},
{id:82,b:"11.13",t:"Schutzbedarfsanalyse",q:"Was wird bei der Schutzbedarfsanalyse fuer Anwendungen bewertet?",o:["Kritikalitaet der Anwendung (z.B. ERP), Anforderungen an Verfuegbarkeit/Integritaet/Vertraulichkeit, Ausfallszenarien und deren Auswirkungen","Nur Technik","Nur Kosten","Nur Benutzerfreundlichkeit"],a:0,f:"Anwendungen: Wie kritisch ist die Anwendung? Was passiert bei Ausfall (ERP-System out = kein Geschaeftsbetrieb)? Welche Daten verarbeitet sie? Welche Verfuegbarkeit wird benoetigt?"},
{id:83,b:"11.13",t:"Schutzbedarfsanalyse",q:"Was ist der Vererbungsprinzip in der Schutzbedarfsanalyse?",o:["Vererbung in OOP","Datenbankvererbung","IT-System erbt den hoechsten Schutzbedarf der darauf verarbeiteten Daten - maximumprinzip","Netzwerkvererbung"],a:2,f:"Vererbung: Datenbank verarbeitet Gesundheitsdaten (hoch) und Bestelldaten (mittel). Datenbank erbt Schutzbedarf hoch. Maximumprinzip: das System richtet sich nach dem hoechtsten Schutzbedarf."},
{id:84,b:"11.13",t:"Schutzbedarfsanalyse",q:"Wie haengen Schutzbedarfsanalyse und BSI Grundschutz zusammen?",o:["BSI ersetzt Analyse","Kein Zusammenhang","Analyse ersetzt BSI","Schutzbedarfsanalyse ist Teil der BSI Grundschutz-Methodik: Ergebnisse bestimmen welche BSI-Bausteine und -massnahmen anzuwenden sind"],a:3,f:"BSI Grundschutz-Methodik umfasst Schutzbedarfsanalyse: Schritt 1 (Strukturanalyse) -> Schritt 2 (Schutzbedarfsanalyse) -> Schritt 3 (Modellierung mit Bausteinen) -> Schritt 4 (Basis-Sicherheitscheck)."},
{id:85,b:"11.8",t:"DSGVO/BDSG",q:"Was ist Einwilligung nach Art. 7 DSGVO?",o:["Freiwillige, informierte, eindeutige Zustimmung zur Datenverarbeitung - Opt-in-Verfahren, jederzeit widerrufbar ohne Nachteile","Nur schriftlich","Jede Zustimmung","Schweigen gilt als Einwilligung"],a:0,f:"Einwilligung: freiwillig (kein Zwang), informiert (klare Erklaerung), eindeutig (aktives Opt-in, keine vorangekreuzten Felder), widerrufbar jederzeit. Vorangekreuzte Checkboxen = ungueltig."},
{id:86,b:"11.8",t:"DSGVO/BDSG",q:"Was ist Transparenz nach DSGVO?",o:["Betroffene muessen ueber Datenverarbeitung informiert werden: Zweck, Rechtsgrundlage, Empfaenger, Rechte - Datenschutzerklaerung (Art. 13/14)","Jahresberichte","Glasdach","Offene Buchfuehrung"],a:0,f:"Transparenz: Datenschutzerklaerung auf Webseite, Belehrung bei Dateneingabe. Inhalt: wer verarbeitet, was, fuer welchen Zweck, auf welcher Rechtsgrundlage, wie lange, welche Rechte hat Betroffener."},
{id:87,b:"11.9",t:"Personenbezogene Daten",q:"Was ist Zweckbindung in der DSGVO?",o:["Daten duerfen nur fuer den bei der Erhebung angegebenen Zweck verwendet werden - neue Zwecke erfordern neue Rechtsgrundlage","Mehrere Zwecke erlaubt","Zweck muss nicht angegeben werden","Nur fuer einen Zweck"],a:0,f:"Zweckbindung: erhobene Daten nur fuer Zweck verwenden fuer den sie erhoben wurden. Neue Verwendung: neue Rechtsgrundlage oder Pruefung auf Vereinbarkeit. Beispiel: Kundendaten nicht fuer Werbung wenn nur fuer Vertrag erhoben."},
{id:88,b:"11.10",t:"Rechte der Betroffenen",q:"Was ist das Recht auf keine automatisierte Entscheidung (Art. 22 DSGVO)?",o:["Kein KI-Einsatz","Nur bei Grosskunden","Personen duerfen nicht allein durch automatisierte Entscheidungen benachteiligt werden (z.B. Kreditbewertung, Profilbildung) - Mensch muss eingreifbar sein","Kein Datenbankzugriff"],a:2,f:"Art. 22: Entscheidungen mit erheblichen Auswirkungen nicht rein automatisiert treffen. Kreditabsage durch Algorithmus: Mensch muss eingreifen koennen. Ausnahmen: Einwilligung, Vertrag, Gesetz."},
{id:89,b:"11.11",t:"Anonymisierung",q:"Was ist Rauschen (Noise Addition) als Anonymisierungsmethode?",o:["Datenmaskierung","Datenaggregation","Datenkompression","Zufaellige Veraenderung der Daten um Identifikation zu verhindern - Originaldaten werden mit zufalligem Fehler verfaelscht"],a:3,f:"Noise Addition: zufaelliges Rauschen zu Werten addieren. Durchschnittsgehalt 3000 EUR -> 2987 EUR. Einzelperson nicht mehr exakt identifizierbar. Statistisch auswertbar bleiben aber."},
{id:90,b:"11.12",t:"Pseudonymisierung",q:"Was ist Maskierung als Pseudonymisierungsmethode?",o:["IP-Maskierung","Netzwerk-Maskierung","Datenverschluesselung","Ersetzen bestimmter Merkmale durch Platzhalter (z.B. Namen durch XXX, Kreditkartennummer durch ****1234)"],a:3,f:"Maskierung: mueller -> XXX, 4111-1111-1111-1111 -> ****-****-****-1111. Teildaten sichtbar gelassen wenn noetig. Haeufig in Log-Dateien und Test-Daten."},
{id:91,b:"11.12",t:"Pseudonymisierung",q:"Warum unterliegen pseudonymisierte Daten weiterhin der DSGVO?",o:["Nur bei bestimmten Daten","Weil die Zuordnung zur Person durch Verwendung des Schluessels noch moeglich ist - Identifikation nicht ausgeschlossen","Falsch, sie unterliegen ihr nicht","Weil der Schluessel mit den Daten gespeichert ist"],a:1,f:"Pseudonymisierte Daten bleiben personenbezogen nach DSGVO (Art. 4 Nr. 5): Identifikation mit zusaetzlichen Informationen (Schluessel) weiterhin moeglich. Nur Anonymisierung beendet DSGVO-Pflichten."},
{id:92,b:"11.13",t:"Schutzbedarfsanalyse",q:"Was sind Schutzobjekte bei der Schutzbedarfsanalyse?",o:["Nur Daten","Daten, Anwendungen, IT-Systeme, Raeume und Kommunikationsverbindungen - alles was geschuetzt werden muss","Nur Netzwerke","Nur Server"],a:1,f:"Schutzobjekte: Daten (Kundendaten, Personaldaten), Anwendungen (ERP, Webseite), IT-Systeme (Server, Clients, Netzwerkgeraete), Raeume (Rechenzentrum, Serverraum), Verbindungen (Netzwerke, Internetzugang)."},
{id:93,b:"11.8",t:"DSGVO/BDSG",q:"Was sind Bussgelder nach Art. 83 DSGVO?",o:["Bis 1 Mio. EUR","Keine Bussgelder","Bis 20 Mio. EUR oder 4% des globalen Jahresumsatzes fuer schwere Verstoesse; bis 10 Mio. EUR oder 2% fuer leichtere","Bis 10.000 EUR"],a:2,f:"DSGVO-Sanktionen: Art. 83 Abs. 4 (bis 10 Mio./2%): technische und organisatorische Verstoesse. Art. 83 Abs. 5 (bis 20 Mio./4%): Grundprinzipien, Betroffenenrechte, Drittuebermittlung."},
{id:94,b:"11.9",t:"Personenbezogene Daten",q:"Was ist Speicherbegrenzung in der DSGVO?",o:["Maximale Datenmenge","Datenbankgroesse","Festplattengroesse","Personenbezogene Daten nur so lange speichern wie fuer Zweck erforderlich - danach loeschen oder anonymisieren"],a:3,f:"Speicherbegrenzung (Art. 5): Loeschfristen definieren. Beispiel: Bewerberdaten 6 Monate, Rechnungsdaten 10 Jahre (Steuerrecht). Im Verarbeitungsverzeichnis dokumentieren."},
{id:95,b:"11.10",t:"Rechte der Betroffenen",q:"Wie lange hat ein Unternehmen Zeit auf eine Betroffenenanfrage zu antworten?",o:["6 Monate","Grundsaetzlich 1 Monat, kann bei komplexen Faellen um weitere 2 Monate verlaengert werden - Betroffener muss ueber Verlaengerung informiert werden","3 Monate","Sofort"],a:1,f:"Antwortfrist: 1 Monat. Bei Komplexitaet: Verlaengerung um 2 weitere Monate moeglich, aber Betroffener muss innerhalb des ersten Monats ueber Verlaengerung informiert werden (Art. 12 DSGVO)."},
{id:96,b:"11.11",t:"Anonymisierung",q:"Was ist der Unterschied Anonymisierung vs Loeschung?",o:["Anonymisierung: Daten bleiben erhalten aber ohne Personenbezug (fuer Statistik nutzbar). Loeschung: Daten werden entfernt und sind nicht mehr vorhanden","Anonymisierung ist temporaer","Loeschung ist sicherer","Identisch"],a:0,f:"Anonymisierung: Daten bleiben fuer statistische Zwecke erhalten. Loeschung: Daten vollstaendig entfernt. Anonymisierung wenn Statistiken benoetigt werden. Loeschung wenn keine Nutzung mehr moeglich/noetig."},
{id:97,b:"11.12",t:"Pseudonymisierung",q:"Was ist der Vorteil der Pseudonymisierung?",o:["Keine DSGVO mehr noetig","Reduziert Risiko bei Datenpanne (Angreifer hat nur Pseudonyme), ermoeolichen Datenschutz-freundlichere Verarbeitung, unterstuetzt DSGVO-Compliance","Kein Vorteil","Ersetzt Anonymisierung vollstaendig"],a:1,f:"Pseudonymisierung reduziert: Risiko bei Datenpannen (Angreifer bekommt nur IDs, nicht Namen), ermoeglicht datenschutzfreundlichere Forschung, unterstuetzt Privacy by Design."},
{id:98,b:"11.13",t:"Schutzbedarfsanalyse",q:"Was ist Privacy by Design?",o:["Design ohne Datenschutz","Datenschutz optional","Datenschutz von Anfang an in Systeme eingebaut statt nachtraeglich hinzugefuegt - Art. 25 DSGVO fordert Datenschutz durch Technikgestaltung","Nur fuer neue Systeme"],a:2,f:"Privacy by Design (Art. 25 DSGVO): Datenschutz schon beim Design beruecksichtigen. Datensparsamkeit, Pseudonymisierung, Verschluesselung als Designprinzipien. Nicht nachtraeglich einbauen sondern von Anfang an."},
{id:99,b:"11.8",t:"DSGVO/BDSG",q:"Was ist Rechenschaftspflicht in der DSGVO?",o:["Nur Berichterstattung","Verantwortliche muessen nachweisen koennen dass sie DSGVO einhalten - Dokumentation ist Pflicht (Verarbeitungsverzeichnis, TOM-Dokumentation)","Nur gegenueber Aufsichtsbehoerde","Buchhaltung"],a:1,f:"Rechenschaftspflicht (Art. 5 Abs. 2): nicht nur einhalten sondern nachweisen koennen dass man einhalt. Verarbeitungsverzeichnis, TOM-Dokumentation, Schulungsnachweise, Datenschutzfolgenabschaetzungen dokumentieren."},
{id:100,b:"11.13",t:"Schutzbedarfsanalyse",q:"Was ist Privacy by Default?",o:["Voreinstellungen muessen datenschutzfreundlich sein - z.B. bei Registrierung standardmaessig minimale Daten, kein Marketing-Opt-in vorausgewaehlt","Nur fuer Apps","Standard-Datenschutzeinstellung als Marketing","Nur technische Einstellung"],a:0,f:"Privacy by Default (Art. 25 DSGVO): technische Voreinstellungen maximieren Datenschutz. Beispiel: Newsletter-Checkbox nicht vorangekreuzt, Profil standardmaessig privat, minimale Datenfelder Pflicht."}
];

let st={},filt=[...Q];
function init(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});render();}
function render(){
  const c=document.getElementById("qc");c.innerHTML="";
  let lb=null;
  filt.forEach(q=>{
    if(q.b!==lb){const d=document.createElement("div");d.className="bh";d.textContent=BN[q.b]||q.b;c.appendChild(d);lb=q.b;}
    c.appendChild(mk(q));
  });up();}
function mk(q){
  const s=st[q.id],d=document.createElement("div"),L=["A","B","C","D"];
  d.className="qc"+(s.done?(s.ok?" ac":" aw"):"");d.id="c"+q.id;
  d.innerHTML=`<div class="qn">FRAGE ${q.id}/${Q.length}</div><div class="qt">${q.t}</div><div class="qq">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt${s.done?" dis":""}${s.done&&i===q.a?" ok":""}${s.done&&!s.ok&&i===s.ci?" ng":""}" onclick="ans(${q.id},${i})"><span class="ol">${L[i]}</span><span>${o}</span></div>`).join("")}</div>
<div class="fbb${s.done?" show "+(s.ok?"cok":"cng"):""}" id="f${q.id}">${s.done?(s.ok?"✅ ":"❌ ")+q.f:""}</div>`;
  return d;}
function ans(id,i){
  const s=st[id];if(s.done)return;
  const q=Q.find(x=>x.id===id);s.done=true;s.ok=i===q.a;s.ci=i;
  const c=document.getElementById("c"+id);c.className="qc "+(s.ok?"ac":"aw");
  c.querySelectorAll(".opt").forEach((el,j)=>{el.classList.add("dis");if(j===q.a)el.classList.add("ok");if(!s.ok&&j===i)el.classList.add("ng");});
  const f=document.getElementById("f"+id);f.textContent=(s.ok?"✅ ":"❌ ")+q.f;f.className="fbb show "+(s.ok?"cok":"cng");up();}
function up(){
  const tot=Q.length,done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  document.getElementById("sd").textContent=ok+"/"+done;
  document.getElementById("pf").style.width=(done/tot*100)+"%";
  document.getElementById("pl").textContent=done+" von "+tot+" beantwortet";}
function fil(t,btn){
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("act"));btn.classList.add("act");
  if(t==="all")filt=[...Q];
  else if(t==="open")filt=Q.filter(q=>!st[q.id].done);
  else if(t==="wrong")filt=Q.filter(q=>st[q.id].done&&!st[q.id].ok);
  else filt=Q.filter(q=>q.b===t);render();}
function shuf(){filt=[...filt].sort(()=>Math.random()-.5);render();}
function rst(){Q.forEach(q=>{st[q.id]={done:false,ok:null};});filt=[...Q];document.querySelectorAll(".fb").forEach((b,i)=>b.classList.toggle("act",i===0));render();document.getElementById("ov").classList.remove("show");}
function showR(){
  const done=Object.values(st).filter(s=>s.done).length,ok=Object.values(st).filter(s=>s.ok).length;
  const pct=done>0?Math.round(ok/done*100):0;
  let e="😅",m="Weiter ueben!";
  if(pct>=90){e="🏆";m="Ausgezeichnet!";}else if(pct>=75){e="🎉";m="Sehr gut!";}else if(pct>=60){e="📚";m="Gut weiter so!";}
  document.getElementById("oe").textContent=e;document.getElementById("os").textContent=ok+"/"+done;
  document.getElementById("om").textContent=pct+"% richtig - "+m;
  document.getElementById("ov").classList.add("show");}
function closeR(){document.getElementById("ov").classList.remove("show");}
init();
</script></body></html>
